# Waves
waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement

          Create `pkg/agent/backend/bedrock/converse.go` with helper functions that convert
          between the SAW tools/types system and the Bedrock Converse API types from the AWS SDK.

          The Converse API uses typed structs (types.Message, types.ContentBlock, types.ToolConfiguration,
          types.SystemContentBlock) instead of the raw `map[string]interface{}` JSON currently used
          by the InvokeModel path. This file provides the conversion layer.

          ### Functions to implement:

          1. `buildConverseTools(workshop tools.Workshop) *types.ToolConfiguration`
             - Convert each `tools.Tool` to `types.ToolMemberToolSpec`
             - InputSchema must be converted to `types.ToolInputSchemaMemberJson` using
               `document.NewLazyDocument(t.InputSchema)`
             - Tool name via `aws.String(t.Name)`, description via `aws.String(t.Description)`

          2. `buildConverseMessages(messages []interface{}) []types.Message`
             - Convert the existing `[]interface{}` message format (used in RunStreamingWithTools)
               to `[]types.Message` with typed content blocks
             - Handle user messages with text content -> `types.ContentBlockMemberText`
             - Handle user messages with tool_result content -> `types.ContentBlockMemberToolResult`
             - Handle assistant messages with text + tool_use -> `types.ContentBlockMemberText`
               and `types.ContentBlockMemberToolUse`

          3. `buildSystemBlocks(systemPrompt string) []types.SystemContentBlock`
             - Convert system prompt string to `[]types.SystemContentBlock`
             - Use `types.SystemContentBlockMemberText{Value: systemPrompt}`

          4. `buildOutputConfig(schema map[string]any) *types.OutputConfig`
             - When schema is non-nil, marshal it to JSON string and create:
               ```go
               &types.OutputConfig{
                 TextFormat: &types.OutputFormat{
                   Type: types.OutputFormatTypeJsonSchema,
                   Structure: &types.OutputFormatStructureMemberJsonSchema{
                     Value: types.JsonSchemaDefinition{
                       Schema: aws.String(jsonStr),
                       Name:   aws.String("structured_output"),
                     },
                   },
                 },
               }
               ```
             - When schema is nil, return nil

          5. `extractTextFromOutput(output types.ConverseOutput) string`
             - Extract text content from ConverseOutput (which is a union type)
             - Handle `types.ConverseOutputMemberMessage` -> iterate content blocks
             - Extract text from `types.ContentBlockMemberText`

          6. `extractToolUseFromOutput(output types.ConverseOutput) []toolUseResult`
             - Extract tool_use blocks from output for the tool loop
             - Define `type toolUseResult struct { id, name string; input json.RawMessage }`

          ### Imports needed:
          - `github.com/aws/aws-sdk-go-v2/aws`
          - `github.com/aws/aws-sdk-go-v2/service/bedrockruntime/types`
          - `github.com/aws/aws-sdk-go-v2/service/bedrockruntime/document`
          - `github.com/blackwell-systems/scout-and-wave-go/pkg/tools`

          ## Tests to Write

          In `converse_test.go`:
          1. TestBuildConverseTools - verify Workshop tools convert to ToolConfiguration correctly
          2. TestBuildConverseTools_Empty - empty workshop returns nil or empty tools
          3. TestBuildSystemBlocks - non-empty prompt returns SystemContentBlockMemberText
          4. TestBuildSystemBlocks_Empty - empty prompt returns nil/empty slice
          5. TestBuildOutputConfig_WithSchema - verify OutputConfig structure with JSON schema
          6. TestBuildOutputConfig_Nil - nil schema returns nil
          7. TestExtractTextFromOutput - verify text extraction from ConverseOutputMemberMessage
          8. TestExtractToolUseFromOutput - verify tool_use extraction

          ## Verification Gate
          ```bash
          go build ./pkg/agent/backend/bedrock/...
          go vet ./pkg/agent/backend/bedrock/...
          go test ./pkg/agent/backend/bedrock/... -run TestBuildConverse -v
          ```

          ## Constraints
          - Do NOT modify client.go or tools.go - those are owned by Agent C
          - Keep buildToolsJSON in tools.go as-is (backward compat for non-Converse path)
          - The document package import is `github.com/aws/aws-sdk-go-v2/service/bedrockruntime/document`
          - Use `document.NewLazyDocument()` to wrap map[string]interface{} for tool input schemas
          - All Bedrock SDK types are in `github.com/aws/aws-sdk-go-v2/service/bedrockruntime/types`
        files:
          - "pkg/agent/backend/bedrock/converse.go"
          - "pkg/agent/backend/bedrock/converse_test.go"

      - id: B
        task: |
          ## What to Implement

          Extend `pkg/protocol/schema.go` to add a `GenerateCompletionReportSchema()` function
          that produces a JSON Schema for structured completion report output. This enables
          agents to return typed completion reports via structured output instead of freeform YAML.

          ### Functions to implement:

          1. `GenerateCompletionReportSchema() (map[string]any, error)`
             - Uses the same jsonschema.Reflector pattern as GenerateScoutSchema
             - Reflects on a `completionReportOutputSchema` struct (define this)
             - The struct should include fields from protocol.CompletionReport:
               status, worktree, branch, commit, files_changed, files_created,
               interface_deviations, out_of_scope_deps, tests_added, verification,
               failure_type, notes
             - Use json tags matching the CompletionReport json tags in types.go

          2. Define `completionReportOutputSchema` struct:
             ```go
             type completionReportOutputSchema struct {
               Status              string              `json:"status"`
               Worktree            string              `json:"worktree,omitempty"`
               Branch              string              `json:"branch,omitempty"`
               Commit              string              `json:"commit,omitempty"`
               FilesChanged        []string            `json:"files_changed,omitempty"`
               FilesCreated        []string            `json:"files_created,omitempty"`
               InterfaceDeviations []InterfaceDeviation `json:"interface_deviations,omitempty"`
               OutOfScopeDeps      []string            `json:"out_of_scope_deps,omitempty"`
               TestsAdded          []string            `json:"tests_added,omitempty"`
               Verification        string              `json:"verification,omitempty"`
               FailureType         string              `json:"failure_type,omitempty"`
               Notes               string              `json:"notes,omitempty"`
             }
             ```

          ## Interfaces to Call
          - `jsonschema.Reflector` from `github.com/invopop/jsonschema` (already imported)
          - Existing `InterfaceDeviation` type from this package

          ## Tests to Write

          In `schema_test.go`:
          1. TestGenerateCompletionReportSchema_Valid - verify schema generates without error
          2. TestGenerateCompletionReportSchema_HasRequiredFields - verify status field is present
          3. TestGenerateCompletionReportSchema_RoundTrip - marshal a CompletionReport to JSON,
             validate it matches the schema structure (fields exist, types correct)

          ## Verification Gate
          ```bash
          go build ./pkg/protocol/...
          go vet ./pkg/protocol/...
          go test ./pkg/protocol/... -run TestGenerateCompletionReport -v
          ```

          ## Constraints
          - Do NOT modify GenerateScoutSchema or scoutOutputSchema - those are stable
          - Follow the same Reflector pattern: AllowAdditionalProperties: false, DoNotReference: true
          - The schema must be compatible with Bedrock's OutputConfig.TextFormat.Structure
            (valid JSON Schema with string $schema field)
          - InterfaceDeviation is already defined in this package's types.go - reuse it
        files:
          - "pkg/protocol/schema.go"
          - "pkg/protocol/schema_test.go"

      - id: C
        task: |
          ## What to Implement

          Modify `pkg/agent/backend/bedrock/client.go` to:

          1. Add `outputSchema map[string]any` field to the Client struct
          2. Add `WithOutputConfig(schema map[string]any) *Client` method (mirrors api.Client)
          3. Migrate `Run()` from InvokeModel to Converse API
          4. Migrate `RunStreaming()` from InvokeModelWithResponseStream to ConverseStream API
          5. Migrate `RunStreamingWithTools()` from InvokeModelWithResponseStream to ConverseStream API

          ### Detailed changes:

          **Client struct** - add field:
          ```go
          outputSchema map[string]any // optional: structured output schema
          ```

          **WithOutputConfig method**:
          ```go
          func (c *Client) WithOutputConfig(schema map[string]any) *Client {
            c.outputSchema = schema
            return c
          }
          ```

          **Run() migration to Converse API**:
          - Replace InvokeModel call with `c.client.Converse(ctx, &bedrockruntime.ConverseInput{...})`
          - Use `aws.String(c.cfg.Model)` for ModelId
          - Build Messages using `[]types.Message` with `types.ContentBlockMemberText`
          - Build System using `[]types.SystemContentBlock` with `types.SystemContentBlockMemberText`
          - Set InferenceConfig with MaxTokens: `aws.Int32(int32(c.maxTokens()))`
          - When c.outputSchema is set, call `buildOutputConfig(c.outputSchema)` from converse.go
            (Agent A creates this) and set OutputConfig on the input
          - Extract text from response using `extractTextFromOutput(resp.Output)` from converse.go
          - Handle StopReason from `resp.StopReason` (typed enum `types.StopReasonEndTurn`)

          **RunStreaming() migration to ConverseStream API**:
          - Replace InvokeModelWithResponseStream with `c.client.ConverseStream(ctx, &bedrockruntime.ConverseStreamInput{...})`
          - Same message/system/inference config building as Run()
          - Stream events come from `resp.GetStream().Events()` channel
          - Handle event types: `types.ConverseStreamOutputMemberContentBlockStart`,
            `types.ConverseStreamOutputMemberContentBlockDelta`,
            `types.ConverseStreamOutputMemberMessageStop`
          - Delta text comes from `types.ContentBlockDeltaMemberText`
          - When c.outputSchema is set, include OutputConfig in the request

          **RunStreamingWithTools() migration to ConverseStream API**:
          - Replace InvokeModelWithResponseStream with ConverseStream
          - Use `buildConverseTools(workshop)` from converse.go for ToolConfig
          - Build typed message history using `[]types.Message` instead of `[]interface{}`
          - Tool results use `types.ContentBlockMemberToolResult` with `types.ToolResultBlock`
          - Assistant tool_use blocks use `types.ContentBlockMemberToolUse` with `types.ToolUseBlock`
          - Stop reasons: `types.StopReasonEndTurn`, `types.StopReasonToolUse`, `types.StopReasonMaxTokens`
          - Stream event handling for tool_use blocks: accumulate input_json_delta for each
            tool block, then execute tools and build tool_result messages
          - When c.outputSchema is set, include OutputConfig (used on final non-tool turn)

          ### Critical: preserve the existing stream event types (streamEvent, contentBlock,
          deltaBlock, toolBlock) for the ConverseStream event parsing since ConverseStream
          uses typed SDK events, not raw JSON chunks.

          ## Interfaces to Call
          - `buildConverseTools(workshop)` from converse.go (Agent A)
          - `buildOutputConfig(schema)` from converse.go (Agent A)
          - `buildSystemBlocks(systemPrompt)` from converse.go (Agent A)
          - `extractTextFromOutput(output)` from converse.go (Agent A)
          - `extractToolUseFromOutput(output)` from converse.go (Agent A)
          - `executeTool()` from tools.go (existing, unchanged)
          - `c.buildWorkshop()` (existing, unchanged)

          ## Tests to Write

          In `client_test.go` (append to existing):
          1. TestWithOutputConfig - verify schema is stored and returned via chaining
          2. TestRun_NilClient - verify Run still returns error when client is nil
          3. TestRunStreaming_NilClient - verify RunStreaming returns error when client is nil

          Note: Full integration tests for Converse API require AWS credentials and are
          not possible in unit tests. Focus on nil-client error paths and configuration tests.

          ## Verification Gate
          ```bash
          go build ./pkg/agent/backend/bedrock/...
          go vet ./pkg/agent/backend/bedrock/...
          go test ./pkg/agent/backend/bedrock/... -v
          ```

          ## Constraints
          - Do NOT modify tools.go - Agent A owns converse.go, tools.go is stable
          - Keep the `buildToolsJSON` function in tools.go (unused by Converse path but preserved
            for backward compatibility; can be removed in a future cleanup)
          - The streamEvent/contentBlock/deltaBlock/toolBlock types in client.go are no longer
            needed for ConverseStream (which uses typed SDK events). Remove them if they become
            unused, but verify no test depends on them first (TestStreamEventParsing does - keep
            or migrate that test).
          - Actually: TestStreamEventParsing tests the raw JSON parsing types. Since we are
            migrating AWAY from raw JSON, these types and that test can be removed. But do
            verify `go test` passes after removal.
          - Import `bedrockruntime` for Converse/ConverseStream calls (already imported)
          - The ConverseStream event types are different from InvokeModelWithResponseStream:
            use `types.ConverseStreamOutputMemberContentBlockDelta` etc, NOT raw JSON parsing
        files:
          - "pkg/agent/backend/bedrock/client.go"
          - "pkg/agent/backend/bedrock/client_test.go"
        dependencies: []

  - number: 2
    agents:
      - id: D
        task: |
          ## What to Implement

          Integrate Bedrock structured output into the engine layer so that
          `RunScout` can use the Bedrock backend with structured output when
          the model has a `bedrock:` prefix and `UseStructuredOutput` is true.

          ### Changes to `pkg/engine/runner.go`:

          1. Add `runScoutStructuredBedrock()` function:
             ```go
             func runScoutStructuredBedrock(ctx context.Context, opts RunScoutOpts, prompt string, onChunk func(string)) (*protocol.IMPLManifest, error)
             ```
             - Similar to existing `runScoutStructured()` but uses Bedrock client
             - Import `bedrockbackend "github.com/blackwell-systems/scout-and-wave-go/pkg/agent/backend/bedrock"`
             - Parse provider prefix from opts.ScoutModel to get bare model
             - Expand Bedrock model ID using `orchestrator.expandBedrockModelID` (note: this
               is unexported, so either call `orchestrator.NewBackendFromModel` and type-assert,
               or duplicate the expansion logic. Preferred: create the Bedrock client directly
               with `bedrockbackend.New(backend.Config{Model: fullModelID})`)
             - Call `.WithOutputConfig(schema)` on the Bedrock client
             - Use `client.Run()` (non-streaming, since structured output produces full JSON)
             - Unmarshal JSON response into `protocol.IMPLManifest`
             - Save via `protocol.Save()`

          2. Modify `RunScout()` to route to Bedrock structured output:
             - In the `if opts.UseStructuredOutput` branch, check if ScoutModel has `bedrock:` prefix
             - If bedrock prefix: call `runScoutStructuredBedrock()`
             - Else: call existing `runScoutStructured()` (API backend path)

             ```go
             if opts.UseStructuredOutput {
               provider, _ := parseProviderPrefix(opts.ScoutModel)
               if provider == "bedrock" {
                 _, execErr = runScoutStructuredBedrock(ctx, opts, prompt, onChunk)
               } else {
                 _, execErr = runScoutStructured(ctx, opts, prompt, onChunk)
               }
             }
             ```

             Note: `parseProviderPrefix` is in `pkg/orchestrator`. Either import and use
             a simple strings.SplitN locally, or add a helper. Simplest: inline
             `strings.HasPrefix(opts.ScoutModel, "bedrock:")`.

          ## Interfaces to Call
          - `bedrockbackend.New(backend.Config{...})` - creates Bedrock client
          - `client.WithOutputConfig(schema)` - enables structured output (Agent C implements)
          - `protocol.GenerateScoutSchema()` - existing, generates IMPL doc JSON schema
          - `protocol.Save()` - existing, saves manifest as YAML
          - `json.Unmarshal()` - standard library

          ## Tests to Write

          In `runner_structured_test.go` (new file):
          1. TestRunScoutStructuredBedrock_NilModel - verify error when model is empty
          2. TestRunScout_BedrockStructuredRouting - verify that RunScout with
             ScoutModel="bedrock:claude-sonnet-4-5" and UseStructuredOutput=true
             routes to the Bedrock path (use a mock or verify the function is called)
          3. TestRunScout_APIStructuredRouting - verify that RunScout with
             ScoutModel="claude-sonnet-4-5" and UseStructuredOutput=true still
             routes to the existing API path

          ## Verification Gate
          ```bash
          go build ./...
          go vet ./...
          go test ./pkg/engine/... -run TestRunScoutStructured -v
          ```

          ## Constraints
          - Do NOT modify `runScoutStructured()` - it is the existing API backend path
          - Do NOT modify `runScoutAutomation()` or `readContextMD()` - unrelated functions
          - The Bedrock structured output path should NOT use streaming - use `client.Run()`
            since structured output returns complete JSON (not streamed chunks)
          - If onChunk is provided, call it with the full JSON response as a single chunk
            after receiving it (for SSE progress visibility)
          - Handle the case where AWS credentials are not configured: return a clear error
            message suggesting `aws configure` or env vars
        files:
          - "pkg/engine/runner.go"
          - "pkg/engine/runner_structured_test.go"
        dependencies:
          - A
          - C

# Pre-Mortem
pre_mortem:
  overall_risk: medium
  rows:
    - scenario: "Converse API types mismatch with InvokeModel behavior"
      likelihood: medium
      impact: high
      mitigation: |
        Agent C must test that tool_use loop stop reasons match between
        InvokeModel and Converse paths. The Converse API uses typed enums
        (types.StopReasonEndTurn) vs string comparison ("end_turn"). Write
        explicit tests for each stop reason.
    - scenario: "ConverseStream event types differ from InvokeModel stream events"
      likelihood: high
      impact: medium
      mitigation: |
        ConverseStream uses typed SDK events (ConverseStreamOutputMemberContentBlockDelta)
        not raw JSON chunks. Agent C must completely replace the stream parsing logic,
        not try to adapt the existing JSON-based parsing. Agent A's converse.go helpers
        provide the type conversion layer.
    - scenario: "OutputConfig.TextFormat not supported by all Bedrock models"
      likelihood: medium
      impact: low
      mitigation: |
        Structured output is only used for Scout (IMPL doc generation) and
        completion reports. If a model doesn't support it, the existing
        unstructured path remains the fallback. Document supported models
        in code comments.
    - scenario: "Agent C and Agent A have compile-time dependency (C calls A's functions)"
      likelihood: low
      impact: medium
      mitigation: |
        Both files are in the same package (bedrock). Agent C's code calls
        functions from Agent A's converse.go. Since they are in the same wave,
        Agent C must define function signatures as comments and implement stubs
        if needed. At merge time both files will be present. Alternatively,
        Agent C can define the functions inline and Agent A's file will supersede
        at merge - but this risks conflicts. Better approach: Agent C writes
        calls to Agent A's functions and accepts that isolated build will fail
        until merge.

# Known Issues
known_issues:
  - title: "Bedrock document package import"
    description: |
      The Bedrock SDK's document.Interface type is needed for tool input schemas
      in the Converse API. The import path is
      github.com/aws/aws-sdk-go-v2/service/bedrockruntime/document which may
      need to be added to go.mod if not already pulled in transitively.
    status: "Verify during implementation - may need go get"
    workaround: "Run go mod tidy after adding the import"

