# IMPL: bedrock-structured-output
title: "Bedrock Structured Output via Converse API"
feature_slug: bedrock-structured-output
verdict: SUITABLE
test_command: "go test ./..."
lint_command: "go vet ./..."
state: SCOUT_PENDING

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES - Work decomposes into 4 agents across 8+ files.
#    The Bedrock client refactor (Converse API migration) is independent from the
#    engine integration layer (runScoutStructured Bedrock path) and the schema
#    generation work (completion report schema). No two agents need conflicting
#    modifications to the same file.
#
# 2. Investigation-first: NO - The Converse API is documented, the SDK types are
#    available (bedrockruntime.ConverseInput, ConverseStreamInput with OutputConfig,
#    ToolConfiguration), and the existing API client provides a clear reference
#    implementation for structured output.
#
# 3. Interface discoverability: YES - The Converse API types are in the AWS SDK,
#    the WithOutputConfig pattern exists in api/client.go, and protocol.GenerateScoutSchema()
#    already produces the JSON schema. Cross-agent interfaces can be fully defined.
#
# 4. Pre-implementation status check:
#    Total items: 4 work areas
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 1 (Bedrock client has InvokeModel + tool loop, needs Converse migration)
#    Not implemented (TO-DO): 3 (Converse API, structured output support, engine integration)
#
# 5. Parallelization value: HIGH - Build/test cycle is >30s (Go build + test),
#    agents touch 2-3 files each, Wave 1 has 3 fully independent agents.
#    The Converse API migration is substantial code (~200 lines) and benefits
#    from parallel development with schema generation and test infrastructure.
#
# Estimated times:
# - Scout phase: ~8 min
# - Agent execution: ~15 min (4 agents, ~10 min avg, 3 parallel in Wave 1)
# - Merge & verification: ~5 min
# Total SAW time: ~28 min
#
# Sequential baseline: ~45 min (4 agents x ~10 min + overhead)
# Time savings: ~17 min (~38% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  Work decomposes cleanly into 4 agents across 2 waves. Wave 1 has 3 independent
  agents: (A) Converse API core migration, (B) structured output schema generation
  for completion reports, and (C) Converse streaming + tool loop. Wave 2 has 1
  agent (D) integrating Bedrock structured output into the engine layer.

  The Bedrock SDK v1.50.1 already includes Converse and ConverseStream operations
  with OutputConfig.TextFormat supporting JSON schema constraints via
  OutputFormatStructureMemberJsonSchema. No SDK upgrade needed.

  Key risk: The Converse API uses different request/response types (types.Message,
  types.ContentBlock, types.ToolConfiguration) vs the current raw JSON approach
  (map[string]interface{} with anthropic_version). The migration must preserve
  backward compatibility for the tool-use loop.

# Quality Gates
quality_gates:
  level: standard
  gates:
    - type: build
      command: "go build ./..."
      required: true
    - type: lint
      command: "go vet ./..."
      required: false
      description: "Check for common Go mistakes"
    - type: test
      command: "go test ./pkg/agent/backend/bedrock/... ./pkg/protocol/... ./pkg/engine/..."
      required: true
      description: "Focused test on changed packages"

# Scaffolds
scaffolds: []
# No scaffolds needed - agents have independent type ownership. The shared types
# (OutputConfig, JsonSchemaDefinition) come from the AWS SDK, not from this project.
# The WithOutputConfig method pattern already exists on the API client and will be
# independently implemented on the Bedrock client by Agent A.

# Interface Contracts
interface_contracts:
  - name: "Client.WithOutputConfig"
    description: |
      Adds structured output JSON schema to the Bedrock client, mirroring the
      api.Client.WithOutputConfig pattern. When set, Converse/ConverseStream
      requests include OutputConfig with the JSON schema constraint.
    definition: |
      func (c *Client) WithOutputConfig(schema map[string]any) *Client
    location: "pkg/agent/backend/bedrock/client.go"

  - name: "Client.RunConverse (non-streaming)"
    description: |
      Internal method using the Converse API for non-streaming requests.
      Replaces the current InvokeModel-based Run method. Supports structured
      output via OutputConfig when outputSchema is set.
    definition: |
      func (c *Client) Run(ctx context.Context, systemPrompt, userPrompt, workDir string) (string, error)
      // When c.outputSchema != nil, builds:
      //   OutputConfig: &types.OutputConfig{
      //     TextFormat: &types.OutputFormat{
      //       Type: types.OutputFormatTypeJsonSchema,
      //       Structure: &types.OutputFormatStructureMemberJsonSchema{
      //         Value: types.JsonSchemaDefinition{
      //           Schema: aws.String(jsonSchemaString),
      //           Name:   aws.String("structured_output"),
      //         },
      //       },
      //     },
      //   }
    location: "pkg/agent/backend/bedrock/client.go"

  - name: "Client.RunStreamingWithTools (Converse API)"
    description: |
      Migrates the tool-use loop from InvokeModelWithResponseStream to
      ConverseStream API. Uses types.Message, types.ContentBlock, and
      types.ToolConfiguration instead of raw JSON maps. Supports structured
      output via OutputConfig on the final turn.
    definition: |
      func (c *Client) RunStreamingWithTools(ctx context.Context, systemPrompt, userPrompt, workDir string, onChunk backend.ChunkCallback, onToolCall backend.ToolCallCallback) (string, error)
      // Uses ConverseStream with:
      //   Messages []types.Message (typed, not map[string]interface{})
      //   ToolConfig *types.ToolConfiguration (SDK tool specs)
      //   System []types.SystemContentBlock
      //   InferenceConfig *types.InferenceConfiguration{MaxTokens: aws.Int32(n)}
    location: "pkg/agent/backend/bedrock/client.go"

  - name: "buildConverseTools"
    description: |
      Converts Workshop tools to Bedrock Converse API ToolConfiguration format.
      Replaces buildToolsJSON for the Converse path.
    definition: |
      func buildConverseTools(workshop tools.Workshop) *types.ToolConfiguration
      // Returns &types.ToolConfiguration{
      //   Tools: []types.Tool{
      //     &types.ToolMemberToolSpec{Value: types.ToolSpecification{
      //       Name: aws.String(name),
      //       Description: aws.String(desc),
      //       InputSchema: &types.ToolInputSchemaMemberJson{Value: document},
      //     }},
      //   },
      // }
    location: "pkg/agent/backend/bedrock/converse.go"

  - name: "GenerateCompletionReportSchema"
    description: |
      Generates a JSON Schema for CompletionReport structured output,
      mirroring GenerateScoutSchema but for agent completion reports.
    definition: |
      func GenerateCompletionReportSchema() (map[string]any, error)
    location: "pkg/protocol/schema.go"

  - name: "runScoutStructuredBedrock"
    description: |
      Engine-layer function that runs Scout via Bedrock backend with structured
      output, parallel to the existing runScoutStructured (API backend).
      Uses WithOutputConfig on the Bedrock client.
    definition: |
      func runScoutStructuredBedrock(ctx context.Context, opts RunScoutOpts, prompt string, onChunk func(string)) (*protocol.IMPLManifest, error)
    location: "pkg/engine/runner.go"

