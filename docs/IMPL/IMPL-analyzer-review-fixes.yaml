interface_contracts:
    - name: Z-domain error code constants
      description: |
        13 new error code constants added to pkg/result/codes.go for pkg/analyzer operations.
        Domain prefix Z, range Z001–Z013.
      definition: |
        const (
            CodeAnalyzeParseFailed       = "Z001_PARSE_FAILED"
            CodeAnalyzeGomodReadFailed   = "Z002_GOMOD_READ_FAILED"
            CodeAnalyzeModuleNotFound    = "Z003_MODULE_NOT_FOUND"
            CodeAnalyzeImportResolveFailed = "Z004_IMPORT_RESOLVE_FAILED"
            CodeAnalyzeCycleDetected     = "Z005_CYCLE_DETECTED"
            CodeAnalyzeUnsupportedLang   = "Z006_UNSUPPORTED_LANGUAGE"
            CodeAnalyzeNodeMissing       = "Z007_NODE_MISSING"
            CodeAnalyzeJSParserMissing   = "Z008_JS_PARSER_MISSING"
            CodeAnalyzePythonMissing     = "Z009_PYTHON_MISSING"
            CodeAnalyzeRustParserMissing = "Z010_RUST_PARSER_MISSING"
            CodeAnalyzeManifestNil       = "Z011_MANIFEST_NIL"
            CodeAnalyzeCircularAgentDep  = "Z012_CIRCULAR_AGENT_DEP"
            CodeAnalyzeWalkFailed        = "Z013_WALK_FAILED"
        )
      location: pkg/result/codes.go
    - name: Analyzer.ParseFile
      description: Parses a Go source file; context propagated, result.Result[T] return.
      definition: |
        func (a *Analyzer) ParseFile(ctx context.Context, path string) result.Result[*ast.File]
      location: pkg/analyzer/analyzer.go
    - name: Analyzer.ExtractImports
      description: Extracts local import paths from parsed AST; context propagated.
      definition: |
        func (a *Analyzer) ExtractImports(ctx context.Context, file *ast.File, repoRoot string) result.Result[[]string]
      location: pkg/analyzer/analyzer.go
    - name: ResolveImportPath
      description: |
        Package-level function (not a method on *Analyzer). Resolves a module import path to
        an absolute directory path. Parameter order: importPath, repoRoot, modulePath.
        Migrated to result.Result[string]; context.Context added as first param.
      definition: |
        func ResolveImportPath(ctx context.Context, importPath, repoRoot, modulePath string) result.Result[string]
      location: pkg/analyzer/analyzer.go
    - name: IsStdlib
      description: |
        Reports whether an import path is a Go stdlib package.
        Simplified heuristic: first path segment has no dot (e.g. "fmt", "os", "go/ast").
        Replaces 30-entry hardcoded prefix list.
      definition: |
        func IsStdlib(importPath string) bool
      location: pkg/analyzer/analyzer.go
    - name: BuildGraph
      description: |
        Builds the file-level dependency graph. Context is now the first parameter (P1-4, P0-3).
        DepGraph.CascadeCandidates is []CascadeCandidate (canonical type after P1-9 unification).
      definition: |
        func BuildGraph(ctx context.Context, repoRoot string, targetFiles []string) result.Result[*DepGraph]
      location: pkg/analyzer/graph.go
    - name: DepGraph (updated)
      description: |
        CascadeCandidates field changes from []CascadeFile to []CascadeCandidate.
        CascadeFile struct is removed from types.go.
      definition: |
        type DepGraph struct {
            Nodes             []FileNode
            Waves             map[int][]string
            CascadeCandidates []CascadeCandidate  // was []CascadeFile
        }
      location: pkg/analyzer/types.go
    - name: DetectCascades
      description: Detects type-rename cascade candidates; migrated to result.Result[T].
      definition: |
        func DetectCascades(ctx context.Context, repoRoot string, renames []RenameInfo) result.Result[CascadeResult]
      location: pkg/analyzer/cascade.go
    - name: ToOutput
      description: |
        Converts DepGraph to Output. No error return (infallible conversion).
        Output.CascadeCandidates uses CascadeCandidate directly (OutputCascade removed).
      definition: |
        func ToOutput(g *DepGraph) *Output
      location: pkg/analyzer/output.go
    - name: Output (updated)
      description: CascadeCandidates field changes from []OutputCascade to []CascadeCandidate. OutputCascade is removed.
      definition: |
        type Output struct {
            Nodes             []OutputNode        `yaml:"nodes" json:"nodes"`
            Waves             map[int][]string    `yaml:"waves" json:"waves"`
            CascadeCandidates []CascadeCandidate  `yaml:"cascade_candidates,omitempty" json:"cascade_candidates,omitempty"`
        }
      location: pkg/analyzer/output.go
    - name: FormatYAML
      description: Serializes Output to YAML bytes; migrated to result.Result[T].
      definition: |
        func FormatYAML(o *Output) result.Result[[]byte]
      location: pkg/analyzer/output.go
    - name: FormatJSON
      description: Serializes Output to indented JSON bytes; migrated to result.Result[T].
      definition: |
        func FormatJSON(o *Output) result.Result[[]byte]
      location: pkg/analyzer/output.go
    - name: DetectSharedTypes
      description: |
        Detects shared type candidates from IMPL manifest. Migrated to result.Result[T].
        Nil manifest returns FATAL result with Z011_MANIFEST_NIL (not empty slice + error).
      definition: |
        func DetectSharedTypes(ctx context.Context, manifest *protocol.IMPLManifest, repoRoot string) result.Result[[]SharedTypeCandidate]
      location: pkg/analyzer/shared_types.go
    - name: DetectWiring
      description: |
        Detects cross-agent wiring declarations from IMPL manifest task prompts.
        Adds context.Context first param (P1-3). Migrated to result.Result[T].
      definition: |
        func DetectWiring(ctx context.Context, manifest *protocol.IMPLManifest, repoRoot string) result.Result[[]protocol.WiringDeclaration]
      location: pkg/analyzer/wiring.go
    - name: AnalyzeDeps (updated or deleted)
      description: |
        If callers can call BuildGraph + ToOutput directly, delete AnalyzeDeps (P1-7).
        If kept for compatibility (runner.go uses it), update signature to result.Result[T]
        and propagate context to BuildGraph. Decision: DELETE and update runner.go directly.
      definition: |
        // DELETED: pkg/engine/runner.go will call BuildGraph(ctx, ...) then ToOutput() directly.
        // deps.go will be replaced with a file-level comment or removed from compilation.
      location: pkg/analyzer/deps.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Add Z-domain error code constants to pkg/result/codes.go.

            ## Context
            pkg/analyzer currently uses bare fmt.Errorf throughout. The canonical pattern
            in this codebase is to use typed error codes from pkg/result/codes.go so
            callers can programmatically identify error categories. This wave adds the
            Z001–Z013 constants to enable Wave 2/3 agents to use them.

            ## What to implement

            Open `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/result/codes.go`.

            Add a new comment block and const group after the existing J-domain codes
            (Journal error codes, J001–J099), at the end of the file. The new block must
            read exactly:

            ```go
            // Analyzer error codes (Z001-Z099)
            const (
                // CodeAnalyzeParseFailed is emitted when a Go source file cannot be parsed.
                CodeAnalyzeParseFailed = "Z001_PARSE_FAILED"
                // CodeAnalyzeGomodReadFailed is emitted when go.mod cannot be read.
                CodeAnalyzeGomodReadFailed = "Z002_GOMOD_READ_FAILED"
                // CodeAnalyzeModuleNotFound is emitted when the module path cannot be resolved.
                CodeAnalyzeModuleNotFound = "Z003_MODULE_NOT_FOUND"
                // CodeAnalyzeImportResolveFailed is emitted when an import path cannot be resolved to a file.
                CodeAnalyzeImportResolveFailed = "Z004_IMPORT_RESOLVE_FAILED"
                // CodeAnalyzeCycleDetected is emitted when a dependency cycle is found.
                CodeAnalyzeCycleDetected = "Z005_CYCLE_DETECTED"
                // CodeAnalyzeUnsupportedLang is emitted when the file language is not supported.
                CodeAnalyzeUnsupportedLang = "Z006_UNSUPPORTED_LANGUAGE"
                // CodeAnalyzeNodeMissing is emitted when a referenced file node is absent from the graph.
                CodeAnalyzeNodeMissing = "Z007_NODE_MISSING"
                // CodeAnalyzeJSParserMissing is emitted when the js-parser.js helper script cannot be found.
                CodeAnalyzeJSParserMissing = "Z008_JS_PARSER_MISSING"
                // CodeAnalyzePythonMissing is emitted when the python parser script cannot be found.
                CodeAnalyzePythonMissing = "Z009_PYTHON_MISSING"
                // CodeAnalyzeRustParserMissing is emitted when the rust-parser helper binary cannot be found.
                CodeAnalyzeRustParserMissing = "Z010_RUST_PARSER_MISSING"
                // CodeAnalyzeManifestNil is emitted when a nil manifest is passed to DetectSharedTypes or DetectWiring.
                CodeAnalyzeManifestNil = "Z011_MANIFEST_NIL"
                // CodeAnalyzeCircularAgentDep is emitted when a circular agent dependency is detected.
                CodeAnalyzeCircularAgentDep = "Z012_CIRCULAR_AGENT_DEP"
                // CodeAnalyzeWalkFailed is emitted when filepath.Walk fails during cascade detection.
                CodeAnalyzeWalkFailed = "Z013_WALK_FAILED"
            )
            ```

            Also update the package-level godoc comment at the top of codes.go to list
            the new domain range:
            ```
            //  Z001-Z099: Analyzer errors (dependency graph, cascade, shared types, wiring)
            ```

            ## Interfaces to implement
            See interface_contracts: "Z-domain error code constants".

            ## Tests to write / update
            Open `pkg/result/codes_test.go`. Add a test that verifies each new constant
            has the correct string prefix (Z0nn_). Pattern: iterate a list of (constant, expected)
            pairs and assert equality. Do not change any existing tests.

            ## Verification gate
            ```
            go build ./pkg/result/...
            go vet ./pkg/result/...
            go test ./pkg/result/...
            ```

            ## Constraints
            - Do NOT modify any existing constants. Only append.
            - Do NOT touch any file outside pkg/result/codes.go and pkg/result/codes_test.go.
            - The Z-domain header comment must match exactly the style used for other domains.
          files:
            - pkg/result/codes.go
            - pkg/result/codes_test.go
        - id: B
          task: |
            ## Role
            Fix P0 runtime bugs in language parser helpers: javascript.go, python.go, rust.go.
            Fix P1-5 (fileExists cross-file helper). Fix P2-7 (resolveJSImport false success).

            ## Context
            Three bugs are active correctness failures:
            - P0-1: javascript.go:37 uses `parserScript := "js-parser.js"` as a bare relative
              path — always fails when invoked from any directory except the source tree.
            - P0-2 / P1-6: python.go:23 uses a Python subprocess guard that always exits 0,
              so missing python parser scripts are never caught.
            - P1-5: shared_types.go calls `fileExists()` which is defined in javascript.go —
              a cross-file helper coupling. This must be moved.
            - P2-7: javascript.go's `resolveJSImport` always returns a synthesized path rather
              than an error when the import cannot be resolved — test accommodation baked into
              production code.

            ## What to implement

            ### javascript.go
            1. Replace the bare `parserScript := "js-parser.js"` at line 37 with a lookup
               that searches PATH for the script, using `exec.LookPath("js-parser.js")`. If
               not found, return `result.NewFailure[[]string]([]result.SAWError{result.NewFatal(
               result.CodeAnalyzeJSParserMissing, "js-parser.js not found in PATH")})`.
               NOTE: Wave 2 will change the return type to result.Result[T]. For now, keep
               the existing ([]string, error) return but replace the fmt.Errorf with a
               descriptive error that agents C/E can later wrap.
            2. In `resolveJSImport`: when a resolution fails (import path cannot be mapped to
               a known file), return `("", fmt.Errorf("cannot resolve JS import: %s", importPath))`
               instead of returning a synthesized path. Callers must handle the error.
            3. Move the `fileExists(path string) bool` function out of javascript.go into a new
               unexported helper file `pkg/analyzer/helpers.go`. The function body is unchanged;
               only the location moves.

            ### python.go
            Replace the Python subprocess existence guard at line 23. The current code runs
            `python -c "import os; os.path.exists(...)"` which always exits 0 and never
            detects a missing script. Replace with a direct `os.Stat(parserScript)` call in Go:
            ```go
            if _, err := os.Stat(parserScript); os.IsNotExist(err) {
                return nil, fmt.Errorf("python parser script not found: %s", parserScript)
            }
            ```
            Also fix the parserScript path to use the same PATH-lookup approach as javascript.go
            (search PATH for "python-parser.py"). If not found, return an error using
            fmt.Errorf (Wave 3 will migrate to result.Result[T]).

            ### rust.go
            NOTE: rust.go already uses `exec.LookPath("rust-parser")` at line 20. The PATH-lookup
            fix is already in place — do NOT re-apply it. No changes are needed to rust.go's
            path resolution. Only update any error-return patterns if they use bare panic/fmt.Errorf
            in a way that is inconsistent with the rest of the language parsers after your other fixes.

            ### pkg/analyzer/helpers.go (new file)
            Create `pkg/analyzer/helpers.go` with:
            ```go
            package analyzer

            import "os"

            // fileExists reports whether path exists on disk.
            func fileExists(path string) bool {
                _, err := os.Stat(path)
                return err == nil
            }
            ```

            Remove `fileExists` from javascript.go after creating helpers.go.

            ## Tests to write / update
            Own and update: javascript_test.go, python_test.go, rust_test.go.
            - `javascript_test.go`: add test that `resolveJSImport` returns an error for
              an unresolvable import path (not a synthesized result). Update any test that
              calls functions whose signatures changed due to exec.LookPath addition.
            - `python_test.go`: add test that the existence guard returns an error when the
              parser script does not exist (use a nonexistent path). Update any existing
              tests affected by the os.Stat guard change.
            - `rust_test.go`: add test that missing rust-parser binary returns an error.
            - Do NOT add helpers_test.go; the fileExists helper is tested indirectly.

            ## Verification gate
            ```
            go build ./pkg/analyzer/...
            go vet ./pkg/analyzer/...
            go test ./pkg/analyzer/...
            ```

            ## Constraints
            - Do NOT change function signatures beyond what is described above.
            - Do NOT touch any files outside javascript.go, python.go, rust.go, helpers.go,
              and the three language parser test files.
            - The `fileExists` function must appear in EXACTLY ONE file after this change
              (helpers.go). Remove it from javascript.go.
          files:
            - pkg/analyzer/javascript.go
            - pkg/analyzer/python.go
            - pkg/analyzer/rust.go
            - pkg/analyzer/helpers.go
            - pkg/analyzer/javascript_test.go
            - pkg/analyzer/python_test.go
            - pkg/analyzer/rust_test.go
      base_commit: 7040e98a53d90da3a86c76be74a556c820e01aa9
    - number: 2
      agents:
        - id: C
          task: |
            ## Role
            Migrate analyzer.go to result.Result[T]; fix P0-3 (context propagation);
            fix P2-3 (IsStdlib heuristic simplification).

            ## Context
            This is the core Analyzer type file. Three changes:
            - P1-1: All three public methods currently return (T, error). Migrate to result.Result[T].
            - P0-3: ParseFile and ExtractImports call context.Background() internally instead
              of using the caller's context. Fix: propagate ctx through to internal I/O.
            - P2-3: IsStdlib has a 30-entry hardcoded prefix list. Replace with heuristic:
              first path element has no dot = stdlib (e.g. "fmt", "os", "go/ast" all pass).

            ## What to implement

            ### analyzer.go — function signature changes

            Change the three public method signatures and their return statements:

            ```go
            func (a *Analyzer) ParseFile(ctx context.Context, path string) result.Result[*ast.File]
            func (a *Analyzer) ExtractImports(ctx context.Context, file *ast.File, repoRoot string) result.Result[[]string]
            func ResolveImportPath(ctx context.Context, importPath, repoRoot, modulePath string) result.Result[string]
            ```

            NOTE: ResolveImportPath is a package-level function (NOT a method on *Analyzer).
            The actual current signature is:
              func ResolveImportPath(importPath, repoRoot, modulePath string) (string, error)
            Parameter order: importPath first, repoRoot second, modulePath third. Do NOT reorder.
            Add ctx as the NEW first parameter. Migrate error returns to result.Result[string].

            For each function:
            - Replace `return nil, fmt.Errorf(...)` with `return result.NewFailure[T]([]result.SAWError{result.NewFatal(result.CodeXXX, msg)})`
              using the appropriate Z-domain code from Wave 1 (e.g. Z001_PARSE_FAILED for parse
              errors, Z002_GOMOD_READ_FAILED for go.mod errors, Z004_IMPORT_RESOLVE_FAILED for
              import resolution errors).
            - Replace `return value, nil` with `return result.NewSuccess(value)`.
            - Import `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"`.

            ### P0-3 context propagation
            In `parseGoFiles` (called from graph.go's BuildGraph loop, but the internal
            `parser.ParseFile` calls in analyzer.go), verify the ctx parameter is passed
            through. Any internal call to `getModulePath(context.Background(), ...)` in
            analyzer.go must become `getModulePath(ctx, ...)`.

            ### P2-3 IsStdlib
            Replace the current implementation:
            ```go
            func IsStdlib(importPath string) bool {
                // New: first path element has no dot = stdlib
                parts := strings.SplitN(importPath, "/", 2)
                return !strings.Contains(parts[0], ".")
            }
            ```
            This correctly classifies: "fmt" (stdlib), "os" (stdlib), "go/ast" (stdlib),
            "github.com/user/repo" (not stdlib), "gopkg.in/yaml.v3" (not stdlib).
            Remove the old hardcoded prefix slice/map entirely.

            ## Interfaces to implement
            See interface_contracts: Analyzer.ParseFile, Analyzer.ExtractImports,
            ResolveImportPath (package-level, NOT a method), IsStdlib.

            ## Tests to write / update
            Update `analyzer_test.go`:
            - All tests calling ParseFile/ExtractImports/ResolveImportPath must unwrap
              result.Result[T] using `.GetData()` and `.IsSuccess()`.
            - Add test cases for IsStdlib with the new heuristic: "fmt" → true, "os" → true,
              "go/ast" → true, "github.com/foo/bar" → false, "gopkg.in/yaml.v3" → false.
            - Do NOT change test behavior — tests passing today must still pass.

            ## Verification gate
            ```
            go build ./pkg/analyzer/...
            go vet ./pkg/analyzer/...
            go test ./pkg/analyzer/...
            ```

            ## Constraints
            - Own ONLY: pkg/analyzer/analyzer.go, pkg/analyzer/analyzer_test.go.
            - Do NOT touch graph.go, cascade.go, output.go, types.go, or any other file.
            - The `New()` constructor is unchanged (returns *Analyzer).
            - Wave 2 Agent D owns graph.go. Do not modify it.
          files:
            - pkg/analyzer/analyzer.go
            - pkg/analyzer/analyzer_test.go
          dependencies:
            - A
        - id: D
          task: |
            ## Role
            Migrate graph.go to result.Result[T]; add context.Context to BuildGraph (P1-4);
            fix P0-4 (context propagation in internal detectCascades); fix P2-1
            (computeDepth O(n²)); unify cascade types in types.go (P1-9 partial).

            ## Context
