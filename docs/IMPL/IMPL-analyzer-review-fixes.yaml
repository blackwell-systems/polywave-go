            Both agents' briefs explicitly state the struct is unchanged and defined in cascade.go.
            Agent D constructs CascadeCandidate with field literals — if shape drifts, build fails
            immediately at Wave 2 merge (caught by quality gate, not at agent runtime).
        - scenario: |
            runner.go AnalyzeDeps call site is in a function with no context.Context in scope.
            Agent H would need to thread context through an outer function signature — outside
            its constrained ownership.
          likelihood: low
          impact: medium
          mitigation: |
            Agent H brief explicitly allows `context.Background()` as a fallback with a TODO comment.
            The brief also requires gopls find-references before editing to confirm scope. Acceptable
            short-term debt; full context propagation in runner.go was completed in a prior wave
            (context-propagation IMPL).
        - scenario: |
            P2-5 test flake (TestDetectWiring_MultipleCallers ordering) causes Wave 3 gate failure
            for Agent F even after the fix, due to other map-iteration ordering in wiring.go logic.
          likelihood: low
          impact: low
          mitigation: |
            Agent F brief instructs sorting the entire returned slice by CallerAgent before assertion.
            If internal wiring.go also has map iteration ordering, the brief asks F to audit wiring.go
            for all non-deterministic map iterations and sort the output slice before returning.
        - scenario: |
            deps.go deletion causes Wave 3 build failure if any test binary or build tag imports
            the AnalyzeDeps symbol indirectly (e.g., via a generated mock or interface check).
          likelihood: low
          impact: medium
          mitigation: |
            Agent G replaces deps.go with a package-only tombstone file (not a deletion), so the
            Go package still compiles. The exported symbol AnalyzeDeps is removed but the package
            is not removed. Runner.go is updated by Agent H in the next wave.
        - scenario: |
            Wave 2 has 3 agents (C, D, E) all compiling pkg/analyzer. If any one of them
            introduces a compile error (e.g. referencing CascadeFile which D deletes, or
            OutputCascade which E deletes), the other agents' worktrees fail.
          likelihood: medium
          impact: medium
          mitigation: |
            Worktrees are isolated — each agent compiles independently. Wave 2 agents do not
            need to merge before the next wave. The risk is that Agent D's types.go removes
            CascadeFile while Agent C's analyzer.go (if it somehow referenced it) breaks.
            Mitigation: Agent C brief explicitly does NOT touch types.go or cascade types.
            Agent E brief does NOT touch types.go. Ownership is disjoint.
        - scenario: |
            P2-8 (move internal detectCascades from graph.go to cascade.go) was listed in the
            findings but NOT included in any agent's scope. If it stays, graph.go remains a
            large file but is otherwise functional.
          likelihood: high
          impact: low
          mitigation: |
            P2-8 is a simplification (code organization), not a correctness fix. Excluded
            deliberately to keep Agent D's scope bounded. Can be a follow-up PR.
