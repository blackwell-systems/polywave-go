title: pkg/analyzer Canonicalization Review Fixes
feature_slug: analyzer-review-fixes
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly.

    1. File decomposition: 14+ distinct files spread across pkg/analyzer/, pkg/result/,
       pkg/engine/, and cmd/sawtools/. Disjoint ownership is achievable with 8 agents
       across 4 waves.

    2. No investigation-first items: All bugs are well-characterized (specific line numbers,
       root causes identified). No runtime-only issues requiring reproduction.

    3. Interface discoverability: Cross-agent contracts are fully definable upfront. The
       trickiest point — cascade type unification (P1-9) — is resolved by a scaffold that
       pins CascadeCandidate as the canonical type before Wave 2 agents start.

    4. Pre-implementation status: Full TODO on all findings. The pkg/analyzer package was
       recently assembled (phase2-determinism-final, detect-wiring features) but the
       result.Result[T] migration, context propagation, and error codes were not applied.

    5. Parallelization value: Build + test cycle is >10s for this module. Agents C, D, E,
       F each touch 2-4 files with non-trivial logic changes. Wave 2 alone has 3 independent
       agents. Clear speedup over sequential execution.

    Estimated times:
    - Scout phase: ~15 min (this doc)
    - Agent execution: ~45 min (8 agents × ~10 min avg, accounting for 3 parallel waves)
    - Merge and verification: ~10 min
    Total SAW time: ~70 min

    Sequential baseline: ~120 min (8 agents × ~15 min sequential)
    Time savings: ~50 min (42% faster)

    Recommendation: Clear speedup. Proceed.
test_command: go test ./pkg/analyzer/... ./pkg/result/... ./pkg/engine/... ./cmd/sawtools/...
lint_command: go vet ./...
