waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement

          Create `pkg/protocol/integration.go` — the core integration validation engine (E25).
          This function scans completed wave agents' files for new exported symbols using Go AST,
          then searches the codebase for call-sites. Exports with no call-site are integration gaps.

          The scaffold file `pkg/protocol/integration_types.go` provides the shared types
          (IntegrationGap, IntegrationReport, IntegrationConnector). Do NOT redefine these types.

          ## Interfaces to Implement

          ```go
          // ValidateIntegration scans a completed wave for unconnected exports.
          // It parses completion reports to find modified files, uses Go AST to extract
          // new exported symbols, then searches the repo for usage. Returns gaps.
          func ValidateIntegration(manifest *IMPLManifest, waveNum int, repoPath string) (*IntegrationReport, error)
          ```

          Algorithm:
          1. Get completion reports for the wave's agents
          2. For each agent's FilesChanged + FilesCreated:
             a. Parse with go/ast to find exported functions, types, methods, struct fields
             b. For each export, check if it existed before the wave (skip pre-existing)
             c. Search the repo (excluding the owning file) for references to the export name
             d. If no reference found AND IsIntegrationRequired() returns true → add to gaps
          3. Set report.Valid = len(gaps) == 0
          4. Generate summary string

          For Go AST parsing: use `go/parser` and `go/ast` from stdlib. Parse only `.go` files.
          For reference search: use simple string matching (grep-like) on the repo, excluding
          test files and the defining file itself. This is a heuristic, not a compiler.

          Also implement `AppendIntegrationReport` to persist the report to the IMPL manifest
          (same pattern as `AppendStubReport` in stubs.go):
          ```go
          func AppendIntegrationReport(manifestPath string, waveKey string, report *IntegrationReport) error
          ```

          ## Tests to Write

          1. TestValidateIntegration_NoGaps — wave with exports that are all called
          2. TestValidateIntegration_DetectsGap — wave with unused exported function
          3. TestValidateIntegration_SkipsPreExisting — pre-existing exports not flagged
          4. TestValidateIntegration_EmptyWave — no completion reports
          5. TestAppendIntegrationReport — persists and reloads correctly

          Use temp directories with small Go files for test fixtures.

          ## Verification Gate

          ```bash
          go build ./pkg/protocol/...
          go vet ./pkg/protocol/...
          go test ./pkg/protocol/ -run TestValidateIntegration -v
          go test ./pkg/protocol/ -run TestAppendIntegration -v
          ```

          ## Constraints

          - Import from scaffold: `integration_types.go` provides IntegrationGap, IntegrationReport, IntegrationConnector
          - Follow the pattern in `stubs.go` for AppendIntegrationReport
          - Do NOT modify types.go — schema changes are in Wave 3
          - Use `go/ast` and `go/parser` for Go-specific analysis
          - Keep the search heuristic simple: string contains, not full import resolution
        files:
          - "pkg/protocol/integration.go"
          - "pkg/protocol/integration_test.go"

      - id: "B"
        task: |
          ## What to Implement

          Create `pkg/protocol/integration_heuristics.go` — classification and suggestion functions
          that determine whether an export needs integration wiring and where it should be wired.

          The scaffold file `pkg/protocol/integration_types.go` provides the shared types.
          Do NOT redefine these types.

          ## Interfaces to Implement

          ```go
          // IsIntegrationRequired returns true if the export name and category suggest
          // this symbol needs wiring into caller files. Uses naming heuristics.
          func IsIntegrationRequired(exportName string, category string) bool

          // ClassifyExport determines the integration category for an exported symbol.
          // kind is the Go AST node kind: "func", "type", "method", "field", "var", "const"
          // Returns: "function_call", "type_usage", "field_init", or "none"
          func ClassifyExport(exportName string, kind string) string

          // SuggestCallers searches the codebase for files that likely need to call/use
          // the given export. Uses import graph (go list) and naming heuristics.
          func SuggestCallers(repoPath string, exportPkg string, exportName string) ([]string, error)
          ```

          ### IsIntegrationRequired Heuristics

          Return true when:
          - Function name starts with: Build, Create, New, Register, Setup, Init, Run, Start, Wire
          - Function name ends with: Handler, Middleware, Factory, Builder
          - Category is "field_init" (struct field added to widely-used type)
          - Export is a type that implements a known interface (check if method set matches)

          Return false when:
          - Function name starts with: Is, Has, Get, String, Format, Validate (query functions)
          - Export is a const or var (usually consumed at import time)
          - Category is "none"

          ### SuggestCallers Algorithm

          1. Run `go list -json ./...` to get package import graph
          2. Find packages that import the export's package
          3. For each importing package, list its .go files
          4. Return those file paths as suggested callers
          5. If go list fails, fall back to grep for the package path in import statements

          ## Tests to Write

          1. TestIsIntegrationRequired_BuildPrefix — returns true for "BuildWaveConstraints"
          2. TestIsIntegrationRequired_GetPrefix — returns false for "GetConfig"
          3. TestClassifyExport_Func — classifies function as "function_call"
          4. TestClassifyExport_Field — classifies struct field as "field_init"
          5. TestSuggestCallers_FindsImporters — finds files importing the package
          6. TestSuggestCallers_EmptyRepo — returns empty for no importers

          ## Verification Gate

          ```bash
          go build ./pkg/protocol/...
          go vet ./pkg/protocol/...
          go test ./pkg/protocol/ -run TestIsIntegration -v
          go test ./pkg/protocol/ -run TestClassifyExport -v
          go test ./pkg/protocol/ -run TestSuggestCallers -v
          ```

          ## Constraints

          - Import from scaffold: `integration_types.go` provides types
          - Do NOT import `go/ast` — that's Agent A's domain. Use string heuristics only.
          - SuggestCallers may shell out to `go list` — that's acceptable for a CLI tool
          - Keep heuristics simple and tunable. False positives are OK (integration agent validates).
        files:
          - "pkg/protocol/integration_heuristics.go"
          - "pkg/protocol/integration_heuristics_test.go"

      - id: "C"
        task: |
          ## What to Implement

          Create `cmd/saw/validate_integration.go` — a new CLI subcommand for `sawtools`.

          Usage: `sawtools validate-integration <manifest-path> --wave N [--repo-dir PATH]`

          This command loads the IMPL manifest, calls `protocol.ValidateIntegration()`,
          prints the report as JSON, and exits with code 1 if gaps are found.

          ## Interfaces to Call

          ```go
          protocol.ValidateIntegration(manifest *protocol.IMPLManifest, waveNum int, repoPath string) (*protocol.IntegrationReport, error)
          protocol.Load(path string) (*protocol.IMPLManifest, error)
          protocol.AppendIntegrationReport(manifestPath, waveKey string, report *protocol.IntegrationReport) error
          ```

          ## What to Implement

          ```go
          func newValidateIntegrationCmd() *cobra.Command
          ```

          The command should:
          1. Load the manifest from the positional arg
          2. Call ValidateIntegration with the --wave flag and --repo-dir (defaulting to cwd)
          3. Call AppendIntegrationReport to persist the report
          4. Print the report as indented JSON to stdout
          5. Exit 0 if report.Valid, exit 1 if gaps found

          Register the command in cmd/saw/root.go (add to rootCmd in the init or main).

          Also create a test file with a basic test that the command parses flags correctly.

          ## Tests to Write

          1. TestValidateIntegrationCmd_FlagParsing — verifies --wave and --repo-dir flags exist

          ## Verification Gate

          ```bash
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          go test ./cmd/saw/ -run TestValidateIntegration -v
          ```

          ## Constraints

          - Follow the pattern of `cmd/saw/finalize_wave.go` for command structure
          - Register in root.go by adding to the rootCmd.AddCommand list
          - Use `json.MarshalIndent` for output (same as other commands)
          - The --repo-dir flag should default to the `repoDir` package variable (same as finalize-wave)
        files:
          - "cmd/saw/validate_integration.go"
          - "cmd/saw/validate_integration_test.go"

  - number: 2
    agents:
      - id: "D"
        task: |
          ## What to Implement

          Modify `pkg/engine/finalize.go` to add integration validation (E25) as a new step
          in the FinalizeWave pipeline, between RunGates (E21) and MergeAgents.

          The new pipeline order:
          1. VerifyCommits (I5)
          2. ScanStubs (E20)
          3. RunGates (E21)
          4. **ValidateIntegration (E25) — NEW**
          5. MergeAgents
          6. VerifyBuild
          7. Cleanup

          ## Changes to FinalizeWaveResult

          Add a new field to FinalizeWaveResult:
          ```go
          IntegrationReport *protocol.IntegrationReport `json:"integration_report,omitempty"`
          ```

          ## Changes to FinalizeWave function

          After the RunGates step (step 3) and before MergeAgents (step 4), add:
          ```go
          // Step 3.5: ValidateIntegration (E25)
          integrationReport, err := protocol.ValidateIntegration(manifest, opts.WaveNum, opts.RepoPath)
          if err != nil {
              // Non-fatal: integration validation errors don't block the pipeline
              fmt.Fprintf(os.Stderr, "engine.FinalizeWave: validate-integration: %v\n", err)
          } else {
              result.IntegrationReport = integrationReport
              // Persist to manifest
              waveKey := fmt.Sprintf("wave%d", opts.WaveNum)
              _ = protocol.AppendIntegrationReport(opts.IMPLPath, waveKey, integrationReport)
          }
          ```

          Integration validation is INFORMATIONAL in this step — it does not block merge.
          The integration agent runner (Wave 2 Agent E) will act on gaps if present.

          ## Tests to Write

          1. TestFinalizeWave_IntegrationStep — verify integration report is populated in result
          2. TestFinalizeWave_IntegrationError_NonFatal — verify pipeline continues on validation error

          ## Verification Gate

          ```bash
          go build ./pkg/engine/...
          go vet ./pkg/engine/...
          go test ./pkg/engine/ -run TestFinalizeWave -v
          ```

          ## Constraints

          - Integration validation is non-fatal (informational only, like stub scanning)
          - Do NOT change the existing step numbering in comments — add as "Step 3.5"
          - The integration report is persisted via AppendIntegrationReport (same pattern as AppendStubReport)
          - Import `protocol` package (already imported in finalize.go)
        files:
          - "pkg/engine/finalize.go"
          - "pkg/engine/finalize_test.go"
        dependencies:
          - "A"

      - id: "E"
        task: |
          ## What to Implement

          Create `pkg/engine/integration_runner.go` — the integration agent runner (E26).
          This launches an LLM agent after wave implementation agents complete to wire
          integration gaps into caller files.

          ## Interfaces to Implement

          ```go
          type RunIntegrationAgentOpts struct {
              IMPLPath   string
              RepoPath   string
              WaveNum    int
              Report     *protocol.IntegrationReport
              Model      string   // optional model override
          }

          // RunIntegrationAgent launches an LLM agent to wire integration gaps.
          // The agent reads the IntegrationReport, reads completion reports, and
          // modifies integration_connectors files to wire exports into callers.
          // Works with ALL backends (Bedrock, API, CLI) via orchestrator.NewBackendFromModel.
          func RunIntegrationAgent(ctx context.Context, opts RunIntegrationAgentOpts, onEvent func(Event)) error
          ```

          ## Algorithm

          1. Load the IMPL manifest to get integration_connectors
          2. Build the integration agent prompt:
             - System prompt: "You are an Integration Agent. Your job is to wire newly
               exported functions/types into caller files."
             - Include: the IntegrationReport as JSON (gaps to fix)
             - Include: list of integration_connectors files (allowed to modify)
             - Include: completion reports for context on what was implemented
             - Include: verification gate command (go build ./...)
          3. Build constraints for "integrator" role (call buildIntegratorConstraints from constraints.go)
          4. Create backend via orchestrator.NewBackendFromModel(opts.Model)
          5. Create agent.Runner and execute with streaming
          6. Publish events: integration_agent_started, integration_agent_output,
             integration_agent_complete, integration_agent_failed
          7. After execution, auto-commit changes (same pattern as autoCommitWorktree in orchestrator.go)

          The integration agent runs in the MAIN repo directory (not a worktree) because
          it needs to see the merged result of all wave agents. It only writes to
          integration_connectors files.

          ## Tests to Write

          1. TestRunIntegrationAgent_NoGaps — returns immediately when report has no gaps
          2. TestRunIntegrationAgent_PublishesEvents — verify start/complete events emitted
          3. TestRunIntegrationAgent_OptsValidation — error on missing required fields

          ## Verification Gate

          ```bash
          go build ./pkg/engine/...
          go vet ./pkg/engine/...
          go test ./pkg/engine/ -run TestRunIntegrationAgent -v
          ```

          ## Constraints

          - Do NOT create a worktree — integration agent runs on main branch after merge
          - Use orchestrator.NewBackendFromModel for backend creation (supports all providers)
          - Use agent.NewRunner for execution (same as RunScaffold pattern in runner.go)
          - The integration agent prompt should be self-contained: include all gaps as JSON
          - Constraint role is "integrator" (not "wave" or "scaffold")
          - If Report.Valid is true (no gaps), return immediately without launching agent
        files:
          - "pkg/engine/integration_runner.go"
          - "pkg/engine/integration_runner_test.go"
        dependencies:
          - "A"
          - "B"

      - id: "F"
        task: |
          ## What to Implement

          Modify `pkg/engine/constraints.go` to add the "integrator" constraint role.

          ## Changes to buildConstraints

          Add a new case to the switch statement in buildConstraints:

          ```go
          case "integrator":
              // Integration agent: may only write to integration_connectors files.
              // No OwnedFiles (doesn't own implementation files).
              // No FrozenPaths enforcement (needs to read everything).
              // TrackCommits = true (for audit trail).
              prefixes := make([]string, 0)
