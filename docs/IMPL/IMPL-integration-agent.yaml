scaffolds:
  - file_path: "pkg/protocol/integration_types.go"
    contents: |
      package protocol

      // IntegrationGap represents a detected unconnected export.
      type IntegrationGap struct {
          ExportName    string   `json:"export_name" yaml:"export_name"`
          FilePath      string   `json:"file_path" yaml:"file_path"`
          AgentID       string   `json:"agent_id" yaml:"agent_id"`
          Category      string   `json:"category" yaml:"category"`           // "function_call", "type_usage", "field_init"
          Severity      string   `json:"severity" yaml:"severity"`           // "error", "warning", "info"
          Reason        string   `json:"reason" yaml:"reason"`
          SuggestedFix  string   `json:"suggested_fix" yaml:"suggested_fix"`
          SearchResults []string `json:"search_results" yaml:"search_results"` // files that might need to call it
      }

      // IntegrationReport summarizes all integration gaps for a wave.
      type IntegrationReport struct {
          Wave    int              `json:"wave" yaml:"wave"`
          Gaps    []IntegrationGap `json:"gaps" yaml:"gaps"`
          Valid   bool             `json:"valid" yaml:"valid"`
          Summary string           `json:"summary" yaml:"summary"`
      }

      // IntegrationConnector defines a file that the integration agent is allowed to modify.
      // These are caller files (orchestrator.go, main.go, server.go) that need wiring.
      type IntegrationConnector struct {
          File   string `json:"file" yaml:"file"`
          Reason string `json:"reason" yaml:"reason"`
      }
    import_path: "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
    status: "committed (ab171ee)"

interface_contracts:
  - name: IntegrationGap
    description: |
      Represents a detected unconnected export. Used by ValidateIntegration
      and consumed by the integration agent runner.
    definition: |
      type IntegrationGap struct {
          ExportName    string   `json:"export_name" yaml:"export_name"`
          FilePath      string   `json:"file_path" yaml:"file_path"`
          AgentID       string   `json:"agent_id" yaml:"agent_id"`
          Category      string   `json:"category" yaml:"category"`
          Severity      string   `json:"severity" yaml:"severity"`
          Reason        string   `json:"reason" yaml:"reason"`
          SuggestedFix  string   `json:"suggested_fix" yaml:"suggested_fix"`
          SearchResults []string `json:"search_results" yaml:"search_results"`
      }
    location: "pkg/protocol/integration_types.go"

  - name: IntegrationReport
    description: |
      Summarizes all integration gaps for a wave. Returned by ValidateIntegration,
      persisted to IMPL manifest, consumed by integration agent runner.
    definition: |
      type IntegrationReport struct {
          Wave    int              `json:"wave" yaml:"wave"`
          Gaps    []IntegrationGap `json:"gaps" yaml:"gaps"`
          Valid   bool             `json:"valid" yaml:"valid"`
          Summary string           `json:"summary" yaml:"summary"`
      }
    location: "pkg/protocol/integration_types.go"

  - name: IntegrationConnector
    description: |
      Defines a file the integration agent is allowed to modify.
      Listed in IMPL manifest integration_connectors field.
    definition: |
      type IntegrationConnector struct {
          File   string `json:"file" yaml:"file"`
          Reason string `json:"reason" yaml:"reason"`
      }
    location: "pkg/protocol/integration_types.go"

  - name: ValidateIntegration
    description: |
      Scans completed wave for unconnected exports using Go AST analysis.
      Returns an IntegrationReport with gaps classified by severity.
    definition: |
      func ValidateIntegration(manifest *IMPLManifest, waveNum int, repoPath string) (*IntegrationReport, error)
    location: "pkg/protocol/integration.go"

  - name: IsIntegrationRequired
    description: |
      Heuristic classifier: determines if an exported symbol likely needs
      integration wiring based on naming patterns (Build*, New*, Register*, etc).
    definition: |
      func IsIntegrationRequired(exportName string, category string) bool
    location: "pkg/protocol/integration_heuristics.go"

  - name: ClassifyExport
    description: |
      Classifies an exported symbol into a category (function_call, type_usage, field_init).
    definition: |
      func ClassifyExport(exportName string, kind string) string
    location: "pkg/protocol/integration_heuristics.go"

  - name: SuggestCallers
    description: |
      Searches the codebase for files that likely need to call/use the given export.
      Uses import graph and naming heuristics.
    definition: |
      func SuggestCallers(repoPath string, exportPkg string, exportName string) ([]string, error)
    location: "pkg/protocol/integration_heuristics.go"

  - name: RunIntegrationAgent
    description: |
      Launches an LLM agent to wire integration gaps after wave agents complete.
      Reads the IntegrationReport, reads completion reports, and modifies
      integration_connectors files to wire exports into callers.
    definition: |
      func RunIntegrationAgent(ctx context.Context, opts RunIntegrationAgentOpts, onEvent func(Event)) error
    location: "pkg/engine/integration_runner.go"

  - name: RunIntegrationAgentOpts
    description: |
      Configuration for the integration agent runner.
    definition: |
      type RunIntegrationAgentOpts struct {
          IMPLPath   string              // absolute path to IMPL manifest
          RepoPath   string              // absolute path to the target repository
          WaveNum    int                 // wave number that was just completed
          Report     *protocol.IntegrationReport // gaps to fix
          Model      string              // optional model override
      }
    location: "pkg/engine/integration_runner.go"

  - name: buildIntegratorConstraints
    description: |
      Builds constraints for the integrator role. The integrator may only write to
      files listed in integration_connectors. It cannot write to agent-owned files
      or scaffold files.
    definition: |
      func buildIntegratorConstraints(manifest *protocol.IMPLManifest, connectors []protocol.IntegrationConnector) *tools.Constraints
    location: "pkg/engine/constraints.go"

