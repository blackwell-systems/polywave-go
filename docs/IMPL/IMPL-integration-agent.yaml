pre_mortem:
  overall_risk: "medium"
  rows:
    - scenario: "Go AST parsing fails on non-standard Go files or generated code"
      likelihood: "medium"
      impact: "low"
      mitigation: "ValidateIntegration skips files that fail to parse. Non-fatal by design."

    - scenario: "Integration agent modifies files incorrectly, breaking the build"
      likelihood: "medium"
      impact: "medium"
      mitigation: "Integration agent must pass go build ./... before committing. Build failure = no commit."

    - scenario: "False positive integration gaps overwhelm the integration agent"
      likelihood: "medium"
      impact: "low"
      mitigation: "IsIntegrationRequired heuristics are conservative. Agent can skip low-severity gaps."

    - scenario: "Integration agent timeout on large codebases with many gaps"
      likelihood: "low"
      impact: "medium"
      mitigation: "Same 30-minute timeout as wave agents. Gaps are prioritized by severity."

    - scenario: "Cross-repo protocol text changes conflict with concurrent protocol work"
      likelihood: "low"
      impact: "medium"
      mitigation: "Wave 4 is protocol-only, runs last. Check for concurrent PRs before merging."

    - scenario: "Web app wave_runner.go changes not included — integration agent never runs in web UI"
      likelihood: "low"
      impact: "high"
      mitigation: "Agent H wires into engine runner.go StartWave which the web app calls via runWaveLoop. No separate web changes needed — engine layer is the integration point."

