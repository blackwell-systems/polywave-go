waves:
  - number: 1
    agents:
      - id: A
        task: |
          **Goal:** Implement worktree creation SDK function that creates all worktrees for a wave in one call.

          **Signature (binding contract):**
          ```go
          type WorktreeInfo struct {
              Agent    string `json:"agent"`
              Path     string `json:"path"`
              Branch   string `json:"branch"`
          }
          type CreateWorktreesResult struct {
              Worktrees []WorktreeInfo `json:"worktrees"`
          }
          func CreateWorktrees(manifestPath string, waveNum int, repoDir string) (*CreateWorktreesResult, error)
          ```

          **Implementation:**
          - Load manifest via protocol.Load(manifestPath)
          - Find wave by waveNum; return error if not found
          - For each agent in wave:
            - Construct worktree path: `{repoDir}/.claude/worktrees/wave{N}-agent-{ID}`
            - Construct branch name: `wave{N}-agent-{ID}`
            - Call internal/git.WorktreeAdd(repoDir, path, branch)
            - Collect WorktreeInfo{Agent: ID, Path: path, Branch: branch}
          - Return CreateWorktreesResult with all worktrees
          - If any WorktreeAdd fails, return error immediately (no partial creation)

          **Test coverage:**
          - Happy path: 3-agent wave creates 3 worktrees, returns 3 WorktreeInfo entries
          - Wave not found: returns error
          - Git worktree add failure: returns error

          **Files:** pkg/protocol/worktree.go, pkg/protocol/worktree_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestCreateWorktrees
          ```
        files:
          - pkg/protocol/worktree.go
          - pkg/protocol/worktree_test.go
        dependencies: []

      - id: B
        task: |
          **Goal:** Implement commit verification SDK function (I5 trip wire) that checks each agent branch has commits.

          **Signature (binding contract):**
          ```go
          type CommitStatus struct {
              Agent       string `json:"agent"`
              Branch      string `json:"branch"`
              CommitCount int    `json:"commit_count"`
              HasCommits  bool   `json:"has_commits"`
          }
          type VerifyCommitsResult struct {
              BaseCommit string         `json:"base_commit"`
              Agents     []CommitStatus `json:"agents"`
              AllValid   bool           `json:"all_valid"`
          }
          func VerifyCommits(manifestPath string, waveNum int, repoDir string) (*VerifyCommitsResult, error)
          ```

          **Implementation:**
          - Get base commit: internal/git.RevParse(repoDir, "HEAD")
          - Load manifest, find wave by waveNum
          - For each agent in wave:
            - Branch name: `wave{N}-agent-{ID}`
            - Count commits: git rev-list {base}..{branch} --count via internal/git
            - Build CommitStatus{Agent: ID, Branch: branch, CommitCount: count, HasCommits: count > 0}
          - Set AllValid = true if all agents have HasCommits == true
          - Return VerifyCommitsResult

          **Test coverage:**
          - All agents have commits: AllValid == true
          - One agent has 0 commits: AllValid == false
          - Branch does not exist: treat as 0 commits (HasCommits == false)

          **Files:** pkg/protocol/commit_verify.go, pkg/protocol/commit_verify_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestVerifyCommits
          ```
        files:
          - pkg/protocol/commit_verify.go
          - pkg/protocol/commit_verify_test.go
        dependencies: []

      - id: C
        task: |
          **Goal:** Implement E20 stub scan SDK function by wrapping scan-stubs.sh bash script.

          **Signature (binding contract):**
          ```go
          type StubHit struct {
              File    string `json:"file"`
              Line    int    `json:"line"`
              Pattern string `json:"pattern"`
              Context string `json:"context"`
          }
          type ScanStubsResult struct {
              Hits []StubHit `json:"hits"`
          }
          func ScanStubs(files []string) (*ScanStubsResult, error)
          ```

          **Implementation:**
          - Follow pkg/orchestrator/stubs.go pattern: use exec.Command to run bash script
          - Locate script: $SAW_REPO/implementations/claude-code/scripts/scan-stubs.sh (fallback: ~/code/scout-and-wave/...)
          - Run: `bash {scriptPath} {file1} {file2} ...`
          - Parse stdout (markdown table format) into []StubHit
          - If script not found or exit error, return empty Hits (E20: informational only, never blocks)

          **Test coverage:**
          - Script found, no stubs: returns empty Hits
          - Script found, has stubs: parses table into StubHit slice
          - Script not found: returns empty Hits, no error

          **Files:** pkg/protocol/stubs.go, pkg/protocol/stubs_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestScanStubs
          ```
        files:
          - pkg/protocol/stubs.go
          - pkg/protocol/stubs_test.go
        dependencies: []

      - id: D
        task: |
          **Goal:** Implement merge agents SDK function that performs git merge --no-ff for all agents in a wave.

          **Signature (binding contract):**
          ```go
          type MergeStatus struct {
              Agent   string `json:"agent"`
              Branch  string `json:"branch"`
              Success bool   `json:"success"`
              Error   string `json:"error,omitempty"`
          }
          type MergeAgentsResult struct {
              Wave    int           `json:"wave"`
              Merges  []MergeStatus `json:"merges"`
              Success bool          `json:"success"`
          }
          func MergeAgents(manifestPath string, waveNum int, repoDir string) (*MergeAgentsResult, error)
          ```

          **Implementation:**
          - Load manifest, find wave by waveNum
          - For each agent in wave:
            - Branch: `wave{N}-agent-{ID}`
            - Message: `Merge wave{N}-agent-{ID}: {agent task summary}`
            - Call internal/git.MergeNoFF(repoDir, branch, message)
            - Build MergeStatus{Agent: ID, Branch: branch, Success: err == nil, Error: err.Error() if err}
          - Set Success = true only if ALL merges succeeded
          - Return MergeAgentsResult
          - Stop on first conflict: if any merge fails, return immediately with partial result

          **Test coverage:**
          - All merges succeed: Success == true
          - One merge fails (conflict): Success == false, Error field populated
          - Wave not found: returns error

          **Files:** pkg/protocol/merge_agents.go, pkg/protocol/merge_agents_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestMergeAgents
          ```
        files:
          - pkg/protocol/merge_agents.go
          - pkg/protocol/merge_agents_test.go
        dependencies: []

      - id: E
        task: |
          **Goal:** Implement worktree cleanup SDK function that removes worktrees and deletes branches.

          **Signature (binding contract):**
          ```go
          type CleanupStatus struct {
              Agent            string `json:"agent"`
              WorktreeRemoved  bool   `json:"worktree_removed"`
              BranchDeleted    bool   `json:"branch_deleted"`
          }
          type CleanupResult struct {
              Wave    int             `json:"wave"`
              Agents  []CleanupStatus `json:"agents"`
          }
          func Cleanup(manifestPath string, waveNum int, repoDir string) (*CleanupResult, error)
          ```

          **Implementation:**
          - Load manifest, find wave by waveNum
          - For each agent in wave:
            - Worktree path: `{repoDir}/.claude/worktrees/wave{N}-agent-{ID}`
            - Branch: `wave{N}-agent-{ID}`
            - Call internal/git.WorktreeRemove(repoDir, path)
            - Call internal/git.DeleteBranch(repoDir, branch)
            - Build CleanupStatus{Agent: ID, WorktreeRemoved: err == nil, BranchDeleted: err == nil}
          - Return CleanupResult with all statuses
          - Non-fatal: if worktree/branch already gone, mark as removed/deleted (success)

          **Test coverage:**
          - All worktrees/branches removed: all statuses true
          - Worktree already removed: WorktreeRemoved == true (idempotent)
          - Wave not found: returns error

          **Files:** pkg/protocol/cleanup.go, pkg/protocol/cleanup_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestCleanup
          ```
        files:
          - pkg/protocol/cleanup.go
          - pkg/protocol/cleanup_test.go
        dependencies: []

      - id: F
        task: |
          **Goal:** Implement post-merge build verification SDK function that runs test_command and lint_command from manifest.

          **Signature (binding contract):**
          ```go
          type VerifyBuildResult struct {
              TestCommand  string `json:"test_command"`
              LintCommand  string `json:"lint_command"`
              TestPassed   bool   `json:"test_passed"`
              LintPassed   bool   `json:"lint_passed"`
              TestOutput   string `json:"test_output,omitempty"`
              LintOutput   string `json:"lint_output,omitempty"`
          }
          func VerifyBuild(manifestPath string, repoDir string) (*VerifyBuildResult, error)
          ```

          **Implementation:**
          - Load manifest via protocol.Load(manifestPath)
          - Get test_command and lint_command from manifest
          - Run test command: exec.Command("bash", "-c", test_command) with Dir = repoDir
          - Run lint command: exec.Command("bash", "-c", lint_command) with Dir = repoDir
          - Capture stdout+stderr for both
          - Set TestPassed = (test exit code == 0), LintPassed = (lint exit code == 0)
          - Return VerifyBuildResult
          - If either command empty, skip and mark as passed

          **Test coverage:**
          - Both commands pass: TestPassed == true, LintPassed == true
          - Test fails: TestPassed == false, captures output
          - Lint command empty: LintPassed == true

          **Files:** pkg/protocol/verify_build.go, pkg/protocol/verify_build_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestVerifyBuild
          ```
        files:
          - pkg/protocol/verify_build.go
          - pkg/protocol/verify_build_test.go
        dependencies: []

      - id: G
        task: |
          **Goal:** Implement IMPL status update SDK function that sets agent/wave status in manifest.

          **Signature (binding contract):**
          ```go
          type UpdateStatusResult struct {
              Wave        int      `json:"wave"`
              Agent       string   `json:"agent"`
              OldStatus   string   `json:"old_status"`
              NewStatus   string   `json:"new_status"`
              Updated     bool     `json:"updated"`
          }
          func UpdateStatus(manifestPath string, waveNum int, agentID string, status string) (*UpdateStatusResult, error)
          ```

          **Implementation:**
          - Load manifest via protocol.Load(manifestPath)
          - Find wave by waveNum, find agent by agentID
          - Get current completion report status (if exists)
          - Update manifest.CompletionReports[agentID].Status = status
          - Save manifest via protocol.Save(manifest, manifestPath)
          - Return UpdateStatusResult{Wave: waveNum, Agent: agentID, OldStatus: old, NewStatus: status, Updated: true}
          - If agent not found in wave, return error

          **Test coverage:**
          - Agent exists, status changes: Updated == true
          - Agent not found: returns error
          - Status already set: OldStatus == NewStatus, Updated == true

          **Files:** pkg/protocol/status_update.go, pkg/protocol/status_update_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestUpdateStatus
          ```
        files:
          - pkg/protocol/status_update.go
          - pkg/protocol/status_update_test.go
        dependencies: []

      - id: H
        task: |
          **Goal:** Implement E18 project memory update SDK function that appends to docs/CONTEXT.md.

          **Signature (binding contract):**
          ```go
          type UpdateContextResult struct {
              ContextPath string   `json:"context_path"`
              Updated     bool     `json:"updated"`
              NewEntries  []string `json:"new_entries"`
          }
          func UpdateContext(manifestPath string, projectRoot string) (*UpdateContextResult, error)
          ```

          **Implementation:**
          - Load manifest to get feature_slug, waves count, agent count
          - Context file: {projectRoot}/docs/CONTEXT.md
          - Read existing CONTEXT.md (create if missing)
          - Append entry per E18 schema: feature slug, completion timestamp, wave/agent counts
          - Return UpdateContextResult{ContextPath: path, Updated: true, NewEntries: [slug]}
          - Non-fatal if CONTEXT.md write fails: return error but don't block

          **Test coverage:**
          - CONTEXT.md exists: appends entry
          - CONTEXT.md missing: creates file, appends entry
          - projectRoot invalid: returns error

          **Files:** pkg/protocol/context_update.go, pkg/protocol/context_update_test.go

          **Verification gate:**
          ```bash
          go build ./pkg/protocol
          go vet ./pkg/protocol
          go test ./pkg/protocol -run TestUpdateContext
          ```
        files:
          - pkg/protocol/context_update.go
          - pkg/protocol/context_update_test.go
        dependencies: []

      - id: I
        task: |
          **Goal:** Implement IMPL doc discovery SDK function that lists all IMPL docs with current state.

          **Signature (binding contract):**
          ```go
          type IMPLSummary struct {
              Path        string `json:"path"`
              FeatureSlug string `json:"feature_slug"`
              Verdict     string `json:"verdict"`
              CurrentWave int    `json:"current_wave"`
              TotalWaves  int    `json:"total_waves"`
          }
          type ListIMPLsResult struct {
              IMPLs []IMPLSummary `json:"impls"`
          }
          func ListIMPLs(dir string) (*ListIMPLsResult, error)
          ```

          **Implementation:**
          - Glob for {dir}/IMPL-*.yaml and {dir}/IMPL-*.yml (YAML manifests)
          - For each manifest path:
            - Load via protocol.Load(path)
            - Compute CurrentWave via protocol.CurrentWave(manifest)
