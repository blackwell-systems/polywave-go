title: "Orchestration Loop CLI — Close All Ad-Hoc Gaps"
feature_slug: orchestration-loop-cli
verdict: SUITABLE
test_command: "go test ./..."
lint_command: "go vet ./..."

suitability_assessment: |
  Verdict: SUITABLE

  File decomposition: The work spans 12 distinct SDK functions across pkg/protocol/ and pkg/engine/, plus 12 CLI command wrappers in cmd/saw/. Each gap (worktree creation, commit verification, merge execution, etc.) can be assigned to a separate agent with disjoint file ownership.

  Investigation-first items: None. All operations are already performed as ad-hoc bash commands in the orchestrator skill — the task is to formalize them as SDK functions and CLI commands following established patterns (pkg/protocol/manifest.go, cmd/saw/validate.go).

  Interface discoverability: All cross-agent interfaces are known: SDK functions return JSON-serializable structs for CLI output, CLI commands follow the existing pattern (flag parsing → SDK call → JSON output → exit code). No upstream-dependent interfaces.

  Pre-implementation status: Phase 1 delivered 13 CLI commands (validate, extract-context, set-completion, etc.). This feature completes the orchestration loop with the remaining 12 gaps. No overlap with existing commands.

  Parallelization value: High. 12 agents working on independent SDK functions and CLI commands. Each agent owns 1-2 files. Build/test cycle for Go is ~15-20s per package. Full parallelization saves ~20-25 minutes vs. sequential (12 agents × 2 min avg vs. 2 waves × 6 agents × 2 min).

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./...
      required: true

scaffolds: []

pre_mortem:
  overall_risk: medium
  rows:
    - scenario: "Cross-repo worktree coordination (gap 11) requires --repo-dir flag threading through all worktree operations, but existing internal/git/ commands don't accept repo paths — they use cwd"
      likelihood: high
      impact: medium
      mitigation: "Agent K extends internal/git/commands.go with Run() variants that accept repoPath parameter. All new worktree operations use these variants. Existing commands unchanged."
    - scenario: "saw run-wave (gap 10) composes all other commands but those commands aren't committed yet — circular dependency across waves"
      likelihood: medium
      impact: high
      mitigation: "Wave 1 delivers all atomic SDK functions (worktree create, merge, verify, etc.). Wave 2 delivers CLI wrappers for each. Wave 3 delivers saw run-wave which calls SDK functions directly (not via CLI). No circular dependency."
    - scenario: "E20 stub scan (gap 3) currently shells out to bash script; moving to Go requires reimplementing regex patterns or shelling out from Go CLI"
      likelihood: low
      impact: low
      mitigation: "Agent C wraps the bash script via exec.Command (same as pkg/orchestrator/stubs.go pattern). Pure Go rewrite is out of scope for this wave."

