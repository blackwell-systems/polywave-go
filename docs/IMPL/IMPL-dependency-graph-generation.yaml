title: 'H3: Automated Dependency Graph Generation (Go parser)'
feature_slug: dependency-graph-generation
verdict: SUITABLE
suitability_assessment: |
    ## Suitability Assessment

    **File decomposition:** YES (5 distinct implementation units with disjoint file ownership)
    - CLI command handler (cobra command setup in cmd/saw/)
    - Go AST parser (import extraction, file scanning)
    - Dependency graph builder (topological sort, cycle detection, wave assignment)
    - Output formatter (YAML/JSON serialization to roadmap spec)
    - Test suite with Go project fixtures

    **Investigation-first items:** NO — Requirements fully specified in determinism-roadmap.md.
    Go's `go/parser` and `go/ast` packages are stdlib with stable APIs. Roadmap includes
    complete output format spec, wave assignment algorithm (topological sort depth), and edge case handling.

    **Interface discoverability:** YES — All cross-agent interfaces definable upfront:
    - `DepGraph` struct (nodes with file path, depends_on, depended_by, wave_candidate)
    - `Analyzer` interface (ParseFile, ExtractImports, BuildGraph methods)
    - `Output` structs matching roadmap YAML schema (nodes, waves, cascade_candidates)
    - Existing `pkg/solver/graph.go` provides cycle detection utilities (DetectCycles, CriticalPath)

    **Pre-implementation status:** TO-DO. No `analyze-deps` command exists. `pkg/solver/graph.go`
    has agent-level graph utilities (operates on protocol DepNode), but H3 needs file-level
    AST analysis (new `pkg/analyzer` package). Zero overlap — both packages needed.

    **Parallelization value:** HIGH. Multiple independent units:
    - AST parser agent (complex: recursively extract imports from `go/ast.File`)
    - Graph builder agent (complex: topological sort, handle stdlib vs local imports)
    - CLI command agent (simple: cobra integration, flag parsing)
    - Output formatter agent (simple: struct → YAML with roadmap schema)
    - Test fixture agent (moderate: 3-5 sample Go projects with known dependency patterns)
    Build/test cycle ~5-10 seconds per module. Parallelization saves 15-20 minutes over sequential.

    **Estimated times:**
    - Scout: 8 min (read 5 files, define contracts, assign waves)
    - Agent execution: 25 min (5 agents × 6 min avg, 3 parallel in wave 1)
    - Merge: 3 min
    Total SAW time: 36 min
    Sequential baseline: 55 min (5 agents × 11 min avg sequential)
    Time savings: 19 min (34% faster)

    **Recommendation:** Clear speedup. Core agents (parser, graph builder) are complex enough
    to benefit from parallel isolation. Proceed with SAW.

    ---

    ## Pre-Implementation Scan Results
    - Total items: 1 CLI tool (analyze-deps)
    - Already implemented: 0 items
    - Partially implemented: 0 items (solver/graph.go is orthogonal - agent-level deps, not file-level AST)
    - To-do: 1 item

    Agent adjustments: None. All agents proceed as planned (full implementation).

    Estimated time saved: N/A (no duplicate work avoided)
