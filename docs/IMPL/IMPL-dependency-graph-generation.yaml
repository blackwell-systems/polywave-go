      location: pkg/analyzer/types.go
    - name: Analyzer
      description: Go source file analyzer interface
      definition: |
        type Analyzer interface {
            // ParseFile parses a Go source file and returns its AST.
            // Returns error if file cannot be read or contains syntax errors.
