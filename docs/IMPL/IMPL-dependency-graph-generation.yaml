            ```go
            // pkg/analyzer/graph.go

            package analyzer

            import (
                "fmt"
                "sort"
            )

            // BuildGraph constructs a file-level dependency graph for the given files.
            // Algorithm:
            // 1. Parse each file, extract imports (using Analyzer from Agent B)
            // 2. Build adjacency map: file -> deps (local imports only)
            // 3. Detect cycles using DFS (reuse pkg/solver/graph.go pattern)
            // 4. Compute topological sort depth: files with no deps = depth 0, files depending on depth N = depth N+1
            // 5. Assign waves: wave N = all files at depth N
            // 6. Detect cascade candidates: scan repoRoot for .go files importing modified files but not in files list
            func BuildGraph(repoRoot string, files []string) (*DepGraph, error) {
                analyzer := New()  // from Agent B

                // Step 1: Parse all files and extract imports
                fileImports := make(map[string][]string)
                for _, f := range files {
                    ast, err := analyzer.ParseFile(f)
                    if err != nil {
                        return nil, fmt.Errorf("parse %s: %w", f, err)
                    }
                    imports, err := analyzer.ExtractImports(ast, repoRoot)
                    if err != nil {
                        return nil, fmt.Errorf("extract imports %s: %w", f, err)
                    }
                    fileImports[f] = imports
                }

                // Step 2: Build adjacency map and reverse map
                adj := make(map[string][]string)
                revAdj := make(map[string][]string)
                for file, imports := range fileImports {
                    adj[file] = imports
                    for _, imp := range imports {
                        revAdj[imp] = append(revAdj[imp], file)
                    }
                }

                // Step 3: Detect cycles
                if cycles := detectCycles(adj); cycles != nil {
                    return nil, fmt.Errorf("circular dependency detected: %v", cycles[0])
                }

                // Step 4: Topological sort depth (Kahn's algorithm)
                depth := computeDepth(adj)

                // Step 5: Assign waves
                waves := assignWaves(depth)

                // Step 6: Detect cascade candidates
                cascades := detectCascades(repoRoot, files, revAdj)

                // Step 7: Build DepGraph
                nodes := make([]FileNode, 0, len(files))
                for _, f := range files {
                    nodes = append(nodes, FileNode{
                        File:          f,
                        DependsOn:     adj[f],
                        DependedBy:    revAdj[f],
                        WaveCandidate: depth[f],
                    })
                }

                return &DepGraph{
                    Nodes:             nodes,
                    Waves:             waves,
                    CascadeCandidates: cascades,
                }, nil
            }

