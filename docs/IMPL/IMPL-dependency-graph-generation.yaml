              --format yaml

            # Unit tests
            go test ./cmd/saw -run TestAnalyzeDepsCmd -v
            ```

            ## Constraints
            - Use existing cobra command pattern from cmd/saw/validate_cmd.go
            - Exit code 0 on success, 1 on error (standard Go CLI convention)
            - Add command to main.go via `rootCmd.AddCommand(newAnalyzeDepsCmd())`
            - Print output to stdout, errors to stderr
            - Files flag: accept absolute or relative paths (resolve relative to repo-root arg)
            - Format flag: default to "yaml", validate only "yaml" or "json" accepted
