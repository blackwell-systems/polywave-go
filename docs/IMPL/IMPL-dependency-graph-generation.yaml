            ## What to Implement
            Define core data structures for file-level dependency graphs in Go. These types
            represent the output of the AST analyzer and are consumed by the graph builder
            and CLI formatter.

            ## Interfaces to Implement
            ```go
            // pkg/analyzer/types.go

            package analyzer

            // DepGraph represents the file-level dependency graph with wave assignments.
            // Nodes are files; edges are import dependencies; wave assignments come from
            // topological sort depth (files with no deps = wave 1).
            type DepGraph struct {
                Nodes             []FileNode
                Waves             map[int][]string  // wave number -> file paths
                CascadeCandidates []CascadeFile
            }

            // FileNode represents a single Go source file in the dependency graph.
            type FileNode struct {
                File          string   // Absolute path to .go file
                DependsOn     []string // Files this file imports (local packages only)
                DependedBy    []string // Files that import this file
                WaveCandidate int      // Topological depth (0 = no deps, 1+ = depends on wave N-1)
            }

            // CascadeFile represents a file not being modified but imports modified files.
            // These are semantic cascade candidates (not in agent file ownership, but may
            // break if interface contracts change).
            type CascadeFile struct {
                File   string // Absolute path
                Reason string // Human-readable explanation
                Type   string // "semantic" (imports modified file but not in ownership table)
            }
            ```

            ## Tests to Write
            1. TestDepGraph_EmptyGraph — zero nodes, empty waves map, no cascades
            2. TestFileNode_ZeroFields — verify zero-value struct behavior
            3. TestCascadeFile_TypeValidation — ensure Type field is "semantic" or empty

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/analyzer
            go vet ./pkg/analyzer
            go test ./pkg/analyzer -run TestDepGraph -v
            go test ./pkg/analyzer -run TestFileNode -v
            go test ./pkg/analyzer -run TestCascadeFile -v
            ```

            ## Constraints
            - Use absolute file paths in FileNode.File and CascadeFile.File (relative paths break cross-module imports)
            - WaveCandidate is 0-indexed (0 = no deps, 1 = depends on wave 0 files)
            - DependsOn and DependedBy lists must be sorted alphabetically for determinism
            - Type field in CascadeFile: only "semantic" in Phase 1 (syntax cascades deferred to Phase 2)
            - Do NOT import pkg/protocol or pkg/solver — analyzer is standalone
