            1. TestAnalyzeDepsCmd_SimpleFixture — run command on testdata/simple, verify YAML output matches expected
            2. TestAnalyzeDepsCmd_JSONFormat — run with --format=json, verify JSON structure
            3. TestAnalyzeDepsCmd_CycleError — run on testdata/cycle, expect error exit code and cycle message
            4. TestAnalyzeDepsCmd_MissingFilesFlag — run without --files, expect error
            5. TestAnalyzeDepsCmd_InvalidFormat — run with --format=xml, expect error

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build -o sawtools ./cmd/saw
