pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A removes `fmt` from detect.go imports after replacing fmt.Sscanf, but
            fmt is still used in multiple fmt.Errorf/fmt.Sprintf calls throughout detect.go.
            This causes a compile error.
          likelihood: medium
          impact: high
          mitigation: |
            Agent A's brief explicitly warns to NOT remove fmt from detect.go. The build
            gate catches this immediately.
        - scenario: |
            Agent A2 misses one of the Detect() call sites in detect_test.go (approximately
            14 sites), leaving a call with the old single-argument signature.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A2's brief lists all known test function names and instructs grep verification.
            The build gate catches any missed site before tests run.
        - scenario: |
            Agent B removes `fmt` from worktree_status.go after replacing fmt.Sscanf, but
            fmt is still used elsewhere in that file.
          likelihood: low
          impact: high
          mitigation: |
            Agent B's brief instructs careful inspection before import removal. The build
            gate catches this immediately.
        - scenario: |
            The `buildActionAndCommand` deletion (Bug 1) breaks a caller not found by grep.
            The function is unexported so this is impossible from outside the package.
          likelihood: low
          impact: low
          mitigation: |
            buildActionAndCommand is unexported. The package-internal search confirmed no
            callers within the package (buildSessionState calls buildActionAndCommandInternal
            directly). Safe to delete.
state: SCOUT_PENDING
injection_method: hook
