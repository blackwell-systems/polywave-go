title: 'Type Unification: Migrate orchestrator from types.IMPLDoc to protocol.IMPLManifest'
feature_slug: type-unification
verdict: SUITABLE
suitability_assessment: |
    File decomposition: 10+ files change across orchestrator, engine, and protocol packages.
    Files decompose cleanly into 3 agent scopes with disjoint ownership.

    Investigation-first: No. The dual-type situation is fully understood. No import cycle
    blocks unification — orchestrator already imports protocol and calls protocol.Load()
    in 8 places. This is a mechanical migration.

    Interface discoverability: Yes. The target type (protocol.IMPLManifest) already exists
    with full field definitions. All function signatures can be specified exactly.

    Pre-implementation status: The manifestToIMPLDoc conversion adapter in engine.go and
    the loadIMPLDoc wrapper confirm this is purely legacy glue. engine.PrioritizeAgents
    already takes *protocol.IMPLManifest but orchestrator.prioritizeAgentsFunc still
    expects *types.IMPLDoc — a type mismatch preventing direct wiring.

    Parallelization value: High. Build/test cycle is >30s (Go full test suite). Three
    agents each touch 3-5 files. Wave 1 handles the core orchestrator migration; Wave 2
    handles engine adapter removal and wiring that depends on Wave 1 signatures.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 agents, ~8 min avg, 2 waves)
    - Merge and verification: ~4 min
    Total SAW time: ~24 min
    Sequential baseline: ~30 min (3 agents x 10 min avg)
    Time savings: ~6 min (20% faster)
    Recommendation: Clear speedup plus coordination value for a cross-package refactor.
test_command: go test ./...
lint_command: go vet ./...
