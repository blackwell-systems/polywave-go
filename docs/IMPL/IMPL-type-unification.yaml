pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent A and C conflict on orchestrator type changes vs test expectations
          likelihood: medium
          impact: medium
          mitigation: Both agents work from the same interface contracts. Field name mappings are explicit. Same-wave execution means they see the same base code.
        - scenario: types.AgentSpec still needed at agent.Runner boundary causes incomplete migration
          likelihood: low
          impact: low
          mitigation: 'Explicitly scoped: agentToSpec helper bridges the gap. Full pkg/agent migration is a follow-up.'
        - scenario: External callers of engine.ParseIMPLDoc or orchestrator.SetParseIMPLDocFunc break
          likelihood: medium
          impact: medium
          mitigation: Agent D deprecates ParseIMPLDoc rather than deleting. SetParseIMPLDocFunc removal is safe since only engine.init() calls it.
        - scenario: merge.go types.CompletionReport to protocol.CompletionReport conversion missed
          likelihood: low
          impact: high
          mitigation: Agent A explicitly handles this — removes the conversion layer and uses protocol.CompletionReport directly with string status comparison.
