interface_contracts:
  - name: WorkspaceManager
    description: |
      Language-agnostic interface for workspace file management in wave agent worktrees.
      All four language managers implement this interface.
    definition: |
      // WorkspaceManager manages workspace configuration files for a specific language
      // so that LSP tools can resolve cross-package types in wave agent worktrees.
      type WorkspaceManager interface {
          // Language returns the canonical name: "go", "typescript", "rust", "python"
          Language() string
          // Detect returns true if this manager applies to the repo at repoRoot.
          // Detection is based on marker file presence (e.g. go.mod, tsconfig.json, Cargo.toml).
          Detect(repoRoot string) bool
          // Setup modifies workspace configuration to include all worktreePaths for LSP resolution.
          // If workspace config exists, it is backed up first to BackupDir(repoRoot, waveNum).
          // Non-fatal: errors are returned but callers log warnings rather than aborting.
          Setup(repoRoot string, waveNum int, worktreePaths []string) error
          // Restore reverts workspace configuration to its pre-wave state.
          // If a backup exists in BackupDir(repoRoot, waveNum), it is restored and the backup
          // is deleted. If no backup exists, the created config file is deleted entirely.
          Restore(repoRoot string, waveNum int) error
      }
    location: pkg/engine/workspace/workspace.go

  - name: BackupDir
    description: Shared helper returning the .saw-state/wave{N}/ path for a given repo root and wave number.
    definition: |
      // BackupDir returns the directory used for backing up workspace config files
      // for the given wave. Callers use this to store and retrieve backup files.
      // Example: /path/to/repo/.saw-state/wave1/
      func BackupDir(repoRoot string, waveNum int) string
    location: pkg/engine/workspace/workspace.go

  - name: DetectAndSetup
    description: |
      Dispatcher that runs Setup on all detected WorkspaceManagers for the repo.
      Returns a StepResult per the engine step conventions (non-fatal on individual manager errors).
    definition: |
      // DetectAndSetup runs Setup on every WorkspaceManager that Detect() returns true for.
      // All detected managers run; partial failures log warnings but do not abort.
      // Returns a single StepResult summarizing the outcome.
      func DetectAndSetup(
          ctx context.Context,
          repoRoot string,
          waveNum int,
          worktrees []protocol.WorktreeInfo,
          onEvent engine.EventCallback,
          logger *slog.Logger,
      ) *engine.StepResult
    location: pkg/engine/workspace/dispatcher.go

  - name: DetectAndRestore
    description: |
      Dispatcher that runs Restore on all WorkspaceManagers. All registered managers attempt
      restore regardless of whether they were active at setup time, since detection state is
      not persisted (idempotent: missing backup = no-op).
    definition: |
      // DetectAndRestore runs Restore on every WorkspaceManager that Detect() returns true for.
      // Non-fatal: errors log warnings but do not abort.
      func DetectAndRestore(
          ctx context.Context,
          repoRoot string,
          waveNum int,
          onEvent engine.EventCallback,
          logger *slog.Logger,
      ) *engine.StepResult
    location: pkg/engine/workspace/dispatcher.go

  - name: GoWorkspaceManager
    description: |
      Implements WorkspaceManager for Go repos using go.work. Refactored from the existing
      StepGoWorkSetup/StepGoWorkRestore logic in gowork_steps.go. The step functions become
      thin wrappers over GoWorkspaceManager.Setup/Restore.
    definition: |
      type GoWorkspaceManager struct{}

      func (m *GoWorkspaceManager) Language() string          { return "go" }
      func (m *GoWorkspaceManager) Detect(repoRoot string) bool
      func (m *GoWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
      func (m *GoWorkspaceManager) Restore(repoRoot string, waveNum int) error
    location: pkg/engine/workspace/go_manager.go

  - name: TypeScriptWorkspaceManager
    description: |
      Implements WorkspaceManager for TypeScript/JavaScript repos.
      TS detection: tsconfig.json at repoRoot.
      JS-only (no tsconfig.json) detection: package.json with "workspaces" key or just package.json.
      TS setup: create per-worktree tsconfig.worktree.json files + add project references to root tsconfig.json.
      JS setup: add worktree paths to package.json "workspaces" array.
      Restore: revert changes; delete created tsconfig.worktree.json files.
    definition: |
      type TypeScriptWorkspaceManager struct{}

      func (m *TypeScriptWorkspaceManager) Language() string          { return "typescript" }
      func (m *TypeScriptWorkspaceManager) Detect(repoRoot string) bool
      func (m *TypeScriptWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
      func (m *TypeScriptWorkspaceManager) Restore(repoRoot string, waveNum int) error
    location: pkg/engine/workspace/typescript_manager.go

  - name: RustWorkspaceManager
    description: |
      Implements WorkspaceManager for Rust repos using Cargo.toml workspace members.
      Detection: Cargo.toml at repoRoot containing a [workspace] section.
      Setup: surgically append worktree paths to the members array in Cargo.toml.
        Backup Cargo.toml to .saw-state/wave{N}/Cargo.toml.backup before modification.
        Use string-level TOML editing (find the members array, append entries) — not full rewrite.
      Restore: restore Cargo.toml from backup, or delete the SAW-managed members if no backup.
    definition: |
      type RustWorkspaceManager struct{}

      func (m *RustWorkspaceManager) Language() string          { return "rust" }
      func (m *RustWorkspaceManager) Detect(repoRoot string) bool
      func (m *RustWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
      func (m *RustWorkspaceManager) Restore(repoRoot string, waveNum int) error
    location: pkg/engine/workspace/rust_manager.go

  - name: PythonWorkspaceManager
    description: |
      Implements WorkspaceManager for Python repos using Pyright configuration.
      Detection: pyrightconfig.json or pyproject.toml at repoRoot.
      Setup (pyrightconfig.json): add worktree paths to "extraPaths" array. Create the file if absent.
      Setup (pyproject.toml with [tool.pyright]): add paths to extraPaths under [tool.pyright].
      Backup: back up pyrightconfig.json to .saw-state/wave{N}/pyrightconfig.json.backup.
        If created from scratch (no prior file), no backup — restore deletes it.
      Restore: restore from backup or delete the SAW-created file.
    definition: |
      type PythonWorkspaceManager struct{}

      func (m *PythonWorkspaceManager) Language() string          { return "python" }
      func (m *PythonWorkspaceManager) Detect(repoRoot string) bool
      func (m *PythonWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
      func (m *PythonWorkspaceManager) Restore(repoRoot string, waveNum int) error
    location: pkg/engine/workspace/python_manager.go

  - name: PrepareWaveOpts.NoWorkspaceSetup
    description: |
      Replaces NoGoWork bool in PrepareWaveOpts. Global opt-out for all WorkspaceManager setup.
      The CLI flag becomes --no-workspace-setup (alias --no-gowork for backward compatibility).
    definition: |
      // In step_types.go PrepareWaveOpts:
      // NoWorkspaceSetup disables all WorkspaceManager setup steps in PrepareWave.
      // Use when the caller manages workspace files externally.
      // Replaces the deprecated NoGoWork field.
      NoWorkspaceSetup bool
    location: pkg/engine/step_types.go

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Context
          You are implementing the Go language WorkspaceManager in a new sub-package
          `pkg/engine/workspace/` for the scout-and-wave-go repo at
          `github.com/blackwell-systems/scout-and-wave-go`.

          The scaffold file `pkg/engine/workspace/workspace.go` already exists and defines
          the `WorkspaceManager` interface, `BackupDir` helper, and package-level imports.
          Read it before implementing.

          ## What to implement

          ### File: `pkg/engine/workspace/go_manager.go`

          Implement `GoWorkspaceManager` that satisfies `WorkspaceManager`.

          The logic is a direct extraction from the existing `pkg/engine/gowork_steps.go`.
          Read that file in full before writing. Your implementation must replicate the same
          behavior in the `Setup` and `Restore` methods, removing the EventCallback and
          slog.Logger parameters from the method signatures (those belong to the dispatcher
          layer, not the manager). Internal errors are returned as error values.

          **GoWorkspaceManager.Detect:**
          - Return true iff `go.mod` exists at `repoRoot`.

          **GoWorkspaceManager.Setup(repoRoot string, waveNum int, worktreePaths []string) error:**
          - Build backup dir via `BackupDir(repoRoot, waveNum)`.
          - Back up `go.work` (and `go.work.sum`) to `backupDir/go.work.backup` (and `go.work.sum.backup`)
            if they exist.
          - If go.work did not exist: run `go work init .` (exec.Command, Dir=repoRoot).
            If it fails, return error (non-fatal handled by dispatcher).
          - For each worktreePath: run `go work use <path>` (exec.Command, Dir=repoRoot).
            Log failures but do not return error (best-effort).
          - Append `"\n// SAW-managed: restored by finalize-wave\n"` to go.work.
          - Return nil on success.

          **GoWorkspaceManager.Restore(repoRoot string, waveNum int) error:**
          - Build backup dir path.
          - If `backupDir/go.work.backup` exists: overwrite `go.work` with its content; delete backup.
          - Else: delete `go.work` (ignore os.IsNotExist).
          - If `backupDir/go.work.sum.backup` exists: overwrite `go.work.sum` with its content; delete backup.
          - Else: delete `go.work.sum` (ignore os.IsNotExist).
          - Return nil.

          ### File: `pkg/engine/workspace/go_manager_test.go`

          Package: `workspace` (same package, not `workspace_test`).

          Write tests:
          1. `TestGoWorkspaceManager_Detect_TrueWhenGoModExists`: create tmpdir with go.mod; assert Detect returns true.
          2. `TestGoWorkspaceManager_Detect_FalseWhenNoGoMod`: create tmpdir without go.mod; assert Detect returns false.
          3. `TestGoWorkspaceManager_Setup_BacksUpExistingGoWork`: create go.mod + existing go.work; call Setup;
             verify backup file exists at `BackupDir(root, 1)/go.work.backup` with original content.
          4. `TestGoWorkspaceManager_Restore_RestoresFromBackup`: create backup file; call Restore;
             verify go.work has backup content and backup file is deleted.
          5. `TestGoWorkspaceManager_Restore_DeletesGoWorkWhenNoBackup`: create go.work (no backup);
             call Restore; verify go.work is deleted.

          Skip tests that invoke the `go` binary if `exec.LookPath("go")` fails.

          ## Constraints
          - Package: `package workspace`
          - Import path for protocol: `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`
          - Use `os.MkdirAll` for backup dir creation (same pattern as existing gowork_steps.go).
          - Do NOT import `pkg/engine` — circular import risk. Use `protocol.SAWStateDir` directly.
          - The `BackupDir` function is defined in `workspace.go` (the scaffold); call it from your code.

          ## Verification gate
          ```
          go build ./pkg/engine/workspace/
          go vet ./pkg/engine/workspace/
          go test ./pkg/engine/workspace/ -run TestGoWorkspaceManager
          ```
        files:
          - pkg/engine/workspace/go_manager.go
          - pkg/engine/workspace/go_manager_test.go
        dependencies: []

      - id: B
        task: |
          ## Context
          You are implementing the TypeScript/JavaScript WorkspaceManager in a new sub-package
          `pkg/engine/workspace/` for the scout-and-wave-go repo.

          The scaffold file `pkg/engine/workspace/workspace.go` already exists and defines
          the `WorkspaceManager` interface. Read it before implementing.

          ## What to implement

          ### File: `pkg/engine/workspace/typescript_manager.go`

          Implement `TypeScriptWorkspaceManager` satisfying `WorkspaceManager`.

          **Detect:**
          - Return true iff `tsconfig.json` OR `package.json` exists at `repoRoot`.

          **Setup(repoRoot string, waveNum int, worktreePaths []string) error:**

          *TypeScript path* (tsconfig.json exists at repoRoot):
          1. Back up `tsconfig.json` to `BackupDir(repoRoot, waveNum)/tsconfig.json.backup`.
          2. Read the existing `tsconfig.json` as raw JSON bytes.
          3. For each worktreePath, create a `tsconfig.worktree.json` file in that path:
             ```json
             {
               "extends": "<relative-path-from-worktree-to-repo-root-tsconfig>",
               "compilerOptions": { "composite": true }
             }
             ```
             The `extends` value is the relative path from the worktree directory to
             `repoRoot/tsconfig.json` (use `filepath.Rel`).
          4. Parse the root `tsconfig.json` as a `map[string]interface{}` (encoding/json).
             Add/append to the `"references"` array the relative path entries:
             ```json
             { "path": "<relative-path-from-repoRoot-to-worktreePath>" }
             ```
          5. Marshal back to JSON (json.MarshalIndent with 2-space indent) and write to tsconfig.json.

          *JavaScript path* (package.json exists, no tsconfig.json):
          1. Back up `package.json` to `BackupDir(repoRoot, waveNum)/package.json.backup`.
          2. Parse `package.json` as `map[string]interface{}`.
          3. Append relative worktree paths (from repoRoot) to the `"workspaces"` array.
             If `"workspaces"` key absent, create it.
          4. Marshal back (json.MarshalIndent) and write.

          **Restore(repoRoot string, waveNum int) error:**
          - If `tsconfig.json.backup` exists in backup dir: restore tsconfig.json from backup; delete backup.
            Also delete any `tsconfig.worktree.json` files that were created (read backup dir for a
            SAW-managed manifest of created files, OR simply attempt to remove tsconfig.worktree.json
            from each path listed in the current root tsconfig "references" that are under .saw-state or
            worktree paths — simplest approach: just restore backup tsconfig.json, which removes the
            references; separately delete any tsconfig.worktree.json inside subdirs if found by scanning).
            Simplest correct approach: restore tsconfig.json from backup (the references pointing to
            worktree tsconfigs are gone); do NOT attempt to enumerate worktrees (paths no longer known).
          - Else if `tsconfig.json` exists: delete it (was SAW-created — but this case is unlikely since
            tsconfig.json pre-existed if we backed it up; skip this branch).
          - If `package.json.backup` exists: restore package.json from backup; delete backup.
          - Return nil.

          ### File: `pkg/engine/workspace/typescript_manager_test.go`

          Package: `package workspace`.

          Tests:
          1. `TestTypeScriptManager_Detect_TsConfig`: tmpdir with tsconfig.json → true.
          2. `TestTypeScriptManager_Detect_PackageJson`: tmpdir with package.json → true.
          3. `TestTypeScriptManager_Detect_Neither`: empty tmpdir → false.
          4. `TestTypeScriptManager_Setup_TSPath_AddsReferences`: create tsconfig.json with
             `{"compilerOptions":{}}`, call Setup with one worktreePath; verify tsconfig.json
             now has `"references"` array with correct path entry; verify backup exists.
          5. `TestTypeScriptManager_Setup_JSPath_AddsWorkspaces`: create package.json with
             `{"name":"test"}`, call Setup; verify package.json has `"workspaces"` with correct path.
          6. `TestTypeScriptManager_Restore_FromBackup`: create backup tsconfig.json; call Restore;
             verify tsconfig.json is restored and backup deleted.

          ## Constraints
          - Package: `package workspace`
          - Use only standard library: `encoding/json`, `os`, `path/filepath`.
          - Do NOT import `pkg/engine` (circular import risk).
          - Call `BackupDir` from workspace.go scaffold.
          - Use `os.MkdirAll` for backup dir creation.
          - JSON modification must NOT use a custom TOML/JSON library — only `encoding/json`.

          ## Verification gate
          ```
          go build ./pkg/engine/workspace/
          go vet ./pkg/engine/workspace/
          go test ./pkg/engine/workspace/ -run TestTypeScriptManager
          ```
        files:
          - pkg/engine/workspace/typescript_manager.go
          - pkg/engine/workspace/typescript_manager_test.go
        dependencies: []

      - id: C
        task: |
          ## Context
          You are implementing the Rust WorkspaceManager in a new sub-package
          `pkg/engine/workspace/` for the scout-and-wave-go repo.

          The scaffold file `pkg/engine/workspace/workspace.go` defines the `WorkspaceManager`
          interface. Read it before implementing.

          ## What to implement

          ### File: `pkg/engine/workspace/rust_manager.go`

          Implement `RustWorkspaceManager` satisfying `WorkspaceManager`.

          **Detect:**
          - Read `Cargo.toml` at repoRoot. Return true iff the file exists AND contains
            the string `[workspace]` (simple string search using `strings.Contains`).

          **Setup(repoRoot string, waveNum int, worktreePaths []string) error:**
          1. Read `Cargo.toml` bytes.
          2. Back up to `BackupDir(repoRoot, waveNum)/Cargo.toml.backup`.
          3. Find the `[workspace]` section and its `members` array using line-by-line string
             editing (do NOT use a TOML library). The editing strategy:
             - Search for a line matching `members = [` or `members=[` (after trimming spaces).
             - Find the closing `]` of the members array (may be on same line for single-line
               arrays, or on a subsequent line for multi-line).
             - For multi-line: insert new lines before the closing `]`, each of the form:
               `  "<relative-path>",` where relative-path is computed via `filepath.Rel(repoRoot, worktreePath)`.
             - For single-line `members = ["foo", "bar"]`: replace the closing `]` with `,
               "<rel-path>"]`.
             - Append a comment `# SAW-managed: restored by finalize-wave` after the last inserted entry.
          4. Write modified Cargo.toml back.
          5. Return nil.

          Important: the backup-then-restore approach means surgical editing is best-effort.
          If parsing is ambiguous, log the issue and return an error (the dispatcher treats
          this as non-fatal).

          **Restore(repoRoot string, waveNum int) error:**
          - If `Cargo.toml.backup` exists in backup dir: overwrite Cargo.toml; delete backup.
          - Else: no-op (Cargo.toml was not modified since we would have backed it up first).
          - Return nil.

          ### File: `pkg/engine/workspace/rust_manager_test.go`

          Package: `package workspace`.

          Tests:
          1. `TestRustManager_Detect_TrueWithWorkspaceSection`: create Cargo.toml with `[workspace]`; assert true.
          2. `TestRustManager_Detect_FalseWithoutWorkspaceSection`: create Cargo.toml without `[workspace]`; assert false.
          3. `TestRustManager_Detect_FalseNoFile`: empty tmpdir; assert false.
          4. `TestRustManager_Setup_BacksUpCargoToml`: create Cargo.toml with multiline members; call Setup;
             verify backup exists with original content.
          5. `TestRustManager_Setup_AddsMembers_MultiLine`: create Cargo.toml with:
             ```
             [workspace]
             members = [
               "crate_a",
             ]
             ```
             Call Setup with one worktree path. Verify the resulting Cargo.toml contains the
             worktree relative path in the members array and the SAW comment.
          6. `TestRustManager_Restore_FromBackup`: create backup; call Restore; verify Cargo.toml
             is restored and backup is deleted.

          ## Constraints
          - Package: `package workspace`
          - Standard library only: `bufio`, `bytes`, `os`, `path/filepath`, `strings`.
          - No external TOML library.
          - Do NOT import `pkg/engine`.
          - Call `BackupDir` from workspace.go scaffold.

          ## Verification gate
          ```
          go build ./pkg/engine/workspace/
          go vet ./pkg/engine/workspace/
          go test ./pkg/engine/workspace/ -run TestRustManager
          ```
        files:
          - pkg/engine/workspace/rust_manager.go
          - pkg/engine/workspace/rust_manager_test.go
        dependencies: []

      - id: D
        task: |
          ## Context
          You are implementing the Python WorkspaceManager in a new sub-package
          `pkg/engine/workspace/` for the scout-and-wave-go repo.

          The scaffold file `pkg/engine/workspace/workspace.go` defines the `WorkspaceManager`
          interface. Read it before implementing.

          ## What to implement

          ### File: `pkg/engine/workspace/python_manager.go`

          Implement `PythonWorkspaceManager` satisfying `WorkspaceManager`.

          **Detect:**
          - Return true iff `pyrightconfig.json` OR `pyproject.toml` exists at `repoRoot`.

          **Setup(repoRoot string, waveNum int, worktreePaths []string) error:**

          *pyrightconfig.json path* (pyrightconfig.json exists OR neither file exists but detection passed
          — wait, detection requires at least one file, so this is: pyrightconfig.json exists):
          1. Read pyrightconfig.json (or start with `{}` if creation is needed). Detect
             presence via os.Stat. If exists, back it up to `BackupDir(repoRoot, waveNum)/pyrightconfig.json.backup`.
          2. Parse as `map[string]interface{}`.
          3. Append relative worktree paths (computed via `filepath.Rel(repoRoot, wt)`) to the
