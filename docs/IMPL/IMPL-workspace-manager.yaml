pre_mortem:
  overall_risk: medium
  rows:
    - scenario: |
        TypeScript project references change the root tsconfig.json in-place. If Setup
        succeeds but something fails mid-Restore (process kill, disk full), tsconfig.json
        is left in modified state with worktree references pointing to deleted worktree dirs.
      likelihood: low
      impact: medium
      mitigation: |
        The backup-first approach (Step 1 of Setup backs up before any write) means a
        failed Restore still leaves a backup file in .saw-state/. Users can manually
        restore by copying .saw-state/wave{N}/tsconfig.json.backup to tsconfig.json.
        Add a note to the TypeScript manager's godoc comment documenting this recovery path.

    - scenario: |
        Cargo.toml workspace members addition uses line-level string editing, which is
        fragile. A non-standard members array format (e.g., inline comment after `]`,
        or members listed without trailing comma) could result in invalid TOML or missed
        insertion.
      likelihood: medium
      impact: medium
      mitigation: |
        The backup-before-write approach means the original Cargo.toml is always
        recoverable. The RustWorkspaceManager.Setup should return an error if it cannot
        find the closing `]` of the members array (fail-safe: no partial write). The
        dispatcher treats this as non-fatal (warning, not abort). Test with both
        single-line and multi-line members array formats.

    - scenario: |
        Python pyrightconfig.json creation from scratch: if Setup creates the file but
        Restore checks for a backup (which doesn't exist because the file was created
        from scratch), the Restore code path must handle the "created, no backup" case
        by deleting the created file rather than being a no-op.
      likelihood: medium
      impact: low
      mitigation: |
        Python manager must distinguish between "file existed before Setup (backed up)"
        vs "file created by Setup (no backup)". The absence of a backup file is the signal
        to delete the file on Restore. This is documented in the interface contract.
        Test TestPythonManager_Restore_DeletesCreatedPyrightConfig covers this case.

    - scenario: |
        Circular import: pkg/engine/workspace imports pkg/engine for StepResult or
        EventCallback types. Since pkg/engine imports pkg/engine/workspace (via dispatcher
        calls in prepare.go and finalize.go), this would create a cycle.
      likelihood: high
      impact: high
      mitigation: |
        Mitigated by design: workspace.StepResult is defined locally in the workspace
        package (not imported from pkg/engine). The EventCallback type is declared as
        an anonymous func type `func(step, status, detail string)` in dispatcher.go
        rather than importing engine.EventCallback. Agent E's brief explicitly calls this
        out as a constraint.

    - scenario: |
        The existing StepGoWorkSetup/StepGoWorkRestore tests in gowork_steps_test.go
        test the old inline logic. After Agent F refactors those functions to delegate
        to GoWorkspaceManager, the existing tests may still pass (they test behavior,
        not implementation) or may need updates if the delegation changes observable
        behavior (e.g., backup file location or error detail strings).
      likelihood: low
      impact: low
      mitigation: |
        GoWorkspaceManager is a direct extraction of the existing logic. Backup file
        paths and error strings are preserved. Existing tests should continue to pass.
        Agent F should run `go test ./pkg/engine/ -run TestStepGoWork` after refactoring
        to confirm.

    - scenario: |
        Agent F modifies prepare.go and finalize.go which are large, heavily-used files
        with 75+ dependent callers. A mistaken edit could break unrelated functionality.
      likelihood: low
      impact: high
      mitigation: |
        Agent F's task is targeted: replace two well-delimited blocks (one in prepare.go
        ~lines 576-584, one in finalize.go ~lines 531-534). The brief includes exact
        before/after code. The verification gate runs the full test suite. Agent F must
        read both files before editing to identify the exact line ranges.
