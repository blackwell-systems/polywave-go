interface_contracts:
    - name: DetectCollisions
      description: |
        Migrate from (CollisionReport, error) to result.Result[CollisionReport].
        All error paths must return result.NewFailure with collision-specific error codes.
      definition: |
        func DetectCollisions(ctx context.Context, manifestPath string, waveNum int, repoPath string) result.Result[CollisionReport]
      location: pkg/collision/detector.go:32
    - name: getChangedGoFiles
      description: |
        Migrate from ([]string, error) to result.Result[[]string].
        Git diff errors return result.NewFailure with CodeCollisionGitDiffFailed.
      definition: |
        func getChangedGoFiles(ctx context.Context, repoPath, branchName string) result.Result[[]string]
      location: pkg/collision/detector.go:114
    - name: extractTypesFromFiles
      description: |
        Migrate from ([]TypeDeclaration, error) to result.Result[[]TypeDeclaration].
        Parse errors return result.NewFailure with CodeCollisionParseFailed.
      definition: |
        func extractTypesFromFiles(ctx context.Context, repoPath, branchName string, files []string) result.Result[[]TypeDeclaration]
      location: pkg/collision/detector.go:143
    - name: extractTypeDecls
      description: |
        Migrate from ([]TypeDeclaration, error) to result.Result[[]TypeDeclaration].
        AST parse errors return result.NewFailure with CodeCollisionParseFailed.
      definition: |
        func extractTypeDecls(filePath, content string) result.Result[[]TypeDeclaration]
      location: pkg/collision/detector.go:172
    - name: Collision error codes
      description: |
        Add 11 collision-specific error codes to pkg/result/codes.go in the C001-C099 range.
        Follow the established pattern (const block with inline comments).
      definition: |
        const (
          CodeCollisionLoadManifestFailed = "C001_LOAD_MANIFEST_FAILED"
          CodeCollisionInvalidWave        = "C002_INVALID_WAVE"
          CodeCollisionGetFilesFailed     = "C003_GET_FILES_FAILED"
          CodeCollisionExtractTypesFailed = "C004_EXTRACT_TYPES_FAILED"
          CodeCollisionGitDiffFailed      = "C005_GIT_DIFF_FAILED"
          CodeCollisionParseFailed        = "C006_PARSE_FAILED"
          CodeCollisionKeyParseFailed     = "C007_KEY_PARSE_FAILED"
          CodeCollisionGitShowFailed      = "C008_GIT_SHOW_FAILED"
          CodeCollisionContextCancelled   = "C009_CONTEXT_CANCELLED"
          CodeCollisionBranchNotFound     = "C010_BRANCH_NOT_FOUND"
          CodeCollisionInvalidInput       = "C011_INVALID_INPUT"
        )
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Migrate pkg/collision/detector.go to result.Result[T] pattern and add error codes.

            **What to implement:**
            1. Change all 4 function signatures to return result.Result[T] instead of (T, error)
            2. Replace all fmt.Errorf calls with result.NewFailure containing SAWError with collision-specific codes
            3. Propagate Result[T] returns through the call chain (DetectCollisions → getChangedGoFiles → extractTypesFromFiles → extractTypeDecls)
            4. Add key parsing validation to detector.go:243-245 (check lastSlash != -1, return error if invalid)
            5. Replace silent git show failure (detector.go:153) with explicit result.NewFailure using CodeCollisionGitShowFailed

            **Migration pattern:**
            - OLD: `return nil, fmt.Errorf("load manifest: %w", err)`
            - NEW: `return result.NewFailure[T]([]result.SAWError{result.NewFatal(result.CodeCollisionLoadManifestFailed, fmt.Sprintf("load manifest: %s", err.Error())).WithCause(err)})`

            **Error code mappings:**
            - detector.go:39 → CodeCollisionLoadManifestFailed
            - detector.go:44 → CodeCollisionInvalidWave
            - detector.go:74 → CodeCollisionGetFilesFailed
            - detector.go:80 → CodeCollisionExtractTypesFailed
            - detector.go:121 → CodeCollisionGitDiffFailed
            - detector.go:161 → CodeCollisionParseFailed
            - detector.go:153 (silent failure) → CodeCollisionGitShowFailed
            - detector.go:243-245 (new validation) → CodeCollisionKeyParseFailed
            - Context cancellation checks (detector.go:33,56,115,147) → CodeCollisionContextCancelled

            **Constraints:**
            - Do NOT change function logic beyond error handling
            - Do NOT modify detectCollisionsInTypes (already correct, returns TypeCollision slice)
            - Import "github.com/blackwell-systems/scout-and-wave-go/pkg/result" at the top
            - Update all call sites within detector.go to check IsSuccess() / IsFatal() instead of err != nil
            - For context cancellation: `if err := ctx.Err(); err != nil { return result.NewFailure[T]([]result.SAWError{result.NewFatal(result.CodeCollisionContextCancelled, err.Error()).WithCause(err)}) }`

            **Interfaces to implement:**
            - DetectCollisions: result.Result[CollisionReport]
            - getChangedGoFiles: result.Result[[]string]
            - extractTypesFromFiles: result.Result[[]TypeDeclaration]
            - extractTypeDecls: result.Result[[]TypeDeclaration]

            **Tests:**
            No new tests. Agent B owns detector_test.go and will update existing tests to check Result[T].

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && \
            go build ./pkg/collision && \
            go vet ./pkg/collision && \
            go test ./pkg/collision -timeout 120s
            ```
          files:
            - pkg/collision/detector.go
        - id: B
          task: |
            Add test coverage for getChangedGoFiles, extractTypesFromFiles, and DetectCollisions integration path. Update existing tests to check Result[T] pattern.

            **What to implement:**
            1. Update TestDetectCollisionsContextCancellation to check result.IsFatal() instead of err != nil
            2. Add TestGetChangedGoFiles with subtests for:
               - Valid branch with changed .go files
               - Branch with no .go files (returns empty slice)
               - Invalid branch (git diff fails) → result.IsFatal() with CodeCollisionGitDiffFailed
               - Context cancellation → result.IsFatal() with CodeCollisionContextCancelled
            3. Add TestExtractTypesFromFiles with subtests for:
               - Multiple valid files → successful extraction
               - Git show failure on one file → continues (no longer silently logs, returns error)
               - Parse failure on one file → fail fast with CodeCollisionParseFailed
               - Context cancellation → result.IsFatal() with CodeCollisionContextCancelled
            4. Add TestDetectCollisions integration test (remove t.Skip) with subtests for:
               - Manifest load failure → result.IsFatal() with CodeCollisionLoadManifestFailed
               - Invalid wave number → result.IsFatal() with CodeCollisionInvalidWave
               - Successful collision detection → result.IsSuccess() with CollisionReport.Valid=false
               - No collisions → result.IsSuccess() with CollisionReport.Valid=true
            5. Add TestDetectCollisionsKeyParsing to verify the new lastSlash validation (cover the bug fix from finding #20)
            6. Add TestRootPackageCollision to cover finding #19 (Package="" types across multiple agents)

            **Test fixtures:**
            TestGetChangedGoFiles and TestExtractTypesFromFiles require a real git repo with branches.
            Use t.TempDir() and igit.Run to create a temporary repo with:
            - main branch with one .go file
            - saw/test-slug/wave1-agent-A branch with modified .go file and new type declaration
            - Commit both branches so git diff works

            **Pattern for Result[T] test assertions:**
            ```go
            res := DetectCollisions(ctx, manifestPath, 1, repoPath)
            if !res.IsSuccess() {
              t.Errorf("DetectCollisions() failed: %v", res.Errors)
            }
            data := res.GetData()
            if !data.Valid {
              t.Errorf("expected Valid=true, got false with %d collisions", len(data.Collisions))
            }
            ```

            **Constraints:**
            - Do NOT modify detector.go (Agent A owns it)
            - Do NOT add coverage for detectCollisionsInTypes or extractTypeDecls (already at 95.5% and 100%)
            - Use require.NoError for test setup failures, assert.Equal for result checks
            - Target 80%+ coverage for getChangedGoFiles, extractTypesFromFiles, and DetectCollisions

            **Interfaces to test:**
            All interfaces from interface_contracts section (DetectCollisions, getChangedGoFiles, extractTypesFromFiles, extractTypeDecls — all now return Result[T]).

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && \
            go build ./pkg/collision && \
            go vet ./pkg/collision && \
            go test ./pkg/collision -timeout 120s -coverprofile=/tmp/collision_coverage.out && \
            go tool cover -func=/tmp/collision_coverage.out | grep -E "total|DetectCollisions|getChangedGoFiles|extractTypesFromFiles" && \
            test $(go tool cover -func=/tmp/collision_coverage.out | grep "total:" | awk '{print int($3)}') -ge 70
            ```
