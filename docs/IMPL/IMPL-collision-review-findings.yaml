        - scenario: Agent A migration introduces type mismatches (e.g., calls extractTypeDecls expecting ([]TypeDeclaration, error) but it now returns Result[T])
          likelihood: low
          impact: medium
          mitigation: Agent A must update ALL call sites within detector.go. Verification gate will catch compilation failures immediately.
        - scenario: Agent B writes integration tests that require real git repos, but test fixtures are incomplete or race with other tests
          likelihood: medium
          impact: low
          mitigation: Use t.TempDir() for isolated test repos. Use unique branch names (e.g., saw/test-collision-{uuid}/wave1-agent-A) to avoid conflicts. Run tests with -timeout 120s to catch hangs.
        - scenario: Agent C places collision codes in the wrong location (e.g., before Suitability codes instead of after)
          likelihood: low
          impact: low
          mitigation: Explicit placement instruction in brief (after line 267). Verification gate checks for C001 and C011 presence via grep.
