title: Fix pkg/collision Review Findings
feature_slug: collision-review-findings
verdict: SUITABLE
suitability_assessment: |
    This work addresses 22 review findings in pkg/collision:
    - 11 non-conforming issues (Result[T] migration, error codes, hardcoded strings)
    - 8 test gaps (0% coverage for getChangedGoFiles and extractTypesFromFiles)
    - 1 bug (fragile key parsing)
    - 2 consistency issues (silent failure, inconsistent error handling)

    **File decomposition:** 3 files to modify (detector.go, detector_test.go, codes.go).
    Agents have disjoint file ownership — each file is touched by exactly one agent.

    **Investigation-first check:** No unknowns. All findings are specific, actionable,
    and require no root cause analysis. The work is purely remediation.

    **Interface discoverability:** No cross-agent interfaces. Each agent works
    independently on its assigned file.

    **Pre-implementation status:** All findings are TODO (none implemented yet).
    Current coverage is 42% overall, with critical gaps at 0% and 6.5%.

    **Parallelization value:** High. The migration touches 6 functions, adds 11
    error codes, and writes 10+ new tests. Independent agents save ~10-15 minutes
    over sequential implementation. Build cycle is ~15s (Go module), so parallel
    execution avoids repeated wait time.

    **Estimated times:**
    - Scout: ~5 min (dependency mapping, contracts, IMPL doc)
    - Agent execution: ~8-12 min (3 agents × 3-4 min avg, parallel)
    - Merge & verification: ~3 min
    Total SAW time: ~16-20 min

    Sequential baseline: ~25-30 min (3 agents × 8-10 min avg sequential time)
    Time savings: ~10 min (40% faster)

    Recommendation: Clear speedup. Proceed with SAW.
test_command: go test ./pkg/collision -timeout 120s
lint_command: go vet ./pkg/collision
