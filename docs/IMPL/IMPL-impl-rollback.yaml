interface_contracts:
    - name: git.CreateTag
      description: Create a lightweight git tag at a specific commit (or HEAD if empty)
      definition: |
        func CreateTag(repoPath, tagName, commitSHA string) error
        // If commitSHA is empty, tags HEAD.
        // Returns nil if tag created successfully.
        // Returns error wrapping git output on failure.
      location: internal/git/commands.go
    - name: git.TagExists
      description: Check if a git tag exists in the repository
      definition: |
        func TagExists(repoPath, tagName string) bool
        // Returns true if the tag exists, false otherwise.
      location: internal/git/commands.go
    - name: git.DeleteTag
      description: Delete a git tag from the repository
      definition: |
        func DeleteTag(repoPath, tagName string) error
        // Returns nil if tag deleted successfully.
        // Returns error if tag doesn't exist or git fails.
      location: internal/git/commands.go
    - name: git.ListTagsWithPrefix
      description: List all tags matching a prefix pattern
      definition: |
        func ListTagsWithPrefix(repoPath, prefix string) ([]string, error)
        // Returns sorted list of tag names starting with prefix.
        // Uses git tag -l 'prefix*'.
      location: internal/git/commands.go
    - name: git.RevertRange
      description: Revert a range of commits (baseline..HEAD) without committing
      definition: |
        func RevertRange(repoPath, fromRef, toRef string) error
        // Runs: git revert --no-commit fromRef..toRef
        // Returns nil on success, error with git output on failure (e.g. conflicts).
      location: internal/git/commands.go
    - name: git.ResetHard
      description: Hard reset to a specific ref
      definition: |
        func ResetHard(repoPath, ref string) error
        // Runs: git reset --hard ref
        // Destructive operation.
      location: internal/git/commands.go
    - name: git.LogOneline
      description: Return oneline log between two refs
      definition: |
        func LogOneline(repoPath, fromRef, toRef string) (string, error)
        // Runs: git log --oneline fromRef..toRef
        // Returns formatted log output.
      location: internal/git/commands.go
    - name: TagBaseline
      description: Create polywave/{slug}/baseline tag at current HEAD
      definition: |
        func TagBaseline(repoPath, slug string) error
        // Creates tag polywave/{slug}/baseline at HEAD.
        // Idempotent: returns nil if tag already exists.
      location: pkg/engine/tagging.go
    - name: TagWaveMerged
      description: Create polywave/{slug}/wave{N}-merged tag at current HEAD
      definition: |
        func TagWaveMerged(repoPath, slug string, waveNum int) error
        // Creates tag polywave/{slug}/wave{N}-merged at HEAD after successful merge.
        // Idempotent: returns nil if tag already exists.
      location: pkg/engine/tagging.go
    - name: TagComplete
      description: Create polywave/{slug}/complete tag at current HEAD
      definition: |
        func TagComplete(repoPath, slug string) error
        // Creates tag polywave/{slug}/complete at HEAD.
        // Idempotent: returns nil if tag already exists.
      location: pkg/engine/tagging.go
    - name: CleanupTags
      description: Remove all polywave/{slug}/* tags
      definition: |
        func CleanupTags(repoPath, slug string) ([]string, error)
        // Returns list of deleted tag names. Returns nil error if no tags found.
      location: pkg/engine/tagging.go
    - name: RollbackResult
      description: Result struct for rollback operations
      definition: |
        type RollbackResult struct {
          Slug         string   `json:"slug"`
          TargetTag    string   `json:"target_tag"`
          TargetCommit string   `json:"target_commit"`
          Mode         string   `json:"mode"`          // "revert" or "hard"
          CommitsRange int      `json:"commits_range"`  // number of commits being undone
          FilesChanged []string `json:"files_changed"`  // files affected
          DryRun       bool     `json:"dry_run"`
          Success      bool     `json:"success"`
          TagsCleaned  []string `json:"tags_cleaned,omitempty"`
        }
      location: pkg/engine/tagging.go
    - name: Rollback
      description: Execute IMPL rollback to a specific tag
      definition: |
        func Rollback(repoPath, slug, target string, hard, dryRun bool) (*RollbackResult, error)
        // target is "baseline" or "wave{N}" — resolved to polywave/{slug}/{target} or
        // polywave/{slug}/{target}-merged tag.
        // Default (hard=false): git revert --no-commit.
        // hard=true: git reset --hard.
        // dryRun=true: report what would happen without doing it.
      location: pkg/engine/tagging.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Add git tag primitives to `internal/git/commands.go`. These are thin wrappers
            around git CLI commands, following the existing pattern in the file (see `Run`,
            `BranchExists`, `DeleteBranch`, `RevParse`, etc.).

            Add these functions at the end of `commands.go` (before the closing of the file):

            1. **`CreateTag(repoPath, tagName, commitSHA string) error`**
               - Run: `git -C repoPath tag tagName commitSHA` (if commitSHA non-empty)
               - Run: `git -C repoPath tag tagName` (if commitSHA is empty, tags HEAD)
               - Return wrapped error on failure

            2. **`TagExists(repoPath, tagName string) bool`**
               - Run: `git -C repoPath rev-parse --verify refs/tags/tagName`
               - Return true if exit 0, false otherwise (same pattern as `BranchExists`)

            3. **`DeleteTag(repoPath, tagName string) error`**
               - Run: `git -C repoPath tag -d tagName`
               - Return wrapped error on failure

            4. **`ListTagsWithPrefix(repoPath, prefix string) ([]string, error)`**
               - Run: `git -C repoPath tag -l 'prefix*'`
               - Parse output into sorted string slice
               - Return empty slice (not nil) if no tags match

            5. **`RevertRange(repoPath, fromRef, toRef string) error`**
               - Run: `git -C repoPath revert --no-commit fromRef..toRef`
               - Return wrapped error on failure (e.g. conflicts)

            6. **`ResetHard(repoPath, ref string) error`**
               - Run: `git -C repoPath reset --hard ref`
               - Return wrapped error on failure

            7. **`LogOneline(repoPath, fromRef, toRef string) (string, error)`**
               - Run: `git -C repoPath log --oneline fromRef..toRef`
               - Return raw output string

            ## Tests

            Add tests in `internal/git/commands_test.go`. For each function, create a
            temporary git repo with `git init`, make some commits, and verify the function
            behavior. Use `t.TempDir()` for test repos. Test cases:

            - CreateTag: creates tag, verify with TagExists
            - CreateTag with empty SHA: tags HEAD
            - TagExists: true for existing, false for non-existing
            - DeleteTag: deletes tag, verify with TagExists returning false
            - ListTagsWithPrefix: multiple tags, verify prefix filtering
            - RevertRange: create 2 commits, revert range, verify files restored
            - ResetHard: verify HEAD moves to target ref
            - LogOneline: verify output contains expected commits

            ## Verification gate

            ```
            go test ./internal/git/ -run "TestCreateTag|TestTagExists|TestDeleteTag|TestListTags|TestRevertRange|TestResetHard|TestLogOneline" -v
            ```

            ## Constraints

            - Follow existing patterns in commands.go: use `Run()` helper, return
              `fmt.Errorf("git X failed: %w", err)` for errors
            - Do not modify any existing functions
            - All new functions go after the existing `WorktreeExists` function
          files:
            - internal/git/commands.go
            - internal/git/commands_test.go
        - id: B
          task: |
            ## What to implement

            Create new file `pkg/engine/tagging.go` with IMPL lifecycle tagging and
            rollback functions. This file contains the business logic layer that uses
            `internal/git` primitives.

            Import `github.com/blackwell-systems/polywave-go/internal/git` for
            git operations.

            ### Tag name helpers

            ```go
            func baselineTagName(slug string) string { return fmt.Sprintf("polywave/%s/baseline", slug) }
            func waveMergedTagName(slug string, waveNum int) string { return fmt.Sprintf("polywave/%s/wave%d-merged", slug, waveNum) }
            func completeTagName(slug string) string { return fmt.Sprintf("polywave/%s/complete", slug) }
            func tagPrefix(slug string) string { return fmt.Sprintf("polywave/%s/", slug) }
            ```

            ### Lifecycle tagging functions

            1. **`TagBaseline(repoPath, slug string) error`**
               - Tag name: `polywave/{slug}/baseline`
               - Idempotent: if `git.TagExists` returns true, return nil (skip)
               - Otherwise call `git.CreateTag(repoPath, tagName, "")` to tag HEAD

            2. **`TagWaveMerged(repoPath, slug string, waveNum int) error`**
               - Tag name: `polywave/{slug}/wave{N}-merged`
               - Same idempotency pattern as TagBaseline

            3. **`TagComplete(repoPath, slug string) error`**
               - Tag name: `polywave/{slug}/complete`
               - Same idempotency pattern as TagBaseline

            4. **`CleanupTags(repoPath, slug string) ([]string, error)`**
               - List all tags with prefix `polywave/{slug}/` via `git.ListTagsWithPrefix`
               - Delete each tag via `git.DeleteTag`
               - Return list of deleted tag names
               - Return nil error if no tags found (not an error condition)

            ### RollbackResult struct

            ```go
            type RollbackResult struct {
              Slug         string   `json:"slug"`
              TargetTag    string   `json:"target_tag"`
              TargetCommit string   `json:"target_commit"`
              Mode         string   `json:"mode"`
              CommitsRange int      `json:"commits_range"`
              FilesChanged []string `json:"files_changed"`
              DryRun       bool     `json:"dry_run"`
              Success      bool     `json:"success"`
              TagsCleaned  []string `json:"tags_cleaned,omitempty"`
            }
            ```

            ### Rollback function

            **`Rollback(repoPath, slug, target string, hard, dryRun bool) (*RollbackResult, error)`**

            Logic:
            1. Resolve target to tag name:
               - If target == "baseline": use `baselineTagName(slug)`
               - If target starts with "wave": use `waveMergedTagName(slug, N)` where N is
                 parsed from target (e.g. "wave2" -> 2)
               - Otherwise: return error "unknown target"
            2. Check tag exists via `git.TagExists`. If not, return error with helpful message:
               "no baseline tag found for IMPL {slug} -- IMPL may have started before rollback
               tagging was enabled"
            3. Resolve tag to commit SHA via `git.RevParse(repoPath, tagName)`
            4. Count commits in range: `git.CommitCount(repoPath, commitSHA, "HEAD")`
            5. Get files changed: `git.DiffNameOnly(repoPath, commitSHA, "HEAD")`
            6. If dryRun: populate result with DryRun=true, Success=true, return
            7. Check working tree is clean via `git.StatusPorcelain(repoPath)`:
               - If dirty and !hard: return error "working tree has uncommitted changes --
                 commit or stash before rollback, or use --hard"
            8. Execute rollback:
               - If hard: `git.ResetHard(repoPath, commitSHA)`
               - Else: `git.RevertRange(repoPath, commitSHA, "HEAD")`
            9. Populate result with Success=true

            ### Multi-repo support helper

            **`RollbackMultiRepo(repos map[string]string, slug, target string, hard, dryRun bool) (map[string]*RollbackResult, error)`**

            - Iterate each repo path
            - Skip repos where baseline tag doesn't exist (they weren't part of this IMPL)
            - Call Rollback for repos with matching tags
            - Return map of repoKey -> RollbackResult

            ## Tests

            Create `pkg/engine/tagging_test.go` with tests using temporary git repos:
            - TestTagBaseline: creates tag, verify idempotent on second call
            - TestTagWaveMerged: creates wave-specific tag
            - TestTagComplete: creates complete tag
            - TestCleanupTags: creates multiple tags, cleanup removes all
            - TestRollback_DryRun: verify dry run reports without changing state
            - TestRollback_Revert: verify revert mode creates proper state
            - TestRollback_Hard: verify hard reset moves HEAD
            - TestRollback_NoTag: verify error message for missing tag
            - TestRollback_DirtyWorktree: verify blocked when dirty and not --hard

            For test setup, create a helper that initializes a git repo with some commits:
            ```go
            func setupTestRepo(t *testing.T) string {
              dir := t.TempDir()
              // git init, create initial commit, add files, make additional commits
              // Return repo path
            }
            ```

            ## Verification gate

            ```
            go test ./pkg/engine/ -run "TestTag|TestRollback|TestCleanup" -v
            ```

            ## Constraints

            - Import internal/git for all git operations (do not use exec.Command directly)
            - Use `log/slog` for any logging (follow project convention)
            - All exported functions must have doc comments
          files:
            - pkg/engine/tagging.go
            - pkg/engine/tagging_test.go
        - id: C
          task: |
            ## What to implement

            Create `cmd/polywave-tools/rollback_cmd.go` with the `polywave-tools rollback` CLI command.

            **IMPORTANT:** This agent creates the command definition only. The command will be
            registered in main.go by Agent E in wave 2. For now, just define the function
            `newRollbackCmd() *cobra.Command`.

            ### Command definition

            ```
            polywave-tools rollback --impl <slug> [--to baseline|wave{N}] [--repo-dir <path>] [--hard] [--dry-run] [--cleanup]
            ```

            Flags:
            - `--impl` (string, required): IMPL slug (e.g. "my-feature")
            - `--to` (string, default "baseline"): Rollback target: "baseline" or "wave{N}"
            - `--hard` (bool): Use git reset --hard instead of revert
            - `--dry-run` (bool): Show what would happen without doing it
            - `--cleanup` (bool): Remove all polywave/{slug}/* tags after rollback (or standalone)

            Note: `--repo-dir` is already a persistent flag on the root command (see root.go),
            available as the package-level `repoDir` variable.

            ### Implementation

            The `RunE` function should:

            1. Validate `--impl` is provided
            2. Resolve repo path from `repoDir` (package-level var from root.go)
            3. If `--cleanup` is set without `--hard` and without `--dry-run`:
               - Just clean up tags and exit:
               - Call `engine.CleanupTags(repoPath, slug)` (from pkg/engine/tagging.go)
               - Print JSON result: `{"slug": "...", "tags_cleaned": [...]}`
               - Return
            4. For rollback operations:
               - Call `engine.Rollback(repoPath, slug, target, hard, dryRun)`
               - If `--cleanup` is also set and rollback succeeded:
                 call `engine.CleanupTags(repoPath, slug)` and merge into result
            5. Check for multi-repo: look for `polywave.config.json` in repoDir
               - If found and has repos array, iterate each repo
               - Use `engine.RollbackMultiRepo(repos, slug, target, hard, dryRun)`
            6. Print JSON result to stdout (json.MarshalIndent, 2-space indent)
            7. If --hard is set, print warning to stderr:
               "WARNING: --hard performs destructive git reset. This cannot be undone."

            ### Output format

            Single repo:
            ```json
            {
              "slug": "my-feature",
              "target_tag": "saw/my-feature/baseline",
              "target_commit": "abc123",
              "mode": "revert",
              "commits_range": 15,
              "files_changed": ["pkg/foo.go", "cmd/bar.go"],
              "dry_run": false,
              "success": true
            }
            ```

            Multi repo:
            ```json
            {
              "repos": {
                "polywave-go": { ... },
                "polywave-web": { ... }
              }
            }
            ```

            ## Tests

            Create `cmd/polywave-tools/rollback_cmd_test.go` with:
            - TestNewRollbackCmd_RequiresImpl: verify error when --impl not provided
            - TestNewRollbackCmd_DefaultTarget: verify --to defaults to "baseline"
            - TestNewRollbackCmd_FlagParsing: verify all flags parse correctly

            ## Verification gate

            ```
            go test ./cmd/polywave-tools/ -run "TestNewRollbackCmd" -v
            ```

            ## Constraints

            - Import `engine` package for Rollback/CleanupTags/RollbackMultiRepo
            - Follow existing command patterns (see close_impl_cmd.go, retry_cmd.go)
            - Use `newSawLogger()` for any logging
            - JSON output to stdout, progress/warnings to stderr
            - The function `newRollbackCmd()` must be exported in the package
              (lowercase new, uppercase R — matching convention: newCloseImplCmd, etc.)
          files:
            - cmd/polywave-tools/rollback_cmd.go
            - cmd/polywave-tools/rollback_cmd_test.go
      base_commit: e3ff1dfdcea843a91a693b757c19919e63c525a8
    - number: 2
      agents:
        - id: D
          task: |
            ## What to implement

            Wire baseline tagging into `pkg/engine/prepare.go` and wave-merged tagging
