title: IMPL-level git rollback via automatic baseline/completion tagging and polywave-tools rollback command
feature_slug: impl-rollback
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 8 files across 3 packages (internal/git, pkg/engine, cmd/sawtools)
       plus test files. Work decomposes cleanly into: (a) git tagging primitives in internal/git,
       (b) engine-level tagging integration in pkg/engine, (c) new rollback CLI command, and
       (d) tagging hooks in existing prepare-wave/finalize-wave/close-impl commands.
       No two agents need conflicting modifications to the same file within a wave.

    2. Investigation-first: No unknowns. Git tagging and revert semantics are well-defined.
       All target files are inspected and understood.

    3. Interface discoverability: The tagging functions are simple git wrappers with clear
       signatures. The rollback command consumes tags created by the tagging functions.
       All interfaces can be fully specified before implementation.

    4. Pre-implementation status: No existing tagging or rollback functionality exists.
       The internal/git package has no tag-related functions. All work is net-new.

    5. Parallelization value: 3 agents in wave 1 (git primitives, rollback command, tagging
       engine logic) are fully independent. Wave 2 wires tagging into existing commands.
       Build/test cycle is ~30s (go test ./...). Clear speedup from parallel execution.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (wave 1: 3 agents parallel ~10 min, wave 2: 2 agents parallel ~5 min)
    - Merge and verification: ~5 min per wave
    Total Polywave time: ~35 min
    Sequential baseline: ~50 min (5 agents x 10 min avg)
    Time savings: ~15 min (30% faster)
    Recommendation: Clear speedup. Proceed.
test_command: go test ./...
lint_command: go vet ./...
