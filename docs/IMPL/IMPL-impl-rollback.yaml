pre_mortem:
    overall_risk: low
    rows:
        - scenario: git revert conflicts during rollback of complex multi-agent merge
          likelihood: medium
          impact: low
          mitigation: Rollback reports conflicting files and suggests --hard or manual resolution. The --dry-run flag lets users preview before executing.
        - scenario: Tag names collide if multiple IMPLs use similar slugs
          likelihood: low
          impact: low
          mitigation: Tags are namespaced under polywave/{slug}/ which is unique per IMPL. Slug uniqueness is enforced by IMPL naming convention.
        - scenario: Baseline tag created after first commit (race with fast agent)
          likelihood: low
          impact: medium
          mitigation: Baseline tag is created in PrepareWave before worktrees, which is before any agent can commit. Sequencing is guaranteed.
        - scenario: Tests require real git repos which may be slow in CI
          likelihood: medium
          impact: low
          mitigation: Use t.TempDir() for lightweight disposable repos. Git init + commit is fast (~100ms).
