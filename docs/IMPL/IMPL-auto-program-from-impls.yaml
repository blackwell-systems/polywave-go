title: "Auto-generate PROGRAM manifests from existing IMPL docs with disjointness analysis"
feature_slug: auto-program-from-impls
verdict: SUITABLE
state: REVIEWED

suitability_assessment: |
  1. File decomposition: 6 new files + 1 modified file (main.go for command registration).
     Work splits cleanly into 3 agents across 2 waves with disjoint file ownership.

  2. Investigation-first items: None. The feature is well-defined with clear inputs
     (IMPL docs) and outputs (PROGRAM manifest). All relevant types and patterns
     already exist in the codebase.

  3. Interface discoverability: Yes. The core function signature (CheckIMPLConflicts)
     and the CLI command structure can be fully specified before implementation.
     The PROGRAMManifest schema already exists and must be reused as-is.

  4. Pre-implementation status check:
     - import-impls command exists with tier assignment logic (computeTierAssignments) -
       this is the PARTIAL baseline. The new create-program command reuses much of this
       logic but adds cross-IMPL conflict detection as a standalone function and a
       more streamlined UX (slug-based input instead of file paths).
     - ValidateP1FileDisjointness exists in protocol/program_validation.go - DONE,
       reusable for cross-IMPL checks.
     - PROGRAMManifest types, ParseProgramManifest, ValidateProgram all exist - DONE.

  5. Parallelization value check:
     - Build/test cycle: go build + go test takes ~15-30s for this repo.
     - Files per agent: 2-3 files each.
     - Agent independence: Wave 1 has 2 fully parallel agents, Wave 2 has 1 agent
       depending on both.
     - Task complexity: Non-trivial logic (graph coloring for tier assignment,
       conflict detection across multiple IMPL docs).

  Estimated times:
  - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~15 min (2 agents x 10 min Wave 1 parallel, 1 agent x 8 min Wave 2)
  - Merge and verification: ~3 min
  Total SAW time: ~26 min

  Sequential baseline: ~38 min (3 agents x 10 min avg + overhead)
  Time savings: ~12 min (32% faster)

  Recommendation: Clear speedup. Proceed.

