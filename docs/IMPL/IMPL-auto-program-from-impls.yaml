scaffolds: []
# No scaffolds needed. The new ConflictReport type is defined and consumed within
# a single package (pkg/protocol). No cross-agent type sharing required.

interface_contracts:
  - name: CheckIMPLConflicts
    description: |
      Cross-IMPL file ownership conflict detection. Loads IMPL docs by slug,
      extracts file_ownership entries, and detects overlapping files across IMPLs.
      Returns a structured report with per-file overlap details and suggested
      tier assignments.
    definition: |
      // ConflictReport describes cross-IMPL file ownership overlaps.
      type ConflictReport struct {
          Conflicts     []IMPLFileConflict `json:"conflicts"`
          DisjointSets  [][]string         `json:"disjoint_sets"`  // groups of mutually disjoint IMPL slugs
          TierSuggestion map[string]int    `json:"tier_suggestion"` // slug -> suggested tier
      }

      // IMPLFileConflict describes a single file owned by multiple IMPLs.
      type IMPLFileConflict struct {
          File  string   `json:"file"`
          Impls []string `json:"impls"` // slugs of IMPLs that own this file
          Repos []string `json:"repos,omitempty"` // repo fields if present
      }

      // CheckIMPLConflicts loads IMPL docs and performs cross-IMPL disjointness analysis.
      // implSlugs: list of IMPL slugs to analyze (resolved from docs/IMPL/ and docs/IMPL/complete/)
      // repoPath: repository root for resolving IMPL doc paths
      func CheckIMPLConflicts(implSlugs []string, repoPath string) (*ConflictReport, error)
    location: pkg/protocol/program_conflict.go

  - name: GenerateProgramFromIMPLs
    description: |
      Creates a minimal PROGRAM manifest from a list of IMPL slugs.
      Uses CheckIMPLConflicts for tier assignment and populates all
      required PROGRAMManifest fields.
    definition: |
      // GenerateProgramOpts configures automatic PROGRAM generation.
      type GenerateProgramOpts struct {
          ImplSlugs   []string // IMPL slugs to include
          RepoPath    string   // repository root
          ProgramSlug string   // slug for the generated PROGRAM (auto-derived if empty)
          Title       string   // title for the generated PROGRAM (auto-derived if empty)
      }

      // GenerateProgramResult is the output of automatic PROGRAM generation.
      type GenerateProgramResult struct {
          ManifestPath    string                `json:"manifest_path"`
          ConflictReport  *ConflictReport       `json:"conflict_report"`
          TierAssignments map[string]int        `json:"tier_assignments"`
          Manifest        *PROGRAMManifest      `json:"manifest"`
          ValidationErrors []ValidationError    `json:"validation_errors,omitempty"`
      }

      // GenerateProgramFromIMPLs creates a PROGRAM manifest from existing IMPL docs.
      func GenerateProgramFromIMPLs(opts GenerateProgramOpts) (*GenerateProgramResult, error)
    location: pkg/protocol/program_generator.go

