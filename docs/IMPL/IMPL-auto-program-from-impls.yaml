waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A: Cross-IMPL Conflict Detection

          **What to implement:**
          Create `pkg/protocol/program_conflict.go` with the `CheckIMPLConflicts` function
          and supporting types (`ConflictReport`, `IMPLFileConflict`).

          **Types to define (exact signatures):**
          ```go
          type ConflictReport struct {
              Conflicts      []IMPLFileConflict `json:"conflicts"`
              DisjointSets   [][]string         `json:"disjoint_sets"`
              TierSuggestion map[string]int     `json:"tier_suggestion"`
          }

          type IMPLFileConflict struct {
              File  string   `json:"file"`
              Impls []string `json:"impls"`
              Repos []string `json:"repos,omitempty"`
          }
          ```

          **Function signature:**
          ```go
          func CheckIMPLConflicts(implSlugs []string, repoPath string) (*ConflictReport, error)
          ```

          **Implementation details:**
          1. For each slug, resolve IMPL doc path using the pattern:
             - `docs/IMPL/IMPL-<slug>.yaml`
             - `docs/IMPL/complete/IMPL-<slug>.yaml`
             Use `protocol.Load()` to parse each IMPL doc.
          2. Build a map of `file -> []slug` from all IMPL docs' `FileOwnership` entries.
             When the `Repo` field is set on a FileOwnership entry, prefix the file path
             with the repo name to distinguish cross-repo files (e.g., `repoA:path/to/file`).
             Files with different `Repo` values are automatically disjoint.
          3. Detect conflicts: any file owned by 2+ IMPL slugs is a conflict.
          4. Compute `DisjointSets` using graph coloring: build an overlap graph where
             nodes are IMPL slugs and edges connect slugs that share files. Find connected
             components — each component's slugs overlap with each other but not with other
             components. Slugs with no overlaps are singleton sets.
          5. Compute `TierSuggestion` using greedy graph coloring on the overlap graph:
             assign each slug to the earliest tier where it has no conflicts with
             already-assigned slugs in that tier. This is identical to the algorithm in
             `computeTierAssignments` in `cmd/saw/import_impls_cmd.go` but operates on
             slugs instead of ImportedIMPL structs.

          **Tests** (`pkg/protocol/program_conflict_test.go`):
          - TestCheckIMPLConflicts_AllDisjoint: 3 IMPLs with no file overlap -> 0 conflicts,
            all in tier 1, 3 singleton disjoint sets
          - TestCheckIMPLConflicts_TwoOverlap: 3 IMPLs, A and B share a file, C is disjoint ->
            1 conflict, A and B in separate tiers, C in tier 1
          - TestCheckIMPLConflicts_ChainOverlap: A overlaps B, B overlaps C, A does not overlap C ->
            3 tiers not needed; A and C can be tier 1, B tier 2
          - TestCheckIMPLConflicts_MissingIMPL: slug that doesn't exist on disk -> error returned
          - TestCheckIMPLConflicts_CrossRepo: IMPLs with different repo: fields on same file path ->
            no conflict (different repos = disjoint)
          - TestCheckIMPLConflicts_Empty: empty slug list -> empty ConflictReport, no error

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./pkg/protocol/ && go test ./pkg/protocol/ -run TestCheckIMPLConflicts -v
          ```

          **Constraints:**
          - Do NOT modify any existing files.
          - Use `protocol.Load()` to parse IMPL docs (already exists in manifest.go).
          - The `TierSuggestion` algorithm must produce identical results to
            `computeTierAssignments` in import_impls_cmd.go for the same overlap graph.
          - Package: `package protocol`
        files:
          - pkg/protocol/program_conflict.go
          - pkg/protocol/program_conflict_test.go
        dependencies: []

      - id: B
        task: |
          ## Agent B: PROGRAM Manifest Generator

          **What to implement:**
          Create `pkg/protocol/program_generator.go` with the `GenerateProgramFromIMPLs`
          function and supporting types.

          **Types to define (exact signatures):**
          ```go
          type GenerateProgramOpts struct {
              ImplSlugs   []string
              RepoPath    string
              ProgramSlug string
              Title       string
          }

          type GenerateProgramResult struct {
              ManifestPath     string              `json:"manifest_path"`
              ConflictReport   *ConflictReport     `json:"conflict_report"`
              TierAssignments  map[string]int      `json:"tier_assignments"`
              Manifest         *PROGRAMManifest    `json:"manifest"`
              ValidationErrors []ValidationError   `json:"validation_errors,omitempty"`
          }
          ```

          **Function signature:**
          ```go
          func GenerateProgramFromIMPLs(opts GenerateProgramOpts) (*GenerateProgramResult, error)
          ```

          **Implementation details:**
          1. Call `CheckIMPLConflicts(opts.ImplSlugs, opts.RepoPath)` to get conflict report
             and tier suggestions. NOTE: This function will be implemented by another agent
             in the same wave. For compilation in isolation, create a minimal stub at the top
             of your file or in a separate file:
             ```go
             // Stub for compilation — Agent A implements the real version.
             // This will be replaced at merge time.
             ```
             Actually, since both agents are in Wave 1 with disjoint files, the merge will
             combine both. Your code should call `CheckIMPLConflicts` directly — it will
             compile after merge.

          2. For each slug, load the IMPL doc via `protocol.Load()` to extract:
             - Title, FeatureSlug, State (-> map to program status via same logic as
               `mapIMPLStateToStatus` in import_impls_cmd.go — reimplement the mapping
               as a helper in this file since it's in cmd/ not pkg/)
             - len(Waves) -> EstimatedWaves
             - sum of len(wave.Agents) across waves -> EstimatedAgents
             - Collect key_outputs from interface_contracts names

          3. Auto-derive ProgramSlug if empty: join all impl slugs with "-and-" if <=3,
             otherwise use "auto-program-" + first slug.

          4. Auto-derive Title if empty: "Auto-generated PROGRAM: " + comma-joined IMPL titles.

          5. Build PROGRAMManifest:
             - Title, ProgramSlug from opts or auto-derived
             - State: ProgramStateReviewed (auto-generated manifests skip PLANNING)
             - ProgramContracts: empty (no cross-IMPL contracts needed for disjoint IMPLs)
             - Impls: one ProgramIMPL per slug with tier from ConflictReport.TierSuggestion
             - Tiers: rebuilt from IMPL tier assignments (same pattern as rebuildTiers in
               import_impls_cmd.go — reimplement in pkg/protocol since it's in cmd/)
             - Completion: computed from IMPL count and statuses
             - Created/Updated: current timestamp in RFC3339 format

          6. Compute output path: `filepath.Join(opts.RepoPath, "docs", fmt.Sprintf("PROGRAM-%s.yaml", manifest.ProgramSlug))`

          7. Marshal to YAML and write to disk. Create parent directory if needed.

          8. Run `ValidateProgram(manifest)` and include any errors in result.ValidationErrors
             (non-fatal — the manifest is still written).

          **Tests** (`pkg/protocol/program_generator_test.go`):
          - TestGenerateProgramFromIMPLs_Basic: Create 2 temp IMPL docs with no overlap,
            call GenerateProgramFromIMPLs, verify manifest has 1 tier with both IMPLs,
            state is REVIEWED, completion counts correct.
          - TestGenerateProgramFromIMPLs_WithOverlap: 2 IMPLs sharing a file -> 2 tiers,
            DependsOn set on tier-2 IMPL.
          - TestGenerateProgramFromIMPLs_AutoSlug: Empty ProgramSlug -> auto-derived from
            IMPL slugs.
          - TestGenerateProgramFromIMPLs_WritesToDisk: Verify YAML file written to correct path.
          - TestGenerateProgramFromIMPLs_MissingIMPL: Non-existent slug -> error.

          For tests that need CheckIMPLConflicts to work: create real IMPL YAML files in
          a temp directory and use that as repoPath. The tests will exercise the full stack
          after merge.

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./pkg/protocol/ && go test ./pkg/protocol/ -run TestGenerateProgram -v
          ```

          **Constraints:**
          - Do NOT modify any existing files.
          - Package: `package protocol`
          - Reuse existing types: PROGRAMManifest, ProgramIMPL, ProgramTier, ProgramCompletion,
            ProgramState constants, ValidateProgram.
          - The generated manifest must pass ValidateProgram with zero errors for disjoint IMPLs.
          - Use `gopkg.in/yaml.v3` for marshaling (consistent with the rest of the codebase).
        files:
          - pkg/protocol/program_generator.go
          - pkg/protocol/program_generator_test.go
        dependencies: []

  - number: 2
    agents:
      - id: C
        task: |
          ## Agent C: CLI Command and Registration

          **What to implement:**
          Create `cmd/saw/create_program_cmd.go` with the `sawtools create-program` command,
          and register it in `cmd/saw/main.go`.

          **CLI interface:**
          ```
          sawtools create-program --from-impls <slug1> <slug2> [slug3 ...] [--repo-dir <path>] [--slug <program-slug>] [--title <title>]
          ```

          **Implementation details:**
          1. Create `newCreateProgramCmd() *cobra.Command` with:
             - Use: "create-program"
             - Short: "Auto-generate a PROGRAM manifest from existing IMPL docs"
             - Flags:
               - `--from-impls` ([]string, required): IMPL slugs to include
               - `--slug` (string, optional): Override program slug
               - `--title` (string, optional): Override program title
             - The `--repo-dir` flag is already available as the package-level `repoDir`
               variable from root.go's persistent flag.

          2. In RunE:
             a. Validate that --from-impls has at least 2 slugs (single IMPL doesn't need a PROGRAM).
             b. Call `protocol.GenerateProgramFromIMPLs(protocol.GenerateProgramOpts{...})`.
             c. Print the result as JSON to stdout (same pattern as import_impls_cmd.go).
             d. If there are validation errors, print them to stderr but still exit 0
                (the manifest was written).
             e. If ConflictReport has conflicts, print a summary to stderr:
                "Note: N file conflicts detected across IMPLs. IMPLs assigned to separate tiers."

          3. Also create a `newCheckIMPLConflictsCmd() *cobra.Command` as a standalone
             validation command:
             ```
             sawtools check-impl-conflicts --impls <slug1> <slug2> [--repo-dir <path>]
             ```
             - Calls `protocol.CheckIMPLConflicts(slugs, repoDir)`
             - Prints ConflictReport as JSON
             - Exit code 1 if conflicts found, 0 if all disjoint

          4. Register BOTH commands in main.go:
             - Add `newCreateProgramCmd(),` to the rootCmd.AddCommand block
             - Add `newCheckIMPLConflictsCmd(),` to the rootCmd.AddCommand block

          **Tests** (`cmd/saw/create_program_cmd_test.go`):
          - TestCreateProgramCmd_MissingFromImpls: No --from-impls flag -> error
          - TestCreateProgramCmd_SingleImpl: Only 1 slug -> error ("need at least 2")
          - TestCheckIMPLConflictsCmd_NoConflicts: 2 disjoint IMPLs -> exit 0
          - TestCheckIMPLConflictsCmd_WithConflicts: 2 overlapping IMPLs -> exit 1

          For tests, create temp IMPL YAML files in t.TempDir()/docs/IMPL/ and use
          cmd.SetArgs() + cmd.Execute() pattern (same as other *_cmd_test.go files in this package).

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./cmd/saw/ && go test ./cmd/saw/ -run "TestCreateProgram|TestCheckIMPLConflicts" -v
          ```

          **Constraints:**
          - Only modify main.go to add 2 lines (the AddCommand calls).
          - Follow the exact same patterns as import_impls_cmd.go for JSON output,
            error handling, and flag setup.
          - The package-level `repoDir` variable from root.go is used for --repo-dir;
            do not add a local repoDir flag.
          - Package: `package main`
        files:
          - cmd/saw/create_program_cmd.go
          - cmd/saw/create_program_cmd_test.go
          - cmd/saw/main.go
        dependencies:
          - A
          - B

pre_mortem:
  overall_risk: low
  rows:
    - scenario: "Agent B calls CheckIMPLConflicts which is in Agent A's file — build fails in isolated worktree"
      likelihood: high
      impact: low
      mitigation: |
        Both agents are in Wave 1 with disjoint files. Agent B's code will reference
        CheckIMPLConflicts but cannot compile in isolation. Agent B's tests should use
        real IMPL files on disk so they exercise the full stack after merge. The agent
        should note in its completion report that tests require merge with Agent A's work.
        The build gate runs post-merge, not per-worktree.
    - scenario: "Tier assignment algorithm produces different results than import-impls"
      likelihood: low
      impact: medium
      mitigation: |
        Agent A's implementation must use the identical greedy graph coloring algorithm
        from computeTierAssignments in import_impls_cmd.go. The task description explicitly
        references this algorithm and specifies it must produce identical results.
    - scenario: "Generated PROGRAM manifest fails ValidateProgram"
      likelihood: low
      impact: low
      mitigation: |
        Agent B runs ValidateProgram as part of GenerateProgramFromIMPLs and includes
        errors in the result. Tests verify that disjoint IMPLs produce a manifest with
        zero validation errors.
