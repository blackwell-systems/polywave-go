pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A or B accidentally deletes or reorders an existing comment while expanding it, causing go vet to report a formatting issue or godoc to misrender.
          likelihood: low
          impact: low
          mitigation: |-
            The verification gate `go vet ./pkg/engine/...` and `go doc ./pkg/engine`
            catches rendering issues immediately. Agent task prompts instruct agents
            to verify `git diff --stat` shows no logic changes.
        - scenario: Agent C's new section in doc.go breaks the existing package comment structure (e.g., adds a second `package engine` line or malforms the comment block).
          likelihood: low
          impact: medium
          mitigation: |-
            `go vet` catches malformed package comments. The task prompt explicitly
            requires adding content inside the existing comment block before the
            `package engine` declaration.
        - scenario: StepGoWorkSetup or StepGoWorkRestore are added to finalize_steps.go by the gowork-lsp-setup wave before this IMPL completes, creating a merge conflict in finalize_steps.go.
          likelihood: low
          impact: medium
          mitigation: |-
            These two functions are explicitly noted as out of scope in both Agent A's
            task and Agent C's doc.go task. If the gowork wave merges first, Agent A
            should add placeholder doc comments for those two functions or leave them
            to the gowork wave. The gowork IMPL should be checked for ordering.
        - scenario: Agent B cannot find the exact line numbers for prepare.go helpers because the file is long and the offset references may drift.
          likelihood: low
          impact: low
          mitigation: |-
            Task prompt references function names, not line numbers. Agent B can use
            grep or go to definition to locate each function.
