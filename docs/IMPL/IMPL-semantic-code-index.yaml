pre_mortem:
  overall_risk: medium
  rows:
    - scenario: >
        go-tree-sitter module not in go.mod. The design doc specifies
        github.com/tree-sitter/go-tree-sitter but Agent C uses go/ast instead.
        If a later tier adds go-tree-sitter, it may conflict with go/ast-based
        Symbol extraction logic in go_parser.go.
      likelihood: low
      impact: medium
      mitigation: >
        Agent C is explicitly instructed to use go/ast (standard library) and NOT
        add go-tree-sitter to go.mod. The go/ast approach is documented as the
        Tier 1 strategy; Tier 2 would add tree-sitter for non-Go languages.
        go_parser.go is a single file — replacing its internals in Tier 2 is safe.

    - scenario: >
        Agent B and Agent C both import pkg/codeindex but run in parallel worktrees.
        If Agent A's wave 1 does not merge cleanly before wave 2 launches, both
        agents will see an empty pkg/codeindex/ directory.
      likelihood: low
      impact: high
      mitigation: >
        Wave structure enforces wave 1 completes and merges before wave 2 launches.
        Both B and C depend on A. The orchestrator's prepare-wave step verifies
        the dependency constraint before creating worktrees.

    - scenario: >
        InsertSymbol in store.go and ParseGoFile in go_parser.go must agree on
        the Symbol struct field layout. If Agent B writes InsertSymbol before
        Agent A's types.go is finalized, field mismatches occur.
      likelihood: low
      impact: high
      mitigation: >
        Agent A owns types.go exclusively (wave 1). B and C both read types.go
        before implementing (explicit instruction in their prompts). The interface
        contracts section defines the exact Symbol struct fields as a binding spec.

    - scenario: >
        QueryCallers JOIN logic in query.go is complex (JOIN on symbol_id +
        callee_name). Incorrect SQL will pass compilation but fail at test time.
      likelihood: medium
      impact: low
      mitigation: >
        Agent B's task includes explicit SQL guidance and a test requirement for
        QueryCallers that inserts a symbol with a caller ref and verifies retrieval.
        Using ":memory:" SQLite for tests enables fast iteration.

    - scenario: >
        main.go (Agent E, integration wave) has 100+ AddCommand lines; inserting
        in the wrong location causes a compile error from a missing comma or
        mismatched parenthesis.
      likelihood: low
      impact: low
      mitigation: >
        Agent E is instructed to read main.go before editing and to add after the
        existing newVerifyInstallCmd() line. The integration wave runs on the merged
        main branch (no worktree isolation), so the agent has the full current state.
