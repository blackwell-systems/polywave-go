title: 'Semantic Code Index'
feature_slug: semantic-code-index
verdict: SUITABLE
suitability_assessment: |
  File decomposition: 9+ distinct new files across 2 packages (pkg/codeindex/,
  cmd/polywave-tools/), cleanly partitioned into types/schema, storage/query, parser/indexer,
  and CLI layers. Disjoint ownership is achievable.

  Investigation-first items: None. Design doc fully specifies the schema, storage,
  CLI interface, and integration points. No root cause analysis needed.

  Interface discoverability: All cross-agent interfaces are defined by the design doc.
  Symbol, Ref, IndexDB types can be fully specified before implementation starts.
  The SQLite schema and query layer contract is deterministic.

  Pre-implementation status: Feature is entirely unimplemented as of 2026-03-25
  (confirmed by design doc status note). No pkg/codeindex/ package exists, no
  tree-sitter dependency, no index-codebase or query-symbols CLI commands.

  Parallelization value: 4 agents, build/test cycle ~30s for Go, average 3+ files
  per agent. Wave 1 (types/schema) runs alone and is fast; Wave 2 (storage + parser)
  parallelizes the two heaviest implementation tasks; Wave 3 (CLI) and integration
  are sequential but light. Clear speedup over sequential.

  Note: github.com/tree-sitter/go-tree-sitter and tree-sitter language grammars
  (tree-sitter-go grammar package) are NOT currently in go.mod. Agent C must
  run `go get` to add them, or the indexer must be written to use a fallback
  go/ast-based approach when tree-sitter is unavailable. Given the design doc
  explicitly requires the official CGo-free binding, Agent C must add the
  dependency. This is documented as a risk below.

  Tier scope: This IMPL covers Tier 1 only (index schema + query layer + Go grammar
  + CLI + scaffolded Scout integration). Tier 2 (TypeScript, Python, Rust grammars +
  E25 wiring) is out of scope.

  Estimated times:
  - Scout phase: ~10 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~40 min (4 agents x ~10 min avg, accounting for parallelism in wave 2)
  - Merge and verification: ~5 min
  Total Polywave time: ~55 min

  Sequential baseline: ~80 min (4 agents x 20 min avg sequential)
  Time savings: ~25 min (~31% faster)

  Recommendation: Clear speedup. Proceed with parallelization.

test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./...
      required: true

