pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            `go work init .` or `go work use` subprocess fails in a worktree context because
            the go binary version doesn't support go workspaces (requires Go 1.18+).
          likelihood: low
          impact: low
          mitigation: |-
            Both step functions are non-fatal — failures log warnings and return status
            "warning" but do not fail the wave. The go.mod check confirms it's a Go repo
            but doesn't gate on Go version; callers get a warning and continue.
        - scenario: |-
            Agent B calls `StepGoWorkSetup` before Agent A has created the file, causing
            a compile error in prepare.go.
          likelihood: high
          impact: medium
          mitigation: |-
            Both agents are in Wave 1 and work in isolated worktrees. Agent B modifies
            prepare.go to call `StepGoWorkSetup(...)` — this will compile in Agent B's
            worktree because the Go compiler only checks at build time. Agent A creates
            gowork_steps.go in its worktree. After merge of both branches, the combined
            codebase compiles. The verify-build step catches any issues. Agents should
            NOT compile the full binary in isolation — only their owned packages.
        - scenario: |-
            go.work file left behind if finalize-wave crashes or is interrupted between
            merge and StepGoWorkRestore.
          likelihood: low
          impact: low
          mitigation: |-
            The go.work file is dev-only tooling (gopls). Leaving it behind doesn't break
            builds. The next prepare-wave run will back it up again and overwrite it.
            A user can also manually delete it.
        - scenario: |-
            In cross-repo IMPLs, the `for _, repoPath := range repos { break }` pattern
            picks a non-deterministic repo to run restore on.
          likelihood: low
          impact: low
          mitigation: |-
            go.work is at the primary repo root. For cross-repo IMPLs, the primary repo
            is opts.RepoPath. The `repos` map always includes "." -> opts.RepoPath for
            single-repo IMPLs. For cross-repo, the restore should use opts.RepoPath
            directly instead of ranging the map. Agent B should use `opts.RepoPath`
            directly in the StepGoWorkRestore call rather than ranging repos.
        - scenario: |-
            Agent B's changes to prepare.go introduce a same-package duplicate of a helper
            function that Agent A also defines (e.g., loggerFrom).
          likelihood: low
          impact: medium
          mitigation: |-
            Both agents are told explicitly: Agent A creates gowork_steps.go (new file),
            Agent B modifies prepare.go (existing file). loggerFrom is in finalize_steps.go
            (not in either agent's file). No duplicate risk for loggerFrom. The only
            cross-package symbol is StepGoWorkSetup/StepGoWorkRestore, defined by A and
            called by B — no duplication possible.
state: SCOUT_PENDING
injection_method: hook
