pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A adds CodeConfigIOFailed to pkg/result/codes.go but picks an N-slot
            that conflicts with a constant added by a concurrent wave or already present.
          likelihood: low
          impact: medium
          mitigation: |-
            The current codes.go has N001-N084 defined. Agent A scans for the next free
            slot above N084 and uses N085. Since no other wave touches codes.go in this
            IMPL, no conflict is possible. The agent's brief says "N085 or next available"
            so the agent must grep the file before adding.
        - scenario: |-
            Agent C's new configfile_test.go adds it to pkg/agent/backend, which is a
            package that may have existing test infrastructure or build constraints that
            make adding a new test file non-trivial.
          likelihood: low
          impact: low
          mitigation: |-
            The backend package is a standard Go package with no known test-incompatible
            build tags. The test file uses only os, path/filepath, testing, and json —
            all stdlib. If the package has a _test.go already with conflicting helpers,
            Agent C can use a distinct helper function name.
        - scenario: |-
            Removing GateResults from WaveState breaks a caller outside pkg/config
            that references the field (e.g., a web app or CLI command that reads
            WaveState.GateResults).
          likelihood: low
          impact: medium
          mitigation: |-
            GateResults is declared with omitempty and was never populated, so any caller
            that reads it would always get nil/zero. A grep of the codebase before
            starting will confirm no callers reference GateResults by field name. If any
            are found, the field should be kept with a deprecation comment instead.
        - scenario: |-
            pkg/config import cycle: Agent C adds config import to pkg/agent/backend,
            which may create a circular dependency if pkg/config already imports
            pkg/agent/backend or anything it depends on.
          likelihood: low
          impact: high
          mitigation: |-
            Agent C must verify the import graph before adding the import:
            run `go list -f '{{.Imports}}' github.com/blackwell-systems/scout-and-wave-go/pkg/config`
            and confirm pkg/agent/backend is not in the transitive import set.
            If a cycle is detected, the fix is to keep findConfigFile as a private
            duplicate and add a comment referencing the canonical implementation.
