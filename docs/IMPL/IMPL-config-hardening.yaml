title: pkg/config Code Review Hardening
feature_slug: config-hardening
verdict: SUITABLE
suitability_assessment: |
    9 code-review findings across 4 files. Pre-implementation status check:

    Issue 1 (CRITICAL — 0600 perms after atomic write): TODO. Save() performs
    temp-file + rename but never calls os.Chmod on the final path.

    Issue 2 (HIGH — nil manifest guard): TODO. GetWaveState and GetAllWaveStates
    dereference manifest.Waves and manifest.CompletionReports without a nil check;
    a nil pointer passed by a caller panics immediately.

    Issue 3 (HIGH — propagate legacy migration errors): TODO. The two json.Unmarshal
    calls in the legacy repo migration block (lines 161, 167) silently ignore errors
    via `:= json.Unmarshal(...); err == nil` guards. If those fail for unexpected
    reasons the migration is silently skipped; errors should be logged at minimum.

    Issue 4 (HIGH — consolidate walk-up logic): PARTIAL. FindConfigPath already
    exists in pkg/config/config.go (exported, complete). pkg/autonomy/config.go
    still has its own inline walk (filepath.Join + os.Stat loop). pkg/agent/backend/
    configfile.go has findConfigFile (unexported duplicate). Both callers need to
    be updated to call config.FindConfigPath.

    Issue 5 (MEDIUM — autonomy.SaveConfig key preservation): DONE. Current
    pkg/autonomy/config.go SaveConfig (lines 88–99) already reads the existing
    file into `raw map[string]any`, unmarshals it, updates the "autonomy" key,
    and writes the full map back. No fix needed. Agent C will add a test confirming
    this behavior.

    Issue 6 (MEDIUM — remove dead GateResults field): TODO. WaveState.GateResults
    is declared but never populated anywhere in the codebase.

    Issue 7 (MEDIUM — wave number context in errors): TODO. GetAllWaveStates
    returns the raw error from GetWaveState with no wave-number context added.

    Issue 8 (LOW — slog.Warn in LoadOrDefault): TODO. LoadOrDefault silently falls
    back to defaults with no log output.

    Issue 9 (LOW — distinct error codes in Save()): TODO. All Save() error paths
    use CodeConfigInvalid (N014); JSON marshal failures should be distinguished
    from filesystem I/O failures.

    File decomposition: 3 agents with fully disjoint ownership.
    Agent A: pkg/config/config.go + config_test.go  (issues 1, 3, 8, 9)
    Agent B: pkg/config/state.go + state_test.go    (issues 2, 6, 7)
    Agent C: pkg/autonomy/config.go + pkg/agent/backend/configfile.go (issue 4)
    All agents are independent; single wave.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~3 agents x ~10 min avg, parallel = ~10 min
    - Merge and verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~3 agents x 12 min = ~36 min
    Time savings: ~13 min (36% faster)

    Recommendation: Clear speedup. All agents are fully independent and can run
    in parallel in a single wave.
test_command: go test ./pkg/config/... ./pkg/autonomy/... ./pkg/agent/backend/...
lint_command: go vet ./...
file_ownership:
    - file: pkg/config/config.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/config/config_test.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/result/codes.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/config/state.go
      agent: B
      wave: 1
      action: modify
    - file: pkg/config/state_test.go
      agent: B
      wave: 1
      action: modify
    - file: pkg/autonomy/config.go
      agent: C
      wave: 1
      action: modify
    - file: pkg/agent/backend/configfile.go
      agent: C
      wave: 1
      action: modify
