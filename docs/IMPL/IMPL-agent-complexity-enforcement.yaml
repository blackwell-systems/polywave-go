title: 'Agent Complexity Enforcement'
feature_slug: agent-complexity-enforcement
verdict: SUITABLE
suitability_assessment: |
  This feature adds advisory complexity warnings across 5 layers: a new W001 warning code,
  a CheckAgentComplexity function wired into Validate(), critic-agent.md criteria, and
  scout.md sizing guidance. The work cleanly decomposes across disjoint files.

  File decomposition: 5+ distinct files across 2 repos. Wave 1 handles Go code changes
  (pkg/result/codes.go, pkg/protocol/complexity.go, pkg/protocol/validation.go). Wave 2
  handles protocol-repo prompt files (critic-agent.md, scout.md) which have no Go
  build dependency. Layer 5 (validate command output) is confirmed free — validate_cmd.go
  already surfaces all warnings returned by Validate(), so no code change is needed there.

  All interfaces are fully specifiable before implementation: CheckAgentComplexity signature,
  W001 constant name and value, and the exact warning conditions (>8 files, >5 new files).

  Parallelization value: Wave 1 has 2 parallel Go agents. Go build+test cycle is ~10-20s.
  Tasks are non-trivial (new function, new constant, test file). Wave 2 is docs-only (2
  parallel agents editing markdown files). Clear speedup over sequential for the Go agents.

  Estimated times:
  - Scout phase: ~10 min
  - Agent execution: ~15 min (Wave 1: 2 agents x ~10 min parallel; Wave 2: 2 agents x ~5 min parallel)
  - Merge and verification: ~5 min
  Total SAW time: ~30 min
  Sequential baseline: ~40 min (4 agents x 10 min)
  Time savings: ~10 min (25% faster)
  Recommendation: Clear speedup for Go agents. Proceed.

test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./...
      required: true

scaffolds: []

interface_contracts:
  - name: CheckAgentComplexity
    description: |-
      Checks per-agent file counts in an IMPLManifest and returns advisory warnings.
      Never returns errors — complexity is advisory only. Called from Validate().
    definition: |
      // CheckAgentComplexity returns W001_AGENT_SCOPE_LARGE warnings for any agent
      // that owns more than 8 files total, or creates more than 5 new files.
      // Warnings are advisory — they do not block execution.
      func CheckAgentComplexity(m *IMPLManifest) []result.SAWError
    location: pkg/protocol/complexity.go

  - name: CodeAgentScopeLarge
    description: Warning code constant for W001 agent scope advisory warning.
    definition: |
      // CodeAgentScopeLarge is emitted when an agent owns more than 8 files
      // or creates more than 5 new files. Severity is always "warning".
      const CodeAgentScopeLarge = "W001_AGENT_SCOPE_LARGE"
    location: pkg/result/codes.go

file_ownership:
  - file: pkg/result/codes.go
    agent: A
    wave: 1
    action: modify
    repo: scout-and-wave-go

  - file: pkg/protocol/complexity.go
    agent: B
    wave: 1
    action: new
    repo: scout-and-wave-go

  - file: pkg/protocol/complexity_test.go
    agent: B
    wave: 1
    action: new
    repo: scout-and-wave-go

  - file: pkg/protocol/validation.go
    agent: B
    wave: 1
    action: modify
    repo: scout-and-wave-go

  - file: implementations/claude-code/prompts/agents/critic-agent.md
    agent: C
    wave: 2
    action: modify
    repo: scout-and-wave

  - file: implementations/claude-code/prompts/agents/scout.md
    agent: D
    wave: 2
    action: modify
    repo: scout-and-wave

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Context
          You are implementing Layer 1 of agent complexity enforcement: adding warning code
          constant W001_AGENT_SCOPE_LARGE to pkg/result/codes.go.

          ## Repository
          /Users/dayna.blackwell/code/scout-and-wave-go

          ## What to implement

          In `pkg/result/codes.go`, add a new "Warning codes" section (W001-W099 range) after
          the existing validation error codes block (V001-V099). Add the following constant:

          ```go
          // Warning codes (W001-W099) — advisory only, never block execution
          const (
              // CodeAgentScopeLarge is emitted when an agent owns more than 8 files
              // or creates more than 5 new files. Severity is always "warning".
              CodeAgentScopeLarge = "W001_AGENT_SCOPE_LARGE"
          )
          ```

          Place this block after the `CodeP1Violation = "V035_P1_VIOLATION"` line and before
          the build error codes section (B001-B099).

          ## Interface contract
          The constant name must be exactly: `CodeAgentScopeLarge`
          The code string must be exactly: `"W001_AGENT_SCOPE_LARGE"`
          This is consumed by Agent B's complexity.go implementation.

          ## Tests
          No test file for codes.go exists (constants need no behavioral test). Verify the
          file compiles: `go build ./pkg/result/...`

          ## Verification gate
          1. go build ./pkg/result/...
          2. go vet ./pkg/result/...

          ## Constraints
          - Do not modify any existing constants
          - Do not change the package declaration or existing imports
          - Only add the new W001 block; do not add any other constants
        files:
          - pkg/result/codes.go
        dependencies: []

      - id: B
        task: |
          ## Context
          You are implementing Layer 1 of agent complexity enforcement: a new
          CheckAgentComplexity function wired into the existing Validate() function.

          ## Repository
          /Users/dayna.blackwell/code/scout-and-wave-go

          ## What to implement

          ### File 1: pkg/protocol/complexity.go (NEW)

          Create a new file in the protocol package implementing `CheckAgentComplexity`.

          The function signature (binding contract — do not alter):
          ```go
          package protocol

          import (
              "fmt"
              "github.com/blackwell-systems/scout-and-wave-go/pkg/result"
          )

          // CheckAgentComplexity returns W001_AGENT_SCOPE_LARGE warnings for any agent
          // that owns more than 8 files total, or creates more than 5 new files.
          // Warnings are advisory — they do not block execution.
          func CheckAgentComplexity(m *IMPLManifest) []result.SAWError
          ```

          Implementation logic:
          1. Build a per-agent file count map from m.FileOwnership:
             - Count total files owned per agent (any wave)
             - Count new files per agent (where FileOwnership.Action == "new")
          2. For each agent with total files > 8: emit a warning with:
             - Code: result.CodeAgentScopeLarge (the constant from pkg/result/codes.go)
             - Message: fmt.Sprintf("agent %s owns %d files (threshold: 8) — consider splitting into two agents", agentID, count)
             - Severity: "warning"
             - Field: "file_ownership"
          3. For each agent with new files > 5: emit a warning with:
             - Code: result.CodeAgentScopeLarge
             - Message: fmt.Sprintf("agent %s creates %d new files (threshold: 5) — consider splitting into two agents", agentID, newCount)
             - Severity: "warning"
             - Field: "file_ownership"
          4. Return the warnings slice (may be empty, never nil errors)

          Note: An agent may trigger both warnings (total > 8 AND new > 5). Emit both.

          IMPORTANT: result.CodeAgentScopeLarge is implemented by Agent A in the same wave.
          Since both agents run in parallel worktrees, the constant may not be available at
          compile time in your worktree. If `go build` fails because CodeAgentScopeLarge is
          undefined, use the string literal "W001_AGENT_SCOPE_LARGE" directly and add a TODO
          comment: `// TODO: replace with result.CodeAgentScopeLarge after wave merge`.

          ### File 2: pkg/protocol/complexity_test.go (NEW)

          Write table-driven tests covering:
          - Agent with 9 files owned → expect 1 warning (code W001_AGENT_SCOPE_LARGE)
          - Agent with 8 files owned → expect 0 warnings (at threshold, not over)
          - Agent with 6 new files (action: "new") → expect 1 warning
          - Agent with 5 new files → expect 0 warnings (at threshold, not over)
          - Agent with 9 total AND 6 new → expect 2 warnings
          - Empty manifest → expect 0 warnings
          - Two agents: one with 9 files, one with 3 → only oversized agent warns

          ### File 3: pkg/protocol/validation.go (MODIFY)

          Wire CheckAgentComplexity into the existing Validate() function.
          Add one line at the end of the errs append chain, after:
            errs = append(errs, validateKnownIssueTitles(m)...)

          Add:
            errs = append(errs, CheckAgentComplexity(m)...)

          Do NOT modify any other part of validation.go.

          ## Interface contracts consumed
          - `result.CodeAgentScopeLarge` from pkg/result/codes.go (Agent A, same wave)
          - `IMPLManifest` from pkg/protocol/types.go (exists)
          - `FileOwnership` struct fields: File, Agent, Wave, Action, Repo, DependsOn

          ## Verification gate
          1. go build ./pkg/protocol/...
          2. go vet ./pkg/protocol/...
          3. go test ./pkg/protocol/... -run TestCheckAgentComplexity

          ## Constraints
          - CheckAgentComplexity must never return severity "error" — always "warning"
          - Do not modify any existing validation function signatures
          - The result.SAWError struct fields: Code, Message, Severity, Field, Line, Context
        files:
          - pkg/protocol/complexity.go
          - pkg/protocol/complexity_test.go
          - pkg/protocol/validation.go
        dependencies: []

  - number: 2
    agents:
      - id: C
        task: |
          ## Context
          You are implementing Layer 3 of agent complexity enforcement: adding complexity
          balance criteria to the E37 critic agent prompt.

          ## Repository
          /Users/dayna.blackwell/code/scout-and-wave

          ## File to modify
          implementations/claude-code/prompts/agents/critic-agent.md
          (absolute path: /Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/agents/critic-agent.md)

          NOTE: After editing the protocol repo source, also update the installed copy:
          /Users/dayna.blackwell/.claude/skills/saw/agents/critic-agent.md
          (copy the same change there so the installed skill stays in sync)

          ## What to implement

          Add a new "Check 7: complexity_balance" section immediately after the existing
          "Check 6: side_effect_completeness" section (ends around "If a required
          registration is missing, severity: warning...").

          Insert the following text verbatim after Check 6:

          ### Check 7: complexity_balance
          For each agent in the IMPL doc, count the total files in file_ownership assigned
          to that agent. Also count total files across all agents.
          - Any agent owning more than 8 files: severity: warning, check: complexity_balance,
            description: "Agent X owns N files — exceeds 8-file threshold; consider splitting"
          - Any agent owning more than 40% of total files in the IMPL: severity: warning,
            check: complexity_balance,
            description: "Agent X owns N of M total files (P%) — consider rebalancing"
          These are advisory warnings, not errors. They do not block a PASS verdict.

          ## Verification gate
          Read the file back and confirm:
          1. "Check 7: complexity_balance" section exists after Check 6
          2. The 8-file threshold is present
          3. The 40% threshold is present
          4. Severity is listed as "warning"

          ## Constraints
          - Do not modify any existing check sections (1-6)
          - Do not change the file frontmatter/header
          - Do not change the Output Format Summary or Rules sections
          - Only add the new Check 7 section
        files:
          - implementations/claude-code/prompts/agents/critic-agent.md
        dependencies: []

      - id: D
        task: |
          ## Context
          You are implementing Layer 4 of agent complexity enforcement: adding agent sizing
          guidance to the Scout agent prompt.

          ## Repository
          /Users/dayna.blackwell/code/scout-and-wave

          ## File to modify
          implementations/claude-code/prompts/agents/scout.md
          (absolute path: /Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/agents/scout.md)

          NOTE: After editing the protocol repo source, also update the installed copy:
          /Users/dayna.blackwell/.claude/skills/saw/agents/scout.md
          (copy the same change there so the installed skill stays in sync)

          ## What to implement

          Find the existing sizing guidance in the Rules section near the bottom of the file:

            - Prefer more agents with smaller scopes over fewer agents with larger ones.
              An agent owning 1-3 files is ideal. An agent owning 6+ files is a red flag.

          Replace that passage with:

            - Prefer more agents with smaller scopes over fewer agents with larger ones.
              Target 3-8 files per agent. An agent owning 1-3 files is ideal; 4-8 is
              acceptable. If an agent exceeds 8 owned files, split it: into two agents in
              the same wave if the files are independent, or across sequential waves if
              the files have a dependency ordering. The validator will warn
              (W001_AGENT_SCOPE_LARGE) when any agent exceeds 8 total files or creates
              more than 5 new files.

          ## Verification gate
          Read the file back and confirm:
          1. The 8-file threshold is present
          2. W001_AGENT_SCOPE_LARGE is mentioned
          3. The split guidance (same wave vs sequential waves) is present

          ## Constraints
          - Do not modify any other part of scout.md
          - Do not change the frontmatter/header
          - Only replace the one existing sizing passage with the expanded version
        files:
          - implementations/claude-code/prompts/agents/scout.md
        dependencies: []

pre_mortem:
  overall_risk: low
  rows:
    - scenario: Agent B cannot use result.CodeAgentScopeLarge because Agent A runs in a parallel worktree
      likelihood: medium
      impact: low
      mitigation: |-
        Agent B's task includes explicit fallback: use the string literal "W001_AGENT_SCOPE_LARGE"
        directly if the constant is unavailable at build time, with a TODO comment to switch to
        the constant after wave merge. This keeps Agent B unblocked.
    - scenario: Validate() warning output causes confusion since validate treats all SAWErrors as errors in exit code
      likelihood: low
      impact: low
      mitigation: |-
        CheckAgentComplexity returns severity "warning". The validate command surfaces all
        SAWErrors in the JSON output regardless of severity. The exit code is based on
        len(errs) > 0 — warnings will cause exit 1. If this is undesirable, a future change
        can filter by severity for exit code; document this as a known behavior in the PR.
    - scenario: Installed skill copies at ~/.claude/skills/saw/agents/ go out of sync with protocol repo source
      likelihood: medium
      impact: low
      mitigation: |-
        Agent C and D tasks explicitly include instructions to copy changes to the installed
        path after editing the protocol repo source. This is belt-and-suspenders — the
        protocol repo is the source of truth.
