title: 'Error Code Unification'
feature_slug: error-code-unification
verdict: SUITABLE
suitability_assessment: |
  Three error code systems exist today and must collapse into one. The work
  decomposes cleanly across files:

  1. File decomposition: Agent A owns pkg/result/codes.go (add constants).
     Agent B owns validation.go + fieldvalidation.go (migrate 15 hardcoded
     strings). Agent C owns the 4 schema validators (schema_validation.go,
     schema_cross_field.go, schema_enum_validation.go, reactions_validation.go
     + schema_unknown_keys.go). Agent D owns program_validation.go and
     program_generator.go. Agent E owns the 3 signature-change files
     (parser.go, integration.go, repo_resolve.go). Wave 2 Agent F owns
     engine/runner.go (depends on E's new return type) plus the legacy
     file deletions and error_codes_test.go deletion.

  2. No investigation-first items. Root cause is fully known; every call
     site is enumerated in the feature spec.

  3. Interface contracts are definable now. The only cross-agent contract
     is the new constants Agent A defines; all other agents consume them.
     The three function signature changes (ValidateInvariants,
     ValidateRepoMatch, ValidateIntegration) are defined below; Agent F
     updates the engine wrapper that calls them.

  4. Pre-implementation status: all 41 hardcoded sites are TODO. The two
     legacy files (error_codes.go, schema_errors.go) are fully populated
     and still in use, confirmed by grep.

  5. Parallelization value: Wave 1 has 5 independent agents, each touching
     3-10 files. go test ./... takes ~15-30s. Clear speedup.

  Estimated times:
  - Scout phase: ~15 min
  - Agent execution: Wave 1 ~5 agents x ~15 min, Wave 2 ~1 agent x ~10 min,
    mostly sequential within each agent but wave-parallel
  - Merge and verification: ~5 min
  Total SAW time: ~35 min
  Sequential baseline: ~90 min
  Time savings: ~55 min (~60% faster)
  Recommendation: Clear speedup. Proceed.

test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./...
      required: true

