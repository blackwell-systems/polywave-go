          ```go
          func ValidateInvariants(manifest *IMPLManifest) []result.SAWError {
              if manifest == nil {
                  return nil
              }

              ownershipByFile := make(map[string]FileOwnership, len(manifest.FileOwnership))
              for _, fo := range manifest.FileOwnership {
                  ownershipByFile[fo.File] = fo
              }

              var errs []result.SAWError
              for _, wave := range manifest.Waves {
                  seen := make(map[string]string)
                  for _, agent := range wave.Agents {
                      for _, file := range agent.Files {
                          repo := ""
                          if fo, ok := ownershipByFile[file]; ok {
                              repo = fo.Repo
                          }
                          key := repo + ":" + file
                          if prev, ok := seen[key]; ok {
                              errs = append(errs, result.SAWError{
                                  Code:     result.CodeI1Violation,
                                  Message:  fmt.Sprintf("I1 violation in Wave %d: file %q claimed by both Agent %s and Agent %s", wave.Number, file, prev, agent.ID),
                                  Severity: "error",
                                  Field:    "file_ownership",
                              })
                          }
                          seen[key] = agent.ID
                      }
                  }
              }
              return errs
          }
          ```

