            ```

            ### 3. `runScoutStructured` ŌĆö `pkg/engine/runner.go`

            Add an unexported function:

            ```go
            func runScoutStructured(ctx context.Context, opts RunScoutOpts, prompt string, onChunk func(string)) (*protocol.IMPLManifest, error)
            ```

            This function:
            1. Calls `protocol.GenerateScoutSchema()` (or uses `opts.OutputSchemaOverride` if set).
            2. Creates an API backend client: `apiClient := apiclient.New("", backend.Config{Model: opts.ScoutModel})`
               with `apiClient.WithOutputConfig(schema)`.
            3. Calls `runner.ExecuteStreaming(ctx, spec, opts.RepoPath, onChunk)` ŌĆö the runner
               uses the API backend; the final response is the JSON string from the model.
            4. Unmarshals the JSON response into `*protocol.IMPLManifest`:
               ```go
               var manifest protocol.IMPLManifest
               if err := json.Unmarshal([]byte(jsonStr), &manifest); err != nil {
                   return nil, fmt.Errorf("runScoutStructured: unmarshal: %w", err)
               }
               ```
            5. Writes the manifest to disk as YAML (the canonical on-disk format) at
               `opts.IMPLOutPath` using `protocol.Save(&manifest, opts.IMPLOutPath)`.
            6. Returns `&manifest, nil`.

            **Import additions for runner.go:**
            ```go
            apiclient "github.com/blackwell-systems/scout-and-wave-go/pkg/agent/backend/api"
            "encoding/json"
            ```

            **Wire into `RunScout`:** After building `prompt`, add:
            ```go
            if opts.UseStructuredOutput {
                _, execErr = runScoutStructured(ctx, opts, prompt, onChunk)
                return execErr
            }
            ```
