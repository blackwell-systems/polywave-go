interface_contracts:
    - definition: |
        // In struct IMPLManifest (pkg/protocol/types.go), add after Verdict:
        SuitabilityAssessment string `yaml:"suitability_assessment,omitempty" json:"suitability_assessment,omitempty"`
        CompletionDate        string `yaml:"completion_date,omitempty"        json:"completion_date,omitempty"`
      description: |
        Two new string fields added to protocol.IMPLManifest in pkg/protocol/types.go.
        These are present in real Scout-written YAML manifests but currently silently
        dropped on unmarshal. Both are Scout-output-only fields (not runtime state).
      location: pkg/protocol/types.go
      name: IMPLManifest (updated fields)
    - definition: |
        // pkg/protocol/schema.go
        func GenerateScoutSchema() (map[string]any, error)
      description: |
        Returns a JSON Schema map[string]any describing the Scout-output subset of
        IMPLManifest. Excludes runtime-only fields (completion_reports, stub_reports,
        merge_state, worktrees_created_at, frozen_contracts_hash, frozen_scaffolds_hash)
        so Scout output is validated against only the fields it actually writes.
        Uses invopop/jsonschema Reflector with AllowAdditionalProperties: false.
      location: pkg/protocol/schema.go
      name: GenerateScoutSchema
    - definition: |
        // Unexported helper type used inside GenerateScoutSchema only.
        // Fields must have json tags matching the yaml tags on IMPLManifest.
        type scoutOutputSchema struct {
          Title                 string               `json:"title"`
          FeatureSlug           string               `json:"feature_slug"`
          Verdict               string               `json:"verdict"`
          SuitabilityAssessment string               `json:"suitability_assessment,omitempty"`
          TestCommand           string               `json:"test_command"`
          LintCommand           string               `json:"lint_command"`
          State                 string               `json:"state,omitempty"`
          FileOwnership         []FileOwnership      `json:"file_ownership"`
          InterfaceContracts    []InterfaceContract  `json:"interface_contracts"`
          Waves                 []Wave               `json:"waves"`
          QualityGates          *QualityGates        `json:"quality_gates,omitempty"`
          Scaffolds             []ScaffoldFile       `json:"scaffolds,omitempty"`
          PreMortem             *PreMortem           `json:"pre_mortem,omitempty"`
          KnownIssues           []KnownIssue         `json:"known_issues,omitempty"`
          CompletionDate        string               `json:"completion_date,omitempty"`
        }
      description: |
        A stripped-down struct used only for schema generation ŌĆö mirrors IMPLManifest
        but omits runtime fields. Defined in pkg/protocol/schema.go alongside
        GenerateScoutSchema. Not exported for general use; it is unexported.
      location: pkg/protocol/schema.go
      name: ScoutOutputSchema
    - definition: |
        // In struct RunScoutOpts (pkg/engine/engine.go), add:
        UseStructuredOutput  bool           // if true, use API backend with output_config.format
        OutputSchemaOverride map[string]any // optional: overrides GenerateScoutSchema() result
      description: |
        Two new optional fields added to engine.RunScoutOpts enabling the structured
        output path. UseStructuredOutput activates the API backend path with
        output_config.format; OutputSchemaOverride replaces the default
        GenerateScoutSchema() result if provided (useful in tests).
      location: pkg/engine/engine.go
      name: RunScoutOpts (updated fields)
    - definition: |
        // pkg/engine/runner.go (unexported, called by RunScout)
        func runScoutStructured(ctx context.Context, opts RunScoutOpts, prompt string, onChunk func(string)) (*protocol.IMPLManifest, error)
      description: |
        Executes Scout via the Anthropic API backend with output_config.format JSON schema.
        Returns the parsed IMPLManifest directly ŌĆö no disk file parsing needed.
        Writes the YAML manifest and markdown IMPL doc to disk as side effects (I4).
        Called by RunScout when opts.UseStructuredOutput is true.
      location: pkg/engine/runner.go
      name: RunScoutStructured
    - definition: |
        // pkg/agent/backend/api/client.go
        func (c *Client) WithOutputConfig(schema map[string]any) *Client
      description: |
        Functional option on the API backend Client that sets output_config.format
        for all subsequent Run/RunStreaming calls. Returns *Client for chaining.
        Does not modify the original client ŌĆö call before handing to runner.
      location: pkg/agent/backend/api/client.go
      name: Client.WithOutputConfig
    - definition: |
        // pkg/api/scout.go ŌĆö IMPLOutPath switches extension based on UseStructuredOutput
        implOut := filepath.Join(repoRoot, "docs", "IMPL", "IMPL-"+slug+".yaml")  // when structured
        implOut := filepath.Join(repoRoot, "docs", "IMPL", "IMPL-"+slug+".md")    // fallback
      description: |
        When UseStructuredOutput is true in RunScoutOpts, the web API sets
        IMPLOutPath to a .yaml path (not .md), and after RunScout returns, the
        scout_complete event payload includes the YAML path and a parsed manifest
        struct for direct serving ŌĆö no ParseIMPLDoc call needed.
      location: pkg/api/scout.go
      name: runScoutAgent (web, updated)
