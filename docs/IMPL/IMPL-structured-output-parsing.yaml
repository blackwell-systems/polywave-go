            **Repo:** `scout-and-wave-go`

            ## Dependency Note

            - Agent A (Wave 1) adds `SuitabilityAssessment` and `CompletionDate` to `IMPLManifest`
              (needed when unmarshaling the structured response in runner.go). Wave 1 merges before
