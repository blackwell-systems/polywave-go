pre_mortem:
    overall_risk: medium
    rows:
        - impact: high
          likelihood: low
          mitigation: |
            Agent B tests the schema size by marshaling to JSON and logging byte count. If over 50KB, consider splitting the task field to a simple string type (it already is a string) and removing description annotations. The Anthropic API accepts schemas without description fields.
          scenario: |
            invopop/jsonschema DoNotReference: true inlines all nested type definitions but the resulting schema may be too large for Anthropic's output_config validation (size limit unknown). IMPLManifest has deeply nested types (Wave ŌåÆ Agent ŌåÆ task string; PreMortem ŌåÆ rows).
        - impact: medium
          likelihood: low
          mitigation: |
            Agent B's test explicitly checks that all property types in the generated schema are primitive JSON types (string, number, boolean, array, object). If time.Time leaks in via a nested type, add a custom jsonschema tag to override the type to "string".
          scenario: |
            The Anthropic API rejects the schema because it contains time.Time fields (even though worktrees_created_at is excluded from scoutOutputSchema). Nested types like QualityGate or ScaffoldFile may pull in unexpected types.
        - impact: medium
          likelihood: medium
          mitigation: |
            When UseStructuredOutput is true, the output_config.format schema enforces property names via JSON Schema. The model is constrained to use exactly the property names in the schema. No prompt-level instruction needed.
          scenario: |
            runScoutStructured unmarshals a JSON response where the model wrote valid JSON but with field names that don't match the struct tags (e.g., camelCase instead of snake_case). The IMPLManifest uses json:"feature_slug" etc. but Scout prompt instructions currently say nothing about JSON field names.
        - impact: medium
          likelihood: low
          mitigation: |
            The orchestrator runs `go get github.com/invopop/jsonschema@v0.13.0 && go mod tidy` in scout-and-wave-go after Agent B completes. The package is already in the local module cache (v0.13.0 confirmed). The web repo inherits it transitively via replace.
          scenario: |
            go.mod in scout-and-wave-web uses a replace directive pointing at the local scout-and-wave-go. After Wave 2 agents add invopop/jsonschema to scout-and-wave-go's go.mod, the web repo will pick it up transitively. But if the module cache doesn't have it, go build fails.
        - impact: low
          likelihood: high
          mitigation: |
            Agent D updates handleListImpls in the same wave to handle both extensions. No deployment gap ŌĆö the changes ship together.
          scenario: |
            The existing impl.go handleListImpls scans for .md only. After this change, new Scout runs produce .yaml files. Users with only .yaml files would see an empty list until Agent D's handleListImpls update is deployed.
