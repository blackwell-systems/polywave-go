      number: 1
    - agents:
        - dependencies:
            - A
          files:
            - pkg/protocol/schema.go
            - pkg/protocol/schema_test.go
          id: B
          task: |
            ## What to Implement

            Create `pkg/protocol/schema.go` in the `scout-and-wave-go` repo.
            This file provides `GenerateScoutSchema()` ŌĆö a function that returns a
            `map[string]any` JSON Schema describing the Scout-output subset of `IMPLManifest`.

            The schema is used by `pkg/engine/runner.go` (Agent C) to populate
            `anthropic.OutputConfigParam.Format.Schema` when invoking Scout via the API backend.

            **File to create:** `pkg/protocol/schema.go`
            **Test file to create:** `pkg/protocol/schema_test.go`

            ## Dependency Note

            Agent A adds `SuitabilityAssessment` and `CompletionDate` to `IMPLManifest` in Wave 1.
            This agent's schema struct must include those fields. Read `pkg/protocol/types.go`
            after Agent A completes (Wave 1 merges before Wave 2 starts).

            ## Interfaces to Implement

            ### `GenerateScoutSchema() (map[string]any, error)`

            Uses `github.com/invopop/jsonschema` to reflect a stripped-down struct
            `scoutOutputSchema` (unexported) that mirrors the Scout-output subset of
            `IMPLManifest`. Returns the JSON Schema as `map[string]any`.

            **Important:** The schema must omit these runtime-only fields from `IMPLManifest`:
            `completion_reports`, `stub_reports`, `merge_state`, `worktrees_created_at`,
            `frozen_contracts_hash`, `frozen_scaffolds_hash`.

            These fields are populated by the orchestrator after Scout runs ŌĆö they must not
            appear in the Scout output schema or Anthropic will reject the response.

            **`scoutOutputSchema` struct** (unexported, in schema.go only):

            ```go
            type scoutOutputSchema struct {
              Title                 string               `json:"title"`
              FeatureSlug           string               `json:"feature_slug"`
              Verdict               string               `json:"verdict"`
              SuitabilityAssessment string               `json:"suitability_assessment,omitempty"`
              TestCommand           string               `json:"test_command"`
              LintCommand           string               `json:"lint_command"`
              State                 string               `json:"state,omitempty"`
              FileOwnership         []FileOwnership      `json:"file_ownership"`
              InterfaceContracts    []InterfaceContract  `json:"interface_contracts"`
              Waves                 []Wave               `json:"waves"`
              QualityGates          *QualityGates        `json:"quality_gates,omitempty"`
              Scaffolds             []ScaffoldFile       `json:"scaffolds,omitempty"`
              PreMortem             *PreMortem           `json:"pre_mortem,omitempty"`
              KnownIssues           []KnownIssue         `json:"known_issues,omitempty"`
              CompletionDate        string               `json:"completion_date,omitempty"`
            }
            ```

            **Reflector configuration:**

            ```go
            r := &jsonschema.Reflector{
              AllowAdditionalProperties: false,
              DoNotReference:            true, // inline all $defs so the schema is a flat map[string]any
            }
            schema := r.Reflect(&scoutOutputSchema{})
            ```

            Convert the `*jsonschema.Schema` to `map[string]any` by marshaling to JSON
            and then unmarshaling into `map[string]any`. Return this map.

            **Important:** The `FileOwnership`, `InterfaceContract`, `Wave`, `Agent`,
            `QualityGates`, `QualityGate`, `ScaffoldFile`, `PreMortem`, `PreMortemRow`,
            and `KnownIssue` types are defined in `pkg/protocol/types.go` (the `protocol`
            package). Use them directly ŌĆö do not redefine them.

            ## Interfaces to Call

            - `github.com/invopop/jsonschema` ŌĆö add to `go.mod` in the orchestrator step;
              write the import and the code will compile once the dep is added.
            - `encoding/json` ŌĆö for schema-to-map conversion.
            - Types from `pkg/protocol/types.go` (same package): `FileOwnership`,
              `InterfaceContract`, `Wave`, `QualityGates`, `ScaffoldFile`, `PreMortem`, `KnownIssue`.

            ## Tests to Write

            **`pkg/protocol/schema_test.go`:**

            1. `TestGenerateScoutSchema_ReturnsSchema` ŌĆö call `GenerateScoutSchema()`, assert
               no error, assert returned map has key `"type"` = `"object"` or has `"properties"`,
               assert `"title"` key exists in properties.
            2. `TestGenerateScoutSchema_ExcludesRuntimeFields` ŌĆö assert the returned schema's
               `properties` map does NOT contain `"completion_reports"`, `"stub_reports"`,
               `"merge_state"`, `"worktrees_created_at"`, `"frozen_contracts_hash"`,
               `"frozen_scaffolds_hash"`.
            3. `TestGenerateScoutSchema_IncludesRequiredFields` ŌĆö assert `properties` contains
               `"feature_slug"`, `"verdict"`, `"waves"`, `"file_ownership"`.

            ## Verification Gate

            Run from `/Users/dayna.blackwell/code/scout-and-wave-go`:

            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/protocol/... -run TestGenerateScoutSchema
            ```

            Note: `invopop/jsonschema` must be in `go.mod` before this compiles. After writing
            the code, run `go get github.com/invopop/jsonschema@v0.13.0` and `go mod tidy` to
            update `go.mod` and `go.sum`. The orchestrator will commit these changes.

            ## Constraints

            - `scoutOutputSchema` is unexported. Do not export it.
            - `GenerateScoutSchema` is exported. It is called by `pkg/engine/runner.go`.
            - `DoNotReference: true` ensures the schema has no `$ref` pointers ŌĆö the Anthropic
              API requires a flat schema with no `$defs` section.
            - If `invopop/jsonschema` reflects `time.Time` to a `format: date-time` string,
              that is correct ŌĆö leave it. The `WorktreesCreatedAt` field is excluded anyway.
            - Do not use `Reflector.AddGoComments` ŌĆö it requires filesystem access to Go source.
