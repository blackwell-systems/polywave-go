            ## Interfaces to Implement

            ### 1. `Client.WithOutputConfig` ŌĆö `pkg/agent/backend/api/client.go`

            Add a field `outputSchema map[string]any` to the `Client` struct (unexported).
            Add `WithOutputConfig`:

            ```go
            // WithOutputConfig sets a JSON schema for output_config.format on all API calls.
            // When set, the Anthropic API returns validated JSON matching the schema.
            // Returns c (modified in place) for chaining.
            func (c *Client) WithOutputConfig(schema map[string]any) *Client {
                c.outputSchema = schema
                return c
            }
            ```

            In both `Run` and `RunStreaming`, when `c.outputSchema != nil`, set
            `params.OutputConfig` on `anthropic.MessageNewParams`:

            ```go
            if c.outputSchema != nil {
                params.OutputConfig = anthropic.OutputConfigParam{
                    Format: anthropic.JSONOutputFormatParam{
                        Schema: c.outputSchema,
                    },
                }
            }
            ```

            The `OutputConfig` field exists on `anthropic.MessageNewParams` (confirmed in SDK
