            ## Interfaces to Call

            - `protocol.GenerateScoutSchema()` from `pkg/protocol/schema.go` (Agent B, same wave)
            - `protocol.IMPLManifest` (Agent A's updated struct, Wave 1)
            - `protocol.Save()` from `pkg/protocol/manifest.go` (already exists)
            - `anthropic.OutputConfigParam`, `anthropic.JSONOutputFormatParam` from SDK
            - `apiclient "github.com/blackwell-systems/scout-and-wave-go/pkg/agent/backend/api"`

            ## Tests to Write

            No new test files. The web API integration (Agent D) tests the full path.
            Verify that:
            - `go build ./...` passes after adding the import for `apiclient`
            - The `runner_test.go` and `engine_test.go` files (if any exist) still pass

            Check `pkg/engine/runner_test.go` and adjust if any test mocks `RunScout` behavior
