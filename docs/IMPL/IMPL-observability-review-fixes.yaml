interface_contracts:
  - name: CodeObsEmitFailed
    description: |-
      New error code constant for observability emit failures.
      Replaces the hardcoded string "EVENT_EMIT_FAILED" used in emitter.go.
      Tests in emitter_test.go currently assert this exact string and must be
      updated to reference the constant.
    definition: |
      // CodeObsEmitFailed is emitted when EmitSync fails to record an event.
      CodeObsEmitFailed = "O001_OBS_EMIT_FAILED"
    location: pkg/result/codes.go

  - name: CodeObsQueryFailed
    description: |-
      New error code constant for observability query failures.
      Replaces the hardcoded string "EVENT_QUERY_FAILED" used in query.go.
      Tests in query_test.go currently assert this exact string and must be
      updated to reference the constant.
    definition: |
      // CodeObsQueryFailed is emitted when Query fails to retrieve events.
      CodeObsQueryFailed = "O002_OBS_QUERY_FAILED"
    location: pkg/result/codes.go

  - name: GetAgentHistory
    description: |-
      Converts from ([]AgentPerformanceEvent, error) to result.Result[AgentHistoryData].
      AgentHistoryData is a new thin wrapper holding the slice. Uses CodeObsQueryFailed
      on store errors. Returns success with empty slice (not error) when no events match.
      Callers: query_test.go only (no cmd/sawtools caller exists).
    definition: |
      type AgentHistoryData struct {
          Events []AgentPerformanceEvent
      }

      func GetAgentHistory(ctx context.Context, store Store, agentID string, limit int) result.Result[AgentHistoryData]
    location: pkg/observability/query.go

  - name: GetIMPLMetrics
    description: |-
      Converts from (*IMPLMetrics, error) to result.Result[IMPLMetrics] (value, not pointer).
      Uses CodeObsQueryFailed on store errors. Returns success with zero-value IMPLMetrics
      (not error) when no data exists.
      Callers: cmd/sawtools/observability_metrics.go (must be updated in Wave 2, Agent C).
    definition: |
      func GetIMPLMetrics(ctx context.Context, store Store, implSlug string) result.Result[IMPLMetrics]
    location: pkg/observability/query.go

  - name: GetProgramSummary
    description: |-
      Converts from (*ProgramSummary, error) to result.Result[ProgramSummary] (value, not pointer).
      Uses CodeObsQueryFailed on store errors. Returns success with zero-value ProgramSummary
      (not error) when no data exists.
      Callers: cmd/sawtools/observability_metrics.go (must be updated in Wave 2, Agent C).
    definition: |
      func GetProgramSummary(ctx context.Context, store Store, programSlug string) result.Result[ProgramSummary]
    location: pkg/observability/query.go

  - name: GetCostBreakdown
    description: |-
      Converts from (map[string]float64, error) to result.Result[CostBreakdownData].
      CostBreakdownData is a new thin wrapper holding the map. Uses CodeObsQueryFailed
      on store errors.
      Callers: cmd/sawtools/observability_metrics.go (must be updated in Wave 2, Agent C).
    definition: |
      type CostBreakdownData struct {
          PerAgent map[string]float64
      }

      func GetCostBreakdown(ctx context.Context, store Store, implSlug string) result.Result[CostBreakdownData]
    location: pkg/observability/query.go

  - name: GetFailurePatterns
    description: |-
      Converts from ([]FailurePattern, error) to result.Result[FailurePatternsData].
      FailurePatternsData is a new thin wrapper holding the slice. Uses CodeObsQueryFailed
      on store errors.
      Callers: query_test.go only (no cmd/sawtools caller exists).
    definition: |
      type FailurePatternsData struct {
          Patterns []FailurePattern
      }

      func GetFailurePatterns(ctx context.Context, store Store, filters QueryFilters) result.Result[FailurePatternsData]
    location: pkg/observability/query.go

  - name: ComputeCostRollup
    description: |-
      Converts from (*RollupResult, error) to result.Result[RollupResult] (value, not pointer).
      Replace fmt.Errorf wrapping with result.NewFatal using CodeObsQueryFailed.
      Callers: sqlite/sqlite.go GetRollup (must be updated in Wave 2, Agent E).
    definition: |
      func ComputeCostRollup(ctx context.Context, store Store, req RollupRequest) result.Result[RollupResult]
    location: pkg/observability/rollups.go

  - name: ComputeSuccessRateRollup
    description: |-
      Converts from (*RollupResult, error) to result.Result[RollupResult] (value, not pointer).
      Replace fmt.Errorf wrapping with result.NewFatal using CodeObsQueryFailed.
      Callers: sqlite/sqlite.go GetRollup (must be updated in Wave 2, Agent E).
    definition: |
      func ComputeSuccessRateRollup(ctx context.Context, store Store, req RollupRequest) result.Result[RollupResult]
    location: pkg/observability/rollups.go

  - name: ComputeRetryRollup
    description: |-
      Converts from (*RollupResult, error) to result.Result[RollupResult] (value, not pointer).
      Replace fmt.Errorf wrapping with result.NewFatal using CodeObsQueryFailed.
      Callers: sqlite/sqlite.go GetRollup (must be updated in Wave 2, Agent E).
    definition: |
      func ComputeRetryRollup(ctx context.Context, store Store, req RollupRequest) result.Result[RollupResult]
    location: pkg/observability/rollups.go

  - name: ComputeTrend
    description: |-
      Converts from (*TrendResult, error) to result.Result[TrendResult] (value, not pointer).
      Replace fmt.Errorf calls with result.NewFatal using CodeObsQueryFailed (for store errors)
      and a new inline code for unsupported metric (or reuse CodeObsQueryFailed with a descriptive
      message). ComputeTrendOpts.Ctx field moves ctx into the function signature instead:
      new signature is ComputeTrend(ctx context.Context, opts ComputeTrendOpts).
      Remove Ctx field from ComputeTrendOpts since ctx should be a first-class parameter.
      Callers: rollups_test.go only.
    definition: |
      // ComputeTrendOpts updated — Ctx field removed.
      type ComputeTrendOpts struct {
          Store     Store
          Metric    string
          TimeRange time.Duration
          Buckets   int
      }

      func ComputeTrend(ctx context.Context, opts ComputeTrendOpts) result.Result[TrendResult]
    location: pkg/observability/rollups.go

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Role
          Error code registration and emitter fix for pkg/observability (P0).

          ## Context
          pkg/observability/emitter.go uses a hardcoded string "EVENT_EMIT_FAILED" in EmitSync.
          pkg/observability/query.go uses a hardcoded string "EVENT_QUERY_FAILED" in Query.
          Both are violations of the canonical error code pattern (codes must be constants in
          pkg/result/codes.go with pattern O<3-DIGITS>_DESCRIPTION).

          ## What to implement

          ### 1. Add O-range codes to pkg/result/codes.go
          Add a new "Observability error codes (O001-O099)" section after the J001 block.
          Add these two constants:
          ```go
          // Observability error codes (O001-O099)
          const (
              // CodeObsEmitFailed is emitted when EmitSync fails to record an event.
              CodeObsEmitFailed = "O001_OBS_EMIT_FAILED"
              // CodeObsQueryFailed is emitted when Query or a query helper fails to retrieve events.
              CodeObsQueryFailed = "O002_OBS_QUERY_FAILED"
          )
          ```
          Also add O001-O099 to the range comment table at the top of the file.

          ### 2. Fix emitter.go
          In EmitSync (line ~62), replace the hardcoded "EVENT_EMIT_FAILED" string
          with result.CodeObsEmitFailed:
          ```go
          result.NewFatal(result.CodeObsEmitFailed, err.Error()).WithCause(err),
          ```

          ## Tests
          Do NOT modify test files — Agent F owns test files. The tests in emitter_test.go
          (TestEmitSyncStoreErrorReturnsFatal line ~277) and query_test.go
          (TestQueryFunctionStoreErrorReturnsFatal line ~373) currently assert the old string
          literals. Leave those tests; Agent F will update them.

          ## Verification gate
          ```
          go build ./pkg/result/... ./pkg/observability/...
          go vet ./pkg/result/... ./pkg/observability/...
          go test ./pkg/observability/...
          ```
          Note: the test assertions for error codes will fail because Agent F hasn't run yet.
          Verify that the build and vet pass. Test failures on the two error-code assertions
          are expected and acceptable at this stage.
        files:
          - pkg/result/codes.go
          - pkg/observability/emitter.go
        dependencies: []

      - id: B
        task: |
          ## Role
          Convert query.go exported functions from (T, error) to result.Result[T] (P0).

          ## Context
          GetAgentHistory, GetIMPLMetrics, GetProgramSummary, GetCostBreakdown, and
          GetFailurePatterns all return (T, error) instead of result.Result[T].
          These are the non-canonical return patterns identified in the review.

          IMPORTANT: Agent A is simultaneously adding result.CodeObsQueryFailed to codes.go.
          You must use result.CodeObsQueryFailed in your result.NewFatal calls. This
          constant will exist in the codebase when your worktree is created from the
          same base commit — do NOT define it yourself. If the constant is not yet present,
          add a TODO comment and use the string literal "O002_OBS_QUERY_FAILED" as fallback.

          Note: The Query function (line 18) already returns result.Result[QueryData] and
          is correct — do NOT change it.

          ## What to implement

          ### 0. Fix the Query function inline error code (P0)
          The Query function at line 18 already returns result.Result[QueryData] but uses
          the hardcoded string "EVENT_QUERY_FAILED". Replace it with the constant:
          ```go
          result.NewFatal(result.CodeObsQueryFailed, err.Error()).WithCause(err),
          ```

          ### 1. Add new result data wrapper types
          Add these types to query.go (above or below the existing QueryData type):
          ```go
          // AgentHistoryData holds the result of GetAgentHistory.
          type AgentHistoryData struct {
              Events []AgentPerformanceEvent
          }

          // CostBreakdownData holds the result of GetCostBreakdown.
          type CostBreakdownData struct {
              PerAgent map[string]float64
          }

          // FailurePatternsData holds the result of GetFailurePatterns.
          type FailurePatternsData struct {
              Patterns []FailurePattern
          }
          ```

          ### 2. Convert GetAgentHistory
          Old signature: `func GetAgentHistory(ctx context.Context, store Store, agentID string, limit int) ([]AgentPerformanceEvent, error)`
          New signature: `func GetAgentHistory(ctx context.Context, store Store, agentID string, limit int) result.Result[AgentHistoryData]`

          On store.QueryEvents error: return result.NewFailure wrapping result.NewFatal(result.CodeObsQueryFailed, err.Error()).WithCause(err)
          On success: return result.NewSuccess(AgentHistoryData{Events: result}) where result is the
          []AgentPerformanceEvent slice built from the type-assert loop.
          The sort.Slice call stays in place.

          ### 3. Convert GetIMPLMetrics
          Old signature: `func GetIMPLMetrics(ctx context.Context, store Store, implSlug string) (*IMPLMetrics, error)`
          New signature: `func GetIMPLMetrics(ctx context.Context, store Store, implSlug string) result.Result[IMPLMetrics]`

          The function makes 3 separate store.QueryEvents calls. On ANY error, return failure.
          On success: return result.NewSuccess(*metrics) (dereference the pointer, return value type).
          Zero-value metrics on empty results remains success (not error) — keep this behavior.

          ### 4. Convert GetProgramSummary
          Old signature: `func GetProgramSummary(ctx context.Context, store Store, programSlug string) (*ProgramSummary, error)`
          New signature: `func GetProgramSummary(ctx context.Context, store Store, programSlug string) result.Result[ProgramSummary]`

          Same pattern: on any store error return failure; on success return result.NewSuccess(*summary).

          ### 5. Convert GetCostBreakdown
          Old signature: `func GetCostBreakdown(ctx context.Context, store Store, implSlug string) (map[string]float64, error)`
          New signature: `func GetCostBreakdown(ctx context.Context, store Store, implSlug string) result.Result[CostBreakdownData]`

          On store error: return failure. On success: return result.NewSuccess(CostBreakdownData{PerAgent: breakdown}).

          ### 6. Convert GetFailurePatterns
          Old signature: `func GetFailurePatterns(ctx context.Context, store Store, filters QueryFilters) ([]FailurePattern, error)`
          New signature: `func GetFailurePatterns(ctx context.Context, store Store, filters QueryFilters) result.Result[FailurePatternsData]`

          On store error: return failure. On success: return result.NewSuccess(FailurePatternsData{Patterns: result}).

          ## Tests
          Do NOT modify test files — Agent F owns them. The tests in query_test.go that call
          these functions will not compile in your worktree because the signatures changed.
          This is acceptable — Agent F resolves the test compilation in Wave 2.

          To verify your changes compile: `go build ./pkg/observability/...`
          Do not attempt to run the full test suite as it will fail due to test compilation errors.

          ## Verification gate
          ```
          go build ./pkg/observability/...
          go vet ./pkg/observability/...
          ```
        files:
          - pkg/observability/query.go
        dependencies: []

      - id: D
        task: |
          ## Role
          Convert rollups.go exported functions from (*T, error) to result.Result[T]
          and fix ComputeTrend context propagation (P1).

          ## Context
          ComputeCostRollup, ComputeSuccessRateRollup, ComputeRetryRollup all return
          (*RollupResult, error). ComputeTrend returns (*TrendResult, error) and buries
          context inside ComputeTrendOpts.Ctx. All use bare fmt.Errorf instead of
          result.SAWError. These are the non-canonical patterns identified in the review.

          IMPORTANT: Agent A is simultaneously adding result.CodeObsQueryFailed to codes.go.
          Use result.CodeObsQueryFailed in your result.NewFatal calls. If the constant is
          not yet present, use the string literal "O002_OBS_QUERY_FAILED" as fallback.

          ## What to implement

          ### 1. Convert ComputeCostRollup
          Old: `func ComputeCostRollup(ctx context.Context, store Store, req RollupRequest) (*RollupResult, error)`
          New: `func ComputeCostRollup(ctx context.Context, store Store, req RollupRequest) result.Result[RollupResult]`

          Replace the `return nil, fmt.Errorf(...)` on store error with:
          ```go
          return result.NewFailure[RollupResult]([]result.SAWError{
              result.NewFatal(result.CodeObsQueryFailed, "query cost events: "+err.Error()).WithCause(err),
          })
          ```
          Replace the final `return result, nil` with `return result.NewSuccess(*result)`.
          (Note: `result` is used as a local variable name — rename the local var to `rollup`
          to avoid shadowing the `result` package import. Update all references accordingly.)

          ### 2. Convert ComputeSuccessRateRollup
          Same pattern as ComputeCostRollup. Rename local `result` var to `rollup` to avoid
          package name shadowing. Return result.Result[RollupResult].

          ### 3. Convert ComputeRetryRollup
          Same pattern. Local `result` var → `rollup`. Return result.Result[RollupResult].

          ### 4. Convert ComputeTrend and update ComputeTrendOpts
          In rollups_opts.go: remove the `Ctx context.Context` field from ComputeTrendOpts:
          ```go
          type ComputeTrendOpts struct {
              Store     Store
              Metric    string
              TimeRange time.Duration
              Buckets   int
          }
          ```

          In rollups.go, update ComputeTrend:
          Old: `func ComputeTrend(opts ComputeTrendOpts) (*TrendResult, error)`
          New: `func ComputeTrend(ctx context.Context, opts ComputeTrendOpts) result.Result[TrendResult]`

          Update the function body:
          - Replace `ctx := opts.Ctx` and `store := opts.Store` with function params directly.
          - Replace `return nil, fmt.Errorf("unsupported metric: %s", metric)` with:
            ```go
            return result.NewFailure[TrendResult]([]result.SAWError{
                result.NewFatal(result.CodeObsQueryFailed, "unsupported metric: "+metric),
            })
            ```
          - Replace `return nil, fmt.Errorf("query events for trend: %w", err)` with:
            ```go
            return result.NewFailure[TrendResult]([]result.SAWError{
                result.NewFatal(result.CodeObsQueryFailed, "query events for trend: "+err.Error()).WithCause(err),
            })
            ```
          - Replace `return result, nil` with `return result.NewSuccess(*result)`.
            (Again, rename local `result` var to `trend` throughout to avoid shadowing the import.)

          ### 5. Update package-level imports in rollups.go
          Ensure the import for "github.com/blackwell-systems/scout-and-wave-go/pkg/result" is
          present in rollups.go. Remove "fmt" import if it becomes unused after the conversions.
          Keep "context" import since it's now an explicit function param.

          ## Tests
          Do NOT modify rollups_test.go — Agent F owns it. The test file will not compile
          in your worktree because it calls the old signatures (including ComputeTrend with
          opts.Ctx). This is acceptable.

          ## Verification gate
          ```
          go build ./pkg/observability/...
          go vet ./pkg/observability/...
          ```
        files:
          - pkg/observability/rollups.go
          - pkg/observability/rollups_opts.go
        dependencies: []

  - number: 2
    agents:
      - id: C
        task: |
          ## Role
          Update cmd/sawtools/observability_metrics.go to use the new result.Result[T]
          return types from pkg/observability (Wave 2, depends on Agent B).

          ## Context
          Agent B (Wave 1) converted GetIMPLMetrics, GetProgramSummary, and GetCostBreakdown
          from (T, error) to result.Result[T]. observability_metrics.go in cmd/sawtools
          calls all three and must be updated to use the new return types.

          ## What to implement

          ### 1. Update GetIMPLMetrics call (line ~45)
          Old pattern:
          ```go
          metrics, err := obs.GetIMPLMetrics(ctx, store, implSlug)
          if err != nil {
              return fmt.Errorf("get metrics: %w", err)
          }
          ```
          New pattern:
          ```go
          metricsRes := obs.GetIMPLMetrics(ctx, store, implSlug)
          if !metricsRes.IsSuccess() {
              return fmt.Errorf("get metrics: %s", metricsRes.Errors[0].Message)
          }
          metrics := metricsRes.GetData()
          ```
          Then update all usages of `metrics.TotalCost`, `metrics.TotalDurationMin`, etc.
          to use the value (not pointer) type. The fields are the same, just accessed
          directly instead of via pointer: `metrics.TotalCost` etc.

          ### 2. Update GetCostBreakdown call (line ~60)
          Old pattern:
          ```go
          bd, err := obs.GetCostBreakdown(ctx, store, implSlug)
          if err != nil {
              return fmt.Errorf("get cost breakdown: %w", err)
          }
          if len(bd) > 0 {
          ```
          New pattern:
          ```go
          bdRes := obs.GetCostBreakdown(ctx, store, implSlug)
          if !bdRes.IsSuccess() {
              return fmt.Errorf("get cost breakdown: %s", bdRes.Errors[0].Message)
          }
          bd := bdRes.GetData().PerAgent
          if len(bd) > 0 {
          ```

          ### 3. Update GetProgramSummary call in showProgramSummary (line ~94)
          Old pattern:
          ```go
          summary, err := obs.GetProgramSummary(ctx, store, programSlug)
          if err != nil {
              return fmt.Errorf("get program summary: %w", err)
          }
          ```
          New pattern:
          ```go
          summaryRes := obs.GetProgramSummary(ctx, store, programSlug)
          if !summaryRes.IsSuccess() {
              return fmt.Errorf("get program summary: %s", summaryRes.Errors[0].Message)
          }
          summary := summaryRes.GetData()
          ```
          Then update field accesses: `summary.TotalCost`, `summary.IMPLCount`, etc.
          These are the same field names — just accessed on value instead of pointer.

          ## Verification gate
          ```
          go build ./cmd/sawtools/...
          go vet ./cmd/sawtools/...
          ```
        files:
          - cmd/sawtools/observability_metrics.go
        dependencies: [B]

      - id: E
        task: |
          ## Role
          Update pkg/observability/sqlite/sqlite.go to handle the new result.Result[T]
          return types from the rollup functions (Wave 2, depends on Agent D).

          ## Context
          Agent D (Wave 1) converted ComputeCostRollup, ComputeSuccessRateRollup, and
          ComputeRetryRollup to return result.Result[RollupResult]. The GetRollup method
          in sqlite.go delegates to these functions and must unwrap the result.

          Also fix the inline fmt.Errorf for the unsupported rollup type (line ~156) — it
          should use a consistent pattern with the delegated functions.

          ## What to implement

          ### 1. Update GetRollup delegation (line ~146-157)
          Old pattern:
          ```go
          func (s *store) GetRollup(ctx context.Context, req obs.RollupRequest) (*obs.RollupResult, error) {
              switch req.Type {
              case "cost":
                  return obs.ComputeCostRollup(ctx, s, req)
              case "success_rate":
                  return obs.ComputeSuccessRateRollup(ctx, s, req)
              case "retry_count":
                  return obs.ComputeRetryRollup(ctx, s, req)
              default:
                  return nil, fmt.Errorf("unsupported rollup type: %s", req.Type)
              }
          }
          ```

          New pattern (the Store interface still returns (*obs.RollupResult, error), so
          GetRollup must unwrap the result.Result to satisfy the interface):
          ```go
          func (s *store) GetRollup(ctx context.Context, req obs.RollupRequest) (*obs.RollupResult, error) {
              var r result.Result[obs.RollupResult]
              switch req.Type {
              case "cost":
                  r = obs.ComputeCostRollup(ctx, s, req)
              case "success_rate":
                  r = obs.ComputeSuccessRateRollup(ctx, s, req)
              case "retry_count":
                  r = obs.ComputeRetryRollup(ctx, s, req)
