title: pkg/observability Review Fixes
feature_slug: observability-review-fixes
verdict: SUITABLE
suitability_assessment: |
  pkg/observability contains 7 source files + 1 SQLite sub-package (~900 LOC source,
  ~800 LOC tests). All tests pass. The review identifies the following issues using the
  same principles applied to pkg/orchestrator, pkg/protocol, and pkg/pipeline:

  **P0 findings (2):**
  1. Inline error codes in emitter.go ("EVENT_EMIT_FAILED") and query.go
     ("EVENT_QUERY_FAILED") are raw strings not registered in pkg/result/codes.go.
     Tests assert these exact string values, making them implicit contracts.
  2. GetAgentHistory, GetIMPLMetrics, GetProgramSummary, GetCostBreakdown, and
     GetFailurePatterns all return (T, error) instead of result.Result[T]. These
     are exported functions with active callers in cmd/sawtools/observability_metrics.go.

  **P1 findings (2):**
  3. ComputeCostRollup, ComputeSuccessRateRollup, ComputeRetryRollup, and ComputeTrend
     return (*RollupResult, error) / (*TrendResult, error) instead of result.Result[T].
     The inline fmt.Errorf calls in these functions use bare error wrapping where
     result.SAWError should be used.
  4. sqlite/sqlite.go GetRollup delegates to pkg/observability's ComputeXxx functions
     which return bare errors; these need updating after Wave 1 converts the signatures.

  **P2 findings (3):**
  5. Duplicate test filter helpers: query_test.go and rollups_test.go each define
     their own in-package filter helpers (matchesFilters vs matchFilters, eventIMPLSlug
     vs implSlugOf) with slightly different names and logic. Consolidation reduces
     maintenance overhead.
  6. NewTierAdvancedEvent, NewTierGatePassedEvent, NewTierGateFailedEvent use the
     WaveNumber field to store tier numbers. The doc comment says "tier int" but the
     struct field is WaveNumber. A comment clarifying this intentional reuse would
     prevent future confusion.
  7. NewEventID panics on crypto/rand.Read failure, but since Go 1.20 this never
     fails on any supported platform. The doc comment should note this explicitly
     rather than suggesting the panic is reachable.

  **Caller impact of signature changes:**
  - P0 query.go functions: direct callers are observability_metrics.go (GetIMPLMetrics,
    GetProgramSummary, GetCostBreakdown) and query_test.go. GetAgentHistory and
    GetFailurePatterns have no callers outside the package except tests.
  - P1 rollup functions: direct callers are sqlite/sqlite.go (ComputeCostRollup,
    ComputeSuccessRateRollup, ComputeRetryRollup), and rollups_test.go. ComputeTrend
    is called only from rollups_test.go.

  **Decomposition (3 waves, 6 agents, fully disjoint):**
  - Wave 1 (parallel): A (error codes + emitter.go), B (query.go conversions), D (rollups.go)
  - Wave 2 (parallel, depends on Wave 1): C (cmd caller updates, depends on B),
    E (sqlite.go updates, depends on D), F (test file consolidation, depends on A+B+D)
  - No integration wave needed; all caller files are in scope.

  **Suitability check:**
  1. File decomposition: 8 distinct files across 2 waves, all disjoint per wave.
  2. No investigation needed: all root causes are deterministic string literal locations.
  3. Interfaces: new error codes defined by A (consumed by B, F); new result.Result
     signatures defined by B (consumed by C, F) and D (consumed by E, F).
  4. Pre-implementation status: all findings are TODO.
  5. Parallelization value: 3 parallel Wave 1 agents with non-trivial signature changes
     and cascading Wave 2 callers; Go build cycle ~5s. Clear coordination value.

  Estimated times:
  - Scout phase: ~25 min (deep review, caller scan, IMPL doc)
  - Wave 1: ~3 agents x ~10 min avg = ~10 min (parallel)
  - Wave 2: ~3 agents x ~8 min avg = ~8 min (parallel)
  - Merge and verification: ~5 min
  Total SAW time: ~48 min
  Sequential baseline: ~6 agents x ~10 min = ~60 min
  Time savings: ~12 min (20% faster). Clear coordination value.

