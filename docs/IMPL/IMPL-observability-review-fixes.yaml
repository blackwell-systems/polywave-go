    description: |-
      sawtools pre-wave-validate reports test cascade errors for the common local
      variable name "result" appearing in unrelated test files (analyze_suitability_cmd_test.go,
      baseline_output_test.go, detect_wiring_cmd_test.go, extract_commands_cmd_test.go, etc.).
      These are false positives — those files use "result" as a local variable name (e.g.,
      var result suitability.SuitabilityResult) with no dependency on pkg/observability
      or pkg/observability/rollups.go. Agent D's changes to rollups.go do not affect these files.
      The cascade detector matches on symbol name without package-level scoping.
    affected_agents: [D]
    severity: low
    resolution: ignore — false positives confirmed by manual inspection

pre_mortem:
  overall_risk: low
  rows:
    - scenario: |-
        Agent B's new wrapper types (AgentHistoryData, CostBreakdownData, FailurePatternsData)
        conflict with Agent D's type definitions if D mistakenly adds overlapping types
        to rollups.go.
      likelihood: low
      impact: medium
      mitigation: |-
        The wrapper types are defined in query.go (Agent B) and rollups.go (Agent D) in
        separate files. Interface contracts specify exact type names and locations. Agents
        should verify no type of the same name already exists before defining new ones.

    - scenario: |-
        Agent F modifies emitter_test.go (not in its file_ownership list) and conflicts
        with a concurrent change if another agent also touches it.
      likelihood: low
      impact: low
      mitigation: |-
        No other agent owns emitter_test.go. Agent F's brief explicitly notes this edge case.
        The change is minimal (one string literal → constant reference). If a merge conflict
        arises, it is trivial to resolve.

    - scenario: |-
        The local variable name `result` in rollups.go shadows the `result` package import
        after Agent D adds the import. This causes a compilation failure.
      likelihood: medium
      impact: medium
      mitigation: |-
        Agent D's brief explicitly instructs renaming the local `result` var to `rollup`
        and `trend` in each function before adding the package import. Pre-wave validation
        and build gate will catch this if overlooked.

    - scenario: |-
        Agent C updates observability_metrics.go but the error handling uses
        res.Errors[0].Message without checking len(res.Errors) > 0, causing a panic
        if Errors is empty on a non-success result.
      likelihood: low
      impact: medium
      mitigation: |-
        result.NewFailure always includes at least one SAWError. The result package
        guarantees this — a non-success result with empty Errors slice is not constructible
        via the canonical constructors. Agent C brief can note this assumption.

    - scenario: |-
        ComputeTrend signature change (ctx promoted to first param, Ctx removed from opts)
        breaks callers outside the test suite that were missed in the caller scan.
      likelihood: low
      impact: medium
      mitigation: |-
        Caller scan confirmed ComputeTrend is only called from rollups_test.go in the
        canonical source tree (not counting .claude/worktrees). Agent F updates all
        test call sites. The worktree copies are stale and not part of the build.
