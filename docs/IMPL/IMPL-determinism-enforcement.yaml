title: "Determinism Enforcement — Runtime Constraints, Completion Validation, Pre-Execution Verification"
feature_slug: determinism-enforcement
verdict: SUITABLE
state: SCOUT_PENDING

suitability_assessment: |
  File decomposition: 10 new files + 3 modified files across pkg/tools/, pkg/protocol/,
  pkg/engine/, and cmd/saw/. Work decomposes cleanly into 5 agents across 2 waves.
  No two agents share a file.

  Investigation-first items: None. All items are clearly specified in the determinism
  roadmap with exact file locations and fix descriptions.

  Interface discoverability: Yes. The Constraints struct already exists in pkg/tools/constraints.go.
  The new functions (ValidateCompletionReportClaims, VerifyDependenciesAvailable, etc.) have
  well-defined inputs (IMPLManifest, repoDir, waveNum) and outputs (error or result struct).

  Pre-implementation status: Constraints type and WithConstraints exist but middleware functions
  are stubs (defaultOwnershipMiddleware etc. are passthroughs). C1/C2/C5 need real implementations.
  C3/C4/H1/H2/H3/H4 are entirely new.

  Parallelization value: High. Build+test cycle is >30s (Go project with 50+ test files).
  Wave 1 has 3 independent agents each touching 2-4 files. Wave 2 has 2 agents touching
  2-3 files each. All agents are non-trivial (logic + tests).

  Estimated times:
  - Scout phase: ~8 min
  - Agent execution: ~15 min (5 agents, ~10 min avg, 2 waves with 3+2 parallelism)
  - Merge and verification: ~5 min
  Total SAW time: ~28 min
  Sequential baseline: ~50 min (5 agents x 10 min)
  Time savings: ~22 min (44% faster)
  Recommendation: Clear speedup.

test_command: "go test ./..."
lint_command: "go vet ./..."

quality_gates:
  level: standard
  gates:
    - type: build
      command: "go build ./..."
      required: true
    - type: lint
      command: "go vet ./..."
      required: true
    - type: test
      command: "go test ./..."
      required: true

scaffolds: []
# No scaffolds needed. The Constraints type already exists in pkg/tools/constraints.go.
# New files are single-agent owned with no cross-agent type sharing.

interface_contracts:
  - name: ConstraintEnforcer middleware functions
    description: |
      Real implementations of the ownership, freeze, and role-path middleware
      that replace the passthrough stubs in workshop_constrained.go. These are
      registered via init() into the package-level function variables.
    definition: |
      // pkg/tools/constraint_enforcer.go
      // Replaces defaultOwnershipMiddleware, defaultFreezeMiddleware, defaultRolePathMiddleware
      func newOwnershipMiddleware(toolName string, c Constraints) Middleware
      func newFreezeMiddleware(toolName string, c Constraints) Middleware
      func newRolePathMiddleware(toolName string, c Constraints) Middleware
      // Each returns error if write target violates constraint.
      // Error format: "I1_VIOLATION: agent %s cannot write to %s (not in owned files)"
    location: pkg/tools/constraint_enforcer.go

  - name: ValidateCompletionReportClaims
    description: |
      Cross-validates completion report fields against actual git state.
      Called after agent completes, before accepting the report.
    definition: |
      // pkg/protocol/completion_validator.go
      type CompletionValidationResult struct {
          Valid    bool     `json:"valid"`
          Errors   []string `json:"errors,omitempty"`
          Warnings []string `json:"warnings,omitempty"`
      }
      func ValidateCompletionReportClaims(
          manifest *IMPLManifest,
          agentID string,
          report CompletionReport,
          repoDir string,
      ) (*CompletionValidationResult, error)
    location: pkg/protocol/completion_validator.go

  - name: VerifyDependenciesAvailable
    description: |
      Verifies that all dependency outputs exist before launching a wave.
      For each agent in wave N, checks that each dependency agent has a
      completion report with status "complete".
    definition: |
      // pkg/protocol/dependency_verifier.go
      type DependencyVerificationResult struct {
          Wave     int                    `json:"wave"`
          Valid    bool                   `json:"all_available"`
          Agents   []AgentDependencyCheck `json:"agents"`
      }
      type AgentDependencyCheck struct {
          Agent        string   `json:"agent"`
          Dependencies []string `json:"dependencies"`
          Missing      []string `json:"missing,omitempty"`
          Available    bool     `json:"available"`
      }
      func VerifyDependenciesAvailable(manifest *IMPLManifest, waveNum int) (*DependencyVerificationResult, error)
    location: pkg/protocol/dependency_verifier.go

  - name: ValidateGateInputs
    description: |
      Validates that gate inputs (changed files) match actual git diff,
      not just what the agent reported.
    definition: |
      // pkg/protocol/gate_input_validator.go
      type GateInputValidationResult struct {
          Valid           bool     `json:"valid"`
          ReportedFiles   []string `json:"reported_files"`
          ActualFiles     []string `json:"actual_files"`
          MissingFromReport []string `json:"missing_from_report,omitempty"`
          ExtraInReport   []string `json:"extra_in_report,omitempty"`
      }
      func ValidateGateInputs(
          manifest *IMPLManifest,
          waveNum int,
          repoDir string,
      ) (*GateInputValidationResult, error)
    location: pkg/protocol/gate_input_validator.go

  - name: PreMergeValidation
    description: |
      Validates ownership table consistency before merge.
      Verifies every file_ownership entry references a valid agent in the wave.
    definition: |
      // Added to pkg/protocol/merge_agents.go
      func PreMergeValidation(manifest *IMPLManifest, waveNum int) []ValidationError
    location: pkg/protocol/merge_agents.go

  - name: ValidateFileOwnershipCoverage
    description: |
      Verifies agent-changed files are subset of owned files.
      Detects "bonus files" not in ownership table.
    definition: |
      // pkg/protocol/ownership_coverage.go
      type OwnershipCoverageResult struct {
          Valid       bool                    `json:"valid"`
          Violations  []OwnershipViolation    `json:"violations,omitempty"`
      }
      type OwnershipViolation struct {
          Agent       string   `json:"agent"`
          UnownedFiles []string `json:"unowned_files"`
      }
      func ValidateFileOwnershipCoverage(
          manifest *IMPLManifest,
          waveNum int,
      ) (*OwnershipCoverageResult, error)
    location: pkg/protocol/ownership_coverage.go

