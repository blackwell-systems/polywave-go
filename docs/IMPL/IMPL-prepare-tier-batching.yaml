title: Batch E37 failures in prepare-tier and add --skip-critic flag
feature_slug: prepare-tier-batching
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    Suitability: SUITABLE WITH CAVEATS

    1. File decomposition: 4 source files + 2 test files across pkg/protocol and cmd/sawtools.
       Agent A owns protocol-layer changes (PrepareTier collect-all + helper).
       Agent B owns CLI-layer changes (--skip-critic flags for both commands).
       Disjoint ownership is clean.

    2. Investigation-first: No. The problem is well-understood: PrepareTier returns early
       on first E37 failure (line 128), and there is no --skip-critic flag. Solution is
       straightforward.

    3. Interface discoverability: Yes. The cross-agent interface is a new PrepareTierOpts
       struct and a SkipCriticForIMPL helper function. Both can be fully specified.

    4. Pre-implementation status: All three fixes are TODO. No partial implementation exists.

    5. Parallelization value: 2 agents, single wave. Build/test cycle is ~30s (Go).
       The coordination value justifies SAW even though 2 agents is marginal for
       speed gains. The IMPL doc serves as audit trail and interface spec.

    Caveat: PrepareTier signature changes from positional args to opts struct.
    This is a breaking change for callers. The only caller is prepare_tier_cmd.go
    which Agent B owns, so the change is contained within this IMPL.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~5 min (2 agents x 5 min avg, single wave)
    - Merge and verification: ~3 min
    Total SAW time: ~16 min

    Sequential baseline: ~12 min (2 tasks x 6 min avg)
    Time savings: marginal (~4 min overhead vs parallel gain)

    Recommendation: Coordination value justifies SAW. Interface spec prevents
    signature mismatch between protocol and CLI layers.
