interface_contracts:
    - name: MergeAgentsData
      description: |
        After shim removal (Item 1), the Success field is deleted. All callers
        must use result.Result[MergeAgentsData].IsSuccess() instead.
      definition: |
        // Before (shim present):
        type MergeAgentsData struct {
            Wave      int           `json:"wave"`
            Merges    []MergeStatus `json:"merges"`
            NextState ProtocolState `json:"next_state,omitempty"`
            Success   bool          `json:"success"` // REMOVE THIS FIELD
        }

        // After (shim removed):
        type MergeAgentsData struct {
            Wave      int           `json:"wave"`
            Merges    []MergeStatus `json:"merges"`
            NextState ProtocolState `json:"next_state,omitempty"`
        }
      location: pkg/protocol/merge_agents.go
    - name: CheckAgentLOCBudget
      description: |
        Already implemented in complexity.go. FullValidate calls it after
        ValidateFileExistence. Signature is stable — just uncomment the wiring call.
      definition: |
        func CheckAgentLOCBudget(m *IMPLManifest, repoPath string, maxLOC int) []result.SAWError
      location: pkg/protocol/complexity.go
    - name: EmitSync
      description: |
        Synchronous emit that returns result.Result[EmitData]. Agent C migrates
        the 3 high-signal helper functions to use EmitSync and log/return errors.
      definition: |
        func (e *Emitter) EmitSync(ctx context.Context, event Event) result.Result[EmitData]
      location: pkg/observability/emitter.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Item 1: Remove the MergeAgentsData.Success compatibility shim

            The `Success bool` field in `MergeAgentsData` (pkg/protocol/merge_agents.go
            line 143) carries a TODO comment: "Remove once all consumers migrated to
            result.Result[T].IsSuccess()". The result-type-migration IMPL is now complete.
            Your job is to remove the field and update all 4 remaining callers.

            ### Step 1 — Remove the Success field from the struct definition

            In `pkg/protocol/merge_agents.go`, find `MergeAgentsData` (around line 137).
            Delete the `Success bool` field and its comment block (lines 141-143).

            Also remove all assignments to `data.Success` and `status.Success` in the
            same file. There are 4 internal assignments to `data.Success` (lines 288,
            341, 367, 500, 524) and the `mergeAgentsSingleRepo` and `mergeAgentsMultiRepo`
            functions both initialize `data` with `Success: true`. Remove all of these.
            Note: `status.Success` (on `MergeStatus`, not `MergeAgentsData`) is a
            DIFFERENT field on a different struct — do NOT remove those.

            ### Step 2 — Update cmd/sawtools/merge_agents.go

            In `cmd/sawtools/merge_agents.go`, find the check at line 36:
            ```go
            if !result.Success {
                return fmt.Errorf("merge-agents: one or more merges failed")
            }
            ```
            The `res.IsSuccess()` check immediately above (line 28) already catches
            merge failures via the Result type. The `result.Success` check is now
            redundant. Delete it entirely (the `if !result.Success { ... }` block).

            ### Step 3 — Update pkg/engine/finalize.go

            In `pkg/engine/finalize.go`, find the check at line 541:
            ```go
            if !mergeData.Success {
                return result, fmt.Errorf("engine.FinalizeWave: merge-agents encountered conflicts in %s", repoKey)
            }
            ```
            The `mergeRes.IsSuccess()` check immediately above (line 536) already handles
            this failure path. Remove the redundant `if !mergeData.Success { ... }` block.

            ### Step 4 — Update pkg/engine/finalize_steps.go

            In `pkg/engine/finalize_steps.go`, find the check at line 237:
            ```go
            if !mergeData.Success {
                opts.ObsEmitter.Emit(ctx, observability.NewWaveFailedEvent("", opts.WaveNum, "merge-agents encountered conflicts"))
                emitStepEvent(onEvent, stepName, "failed", "merge encountered conflicts")
                return &StepResult{ ... }, ...
            }
            ```
            The `mergeRes.IsSuccess()` pattern is used elsewhere in finalize_steps.go
            but not immediately before this check. Verify the merge result flow in
            `StepMergeAgents`. If there is already a `!mergeRes.IsSuccess()` check that
            covers failure, remove the `!mergeData.Success` block. If there is no
            prior IsSuccess check, replace `!mergeData.Success` with `!mergeRes.IsSuccess()`
            and use `mergeRes.Errors` to drive the error detail.

            ### Step 5 — Update pkg/protocol/program_tier_finalize.go

            In `pkg/protocol/program_tier_finalize.go`, find all assignments and reads
            of `.Success` on `MergeAgentsData` values (lines ~67, 70, 89, 104). Since
            you removed the field, these must be removed or replaced.
            - Line 67-70: struct literal `{..., Success: true}` — remove the `Success: true` field.
            - Line 89: `mergeResult.Success = false` — remove this line. The failure is
              already indicated by `result.NewFailure` return below it.
            - Line 104: `mergeResult.Success = true` — remove this line. Success is
              implied by not returning failure.

            ### Step 6 — Fix %v -> %w error wrapping in cmd/sawtools/merge_agents.go

            In `cmd/sawtools/merge_agents.go`, find the error return:

            Change it to:

            Add `"errors"` to the import block if not already present.
            This preserves error-chain compatibility (errors.Is/errors.As) for the
            wrapped `[]result.SAWError` slice, consistent with Item 4 changes
            Agent D is making in the other cmd/sawtools files.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/protocol/... ./pkg/engine/... ./cmd/sawtools/...
            ```

            ### Constraints
            - Do NOT modify MergeStatus.Success — that is a different struct field tracking
              per-agent merge outcomes, not the deprecated data-level field.
            - Do NOT modify any test files that assert on Success — check if any tests
              reference MergeAgentsData.Success and update those assertions to use
              IsSuccess() on the result wrapper instead.
          files:
            - pkg/protocol/merge_agents.go
            - cmd/sawtools/merge_agents.go
            - pkg/engine/finalize.go
            - pkg/engine/finalize_steps.go
            - pkg/protocol/program_tier_finalize.go
        - id: B
          task: |
            ## Item 2: Wire CheckAgentLOCBudget into FullValidate

            In `pkg/protocol/full_validate.go`, lines 114-115 contain:
            ```go
            // TODO(saw-system-hardening): wired by Agent B — CheckAgentLOCBudget call goes here
            // errs = append(errs, CheckAgentLOCBudget(m, opts.RepoPath, 2000)...)
            ```

            Uncomment line 115 and delete the TODO comment line (line 114).

            The result should be:
            ```go
            errs = append(errs, CheckAgentLOCBudget(m, opts.RepoPath, 2000)...)
            ```

            This must appear after the `ValidateFileExistence` call (line 112) and
            before the `ValidateIMPLDoc` call (line 118), which is exactly where it
            is now in commented form.

            `CheckAgentLOCBudget` is defined in `pkg/protocol/complexity.go` and
            already imported (same package). The function signature is:
            ```go
            func CheckAgentLOCBudget(m *IMPLManifest, repoPath string, maxLOC int) []result.SAWError
            ```

            The budget limit of 2000 lines was chosen by the saw-system-hardening
            IMPL; do not change it.

            ### Verification gate
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/...
            ```
          files:
            - pkg/protocol/full_validate.go
        - id: C
          task: |
            ## Item 3: Migrate high-signal Emit calls to EmitSync

            The `Emitter` now has both `Emit` (fire-and-forget) and `EmitSync`
            (blocking, returns `result.Result[EmitData]`). For high-signal lifecycle
            events, migrate from `Emit` to `EmitSync` **without changing function
            signatures** — callers in finalize_wave.go and prepare_wave.go are
            outside your ownership and must not be touched.

            ### CRITICAL CONSTRAINT: Keep all function signatures void

            Do NOT change any function return types. Keep every helper as:
            ```go
            func emitWaveMerge(emitter *observability.Emitter, implSlug string, waveNum int) {
            ```
            Use `EmitSync` internally and handle errors with `slog.Warn` inline.
            This way no caller files need to change.

            ### High-signal call sites to migrate

            **cmd/sawtools/finalize_wave_obs.go** — `emitWaveMerge`:
            ```go
            func emitWaveMerge(emitter *observability.Emitter, implSlug string, waveNum int) {
                if emitter == nil {
                    return
                }
                event := observability.NewWaveMergeEvent(implSlug, waveNum)
                if res := emitter.EmitSync(context.Background(), event); res.IsFatal() {
                    slog.Warn("emitWaveMerge: store write failed",
                        "slug", implSlug, "wave", waveNum,
                        "error", res.Errors[0].Message)
                }
            }
            ```

            **cmd/sawtools/prepare_wave_obs.go** — `emitWaveStart`:
            ```go
            func emitWaveStart(emitter *observability.Emitter, implSlug string, waveNum int) {
                if emitter == nil {
                    return
                }
                event := observability.NewWaveStartEvent(implSlug, waveNum)
                if res := emitter.EmitSync(context.Background(), event); res.IsFatal() {
                    slog.Warn("emitWaveStart: store write failed",
                        "slug", implSlug, "wave", waveNum,
                        "error", res.Errors[0].Message)
                }
            }
            ```

            Add `"log/slog"` to the import block of each file if not already present.

            ### Low-signal call sites — leave as Emit (do NOT change)
            - `emitWaveFailed` in finalize_wave_obs.go
            - `emitGateResult` in finalize_wave_obs.go
            - All `opts.ObsEmitter.Emit(...)` calls in pkg/engine/

            ### Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/...
            ```

            ### Constraints
            - Only modify finalize_wave_obs.go and prepare_wave_obs.go.
            - Do NOT change any function signatures or return types.
            - Do NOT modify caller files (finalize_wave.go, prepare_wave.go).
            - Do NOT modify any files in pkg/engine/.
          files:
            - cmd/sawtools/finalize_wave_obs.go
            - cmd/sawtools/prepare_wave_obs.go
        - id: D
          task: |
            ## Item 4: Replace %v with errors.Join + %w for []SAWError error wrapping

            In `cmd/sawtools/`, 9 return statements use `fmt.Errorf("...: %v", res.Errors)`
            where `res.Errors` is `[]result.SAWError`. Because `SAWError` implements
            the `error` interface (it has an `Error()` method and `Unwrap()`), these
            should use `errors.Join` + `%w` to preserve error chain compatibility
            for `errors.Is`/`errors.As`.

            ### The fix pattern

            Before:
            ```go
            return fmt.Errorf("some-cmd: %v", res.Errors)
            ```

            After:
            ```go
            return fmt.Errorf("some-cmd: %w", errors.Join(res.Errors...))
            ```

            Note: `errors.Join` (Go 1.20+) accepts `...error`. Since `SAWError`
            implements `error`, `res.Errors...` spreads the slice directly. This
            project uses Go 1.25 so `errors.Join` is available. Add `"errors"` to
            the import block if not already present; remove it from the import if
            it was previously unused.

            ### Files and specific locations

            **cmd/sawtools/verify_commits.go** (line 22):
            ```go
            // Before:
            return fmt.Errorf("verify-commits: %v", res.Errors)
            // After:
            return fmt.Errorf("verify-commits: %w", errors.Join(res.Errors...))
            ```

            **cmd/sawtools/verify_build.go** (line 20):
            ```go
            // Before:
            return fmt.Errorf("verify-build: %v", res.Errors)
            // After:
            return fmt.Errorf("verify-build: %w", errors.Join(res.Errors...))
            ```

            **cmd/sawtools/create_worktrees.go** (line 22):
            ```go
            // Before:
            return fmt.Errorf("create-worktrees: %v", res.Errors)
            // After:
            return fmt.Errorf("create-worktrees: %w", errors.Join(res.Errors...))
            ```

            **cmd/sawtools/scan_stubs.go** (lines 22 and 28 — two occurrences):
            ```go
            // Line 22 before:
            return fmt.Errorf("scan-stubs: %v", res.Errors)
            // Line 22 after:
            return fmt.Errorf("scan-stubs: %w", errors.Join(res.Errors...))

            // Line 28 before:
            return fmt.Errorf("scan-stubs: %v", appendRes.Errors)
            // Line 28 after:
            return fmt.Errorf("scan-stubs: %w", errors.Join(appendRes.Errors...))
            ```

            **cmd/sawtools/run_gates_cmd.go** (lines 32 and 40 — two occurrences):
            ```go
            // Line 32 before:
            return fmt.Errorf("run-gates: %v", res.Errors)
            // Line 32 after:
            return fmt.Errorf("run-gates: %w", errors.Join(res.Errors...))

            // Line 40 before:
            return fmt.Errorf("run-gates: %v", res.Errors)
            // Line 40 after:
            return fmt.Errorf("run-gates: %w", errors.Join(res.Errors...))
            ```

            **cmd/sawtools/cleanup.go** (line 29):
            ```go
            // Before:
            return fmt.Errorf("cleanup-by-slug: %v", res.Errors)
            // After:
            return fmt.Errorf("cleanup-by-slug: %w", errors.Join(res.Errors...))
            ```

            **cmd/sawtools/cleanup_stale_cmd.go** (line 75):
            ```go
            // Before:
            return fmt.Errorf("clean stale worktrees: %v", cleanRes.Errors)
            // After:
            return fmt.Errorf("clean stale worktrees: %w", errors.Join(cleanRes.Errors...))
            ```

            **cmd/sawtools/validate_integration.go** (line 59):
            ```go
            // Before:
            return fmt.Errorf("validate-integration: failed to persist heuristic report: %v", appendRes.Errors)
            // After:
            return fmt.Errorf("validate-integration: failed to persist heuristic report: %w", errors.Join(appendRes.Errors...))
            ```

            ### DO NOT change
            - The two `fmt.Fprintf` lines in `interview_cmd.go` that use `%v` with
              `.Errors` — those write warning messages to stderr, not return errors,
              and are out of scope.
            - Any `fmt.Errorf` calls that already use `%w` with a single `error` value.
            - Any `fmt.Errorf` calls that format non-error slices or booleans with `%v`.

            ### Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/...
            ```

            ### Note on cmd/sawtools/merge_agents.go
            The `%v -> %w` fix for `cmd/sawtools/merge_agents.go` is handled by Agent A,
            who already owns that file (Item 1 shim removal). You do not need to touch
