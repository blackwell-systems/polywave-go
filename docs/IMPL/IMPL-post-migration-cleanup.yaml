pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A makes multiple changes to cmd/sawtools/merge_agents.go (remove
            Success check, apply %v -> %w fix) and pkg/engine/finalize_steps.go.
            These are independent edits to different lines in the same files, but
            the large scope of Agent A's changes (5 files) increases the chance
            of a missed edit or accidental omission.
          likelihood: low
          impact: low
          mitigation: |
            Agent A's task explicitly lists each change location with before/after
            snippets. After completing, run go build and go vet to confirm no
            residual references to MergeAgentsData.Success remain.
        - scenario: |
            CheckAgentLOCBudget (Item 2) begins enforcing 2000-line budget checks
            on all existing IMPL docs in tests. If any test calls FullValidate
            with a real repo path and owns an agent with >2000 lines, it now
            returns a new error that the test did not expect.
          likelihood: low
          impact: low
          mitigation: |
            CheckAgentLOCBudget skips validation when repoPath is empty (returns
            nil immediately). Most unit tests pass an empty string for RepoPath.
            Integration tests that pass a real repo path could surface new errors,
            but only for legitimately oversized agents — which is the intended behavior.
        - scenario: |
            The errors.Join pattern (Item 4) changes the string representation of
            errors from "[{code msg sev}]" (Go's default slice formatting) to
            "msg1\nmsg2" (errors.Join joins with newlines). Any test asserting on
            the exact error string format could fail.
          likelihood: low
          impact: low
          mitigation: |
            grep the test files for assertions on the exact error string content
            of the affected commands. If found, update to use errors.Is or check
            for a prefix rather than exact match. The semantic content is the same;
            only the formatting changes.
        - scenario: |
            EmitSync migration (Item 3) changes emitWaveMerge and emitWaveStart to
            return errors. If callers (in prepare_wave.go, finalize_wave.go) do not
            exist or are named differently than expected, the build breaks.
          likelihood: low
          impact: medium
          mitigation: |
            Agent C's brief instructs finding the callers first and handling the
            returned error as a warning log. If the caller file is outside Agent C's
            ownership, Agent C should only change the function signature and add
            a TODO comment noting that callers need updating, rather than modifying
            out-of-scope files. Post-merge, an integration pass can wire the error
            handling into the callers.
