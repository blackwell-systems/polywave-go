title: Post-Migration Cleanup
feature_slug: post-migration-cleanup
verdict: SUITABLE
suitability_assessment: |
    All four items are clearly scoped with disjoint file ownership. Each can be
    implemented by a separate agent in parallel with no cross-agent dependencies.

    Item 1 (shim removal): The MergeAgentsData.Success compatibility field still
    has 3 active callers outside merge_agents.go:
      - cmd/sawtools/merge_agents.go:36 reads result.Success
      - pkg/engine/finalize.go:541 reads mergeData.Success
      - pkg/engine/finalize_steps.go:237 reads mergeData.Success
      - pkg/protocol/program_tier_finalize.go sets mergeResult.Success directly
    All of these must migrate to result.Result[T].IsSuccess() before the field
    can be removed from the struct definition. Agent A owns all 5 affected files:
    merge_agents.go (struct def + remove field), merge_agents.go (CLI cmd),
    finalize.go, finalize_steps.go, program_tier_finalize.go.

    Item 2 (FullValidate wiring): full_validate.go line 114-115 has a commented-out
    call to CheckAgentLOCBudget. Trivially safe to uncomment. Confirmed: the TODO
    comment reads "TODO(saw-system-hardening): wired by Agent B — CheckAgentLOCBudget
    call goes here" and CheckAgentLOCBudget is defined in complexity.go with the
    correct signature. Agent B owns only full_validate.go.

    Item 3 (EmitSync audit): All production Emit() call sites are in:
      - cmd/sawtools/finalize_wave_obs.go (3 calls: wave_merge, wave_failed, gate_executed)
      - cmd/sawtools/prepare_wave_obs.go (1 call: wave_start)
      - pkg/engine/finalize.go:698 (impl_complete)
      - pkg/engine/finalize_steps.go:145,147 (gate_executed, wave_failed per gate)
      - pkg/engine/finalize_steps.go:238,248 (wave_failed, wave_merge per merge)
      - pkg/engine/runner.go:67,173 (scout_launch, scout_complete)
      - pkg/engine/program_tier_loop.go:246,280,318,335 (tier events)
    High-signal candidates for EmitSync (store failure should be surfaced):
      - emitWaveMerge in finalize_wave_obs.go: marks successful wave merge
      - emitWaveStart in prepare_wave_obs.go: marks wave start
      - impl_complete in finalize.go: final state transition
    Low-signal (emit-and-forget is acceptable):
      - per-gate events (gate_executed, gate_failed) in finalize_steps.go: advisory
      - scout_launch/scout_complete in runner.go: diagnostic only
      - program tier events in program_tier_loop.go: diagnostic only
    Agent C owns the 4 obs helper files + finalize.go (for impl_complete migration).

    Item 4 (%v -> %w): All 11 fmt.Errorf("%v") patterns in cmd/sawtools format
    []result.SAWError slices (not plain error values). Since SAWError implements
    the error interface (has Error() method and Unwrap()), these can be made
    errors.Is/As-chain-compatible using errors.Join(res.Errors...) with %w.
    However, 2 of the 11 matches are in fmt.Fprintf (interview_cmd.go, non-error
    path) and are out of scope. Of the 9 true error-return cases, 8 are in files
    Agent D owns; the 9th is in cmd/sawtools/merge_agents.go, which Agent A
    already owns (Item 1). Agent D owns 8 files total.

    Pre-implementation status check:
      - Item 1: TODO comment present at line 142 of merge_agents.go, callers confirmed.
      - Item 2: Commented-out call confirmed at line 114-115 of full_validate.go.
      - Items 3 & 4: Confirmed via grep; all call sites located.

    Suitability: SUITABLE. 4 agents with fully disjoint file ownership. Item 1
    requires migrating 4 call sites (surgical but multi-file), others are
    one-liners or small batched changes. All can run in parallel — Wave 1 only.

    Estimated times:
    - Scout phase: ~10 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~15 min (4 agents x ~8 min avg, parallel)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~40 min (4 tasks x 10 min avg sequential time)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup for item 1 (multi-file migration) and item 4
    (batched pattern across 8 files). Items 2 and 3 are small enough that the
    parallelism benefit is modest but the coordination value is high.
