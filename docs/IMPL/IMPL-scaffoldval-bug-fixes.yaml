pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Bug 5 AST import extraction: importsFromAST uses ast.File.Imports which contains
            the quoted string path value (e.g. `"fmt"`). Agent must call strings.Trim with
            backtick-quoted doublequote char, not a regular string. Incorrect unquoting leaves
            quote characters in import paths.
          likelihood: medium
          impact: medium
          mitigation: |-
            Brief explicitly states: `path := strings.Trim(imp.Path.Value, `"`)`
            and notes imp.Path.Value is a quoted string. Test coverage in TestExtractImports
            (which still exercises the old extractImports) plus new ValidateScaffold integration
            tests will catch this.
        - scenario: |-
            Bug 1 go.mod parser: single-line require directives (require github.com/foo v1.0.0)
            are less common but valid. If parseGoMod only handles block-form requires, some
            modules may still be flagged as missing.
          likelihood: low
          impact: low
          mitigation: |-
            Brief includes explicit handling for both block-form and single-line require forms.
            TestCheckImports_ThirdPartyInGoMod exercises the block form.
        - scenario: |-
            Signature change (Bug 6) breaks cmd/sawtools/validate_scaffold_cmd_test.go which
            calls newValidateScaffoldCmd() — an indirect caller. The CLI test does not call
            ValidateScaffold directly but exercises the full command. If validate_scaffold_cmd.go
            is updated but test infra is not, tests still compile since tests call the Cobra command.
          likelihood: low
          impact: low
          mitigation: |-
            validate_scaffold_cmd.go is in Agent B's ownership. Agent B updates it as part of the
            caller update step. The cmd test file is not in Agent B's file ownership since it does
            not need changes — it calls the command via Cobra, not ValidateScaffold directly.
        - scenario: |-
            Bug 3 fix changes TypeReferences from PASS to SKIP. The OverallStatus logic (Bug 2,
            owned by Agent A) also changes. If both agents finish but are merged in the wrong order,
            test TestValidationResult_OverallStatus_AllPass in types_test.go (which sets all 4 steps
            to PASS) could regress if merged with an intermediate state.
          likelihood: low
          impact: low
          mitigation: |-
            Both agents run in Wave 1 with fully disjoint files. They are merged together by the
            orchestrator after both complete. No intermediate state is committed.
