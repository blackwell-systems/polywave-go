interface_contracts:
    - name: ExtractIMPLSlug
      description: |
        Canonical slug extraction from an IMPL path and manifest.
        Priority: manifest.FeatureSlug -> filepath.Base(implPath) with
        "IMPL-" prefix and ".yaml" suffix stripped -> implPath fallback.
      definition: |
        // ExtractIMPLSlug returns the canonical feature slug for an IMPL document.
        // Priority order:
        //  1. manifest.FeatureSlug if non-empty
        //  2. filepath.Base(implPath) with "IMPL-" prefix and ".yaml" suffix stripped (if non-empty result)
        //  3. implPath as final fallback
        func ExtractIMPLSlug(implPath string, manifest *IMPLManifest) string
      location: pkg/protocol/impl_slug.go
    - name: ComputeTierAssignments
      description: |
        Exported greedy graph-coloring tier assignment. Replaces both
        computeTierSuggestion (program_conflict.go) and computeTierAssignments
        (import_impls_cmd.go). The existing computeTierSuggestion becomes an
        unexported wrapper that calls this function.
      definition: |
        // ComputeTierAssignments assigns each slug to the earliest tier where it
        // has no overlap conflicts with already-assigned slugs (greedy graph coloring).
        // slugs: ordered list of IMPL feature slugs to assign
        // overlaps: map[slug]map[conflicting-slug]bool representing the overlap graph
        // Returns: map[slug]int where int is the 1-indexed tier number
        func ComputeTierAssignments(slugs []string, overlaps map[string]map[string]bool) map[string]int
      location: pkg/protocol/program_conflict.go
    - name: ResolveIMPLPathOrAbs
      description: |
        Exported version of the existing resolveIMPLPathOrAbs. Resolves an IMPL
        reference (slug, relative path, or absolute path) to an absolute file path.
      definition: |
        // ResolveIMPLPathOrAbs resolves a single IMPL reference (slug or absolute path)
        // to an absolute file path.
        // Path detection: filepath.IsAbs -> verify+return; contains os.PathSeparator ->
        // join+verify; otherwise slug -> ResolveIMPLPath.
        func ResolveIMPLPathOrAbs(repoPath, ref string) (string, error)
      location: pkg/protocol/program_conflict.go
    - name: ResolveIMPLPath
      description: |
        Exported version of the existing resolveIMPLPath. Finds the IMPL doc for
        a given slug, checking docs/IMPL/ and docs/IMPL/complete/.
      definition: |
        // ResolveIMPLPath finds the IMPL doc for a given slug, checking both
        // docs/IMPL/ and docs/IMPL/complete/ directories.
        func ResolveIMPLPath(repoPath, slug string) (string, error)
      location: pkg/protocol/program_conflict.go
    - name: IMPLStateToStatus
      description: |
        Canonical state-to-status mapping. Single authoritative function replacing:
        - implStateToStatus() in program_generator.go (returns "reviewed" for active states)
        - mapIMPLStateToStatus(ProtocolState) in import_impls_cmd.go (returns "reviewed")
        - mapIMPLStateToStatus(string) in program_status.go (returns "in-progress")
        The canonical function takes ProtocolState (typed) and returns "in-progress"
        for active wave states (WAVE_EXECUTING, WAVE_MERGING, WAVE_VERIFIED, WAVE_PENDING).
      definition: |
        // IMPLStateToStatus maps a ProtocolState to a program IMPL status string.
        // Returns: "complete", "in-progress", "pending", "blocked", "not-suitable",
        // or string(state) for unknown states.
        func IMPLStateToStatus(state ProtocolState) string
      location: pkg/protocol/state_status.go
    - name: BuildFileOwnershipMap
      description: |
        Canonical builder for a file-to-slugs ownership map from IMPL refs.
        Replaces inline map-building loops in CheckIMPLConflicts.
        Uses repo-qualified keys (repo:file) where Repo is set.
      definition: |
        // BuildFileOwnershipMap loads each IMPL ref (slug or abs path) and builds
        // a qualified-file -> []featureSlug map with deduplication.
        // Returns: fileOwners map, ordered featureSlugs list, error.
        func BuildFileOwnershipMap(refs []string, repoPath string) (map[string][]string, []string, error)
      location: pkg/protocol/program_conflict.go
    - name: NewErrorCodeConstants
      description: |
        New constants added to pkg/result/codes.go by Agent C.
        These replace ad-hoc E_X string codes used in pkg/protocol/ files.
      definition: |
        // Engine error codes (N015-N017)
        CodeStatusUpdateFailed  = "N015_STATUS_UPDATE_FAILED"
        CodeTierGateFailed      = "N016_TIER_GATE_FAILED"
        CodeProgramStatusFailed = "N017_PROGRAM_STATUS_FAILED"

        // Build/gate error codes (B008)
        CodeGateInputInvalid = "B008_GATE_INPUT_INVALID"

        // Protocol error codes (P007)
        CodeWiringGap = "P007_WIRING_GAP"
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            You are implementing Scopes 1, 2, 3, and 4 of the protocol architectural
            unification: canonical slug extraction, exported path resolution functions,
            exported tier assignment function, and canonical file ownership map building.

            ## What to implement

            ### 1. Create pkg/protocol/impl_slug.go

            Create this new file with the exported ExtractIMPLSlug function:

            ```go
            package protocol

            import (
                "path/filepath"
                "strings"
            )

            // ExtractIMPLSlug returns the canonical feature slug for an IMPL document.
            // Priority:
            //  1. manifest.FeatureSlug if non-empty
            //  2. filepath.Base(implPath) with "IMPL-" prefix and ".yaml" suffix stripped (if result non-empty)
            //  3. implPath as final fallback
            func ExtractIMPLSlug(implPath string, manifest *IMPLManifest) string {
                if manifest != nil && manifest.FeatureSlug != "" {
                    return manifest.FeatureSlug
                }
                base := strings.TrimSuffix(strings.TrimPrefix(filepath.Base(implPath), "IMPL-"), ".yaml")
                if base != "" {
                    return base
                }
                return implPath
            }
            ```

            Also add a test file `pkg/protocol/impl_slug_test.go` (note: NOT listed in
            file_ownership because it is a companion to impl_slug.go which IS listed).

            ### 2. Export path resolution functions in program_conflict.go

            Rename the unexported functions to exported names:
            - `resolveIMPLPathOrAbs` -> `ResolveIMPLPathOrAbs`
            - `resolveIMPLPath` -> `ResolveIMPLPath`

            Update ALL call sites within pkg/protocol/ to use the new names:
            - program_conflict.go line 92: `resolveIMPLPathOrAbs(repoPath, slug)` -> `ResolveIMPLPathOrAbs`
            - program_conflict.go line 212: `resolveIMPLPathOrAbs(repoPath, ref)` -> `ResolveIMPLPathOrAbs`
            - program_conflict.go line 318: `return resolveIMPLPath(repoPath, ref)` -> `ResolveIMPLPath`
            - program_tier_prepare.go line 80: `resolveIMPLPath(repoDir, slug)` -> `ResolveIMPLPath`
              (program_tier_prepare.go is in the same package; update it here)

            Note: program_generator.go (line 71) is owned by Agent B -- B will update that call site.

            ### 3. Export ComputeTierAssignments in program_conflict.go

            Rename `computeTierSuggestion` to `ComputeTierAssignments`. Add a thin
            unexported wrapper to keep internal call sites working:

            ```go
            func computeTierSuggestion(slugs []string, overlaps map[string]map[string]bool) map[string]int {
                return ComputeTierAssignments(slugs, overlaps)
            }
            ```

            Internal call sites in program_conflict.go (lines 182, 287) continue to call
            computeTierSuggestion -- leave them as-is; the wrapper handles them.

            ### 4. Create BuildFileOwnershipMap in program_conflict.go

            Extract the file ownership map building logic from CheckIMPLConflicts
            (lines 207-245) into:

            ```go
            func BuildFileOwnershipMap(refs []string, repoPath string) (map[string][]string, []string, error)
            ```

            The extracted logic:
            - For each ref: call ResolveIMPLPathOrAbs + Load
            - Extract slug via ExtractIMPLSlug(implPath, manifest)
            - Build fileOwners map with repo-qualified keys (repo:file) and deduplication
            - Collect ordered featureSlugs

            Then update CheckIMPLConflicts to call BuildFileOwnershipMap:
            ```go
            fileOwners, featureSlugs, err := BuildFileOwnershipMap(implRefs, repoPath)
            if err != nil {
                return nil, err
            }
            ```

            Note: CheckIMPLConflicts previously used `manifest.FeatureSlug` with a `slug = ref`
            fallback. With BuildFileOwnershipMap using ExtractIMPLSlug, the fallback now
            strips "IMPL-" prefix and ".yaml" suffix from the filename -- this is a minor
            behavioral improvement for malformed docs.

            ### 5. Tests

            In impl_slug_test.go:
