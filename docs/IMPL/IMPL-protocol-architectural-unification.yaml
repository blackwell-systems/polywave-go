            ## Context

            You are implementing Scope 5 (canonical state->status conversion) of the
            protocol architectural unification. You also own program_status.go entirely
            and are responsible for the E_PROGRAM_STATUS error code replacement there.

            ## What to implement

            ### 1. Create pkg/protocol/state_status.go

            Create the canonical state-to-status function. First, read pkg/protocol/types.go
            to confirm the exact names of ProtocolState constants (e.g., StateBlocked,
            StateNotSuitable -- verify these exist before using them).

            ```go
            package protocol

            // IMPLStateToStatus maps a ProtocolState to a program IMPL status string.
            // Returns: "complete", "in-progress", "pending", "blocked",
            // "not-suitable", or string(state) for unknown states.
            func IMPLStateToStatus(state ProtocolState) string {
                switch state {
                case StateComplete:
                    return "complete"
                case StateWaveExecuting, StateWaveMerging, StateWaveVerified, StateWavePending:
                    return "in-progress"
                case StateReviewed, StateScaffoldPending, StateScoutPending, StateScoutValidating:
                    return "pending"
                case StateBlocked:
                    return "blocked"
                case StateNotSuitable:
                    return "not-suitable"
                default:
                    return string(state)
                }
            }
            ```

            If StateBlocked or StateNotSuitable do not exist in types.go, omit those
            cases (check before writing).

