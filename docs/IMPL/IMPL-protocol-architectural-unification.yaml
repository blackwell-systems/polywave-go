title: Protocol Architectural Unification
feature_slug: protocol-architectural-unification
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly.

    1. File decomposition: 7 distinct unification scopes touch disjoint file sets.
       Scopes 1-4 (slug, tier, ownership map, path resolution) are concentrated in
       pkg/protocol/ and cmd/sawtools/. Scope 5 (state->status) spans two pkg/ files.
       Scope 6 (error codes) affects pkg/protocol/ files in distinct domains.
       Scope 7 (archive utility) is already extracted -- no action needed beyond
       confirming callers use the existing canonical functions. File ownership is
       cleanly disjoint across agents.

    2. Investigation-first: No root cause analysis needed. All duplication sites are
       identified with exact line numbers. The behavioral differences in state->status
       mapping (implStateToStatus returns "reviewed" for active states; mapIMPLStateToStatus
       in program_status.go returns "in-progress") are documented and the canonical
       behavior is determinable from the feature spec.

    3. Interface discoverability: All cross-agent interfaces (ExtractIMPLSlug,
       ComputeTierAssignments, BuildFileOwnershipMap, ResolveIMPLPathOrAbs,
       ResolveIMPLPath, IMPLStateToStatus, new error code constants) can be fully
       specified before wave execution.

    4. Implementation status: All items are TODO -- confirmed by reading current source.
       The ExtractIMPLSlug function does not exist. The tier assignment function is
       duplicated (not consolidated). The canonical path resolvers are unexported.
       The state->status canonical function does not exist. Ad-hoc error code strings
       are present throughout pkg/.

    5. Parallelization value: High. Go build+test cycle is >30s. Agents own 3-8 files
       each. Tasks involve non-trivial logic refactoring, constant additions, and
       caller updates. Wave 1 has 6 parallel agents.

    Scope 7 (archive utility) analysis: ArchiveIMPL and ArchiveProgram already exist as
    exported canonical functions in discovery.go and are used by all callers. No
    duplication. This scope requires NO implementation work -- confirmed by grep.

    State->status behavioral note: The canonical function will align with program_status.go
    behavior (the authoritative "what status does the UI show" function). The
    import_impls_cmd.go and program_generator.go versions return "reviewed" for active
    wave states; program_status.go returns "in-progress". The canonical function will
    return "in-progress" for active wave states. The cmd and generator callers will be
    updated to use the canonical exported function, which changes their output for
    WAVE_EXECUTING/WAVE_MERGING states from "reviewed" to "in-progress" -- correct behavior.

    program_status.go conflict resolution: Both Agent B (state->status unification) and
    the error code work need to touch program_status.go. Agent B owns the file entirely.
    B's task includes BOTH the mapIMPLStateToStatus adapter update AND the E_PROGRAM_STATUS
    error code replacement (line 24), keeping ownership disjoint.

    Agent E split: The 17 error-code files originally assigned to E are split into E
    (9 files: state-machine and infrastructure codes) and E2 (8 files: validation,
    commit, critic, and gate codes). Both agents have independent files and can run
    in parallel.

    Estimated times:
    - Scout phase: ~25 min
    - Agent execution: ~6 agents x ~15 min avg = 90 min parallelized (Wave 1), ~15 min (Wave 2)
    - Merge and verification: ~10 min
    Total SAW time: ~55 min
    Sequential baseline: ~7 scopes x ~20 min = ~140 min
    Time savings: ~85 min (61% faster)
    Recommendation: Clear speedup. Proceed.
