title: pkg/result Bug Fixes
feature_slug: result-bug-fixes
verdict: SUITABLE
suitability_assessment: |
    Five known bugs across three files with clean disjoint ownership. All questions resolve:

    1. File decomposition: result.go+result_test.go → Agent A; codes.go → Agent B. Fully disjoint.
    2. No investigation required: all bugs are precisely located with exact fix instructions.
    3. Interface contracts: no cross-agent interfaces needed — all changes are self-contained within each file.
    4. Pre-implementation status check: all 5 bugs confirmed present in current codebase via direct inspection.
    5. Parallelization value: modest (2 agents, 3 files total). Value is primarily coordination and audit trail.

    Bug 5 scope assessment: grep confirmed that all callers reference N018-N084 string values via their
    Go constant names (CodeContextCancelled, CodeScoutInvalidOpts, etc.), not via raw string literals.
    No switch/case statements or test assertions use the raw ENGINE_* strings. The rename is fully
    contained to codes.go — Agent B owns only that one file. No cascade files needed.

    NewFailure empty-slice callers: grep found zero existing callers passing nil or empty slices,
    confirming the panic guard (Bug 2) is a safe addition with no call-site updates needed.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (2 agents x ~7 min avg, parallel)
    - Merge and verification: ~3 min
    Total SAW time: ~28 min

    Sequential baseline: ~20 min (2 agents x 10 min sequential)
    Recommendation: Marginal speed gain; primary value is audit trail and verified correctness.
test_command: go test ./pkg/result/...
lint_command: go vet ./pkg/result/...
file_ownership:
    - file: pkg/result/result.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/result/result_test.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/result/codes.go
      agent: B
      wave: 1
      action: modify
    - file: pkg/result/codes_test.go
      agent: B
      wave: 1
      action: new
interface_contracts:
    - name: NewFailure
      description: |
        Guard against empty errors slice. Panics at programming-error boundary.
        Dead branch removed. Signature unchanged.
      definition: |
        // NewFailure creates a failed Result with structured errors.
        // Panics if errors is empty — passing an empty slice is a programming error.
        func NewFailure[T any](errors []SAWError) Result[T] {
            if len(errors) == 0 {
                panic("result.NewFailure called with empty errors slice")
            }
            return Result[T]{
                Errors: errors,
                Code:   "FATAL",
            }
        }
      location: pkg/result/result.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Fix four bugs in pkg/result/result.go and pkg/result/result_test.go.

            ## What to implement

            ### Bug 1 — Remove dead branch in NewFailure (result.go:136-145)
            The current NewFailure function has an `if len(errors) > 0 && errors[0].Severity != "fatal"`
            branch that sets `code = "FATAL"` — identical to the value already assigned. It is
            unreachable dead code with a misleading comment.

            Delete the entire if block. The function body after the fix:
            ```go
            func NewFailure[T any](errors []SAWError) Result[T] {
                code := "FATAL"
                return Result[T]{
                    Errors: errors,
                    Code:   code,
                }
            }
            ```
            (Bug 2 below will further simplify this.)

            ### Bug 2 — Add empty-slice guard in NewFailure (result.go:136-145)
            After removing the dead branch (Bug 1), add a panic guard at the top of NewFailure
            for the empty-errors-slice case. The final function after both Bug 1 and Bug 2:

            ```go
            // NewFailure creates a failed Result with structured errors.
            // Panics if errors is empty — passing an empty slice is a programming error.
            func NewFailure[T any](errors []SAWError) Result[T] {
                if len(errors) == 0 {
                    panic("result.NewFailure called with empty errors slice")
                }
                return Result[T]{
                    Errors: errors,
                    Code:   "FATAL",
                }
            }
            ```

            Grep confirmed zero existing callers pass empty slices, so no call-site changes needed.

            ### Bug 3 — Replace contains/searchString helpers in result_test.go (result_test.go:651-662)
            Two helper functions manually reimplement strings.Contains:
            - `func contains(s, substr string) bool` (line 651)
            - `func searchString(s, substr string) bool` (line 655)

            Steps:
            1. Add `"strings"` to the import block in result_test.go.
            2. Find all call sites of `contains(...)` in the test file (currently line 643 and 647).
               Replace each `contains(x, y)` call with `strings.Contains(x, y)`.
            3. Delete both helper functions (lines 651-662).

            ### Bug 4 — Delete identity MarshalJSON/UnmarshalJSON methods (result.go:148-157)
            These two methods use the Alias trick but add no custom logic — they are identical
            to default encoding/json struct marshaling. Delete both methods entirely:

            ```go
            // DELETE these two methods:
            func (r Result[T]) MarshalJSON() ([]byte, error) { ... }
            func (r *Result[T]) UnmarshalJSON(data []byte) error { ... }
            ```

            After deletion, remove `"encoding/json"` from the imports in result.go IF no other
            usage of the json package remains. Verify by checking whether any other code in
            result.go still references `json.`.  (It does not — the import can be removed.)

            The TestJSONMarshalUnmarshal and TestSAWErrorCauseNotSerialized tests must continue
            to pass; they use json.Marshal/json.Unmarshal on the caller side, which works fine
            with default struct marshaling.

            ## Tests to add or update

            Add one new test for the Bug 2 panic guard in result_test.go:

            ```go
            // TestNewFailurePanicsOnEmptySlice verifies NewFailure panics when called with an empty errors slice.
            func TestNewFailurePanicsOnEmptySlice(t *testing.T) {
                defer func() {
                    r := recover()
                    if r == nil {
                        t.Fatal("expected panic, got none")
                    }
                    msg, ok := r.(string)
                    if !ok {
                        t.Fatalf("expected string panic, got %T: %v", r, r)
                    }
                    if msg != "result.NewFailure called with empty errors slice" {
                        t.Errorf("panic message = %q, want %q", msg, "result.NewFailure called with empty errors slice")
                    }
                }()
                _ = NewFailure[string]([]SAWError{})
            }
            ```

            No other test changes are needed. The existing TestNewFailure, TestJSONMarshalUnmarshal,
            and TestSAWErrorCauseNotSerialized tests exercise the fixed code paths correctly.

            ## Verification gate
            ```
            go build ./pkg/result/...
            go vet ./pkg/result/...
            go test ./pkg/result/...
            ```

            All existing tests must pass. The new TestNewFailurePanicsOnEmptySlice test must pass.

            ## Constraints
            - Do not modify codes.go — that file belongs to Agent B.
            - Do not change any function signatures. NewFailure's public signature is unchanged.
            - Do not add new exported functions or types.
            - The `encoding/json` import in result.go must be removed if (and only if) it becomes unused.
            - Do not touch any files outside pkg/result/.
          files:
            - pkg/result/result.go
            - pkg/result/result_test.go
        - id: B
          task: |
            Fix one bug in pkg/result/codes.go: rename N018-N084 string constant values to follow
            the Nxxx_DESCRIPTION pattern used by N001-N017.

            ## What to implement

            ### Bug 5 — N018-N084 naming inconsistency (codes.go:149-217)

