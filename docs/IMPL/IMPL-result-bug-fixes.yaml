pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Bug 4 removal of MarshalJSON/UnmarshalJSON causes import removal of "encoding/json"
            from result.go, but if another usage was missed the build will fail.
          likelihood: low
          impact: low
          mitigation: |
            Agent A must verify after deletion that no other reference to the `json` package
            remains in result.go before removing the import. Running `go build ./pkg/result/...`
            immediately catches this.
        - scenario: |
            Bug 2 panic guard breaks an existing caller that was not found by grep
            (e.g., generated code or a call site added after scouting).
          likelihood: low
          impact: medium
          mitigation: |
            Grep confirmed zero existing callers pass empty or nil slices. The full test suite
            `go test ./...` at merge time catches any missed call site. The panic message is
            clear enough to diagnose immediately.
        - scenario: |
            Bug 5 rename causes a test in pkg/notify or pkg/engine that asserts on the old
            string values (e.g., checking err.Code == "ENGINE_SCOUT_FAILED") to fail.
          likelihood: low
          impact: medium
          mitigation: |
            Grep across all *_test.go files confirmed zero test files assert on the raw ENGINE_*
            or CONTEXT_CANCELLED string values. All test files reference the constants by their
            Go names. Running `go test ./...` post-merge catches any miss.
        - scenario: |
            Agent B's new codes_test.go conflicts with a file that Agent A also creates
            (e.g., if Agent A decides to split test helpers into a separate file).
          likelihood: low
          impact: low
          mitigation: |
            Agent A's scope is explicitly result.go and result_test.go. Agent B's new file is
            codes_test.go — a distinct filename. No conflict possible.
