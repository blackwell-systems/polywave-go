            Also update the block comment that currently reads:
            `// N018-N084: Engine operation codes — ad-hoc strings migrated from pkg/engine/ and pkg/notify/`
            to:
            `// N018-N084: Engine operation codes (renamed to follow Nxxx_DESCRIPTION pattern)`

            Remove the inline `// N018`, `// N019`, ... `// N084` comments that were tracking the
