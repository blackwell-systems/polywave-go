            The Go *constant names* (CodeContextCancelled, CodeScoutInvalidOpts, etc.) do NOT change.
            Only the string values on the right-hand side of the = assignment change.

            **Important:** Grep confirmed that no callers use the raw string values in switch/case
            statements or string comparisons. All callers reference the Go constant names. Therefore
            this is a contained rename with no cascade files.

