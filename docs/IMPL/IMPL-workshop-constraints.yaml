    overall_risk: medium
    rows:
        - scenario: Bash write detection regex misses edge cases (heredocs, subshells, pipes)
          likelihood: medium
          impact: low
          mitigation: Bash constraint is best-effort by design. Document known limitations. The Workshop IS the executor, so even imperfect regex is better than no enforcement.
        - scenario: Backward compatibility regression - zero-value Constraints changes behavior
          likelihood: low
          impact: high
          mitigation: Agent D tests zero-value passthrough explicitly. All existing tests must pass unchanged since no Constraints are set.
        - scenario: Import cycle between tools and backend packages
          likelihood: low
          impact: high
          mitigation: 'Data flows one direction: backend imports tools (already established). Constraints is defined in tools package. No reverse dependency.'
        - scenario: CommitTracker not accessible after RunStreamingWithTools returns
          likelihood: medium
          impact: medium
          mitigation: Agent E adds CommitCount() method to both Client types. Engine layer checks this after execution completes.
