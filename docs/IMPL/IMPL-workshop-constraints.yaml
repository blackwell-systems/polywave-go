interface_contracts:
    - name: Constraints
      description: |
        Shared config struct consumed by all constraint middleware. Flows from
        engine -> backend.Config -> buildWorkshop. Must be defined before Wave 1
        agents implement middleware against it.
      definition: |
        type Constraints struct {
            OwnedFiles          map[string]bool
            FrozenPaths         map[string]bool
            FreezeTime          *time.Time
            TrackCommits        bool
            AllowedPathPrefixes []string
            AgentRole           string
            AgentID             string
        }
        type CommitTracker struct {
            Count int
        }
      location: pkg/tools/constraints.go
    - name: WithConstraints
      description: |
        Workshop constructor that applies all constraint middleware based on
        the Constraints config. Returns (Workshop, *CommitTracker) so the
        caller can check commit count after execution.
      definition: |
        func WithConstraints(w Workshop, c Constraints) (Workshop, *CommitTracker)
      location: pkg/tools/constraint_middleware.go
    - name: OwnershipMiddleware
      description: |
        Middleware that blocks write_file/edit_file for files not in OwnedFiles.
        Returns structured error string to model (not Go error).
      definition: |
        func OwnershipMiddleware(toolName string, c Constraints) Middleware
      location: pkg/tools/constraint_middleware.go
    - name: FreezeMiddleware
      description: |
        Middleware that blocks write_file/edit_file for frozen paths after freeze time.
        Returns structured error string to model.
      definition: |
        func FreezeMiddleware(toolName string, c Constraints) Middleware
      location: pkg/tools/constraint_middleware.go
    - name: BashConstraintMiddleware
      description: |
        Middleware for bash tool that: (1) detects write-like commands targeting
        non-owned files, (2) detects git commit commands and increments CommitTracker.
      definition: |
        func BashConstraintMiddleware(c Constraints, tracker *CommitTracker) Middleware
      location: pkg/tools/constraint_middleware.go
    - name: RolePathMiddleware
      description: |
        Middleware that restricts write_file/edit_file to paths matching
        AllowedPathPrefixes. Used for I6 Scout and Scaffold role enforcement.
      definition: |
        func RolePathMiddleware(toolName string, c Constraints) Middleware
      location: pkg/tools/constraint_middleware.go
    - name: backend.Config.Constraints
      description: |
        New field on backend.Config to carry constraints from engine to backend.
      definition: |
        // In backend.Config struct, add:
        Constraints *tools.Constraints
      location: pkg/agent/backend/backend.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Implement I1 (File Ownership) and I2 (Interface Freeze) constraint middleware
            for the write_file and edit_file tools. These middleware intercept tool execution
            and return structured BLOCKED error strings to the model when violations occur.

            ## Interfaces to Implement

            Two middleware constructors in `pkg/tools/constraint_middleware.go`:

            ```go
            // OwnershipMiddleware blocks write_file/edit_file for files not in the agent's
            // ownership list. If OwnedFiles is empty/nil, the middleware is a passthrough
            // (backward compatible).
            func OwnershipMiddleware(toolName string, c Constraints) Middleware

            // FreezeMiddleware blocks write_file/edit_file for paths in FrozenPaths when
            // FreezeTime is set. If FrozenPaths is empty/nil, the middleware is a passthrough.
            func FreezeMiddleware(toolName string, c Constraints) Middleware
            ```

            OwnershipMiddleware behavior:
            - Extract file_path from input map
            - Resolve relative paths against execCtx.WorkDir
            - Check if the resolved path (or its relative form) is in c.OwnedFiles
            - If NOT owned, return string (not Go error): "BLOCKED: file <path> is not in your
              ownership list. You own: [file1, file2, ...]"
            - If owned or OwnedFiles is empty, call next.Execute()

            FreezeMiddleware behavior:
            - Extract file_path from input map
            - Check if path matches any entry in c.FrozenPaths
            - If frozen and c.FreezeTime is non-nil, return string:
              "BLOCKED: file <path> is frozen (interface contract). Frozen at: <time>"
            - If not frozen or FrozenPaths is empty, call next.Execute()

            ## Interfaces to Call

            - `Constraints` struct from scaffold file `pkg/tools/constraints.go`
            - `Middleware` type from `pkg/tools/types.go`
            - `executorFunc` adapter from `pkg/tools/middleware.go`
            - `resolvePath` helper from `pkg/tools/executors.go`

            ## Tests to Write

            In `pkg/tools/constraint_middleware_test.go`:
            1. TestOwnershipMiddleware_AllowsOwnedFile - write to owned file passes through
            2. TestOwnershipMiddleware_BlocksUnownedFile - returns BLOCKED string with ownership list
            3. TestOwnershipMiddleware_EmptyOwnership_Passthrough - nil OwnedFiles allows all writes
            4. TestOwnershipMiddleware_RelativePath - relative path resolved against WorkDir
            5. TestFreezeMiddleware_BlocksFrozenPath - returns BLOCKED string with freeze time
            6. TestFreezeMiddleware_AllowsNonFrozenPath - non-frozen paths pass through
            7. TestFreezeMiddleware_NoFreezeTime_Passthrough - nil FreezeTime disables enforcement
            8. TestFreezeMiddleware_EmptyFrozenPaths_Passthrough - empty map allows all writes

            ## Verification Gate

            ```bash
            go build ./pkg/tools/...
            go vet ./pkg/tools/...
            go test ./pkg/tools/ -run "TestOwnership|TestFreeze" -v
            ```

            ## Constraints

            - Return BLOCKED strings to the model (not Go errors) so the model can adjust
            - Follow the existing PermissionMiddleware pattern in middleware.go
            - Only apply to write_file and edit_file tools (toolName check)
            - Must be backward compatible: empty Constraints = no enforcement
          files:
            - pkg/tools/constraint_middleware.go
            - pkg/tools/constraint_middleware_test.go
        - id: B
          task: |
            ## What to Implement

            Implement I5 (Commit Tracking) and bash-specific constraint enforcement.
            The bash tool needs special handling: (1) detect write-like shell commands
            targeting non-owned files, and (2) detect `git commit` commands to track
            commit count for I5 enforcement.

            ## Interfaces to Implement

            In `pkg/tools/bash_constraints.go`:

            ```go
            // BashConstraintMiddleware returns middleware for the bash tool that:
            // 1. Detects write-like commands (>, >>, tee, sed -i, mv, cp) targeting
            //    non-owned files and returns BLOCKED string
            // 2. Detects git commit commands and increments tracker.Count
            // If Constraints has empty OwnedFiles, write detection is skipped.
            func BashConstraintMiddleware(c Constraints, tracker *CommitTracker) Middleware
            ```

            Write-like command detection (regex-based, best-effort):
            - Redirect operators: `> file`, `>> file`
            - Commands: `tee file`, `sed -i ... file`, `mv ... dest`, `cp ... dest`
            - Extract target file path, check against c.OwnedFiles
            - If not owned: "BLOCKED: bash command writes to <file> which is not in your ownership list"

            Git commit detection:
            - Match `git commit` (with optional flags) in the command string
            - Increment tracker.Count atomically (use sync/atomic or mutex)
            - Allow the command to proceed (don't block commits)

            ## Interfaces to Call

            - `Constraints` and `CommitTracker` from scaffold `pkg/tools/constraints.go`
            - `Middleware`, `executorFunc` from `pkg/tools/types.go` and `pkg/tools/middleware.go`

            ## Tests to Write

            In `pkg/tools/bash_constraints_test.go`:
            1. TestBashConstraint_BlocksRedirectToUnownedFile - `echo x > unowned.go` blocked
            2. TestBashConstraint_AllowsRedirectToOwnedFile - `echo x > owned.go` passes
            3. TestBashConstraint_BlocksSedInPlace - `sed -i 's/x/y/' unowned.go` blocked
            4. TestBashConstraint_BlocksTee - `cat x | tee unowned.go` blocked
            5. TestBashConstraint_TracksGitCommit - `git commit -m "msg"` increments counter
            6. TestBashConstraint_TracksGitCommitAll - `git commit -am "msg"` increments counter
            7. TestBashConstraint_NoTrackingWhenDisabled - TrackCommits=false skips tracking
            8. TestBashConstraint_EmptyOwnership_AllowsAll - nil OwnedFiles skips write detection
            9. TestBashConstraint_ReadCommandsPassThrough - `cat`, `ls`, `grep` always allowed

            ## Verification Gate

            ```bash
            go build ./pkg/tools/...
            go vet ./pkg/tools/...
            go test ./pkg/tools/ -run "TestBashConstraint" -v
            ```

            ## Constraints

            - Write detection is best-effort regex, not shell parsing. Cover common patterns.
            - Git commit detection should match: `git commit`, `git commit -m`, `git commit -am`,
              `git commit --amend`. Do NOT block the command, only count it.
            - Use sync/atomic for CommitTracker.Count to be goroutine-safe.
            - Return BLOCKED strings (not Go errors) for write violations.
          files:
            - pkg/tools/bash_constraints.go
            - pkg/tools/bash_constraints_test.go
        - id: C
          task: |
            ## What to Implement

            Implement I6 (Role Separation) path restriction middleware. This enforces that
            Scout agents can only write to `docs/IMPL/IMPL-*.yaml`, Scaffold agents can
            only write to scaffold file paths, and Wave agents use file ownership (handled
            by Agent A's OwnershipMiddleware).

            ## Interfaces to Implement

            In `pkg/tools/role_middleware.go`:

            ```go
            // RolePathMiddleware blocks write_file/edit_file for paths that don't match
            // any of the AllowedPathPrefixes. If AllowedPathPrefixes is empty, the
            // middleware is a passthrough (Wave agents use OwnershipMiddleware instead).
            func RolePathMiddleware(toolName string, c Constraints) Middleware
            ```

            Behavior:
            - Extract file_path from input map
            - If c.AllowedPathPrefixes is empty, passthrough (call next.Execute)
            - Check if file_path has any prefix in c.AllowedPathPrefixes
            - For Scout role: prefix is "docs/IMPL/IMPL-" and suffix must be ".yaml"
            - If no prefix matches: "BLOCKED: <role> agent cannot write to <path>.
              Allowed paths: [prefix1, prefix2, ...]"
            - If matches, call next.Execute()

            ## Interfaces to Call

            - `Constraints` from scaffold `pkg/tools/constraints.go`
            - `Middleware`, `executorFunc` from `pkg/tools/types.go` and `pkg/tools/middleware.go`

            ## Tests to Write

            In `pkg/tools/role_middleware_test.go`:
            1. TestRolePath_ScoutAllowsIMPLYaml - Scout can write docs/IMPL/IMPL-foo.yaml
            2. TestRolePath_ScoutBlocksSourceCode - Scout cannot write pkg/foo.go
            3. TestRolePath_ScoutBlocksNonIMPLYaml - Scout cannot write docs/other.yaml
            4. TestRolePath_ScaffoldAllowsScaffoldPaths - Scaffold can write configured paths
            5. TestRolePath_ScaffoldBlocksOtherPaths - Scaffold cannot write non-scaffold paths
            6. TestRolePath_EmptyPrefixes_Passthrough - No prefixes = no restriction
            7. TestRolePath_OnlyAppliesToWriteTools - read_file is never restricted

            ## Verification Gate

            ```bash
            go build ./pkg/tools/...
            go vet ./pkg/tools/...
            go test ./pkg/tools/ -run "TestRolePath" -v
            ```

            ## Constraints

            - Use strings.HasPrefix for path matching (not full glob)
            - The toolName parameter determines if this middleware applies: only "write_file"
              and "edit_file". For other tools, always passthrough.
            - Must be compatible with the existing IsValidScoutPath in pkg/hooks/scout_boundaries.go
              (same logic, different enforcement point)
          files:
            - pkg/tools/role_middleware.go
            - pkg/tools/role_middleware_test.go
        - id: D
          task: |
            ## What to Implement

            Implement the `WithConstraints` constructor that composes all constraint
            middleware into a single Workshop. This is the primary entry point that
            backends call instead of building middleware individually.

            ## Interfaces to Implement

            In `pkg/tools/workshop_constrained.go`:

            ```go
            // WithConstraints returns a new Workshop with all constraint middleware applied
            // based on the Constraints config. Returns the wrapped Workshop and a
            // CommitTracker (non-nil only when c.TrackCommits is true).
            //
            // Middleware application order (outermost to innermost):
            // 1. RolePathMiddleware (I6) - broadest filter first
            // 2. FreezeMiddleware (I2) - frozen paths before ownership
            // 3. OwnershipMiddleware (I1) - file-level ownership
            // 4. BashConstraintMiddleware (I5+I1) - bash-specific (only on bash tool)
            //
            // If Constraints is zero-value, returns the original Workshop unchanged
            // (backward compatible).
            func WithConstraints(w Workshop, c Constraints) (Workshop, *CommitTracker)

            // ConstrainedTools creates a Workshop with StandardTools and all constraints applied.
            // Convenience function combining StandardTools + WithConstraints.
            func ConstrainedTools(workDir string, c Constraints) (Workshop, *CommitTracker)
            ```

            ## Interfaces to Call

            - `OwnershipMiddleware`, `FreezeMiddleware` from Agent A (constraint_middleware.go)
            - `BashConstraintMiddleware` from Agent B (bash_constraints.go)
            - `RolePathMiddleware` from Agent C (role_middleware.go)
            - `Constraints`, `CommitTracker` from scaffold (constraints.go)
            - `NewWorkshop`, `StandardTools` from existing code
            - `Tool`, `Workshop` interface from types.go

            ## Tests to Write

            In `pkg/tools/workshop_constrained_test.go`:
            1. TestWithConstraints_ZeroValue_Passthrough - empty Constraints returns original workshop
            2. TestWithConstraints_OwnershipApplied - write to unowned file is blocked
            3. TestWithConstraints_FreezeApplied - write to frozen file is blocked
            4. TestWithConstraints_RoleApplied - Scout path restriction active
            5. TestWithConstraints_BashTracking - git commit increments tracker
            6. TestWithConstraints_CommitTracker_NilWhenDisabled - TrackCommits=false returns nil tracker
            7. TestConstrainedTools_Integration - full StandardTools + constraints integration
            8. TestWithConstraints_MultipleMiddleware_Order - ownership + freeze both apply correctly

            ## Verification Gate

            ```bash
            go build ./pkg/tools/...
            go vet ./pkg/tools/...
            go test ./pkg/tools/ -run "TestWithConstraints|TestConstrainedTools" -v
            ```

            ## Constraints

            - Zero-value Constraints MUST be a no-op (backward compatibility is critical)
            - The CommitTracker is shared across all bash tool calls in a single agent execution
            - Iterate over workshop.All(), apply appropriate middleware per tool name, re-register
            - For bash tool: apply BashConstraintMiddleware instead of Ownership/Freeze middleware
            - For write_file/edit_file: apply RolePath, Freeze, Ownership in that order
            - For all other tools (read_file, glob, grep, list_directory): no constraint middleware
          files:
            - pkg/tools/workshop_constrained.go
            - pkg/tools/workshop_constrained_test.go
