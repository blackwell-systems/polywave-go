title: 'Workshop Constraints: Tool-Level SAW Protocol Enforcement'
feature_slug: workshop-constraints
verdict: SUITABLE
suitability_assessment: |
    SUITABLE. The feature decomposes cleanly into independent middleware implementations
    (I1, I2, I5, I6) that all consume a shared Constraints config type. The existing
    middleware pattern (PermissionMiddleware, TimingMiddleware, WithPermissions, WithTiming)
    provides a proven architecture to follow. Each invariant enforcement is a separate
    middleware function with its own test file, enabling full parallelism in Wave 1.
    Wave 2 integrates constraints into the backend clients and engine runner.

    Partial implementation exists: ReadOnly bool on backend.Config and the
    PermissionMiddleware/ReadOnlyTools pattern provide the scaffolding. The new work
    extends this with file-level granularity (ownership lists, frozen paths) rather
    than simple boolean gating.
