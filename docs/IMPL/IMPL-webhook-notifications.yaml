          ## Agent B: Dispatcher + Registry

          **Repo:** scout-and-wave-go (`/Users/dayna.blackwell/code/scout-and-wave-go`)

          Implement the Dispatcher (fan-out sends to N adapters, collects errors) and
          Registry (adapter name -> factory function mapping for config-driven instantiation).

          The shared types (Event, Message, Adapter, Formatter, Severity) are already
          defined in `pkg/notify/types.go` (created by scaffold agent). Import and use them.

          **Files to create:**
          - `pkg/notify/dispatcher.go` - Dispatcher struct with fan-out logic
          - `pkg/notify/dispatcher_test.go` - Tests with mock adapters
          - `pkg/notify/registry.go` - Global registry with Register/NewFromConfig
          - `pkg/notify/registry_test.go` - Registry tests

          **Interface contracts:**

          dispatcher.go:
          ```go
          type Dispatcher struct {
              mu       sync.RWMutex
              adapters []Adapter
          }

          func NewDispatcher(adapters ...Adapter) *Dispatcher
          func (d *Dispatcher) Dispatch(ctx context.Context, event Event, formatter Formatter) error
          func (d *Dispatcher) AddAdapter(a Adapter)
          func (d *Dispatcher) RemoveAdapter(name string)
          ```

          Dispatch() must:
          - Format the event using the provided Formatter
          - Fan out Send() to all adapters concurrently (use errgroup or goroutines)
          - Collect all errors and return a combined error (use errors.Join or similar)
          - Respect context cancellation

          registry.go:
          ```go
          type AdapterFactory func(cfg map[string]string) (Adapter, error)

          func Register(name string, factory AdapterFactory)
          func NewFromConfig(name string, cfg map[string]string) (Adapter, error)
          func RegisteredNames() []string
          ```

          **Tests:**
          - Dispatch to 3 mock adapters, verify all receive the message
          - Dispatch with one failing adapter, verify others still receive
          - Context cancellation stops in-flight sends
          - Registry: register + create from config
          - Registry: unknown name returns error

          **Verification:** `cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/notify/ -run "TestDispatch|TestRegistry"`

          **Constraints:**
          - ZERO imports from any SAW package (pkg/protocol, pkg/engine, etc.)
          - Types are defined in types.go (scaffold)
          - Only stdlib imports allowed (sync, context, errors, etc.)
