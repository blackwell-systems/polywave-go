interface_contracts:
    - name: ScanPreImplementation
      description: Migrate return type from (*SuitabilityResult, error) to result.Result[SuitabilityResult]
      definition: |
        func ScanPreImplementation(repoRoot string, requirements []Requirement) result.Result[SuitabilityResult]
      location: pkg/suitability/scanner.go
    - name: AnalyzeSuitability
      description: Migrate return type from (*SuitabilityResult, error) to result.Result[SuitabilityResult]
      definition: |
        func AnalyzeSuitability(requirementsFile string, repoRoot string) result.Result[SuitabilityResult]
      location: pkg/suitability/wrapper.go
    - name: ParseRequirements
      description: Migrate return type from ([]Requirement, error) to result.Result[[]Requirement]
      definition: |
        func ParseRequirements(content string) result.Result[[]Requirement]
      location: pkg/suitability/wrapper.go
    - name: Suitability error codes
      description: Add 6 new error codes to pkg/result/codes.go for suitability operations
      definition: |
        const (
          CodeSuitabilityRepoRootEmpty       = "S001_REPO_ROOT_EMPTY"
          CodeSuitabilityClassifyFailed      = "S002_CLASSIFY_FAILED"
          CodeSuitabilityFileStatFailed      = "S003_FILE_STAT_FAILED"
          CodeSuitabilityFileReadFailed      = "S004_FILE_READ_FAILED"
          CodeSuitabilityRequirementsRead    = "S005_REQUIREMENTS_READ"
          CodeSuitabilityRequirementsParse   = "S006_REQUIREMENTS_PARSE"
        )
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Migrate pkg/suitability to result.Result[T] pattern and add conforming error codes.

            **Signature changes (3 functions):**

            1. `scanner.go:25` — `ScanPreImplementation()`
               - FROM: `func ScanPreImplementation(repoRoot string, requirements []Requirement) (*SuitabilityResult, error)`
               - TO: `func ScanPreImplementation(repoRoot string, requirements []Requirement) result.Result[SuitabilityResult]`

            2. `wrapper.go:19` — `AnalyzeSuitability()`
               - FROM: `func AnalyzeSuitability(requirementsFile string, repoPath string) (*SuitabilityResult, error)`
               - TO: `func AnalyzeSuitability(requirementsFile string, repoPath string) result.Result[SuitabilityResult]`

            3. `wrapper.go:66` — `ParseRequirements()`
               - FROM: `func ParseRequirements(content string) ([]Requirement, error)`
               - TO: `func ParseRequirements(content string) result.Result[[]Requirement]`

            **Error code additions (pkg/result/codes.go):**

            Add these 6 constants to the file (insert after existing T001-T099 tool error codes, before the closing comment):

            ```go
            // Suitability error codes (S001-S099)
            const (
              CodeSuitabilityRepoRootEmpty       = "S001_REPO_ROOT_EMPTY"
              CodeSuitabilityClassifyFailed      = "S002_CLASSIFY_FAILED"
              CodeSuitabilityFileStatFailed      = "S003_FILE_STAT_FAILED"
              CodeSuitabilityFileReadFailed      = "S004_FILE_READ_FAILED"
              CodeSuitabilityRequirementsRead    = "S005_REQUIREMENTS_READ"
              CodeSuitabilityRequirementsParse   = "S006_REQUIREMENTS_PARSE"
            )
            ```

            **Error handling migration (9 fmt.Errorf calls):**

            Replace all fmt.Errorf() calls with result.SAWError using the new codes:

            - `scanner.go:27` (repoRoot empty) → result.NewFailure with S001_REPO_ROOT_EMPTY
            - `scanner.go:40` (classify failed) → result.NewFailure with S002_CLASSIFY_FAILED
            - `scanner.go:175` (file read failed) → result.NewFailure with S004_FILE_READ_FAILED
            - `wrapper.go:28` (file stat failed) → result.NewFailure with S003_FILE_STAT_FAILED
            - `wrapper.go:34` (requirements read) → result.NewFailure with S005_REQUIREMENTS_READ
            - `wrapper.go:40` (requirements parse) → result.NewFailure with S006_REQUIREMENTS_PARSE
            - `wrapper.go:50` (scan failed) → result.NewFailure with S002_CLASSIFY_FAILED

            **Bug fix: ItemStatus.Missing initialization (scanner.go:79)**

            Change `return ItemStatus{}` to `return ItemStatus{Missing: []string{}}` to ensure slice is empty, not nil.

            **Bug fix: AnalyzeSuitability triple nullability (wrapper.go:21,26,44)**

            Current code returns (nil, nil) for three distinct conditions. Replace with:
            - `requirementsFile == ""` → return result.NewSuccess(SuitabilityResult{}) with zero-initialized struct
            - File doesn't exist → return result.NewSuccess(SuitabilityResult{}) with zero-initialized struct
            - Empty requirements → return result.NewSuccess(SuitabilityResult{}) with zero-initialized struct

            All three cases are success states (no requirements to scan), not errors.

            **Signature fix: ParseRequirements always returns nil error (wrapper.go:131)**

            The function declares error return but always returns nil. Remove the error return entirely
            (part of signature migration to result.Result[[]Requirement]). Change line 131 from:
            ```go
            return requirements, nil
            ```
            to:
            ```go
            return result.NewSuccess(requirements)
            ```

            ## Interface Contracts

            Follow the result.Result[T] pattern from pkg/notify/slack.go:88:
            - Success: `return result.NewSuccess(data)`
            - Failure: `return result.NewFailure[T]([]result.SAWError{...})`
            - Partial: `return result.NewPartial(data, []result.SAWError{warnings})`

            Error construction:
            ```go
            result.SAWError{
              Code:     result.CodeSuitabilityRepoRootEmpty,  // use new constants
              Message:  "repo root cannot be empty",
              Severity: "fatal",
            }
            ```

            Wrap existing errors with `.WithCause(err)`:
            ```go
            result.NewFailure[SuitabilityResult]([]result.SAWError{
              result.SAWError{
                Code:     result.CodeSuitabilityFileReadFailed,
                Message:  fmt.Sprintf("failed to read file %s", filePath),
                Severity: "fatal",
              }.WithCause(err),
            })
            ```

            ## Tests

            No new tests needed — Agent C will add wrapper function tests in scanner_test.go.

            Your changes will break existing tests temporarily (signature changes), but Agent C
            will fix them when adding comprehensive wrapper coverage.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./pkg/suitability/... && \
            go vet ./pkg/suitability/... && \
            go test ./pkg/suitability/...
            ```

            Pass criteria: All commands exit 0. Tests will fail initially (signature changes),
            but must pass after all agents complete.

            **Engine caller update (pkg/engine/runner.go:1177):**

            Update the AnalyzeSuitability() caller in runner.go to handle the new signature:

            Current (line 1177-1181):
            ```go
            suitResult, err := suitability.AnalyzeSuitability(requirementsFile, repoRoot)
            if err != nil {
                logger.Error("suitability analysis failed", "error", err)
            }
            if suitResult != nil {
            ```

            Change to:
            ```go
            suitResult := suitability.AnalyzeSuitability(requirementsFile, repoRoot)
            if suitResult.IsFatal() {
                logger.Error("suitability analysis failed", "error", suitResult.Errors[0])
            }
            if suitResult.IsSuccess() {
                data := suitResult.GetData()
            ```

            And update line 1182 onwards to use `data.PreImplementation` instead of `suitResult.PreImplementation`.

            ## Constraints

            - Do NOT change classifyRequirement() or ClassifyFile() signatures — they are internal helpers
            - Do NOT export classifyRequirement() — review finding 10 is LOW priority, not in scope
            - Import result package: `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"`
            - Preserve all existing comments and logic — only change return types and error handling
          files:
