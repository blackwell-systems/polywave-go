title: Fix pkg/suitability review findings
feature_slug: suitability-review-fixes
verdict: SUITABLE
suitability_assessment: |
    All five suitability gate criteria pass:

    1. **File decomposition:** Work spans 8 distinct files (scanner.go, wrapper.go,
       types.go, analyze_suitability_cmd.go, analyze_suitability_cmd_test.go, runner.go,
       scanner_test.go, codes.go) with 3 agents modifying disjoint file sets. Agent A
       owns scanner.go+wrapper.go+codes.go+runner.go (signature changes + engine caller),
       Agent B owns analyze_suitability_cmd.go+analyze_suitability_cmd_test.go
       (deduplication fix + test updates), Agent C owns scanner_test.go+types.go (test
       coverage + doc comments). No conflicts.

    2. **Investigation-first items:** No unknowns. All 13 findings are documented with
       exact line numbers, root causes, and fix requirements. No crash analysis or race
       condition reproduction needed.

    3. **Interface discoverability:** Return type changes are fully specified
       (result.Result[SuitabilityResult], result.Result[[]Requirement]). Error code
       additions follow existing Code* naming pattern in pkg/result/codes.go. No
       cross-agent coordination needed — changes are additive (error codes) and
       within-package (signature changes).

    4. **Pre-implementation status check:** All findings are TODO — no partial or done
       items. Codebase review confirms:
       - scanner.go/wrapper.go still return (*T, error) patterns
       - fmt.Errorf() calls still present (9 total)
       - cmd parseRequirements() still duplicates wrapper.ParseRequirements()
       - ItemStatus.Missing still initialized as nil in scanner.go:79
       - Tests for wrapper functions missing

    5. **Parallelization value check:** Agents are independent (Wave 1 only), but
       parallelization benefit is clear:
       - Build/test cycle: ~5-8s for go test ./pkg/suitability/... (not trivial)
       - Files per agent: Agent A owns 2 files, Agent B owns 1, Agent C owns 2 (avg 1.7)
       - Task complexity: HIGH — signature changes cascade to callers, test additions
         require understanding classification logic, error conformance requires adding
         6 new error codes + converting 9 call sites
       - Agent independence: All agents modify different files (disjoint ownership)

       Estimated times:
       - Scout phase: ~8 min (reading 8 files, mapping error patterns, defining contracts)
       - Agent execution: ~18 min (3 agents × 6 min avg, full parallel)
       - Merge & verification: ~4 min (repo-wide tests, build, validate signatures)
       Total SAW time: ~30 min

       Sequential baseline: ~42 min (3 agents × ~12 min avg sequential time + ~6 min overhead)
       Time savings: ~12 min (29% faster)

       Recommendation: Clear speedup. The signature changes require careful coordination
       (agent must update both scanner.go and wrapper.go atomically) — isolation prevents
       mid-change errors that would occur if done sequentially.
