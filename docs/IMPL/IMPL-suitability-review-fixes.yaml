        - id: B
          task: |
            ## What to Implement

            Fix HIGH priority code duplication between cmd and wrapper (89% similarity).

            **Current state:**
            - `cmd/sawtools/analyze_suitability_cmd.go:102-174` has `parseRequirements()` function
            - `pkg/suitability/wrapper.go:66-132` has `ParseRequirements()` function
            - The cmd version duplicates the wrapper logic instead of calling it

            **Fix:**

            1. Delete the entire `parseRequirements()` function (lines 102-174) from analyze_suitability_cmd.go
            2. Update line 45 from:
               ```go
               requirements, err := parseRequirements(string(reqData))
               ```
               to:
               ```go
               reqResult := suitability.ParseRequirements(string(reqData))
               if reqResult.IsFatal() {
                 return fmt.Errorf("parse requirements: %v", reqResult.Errors[0])
               }
               requirements := reqResult.GetData()
               ```

            3. Update line 62 to handle new signature:
               ```go
               result := suitability.ScanPreImplementation(repoRootFlag, requirements)
               if result.IsFatal() {
                 return fmt.Errorf("scan pre-implementation: %v", result.Errors[0])
               }
               ```

            4. Update line 68 to extract data:
               ```go
               data, err = json.MarshalIndent(result.GetData(), "", "  ")
               ```

            **Fix test file (cmd/sawtools/analyze_suitability_cmd_test.go):**

            The test file calls the deleted parseRequirements() function 4 times:
            - Line 197
            - Line 233
            - Line 264
            - Line 282

            Update all 4 call sites from:
            ```go
            requirements, err := parseRequirements(content)
            ```
            to:
            ```go
            reqResult := suitability.ParseRequirements(content)
            if reqResult.IsFatal() {
                t.Fatalf("parse requirements: %v", reqResult.Errors)
            }
            requirements := reqResult.GetData()
            ```

            **Rationale:**

            The cmd function was added after wrapper.ParseRequirements() already existed.
            It duplicated the logic to avoid dealing with the wrapper's error return type.
            Agent A is migrating wrapper to result.Result[T], which makes calling it from
            cmd simpler. Delete the duplication entirely — always call the wrapper.

            The test file also called the duplicated function, so it must be updated too.

            ## Interface Contracts

            Agent A is changing wrapper.ParseRequirements() signature:
            - FROM: `([]Requirement, error)`
            - TO: `result.Result[[]Requirement]`

            And wrapper.ScanPreImplementation() signature:
            - FROM: `(*SuitabilityResult, error)`
            - TO: `result.Result[SuitabilityResult]`

            Use these patterns:
            - Check failure: `if result.IsFatal() { ... }`
            - Extract data: `requirements := result.GetData()`

            ## Tests

            No new tests needed — cmd tests already call ScanPreImplementation via the RunE handler.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./cmd/sawtools/... && \
            go vet ./cmd/sawtools/... && \
            go test ./cmd/sawtools/...
            ```

            Pass criteria: All commands exit 0. Build confirms deduplication succeeded.

            ## Constraints

            - Do NOT modify the cobra command structure (flags, RunE, etc.)
            - Do NOT change the JSON marshaling logic (lines 68-80)
            - Import result package if not already present
            - Preserve all existing comments and error messages
          files:
            - cmd/sawtools/analyze_suitability_cmd.go
            - cmd/sawtools/analyze_suitability_cmd_test.go
        - id: C
          task: |
            ## What to Implement

            Add missing test coverage for wrapper functions and doc comments.

            **Test additions (scanner_test.go):**

            Add these 4 test functions after existing tests:

            1. `TestAnalyzeSuitability_EmptyFile` — verify empty requirementsFile returns success with zero-initialized struct
            2. `TestAnalyzeSuitability_FileNotFound` — verify missing file returns success (not error)
            3. `TestAnalyzeSuitability_EmptyRequirements` — verify empty requirements returns success
            4. `TestParseRequirements_HeaderWithLocation` — verify markdown parsing with Location field

            Each test should:
            - Use t.TempDir() for file setup
            - Call the wrapper function (AnalyzeSuitability or ParseRequirements)
            - Verify result.IsSuccess() is true
            - Verify result.GetData() returns expected struct

            Example test structure:
            ```go
            func TestAnalyzeSuitability_EmptyFile(t *testing.T) {
              result := suitability.AnalyzeSuitability("", t.TempDir())
              if !result.IsSuccess() {
                t.Errorf("expected success, got %s", result.Code)
              }
              data := result.GetData()
              if data.PreImplementation.TotalItems != 0 {
                t.Errorf("expected 0 items, got %d", data.PreImplementation.TotalItems)
              }
            }
            ```

            **Doc comment addition (types.go:29):**

            Add this doc comment above the Requirement type definition:

            ```go
            // Requirement represents a single item from an audit or requirements document.
            // It contains an ID (e.g., "F1", "SEC-01"), a description of the requirement,
            // and a list of files expected to implement it.
            type Requirement struct {
            ```

            **Test update for signature changes:**

            Update all existing test calls to ScanPreImplementation to handle new return type:
            - FROM: `result, err := suitability.ScanPreImplementation(...)`
            - TO: `scanResult := suitability.ScanPreImplementation(...)`
            - Add: `if scanResult.IsFatal() { t.Fatalf("scan failed: %v", scanResult.Errors) }`
            - Change: `result` references to `scanResult.GetData()`

            Same pattern for ClassifyFile calls (no signature change, but consistency).

            ## Interface Contracts

            Agent A is changing three function signatures:
            - `ScanPreImplementation()` returns `result.Result[SuitabilityResult]`
            - `AnalyzeSuitability()` returns `result.Result[SuitabilityResult]`
            - `ParseRequirements()` returns `result.Result[[]Requirement]`

            All tests must use:
            - `result.IsSuccess()` to check success
            - `result.IsFatal()` to check failure
            - `result.GetData()` to extract data

            ## Tests

            Your tests ARE the deliverable. Verify they pass:

            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go test ./pkg/suitability/... -v -run "TestAnalyzeSuitability|TestParseRequirements"
            ```

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./pkg/suitability/... && \
            go vet ./pkg/suitability/... && \
            go test ./pkg/suitability/...
            ```

            Pass criteria: All commands exit 0. Test coverage for wrapper functions now exists.

            ## Constraints

            - Do NOT modify existing test logic (TestScanPreImplementation_AllDone, etc.) beyond signature updates
            - Do NOT add tests for internal helpers (classifyRequirement, aggregateFileStatuses)
            - Do NOT modify types.go beyond adding the doc comment
            - Import result package: `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"`
          files:
