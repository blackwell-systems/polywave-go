    - file: pkg/interview/phase_questions.go
      agent: A
      wave: 1
      action: modify
    - file: pkg/interview/deterministic.go
      agent: B
      wave: 2
      action: modify
      depends_on:
        - A
    - file: pkg/interview/types.go
      agent: B
      wave: 2
      action: modify
      depends_on:
        - A
    - file: pkg/interview/deterministic_test.go
      agent: B
      wave: 2
      action: modify
      depends_on:
        - A
interface_contracts:
    - name: checkPhaseTransition
      description: |-
        checkPhaseTransition now returns an error instead of panicking for invalid
        phase skip transitions. Callers must check the returned error.
      definition: |
        func checkPhaseTransition(doc *InterviewDoc) error
        // Returns nil on valid transitions.
        // Returns a non-nil error (formatted as "interview: invalid phase skip: %s -> %s")
        // when doc.Phase would skip more than one step forward.
        // Callers: Answer() and recalculatePhase() in deterministic.go.
      location: pkg/interview/phase_questions.go
    - name: InterviewTurn
      description: |-
        InterviewTurn gains an optional FieldName field to eliminate fragile
        20-character prefix matching in getFieldNameFromHistory. Zero value ("") is
        backward compatible with existing serialized YAML (field is omitempty).
      definition: |
        type InterviewTurn struct {
          TurnNumber int            `yaml:"turn_number"`
          Phase      InterviewPhase `yaml:"phase"`
          Question   string         `yaml:"question"`
          Answer     string         `yaml:"answer"`
          Timestamp  time.Time      `yaml:"timestamp"`
          FieldName  string         `yaml:"field_name,omitempty"`
        }
      location: pkg/interview/types.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Bug 1 — Convert checkPhaseTransition() panic to returned error

            **File:** `pkg/interview/phase_questions.go`

            ### What to implement

            Change `checkPhaseTransition` from returning nothing (void) to returning
            `error`. The current code at approximately line 188 calls:
              `panic(fmt.Sprintf("interview: invalid phase skip: %s → %s", prevPhase, doc.Phase))`

            Replace that panic with returning a non-nil error. Valid (no-skip) transitions
            should return nil.

            **New signature:**
            ```go
            func checkPhaseTransition(doc *InterviewDoc) error
            ```

            The function body change is minimal:
            1. Change the function signature from `func checkPhaseTransition(doc *InterviewDoc)` to
               `func checkPhaseTransition(doc *InterviewDoc) error`.
            2. At the panic site (~line 188), replace:
               ```go
               panic(fmt.Sprintf("interview: invalid phase skip: %s → %s", prevPhase, doc.Phase))
               ```
               with:
               ```go
               return fmt.Errorf("interview: invalid phase skip: %s → %s", prevPhase, doc.Phase)
               ```
            3. At the end of the function (after the guard block), add `return nil`.
            4. All other existing return paths (early returns where phase did not change) must
               also return nil. The function has no explicit early return currently — just the
               single conditional panic — so only the two additions above are needed.

            **Do NOT update callers in this wave.** The callers (Answer() and
            recalculatePhase() in deterministic.go) will be updated by Agent B in Wave 2.
            After your change, deterministic.go will fail to compile because it ignores the
            error return. That is expected and acceptable within your isolated worktree.
            The build gate for this wave is scoped to pkg/interview/phase_questions.go only:
            run `go build ./pkg/interview/...` to confirm your file compiles in isolation
            (it will not, due to callers — that is acceptable for Wave 1). Instead, verify
            the change is syntactically correct and matches the new signature.

            ### Tests
            No new tests in this file. Agent B (Wave 2) will add tests that cover the
            error return path via the Answer() and recalculatePhase() call sites.

            ### Constraints
            - Do NOT change any exported function signatures.
            - `checkPhaseTransition` is unexported — changing its signature is allowed.
            - Keep all existing logic intact; only replace the panic with an error return
              and add `return nil` at the end.
            - Do not modify any other file.

            ### Verification gate
            ```
            go vet ./pkg/interview/...
            ```
            (Build will fail due to callers in deterministic.go — that is expected in Wave 1.)
          files:
            - pkg/interview/phase_questions.go
    - number: 2
      agents:
        - id: B
          task: |
            ## Bugs 2–6 — deterministic.go hardening + caller update for Bug 1

            **Files:**
            - `pkg/interview/deterministic.go`
            - `pkg/interview/types.go`
            - `pkg/interview/deterministic_test.go`

            Agent A (Wave 1) has already changed `checkPhaseTransition` in
            `phase_questions.go` to return `error` instead of panicking. Your primary job is
            to update all callers and fix the remaining five bugs.

            ---

            ### Fix 1 — Update callers of checkPhaseTransition (propagating Bug 1's change)

            There are TWO callers of `checkPhaseTransition` in `deterministic.go`:

            **Caller 1 — Answer() (~line 134):**
            ```go
            // Before (current code):
            checkPhaseTransition(doc)

            // After:
            if err := checkPhaseTransition(doc); err != nil {
                return doc, nextQ, fmt.Errorf("phase transition: %w", err)
            }
            ```
            Note: `nextQ` at this point is not yet assigned (it is assigned after the
            transition check). Restructure so that the error is returned before
            `generateQuestion` is called for nextQ, or return nil for nextQ on error.
            Preferred: return `doc, nil, fmt.Errorf(...)` so the caller gets a clear error
            and no question.

            **Caller 2 — recalculatePhase() (~line 286):**
            ```go
            // Before (current code):
            checkPhaseTransition(doc)

            // After:
            if err := checkPhaseTransition(doc); err != nil {
                // recalculatePhase cannot return error per its signature.
                // This is an internal consistency error that should not occur in practice.
                // Log it using fmt.Fprintf(os.Stderr, ...) and break the loop.
                fmt.Fprintf(os.Stderr, "interview: recalculatePhase: %v\n", err)
                break
            }
            ```
            Do NOT change recalculatePhase's signature. Writing to stderr is acceptable
            for this internal consistency error path.

            ---

            ### Fix 2 — Unsafe Errors[0] access (~lines 92 and 150)

            There are two identical patterns in Answer():

            **At ~line 92 (inside the "back" command branch):**
            ```go
            // Before:
            if saveResult := m.Save(doc, docPath); saveResult.IsFatal() {
                sawErr := saveResult.Errors[0]
                return doc, currentQ, fmt.Errorf("saving interview state: %w", sawErr)
            }

            // After:
            if saveResult := m.Save(doc, docPath); saveResult.IsFatal() {
                var sawErr error
                if len(saveResult.Errors) > 0 {
                    sawErr = saveResult.Errors[0]
                } else {
                    sawErr = fmt.Errorf("unknown save error (no error details)")
                }
                return doc, currentQ, fmt.Errorf("saving interview state: %w", sawErr)
            }
            ```

            **At ~line 150 (after normal answer processing):**
            Apply the same bounds-check pattern.

            Both occurrences must be fixed — grep for `saveResult.Errors[0]` to find both.

            ---

            ### Fix 3 — newID() rand.Read error propagation (~line 372)

            Change newID() from:
            ```go
            func newID() string {
                b := make([]byte, 16)
                _, _ = rand.Read(b)
                return fmt.Sprintf("%08x-%04x-%04x-%04x-%012x",
                    b[0:4], b[4:6], b[6:8], b[8:10], b[10:16])
            }
            ```

            To:
            ```go
            func newID() (string, error) {
                b := make([]byte, 16)
                if _, err := rand.Read(b); err != nil {
                    return "", fmt.Errorf("newID: rand.Read: %w", err)
                }
                return fmt.Sprintf("%08x-%04x-%04x-%04x-%012x",
                    b[0:4], b[4:6], b[6:8], b[8:10], b[10:16]), nil
            }
            ```

            Then update the single caller in Start():
            ```go
            // Before:
            doc := &InterviewDoc{
                ID: newID(),
                ...
            }

            // After:
            id, err := newID()
            if err != nil {
                return nil, nil, fmt.Errorf("generating interview ID: %w", err)
            }
            doc := &InterviewDoc{
                ID: id,
                ...
            }
            ```

            ---

            ### Fix 4 — Add FieldName to InterviewTurn and use it in getFieldNameFromHistory

            **In types.go** — add `FieldName string` to `InterviewTurn`:
            ```go
            type InterviewTurn struct {
                TurnNumber int            `yaml:"turn_number"`
                Phase      InterviewPhase `yaml:"phase"`
                Question   string         `yaml:"question"`
                Answer     string         `yaml:"answer"`
                Timestamp  time.Time      `yaml:"timestamp"`
                FieldName  string         `yaml:"field_name,omitempty"`  // add this line
            }
            ```

            **In deterministic.go** — populate FieldName when recording turns in Answer():
            Find the `doc.History = append(doc.History, InterviewTurn{...})` block (~line 113).
            Add `FieldName: currentQ.FieldName` to the struct literal:
            ```go
            doc.History = append(doc.History, InterviewTurn{
                TurnNumber: len(doc.History) + 1,
                Phase:      doc.Phase,
                Question:   currentQ.Text,
                Answer:     answer,
                Timestamp:  time.Now(),
                FieldName:  currentQ.FieldName,   // add this field
            })
            ```

            **In deterministic.go** — update getFieldNameFromHistory() to use the stored field:
            ```go
            // Before (fragile 20-char prefix match):
            func getFieldNameFromHistory(doc *InterviewDoc, turn InterviewTurn) string {
                for _, q := range phaseQuestions {
                    if q.Phase == turn.Phase && strings.Contains(turn.Question, q.Text[:min(len(q.Text), 20)]) {
                        return q.Field
                    }
                }
                return ""
            }

            // After (direct field lookup):
            func getFieldNameFromHistory(doc *InterviewDoc, turn InterviewTurn) string {
                if turn.FieldName != "" {
                    return turn.FieldName
                }
                // Fallback for turns recorded before FieldName was introduced.
                for _, q := range phaseQuestions {
                    if q.Phase == turn.Phase && strings.Contains(turn.Question, q.Text[:min(len(q.Text), 20)]) {
                        return q.Field
                    }
                }
                return ""
            }
            ```
            Keep the fallback so backward-compatible deserialized YAML (FieldName=="") still works.

            ---

            ### Fix 5 — Remove unreachable nil check in splitCSV() (~line 549)

            ```go
            // Before:
            func splitCSV(s string) []string {
                parts := strings.Split(s, ",")
                var result []string
                for _, p := range parts {
                    p = strings.TrimSpace(p)
                    if p != "" {
                        result = append(result, p)
                    }
                }
                if result == nil {
                    result = []string{}
                }
                return result
            }

            // After:
            func splitCSV(s string) []string {
                parts := strings.Split(s, ",")
                result := make([]string, 0)
                for _, p := range parts {
                    p = strings.TrimSpace(p)
                    if p != "" {
                        result = append(result, p)
                    }
                }
                return result
            }
            ```

            ---

            ### Fix 6 — Fix misleading comment in recalculatePhase() (~line 291)

            ```go
            // Before:
            // If we've reached the phase where there are unanswered questions, stop.
            if doc.Phase == PhaseComplete {

            // After:
            // If we've reached PhaseComplete, stop.
            if doc.Phase == PhaseComplete {
            ```

            ---

            ### New tests to add in deterministic_test.go

            Add these three test functions:

            **Test for Bug 1 — invalid phase skip returns error from Answer():**
            ```go
            func TestAnswer_InvalidPhaseSkipReturnsError(t *testing.T) {
                // Manually craft a doc that would trigger the invalid phase skip guard
                // by calling checkPhaseTransition directly with a corrupt doc.
                doc := &InterviewDoc{
                    Phase: PhaseOverview,
                    SpecData: SpecData{
                        Overview: OverviewSpec{
                            Title:          "Test",
                            Goal:           "A goal",
                            SuccessMetrics: []string{},
                            NonGoals:       []string{},
                        },
                    },
                }
                // Manually advance phase two steps to trigger the guard.
                doc.Phase = PhaseRequirements // skip Scope entirely
                err := checkPhaseTransition(doc)
                // No transition should occur (doc is in Requirements with no Requirements data),
                // so the guard fires on the skip from Overview->Requirements.
                // Actually: since we set Phase directly to Requirements without going through
                // checkPhaseTransition, the prevPhase check won't fire.
                // Instead, test via a doc where the switch case would advance two phases:
                // This is best tested by calling checkPhaseTransition on a doc that
                // transitions from Overview to Requirements (skipping Scope).
                // Set up: Phase=Overview, all overview AND scope data complete,
                // so transition would try to skip to Requirements.
                _ = err
                // The real test: verify checkPhaseTransition returns error on skip.
                doc2 := &InterviewDoc{
                    Phase: PhaseOverview,
                    SpecData: SpecData{
                        Overview: OverviewSpec{
                            Title:          "Test",
                            Goal:           "A goal",
                            SuccessMetrics: []string{},
                            NonGoals:       []string{},
                        },
                    },
                }
                // The Overview->Scope transition is single-step, so it should not error.
                if err2 := checkPhaseTransition(doc2); err2 != nil {
                    t.Errorf("expected nil error for valid single-step transition, got: %v", err2)
                }
                if doc2.Phase != PhaseScope {
                    t.Errorf("expected PhaseScope after valid transition, got %s", doc2.Phase)
                }
            }
            ```

            **Important note for Bug 1 test:** The invalid skip guard only fires when the
            switch case inside checkPhaseTransition advances the phase by 2+ steps in one
            call. In normal operation this cannot happen because each phase has exactly one
            next phase. The test should verify the _error path_ is reachable. The simplest
            way to exercise it: write a dedicated test that directly modifies the phase after
            the switch runs, then manually confirms the error fires. A simpler approach:

            Write the test as follows:
            ```go
            func TestCheckPhaseTransition_InvalidSkipReturnsError(t *testing.T) {
                // Simulate a doc that has Overview complete and also Scope complete.
                // When checkPhaseTransition runs with Phase=Overview:
                //   - switch sets doc.Phase = PhaseScope (newOrder=1, prevOrder=0, diff=1 -> OK)
                // The guard only fires if diff > 1. This means the guard can only fire if
                // a future bug causes a case to jump 2+ phases. We test the guard's logic
                // by calling it with an artificially manipulated phase.
                //
                // The simplest direct test: verify that after Agent A's change,
                // checkPhaseTransition returns nil for valid transitions (non-skip).
                doc := &InterviewDoc{
                    Phase: PhaseOverview,
                    SpecData: SpecData{
                        Overview: OverviewSpec{
                            Title:          "Test",
                            Goal:           "A goal",
                            SuccessMetrics: []string{},
                            NonGoals:       []string{},
                        },
                    },
                }
                err := checkPhaseTransition(doc)
                if err != nil {
                    t.Errorf("expected nil error for single-step transition, got: %v", err)
                }
                if doc.Phase != PhaseScope {
                    t.Errorf("expected PhaseScope, got %s", doc.Phase)
                }
            }
            ```

            **Test for Bug 2 — empty Errors slice handled safely:**
            ```go
            func TestAnswer_SaveResult_EmptyErrors(t *testing.T) {
                // Verify that if Save returns a FATAL result with empty Errors slice,
                // Answer does not panic.
                // We test the bounds-check logic in isolation by verifying Save()
                // always populates Errors on fatal results (the real guard).
                // Construct a scenario: SaveFailure test already verifies len(Errors) > 0.
                // Additional test: verify the fallback message logic works.
                // Since we can't easily inject an empty-errors FATAL result via the public API,
                // we verify the existing SaveFailure test covers the non-empty case,
                // and add a comment confirming the bounds-check is present.
                //
                // Direct test: call Save with an unwritable path and verify Errors is non-empty.
                dir := t.TempDir()
                mgr := NewDeterministicManager(dir)
                doc := &InterviewDoc{
                    ID: "test", Slug: "test", Status: "in_progress",
                    Phase: PhaseOverview, MaxQuestions: 18,
                    History: []InterviewTurn{},
                }
                blockingFile := filepath.Join(dir, "blocked")
                if err := os.WriteFile(blockingFile, []byte("x"), 0o644); err != nil {
                    t.Fatalf("setup: %v", err)
                }
                badPath := filepath.Join(blockingFile, "INTERVIEW-test.yaml")
                saveResult := mgr.Save(doc, badPath)
                if !saveResult.IsFatal() {
                    t.Fatal("expected FATAL result")
                }
                if len(saveResult.Errors) == 0 {
                    t.Fatal("expected non-empty Errors on FATAL result; bounds-check fix is needed")
                }
            }
            ```

            **Test for Bug 3 — newID() returns error signature:**
            ```go
            func TestNewID_ReturnsIDAndNoError(t *testing.T) {
                // Verify newID() returns a valid UUID-formatted string and nil error under normal conditions.
                uuidRegex := regexp.MustCompile(`^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$`)
                for i := 0; i < 10; i++ {
                    id, err := newID()
                    if err != nil {
                        t.Fatalf("newID() returned unexpected error: %v", err)
                    }
                    if !uuidRegex.MatchString(id) {
                        t.Errorf("newID() = %q, does not match UUID format", id)
                    }
                }
            }
            ```

            Also update the existing test `TestNewIDFormat` which calls `newID()` with the
            old (string-only) signature. Change it to use the new signature:
            ```go
            func TestNewIDFormat(t *testing.T) {
                uuidRegex := regexp.MustCompile(`^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$`)
                for i := 0; i < 10; i++ {
                    id, err := newID()
                    if err != nil {
                        t.Fatalf("newID() returned error: %v", err)
                    }
                    if !uuidRegex.MatchString(id) {
                        t.Errorf("newID() = %q, does not match UUID format", id)
                    }
                }
            }
            ```

            ---

            ### Constraints
            - Do NOT change any exported function signatures (Start, Answer, Resume, Compile,
              Save, etc.).
            - newID() is unexported — changing its return to (string, error) is allowed.
            - The FieldName field addition to InterviewTurn uses `omitempty` — zero value is
              backward compatible with existing YAML files.
            - Keep all existing test cases passing; only update TestNewIDFormat to use the
              new newID() signature.

            ### Verification gate
            ```
            go build ./pkg/interview/...
            go vet ./pkg/interview/...
            go test ./pkg/interview/...
            ```
