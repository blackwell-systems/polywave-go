pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent B updates TestNewIDFormat but misses that the old test already exists with
            the single-return signature. Two conflicting tests with same name, or old test
            referencing the old single-return newID().
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent B's brief explicitly instructs updating the existing TestNewIDFormat to use
            the new (string, error) signature. The test file is in Agent B's ownership.
        - scenario: |-
            recalculatePhase() calls checkPhaseTransition() in a loop; after Agent A's change,
            if Agent B forgets to handle the error in the loop, build breaks.
          likelihood: low
          impact: high
          mitigation: |-
            Agent B's brief explicitly covers both callers: Answer() and recalculatePhase().
            The recalculatePhase case uses fmt.Fprintf to stderr and breaks, keeping the
            signature unchanged.
        - scenario: |-
            Bug 4 — the FieldName fallback in getFieldNameFromHistory uses the 20-char prefix
            matching for old YAML docs. If Agent B removes the fallback entirely, existing
            interviews loaded from YAML files before this fix will fail the "back" command.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B's brief explicitly instructs keeping the fallback for the zero-value case
            (when FieldName == ""). The fallback is retained, not removed.
        - scenario: |-
            Wave 1 build gate fails because deterministic.go still calls checkPhaseTransition()
            ignoring the error return, causing a compile error in the package.
          likelihood: high
          impact: low
          mitigation: |-
            This is expected and acceptable in Wave 1. The quality gate for Wave 1 is
            go vet only (not go build ./...). Agent A's brief explicitly notes that the build
            will fail due to callers and that this is acceptable for Wave 1.
