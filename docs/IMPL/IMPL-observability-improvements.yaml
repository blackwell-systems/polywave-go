pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent B correctly updates the four opts structs but an external caller
            (e.g., in pkg/orchestrator or cmd/sawtools) passes a *observability.Emitter
            literal to an opts struct field typed as ObsEmitter — this should still
            compile since the concrete type satisfies the interface, but if a caller
            assigned nil explicitly as (*observability.Emitter)(nil) the interface will
            be non-nil, causing a subtle nil-check difference.
          likelihood: low
          impact: low
          mitigation: |-
            The concrete *Emitter methods are nil-receiver-safe (they check e == nil
            as the first line). A nil interface value also short-circuits correctly
            in the existing Emit/EmitSync implementations. The behavior is unchanged.
            Post-merge go test ./... will surface any nil-dereference panics.
        - scenario: |-
            Agent C updates call sites but misses one of the 10 occurrences, leaving
            a reference to the deleted sawErrsToErrors function and causing a compile error.
          likelihood: low
          impact: medium
          mitigation: |-
            The task brief lists all 10 call sites with file names and approximate line
            numbers. After deleting sawErrsToErrors, go build ./cmd/sawtools/... will
            immediately surface any missed reference as "undefined: sawErrsToErrors".
        - scenario: |-
            Agent B's new ObsEmitter interface definition introduces a circular import
            because it references both observability.Event and result.Result[observability.EmitData],
            and pkg/engine already transitively imports these packages.
          likelihood: low
          impact: medium
          mitigation: |-
            pkg/engine already directly imports both pkg/observability (line 8 of engine.go)
            and pkg/result (used in finalize.go). Adding result to engine.go's imports is
            not a new dependency edge. No circular import risk.
        - scenario: |-
            Agent A's multi-line error message format causes the existing test assertion
            that checks for the full message string to fail.
          likelihood: low
          impact: low
          mitigation: |-
            The existing test in complexity_test.go (lines 234-239) only checks
            got[0].Code and got[0].Severity — it does not assert on the full Message
            string. Agent A's new assertions use strings.Contains which is additive.
            Existing assertions continue to pass.
