suitability_assessment: |
    Three self-contained, file-disjoint items that can execute in parallel.

    1. File decomposition: Each item owns distinct files with no overlap.
       Item 1 owns pkg/protocol/complexity.go + complexity_test.go.
       Item 2 owns pkg/engine/engine.go, finalize.go, finalize_steps.go, runner.go,
       run_wave_atomic.go, program_tier_loop.go, and pkg/observability/emitter.go.
       Item 3 owns pkg/result/result.go + result_test.go and 8 cmd/sawtools/ files.
       No file appears in two agents' ownership.

    2. No investigation-first items. All changes are clear transformations on known code.

    3. Interface discoverability: Item 2's ObsEmitter interface contract can be fully
       specified before implementation — the concrete Emitter already has EmitSync; the
       new interface just wraps what exists. Item 3's ToErrors signature is trivial.

    4. Pre-implementation status: All three items are TODO. None are partially implemented.
       Note on Item 3 call-site count: feature description says 9 call sites; actual grep
       shows 10 (cleanup.go, scan_stubs.go x2, run_gates_cmd.go x2, verify_build.go,
       create_worktrees.go, validate_integration.go, cleanup_stale_cmd.go, verify_commits.go).
       Agent C brief accounts for all 10.

    5. Parallelization value: Go build + test cycle is moderate. Three independent agents
       each touching 2-8 files with non-trivial logic (error messages, interface introduction,
       refactoring). Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~3 agents x 10 min avg, fully parallel = ~10 min
    - Merge and verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~3 x 10 min = ~30 min
    Time savings: ~7 min (23% faster)

    Recommendation: Clear speedup. Proceed.
