            ## P2: Cross-repo build verification in finalize-wave

            ### What to implement

            Add cross-repo baseline verification to `FinalizeWave`. After the primary repo merge
            and verify-build succeed, optionally run baseline gates on all other repos referenced
            in the IMPL's file_ownership. This catches cross-repo breakage at finalize time instead
            of deferring it to the next wave's prepare-wave (E21B).

            ### Files to modify

            **1. `pkg/engine/finalize.go`** — Add CrossRepoVerify field and implementation

            Add field to `FinalizeWaveOpts` struct. Find this exact text:
