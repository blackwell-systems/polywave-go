suitability_assessment: |
    1. File decomposition: Four distinct problems touching different packages. P7 touches
       finalize.go + tests. P2 touches finalize.go + finalize_wave.go CLI.
       P7 and P2 share finalize.go — sequenced into waves 1 and 2 respectively. P3 touches
       scout_run.go + run_scout_cmd.go (independent of P7/P2). P6 touches wave-agent.md in the
       protocol repo (fully independent). Total: 4 agents across 2 waves.

    2. Investigation-first: No. Root causes for all four items are already confirmed.

    3. Interface discoverability: Yes. FinalizeWaveOpts and FinalizeWaveResult are well-defined
       structs. New fields (CrossRepoVerify, CrossRepoResults) are additive. RunScoutFullOpts
       addition (RefreshBrief) is additive.

    4. Pre-implementation status: All four are TODO. No prior implementation exists.

    5. Parallelization value: High. Build/test cycle is ~30s (go test ./...). P7+P6+P3 are
       independent and can execute in parallel in wave 1. P2 depends on P7 completing (shares
       finalize.go). 4 agents, 3 in wave 1, 1 in wave 2.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 parallel agents wave 1 x 8 min + 1 agent wave 2 x 8 min)
    - Merge and verification: ~4 min
    Total SAW time: ~24 min
    Sequential baseline: ~32 min (4 agents x 8 min avg)
    Time savings: ~8 min (25% faster)
    Recommendation: Clear speedup. Proceed.
