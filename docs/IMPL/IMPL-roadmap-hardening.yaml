          task: |
            ## P7: Fix finalize-wave merge ordering bug (data loss prevention)

            ### What to implement

            Fix the merge ordering bug in `FinalizeWave` where worktree cleanup without merging
            causes commits to be silently lost. The root cause: the solo-wave detection logic checks
            `WorktreesAbsent()` but not `AllBranchesAbsent()`, so when worktree directories are cleaned
            but branches remain, the pipeline skips merge.

            ### Files to modify

            **1. `pkg/engine/finalize.go`** — Fix solo-wave detection logic

            The current code at the solo-wave detection block:
            ```go
            if waveAgentCount <= 1 {
            	isSolo = true
            	for _, repoPath := range repos {
            		if !protocol.WorktreesAbsent(manifest, opts.WaveNum, repoPath) {
            			isSolo = false
            		}
            	}
            }
            ```

            Change this to also check for existing branches. If branches exist, the wave is NOT solo
            regardless of worktree directory state:
            ```go
            if waveAgentCount <= 1 {
            	isSolo = true
            	for _, repoPath := range repos {
            		if !protocol.WorktreesAbsent(manifest, opts.WaveNum, repoPath) {
            			isSolo = false
            		}
            		if !protocol.AllBranchesAbsent(manifest, opts.WaveNum, repoPath) {
            			isSolo = false
            		}
            	}
            }
            ```

            **2. `pkg/engine/finalize_test.go`** — Add test for "worktrees gone, branches remain" scenario

            Add a new test function `TestFinalizeWave_WorktreesGoneBranchesRemain` that:
            - Creates a temp git repo with `git init` and an initial commit
            - Creates a manifest with 1 agent and a completion report with a commit SHA
            - Creates an agent branch pointing at a real commit (so `AllBranchesAbsent` returns false)
            - Does NOT create a worktree directory (so `WorktreesAbsent` returns true)
            - Calls `FinalizeWave` and verifies it does NOT take the solo-wave shortcut
            - The expected behavior: FinalizeWave proceeds to the full pipeline (VerifyCommits etc.)
              rather than skipping to verify-build. It will likely fail at VerifyCommits since
              the branch has no additional commits, but the key assertion is that it did NOT
              skip to the solo path (which would populate synthetic MergeResult without merging).

            Test setup details:
            ```go
            func TestFinalizeWave_WorktreesGoneBranchesRemain(t *testing.T) {
                tmpDir := t.TempDir()
                repoRoot := filepath.Join(tmpDir, "repo")
                os.MkdirAll(repoRoot, 0755)

                // Initialize git repo with an initial commit
                git.Run(repoRoot, "init")
                git.Run(repoRoot, "config", "user.email", "test@test.com")
                git.Run(repoRoot, "config", "user.name", "Test")
                os.WriteFile(filepath.Join(repoRoot, "README.md"), []byte("init"), 0644)
                git.Run(repoRoot, "add", ".")
                git.Run(repoRoot, "commit", "-m", "initial")

                // Create agent branch (so AllBranchesAbsent returns false)
                git.Run(repoRoot, "branch", "saw/test-wt-gone/wave1-agent-A")

                // Write IMPL with 1 agent, feature_slug matching branch pattern
                implContent := `feature_slug: test-wt-gone
            waves:
              - number: 1
                agents:
                  - id: A
                    files: [pkg/foo.go]
            `
                // ... write and call FinalizeWave ...
                // Assert: result should NOT be success with synthetic merge
                // Assert: should hit the full pipeline path (verify-commits or similar)
            }
            ```

            ### Verification gate

            ```bash
            go build ./pkg/engine/...
            go test ./pkg/engine/ -run "TestFinalizeWave_WorktreesGoneBranchesRemain" -v
            go vet ./pkg/engine/...
            ```

            Postcondition checks:
            ```bash
            # Solo-wave block now checks AllBranchesAbsent
            grep -c "AllBranchesAbsent" pkg/engine/finalize.go  # expect: 2 (allGone check + solo check)
            # Test exists
            grep -c "TestFinalizeWave_WorktreesGoneBranchesRemain" pkg/engine/finalize_test.go  # expect: >= 1
            ```

            ### Constraints

            - Do NOT modify the `allGone` check block (the one starting with `allGone := true`) — that logic is correct
            - Do NOT modify `FinalizeWaveOpts` or `FinalizeWaveResult` struct fields — those are Agent D's scope
            - Do NOT modify `cmd/sawtools/finalize_wave.go` — that is Agent D's scope
            - Do NOT modify `pkg/protocol/merge_agents.go` — the existing `AllBranchesAbsent` function is sufficient
          files:
            - pkg/engine/finalize.go
            - pkg/engine/finalize_test.go
