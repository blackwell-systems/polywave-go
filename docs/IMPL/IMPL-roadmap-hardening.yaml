pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent A's solo-wave fix interacts with Agent D's cross-repo additions to finalize.go
          likelihood: low
          impact: medium
          mitigation: Sequenced into waves 1 and 2. Agent D works on the merged result of Agent A.
        - scenario: Agent C's auto-commit hook creates many small commits, cluttering git history
          likelihood: medium
          impact: low
          mitigation: Hook is async and uses --no-verify. Duplicate commits (agent manual + hook auto) are harmless — git commit with no changes exits cleanly. Squash on merge if needed.
        - scenario: P3 RefreshBrief prepend to feature description may confuse Scout agent
          likelihood: medium
          impact: medium
          mitigation: The directive is clearly bracketed with [REFRESH-BRIEF]. Scout is instructed to preserve structure. If Scout ignores the directive, the existing validation catches structural drift.
        - scenario: Cross-repo baseline gates in P2 may be slow, increasing finalize-wave time
          likelihood: medium
          impact: low
          mitigation: CrossRepoVerify is opt-in (false by default). Only activated via --cross-repo-verify flag.
