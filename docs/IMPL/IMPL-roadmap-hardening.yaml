        - id: C
          task: |
            ## P6: Incremental agent commits (rate-limit resilience)

            ### What to implement

            Two changes to prevent work loss when agents are rate-limited:
            1. Update wave-agent.md to instruct agents to commit incrementally after each file
            2. Create an auto-commit PostToolUse hook for Write/Edit in worktree context

            ### Files to modify

            **1. `implementations/claude-code/prompts/agents/wave-agent.md`** — Add incremental commit instructions

            Find this exact text:
            ```
            **I5: Agents Commit Before Reporting**
            - Commit all changes to your worktree branch before writing completion report
            - Use `git -C /full/worktree/path` for all git operations (see Worktree Isolation Protocol above)
            - Verify you're on the correct branch before committing
            - Use descriptive commit messages
            - Push commits if working on remote
            ```

            Replace with:
            ```
            **I5: Agents Commit Incrementally (Rate-Limit Resilience)**
            - **Commit after completing each file** — do not batch all commits at the end
            - After implementing and testing changes to a file, immediately commit:
              ```bash
              git -C $SAW_AGENT_WORKTREE add <file-path>
              git -C $SAW_AGENT_WORKTREE commit -m "implement <brief description>"
              ```
            - This protects against rate-limit interruptions: if your session is terminated,
              all previously committed files survive and the retry agent picks up where you left off
            - Use `git -C /full/worktree/path` for all git operations (see Worktree Isolation Protocol above)
            - Verify you're on the correct branch before first commit
            - Final commit before completion report should include any remaining changes
            ```

            Also find this exact text in the progress tracker:
            ```
            - [ ] Field 4: Complete implementation (tests + logic)
            ```

            Replace with:
            ```
            - [ ] Field 4: Complete implementation (tests + logic) — commit after each file
            ```

            **2. `implementations/claude-code/hooks/auto_commit_on_write`** — NEW FILE

            Create a PostToolUse hook that auto-commits after Write/Edit operations in a SAW
            worktree context. This is a safety net — even if the agent ignores the prompt
            instruction to commit incrementally, this hook ensures work is preserved.

            Script:
            ```bash
            #!/usr/bin/env bash
            # PostToolUse hook: Auto-commit after Write/Edit in SAW worktree context
            # Ensures incremental work preservation against rate-limit interruptions.
            # async: true — never blocks agent execution
            set -uo pipefail

            # Only activate in SAW worktree context
            [[ -z "${SAW_AGENT_WORKTREE:-}" ]] && exit 0

            # Read JSON from stdin
            input=$(cat)
            tool_name=$(echo "$input" | jq -r '.tool_name // empty')

            # Only trigger on Write/Edit completions
            [[ "$tool_name" != "Write" && "$tool_name" != "Edit" ]] && exit 0

            file_path=$(echo "$input" | jq -r '.tool_input.file_path // empty')
            [[ -z "$file_path" ]] && exit 0

            # Verify file is inside worktree
            case "$file_path" in
              "$SAW_AGENT_WORKTREE"/*) ;;
              *) exit 0 ;;
            esac

            # Auto-commit (silent failures — this is a safety net, not a requirement)
            filename=$(basename "$file_path")
            git -C "$SAW_AGENT_WORKTREE" add "$file_path" 2>/dev/null || exit 0
            git -C "$SAW_AGENT_WORKTREE" commit --no-verify -m "auto-save: $filename" 2>/dev/null || exit 0
            exit 0
            ```

            Make the file executable (chmod +x).

            **3. `install.sh`** (root of scout-and-wave repo) — Register the new hook

            This is the root `install.sh`, NOT `implementations/claude-code/hooks/install.sh` (which
            is a 6-line stub that delegates to root). Find the PostToolUse hook registration section
            (look for `add_hook "PostToolUse"` calls) and add a registration entry for
            `auto_commit_on_write` as a PostToolUse hook. The hook must be registered with
            `async: true` so it never blocks agent execution. Follow the pattern used by
            other PostToolUse hooks in install.sh.

            ### Verification gate

            ```bash
            test -f implementations/claude-code/hooks/auto_commit_on_write
            bash -n implementations/claude-code/hooks/auto_commit_on_write
            grep -c "Commit after completing each file" implementations/claude-code/prompts/agents/wave-agent.md
            ```

            ### Constraints

            - Do NOT modify any Go files — this agent only touches the protocol repo
            - Do NOT modify other hooks — only create the new one and update install.sh
            - The hook MUST be async (never block agent execution)
            - The hook MUST exit 0 always, even on errors
          files:
            - implementations/claude-code/prompts/agents/wave-agent.md
            - implementations/claude-code/hooks/auto_commit_on_write
            - install.sh
