#
# 2. Rewrite cmd/saw/main.go:
#    - Remove hand-rolled switch statement and printUsage function
#    - Create root command via newRootCmd()
#    - Add all 10 subcommands via rootCmd.AddCommand(...)
#    - Call rootCmd.Execute() and exit 1 on error
#
# 3. Verify: go build ./... && go vet ./... && go test ./...
#
# 4. Smoke test: ./saw completion bash
#
# Files touched: cmd/saw/main.go, go.mod, go.sum

# Pre-Mortem
# ---------------------------------------------------------------------------
pre_mortem:
  overall_risk: "low"
  rows:
    - scenario: "repoDir package-level var race: agents write different bindings"
      likelihood: "low"
      impact: "high"
      mitigation: >
        All Wave 1 agents are in separate worktrees. Only root.go (Agent A) defines
        `var repoDir string` and binds it. All other agents READ it. No two agents
        write the same declaration. Post-merge, there will be exactly one definition.

    - scenario: "cobra not in go.mod when agents run go build verification"
      likelihood: "medium"
      impact: "low"
      mitigation: >
        Agent verification gates (go build ./cmd/saw/...) will fail if cobra is
        not in go.mod. Agents are told in their task prompts that the orchestrator
        adds cobra post-merge; they should note this in their completion reports
        and not block on it. The Wave 2 orchestrator step adds cobra before the
        final build gate.

    - scenario: "update-context --project-root renamed to --repo-dir by mistake"
      likelihood: "low"
      impact: "medium"
      mitigation: >
        Agent I's constraints explicitly state: do NOT rename to --repo-dir.
        The interface contract documents --project-root as subcommand-local.
        Post-merge verification catches this if it slips through.

    - scenario: "os.Exit(1) pattern lost in verify-commits, merge-agents, verify-build, run-wave"
      likelihood: "low"
      impact: "high"
      mitigation: >
        Each affected agent's task (C, E, G, K) explicitly calls out the os.Exit
        pattern and states it must be preserved. The constraint notes that returning
        an error from RunE would suppress already-printed JSON output.

    - scenario: "duplicate repoDir flag: both persistent root flag and local --repo-dir flag defined"
      likelihood: "low"
      impact: "medium"
      mitigation: >
        Agents B, C, E, F, G, K are explicitly told to NOT define a local --repo-dir
        flag and to read the package-level `repoDir` var instead. Each agent task
        states this constraint.

