          - Positional arg: exactly 1 (manifest path)
          - Calls: `protocol.VerifyCommits(manifestPath, waveNum, repoDir)`
          - Outputs JSON to stdout
          - **Special exit behavior:** if `!result.AllValid`, calls `os.Exit(1)`
