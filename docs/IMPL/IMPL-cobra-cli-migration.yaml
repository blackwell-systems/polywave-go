# Waves
# ---------------------------------------------------------------------------
waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement

          Create `cmd/saw/root.go` in package `main`. This file defines the cobra
          root command for the `saw` binary and is the foundation all other Wave 1
          agents depend on conceptually (though they implement independently in
          parallel — the root command wiring in main.go happens in Wave 2).

          The root command must:
          - Use `cobra.Command` with `Use: "saw"`, `Short: "SAW Protocol SDK CLI"`
          - Define `--repo-dir` as a **PersistentFlag** (string, default `"."`,
            usage `"Repository root directory"`) so all subcommands inherit it
          - NOT call `rootCmd.AddCommand(...)` — that happens in main.go (Wave 2)
          - Export a package-level `var repoDir string` that the PersistentPreRun
            or PersistentFlags binding sets, so subcommands can read it

          The cleanest pattern: use a package-level variable bound via
          `rootCmd.PersistentFlags().StringVar(&repoDir, "repo-dir", ".", "Repository root directory")`

          Also add `cobra.Command` import: `github.com/spf13/cobra`

          Do NOT add cobra to go.mod yourself. The orchestrator runs
          `go get github.com/spf13/cobra` and `go mod tidy` after Wave 1 merges.
          Your file must compile as-is after go.mod is updated; write it assuming
          cobra is available.

          ## Interfaces to Implement

          ```go
          // package-level variable read by subcommand cobra.Commands
          var repoDir string

          // newRootCmd returns the configured root cobra.Command.
          // Called by main() in main.go (Wave 2).
          func newRootCmd() *cobra.Command
          ```

          The root command's PersistentFlags must bind repoDir:
          ```go
          cmd.PersistentFlags().StringVar(&repoDir, "repo-dir", ".", "Repository root directory")
          ```

          ## Interfaces to Call

          None. This file has no dependencies on other new files.

          ## Tests to Write

          No tests required for root.go itself (it is pure wiring). The full
          integration is verified at the Wave 2 build gate.

          ## Verification Gate

          ```bash
          # After orchestrator adds cobra to go.mod:
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          ```

          Note: you cannot run `go build` until cobra is in go.mod. Write the
          file correctly and the build gate will be verified by the orchestrator
          post-merge when `go get github.com/spf13/cobra && go mod tidy` runs.

          ## Constraints

          - Package must be `package main`
          - File path: `cmd/saw/root.go`
          - Do NOT call `os.Exit` anywhere in root.go
          - Do NOT add `AddCommand` calls — those go in main.go
          - `repoDir` must be a package-level `var` (not local) so subcommand
            RunE closures can capture it
          - cobra import path: `github.com/spf13/cobra`
        files:
          - "cmd/saw/root.go"

      - id: "B"
        task: |
          ## What to Implement

          Rewrite `cmd/saw/create_worktrees.go` to use cobra instead of
          `flag.NewFlagSet`. Replace the `runCreateWorktrees(args []string) error`
          function with `newCreateWorktreesCmd() *cobra.Command`.

          Current behavior to preserve exactly:
          - Flag: `--wave int` (required, no default, usage "Wave number (required)")
          - Reads `repoDir` from the package-level `var repoDir string` (set by
            the persistent --repo-dir flag on the root command, defined in root.go)
          - Positional arg: exactly 1 (manifest path), validated with cobra.ExactArgs(1)
          - Calls: `protocol.CreateWorktrees(manifestPath, waveNum, repoDir)`
          - Outputs: `json.MarshalIndent(result, "", "  ")` to stdout
          - Error handling: return error from RunE (cobra prints it to stderr)
          - Exit code: normal cobra behavior (exit 1 on error); no special os.Exit
            needed for this command (no AllValid check in create-worktrees)

          ## Interfaces to Implement

          ```go
          func newCreateWorktreesCmd() *cobra.Command
          ```

          The returned command must:
          - `Use: "create-worktrees <manifest-path>"`
          - `Short: "Create git worktrees for all agents in a wave"`
          - `Args: cobra.ExactArgs(1)`
          - Local flag: `--wave int` with `cmd.MarkFlagRequired("wave")`
          - `RunE` closure that reads `args[0]` as manifestPath and `repoDir`
            package-level var for the repo directory

          ## Interfaces to Call

          ```go
          // package-level var defined in root.go (same package):
          var repoDir string

          // SDK function (unchanged):
          protocol.CreateWorktrees(manifestPath string, waveNum int, repoDir string) (*protocol.CreateWorktreesResult, error)
          ```

          ## Tests to Write

          No new tests required. The existing SDK is tested in pkg/protocol/.
          Cobra wiring is verified by the build + vet gate.

          ## Verification Gate

          ```bash
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          ```

          (Requires cobra in go.mod — orchestrator adds it post-merge.)

          ## Constraints

          - Remove all `flag` package imports and `flag.NewFlagSet` usage
          - Remove the `runCreateWorktrees(args []string) error` function entirely
          - Replace with `newCreateWorktreesCmd() *cobra.Command`
          - Do NOT copy `repoDir` as a local flag — read the package-level `repoDir` var
          - Import `github.com/spf13/cobra`
          - Keep `encoding/json`, `fmt`, and the `protocol` import
          - Keep `errors` import only if still needed (it won't be — remove it)
          - Package: `package main`
        files:
          - "cmd/saw/create_worktrees.go"

