# IMPL: cobra-cli-migration
title: "Cobra CLI Migration"
feature_slug: "cobra-cli-migration"
verdict: "SUITABLE"
test_command: "go test ./..."
lint_command: "go vet ./..."
state: "COMPLETE"

# Suitability Assessment
# ---------------------------------------------------------------------------
# Verdict: SUITABLE
#
# 1. File decomposition: 11 files change (main.go + 10 subcommand files) plus
#    2 new files (root.go, completion.go). Each subcommand file maps 1:1 to one
#    agent. main.go is orchestrator-owned and assembled post-wave-1 merge.
#    root.go is owned by Agent A (Wave 1) and read-only consumed by all others
#    via the shared func newXxxCmd() *cobra.Command interface.
#
# 2. Investigation-first: None. All behavior is explicit in source.
#
# 3. Interface discoverability: Each subcommand exports func newXxxCmd() *cobra.Command.
#    The persistent --repo-dir flag lives on the root command in root.go.
#    Contracts are fully definable upfront.
#
# 4. Pre-implementation status:
#    - Total items: 10 subcommands + root + main wiring = 12 units
#    - Already implemented (cobra): 0
#    - To-do: 12
#    All agents proceed as planned.
#
# 5. Parallelization value: HIGH. 10 independent subcommand files, each with
#    non-trivial cobra wiring (flags, args, exit codes, JSON stdout). Go build
#    + test cycle is substantial. Maximum Wave 1 parallelism across 10 agents.
#
# Estimated times:
# - Scout phase: ~10 min
# - Agent execution: ~11 agents × ~8 min avg = ~88 min total work,
#   parallelized to ~8 min for Wave 1 (10 agents) + ~5 min for Wave 2 (1 agent)
# - Merge & verification: ~5 min
# Total SAW time: ~28 min
#
# Sequential baseline: ~12 units × 8 min = ~96 min
# Time savings: ~68 min (~71% faster)
#
# Recommendation: Clear speedup. Proceed.

quality_gates:
  level: "standard"
  gates:
    - type: "build"
      command: "go build ./..."
      required: true
    - type: "lint"
      command: "go vet ./..."
      required: false
    - type: "test"
      command: "go test ./..."
      required: true

# Scaffolds
# ---------------------------------------------------------------------------
# root.go is owned by Agent A and defines the root cobra.Command plus the
# --repo-dir persistent flag. All other agents import nothing from it directly
# (same package `main`) but depend on Agent A completing before Wave 2 (main.go).
# No cross-package shared types are introduced. cobra is the only new import.
# No scaffold files needed beyond what Agent A creates.
scaffolds: []

# Interface Contracts
# ---------------------------------------------------------------------------
# The binding contract across all agents: each subcommand file exposes exactly
# one exported-style function with this signature (unexported, same package):
#
#   func newXxxCmd() *cobra.Command
#
# The root command in root.go calls rootCmd.AddCommand(newXxxCmd()) for each.
# main.go calls Execute() on the root command.
#
# Persistent flag on root command (defined in root.go, available to all subcommands):
#   --repo-dir string   Repository root directory (default ".")
#
# NOTE: update-context uses --project-root instead of --repo-dir. That flag is
# subcommand-local and is NOT replaced by the persistent --repo-dir. Preserve it.
# NOTE: list-impls uses --dir, not --repo-dir. Preserve that local flag too.
# NOTE: scan-stubs takes variadic positional args (no flags beyond cobra defaults).
interface_contracts:
  - name: "newRootCmd"
    description: "Returns the cobra root command with --repo-dir as a PersistentFlag"
    definition: |
      func newRootCmd() *cobra.Command
      // PersistentFlags: --repo-dir string (default ".")
    location: "cmd/saw/root.go"

  - name: "newCreateWorktreesCmd"
    description: "cobra.Command for create-worktrees subcommand"
    definition: |
      func newCreateWorktreesCmd() *cobra.Command
      // Flags: --wave int (required), inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // On error: returns error (cobra prints it); on AllValid false: os.Exit(1)
      // Stdout: JSON-encoded protocol.CreateWorktreesResult
    location: "cmd/saw/create_worktrees.go"

  - name: "newVerifyCommitsCmd"
    description: "cobra.Command for verify-commits subcommand"
    definition: |
      func newVerifyCommitsCmd() *cobra.Command
      // Flags: --wave int (required), inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // Exit 1 if !result.AllValid
      // Stdout: JSON-encoded protocol.VerifyCommitsResult
    location: "cmd/saw/verify_commits.go"

  - name: "newScanStubsCmd"
    description: "cobra.Command for scan-stubs subcommand"
    definition: |
      func newScanStubsCmd() *cobra.Command
      // Args: cobra.MinimumNArgs(1) — one or more file paths
      // No --repo-dir usage (operates on explicit file list)
      // Stdout: JSON-encoded protocol.ScanStubsResult
    location: "cmd/saw/scan_stubs.go"

  - name: "newMergeAgentsCmd"
    description: "cobra.Command for merge-agents subcommand"
    definition: |
      func newMergeAgentsCmd() *cobra.Command
      // Flags: --wave int (required), inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // Exit 1 if !result.Success
      // Stdout: JSON-encoded protocol.MergeAgentsResult
    location: "cmd/saw/merge_agents.go"

  - name: "newCleanupCmd"
    description: "cobra.Command for cleanup subcommand"
    definition: |
      func newCleanupCmd() *cobra.Command
      // Flags: --wave int (required), inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // Stdout: JSON-encoded protocol.CleanupResult
    location: "cmd/saw/cleanup.go"

  - name: "newVerifyBuildCmd"
    description: "cobra.Command for verify-build subcommand"
    definition: |
      func newVerifyBuildCmd() *cobra.Command
      // Flags: inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // Exit 1 if !result.TestPassed || !result.LintPassed
      // Stdout: JSON-encoded protocol.VerifyBuildResult
    location: "cmd/saw/verify_build.go"

  - name: "newUpdateStatusCmd"
    description: "cobra.Command for update-status subcommand"
    definition: |
      func newUpdateStatusCmd() *cobra.Command
      // Flags: --wave int (required), --agent string (required), --status string (required)
      // Args: cobra.ExactArgs(1) — manifest path
      // Stdout: JSON-encoded protocol.UpdateStatusResult
    location: "cmd/saw/update_status.go"

  - name: "newUpdateContextCmd"
    description: "cobra.Command for update-context subcommand"
    definition: |
      func newUpdateContextCmd() *cobra.Command
      // Flags: --project-root string (default ".") — subcommand-local, NOT the persistent --repo-dir
      // Args: cobra.ExactArgs(1) — manifest path
      // Stdout: JSON-encoded protocol.UpdateContextResult
    location: "cmd/saw/update_context.go"

  - name: "newListIMPLsCmd"
    description: "cobra.Command for list-impls subcommand"
    definition: |
      func newListIMPLsCmd() *cobra.Command
      // Flags: --dir string (default "docs/IMPL") — subcommand-local
      // Args: cobra.NoArgs
      // Always exits 0
      // Stdout: JSON-encoded protocol.ListIMPLsResult
    location: "cmd/saw/list_impls.go"

  - name: "newRunWaveCmd"
    description: "cobra.Command for run-wave subcommand"
    definition: |
      func newRunWaveCmd() *cobra.Command
      // Flags: --wave int (required), inherits --repo-dir from root
      // Args: cobra.ExactArgs(1) — manifest path
      // Exit 1 if !result.Success (even on error, prints partial JSON if available)
      // Stdout: JSON-encoded engine.RunWaveFullResult
    location: "cmd/saw/run_wave_cmd.go"

