          // result.AllValid bool
          ```

          ## Tests to Write

          None required. SDK tested in pkg/protocol/.

          ## Verification Gate

          ```bash
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          ```

          ## Constraints

          - Keep `os` import (needed for os.Exit)
