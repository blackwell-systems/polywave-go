          - `Short: "Verify each agent branch has commits (I5 trip wire)"`
          - `Args: cobra.ExactArgs(1)`
          - Local flag: `--wave int` with `cmd.MarkFlagRequired("wave")`
          - `RunE` that prints JSON then calls `os.Exit(1)` if `!result.AllValid`

          ## Interfaces to Call

          ```go
          var repoDir string  // package-level, root.go

