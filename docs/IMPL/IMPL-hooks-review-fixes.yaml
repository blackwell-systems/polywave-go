            ## What to Implement

            Fix code review finding 5 in `pkg/hooks/prelaunch_gate_test.go`:

            **Finding 5 (low priority):** Missing test for critic verdict "fail" in `PreLaunchGate`. The function checks `CriticReport.Verdict` and returns a "fail" status when verdict is not "pass" or "skipped" (prelaunch_gate.go:304-324), but no test exercises the "fail" case.

            ## Interface Contracts (Existing, Modified by Agent B)

            **Agent B is migrating PreLaunchGate to Result[T] pattern.** Your tests must use the Result[T] API:

            ```go
            res := PreLaunchGate(m, 1, "A", "/tmp/repo", "")
            if !res.IsSuccess() && !res.IsPartial() {
                t.Errorf("PreLaunchGate failed: %v", res.Errors)
            }
            result := res.GetData()
            // Now test result.Ready, result.Checks, etc.
            ```

            ## Tests Expected

            Add a new test case `TestPreLaunchGate_CriticFailed` to the test suite around line 212 (after `TestPreLaunchGate_CriticPassed`). Set up a manifest with:
            - 3+ agents (to trigger E37 critic requirement)
            - `CriticReport.Verdict = protocol.CriticVerdictIssues` (or any non-pass, non-skipped value)
            - `CriticReport.IssueCount > 0`

            Verify:
            - `result.Ready == false` (gate should block launch)
            - The `critic_review` check has `Status == "fail"`
            - Error message mentions issue count (e.g., "critic review failed with N issue(s)")

            Example structure:
            ```go
            func TestPreLaunchGate_CriticFailed(t *testing.T) {
                m := validManifest()
                // Add 3rd agent to trigger critic requirement
                m.Waves[0].Agents = append(m.Waves[0].Agents, protocol.Agent{
                    ID: "C", Task: "task", Files: []string{"pkg/foo/qux.go"},
                })
                m.FileOwnership = append(m.FileOwnership, protocol.FileOwnership{
                    File: "pkg/foo/qux.go", Agent: "C", Wave: 1,
                })
                m.CriticReport = &protocol.CriticData{
                    Verdict: protocol.CriticVerdictIssues,
                    IssueCount: 3,
                }

                res := PreLaunchGate(m, 1, "A", "/tmp/repo", "")
                data := res.GetData()

                if data.Ready {
                    t.Errorf("expected Ready=false when critic fails")
                }

                for _, c := range data.Checks {
                    if c.Name == "critic_review" {
                        if c.Status != "fail" {
                            t.Errorf("critic_review: expected fail, got %s: %s", c.Status, c.Message)
                        }
                        if !strings.Contains(c.Message, "3 issue") {
                            t.Errorf("expected issue count in message, got: %s", c.Message)
                        }
                        return
                    }
                }
                t.Errorf("critic_review check not found")
            }
            ```

            ## Verification Gate

            ```bash
            go build ./pkg/hooks && \
            go vet ./pkg/hooks && \
            go test ./pkg/hooks -timeout 120s
            ```

            All must pass. Test coverage should increase slightly.

            ## Constraints

            - Do not modify prelaunch_gate.go (Agent B owns it)
            - Do not modify existing tests
            - Follow existing test naming conventions (`TestPreLaunchGate_*`)
            - Use the `validManifest()` helper function for test setup
            - Import `strings` package if needed for `strings.Contains` assertions
          files:
            - pkg/hooks/prelaunch_gate_test.go
