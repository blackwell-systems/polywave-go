            ## What to Implement

            Fix two code review findings in `pkg/hooks/scout_boundaries.go`:

            **Finding 1 (medium priority):** Lines 69, 77 use hardcoded string `"SCOUT_BOUNDARY_VIOLATION"` instead of the constant `result.CodeScoutBoundaryViolation` from `pkg/result/codes.go`.

            **Finding 2 (medium priority):** Line 50 silently discards the error from `filepath.Rel(repoPath, path)` by assigning it to `_`.

            ## Interface Contracts (Existing, Do Not Change)

            - `ValidateScoutWrites(repoPath, expectedIMPLPath string, startTime time.Time) result.Result[ValidateData]` (lines 26-98)
            - `IsValidScoutPath(filePath string) bool` (lines 100-117)
            - `result.CodeScoutBoundaryViolation` constant from `pkg/result/codes.go` (line 159)

            ## Tests Expected

            No new tests needed. Existing tests in `scout_boundaries_test.go` cover both code paths. Verify:
            - `TestValidateScoutWrites` suite still passes (lines 40-210)
            - `TestIsValidScoutPath` still passes (lines 10-38)

            ## Verification Gate

            ```bash
            go build ./pkg/hooks && \
            go vet ./pkg/hooks && \
            go test ./pkg/hooks -timeout 120s
            ```

            All must pass with no new lint warnings.

            ## Constraints

            - Replace both occurrences of `"SCOUT_BOUNDARY_VIOLATION"` (lines 69, 77) with `result.CodeScoutBoundaryViolation`
            - For line 50 `filepath.Rel()` error: check the error and handle gracefully. If `filepath.Rel` fails, use the absolute path instead of the relative path (the validation logic still works correctly with absolute paths).
            - Do not change function signatures or behavior
            - Preserve all existing comments
            - Do not modify test files (Agent C owns scout_boundaries_test.go)
          files:
