        - id: B
          task: |
            ## What to Implement

            Fix two code review findings in `pkg/hooks/prelaunch_gate.go`:

            **Finding 3 (high priority):** Function `PreLaunchGate` (lines 43-88) returns `*PreLaunchResult` instead of `result.Result[PreLaunchResult]`. Migrate to Result[T] pattern for consistency with the rest of the codebase.

            **Finding 6 (medium priority):** `PreLaunchGate` function is not called anywhere in the main codebase (dead code). After migration, verify whether this function should be removed or integrated into the wave preparation flow. If it's intended for future use but not yet integrated, add a comment documenting its purpose and integration plan.

            ## Interface Contracts (Existing, Modified)

            **Before (current):**
            ```go
            func PreLaunchGate(
                manifest *protocol.IMPLManifest,
                waveNum int,
                agentID string,
                repoRoot string,
                wtPath string,
            ) *PreLaunchResult
            ```

            **After (Result[T] migration):**
            ```go
            func PreLaunchGate(
                manifest *protocol.IMPLManifest,
                waveNum int,
                agentID string,
                repoRoot string,
                wtPath string,
            ) result.Result[PreLaunchResult]
            ```

            Return values:
            - `result.NewSuccess(PreLaunchResult{...})` when all checks pass or only warnings present
            - `result.NewPartial(PreLaunchResult{...}, []result.SAWError{...})` when some checks fail but results are still useful
            - `result.NewFailure[PreLaunchResult]([]result.SAWError{...})` on fatal validation errors

            ## Tests Expected

            Update all test calls to use Result[T] unwrapping. In `prelaunch_gate_test.go`, replace:
            ```go
            result := PreLaunchGate(m, 1, "A", "/tmp/repo", "")
            if !result.Ready { ... }
            ```

            With:
            ```go
            res := PreLaunchGate(m, 1, "A", "/tmp/repo", "")
            if !res.IsSuccess() && !res.IsPartial() {
                t.Errorf("PreLaunchGate failed: %v", res.Errors)
            }
            result := res.GetData()
            if !result.Ready { ... }
            ```

            All existing tests must pass after migration. Do NOT add new test cases (Agent D owns test file).

