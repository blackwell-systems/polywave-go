        - id: C
          task: |
            ## What to Implement

            Fix code review finding 4 in `pkg/hooks/scout_boundaries_test.go`:

            **Finding 4 (low priority):** Missing test for `filepath.Walk` error handling in `ValidateScoutWrites`. The function returns a Fatal error when `filepath.Walk` fails (scout_boundaries.go:67-70), but no test exercises this path.

            ## Interface Contracts (Existing, Do Not Change)

            - `ValidateScoutWrites(repoPath, expectedIMPLPath string, startTime time.Time) result.Result[ValidateData]` from scout_boundaries.go

            ## Tests Expected

            Add a new test case `TestValidateScoutWrites_WalkError` to the test suite around line 210 (after existing tests). Trigger a `filepath.Walk` error by passing an invalid `repoPath` (e.g., a file instead of a directory, or a path with permission issues). Verify:
            - Result is Fatal (`res.IsFatal()` or `!res.IsSuccess()`)
            - Error code is `result.CodeScoutBoundaryViolation`
            - Error message contains "walk failed"

            Example approach:
            ```go
            func TestValidateScoutWrites_WalkError(t *testing.T) {
                // Create a temp file (not a directory) to trigger Walk error
                tmpFile := filepath.Join(t.TempDir(), "not-a-dir")
                if err := os.WriteFile(tmpFile, []byte("x"), 0644); err != nil {
                    t.Fatal(err)
                }

                // Pass the file as repoPath (Walk expects a directory)
                res := ValidateScoutWrites(tmpFile, "", time.Now())
                if res.IsSuccess() {
                    t.Errorf("expected Failure for invalid repoPath, got Success")
                }
                if len(res.Errors) == 0 {
                    t.Errorf("expected errors, got none")
                }
                // Check error code and message
                if res.Errors[0].Code != result.CodeScoutBoundaryViolation {
                    t.Errorf("expected code %s, got %s", result.CodeScoutBoundaryViolation, res.Errors[0].Code)
                }
                if !strings.Contains(res.Errors[0].Message, "walk failed") {
                    t.Errorf("expected 'walk failed' in message, got: %s", res.Errors[0].Message)
                }
            }
            ```

            ## Verification Gate

            ```bash
            go build ./pkg/hooks && \
            go vet ./pkg/hooks && \
            go test ./pkg/hooks -timeout 120s
            ```

            All must pass. Test coverage should increase slightly (currently 92.7%).

            ## Constraints

            - Do not modify scout_boundaries.go (Agent A owns it)
            - Do not modify existing tests
            - Use `t.TempDir()` for test isolation
            - Follow existing test naming conventions (`TestValidateScoutWrites_*`)
          files:
