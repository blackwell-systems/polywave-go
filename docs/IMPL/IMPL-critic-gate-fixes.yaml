title: 'Critic Gate Fixes: E37 Threshold in validate and prepare-tier'
feature_slug: critic-gate-fixes
verdict: SUITABLE
suitability_assessment: |
    Two related bugs, both fixable in a single wave with disjoint file ownership.

    Bug 1 — prepare-tier applies CriticGatePasses unconditionally: In
    pkg/protocol/program_tier_prepare.go, step 4.5 calls CriticGatePasses(m, true) for
    every IMPL regardless of agent count or repo count. The threshold logic (3+ agents
    OR 2+ repos) only lives in pre_wave_gate.go (checkCriticReview). No shared helper
    exists. Any IMPL with a nil CriticReport fails prepare-tier, even a 1-agent IMPL.

    Bug 2 — validate applies E37 with no threshold: pkg/protocol/validation.go calls
    Validate(m) which does not check E37 at all. The E37 enforcement in full_validate.go
    comes only through the Validate() call chain — but Validate() has no E37 check.
    Checking the actual flow: FullValidate calls Validate(m) and ValidateIMPLDoc (E16).
    Neither checks critic_report existence. So the bug description's claim that validate
    fails on empty critic_report needs verification: grep shows no E37 check in Validate().

    Re-examination: The actual bug surface is:
    - prepare-tier (program_tier_prepare.go) calls CriticGatePasses without threshold
      guard, blocking 1-agent IMPLs that never need a critic review.
    - The fix requires: (a) extract the threshold logic from checkCriticReview into a
      shared helper E37Required(m *IMPLManifest) bool in critic_gate.go, (b) use that
      helper in program_tier_prepare.go before calling CriticGatePasses, (c) use the same
      helper in pre_wave_gate.go's checkCriticReview to eliminate duplication.

    File decomposition:
    - Agent A: pkg/protocol/critic_gate.go — add E37Required() helper
    - Agent B: pkg/protocol/pre_wave_gate.go — use E37Required() instead of inline logic
    - Agent C: pkg/protocol/program_tier_prepare.go — guard CriticGatePasses with E37Required()

    All three files are in the same package, independent at the AST level (analyze-deps
    confirms wave_candidate: 0 for all). The only ordering constraint is that Agent A's
    new E37Required function must be available before Agents B and C can import it —
    but since all three are in the same package (protocol), no import change is needed.
    The function will be visible to B and C in the same compilation unit.

    Because all three files are in the same Go package (protocol), agents B and C can
    reference E37Required() without any import change. The single-wave structure is valid.

    Parallelization value: moderate. Three small files, short build cycle (go test ./pkg/protocol/...
    runs in ~5s). However, the coordination artifact has value as an audit trail and
    the changes are clean to decompose. SUITABLE.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~3 agents x ~8 min avg = ~8 min with parallelism
    - Merge and verification: ~3 min
    Total SAW time: ~19 min
    Sequential baseline: ~24 min
    Time savings: ~5 min (21% faster)
    Recommendation: Marginal gains. Proceed — the coordination artifact is the primary value.
