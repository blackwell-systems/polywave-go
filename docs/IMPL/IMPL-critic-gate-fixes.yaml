pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent B or C writes a call to E37Required before Agent A has committed it.
            Since all three run in parallel worktrees and E37Required is a new symbol,
            compilation in B and C worktrees will fail with "undefined: E37Required".
          likelihood: high
          impact: high
          mitigation: |
            This is expected worktree isolation behavior. Each agent writes its code and
            commits. At merge time the full package compiles correctly because all three
            files land together. Agent B and C should include a comment noting the dependency
            and not attempt to build the full package during their verification gate — instead
            run `go vet` on just their file or use `go build -overlay` if needed. Alternatively,
            agents B and C can add a local stub for E37Required in their worktree to allow
            build verification, then remove it before committing (with a note in the commit
            message). The orchestrator merge step resolves this naturally.
        - scenario: |
            The existing TestPrepareTier_E37CriticGateEnforcement test (currently skipped
            with t.Skip) gets un-skipped by Agent C but the test infra for writing temp
            IMPL files is more complex than expected, causing test failures.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C's task explicitly scopes the test to check only Validations slice and
            accept a worktree-creation failure. If temp file setup is still too complex,
            the agent may leave the skip in place and add a separate integration test file.
        - scenario: |
            The error message change in program_tier_prepare.go breaks an existing test
            that asserts the old message "E37 critic gate failed — ISSUES verdict with errors".
          likelihood: low
          impact: low
          mitigation: |
            The existing TestPrepareTier_E37CriticGateEnforcement is skipped (t.Skip), so no
            existing test checks that exact string. If any other test does, Agent C will find
            it in the test run and update the expected string.
