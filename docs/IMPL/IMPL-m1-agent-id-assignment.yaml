waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement

          Create the core agent ID generation package at `pkg/idgen/generator.go`.
          Implement the `AssignAgentIDs` function that generates agent IDs following
          the protocol pattern `^[A-Z][2-9]?$` (one uppercase letter, optionally
          followed by a generation digit 2-9).

          Support two modes:
          1. **Sequential mode** (grouping nil/empty): Assign A-Z for first 26 agents,
             then A2-Z2 for next 26, then A3-Z3, etc.
          2. **Grouped mode** (grouping provided): Group agents by category tags and
             assign multi-generation IDs within each group.

          ## Interfaces to Implement

          ```go
          package idgen

          // AssignAgentIDs generates agent IDs following the ^[A-Z][2-9]?$ pattern.
          // If grouping is nil/empty, uses sequential mode (A-Z, A2-Z2, ...).
          // If grouping is provided, groups by category tags and assigns multi-gen IDs.
          func AssignAgentIDs(count int, grouping [][]string) ([]string, error)
          ```

          ## Algorithm Details

          **Sequential Mode**:
          - Input: count=30, grouping=nil
          - Output: ["A", "B", ..., "Z", "A2", "B2", "C2", "D2"]
          - Logic: For agent index i:
            - generation = i / 26 (0-indexed)
            - letter = 'A' + (i % 26)
            - if generation == 0: ID = letter
            - else: ID = letter + string(generation+1)

          **Grouped Mode**:
          - Input: count=9, grouping=[["data"], ["data"], ["data"], ["api"], ["api"], ["ui"], ["ui"], ["ui"], ["ui"]]
          - Output: ["A", "A2", "A3", "B", "B2", "C", "C2", "C3", "C4"]
          - Logic:
            1. Build map of category → agent indices: {"data": [0,1,2], "api": [3,4], "ui": [5,6,7,8]}
            2. Assign letters to categories in order of first appearance: data→A, api→B, ui→C
            3. Within each category, assign generation numbers sequentially starting at 1 (bare letter)
            4. Reconstruct output array by index

          ## Edge Cases

          1. **Invalid count**: Return error if count <= 0
          2. **Grouping length mismatch**: Return error if len(grouping) != count
          3. **Empty category tags**: Treat as distinct group (e.g., [[""], [""]] → A, B)
          4. **>234 agents**: Sequential mode wraps to A10, B10, ... (generation 10+ not supported
             by regex, but document this limitation in error message)
          5. **Nil vs empty grouping**: Both trigger sequential mode

          ## Validation

          All generated IDs must match `^[A-Z][2-9]?$` regex. Use the existing validation
          from `pkg/protocol/validation.go` line 9: `agentIDRegex = regexp.MustCompile("^[A-Z][2-9]?$")`

          ## Tests to Write

          None — Agent C owns all tests in Wave 2.

          ## Verification Gate

          ```bash
          go build ./pkg/idgen
          go vet ./pkg/idgen
          ```

          ## Constraints

          - Must not import any SAW protocol types (this is a utility package)
          - Must not depend on any other SAW packages
          - IDs must be stable (same inputs always produce same output)
          - Function must be pure (no side effects, no global state)
        files:
          - pkg/idgen/generator.go

  - number: 2
    agents:
      - id: B
        task: |
          ## What to Implement

          Create the CLI command at `cmd/saw/assign_agent_ids_cmd.go`. Implement
          `newAssignAgentIDsCmd()` that wraps the `pkg/idgen.AssignAgentIDs` function
          with Cobra command-line interface.

          ## Interfaces to Implement

          ```go
          func newAssignAgentIDsCmd() *cobra.Command
          ```

          ## Command Specification

          **Usage**: `sawtools assign-agent-ids --count <N> [--grouping <json>]`

          **Flags**:
          - `--count <int>`: Number of agents (required)
          - `--grouping <json>`: JSON array of arrays containing category tags (optional)

          **Output**: Space-separated agent IDs on stdout (e.g., "A B C D E")

          **Exit codes**:
          - 0: Success
          - 1: Invalid flags or generation error

          ## Implementation Details

          1. Use `cobra.Command` following the existing pattern in `cmd/saw/extract_commands_cmd.go`
          2. Parse `--count` as required int flag
          3. Parse `--grouping` as optional string flag (JSON format)
          4. If grouping provided, unmarshal JSON into `[][]string`
          5. Call `idgen.AssignAgentIDs(count, grouping)`
          6. Output results as space-separated string
          7. Handle errors with clear messages

          ## Grouping JSON Format

          The `--grouping` flag accepts a JSON array where each element is an array of
          category tags for that agent. Example:

          ```json
          [["data"], ["data"], ["data"], ["api"], ["api"], ["ui"], ["ui"], ["ui"], ["ui"]]
          ```

          Each inner array represents the categories for one agent. Tags are compared
          for equality to group agents.

          ## Error Handling

          - Invalid count: "count must be greater than 0"
          - Grouping length mismatch: "grouping length (%d) does not match count (%d)"
          - Invalid JSON: "failed to parse grouping JSON: %w"
          - Generation error: Pass through error from `idgen.AssignAgentIDs`

          ## Integration with main.go

          Add command registration in `cmd/saw/main.go`:
          ```go
          rootCmd.AddCommand(
              // ... existing commands ...
              newAssignAgentIDsCmd(),
          )
          ```

          ## Tests to Write

          None — Agent C owns all CLI tests in `cmd/saw/assign_agent_ids_cmd_test.go`.

          ## Verification Gate

          ```bash
          go build ./cmd/saw
          go vet ./cmd/saw
          ```

          ## Constraints

          - Follow existing Cobra command patterns in `cmd/saw/`
          - No colored output or progress indicators (script-friendly, stdout only)
          - Must be safe for CI/CD pipelines (deterministic, no TTY assumptions)
        files:
          - cmd/saw/assign_agent_ids_cmd.go
        dependencies:
          - A

