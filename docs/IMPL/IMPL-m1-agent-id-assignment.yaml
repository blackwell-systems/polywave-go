interface_contracts:
  - name: AssignAgentIDs
    description: |
      Main entry point for agent ID generation. Assigns agent IDs following the
      ^[A-Z][2-9]?$ regex pattern. Supports both sequential (A-Z, then A2-Z2) and
      grouped (A, A2, A3 for related agents) modes.
    definition: |
      func AssignAgentIDs(count int, grouping [][]string) ([]string, error)

      Parameters:
      - count: Total number of agents (must be > 0)
      - grouping: Optional array of category tags (length must equal count if provided)

      Returns:
      - []string: Ordered agent IDs (e.g., ["A", "B", "C"] or ["A", "A2", "B"])
      - error: If count <= 0 or grouping length mismatch

      Behavior:
      - If grouping is nil/empty: Sequential mode (A-Z for first 26, then A2-Z2, etc.)
      - If grouping provided: Group by category tags, assign multi-generation IDs
        (e.g., tags ["data", "data", "api"] → IDs ["A", "A2", "B"])
    location: pkg/idgen/generator.go

  - name: newAssignAgentIDsCmd
    description: |
      Cobra command factory for the `sawtools assign-agent-ids` CLI command.
      Parses --count and --grouping flags, calls AssignAgentIDs, outputs results.
    definition: |
      func newAssignAgentIDsCmd() *cobra.Command

      Flags:
      - --count <int>: Number of agents (required)
      - --grouping <json>: JSON array of category tags (optional)

      Output format: Space-separated agent IDs on stdout (e.g., "A B C D")
      Exit code: 0 on success, 1 on error
    location: cmd/saw/assign_agent_ids_cmd.go

