            ### Issue 3: Merge StartWave and startWaveWithGate via runOneWave

            Read StartWave (runner.go ~line 404) and startWaveWithGate (runner.go ~line 1424)
            carefully before making any changes. Understand every line of both functions.

            The differences between the two implementations:

            1. StartWave creates worktrees via protocol.CreateWorktrees + orch.SetWorktreePaths
               before RunWave; startWaveWithGate does NOT do this.
            2. StartWave has a quality gates block (RunPreMergeGates) before MergeWave;
               startWaveWithGate does NOT.
            3. StartWave runs stub scan (E20) after RunWave; startWaveWithGate does NOT.
            4. StartWave calls UpdateIMPLStatus and logs non-fatal on failure;
               startWaveWithGate calls _ = orch.UpdateIMPLStatus (silently ignores).
            5. Both have the identical E25/E26 integration block (~60 lines). This is
               the main duplication target.
            6. startWaveWithGate has the gate wait (gateCh + wave_gate_pending/resolved events);
               StartWave does not.

            Design for runOneWave:
            - The E25/E26 integration validation block moves entirely into runOneWave.
            - RunWave, MergeWave, RunVerification, UpdateIMPLStatus also move into runOneWave.
            - The quality gates block (RunPreMergeGates) and stub scan remain in StartWave's
              outer loop (they do not exist in startWaveWithGate, so putting them in runOneWave
              would change startWaveWithGate behavior). Alternatively, make them conditional
              via a parameter — either approach is acceptable as long as startWaveWithGate
              behavior is preserved.
            - The gate wait logic (select on gateCh) moves into runOneWave. When gateCh is nil,
              skip the gate wait. Use waveIdx < totalWaves-1 to determine if a gate wait is needed.
            - The worktree creation (CreateWorktrees + SetWorktreePaths) stays in StartWave's
              outer loop.

            After the refactor:
            - StartWave's wave loop body: CreateWorktrees → stub scan → quality gates →
              runOneWave(ctx, orch, opts, waveNum, waveIdx, totalWaves, publish, nil)
            - startWaveWithGate's wave loop body:
