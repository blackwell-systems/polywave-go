            ### Issue 13: Typed step function second returns

            CRITICAL CONSTRAINT: Do NOT make StepResult a generic struct. PrepareWaveResult.Steps
            []StepResult requires a single concrete type — making it StepResult[T] would break
            the slice. The StepResult.Data interface{} field and PrepareWaveResult.Steps []StepResult
            remain completely unchanged.

            Instead, add a typed second return value to each step function that currently returns
            only (*StepResult, error):

            **StepVerifyCommits** — current: `(*StepResult, error)` → new:
            ```go
            func StepVerifyCommits(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, *protocol.VerifyCommitsData, error)
            ```
            Return the typed data pointer alongside the StepResult. In success path, return
            &verifyData. In failure paths, return nil as the second value.
            Keep Data: verifyData on the StepResult unchanged.

            **StepScanStubs** — current: `(*StepResult, error)` → new:
            ```go
            func StepScanStubs(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, *protocol.ScanStubsData, error)
            ```
            Return &stubData in success path. Return nil in skip/failure paths.
            Keep Data: stubData on the StepResult unchanged.

            **StepVerifyBuild** — current: `(*StepResult, error)` → new:
            ```go
            func StepVerifyBuild(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, *protocol.VerifyBuildData, error)
            ```
            Return &verifyData in success path AND in the build-failed path (callers need
            the data even on failure). When diagnosis is attached, keep the existing behavior
            of setting StepResult.Data to map[string]interface{}{"verify_build": verifyData,
            "diagnosis": diagnosis} — but also return &verifyData as the typed second return.

            **StepCleanup** — current: `(*StepResult, error)` → new:
            ```go
            func StepCleanup(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, *protocol.CleanupData, error)
            ```
            Return &cleanupData in success path. Return nil on non-fatal error path.

            The following step functions already have typed second returns and must NOT be
            changed: StepRunGates, StepValidateIntegration, StepCheckTypeCollisions,
            StepCheckWiringDeclarations, StepPopulateIntegrationChecklist.

