            ## What to implement

            ### Bug 4 (MEDIUM): IsValidScoutPath silently returns false for absolute paths
            Location: scout_boundaries.go lines 104-111.

            Current code:
            ```go
            func IsValidScoutPath(filePath string) bool {
                normalized := filepath.Clean(filePath)
                dir := filepath.Dir(normalized)
                base := filepath.Base(normalized)
                return dir == "docs/IMPL" && strings.HasPrefix(base, "IMPL-") && strings.HasSuffix(base, ".yaml")
            }
            ```

            The `dir == "docs/IMPL"` string comparison only works for relative paths.
            For an absolute path like `/repo/docs/IMPL/IMPL-x.yaml`, `filepath.Dir`
            returns `/repo/docs/IMPL` which does not equal `"docs/IMPL"`.

            Fix: use path component matching that works for both relative and absolute paths:
            ```go
            func IsValidScoutPath(filePath string) bool {
                normalized := filepath.Clean(filePath)
                dir := filepath.Dir(normalized)
                base := filepath.Base(normalized)
                // Validate filename
                if !strings.HasPrefix(base, "IMPL-") || !strings.HasSuffix(base, ".yaml") {
                    return false
                }
                // Validate directory: must end with "docs/IMPL" (handles both relative and absolute paths)
                // Use filepath.Base twice to check the last two path components.
                implDir := filepath.Base(dir)             // must be "IMPL"
                docsDir := filepath.Base(filepath.Dir(dir)) // must be "docs"
                return implDir == "IMPL" && docsDir == "docs"
            }
            ```

            ### Bug 5 (MEDIUM): Duplication between IsValidScoutPath and inline check in ValidateScoutWrites
            Location: scout_boundaries.go lines 58-61 (inline check in Walk callback).

            Current inline check in the Walk callback:
            ```go
            dir := filepath.Dir(relPath)
            base := filepath.Base(relPath)
            if dir == "docs/IMPL" && strings.HasPrefix(base, "IMPL-") && strings.HasSuffix(base, ".yaml") {
                return nil // Allowed
            }
            ```

            After fixing Bug 4, replace the inline three-condition check with a call to
            IsValidScoutPath:
            ```go
            // Check if it's a valid IMPL doc in docs/IMPL/
            if IsValidScoutPath(relPath) {
                return nil // Allowed
            }
            ```

            Remove the now-unused local variables `dir` and `base` from the Walk callback.
            Note: `relPath` is a relative path (e.g., "docs/IMPL/IMPL-x.yaml") because it
            was computed via `filepath.Rel(repoPath, path)`. Since Bug 4's fix makes
            IsValidScoutPath work correctly for relative paths (the component check works for
            both), this is safe.

            ### Bug 9 (LOW): Missing test for ValidateScoutWrites with bad expectedIMPLPath
            Location: scout_boundaries_test.go — add new test case.

            Add a new subtest inside TestValidateScoutWrites (or as a standalone test)
            that verifies: when expectedIMPLPath is outside docs/IMPL/ (e.g. a path in /tmp/),
            any file actually written under docs/ is still reported as a violation rather
            than silently skipped.

            Example test to add:
            ```go
            t.Run("File under docs still flagged when expectedIMPLPath is outside docs/IMPL", func(t *testing.T) {
                // Use a fresh temp dir
                freshDir := t.TempDir()
                freshIMPL := filepath.Join(freshDir, "docs", "IMPL")
                if err := os.MkdirAll(freshIMPL, 0755); err != nil {
                    t.Fatal(err)
                }

                // Write a file that Scout is allowed to write
                validImpl := filepath.Join(freshIMPL, "IMPL-allowed.yaml")
                if err := os.WriteFile(validImpl, []byte("content"), 0644); err != nil {
                    t.Fatal(err)
                }

                // Use a bad expectedIMPLPath (outside docs/IMPL/)
                badExpected := filepath.Join("/tmp", "bad-path.yaml")
                res := ValidateScoutWrites(freshDir, badExpected, startTime)

                // The valid IMPL file was written by Scout but it matches the boundary rule,
                // so it should NOT be a violation (IsValidScoutPath(relPath) returns true).
                // The function should return Success because the file is in docs/IMPL/.
                if !res.IsSuccess() {
                    t.Errorf("Expected SUCCESS: file in docs/IMPL/ should be allowed regardless of expectedIMPLPath, got code=%q errors=%v", res.Code, res.Errors)
                }
            })
            ```

            Also add a test that verifies a file in docs/IMPL/ is NOT flagged even when
            it differs from expectedIMPLPath (verifying IsValidScoutPath path is used for
            all docs/IMPL/ files):
            ```go
            t.Run("Any IMPL doc in docs/IMPL is allowed even if not expectedIMPLPath", func(t *testing.T) {
                freshDir := t.TempDir()
                freshIMPL := filepath.Join(freshDir, "docs", "IMPL")
                if err := os.MkdirAll(freshIMPL, 0755); err != nil {
                    t.Fatal(err)
                }
                if err := os.WriteFile(filepath.Join(freshIMPL, "IMPL-different.yaml"), []byte("x"), 0644); err != nil {
                    t.Fatal(err)
                }
                // expectedIMPLPath points to a different IMPL file
                differentExpected := filepath.Join(freshIMPL, "IMPL-expected.yaml")
                res := ValidateScoutWrites(freshDir, differentExpected, startTime)
                if !res.IsSuccess() {
                    t.Errorf("Expected SUCCESS for IMPL doc in docs/IMPL/, got code=%q", res.Code)
                }
            })
            ```

