pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Bug 2 refactor breaks the PreLaunchGate call chain. Changing checkManifestValidation
            and checkOwnershipDisjoint signatures requires updating the call sites in PreLaunchGate.
            If the agent updates the function bodies but misses the call site update, the code
            will not compile.
          likelihood: low
          impact: high
          mitigation: |-
            Agent A's brief explicitly lists the call site update (PreLaunchGate body)
            alongside the function signature changes. Build gate `go build ./...` will
            catch a missed update immediately before tests run.
        - scenario: |-
            Bug 4 path component check is too broad. Using filepath.Base twice to match
            "IMPL" and "docs" could match a path like "other/docs/IMPL/IMPL-x.yaml" which
            is not the intended docs/IMPL directory in the repo root.
          likelihood: low
          impact: low
          mitigation: |-
            The Walk in ValidateScoutWrites starts from the repo's docs/ directory so all
            relPaths are already rooted at "docs/". For IsValidScoutPath called from
            external code with arbitrary absolute paths, matching the last two components is
            the intended behavior — it mirrors the design intent. The existing tests
            already cover "Complete subdir" (docs/IMPL/complete/IMPL-old.yaml → false),
            which validates the single-level check is correct.
        - scenario: |-
            Bug 5 refactor changes behavior: the old inline check used dir == "docs/IMPL"
            (relative-path only) while IsValidScoutPath after Bug 4 uses component matching.
            If relPath has an unexpected form (e.g. a path separator difference on Windows),
            the two might disagree.
          likelihood: low
          impact: low
          mitigation: |-
            This is a darwin/linux-only repo (darwin is the dev platform per env). filepath
            uses forward slashes. The tests use filepath.Join which normalizes separators.
            The component check in Bug 4 uses filepath.Base/Dir which is also
            separator-aware. No Windows risk in practice.
        - scenario: |-
            TestPreLaunchGate_CriticRequired test breaks after Bug 1 fix. The test adds
            a 3rd agent to wave 1, which is exactly the E37Required threshold (wave1 >= 3).
            After fixing to use protocol.E37Required, the test should still pass — but if
            E37Required's threshold changes in the future, the test expectation may diverge.
          likelihood: low
          impact: low
          mitigation: |-
            The test is structurally correct: 3 agents in wave 1 triggers E37Required.
            No mitigation needed. The existing TestPreLaunchGate_CriticRequired test passes
            with both the old code and the new code for this case.
