            ## What to implement

            ### Bug 1 (HIGH): checkCriticReviewRequired uses wrong E37 threshold
            Location: prelaunch_gate.go lines 282-326, specifically 284-291.

            Current code manually sums agents across ALL waves:
            ```go
            totalAgents := 0
            for _, wave := range m.Waves {
                totalAgents += len(wave.Agents)
            }
            isMultiRepo := len(m.Repositories) > 0
            if totalAgents >= 3 || isMultiRepo {
            ```

            Fix: replace the manual count block with a call to `protocol.E37Required(m)`.
            The `protocol.E37Required` function (pkg/protocol/critic_gate.go) is the
            single authoritative E37 implementation: it checks wave 1 agent count >= 3
            OR multi-repo. This eliminates the divergence where a 2-wave IMPL with 2+2
            agents triggers the hook gate but not E37Required.

            The fixed block inside the `if m.CriticReport == nil` branch should become:
            ```go
            if protocol.E37Required(m) {
                return PreLaunchCheck{
                    Name:    "critic_review",
                    Status:  "fail",
                    Message: fmt.Sprintf("E37: critic review required but not run"),
                }
            }
            ```
            You may retain or improve the diagnostic message text as long as it no
            longer manually counts totalAgents across all waves.

            ### Bug 2 (MEDIUM): checkOwnershipDisjoint calls protocol.Validate twice
            Location: PreLaunchGate (lines 43-85) and checkOwnershipDisjoint (258-280).

            Refactor PreLaunchGate to call protocol.Validate exactly once at the top,
            store the result in a local variable, and pass that slice to both
            checkManifestValidation and checkOwnershipDisjoint. Change the signatures of
            both functions to accept the pre-computed []result.SAWError instead of
            re-running validation internally.

            Updated function signatures:
            ```go
            func checkManifestValidation(errs []result.SAWError) PreLaunchCheck
            func checkOwnershipDisjoint(errs []result.SAWError) PreLaunchCheck
            ```

            In PreLaunchGate, call validation once:
            ```go
            validationErrs := protocol.Validate(manifest)
            result.Checks = append(result.Checks, checkManifestValidation(validationErrs))
            // ... other checks ...
            result.Checks = append(result.Checks, checkOwnershipDisjoint(validationErrs))
            ```

            ### Bug 3 (MEDIUM): checkManifestValidation treats warnings as failures
            Location: prelaunch_gate.go lines 87-106.

            After applying Bug 2's refactor (function now accepts []result.SAWError),
            separate warnings from errors exactly as pkg/protocol/pre_wave_gate.go does
            in checkValidation (lines 62-84 of pre_wave_gate.go):

            ```go
            func checkManifestValidation(errs []result.SAWError) PreLaunchCheck {
                if len(errs) == 0 {
                    return PreLaunchCheck{Name: "validation", Status: "pass", Message: "manifest is valid"}
                }
                var errMsgs, warnMsgs []string
                for _, e := range errs {
                    if e.Severity == "warning" {
                        warnMsgs = append(warnMsgs, e.Message)
                    } else {
                        errMsgs = append(errMsgs, e.Message)
                    }
                }
                if len(errMsgs) == 0 {
                    return PreLaunchCheck{Name: "validation", Status: "warn", Message: strings.Join(warnMsgs, "; ")}
                }
                return PreLaunchCheck{Name: "validation", Status: "fail", Message: strings.Join(errMsgs, "; ")}
            }
            ```

