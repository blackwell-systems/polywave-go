interface_contracts:
    - name: LoadTypePromptWithRefs
      description: |
        Exported helper that reads a type prompt file and prepends reference file
        content from the adjacent references/ directory. Replaces all direct
        os.ReadFile calls for agent type prompts in the engine layer.

        The references/ directory is computed as a sibling of the agents/ directory:
          promptPath = "<sawRepo>/implementations/claude-code/prompts/agents/<type>.md"
          refsDir    = "<sawRepo>/implementations/claude-code/prompts/references/"

        Reference files are filtered by prefix matching the prompt file's base name
        without extension (e.g., "scout.md" → load "scout-*.md" files from refsDir).

        Files are sorted alphabetically within the prefix group before prepending,
        ensuring deterministic ordering across runs.

        Dedup: if the injected content for a file is already present in the core
        prompt (detected via the marker "<!-- injected: references/<filename> -->"),
        that file is skipped. This matches the CLI hook dedup logic.

        Returns "[dedup-marked reference content]\n\n[core prompt content]" when
        references exist, or just "[core prompt content]" when refsDir is absent
        or contains no matching files.
      definition: |
        // LoadTypePromptWithRefs reads a type prompt file and prepends any
        // reference files from the adjacent references/ directory.
        //
        // refsDir is derived as filepath.Join(filepath.Dir(filepath.Dir(promptPath)), "references").
        // Reference files must match the glob "<type-stem>-*.md" where type-stem is
        // filepath.Base(promptPath) without the ".md" extension.
        //
        // Each reference file is prepended with a dedup marker:
        //   <!-- injected: references/<filename> -->
        //
        // If a marker for a file is already present in the core prompt content,
        // that file is skipped (no double-injection).
        //
        // Missing refsDir is not an error; returns core content only.
        func LoadTypePromptWithRefs(promptPath string) (string, error)
      location: pkg/engine/runner.go
    - name: Corrected scout.md path (runner.go)
      description: |
        The RunScout function currently loads from:
          implementations/claude-code/prompts/scout.md   (does not exist)
        The correct path is:
          implementations/claude-code/prompts/agents/scout.md
        Agent A must fix this path as part of replacing the os.ReadFile call.
      definition: |
        // Before (buggy):
        scoutMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "scout.md")

        // After (fixed):
        scoutMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "scout.md")
      location: pkg/engine/runner.go
    - name: Corrected planner.md path (runner.go)
      description: |
        The RunPlanner function currently loads from:
          agents/planner.md    (relative to sawRepo root, does not exist)
        The correct path is:
          implementations/claude-code/prompts/agents/planner.md
        Agent A must fix this path as part of replacing the os.ReadFile call.
        RunPlanner has a fallback prompt, so this was a silent failure before.
      definition: |
        // Before (buggy):
        plannerMdPath := filepath.Join(sawRepo, "agents", "planner.md")

        // After (fixed):
        plannerMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "planner.md")
      location: pkg/engine/runner.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            You are implementing a shared helper `LoadTypePromptWithRefs` in
            `pkg/engine/runner.go` and replacing all direct `os.ReadFile` calls
            for agent type prompts with this helper. You are also fixing two
            pre-existing path bugs discovered during scouting.

            The Go engine currently reads agent type prompt files with bare
            `os.ReadFile`. After the progressive disclosure extraction IMPLs
            run (scout, wave-agent, critic-agent, planner), those prompts will
            be slimmed down and their content moved to adjacent `references/`
            files. Without this helper, the engine will serve slimmed prompts
            without reference content — a regression.

            **KEY FINDING: Wave agents do NOT have a type prompt file in the
            Go engine.** Wave agent prompts are built dynamically from the IMPL
            doc brief in `extractBriefsAndInitJournals` (prepare.go). Do NOT
            add a wave-agent.md load site — there is none to replace.

            ## What to implement

            ### 1. Add LoadTypePromptWithRefs helper to runner.go

            Add a new exported function `LoadTypePromptWithRefs` to
            `pkg/engine/runner.go`. This function:

            1. Reads the core prompt file at `promptPath` (same as current os.ReadFile)
            2. Derives the refsDir as:
               ```go
               refsDir := filepath.Join(filepath.Dir(filepath.Dir(promptPath)), "references")
               ```
               This gives the `references/` directory that is a sibling of `agents/`.
            3. If refsDir does not exist, returns `(string(coreBytes), nil)` — graceful skip
            4. Determines the type stem from the prompt filename:
               ```go
               stem := strings.TrimSuffix(filepath.Base(promptPath), ".md")
               // e.g., "scout.md" → "scout", "critic-agent.md" → "critic-agent"
               ```
            5. Reads all `.md` files in refsDir matching the glob `<stem>-*.md`
               (use `filepath.Glob` for deterministic alphabetical ordering)
            6. For each matching reference file:
               a. Read its contents
               b. Compute the marker: `<!-- injected: references/<filename> -->`
               c. Check if core prompt already contains this marker (dedup check):
                  ```go
                  if strings.Contains(coreContent, marker) {
                      continue // skip — already injected
                  }
                  ```
               d. Prepend: `marker + "\n" + refContent + "\n\n"` to the injectedParts
            7. Returns: `strings.Join(injectedParts, "") + "\n\n" + coreContent`
               (or just `coreContent` if no references were injected)

            If refsDir exists but has no matching files, return core content only
            (empty injection is not an error).

            If refsDir exists but a specific reference file cannot be read,
            log a warning with `slog.Default().Warn(...)` and skip that file
            (non-fatal — degraded injection is better than a hard failure).

            **Function signature (binding contract):**
            ```go
            // LoadTypePromptWithRefs reads the agent type prompt at promptPath and
            // prepends any reference files from the adjacent references/ directory.
            // Reference files must match the pattern "<type-stem>-*.md" where
            // type-stem is the base filename without the ".md" extension.
            // Each reference file is prepended with a dedup marker:
            //   <!-- injected: references/<filename> -->
            // Missing refsDir is not an error; returns core content only.
            func LoadTypePromptWithRefs(promptPath string) (string, error)
            ```

            Place this function near the end of runner.go, before `readContextMD`.

            ### 2. Replace os.ReadFile call in RunScout (~line 76)

            **Fix the path bug first.** The current code:
            ```go
            scoutMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "scout.md")
            scoutMdBytes, err := os.ReadFile(scoutMdPath)
            if err != nil {
                return fmt.Errorf("engine.RunScout: scout.md not found at %s: %w", scoutMdPath, err)
            }
            ```

            Replace with:
            ```go
            scoutMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "scout.md")
            scoutMdContent, err := LoadTypePromptWithRefs(scoutMdPath)
            if err != nil {
                return fmt.Errorf("engine.RunScout: scout.md not found at %s: %w", scoutMdPath, err)
            }
            ```

            Then update the uses of `scoutMdBytes` to `scoutMdContent` (it's now a string,
            not a []byte). Find all uses of `scoutMdBytes` after this point:
            - In the prompt format strings: `string(scoutMdBytes)` → `scoutMdContent`

            Grep for `scoutMdBytes` in runner.go to find all occurrences (including in
            the `runScoutStructured` path via the `prompt` variable).

            ### 3. Replace os.ReadFile call in RunPlanner (~line 180)

            **Fix the path bug first.** The current code:
            ```go
            plannerMdPath := filepath.Join(sawRepo, "agents", "planner.md")
            plannerMdBytes, err := os.ReadFile(plannerMdPath)
            if err != nil {
                plannerMdBytes = []byte("You are a Planner agent. ...")
            }
            ```

            Replace with:
            ```go
            plannerMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "planner.md")
            plannerMdContent, err := LoadTypePromptWithRefs(plannerMdPath)
            if err != nil {
                // Fallback: LoadTypePromptWithRefs only errors on ReadFile failure of
                // the core file. Keep the same fallback behavior as before.
                plannerMdContent = "You are a Planner agent. Analyze the project requirements and produce a PROGRAM manifest at the specified output path. Decompose the project into features organized into dependency-ordered tiers. Define cross-feature program contracts for shared types/APIs."
            }
            ```

            Then update uses of `plannerMdBytes` → `plannerMdContent` (string, not []byte).
            Find all occurrences of `plannerMdBytes` in runner.go with grep.

            ### 4. Replace os.ReadFile call in RunScaffold (~line 550)

            The current code:
            ```go
            scaffoldMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "scaffold-agent.md")
            scaffoldMdBytes, err := os.ReadFile(scaffoldMdPath)
            if err != nil {
                scaffoldMdBytes = []byte("You are a Scaffold Agent. Create the stub files defined in the IMPL doc Scaffolds section.")
            }
            prompt := fmt.Sprintf("%s\n\n## IMPL Doc Path\n%s\n", string(scaffoldMdBytes), implPath)
            ```

            Replace with:
            ```go
            scaffoldMdPath := filepath.Join(sawRepo, "implementations", "claude-code", "prompts", "agents", "scaffold-agent.md")
            scaffoldMdContent, err := LoadTypePromptWithRefs(scaffoldMdPath)
            if err != nil {
                scaffoldMdContent = "You are a Scaffold Agent. Create the stub files defined in the IMPL doc Scaffolds section."
            }
            prompt := fmt.Sprintf("%s\n\n## IMPL Doc Path\n%s\n", scaffoldMdContent, implPath)
            ```

            ### 5. Write unit tests in runner_test.go

            Add tests for `LoadTypePromptWithRefs` in `pkg/engine/runner_test.go`.
            The test function must be `TestLoadTypePromptWithRefs`.

            Use `t.TempDir()` to create isolated directory structures.

            **Test case 1: no references/ dir → returns core content only**
            ```
            Setup:
              tmpDir/
                agents/
                  scout.md  (content: "# Scout\n\nCore content")
              (no references/ dir)
            Expected: result == "# Scout\n\nCore content", nil
            ```

            **Test case 2: references/ dir with matching files → dedup-marked refs prepended**
            ```
            Setup:
              tmpDir/
                agents/
                  scout.md  (content: "# Scout Core")
                references/
                  scout-suitability-gate.md  (content: "## Suitability Gate")
                  scout-implementation-process.md  (content: "## Implementation Process")
                  wave-agent-worktree.md  (content: "## Worktree")  ← should NOT be included
            Expected result contains:
              "<!-- injected: references/scout-suitability-gate.md -->"
              "## Suitability Gate"
              "<!-- injected: references/scout-implementation-process.md -->"
              "## Implementation Process"
              "# Scout Core"
            Expected result does NOT contain "Worktree" (wave-agent prefix filtered out)
            Expected: nil error
            ```

            **Test case 3: dedup marker already in core → no double-injection**
            ```
            Setup:
              tmpDir/
                agents/
                  scout.md  (content includes:
                    "<!-- injected: references/scout-suitability-gate.md -->\n# Scout Core")
                references/
                  scout-suitability-gate.md  (content: "## Suitability Gate")
            Expected: "scout-suitability-gate.md" content appears only ONCE in result
            (the already-injected file is skipped)
            ```

            **Test case 4: empty references/ dir with no matching files → returns core only**
            ```
            Setup:
              tmpDir/
                agents/
                  scout.md  (content: "# Scout Core")
                references/
                  (empty or only non-matching files like wave-agent-*.md)
            Expected: result == "# Scout Core", nil
            ```

            **Test case 5: core file missing → returns error**
            ```
            Setup: promptPath points to a non-existent file
            Expected: error is non-nil
            ```

            ## Verification gate

            After implementing, run:
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./...
            go vet ./...
            go test ./pkg/engine/... -run TestLoadTypePromptWithRefs -v
            ```

            All 5 test cases must pass. The build must succeed.

            ## Constraints

            - Do NOT add a wave-agent.md load site — wave agent prompts come from
              the IMPL brief, not a type prompt file (key finding from scouting)
            - Do NOT modify prepare.go, run_critic_cmd.go, or any other file
            - The function must be exported (capital L) so Agent B's wave 2 work
              can import and use it from cmd/sawtools/run_critic_cmd.go
            - Preserve the fallback behavior in RunPlanner and RunScaffold
              (these had soft fallbacks; maintain that graceful degradation)
            - RunScout has no fallback (hard failure on missing file) — maintain that
            - The `os` import is already present in runner.go; verify `strings`,
              `path/filepath` are already imported (they are — check imports at top)
            - Use `slog.Default().Warn(...)` for non-fatal reference file read errors
              (slog is already imported in runner.go)
          files:
            - pkg/engine/runner.go
            - pkg/engine/runner_test.go
