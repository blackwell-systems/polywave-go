pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A introduces a duplicate loggerFrom or package-level helper name
          likelihood: low
          impact: medium
          mitigation: |
            runner.go already has `loggerFrom` defined at the top. Agent A must
            use a different name for any new private helpers. The exported function
            is `LoadTypePromptWithRefs` (no conflict). Brief explicitly warns not
            to redeclare loggerFrom.
        - scenario: filepath.Glob returns non-alphabetical ordering on some OS
          likelihood: low
          impact: low
          mitigation: |
            filepath.Glob returns results in lexicographical order by spec (Go docs).
            No explicit sort needed. Tests will verify deterministic ordering.
        - scenario: scoutMdBytes variable rename breaks usage in runScoutStructured path
          likelihood: medium
          impact: high
          mitigation: |
            Agent A brief explicitly says "grep for scoutMdBytes in runner.go to
            find ALL occurrences". The variable is renamed to scoutMdContent (string
            not []byte) and all string() casts must be removed. There may be uses
            in the runScoutStructured and runScoutStructuredBedrock paths. The
            verification gate (go build) will catch any missed rename.
        - scenario: pkg/engine import in run_critic_cmd.go creates a build cycle
          likelihood: low
          impact: high
          mitigation: |
            Scouting verified pkg/engine does not import cmd/sawtools. The import
            graph is cmd/sawtools → pkg/engine (one-way). No cycle exists.
        - scenario: os import removal in run_critic_cmd.go breaks compilation
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B brief explicitly says to check whether os is still used elsewhere
            in the file (os.UserHomeDir, os.Getenv etc.) before removing. The brief
            instructs to keep os if still needed, remove only if unused.
        - scenario: references/ directory not yet populated (extraction IMPLs pending)
          likelihood: high
          impact: low
          mitigation: |
            The helper is explicitly designed to gracefully skip when references/
            is empty or missing. When no reference files match the prefix pattern,
            the function returns core content only. This is the expected behavior
            until the extraction IMPLs execute. No regression.
