suitability_assessment: |
    File decomposition: 3 distinct files across 2 agents with disjoint ownership.
    Agent A owns pkg/engine/runner.go (helper + 3 load sites + 2 path bug fixes)
    and pkg/engine/runner_test.go (unit tests). Agent B owns
    cmd/sawtools/run_critic_cmd.go (1 load site). These files are fully disjoint.

    Investigation-first: None required. All load sites identified by direct grep
    of the codebase. Key discoveries during scouting:
    1. Wave agents do NOT have a wave-agent.md load site in the Go engine — their
       prompts come from the IMPL doc task field (extractBriefsAndInitJournals in
       prepare.go). No wave-agent.md injection needed.
    2. runner.go line 76 uses wrong path: "prompts/scout.md" (file does not exist
       at that location). Actual path is "implementations/claude-code/prompts/agents/scout.md".
       This is a pre-existing bug; the fix is included in scope.
    3. runner.go line 179 uses wrong path for planner: "agents/planner.md" (relative
       to sawRepo root, not the correct subpath). Actual path is
       "implementations/claude-code/prompts/agents/planner.md". Also a pre-existing
       bug; fix included in scope.
    4. Reference files are in a shared "references/" sibling directory alongside
       "agents/" — both under "implementations/claude-code/prompts/". The convention
       is NOT per-agent subdirectories ("agents/scout/references/"); instead all
       reference files go into "implementations/claude-code/prompts/references/" and
       are named with a type-specific prefix ("scout-*.md", "wave-agent-*.md", etc.).

    Interface discoverability: Yes. The exported helper function signature
    (LoadTypePromptWithRefs) can be defined upfront. Agent B depends on this
    signature but not on its implementation details.

    Pre-implementation status: Fresh feature, nothing implemented yet. The
    four extraction IMPLs (scout, wave-agent, critic-agent, planner) are all
    state: SCOUT_PENDING — their reference files don't exist yet. The helper
    must gracefully skip when the references/ directory is empty or missing.

    Parallelization value: 2 agents in 2 sequential waves (B depends on A's
    exported function). The build/test cycle is fast (Go unit tests). The main
    value here is clean interface contract definition and separation of concerns.
    Agent A does the heavy lifting (helper + tests); Agent B does a simple
    substitution once the helper is exported.

    Estimated times:
    - Scout phase: ~15 min (codebase analysis, path discovery, IMPL doc)
    - Agent execution: ~15 min (Agent A: 20 min; Agent B: 5 min, runs after A)
    - Merge & verification: ~5 min
    Total SAW time: ~35 min

    Sequential baseline: ~25 min (simple change, low parallelization value)
    Time savings: minimal. Value is in coordination and interface contract clarity.

    Recommendation: Proceed. The IMPL doc captures important discoveries
    (path bugs, no wave-agent.md load site, reference directory convention)
    that prevent agents from making incorrect assumptions.
