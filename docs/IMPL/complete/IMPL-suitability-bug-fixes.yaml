pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent B's TestScanPreImplementation_AllDone writes an inline testContent
            string that currently has the 20 empty edge-case functions. After removing
            those, the inline file written to disk will have fewer than 100 lines,
            changing the expected TestCoverage from "high" to something lower. If Agent B
            does not update the assertion accordingly, the test will fail.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent B's task explicitly requires either adjusting the inline content to
            remain >100 lines via generateTestPadding or updating the assertion to match
            the actual line count. The task prompt calls this out directly.
        - scenario: |-
            Agent A and Agent B both write to the same Go package (package suitability).
            If Agent A declares a package-level var with the same name as something Agent B
            writes in the test file, there will be a compile error at merge time.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B's test file is in package suitability (not package suitability_test),
            so name collisions are theoretically possible. However, Agent B only adds test
            functions prefixed with Test*, and Agent A only adds package-level vars
            (funcPattern, todoPatterns) and a coverage-rank helper. No name overlap is
            expected. Post-merge build gate will catch any collision immediately.
        - scenario: |-
            The coverageRank helper function that Agent A adds to scanner.go for the
            TestCoverage worst-wins logic could have the same name as a function Agent B
            adds to the test file if Agent B independently defines a similar helper.
          likelihood: low
          impact: low
          mitigation: |-
            Agent A's helper is unexported and lives in scanner.go. Agent B's task does
            not instruct it to define any helpers by that name. If a collision occurs,
            the post-merge build gate catches it and the fix is a trivial rename.
