pre_mortem:
    overall_risk: low
    rows:
        - scenario: Bedrock STS validation fails due to missing AWS SDK dependency in web app
          likelihood: medium
          impact: medium
          mitigation: Web app already depends on scout-and-wave-go which has AWS SDK. Agent C should verify the import works.
        - scenario: Anthropic validation endpoint changes or requires specific headers
          likelihood: low
          impact: low
          mitigation: Use the official SDK or a minimal POST to /v1/messages with 1 token max.
        - scenario: Credentials stored in saw.config.json may be readable by other processes
          likelihood: medium
          impact: medium
          mitigation: File is already gitignored. Document that file permissions should be 0600. Out of scope for this IMPL.
        - scenario: Frontend type mismatch between D and E agents
          likelihood: low
          impact: low
          mitigation: Types are fully specified in interface contracts. Both agents implement to the same spec.
