interface_contracts:
    - name: backend.Config credential fields
      description: Add provider-specific credential fields to the existing backend.Config struct
      definition: |
        // Added fields to existing backend.Config struct in pkg/agent/backend/backend.go:
        type Config struct {
            // ... existing fields (Model, MaxTokens, MaxTurns, BinaryPath, APIKey, BaseURL, etc.) ...

            // AnthropicKey is the Anthropic API key. If empty, ANTHROPIC_API_KEY env var is used.
            AnthropicKey string

            // BedrockRegion is the AWS region for Bedrock (e.g. "us-east-1").
            // If empty, uses AWS SDK default chain.
            BedrockRegion string

            // BedrockAccessKeyID is the AWS access key for Bedrock.
            // If empty, uses AWS SDK default credential chain.
            BedrockAccessKeyID string

            // BedrockSecretAccessKey is the AWS secret key for Bedrock.
            // If empty, uses AWS SDK default credential chain.
            BedrockSecretAccessKey string

            // BedrockSessionToken is an optional AWS session token for temporary credentials.
            BedrockSessionToken string
        }
      location: pkg/agent/backend/backend.go
    - name: ProvidersConfig
      description: New config struct for provider credentials in saw.config.json
      definition: |
        // In scout-and-wave-web/pkg/service/config_service.go:
        type ProvidersConfig struct {
            Anthropic AnthropicProviderConfig `json:"anthropic"`
            OpenAI    OpenAIProviderConfig    `json:"openai"`
            Bedrock   BedrockProviderConfig   `json:"bedrock"`
        }

        type AnthropicProviderConfig struct {
            APIKey string `json:"api_key,omitempty"`
        }

        type OpenAIProviderConfig struct {
            APIKey string `json:"api_key,omitempty"`
        }

        type BedrockProviderConfig struct {
            Region          string `json:"region,omitempty"`
            AccessKeyID     string `json:"access_key_id,omitempty"`
            SecretAccessKey  string `json:"secret_access_key,omitempty"`
            SessionToken    string `json:"session_token,omitempty"`
        }
      location: pkg/service/config_service.go
    - name: SAWConfig.Providers field
      description: Add Providers field to existing SAWConfig struct
      definition: |
        // Added field to existing SAWConfig in both service and api types:
        type SAWConfig struct {
            // ... existing fields ...
            Providers ProvidersConfig `json:"providers,omitempty"`
        }
      location: pkg/service/config_service.go
    - name: handleValidateProvider
      description: HTTP handler for POST /api/config/providers/{provider}/validate
      definition: |
        // In scout-and-wave-web/pkg/api/config_handler.go:
        func (s *Server) handleValidateProvider(w http.ResponseWriter, r *http.Request)
        // Request body: provider-specific credential JSON
        // Response: {"valid": bool, "error": string, "identity": string}
      location: pkg/api/config_handler.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Bedrock backend credential wiring in Go engine**

            Repo: scout-and-wave-go

            **What to implement:**
            1. In `pkg/agent/backend/backend.go`, add credential fields to the existing `Config` struct:
               - `AnthropicKey string` - Anthropic API key (separate from existing `APIKey` which is OpenAI)
               - `BedrockRegion string` - AWS region override
               - `BedrockAccessKeyID string` - AWS access key
               - `BedrockSecretAccessKey string` - AWS secret key
               - `BedrockSessionToken string` - optional session token

            2. In `pkg/agent/backend/bedrock/client.go`, modify `New()` to use credential fields from `backend.Config`:
               - If `cfg.BedrockAccessKeyID` and `cfg.BedrockSecretAccessKey` are non-empty, use
                 `credentials.NewStaticCredentialsProvider()` instead of default chain
               - If `cfg.BedrockRegion` is non-empty, use it as `config.WithRegion()`
               - Fall back to existing default chain behavior when fields are empty (backward compat)

            **Interface contract:**
            ```go
            // backend.Config gets these new fields:
            AnthropicKey           string
            BedrockRegion          string
            BedrockAccessKeyID     string
            BedrockSecretAccessKey string
            BedrockSessionToken    string
            ```

            **Tests:**
            - Add test in `bedrock/client_test.go` verifying that `New()` with populated credential
              fields creates a client (no panic, non-nil client)
            - Test that empty fields fall back to default chain (existing behavior preserved)

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/agent/backend/...
            ```

            **Constraints:**
            - Do NOT modify any files outside your ownership list
            - Preserve all existing Config fields unchanged
            - Empty credential fields MUST fall back to existing env var / default chain behavior
          files:
            - pkg/agent/backend/backend.go
            - pkg/agent/backend/bedrock/client.go
            - pkg/agent/backend/bedrock/client_test.go
        - id: B
          task: |
            **Anthropic + OpenAI client credential wiring and orchestrator plumbing**

            Repo: scout-and-wave-go

            **What to implement:**
            1. In `pkg/agent/backend/api/client.go` (Anthropic backend):
               - The `New(apiKey string, cfg backend.Config)` function already accepts an explicit apiKey.
               - No signature change needed. The orchestrator will pass the config-sourced key.

            2. In `pkg/agent/backend/openai/client.go`:
               - Already reads `cfg.APIKey` with env var fallback. No change needed in the client itself.

            3. In `pkg/orchestrator/orchestrator.go`:
               - Add credential fields to `BackendConfig`:
                 ```go
                 AnthropicKey           string
                 BedrockRegion          string
                 BedrockAccessKeyID     string
                 BedrockSecretAccessKey string
                 BedrockSessionToken    string
                 ```
               - In `newBackendFunc`, wire the new fields through to each backend:
                 - `case "anthropic", "api", "auto"`: use `cfg.AnthropicKey` before `cfg.APIKey` before env var
                 - `case "openai"`: use `cfg.OpenAIKey` (already exists) before env var
                 - `case "bedrock"`: pass `BedrockRegion`, `BedrockAccessKeyID`, `BedrockSecretAccessKey`,
                   `BedrockSessionToken` into `backend.Config` when constructing `bedrockbackend.New()`

            **Tests:**
            - In `api/client_test.go`: verify New() with explicit apiKey still works
            - In `openai/client_test.go`: verify New() with cfg.APIKey still works

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/agent/backend/... ./pkg/orchestrator/...
            ```

            **Constraints:**
            - Do NOT modify `backend.go` (owned by Agent A)
            - Do NOT modify `bedrock/client.go` (owned by Agent A)
            - Preserve existing env var fallback behavior for all providers
          files:
            - pkg/agent/backend/api/client.go
            - pkg/agent/backend/api/client_test.go
            - pkg/agent/backend/openai/client.go
            - pkg/agent/backend/openai/client_test.go
            - pkg/orchestrator/orchestrator.go
        - id: C
          task: |
            **Web app backend: ProvidersConfig + validation endpoints**

            Repo: scout-and-wave-web

            **What to implement:**
            1. In `pkg/service/config_service.go`:
               - Add `ProvidersConfig`, `AnthropicProviderConfig`, `OpenAIProviderConfig`,
                 `BedrockProviderConfig` structs (see interface contracts)
               - Add `Providers ProvidersConfig` field to existing `SAWConfig` struct
                 with JSON tag `json:"providers,omitempty"`
               - Add `ValidateAnthropicCredentials(apiKey string) error` - makes a lightweight
                 Anthropic API call (POST /v1/messages with tiny prompt, or GET /v1/models)
               - Add `ValidateOpenAICredentials(apiKey string) error` - calls GET /v1/models
               - Add `ValidateBedrockCredentials(region, accessKeyID, secretKey, sessionToken string) error`
                 - uses AWS STS GetCallerIdentity with static credentials
               - Credentials MUST NOT be logged. Use `omitempty` JSON tags.

            2. In `pkg/api/types.go`:
               - Add corresponding API types that mirror service types:
                 `ProvidersConfig`, `AnthropicProviderConfig`, `OpenAIProviderConfig`,
                 `BedrockProviderConfig`
               - Add `Providers ProvidersConfig` to `SAWConfig`
               - Add `ProviderValidationResponse` struct: `{Valid bool, Error string, Identity string}`

            3. In `pkg/api/config_handler.go`:
               - Add `handleValidateProvider(w, r)` for POST /api/config/providers/{provider}/validate
               - Route on provider path param: "anthropic", "openai", "bedrock"
               - Decode provider-specific credential JSON, call corresponding Validate function
               - Wire ProvidersConfig through handleGetConfig/handleSaveConfig (add to
                 the service<->API type conversion)
               - IMPORTANT: Register the route in the server mux (check server.go or routes.go
                 for route registration pattern and add the new route there)

            **Tests:**
            - Test GetConfig/SaveConfig round-trip with providers field
            - Test validation endpoint returns 200 with valid/invalid result shape

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/service/... ./pkg/api/...
            ```

            **Constraints:**
            - Do NOT modify frontend files (owned by Wave 2 agents)
            - Credentials must never appear in logs or error messages
            - Empty provider config = fall back to env vars (backward compat)
            - Validate functions should have reasonable timeouts (5s max)
          files:
            - pkg/service/config_service.go
            - pkg/service/config_service_test.go
            - pkg/api/config_handler.go
            - pkg/api/config_handler_test.go
            - pkg/api/server.go
            - pkg/api/types.go
      base_commit: 114a992d7dfb892ac6194ff7a98e584d4703760b
