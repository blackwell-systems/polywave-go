          task: |
            **Provider credential cards in SettingsScreen**

            Repo: scout-and-wave-web

            **What to implement:**
            1. Create `web/src/components/ProviderCard.tsx`:
               - Reusable card component for a single provider's credentials
               - Props: `provider: string, config: object, onChange: (config) => void,
                 onValidate: () => Promise<{valid, error, identity}>`
               - API key fields use `type="password"` with a show/hide toggle
               - "Test Connection" button calls onValidate, shows success/error inline
               - Bedrock card has 4 fields: region (text), access key (password),
                 secret key (password), session token (password, optional)
               - Anthropic and OpenAI cards have 1 field each: api_key (password)

            2. In `web/src/components/SettingsScreen.tsx`:
               - Add a "Providers" section between "Repositories" and "Agent" sections
               - Render 3 ProviderCard components (Anthropic, OpenAI, Bedrock)
               - Initialize `config.providers` with empty defaults if missing
               - Wire onChange to update config state, wire onValidate to call
                 `POST /api/config/providers/{provider}/validate`
               - On save, include providers in the config payload
               - Display helper text: "Leave empty to use environment variables"

            The TypeScript types this component uses are defined in the interface contracts:
            ```typescript
            // From web/src/types.ts (added by Agent D):
            interface ProvidersConfig {
              anthropic: AnthropicProviderConfig   // { api_key?: string }
              openai: OpenAIProviderConfig         // { api_key?: string }
              bedrock: BedrockProviderConfig       // { region?, access_key_id?, secret_access_key?, session_token? }
            }
            interface ProviderValidationResponse { valid: boolean; error?: string; identity?: string }
            ```

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
            ```

            **Constraints:**
            - Do NOT modify Go files or types.ts (owned by other agents)
            - API keys must be masked in the UI (password field)
            - Empty fields must be preserved as empty strings, not removed
            - Use existing UI patterns from SettingsScreen (border-border, bg-card, etc.)
          files:
            - web/src/components/SettingsScreen.tsx
            - web/src/components/ProviderCard.tsx
          dependencies:
            - C
