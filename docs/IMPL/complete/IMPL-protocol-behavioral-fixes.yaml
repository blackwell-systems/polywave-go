        - id: C
          task: |
            ## F10: Guard WAVE_EXECUTING -> COMPLETE state transition

            ### What to implement

            The `allowedTransitions` map permits `StateWaveExecuting -> StateComplete`
            directly. This is intentional for solo-wave IMPLs but could allow multi-agent
            waves to skip merge. Add an advisory guard.

            **Step 1: Add ValidateStateTransitionContext function**

            In `pkg/protocol/state_transition.go`, after `SetImplState` (after line 155),
            add:

            ```go
            // ValidateStateTransitionContext checks whether a state transition is
            // semantically appropriate given the manifest context. Returns warning-level
            // SAWErrors for transitions that are technically allowed but potentially
            // dangerous (e.g., WAVE_EXECUTING -> COMPLETE with multiple agents).
            func ValidateStateTransitionContext(manifest *IMPLManifest, from, to ProtocolState) []result.SAWError {
            	var warnings []result.SAWError

            	if from == StateWaveExecuting && to == StateComplete {
            		var currentWave *Wave
            		for i := range manifest.Waves {
            			w := &manifest.Waves[i]
            			if len(w.Agents) > 0 {
            				if currentWave == nil || w.Number > currentWave.Number {
            					currentWave = w
            				}
            			}
            		}

            		if currentWave != nil && !IsSoloWave(currentWave) {
            			warnings = append(warnings, result.SAWError{
            				Code:     result.CodeStateTransition,
            				Message:  fmt.Sprintf("WAVE_EXECUTING -> COMPLETE bypasses merge/verify for wave %d with %d agents; consider WAVE_MERGING -> WAVE_VERIFIED -> COMPLETE path", currentWave.Number, len(currentWave.Agents)),
            				Severity: "warning",
            			})
            		}
            	}

            	return warnings
            }
            ```

            **Step 2: Wire into SetImplState**

            Find this exact text:
            ```go
            	// Write the new state atomically
            	if err := updateManifestState(manifestPath, newState); err != nil {
            ```

            Insert before it:
            ```go
            	// Advisory check: warn about potentially dangerous transitions.
            	_ = ValidateStateTransitionContext(manifest, previousState, newState)

            ```

            **Step 3: Add tests in state_transition_test.go**

            ```go
            func TestValidateStateTransitionContext_SoloWaveNoWarning(t *testing.T) {
            	m := &IMPLManifest{
            		Waves: []Wave{
            			{Number: 1, Agents: []Agent{{ID: "A", Task: "solo"}}},
            		},
            	}
            	warnings := ValidateStateTransitionContext(m, StateWaveExecuting, StateComplete)
            	if len(warnings) != 0 {
            		t.Errorf("expected no warnings for solo-wave, got %d: %v", len(warnings), warnings)
            	}
            }

            func TestValidateStateTransitionContext_MultiAgentWarning(t *testing.T) {
            	m := &IMPLManifest{
            		Waves: []Wave{
            			{Number: 1, Agents: []Agent{
            				{ID: "A", Task: "first"},
            				{ID: "B", Task: "second"},
            			}},
            		},
            	}
            	warnings := ValidateStateTransitionContext(m, StateWaveExecuting, StateComplete)
            	if len(warnings) != 1 {
            		t.Fatalf("expected 1 warning for multi-agent wave, got %d", len(warnings))
            	}
            	if warnings[0].Severity != "warning" {
            		t.Errorf("expected severity=warning, got %q", warnings[0].Severity)
            	}
            }

            func TestValidateStateTransitionContext_NormalTransitionNoWarning(t *testing.T) {
            	m := &IMPLManifest{
            		Waves: []Wave{
            			{Number: 1, Agents: []Agent{
            				{ID: "A", Task: "first"},
            				{ID: "B", Task: "second"},
            			}},
            		},
            	}
            	warnings := ValidateStateTransitionContext(m, StateWaveExecuting, StateWaveMerging)
            	if len(warnings) != 0 {
            		t.Errorf("expected no warnings for normal transition, got %d", len(warnings))
            	}
            }
            ```

            ### Verification gate

            ```bash
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/ -run "TestValidateStateTransitionContext|TestSetImplState|TestIsValidTransition" -count=1
            ```

            Postconditions:
            ```bash
