            ## F1: Unify FailureCategory and FailureTypeEnum

            ### What to implement

            Two string types represent the same concept (failure classification):
            - `FailureCategory` (types.go:221): values "transient", "fixable",
              "needs_replan", "timeout", "unknown"
            - `FailureTypeEnum` (failure.go:4): values "transient", "fixable",
              "needs_replan", "escalate", "timeout"

            Unify into `FailureTypeEnum` as canonical type. Make `FailureCategory`
            a type alias.

            **Step 1: Add `FailureUnknown` to failure.go**

            In `pkg/protocol/failure.go`, add inside the existing const block.

            Find this exact text:
            ```go
            	// FailureTimeout indicates the agent ran out of time and should retry with scope reduction.
            	FailureTimeout FailureTypeEnum = "timeout"
            )
            ```

            Replace with:
            ```go
            	// FailureTimeout indicates the agent ran out of time and should retry with scope reduction.
            	FailureTimeout FailureTypeEnum = "timeout"

            	// FailureUnknown indicates an unclassified failure (legacy "unknown" category).
            	FailureUnknown FailureTypeEnum = "unknown"
            )
            ```

            **Step 2: Update ValidFailureType in failure.go**

            Find this exact text:
            ```go
            	case FailureTransient, FailureFixable, FailureNeedsReplan, FailureEscalate, FailureTimeout:
            		return true
            ```

            Change to:
            ```go
            	case FailureTransient, FailureFixable, FailureNeedsReplan, FailureEscalate, FailureTimeout, FailureUnknown:
            		return true
            ```

            **Step 3: Convert FailureCategory to type alias in types.go**

            Find this exact text:
            ```go
            // FailureCategory classifies an agent failure for recovery step generation.
            type FailureCategory string

            const (
            	FailureCategoryTransient   FailureCategory = "transient"
            	FailureCategoryFixable     FailureCategory = "fixable"
            	FailureCategoryNeedsReplan FailureCategory = "needs_replan"
            	FailureCategoryTimeout     FailureCategory = "timeout"
            	FailureCategoryUnknown     FailureCategory = "unknown"
            )
            ```

            Replace with:
            ```go
            // FailureCategory is a deprecated alias for FailureTypeEnum.
            // Use FailureTypeEnum directly in new code.
            type FailureCategory = FailureTypeEnum

            // Backward-compatible constants mapping FailureCategory names to FailureTypeEnum values.
            const (
            	FailureCategoryTransient   = FailureTransient
            	FailureCategoryFixable     = FailureFixable
            	FailureCategoryNeedsReplan = FailureNeedsReplan
            	FailureCategoryTimeout     = FailureTimeout
            	FailureCategoryUnknown     = FailureUnknown
            	FailureCategoryEscalate    = FailureEscalate
            )
            ```

            **Step 4: Verify recovery.go compiles**

            In `pkg/resume/recovery.go`, the code assigns to `FailureCategory` (now
            an alias for FailureTypeEnum). No code changes needed — verify it compiles.

            **Step 5: Update failure_test.go**

            Update `TestShouldRetry_Unknown` (line 35) which uses
            `FailureTypeEnum("unknown")` — change to `FailureUnknown` constant.

            Add test: `ValidFailureType("unknown")` should return true.

            **Step 6: Verify completion_report.go**

