            # Expected: 1
            grep -c 'IsSoloWave' pkg/protocol/state_transition.go
            # Expected: 1
            ```

            ### Constraints
            - Do NOT modify files outside your ownership list.
            - Do NOT remove WAVE_EXECUTING -> COMPLETE from allowedTransitions.
            - Do NOT make warnings blocking — severity must be "warning".
            - Do NOT change SetImplState return type.
          files:
            - pkg/protocol/state_transition.go
            - pkg/protocol/state_transition_test.go
