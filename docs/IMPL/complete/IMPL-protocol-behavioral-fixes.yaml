pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A type alias breaks compilation in pkg/orchestrator
          likelihood: low
          impact: medium
          mitigation: |
            Type alias (=) means FailureCategory IS FailureTypeEnum at compile time.
            Orchestrator uses FailureTypeEnum directly, never references FailureCategory.
        - scenario: Agents B+D+E context changes cause build failure in isolation
          likelihood: high
          impact: low
          mitigation: |
            Agents D and E change callers/tests while B changes definitions. No branch
            compiles alone — expected for same-wave splits. Post-merge build gate catches
            any mismatches.
        - scenario: Agent C guard function finds current wave incorrectly
          likelihood: medium
          impact: low
          mitigation: |
            Guard selects highest wave number with agents. Advisory-only, so wrong
            selection produces spurious warning, not state machine failure.
        - scenario: Agent D misses a caller of ValidateProgramImportMode
          likelihood: low
          impact: medium
          mitigation: |
            All callers listed explicitly. go build ./... post-merge fails if missed.
