pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Circular import: pkg/engine/workspace imports pkg/engine for StepResult or
            EventCallback types, while pkg/engine imports pkg/engine/workspace via dispatcher
            calls in prepare.go and finalize.go. This would create a compile-time cycle.
          likelihood: high
          impact: high
          mitigation: |
            Mitigated by design. workspace.StepResult is defined locally in workspace.go.
            The EventCallback type is declared as an anonymous func type in dispatcher.go
            rather than importing engine.EventCallback. All agent briefs include this as
            an explicit constraint. The "DO NOT import pkg/engine" constraint appears in
            every Wave 1 agent brief and Agent E's brief.
        - scenario: |
            Cargo.toml members array uses non-standard formatting (inline comment after
            closing bracket, single-line members, no trailing comma) that breaks the
            line-level string editing in RustWorkspaceManager.Setup.
          likelihood: medium
          impact: low
          mitigation: |
            Backup-before-write means the original is always recoverable. RustWorkspaceManager.Setup
            returns an error if it cannot find the members array closing bracket, preventing a
            partial write. The dispatcher treats Setup errors as non-fatal (warning). The agent
            brief requires testing both single-line and multi-line members array formats.
        - scenario: |
            Agent B creates workspace.go instead of only typescript_manager.go because
            workspace.go doesn't exist yet in its worktree (Wave 1 is parallel — Agent A's
            workspace.go is not yet merged when B starts).
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B's brief explicitly states "DO NOT create workspace.go yourself. Only create
            typescript_manager.go and typescript_manager_test.go." The same constraint appears
            in Agents C and D's briefs. At merge time, Agent A's workspace.go wins (it's the
            authoritative version). If B/C/D create a stub, StepMergeAgents will conflict —
            but only if they actually wrote conflicting content. The briefs are clear.
        - scenario: |
            Agent F modifies prepare.go and finalize.go, which are large heavily-used files
            with many callers. A mistaken broader edit could break unrelated functionality.
          likelihood: low
          impact: high
          mitigation: |
            Agent F's task targets well-delimited blocks identified by search terms (NoGoWork,
            StepGoWorkRestore). The brief includes exact before/after code. The verification
            gate runs the full test suite (go test ./pkg/engine/...).
        - scenario: |
            Python pyrightconfig.json created from scratch by Setup: Restore must know to delete
            it rather than attempt to restore from a nonexistent backup. If this logic is wrong,
            Restore is a no-op and pyrightconfig.json is left behind after the wave.
          likelihood: medium
          impact: low
          mitigation: |
            The Restore logic explicitly handles this: if pyrightconfig.json.backup absent AND
            pyrightconfig.json exists, delete it. Test TestPythonManager_Restore_DeletesCreatedPyrightConfig
            covers this exact case. Agent D's brief calls this out explicitly.
        - scenario: |
            TypeScript manager leaves per-worktree tsconfig.worktree.json files in place
            after restore (they're in worktree directories). If StepCleanup fails or is skipped,
            these files may accumulate across waves.
          likelihood: low
          impact: low
          mitigation: |
            These files are inside worktree directories which are git worktrees. StepCleanup
            calls `git worktree remove --force` which deletes the directory entirely. The files
            are not in the main repo and do not affect the main working tree. Documented in the
            TypeScript manager godoc.
