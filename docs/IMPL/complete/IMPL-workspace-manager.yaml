            ## What to implement

            ### File: `pkg/engine/workspace/python_manager.go`

            ```go
            package workspace
            ```

            **PythonWorkspaceManager.Detect:**
            - Return true iff pyrightconfig.json OR pyproject.toml exists at repoRoot.

            **PythonWorkspaceManager.Setup(repoRoot string, waveNum int, worktreePaths []string) error:**

            Compute relative paths: `relPath, _ = filepath.Rel(repoRoot, wt)` for each worktreePath.

            *pyrightconfig.json path* (pyrightconfig.json exists):
            1. os.MkdirAll BackupDir(repoRoot, waveNum).
            2. Back up pyrightconfig.json to backupDir/pyrightconfig.json.backup.
            3. Parse as map[string]interface{}. Append relPaths to "extraPaths" array (create if absent).
            4. json.MarshalIndent and write.

            *pyrightconfig.json absent but pyproject.toml exists*:
            1. os.MkdirAll BackupDir(repoRoot, waveNum).
            2. Back up pyproject.toml to backupDir/pyproject.toml.backup.
            3. Line-by-line edit: find [tool.pyright]. If found and has extraPaths key, append.
               If [tool.pyright] present but no extraPaths, add extraPaths line.
               If [tool.pyright] absent, append to end of file:
               `\n[tool.pyright]\nextraPaths = ["path1", "path2"]\n# SAW-managed: restored by finalize-wave\n`
            4. Write modified bytes.

            *pyrightconfig.json absent, pyproject.toml also absent* (unlikely given Detect check,
            but defensive): create pyrightconfig.json from scratch with {"extraPaths": [...relPaths]}.
            Do NOT create a backup (file didn't exist; Restore will delete it).

            **PythonWorkspaceManager.Restore(repoRoot string, waveNum int) error:**
            - If pyrightconfig.json.backup exists: restore; delete backup.
            - Else if pyrightconfig.json exists: delete it (was SAW-created from scratch).
            - If pyproject.toml.backup exists: restore; delete backup.
            - Return nil.

