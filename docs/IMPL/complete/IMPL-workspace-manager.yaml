interface_contracts:
    - name: WorkspaceManager
      description: |
        Language-agnostic interface for workspace file management in wave agent worktrees.
        All four language managers implement this interface.
      definition: |
        // WorkspaceManager manages workspace configuration files for a specific language
        // so that LSP tools can resolve cross-package types in wave agent worktrees.
        type WorkspaceManager interface {
            // Language returns the canonical name: "go", "typescript", "rust", "python"
            Language() string
            // Detect returns true if this manager applies to the repo at repoRoot.
            Detect(repoRoot string) bool
            // Setup modifies workspace configuration to include all worktreePaths for LSP resolution.
            // Backs up existing config to BackupDir(repoRoot, waveNum) before modification.
            Setup(repoRoot string, waveNum int, worktreePaths []string) error
            // Restore reverts workspace configuration to its pre-wave state.
            // If a backup exists, it is restored and deleted. If no backup, the SAW-created file is deleted.
            Restore(repoRoot string, waveNum int) error
        }
      location: pkg/engine/workspace/workspace.go
    - name: BackupDir
      description: Shared helper returning the .saw-state/wave{N}/ path for backup files.
      definition: |
        func BackupDir(repoRoot string, waveNum int) string
        // Returns filepath.Join(protocol.SAWStateDir(repoRoot), fmt.Sprintf("wave%d", waveNum))
      location: pkg/engine/workspace/workspace.go
    - name: StepResult
      description: |
        Local StepResult type in the workspace package, mirroring engine.StepResult.
        Defined here to avoid a circular import between pkg/engine and pkg/engine/workspace.
      definition: |
        // StepResult mirrors engine.StepResult to avoid circular import with pkg/engine.
        type StepResult struct {
            Step   string
            Status string
            Detail string
        }
      location: pkg/engine/workspace/workspace.go
    - name: DetectAndSetup
      description: |
        Dispatcher that runs Setup on all detected WorkspaceManagers. All detected managers
        run; partial failures log warnings but do not abort (non-fatal design).
      definition: |
        func DetectAndSetup(
            ctx context.Context,
            repoRoot string,
            waveNum int,
            worktrees []protocol.WorktreeInfo,
            onEvent func(step, status, detail string),
            logger *slog.Logger,
        ) *StepResult
      location: pkg/engine/workspace/dispatcher.go
    - name: DetectAndRestore
      description: |
        Dispatcher that runs Restore on all detected WorkspaceManagers. Non-fatal.
      definition: |
        func DetectAndRestore(
            ctx context.Context,
            repoRoot string,
            waveNum int,
            onEvent func(step, status, detail string),
            logger *slog.Logger,
        ) *StepResult
      location: pkg/engine/workspace/dispatcher.go
    - name: GoWorkspaceManager
      description: |
        Implements WorkspaceManager for Go repos using go.work.
        Refactored from existing StepGoWorkSetup/StepGoWorkRestore logic in gowork_steps.go.
      definition: |
        type GoWorkspaceManager struct{}
        func (m *GoWorkspaceManager) Language() string
        func (m *GoWorkspaceManager) Detect(repoRoot string) bool
        func (m *GoWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
        func (m *GoWorkspaceManager) Restore(repoRoot string, waveNum int) error
      location: pkg/engine/workspace/go_manager.go
    - name: TypeScriptWorkspaceManager
      description: |
        Implements WorkspaceManager for TypeScript/JavaScript repos.
        Detect: tsconfig.json or package.json at repoRoot.
        TS: uses project references in tsconfig.json + per-worktree tsconfig.worktree.json.
        JS-only: adds worktree paths to package.json workspaces array.
      definition: |
        type TypeScriptWorkspaceManager struct{}
        func (m *TypeScriptWorkspaceManager) Language() string
        func (m *TypeScriptWorkspaceManager) Detect(repoRoot string) bool
        func (m *TypeScriptWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
        func (m *TypeScriptWorkspaceManager) Restore(repoRoot string, waveNum int) error
      location: pkg/engine/workspace/typescript_manager.go
    - name: RustWorkspaceManager
      description: |
        Implements WorkspaceManager for Rust repos.
        Detect: Cargo.toml at repoRoot containing [workspace] section.
        Setup: surgically appends worktree paths to the members array in Cargo.toml.
        Backup: Cargo.toml backed up to .saw-state/wave{N}/Cargo.toml.backup.
      definition: |
        type RustWorkspaceManager struct{}
        func (m *RustWorkspaceManager) Language() string
        func (m *RustWorkspaceManager) Detect(repoRoot string) bool
        func (m *RustWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
        func (m *RustWorkspaceManager) Restore(repoRoot string, waveNum int) error
      location: pkg/engine/workspace/rust_manager.go
    - name: PythonWorkspaceManager
      description: |
        Implements WorkspaceManager for Python repos.
        Detect: pyrightconfig.json or pyproject.toml at repoRoot.
        pyrightconfig.json: adds worktree paths to extraPaths array (creates file if absent).
        pyproject.toml: adds paths to [tool.pyright] extraPaths.
      definition: |
        type PythonWorkspaceManager struct{}
        func (m *PythonWorkspaceManager) Language() string
        func (m *PythonWorkspaceManager) Detect(repoRoot string) bool
        func (m *PythonWorkspaceManager) Setup(repoRoot string, waveNum int, worktreePaths []string) error
        func (m *PythonWorkspaceManager) Restore(repoRoot string, waveNum int) error
      location: pkg/engine/workspace/python_manager.go
    - name: PrepareWaveOpts.NoWorkspaceSetup
      description: |
        Replaces NoGoWork bool in PrepareWaveOpts. Global opt-out for all WorkspaceManager setup.
        The CLI flag is --no-workspace-setup; --no-gowork is kept as a deprecated alias.
      definition: |
        // In step_types.go PrepareWaveOpts:
        NoWorkspaceSetup bool // disables all WorkspaceManager setup; replaces deprecated NoGoWork
      location: pkg/engine/step_types.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context
            You are implementing the `pkg/engine/workspace` sub-package foundation and the
            Go language WorkspaceManager for the scout-and-wave-go repo at
            `github.com/blackwell-systems/scout-and-wave-go`.

            This agent creates three files: the package foundation (workspace.go), the Go
            manager implementation, and its tests. The workspace.go file defines the shared
            interface and helpers that all other agents in this wave will also use — so write
            it first, then implement the Go manager.

            ## What to implement

            ### File: `pkg/engine/workspace/workspace.go`

            ```go
            package workspace

            import (
                "fmt"
                "path/filepath"

                "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
            )

            // WorkspaceManager manages workspace configuration files for a specific language
            // so that LSP tools can resolve cross-package types in wave agent worktrees.
            type WorkspaceManager interface {
                Language() string
                Detect(repoRoot string) bool
                Setup(repoRoot string, waveNum int, worktreePaths []string) error
                Restore(repoRoot string, waveNum int) error
            }

            // StepResult mirrors engine.StepResult to avoid a circular import.
            type StepResult struct {
                Step   string
                Status string
                Detail string
            }

            // BackupDir returns the .saw-state/wave{N}/ directory for backup files.
            func BackupDir(repoRoot string, waveNum int) string {
                return filepath.Join(protocol.SAWStateDir(repoRoot), fmt.Sprintf("wave%d", waveNum))
            }
            ```

            ### File: `pkg/engine/workspace/go_manager.go`

            Implement `GoWorkspaceManager` satisfying `WorkspaceManager`.

            The logic is a direct extraction from `pkg/engine/gowork_steps.go`. Read that file
            in full before implementing. Replicate the same behavior without EventCallback or
            slog.Logger in the method signatures — those belong to the dispatcher.

            **GoWorkspaceManager.Detect:**
            - Return true iff `go.mod` exists at `repoRoot`.

            **GoWorkspaceManager.Setup(repoRoot string, waveNum int, worktreePaths []string) error:**
            - Call os.MkdirAll on BackupDir(repoRoot, waveNum).
            - Back up `go.work` and `go.work.sum` to the backup dir if they exist.
            - **Same-module detection (critical — fixes "module appears multiple times in workspace"):**
              Parse the root module path from `go.mod` (read line by line; find the line starting
              with "module ", trim prefix and whitespace). For each worktreePath, read
              `<worktreePath>/go.mod` and check if its module declaration matches the root module
              path. Collect only non-matching paths into `filteredPaths`.
              If `filteredPaths` is empty (all worktrees share the root module path), return nil
              early — no go.work needed; gopls already resolves the full module in each worktree
              because the worktree is a full clone of the same single-module repo.
            - If go.work did not exist: run `go work init .` (exec.Command, Dir=repoRoot).
              If it fails, return a formatted error.
            - For each path in `filteredPaths` (not all worktreePaths): run `go work use <path>`
              (Dir=repoRoot). Best-effort; do not return error on failure.
            - Append `"\n// SAW-managed: restored by finalize-wave\n"` to go.work.
            - Return nil on success.

            **GoWorkspaceManager.Restore(repoRoot string, waveNum int) error:**
            - If `backupDir/go.work.backup` exists: overwrite go.work with it; delete backup.
            - Else: delete go.work (ignore os.IsNotExist).
            - If `backupDir/go.work.sum.backup` exists: overwrite go.work.sum with it; delete backup.
            - Else: delete go.work.sum (ignore os.IsNotExist).
            - Return nil.

            ### File: `pkg/engine/workspace/go_manager_test.go`

            Package: `package workspace`.

            Write tests:
            1. `TestGoWorkspaceManager_Detect_TrueWhenGoModExists`
            2. `TestGoWorkspaceManager_Detect_FalseWhenNoGoMod`
            3. `TestGoWorkspaceManager_Setup_BacksUpExistingGoWork`: create go.mod + existing go.work;
               call Setup; verify backup at BackupDir(root,1)/go.work.backup has original content.
            4. `TestGoWorkspaceManager_Restore_RestoresFromBackup`
            5. `TestGoWorkspaceManager_Restore_DeletesGoWorkWhenNoBackup`

            6. `TestGoWorkspaceManager_Setup_SkipsSameModuleWorktrees`: create go.mod declaring
               "module example.com/foo" + a fake worktree dir with its own go.mod declaring the
               same "module example.com/foo"; call Setup; verify go.work was NOT created (early
               return because all worktrees share the root module path).

            Skip tests invoking the go binary if `exec.LookPath("go")` fails.

            ## Constraints
            - Package: `package workspace`
            - DO NOT import `pkg/engine` — circular import. Use `protocol.SAWStateDir` directly via BackupDir.
            - Imports for go_manager.go: `fmt`, `os`, `os/exec`, `path/filepath`
              plus `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`.

            ## Verification gate
            ```
            go build ./pkg/engine/workspace/
            go vet ./pkg/engine/workspace/
            go test ./pkg/engine/workspace/ -run TestGoWorkspaceManager
            ```
          files:
            - pkg/engine/workspace/workspace.go
            - pkg/engine/workspace/go_manager.go
            - pkg/engine/workspace/go_manager_test.go
        - id: B
          task: |
            ## Context
            You are implementing the TypeScript/JavaScript WorkspaceManager in
            `pkg/engine/workspace/` for the scout-and-wave-go repo.

            Agent A is writing `pkg/engine/workspace/workspace.go` in parallel with you.
            That file defines the `WorkspaceManager` interface, `StepResult` struct, and
            `BackupDir` helper. Treat it as already existing before you start (it will be
            merged before your Wave 1 worktrees are used). If workspace.go doesn't yet exist
