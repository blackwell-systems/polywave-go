            Actually, workspace.go will be written by Agent A. Do NOT create workspace.go
            yourself. Only create typescript_manager.go and typescript_manager_test.go.
            Your files must compile assuming workspace.go exists with the WorkspaceManager
            interface, StepResult, and BackupDir as defined in the interface contracts.

            ## What to implement

            ### File: `pkg/engine/workspace/typescript_manager.go`

            ```go
            package workspace
            ```

            **TypeScriptWorkspaceManager.Detect:**
            - Return true iff `tsconfig.json` OR `package.json` exists at `repoRoot`.

            **TypeScriptWorkspaceManager.Setup(repoRoot string, waveNum int, worktreePaths []string) error:**

            *TypeScript path* (tsconfig.json exists):
            1. os.MkdirAll BackupDir(repoRoot, waveNum).
            2. Back up tsconfig.json to backupDir/tsconfig.json.backup.
            3. For each worktreePath, create tsconfig.worktree.json in that dir:
               ```json
               {
                 "extends": "<filepath.Rel(worktreePath, filepath.Join(repoRoot, \"tsconfig.json\"))>",
                 "compilerOptions": { "composite": true }
               }
               ```
            4. Parse root tsconfig.json as map[string]interface{}. Append to "references" array:
               `{"path": "<filepath.Rel(repoRoot, worktreePath)>"}` for each worktree.
               Create "references" if absent.
            5. json.MarshalIndent with 2-space indent; write back.

            *JavaScript path* (only package.json exists, no tsconfig.json):
            1. os.MkdirAll BackupDir(repoRoot, waveNum).
            2. Back up package.json to backupDir/package.json.backup.
            3. Parse as map[string]interface{}, append relative paths to "workspaces" array
               (create if absent), marshal and write back.

            **TypeScriptWorkspaceManager.Restore(repoRoot string, waveNum int) error:**
            - If tsconfig.json.backup exists: restore tsconfig.json from backup; delete backup.
            - If package.json.backup exists: restore package.json from backup; delete backup.
            - Return nil.

            Note: per-worktree tsconfig.worktree.json files are left in place on restore
            (they're in worktree directories that will be cleaned up by StepCleanup). This
            simplifies restore and is safe because worktree dirs are deleted by finalize-wave.

            ### File: `pkg/engine/workspace/typescript_manager_test.go`

            Package: `package workspace`.

            Tests:
            1. `TestTypeScriptManager_Detect_TsConfig`: tmpdir with tsconfig.json → true.
            2. `TestTypeScriptManager_Detect_PackageJson`: tmpdir with package.json → true.
            3. `TestTypeScriptManager_Detect_Neither`: empty tmpdir → false.
            4. `TestTypeScriptManager_Setup_TSPath_AddsReferences`: create tsconfig.json
               `{"compilerOptions":{}}` + one worktreePath subdir; call Setup; verify tsconfig.json
               has "references" array with one entry, and backup exists.
            5. `TestTypeScriptManager_Setup_JSPath_AddsWorkspaces`: package.json only; call Setup;
               verify "workspaces" key added with relative path.
            6. `TestTypeScriptManager_Restore_FromBackup`: create tsconfig.json.backup; call Restore;
               verify tsconfig.json restored and backup deleted.

            ## Constraints
            - Package: `package workspace`
            - Standard library only: encoding/json, os, path/filepath.
            - DO NOT import pkg/engine.
            - BackupDir is defined in workspace.go (same package — call directly).

            ## Verification gate
            ```
            go build ./pkg/engine/workspace/
            go vet ./pkg/engine/workspace/
            go test ./pkg/engine/workspace/ -run TestTypeScriptManager
            ```
          files:
            - pkg/engine/workspace/typescript_manager.go
            - pkg/engine/workspace/typescript_manager_test.go
        - id: C
          task: |
            ## Context
            You are implementing the Rust WorkspaceManager in `pkg/engine/workspace/` for
            the scout-and-wave-go repo.

            Agent A is writing workspace.go in parallel. DO NOT create workspace.go yourself.
            Only create rust_manager.go and rust_manager_test.go. Your files must compile
            assuming workspace.go exists with WorkspaceManager interface, StepResult, and
            BackupDir.

            ## What to implement

            ### File: `pkg/engine/workspace/rust_manager.go`

            ```go
            package workspace
            ```

            **RustWorkspaceManager.Detect:**
            - Read Cargo.toml at repoRoot. Return true iff file exists AND content contains
              the string `[workspace]` (use strings.Contains).

            **RustWorkspaceManager.Setup(repoRoot string, waveNum int, worktreePaths []string) error:**
            1. Read Cargo.toml bytes.
            2. os.MkdirAll BackupDir(repoRoot, waveNum).
            3. Back up Cargo.toml to backupDir/Cargo.toml.backup.
            4. Line-by-line string editing to append members (no TOML library):
               - Scan for a line with `members` followed by `[` on the same line, or just `[`.
               - Locate the closing `]` of the members array.
               - Before the closing `]`, insert lines:
                 `  "<filepath.Rel(repoRoot, worktreePath)>",` for each worktreePath.
               - Append `  # SAW-managed: restored by finalize-wave` as the last inserted line.
               - If no members array found: return an error (do not write partial file).
            5. Write modified bytes back to Cargo.toml.
            6. Return nil.

            **RustWorkspaceManager.Restore(repoRoot string, waveNum int) error:**
            - If backupDir/Cargo.toml.backup exists: overwrite Cargo.toml; delete backup.
            - Else: no-op (Cargo.toml is only written after a backup, so absent backup = nothing to undo).
            - Return nil.

