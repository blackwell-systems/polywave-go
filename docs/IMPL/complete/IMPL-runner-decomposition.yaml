pre_mortem:
    overall_risk: low
    rows:
        - scenario: Duplicate function declarations during wave 1 prevent go build
          likelihood: high
          impact: low
          mitigation: |
            Wave 1 agents create new files but do not remove from runner.go.
            Build will fail with duplicates until wave 2 removes originals.
            Wave 1 verification uses gofmt -e (syntax only), not go build.
            Wave 2 does the actual go build verification.
        - scenario: Import cleanup in runner.go misses a dependency
          likelihood: medium
          impact: low
          mitigation: |
            Agent D's verification gate runs go build which catches unused
            imports immediately. Fix is mechanical.
        - scenario: Test file split breaks test helpers or shared fixtures
          likelihood: low
          impact: low
          mitigation: |
            runner_test.go tests are independent — each creates its own
            t.TempDir() and has no shared state. Split is safe.
        - scenario: JournalIntegration removal requested after decomposition
          likelihood: medium
          impact: low
          mitigation: |
            JournalIntegration is isolated in runner.go after decomposition.
            Removing it later is a single-file change. The decomposition
            makes this future cleanup easier, not harder.
