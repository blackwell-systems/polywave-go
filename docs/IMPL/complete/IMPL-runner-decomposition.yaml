      description: |
        Scout agent launcher — moves to scout_runner.go with all Scout-related
        helpers. Signature unchanged; this is a file move, not an API change.
      definition: |
        func RunScout(ctx context.Context, opts RunScoutOpts, onChunk func(string)) error
      location: pkg/engine/scout_runner.go
    - name: RunPlanner
      description: |
        Planner agent launcher — moves to scout_runner.go alongside RunScout.
        Both share the SAW repo resolution pattern and readContextMD helper.
      definition: |
        func RunPlanner(ctx context.Context, opts RunPlannerOpts, onChunk func(string)) error
      location: pkg/engine/scout_runner.go
    - name: RunScaffold
      description: |
        Scaffold agent launcher with E22 build verification — moves to
        scaffold_runner.go with runScaffoldBuildVerification helpers.
      definition: |
        func RunScaffold(ctx context.Context, implPath, repoPath, sawRepoPath, model string, onEvent func(Event)) error
      location: pkg/engine/scaffold_runner.go
    - name: StartWave
      description: |
        Full wave loop — moves to wave_ops.go alongside RunSingleWave,
        RunSingleAgent, MergeWave, RunVerification, UpdateIMPLStatus,
        ValidateInvariants. These are thin orchestrator wrappers that
        belong together.
      definition: |
        func StartWave(ctx context.Context, opts RunWaveOpts, onEvent func(Event)) error
      location: pkg/engine/wave_ops.go
