title: Decompose pkg/engine/runner.go into cohesive modules
feature_slug: runner-decomposition
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    ## Analysis Summary

    runner.go is 1,220 lines containing 7 major exported functions plus helpers.
    After reading all callers across scout-and-wave-go and scout-and-wave-web,
    the decomposition is warranted but more targeted than "break up monolith."

    ### Key findings from caller analysis:

    1. **StartWave is NOT dead code but IS superseded.** The web app no longer calls
       engine.StartWave — it uses PrepareWave + orchestrator.RunWave + FinalizeWave
       directly. However, StartWave is still referenced in doc.go examples and the
       daemon.go pattern. startWaveWithGate is completely dead code — it is defined
       but never called from anywhere (not even tests). gateChannels sync.Map is
       declared but never used.

    2. **RunSingleWave has ONE remaining caller:** cmd/saw/commands.go in
       scout-and-wave-web. The web app's wave_runner.go explicitly comments
       "replaces engine.RunSingleWave" — it creates its own orchestrator. So
       RunSingleWave is a legacy CLI convenience wrapper.

    3. **RunScout, RunPlanner, RunScaffold** are called from both CLI and web app.
       These are "agent launchers" — they share a common pattern (resolve SAW repo,
       load prompt file, create backend, run agent) but have distinct backend routing
       (RunScout does structured output branching for API/Bedrock; RunPlanner and
       RunScaffold use simple backend dispatch).

    4. **JournalIntegration** is only used from runner_test.go — no production code
       calls it. It was designed for direct orchestrator integration but the web app
       uses its own journal wiring. It's essentially unused infrastructure.

    5. **Helper functions** (readContextMD, buildProgramContractsSection,
       runScoutAutomation, detectRequirementsFile, runScaffoldBuildVerification)
       are all only called from within runner.go itself.

    ### Concrete decomposition benefits:

    - **Scout functions (RunScout + helpers)** — 400+ lines with their own import set
      (API client, Bedrock backend, suitability, analyzer, commands). Extracting them
      reduces runner.go's import footprint and makes the Scout pipeline independently
      navigable. Multiple callers (CLI, web app, daemon) benefit.

    - **Dead code removal** — startWaveWithGate (~107 lines), gateChannels, and
      potentially JournalIntegration (~115 lines + tests) should be removed, not
      decomposed. This is cleanup, not decomposition.

    - **Wave execution functions (StartWave, RunSingleWave, RunSingleAgent, MergeWave,
      RunVerification)** — these are thin orchestrator wrappers. They could move to
      a wave_runner.go file, but the benefit is modest since they're mostly glue code.

    - **Scaffold functions (RunScaffold + build verification)** — ~190 lines with
      multi-language build detection. Clean extraction target.

    ### Caveats:

    - JournalIntegration has tests but no production callers. Recommend deprecating
      rather than moving — but this needs human decision (might be planned for future use).
    - StartWave is referenced in doc.go comments — extraction needs doc.go update.
    - The decomposition spans 6+ new/modified files, which benefits from parallelism.

    ### Verdict: SUITABLE WITH CAVEATS

    The decomposition is warranted for: (a) Scout extraction reduces cognitive load
    and import surface, (b) dead code removal is overdue, (c) scaffold extraction
    is clean. The caveat is that JournalIntegration's fate (remove vs keep) needs
    human confirmation.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~10 min (4 agents x 5 min avg, 2 waves with dependency)
    - Merge & verification: ~3 min
    Total SAW time: ~21 min

    Sequential baseline: ~25 min (4 agents x 6 min avg sequential)
    Time savings: ~4 min (16% faster)

    Recommendation: Marginal speed gains but clear coordination value — the file
    ownership constraints prevent merge conflicts during parallel extraction.
