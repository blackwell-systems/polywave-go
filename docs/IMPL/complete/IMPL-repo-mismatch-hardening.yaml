title: Repo-Mismatch Hardening - Prevent Agents Running in Wrong Repository
feature_slug: repo-mismatch-hardening
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: 8 files across 2 repos (scout-and-wave-go and scout-and-wave-web),
       naturally splitting into SDK validation logic vs. web app integration. At least 3 agents
       with disjoint file ownership are feasible.

    2. Investigation-first items: None. The problem is well-understood (worktrees created in wrong
       repo when IMPL targets a different repo). The fix is structural validation.

    3. Interface discoverability: Yes. The key interface is ResolveTargetRepo() which returns
       resolved repo paths. The existing protocol.IMPLManifest and FileOwnership types are stable.

    4. Pre-implementation status check:
       - ValidateFileExistence already exists in pkg/protocol/file_existence_validator.go but only
         checks action=modify files within a single repo. Does NOT validate repo-level mismatch.
       - resolveAgentRepoRoot exists in prepare_wave.go but only resolves per-agent, not pre-flight
         validation of the overall IMPL target repo.
       - CreateWorktrees in pkg/protocol/worktree.go has cross-repo support via determineAgentRepo
         but no pre-flight validation that the target repo is correct.
       - Web app wave_service.go passes repoPath from resolveIMPLPath but never validates it
         matches the IMPL's target files.
       Status: PARTIAL for cross-repo worktree creation, TODO for pre-flight validation and
       web app integration.

    5. Parallelization value check:
       - Build/test cycle: go test + go build > 30s for both repos
       - 3 agents across 2 waves, avg 2-3 files each
       - Wave 1 agents are independent (different repos)
       - Tasks involve non-trivial logic (repo resolution, validation, error propagation)
       Verdict: High parallelization value.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (3 agents, 2 waves, ~10 min avg with parallelism)
    - Merge & verification: ~5 min
    Total SAW time: ~28 min

    Sequential baseline: ~35 min (3 agents x ~12 min avg)
    Time savings: ~7 min (20% faster)

    Recommendation: Clear speedup plus coordination value for cross-repo changes.
