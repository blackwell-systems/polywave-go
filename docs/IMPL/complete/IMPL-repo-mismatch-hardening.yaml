pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B implements inline repo resolution that diverges from Agent A's protocol.ResolveTargetRepos
          likelihood: medium
          impact: low
          mitigation: Agent B explicitly told to use inline pattern matching existing code. Post-merge, can refactor to call protocol.ResolveTargetRepos.
        - scenario: saw.config.json repos array is empty or missing in test environments
          likelihood: medium
          impact: medium
          mitigation: All resolution functions fall back to sibling directory resolution and then to the provided fallbackRepoPath. Tests cover the no-config case.
        - scenario: Existing single-repo workflows break due to new validation
          likelihood: low
          impact: high
          mitigation: 'All new validation skips when no repo: field is present and files exist in the primary repo. Tests explicitly cover the backward-compat case.'
