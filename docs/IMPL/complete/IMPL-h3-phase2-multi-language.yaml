            Integrate language parsers into BuildGraph with auto-detection.

            ## Changes to Make
            1. Add `detectLanguage(files []string) (string, error)` function
            2. Refactor existing Go parser code into `parseGoFiles()` function
            3. Modify BuildGraph to dispatch to correct parser based on language
            4. Add error handling for unsupported languages and mixed files

            ## Implementation
            ```go
            // pkg/analyzer/graph.go

            func detectLanguage(files []string) (string, error) {
                extCounts := make(map[string]int)
                for _, f := range files {
                    ext := filepath.Ext(f)
                    extCounts[ext]++
                }

                var maxExt string
                var maxCount int
                for ext, count := range extCounts {
                    if count > maxCount {
                        maxExt = ext
                        maxCount = count
                    }
                }

                switch maxExt {
                case ".go":
                    return "go", nil
                case ".rs":
                    return "rust", nil
                case ".js", ".jsx", ".ts", ".tsx", ".mjs":
                    return "javascript", nil
                case ".py":
                    return "python", nil
                default:
                    return "", fmt.Errorf("unsupported file extension: %s", maxExt)
                }
            }

            func parseGoFiles(repoRoot string, files []string) (map[string][]string, error) {
                // Move existing BuildGraph Step 1 logic here
                analyzer := New()
                fileImports := make(map[string][]string)
                for _, f := range files {
                    ast, err := analyzer.ParseFile(f)
                    if err != nil {
                        return nil, err
                    }
                    imports, err := analyzer.ExtractImports(ast, repoRoot)
                    if err != nil {
                        return nil, err
                    }
                    fileImports[f] = imports
                }
                return fileImports, nil
            }

            func BuildGraph(repoRoot string, files []string) (*DepGraph, error) {
                // Step 0: Detect language
                lang, err := detectLanguage(files)
                if err != nil {
                    return nil, err
                }

                // Step 1: Parse files with language-specific parser
                var fileImports map[string][]string
                switch lang {
                case "go":
                    fileImports, err = parseGoFiles(repoRoot, files)
                case "rust":
                    fileImports, err = parseRustFiles(repoRoot, files)
                case "javascript":
                    fileImports, err = parseJavaScriptFiles(repoRoot, files)
                case "python":
                    fileImports, err = parsePythonFiles(repoRoot, files)
                default:
                    return nil, fmt.Errorf("unsupported language: %s", lang)
                }
                if err != nil {
                    return nil, err
                }

                // Steps 2-7: Existing BuildGraph logic (unchanged)
                // ...
            }
            ```

