pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            manifest_test.go assertions check for "SM02_INVALID_TRANSITION" string.
            After Agent E replaces manifest.go, tests will fail unless manifest_test.go
            is also updated.
          likelihood: medium
          impact: medium
          mitigation: |
            manifest_test.go is explicitly listed in Agent E's file ownership and task.
            Post-merge go test gate will catch any remaining failures.
        - scenario: |
            Wave 2 runs in parallel. Agent B deletes schema_errors.go. Other agents'
            worktrees still have it. On merge, deletion happens, then C's changes
            eliminate all SV01* references. If merge order is wrong, intermediate
            build failures may occur.
          likelihood: medium
          impact: low
          mitigation: |
            finalize-wave merges all agents sequentially then runs go build ./... as final gate.
            Intermediate per-agent build states are expected. Final gate is the arbiter.
        - scenario: |
            format_parsers_test.go may not exist in pkg/errparse/. Agent F's task references
            it as action=modify but the file may not be on disk.
          likelihood: high
          impact: low
          mitigation: |
            Agent F is instructed to read the file first. If it does not exist, no change needed.
            Agent should note in completion report. action=modify files are validated by
            ValidateFileExistence which only runs when repoPath is provided - this won't block the wave.
        - scenario: |
            A typo in one of the new V036-V046 string values in codes.go would cause all Wave 2
            agents to embed a wrong value, breaking tests that assert on the actual string.
          likelihood: low
          impact: medium
          mitigation: |
            Agent A's task specifies exact string values. Post-merge go test gate catches mismatches.
            Wave 2 agents compare result.CodeXxx to result.CodeXxx so a consistent constant works.
