interface_contracts:
    - name: CompletionStatus
      description: |-
        Typed enum for CompletionReport.Status replacing the plain string field.
        Agent B defines this in pkg/protocol/types.go. All Wave 2 agents consume it.
      definition: |
        // CompletionStatus is the typed outcome of a wave agent's work.
        // Valid values: StatusComplete, StatusPartial, StatusBlocked.
        type CompletionStatus string

        const (
            StatusComplete CompletionStatus = "complete"
            StatusPartial  CompletionStatus = "partial"
            StatusBlocked  CompletionStatus = "blocked"
        )
      location: pkg/protocol/types.go
    - name: CompletionReport.Status
      description: |-
        Field type changes from string to CompletionStatus.
        YAML and JSON serialization are unchanged (both still serialize as "complete"|"partial"|"blocked").
        All comparisons must use constants: report.Status == protocol.StatusComplete.
        Callers using string(report.Status) for string conversion remain valid since CompletionStatus
        is a string type alias.
      definition: |
        // In types.go:
        type CompletionReport struct {
            Status CompletionStatus `yaml:"status" json:"status"`
            // ... all other fields unchanged
        }
      location: pkg/protocol/types.go
