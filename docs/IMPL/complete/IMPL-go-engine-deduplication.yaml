interface_contracts:
    - name: FindWave
      description: |
        Returns a pointer to the Wave with the given number, or nil if not found.
        Replaces the verbatim "find wave by number" loop repeated 13+ times across
        pkg/protocol and pkg/orchestrator.
      definition: |
        // FindWave returns a pointer to the Wave whose Number equals waveNum,
        // or nil if no such wave exists in the manifest.
        func (m *IMPLManifest) FindWave(waveNum int) *Wave
      location: pkg/protocol/helpers.go
    - name: FindAgent
      description: |
        Returns a pointer to the Agent with the given ID within the wave,
        or nil if not found. Replaces the "find agent by ID" loop repeated 8+ times.
      definition: |
        // FindAgent returns a pointer to the Agent whose ID equals agentID
        // within the wave, or nil if no such agent exists.
        func (w *Wave) FindAgent(agentID string) *Agent
      location: pkg/protocol/helpers.go
    - name: FindWaveWithAgent
      description: |
        Returns the Wave containing the agent with the given ID, plus the agent
        pointer. Returns (nil, nil) if not found.
      definition: |
        // FindWaveWithAgent returns the Wave containing agentID and a pointer to
        // the Agent, or (nil, nil) if not found.
        func (m *IMPLManifest) FindWaveWithAgent(agentID string) (*Wave, *Agent)
      location: pkg/protocol/helpers.go
    - name: isAgentAlreadyMerged
      description: |
        Package-private helper in pkg/protocol that encapsulates the dual-check
        idempotency pattern: merge log entry AND git ancestry. Replaces two
        identical inline checks in mergeAgentsSingleRepo and mergeAgentsMultiRepo.
      definition: |
        // isAgentAlreadyMerged returns true if agentID is recorded in the merge log
        // AND its branch (slug or legacy name) is an ancestor of HEAD in repoDir.
        func isAgentAlreadyMerged(repoDir string, mergeLog *MergeLog, agentID, slugBranch, legacyBranch string) bool
      location: pkg/protocol/merge_agents.go
    - name: RunOutput
      description: |
        Executes a git command in repoPath and returns stdout-only output (not
        combined stdout+stderr). Needed by gatecache.BuildKey which uses
        machine-parseable git output that must not be contaminated by stderr warnings.
      definition: |
        // RunOutput executes a git command in repoPath with the given args.
        // It returns stdout-only output and any error encountered.
        // Use Run for combined output (debugging); use RunOutput for machine-parseable output.
        func RunOutput(repoPath string, args ...string) (string, error)
      location: internal/git/commands.go
    - name: LoadYAML
      description: |
        Generic YAML load helper. Reduces the repeated os.ReadFile + yaml.Unmarshal
        + error-wrapping pattern. manifest.Load() keeps its special duplicate-key
        detection and does NOT use this helper.
      definition: |
        // LoadYAML reads the file at path and unmarshals YAML into a value of type T.
        // Returns a wrapped error if reading or parsing fails.
        func LoadYAML[T any](path string) (T, error)
      location: pkg/protocol/yaml_io.go
    - name: SaveYAML
      description: |
        Generic YAML save helper. Reduces the repeated yaml.Marshal + os.WriteFile
        + error-wrapping pattern.
      definition: |
        // SaveYAML marshals v to YAML and writes it to path with permissions 0644.
        // Returns a wrapped error if marshaling or writing fails.
        func SaveYAML[T any](path string, v T) error
      location: pkg/protocol/yaml_io.go
