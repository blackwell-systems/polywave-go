title: Eliminate Functional Duplication Across Go Engine Packages
feature_slug: go-engine-deduplication
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly.

    1. File decomposition: Changes span 10+ files across 5 packages. The four
       consolidation areas map to disjoint file ownership. Agent A owns helpers.go
       plus all validation caller files including merge_agents.go; Agent B owns
       git-wrapper callers (gatecache/cache.go, engine/resolve_conflicts.go); Agent C
       owns YAML I/O (memory.go, yaml_io.go new); Agent D owns only
       pkg/orchestrator/merge.go. No file is touched by two agents in the same wave.

    2. No investigation required. All four duplication targets are confirmed by
       direct code inspection. The patterns are mechanical: "find wave by number"
       loops repeat verbatim 13+ times; getConflictedFiles reimplements
       git.ConflictedFiles; runGit reimplements a subset of git.Run;
       Load/Save YAML patterns repeat across memory.go.

    3. Interface contracts are fully discoverable. FindWave, FindAgent,
       FindWaveWithAgent, RunOutput, LoadYAML, SaveYAML, isAgentAlreadyMerged
       signatures can all be defined before implementation begins.

    4. Pre-implementation status: All four consolidation areas are TODO. helpers.go
       exists but only contains IsSoloWave, IsWaveComplete, IsFinalWave. The
       FindWave/FindAgent helpers do not yet exist.

    5. Parallelization value: HIGH. Four independent areas with fully disjoint
       file ownership enables 4 agents in parallel in Wave 1. Go build/test cycle
       ~15-30 seconds. SAW savings estimated at 50%+ over sequential.

    Estimated times:
    - Scout phase: ~20 min
    - Agent execution: ~20 min (4 Wave 1 agents in parallel, ~20 min each)
    - Merge and verification: ~5 min
    Total SAW time: ~45 min

    Sequential baseline: ~80 min (4 areas x 20 min avg)
    Time savings: ~35 min (~44% faster)

    Recommendation: Clear speedup. Proceed.
