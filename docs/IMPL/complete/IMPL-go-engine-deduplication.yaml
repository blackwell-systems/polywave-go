            func LoadProjectMemory(path string) (*ProjectMemory, error) {
                pm, err := LoadYAML[ProjectMemory](path)
                if err != nil {
                    return nil, fmt.Errorf("failed to read project memory file: %w", err)
                }
                return &pm, nil
