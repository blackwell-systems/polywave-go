interface_contracts:
    - name: StatusPorcelainFile
      description: |
        Returns the git porcelain status output for a specific file path in repoPath.
        Returns empty string if the file is clean (no modifications). Returns an error
        if the git command fails (e.g., not a git repo). Distinct from StatusPorcelain
        which reports the whole working tree.
      definition: |
        func StatusPorcelainFile(repoPath, filePath string) (string, error)
      location: internal/git/commands.go
    - name: Add
      description: |
        Stages specific file paths for commit in the repository at repoPath.
        Wraps git add with explicit paths (not -A). Accepts one or more paths.
      definition: |
        func Add(repoPath string, paths ...string) error
      location: internal/git/commands.go
    - name: CommitWithMessage
      description: |
        Creates a commit with the given message WITHOUT --no-verify (hooks run).
        Contrast with the existing Commit() which passes --no-verify and is used
        by the orchestrator. This variant is for protocol-layer commits (state
        transitions) where hook enforcement is desired.
        Returns the commit SHA on success.
      definition: |
        func CommitWithMessage(repoPath, message string) (string, error)
      location: internal/git/commands.go
    - name: LogOneline
      description: |
        Returns the lines of git log output for the given args with --oneline format.
        Returns an empty slice (not an error) if no commits match the range
        (e.g., branch does not exist). Returns an error only for git system failures.
      definition: |
        func LogOneline(repoPath string, args ...string) ([]string, error)
      location: internal/git/commands.go
