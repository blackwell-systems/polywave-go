    Three of the four requested areas have actionable work; one was found empty after investigation.

    Area 1 — pkg/protocol → internal/git migration: CONFIRMED. 5 direct exec.Command("git", ...)
    calls exist across 3 files (program_freeze.go:96, state_transition.go:108/117/126,
    amend.go:209/215). The 6 call sites map to 4 new wrapper functions needed in
    internal/git/commands.go. The state_transition.go rev-parse call is subsumed by the new
    CommitWithMessage wrapper which calls RevParse internally. The amend.go rev-parse
    --show-toplevel can use the existing Run() directly.
    Net new wrappers: StatusPorcelainFile, Add, CommitWithMessage, LogOneline (4 functions).

    Area 2 — Unify FinalizeWaveResult structs: EXCLUDED. Investigation found two INTENTIONALLY
    different structs. pkg/engine/finalize.go has a single-repo struct (pointer fields, no maps).
    cmd/sawtools/finalize_wave.go has a cross-repo struct (map[string]* fields for multi-repo
    aggregation, plus CrossRepo bool, IntegrationActionRequired bool fields not in the engine
    struct). These serve different abstraction layers by design. No unification work identified.

    Area 3 — Consolidate YAML loading variants: PARTIAL. LoadYAML/SaveYAML already exists in
    pkg/protocol/yaml_io.go. Two production files still use raw yaml.Marshal + os.WriteFile for
    *PROGRAMManifest writes: pkg/protocol/program_generator.go:257-266 and
    pkg/engine/program_progress.go:115-122. Both can switch to SaveYAML[*PROGRAMManifest].
    The pkg/queue/manager.go YAML patterns are more complex (sets FilePath after load, dynamic
    paths) and do not simplify meaningfully with LoadYAML. The pkg/protocol/program_status.go
    reads into an anonymous struct — LoadYAML does not apply. Net: 2 files to update, each
    a simple 2-line replacement.

    Area 4 — Fix silent error drops: EMPTY after investigation. All three _ = err patterns
    in production code are intentional and carry explanatory comments:
    - auto_remediate.go:105: "Fix agent itself failed — treat as failed attempt, continue loop"
    - finalize.go:204: StepFixGoMod always returns nil error (non-fatal by design in its impl)
    - checkpoint.go:57-65: copyFileIfExists on optional snapshot files (comment: "may not exist")
    No accidental error drops found. Area 4 excluded from agent scope.

    Wave structure: Area 1 has an intra-area dependency (wrappers must exist before callers).
    Agent A (Wave 1) adds wrappers to internal/git/commands.go. Agents D/E/F (Wave 2) update
    the 3 protocol files. Agents B and C (Wave 1) handle the YAML consolidation and are
    independent of Area 1 — they touch different packages.

    Estimated times:
    - Scout phase: ~20 min (multi-area investigation with code reading)
    - Agent execution: ~30 min (6 agents x ~5 min avg; Wave 1 parallel, Wave 2 parallel)
    - Merge and verification: ~5 min
    Total SAW time: ~55 min

    Sequential baseline: ~50 min (6 agents x ~8 min avg sequential)
    Time savings: marginal speed gain; primary value is coordination and parallel isolation.
    Recommendation: Proceed — disjoint file ownership ensures clean merge with zero conflicts.
