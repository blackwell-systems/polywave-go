            signature (old wrapping new) to avoid breakage. Use grep:
            `grep -rn "WaitForCompletion" --include="*.go"` to find callers.

            ## Interfaces
            See interface_contracts above for BuildWorkshop.

            WaitForCompletion new signature:
            ```go
