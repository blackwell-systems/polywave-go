interface_contracts:
    - name: ExecuteTool
      description: |
        Shared tool execution helper — signature changes from (string, bool) to (string, error).
        The error distinguishes "tool not found" (sentinel) from "execution error" (wrapped).
      definition: |
        // ErrToolNotFound is returned when a tool name is not registered in the Workshop.
        var ErrToolNotFound = errors.New("unknown tool")

        // ExecuteTool looks up and executes a tool from the Workshop.
        // Returns the result string and any error. Returns ErrToolNotFound (wrapped)
        // when the tool name is not registered. Execution errors are returned
        // with the error message as the result string for backward compatibility
        // with tool_result blocks that expect a string.
        func ExecuteTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, error)
      location: pkg/agent/backend/execute_tool.go
    - name: BuildWorkshop
      description: |
        Shared workshop builder extracted from 3 backends. Applies dedup, constraints,
        and timing middleware in consistent order.
      definition: |
        // WorkshopResult holds the workshop and associated trackers created by BuildWorkshop.
        type WorkshopResult struct {
            Workshop      tools.Workshop
            DedupCache    *dedup.Cache
            CommitTracker *tools.CommitTracker
        }

        // BuildWorkshop creates a Workshop with middleware applied based on config.
        // readOnly controls whether write tools are included.
        // cfg provides constraints and onToolCall callback configuration.
        // Returns the workshop plus dedup cache and commit tracker references.
        func BuildWorkshop(workDir string, readOnly bool, cfg Config) WorkshopResult
      location: pkg/agent/backend/backend.go
waves:
