          task: |
            ## Role
            Fix ExecuteTool signature and add error distinguishing + tests.

            ## What to implement

            **1. Change ExecuteTool signature from `(string, bool)` to `(string, error)`**
            in `pkg/agent/backend/execute_tool.go`:

            - Add `var ErrToolNotFound = errors.New("unknown tool")` sentinel error.
            - When tool not found: return `(fmt.Sprintf("error: unknown tool %q", name), fmt.Errorf("%w: %q", ErrToolNotFound, name))`.
            - When tool execution fails: return `(fmt.Sprintf("error: %v", err), err)`.
            - On success: return `(result, nil)`.
            - Add `import "errors"` to the import block.

            **2. Create `pkg/agent/backend/execute_tool_test.go`** with tests:
            - `TestExecuteTool_Success`: mock workshop, verify (result, nil).
            - `TestExecuteTool_NotFound`: verify error wraps ErrToolNotFound, result contains "unknown tool".
            - `TestExecuteTool_ExecError`: verify error is the execution error, result contains error message.
            - Use `errors.Is(err, ErrToolNotFound)` to test sentinel.

            ## Interfaces
            ```go
            var ErrToolNotFound = errors.New("unknown tool")
            func ExecuteTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, error)
            ```

            ## Verification
            ```bash
            go build ./pkg/agent/backend/...
            go vet ./pkg/agent/backend/...
            go test ./pkg/agent/backend/ -run TestExecuteTool -v
            ```

            ## Constraints
            - Do NOT update callers (other backends) — that is Wave 2's job.
            - The file will not compile in isolation after this change because callers
              use the old `(string, bool)` signature. That is expected. The build gate
              for this wave covers only `go build ./pkg/agent/backend/` (the package itself).
              Actually, since callers import this package, the build will fail. To avoid this,
              keep the old function as a deprecated wrapper during Wave 1:
              ```go
              // Deprecated: Use ExecuteTool which returns error. Remove after Wave 2 migration.
              func ExecuteToolLegacy(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, bool) {
                  result, err := ExecuteTool(ctx, workshop, name, input, workDir)
                  return result, err != nil
              }
              ```
              Then rename the old callers to use ExecuteToolLegacy in a separate step,
              OR simply keep the old signature as an alias. Wave 2 agents will update all
              callers to use the new `(string, error)` signature and remove the legacy wrapper.

              **Simpler approach**: Add the new function as `ExecuteToolV2` returning `(string, error)`,
              keep the old `ExecuteTool` unchanged. Wave 2 agents migrate callers from
              `ExecuteTool` to `ExecuteToolV2`. After Wave 2 merges, the old function can be removed.
              This avoids any build breakage between waves.

            Actually, use the simplest approach that keeps builds green:
            1. Rename current `ExecuteTool` to `executeToolLegacy` (unexported).
            2. Add new `ExecuteTool` with `(string, error)` return.
            3. Have `executeToolLegacy` call `ExecuteTool` internally.
            4. Update the one in-package caller (`bedrock/tools.go` calls `backend.ExecuteTool`) — but
               that's in Wave 2. So instead: keep both exported: `ExecuteTool` (new signature) and
               `ExecuteToolCompat` (old signature wrapping new).

            **Final decision**: Keep it simple. Add the NEW `ExecuteTool` with `(string, error)`.
            Rename the old one to `ExecuteToolCompat(...)  (string, bool)` which calls the new one.
            All existing callers still compile via `ExecuteToolCompat`. Wave 2 agents migrate
            callers to `ExecuteTool` and delete `ExecuteToolCompat`.
