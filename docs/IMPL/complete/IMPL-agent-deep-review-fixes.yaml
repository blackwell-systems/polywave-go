            ```

            ## Verification
            ```bash
            go build ./pkg/agent/...
            go vet ./pkg/agent/...
            go test ./pkg/agent/ -v
            ```

            ## Constraints
            - Do NOT update backend callers of buildWorkshop — Wave 2 agents will do that.
            - Check for WaitForCompletion callers and handle backward compatibility.
            - Update pkg/agent/runner_test.go to use the new Result return type.
            - pkg/orchestrator/orchestrator.go also calls WaitForCompletion (outside this IMPL scope).
              You MUST keep backward compatibility: provide a compat wrapper with the old
              (\*protocol.CompletionReport, error) signature, or do not change the return type at all
              if it would break orchestrator. The safest approach: keep the public function with the
              same signature and add a new WaitForCompletionResult() with result.Result return.
          files:
