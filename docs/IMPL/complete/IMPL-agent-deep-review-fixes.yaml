            ## Role
            Extract shared BuildWorkshop helper and fix completion.go error handling.

            ## What to implement

            **1. Add `BuildWorkshop` to `pkg/agent/backend/backend.go`**:

            Extract the duplicated workshop-building pattern from api/bedrock/openai backends
            into a shared helper. All three backends have identical logic:
            ```go
            var w tools.Workshop
            if readOnly { w = tools.ReadOnlyTools(workDir) } else { w = tools.StandardTools(workDir) }
            w, dedupCache = dedup.WithDedup(w)
            if constraints != nil { w, commitTracker = tools.WithConstraints(w, *constraints) }
            if onToolCall != nil { w = tools.WithTiming(w, ...) }
            ```

            Add to `backend.go`:
            ```go
            type WorkshopResult struct {
                Workshop      tools.Workshop
                DedupCache    *dedup.Cache
                CommitTracker *tools.CommitTracker
            }

            func BuildWorkshop(workDir string, readOnly bool, cfg Config) WorkshopResult {
                var w tools.Workshop
                if readOnly {
                    w = tools.ReadOnlyTools(workDir)
                } else {
                    w = tools.StandardTools(workDir)
                }
                var dc *dedup.Cache
                w, dc = dedup.WithDedup(w)
                var ct *tools.CommitTracker
                if cfg.Constraints != nil {
                    w, ct = tools.WithConstraints(w, *cfg.Constraints)
                }
                if cfg.OnToolCall != nil {
                    w = tools.WithTiming(w, func(ev tools.ToolCallEvent) {
                        cfg.OnToolCall(ToolCallEvent{
                            Name:       ev.ToolName,
                            DurationMs: ev.DurationMs,
                            IsError:    ev.IsError,
                            IsResult:   true,
                        })
                    })
                }
                return WorkshopResult{Workshop: w, DedupCache: dc, CommitTracker: ct}
            }
            ```

            Add necessary imports: `dedup` and `tools` packages.

