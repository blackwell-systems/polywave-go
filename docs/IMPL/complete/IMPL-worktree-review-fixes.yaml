          likelihood: high
          impact: low
          mitigation: |
            Expected and acceptable. Wave 1 agents verify their own packages only.
            Wave 2 agents run `go build ./...` to verify full build after updating callers.
        - scenario: orchestrator_test.go test seams need more changes than expected
          likelihood: low
          impact: medium
          mitigation: |
            The test seams mock worktreeCreatorFunc without calling wm.Create() directly,
            so the inner signature change should not affect them. Agent D should grep for
            all occurrences of worktreeCreatorFunc and newRunnerFunc in test files to verify.
        - scenario: Removing worktrees field from Runner breaks an untested code path
          likelihood: low
          impact: low
