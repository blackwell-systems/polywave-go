      agents:
        - id: A
          task: |
            Implement the M5 integration checklist population library in pkg/protocol/checklist_populator.go.

            ## What to Implement

            Create the core M5 library that detects integration-requiring patterns from file_ownership
            and populates post_merge_checklist. This is a determinism tool that runs automatically
            after Scout completes, integrated into the finalize-impl batching command.

            **Main function:**
            ```go
            func PopulateIntegrationChecklist(m *IMPLManifest) (*IMPLManifest, error)
            ```

            **Detection functions (4 patterns):**

            1. **API handlers** (Go):
               - Pattern: `pkg/api/*_handler.go` with `action: new`
               - Parse each handler file using go/parser + go/ast
               - Extract `func (s *Server) handle*` function names
               - Generate checklist item: "Register routes in server.go for [handler functions list]"
               - Command field: `grep 'handleX' pkg/api/server.go` (testable verification)

            2. **React components** (TypeScript):
               - Pattern: `web/src/components/*.tsx` with `action: new`
               - Exclude: `components/ui/` directory (UI primitives)
               - Exclude: `*test.tsx`, `*.spec.tsx` (test files)
               - Parse TSX file for default export: `export default function ComponentName`
               - Generate checklist item: "Add [ComponentName] to App.tsx navigation"
               - Command field: `grep 'ComponentName' web/src/App.tsx`

            3. **CLI commands** (Go):
               - Pattern: `cmd/saw/*_cmd.go` or `cmd/*_cmd.go` with `action: new`
               - Parse Go file for cobra command definition (newXCmd() function, Use: field)
               - Generate checklist item: "Register [command-name] in cmd/saw/main.go"
               - Command field: `grep 'newXCmd' cmd/saw/main.go`

            4. **Background services** (Go):
               - Pattern: Files with goroutine spawning (go func, go s., time.Ticker, context.Background())
               - Use regex search (not full AST) to detect goroutine patterns
               - Generate checklist item: "Verify if [filename] needs initialization in Server constructor"
               - Note: Mark as "Verify" not "Must wire" - may produce false positives

            **Grouping logic:**
            - Create ChecklistGroup for each pattern type that has detected items
            - Group titles: "API Route Registration", "React Navigation Wiring", "CLI Command Registration", "Background Service Initialization"
            - Append groups to existing post_merge_checklist if present (idempotent - don't duplicate)

            **Error handling:**
            - If file parsing fails (file not found, syntax error), skip that file silently
            - Return error only for manifest-level failures (e.g., cannot copy manifest)

            **Implementation notes:**
            - Follow M4 gate_populator.go pattern: copy manifest, modify copy, return new manifest
            - Use go/parser and go/ast for Go file parsing (handlers, CLI commands)
            - Use regex for TSX parsing (no TypeScript AST parser available in Go stdlib)
            - Use regex for goroutine detection (simpler than AST, acceptable false positive rate)
            - **Scope:** M5 operates on single-repo IMPLs. repoRoot parameter is the root of the repo containing files in file_ownership. Files without `repo:` field are assumed to be in repoRoot.

            **Idempotency algorithm (CRITICAL):**
            Before adding a checklist group, check if `PostMergeChecklist.Groups` already contains a group with the same Title (exact string match). If found, compare item Descriptions (exact string match). Only add items that don't already exist. This makes M5 safe to run multiple times without duplicating checklist entries.

            **Regex patterns for TSX parsing:**
            ```go
            // Detect default exported function component
            exportDefaultFuncPattern := regexp.MustCompile(`export\s+default\s+function\s+(\w+)`)
            // Detect default exported const/var component (backup pattern)
            exportDefaultConstPattern := regexp.MustCompile(`export\s+default\s+(\w+)`)
            ```

            **Regex patterns for goroutine detection:**
            ```go
            goFuncPattern := regexp.MustCompile(`\bgo\s+(func\(|[\w\.]+\()`)
            tickerPattern := regexp.MustCompile(`time\.NewTicker|time\.Ticker`)
            contextPattern := regexp.MustCompile(`context\.Background\(\)`)
            ```

            ## Interface Contracts

            Implement all 8 functions from interface_contracts section:
            - PopulateIntegrationChecklist (main entry point)
            - detectAPIHandlers, detectReactComponents, detectCLICommands, detectBackgroundServices
            - parseHandlerFunctions, parseReactComponentName, parseCLICommandName

            ## Tests

            No tests in this agent - Agent D owns checklist_populator_test.go.
            Your implementation must be testable with these test cases:
            - detectAPIHandlers: given file_ownership with pkg/api/pipeline_handler.go (action:new), returns checklist item for route registration
            - detectReactComponents: given web/src/components/PipelineView.tsx (action:new), returns checklist item for App.tsx wiring
            - detectCLICommands: given cmd/saw/populate_integration_checklist_cmd.go (action:new), returns checklist item for main.go registration
            - detectBackgroundServices: given file with "go s.notificationBus.Start(ctx)", returns checklist item for service init
            - PopulateIntegrationChecklist: full end-to-end test with multi-pattern file_ownership, verifies correct groups and items

            ## Dependencies

            Standard library only:
            - go/parser, go/ast for Go file parsing
            - regexp for TSX and goroutine pattern matching
            - path/filepath for file path manipulation

            Existing scout-and-wave-go imports:
            - github.com/blackwell-systems/scout-and-wave-go/pkg/protocol (for IMPLManifest, FileOwnership, ChecklistItem, ChecklistGroup types)

            ## Constraints

            - Do NOT modify types_sections.go - PostMergeChecklist schema already exists
            - Do NOT implement CLI command - Agent B owns that file
            - Do NOT integrate into gate_populator.go - Agent C owns integration
            - Follow existing protocol package conventions: unexported helpers, exported main functions
            - Function signatures must match interface_contracts exactly (Agent C depends on them)
