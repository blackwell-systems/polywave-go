interface_contracts:
    - name: PopulateIntegrationChecklist
      description: |
        Main entry point for M5. Scans file_ownership for integration-requiring
        patterns (new API handlers, React components, CLI commands, background
        services) and populates post_merge_checklist groups. Returns a new
        manifest copy without modifying the input. Idempotent - safe to run
        multiple times (won't duplicate checklist items).
      definition: |
        // PopulateIntegrationChecklist analyzes file_ownership and populates
        // post_merge_checklist with integration tasks. Returns a new manifest
        // copy. If post_merge_checklist already has items, appends new groups.
        func PopulateIntegrationChecklist(m *IMPLManifest) (*IMPLManifest, error)
      location: pkg/protocol/checklist_populator.go
    - name: detectAPIHandlers
      description: |
        Detects new API handler files (pkg/api/*_handler.go with action:new).
        Parses each handler file to extract func (s *Server) handle* function
        names and generates checklist items for route registration in server.go.
      definition: |
        // detectAPIHandlers scans file_ownership for new API handlers and
        // returns checklist items for route registration.
        func detectAPIHandlers(ownership []FileOwnership, repoRoot string) []ChecklistItem
      location: pkg/protocol/checklist_populator.go
    - name: detectReactComponents
      description: |
        Detects new top-level React components (web/src/components/*.tsx with
        action:new that export main components, not just UI primitives). Generates
        checklist items for navigation wiring in App.tsx. Filters out UI primitives
        (components/ui/ directory) and test files (*test.tsx, *.spec.tsx).
      definition: |
        // detectReactComponents scans file_ownership for new React components
        // and returns checklist items for App.tsx navigation wiring.
        func detectReactComponents(ownership []FileOwnership, repoRoot string) []ChecklistItem
      location: pkg/protocol/checklist_populator.go
    - name: detectCLICommands
      description: |
        Detects new CLI command files (cmd/saw/*_cmd.go or cmd/*_cmd.go with
        action:new). Parses each file to extract cobra command registration
        patterns and generates checklist items for registration in main.go.
      definition: |
        // detectCLICommands scans file_ownership for new CLI commands and
        // returns checklist items for main.go registration.
        func detectCLICommands(ownership []FileOwnership, repoRoot string) []ChecklistItem
      location: pkg/protocol/checklist_populator.go
    - name: detectBackgroundServices
      description: |
        Detects new background services (files with goroutine spawning patterns:
        "go func", "go s.", time.Ticker, context.Background()). Generates checklist
        items for service initialization in Server constructor or main(). Note: This
        may produce false positives (one-off goroutines vs long-running services).
        Items are marked as "Verify if [service] needs initialization" rather than
        asserting it must be wired.
      definition: |
        // detectBackgroundServices scans new files for goroutine patterns and
        // returns checklist items for service initialization.
        func detectBackgroundServices(ownership []FileOwnership, repoRoot string) []ChecklistItem
      location: pkg/protocol/checklist_populator.go
    - name: parseHandlerFunctions
      description: |
        Helper function to parse Go handler files and extract func (s *Server) handle*
        function names using basic AST analysis (go/parser, go/ast). Returns list of
        handler function names (e.g., "handleGetPipeline", "handleScoutRun").
      definition: |
        // parseHandlerFunctions extracts handler function names from a Go file.
        // Returns empty slice if file cannot be parsed or has no handler functions.
        func parseHandlerFunctions(filePath string) ([]string, error)
      location: pkg/protocol/checklist_populator.go
    - name: parseReactComponentName
      description: |
        Helper function to extract the main exported component name from a React
        TSX file. Uses regex pattern matching for "export default function ComponentName"
        and "export default ComponentName". Returns empty string if no default export.
      definition: |
        // parseReactComponentName extracts the default exported component name
        // from a TSX file. Returns empty string if not found.
        func parseReactComponentName(filePath string) (string, error)
      location: pkg/protocol/checklist_populator.go
    - name: parseCLICommandName
      description: |
        Helper function to extract cobra command name from a Go CLI command file.
        Searches for newXCmd() function definition and Use: field in cobra.Command
        struct. Returns command name (e.g., "populate-integration-checklist").
      definition: |
        // parseCLICommandName extracts the cobra command name from a Go file.
        // Returns empty string if no command found.
        func parseCLICommandName(filePath string) (string, error)
      location: pkg/protocol/checklist_populator.go
    - name: ChecklistItem
      description: |
        Existing schema type for post_merge_checklist items. No modifications needed.
        M5 populates Description field with human-readable integration task and
        optional Command field for testable commands (e.g., "grep 'handleX' server.go").
      definition: |
        type ChecklistItem struct {
          Description string `yaml:"description" json:"description"`
          Command     string `yaml:"command,omitempty" json:"command,omitempty"`
        }
      location: pkg/protocol/types_sections.go (existing)
    - name: ChecklistGroup
      description: |
        Existing schema type for post_merge_checklist groups. M5 creates groups like
        "API Route Registration", "React Navigation Wiring", "CLI Command Registration",
        "Background Service Initialization". Each group contains related ChecklistItems.
      definition: |
        type ChecklistGroup struct {
          Title string          `yaml:"title" json:"title"`
          Items []ChecklistItem `yaml:"items" json:"items"`
        }
      location: pkg/protocol/types_sections.go (existing)
