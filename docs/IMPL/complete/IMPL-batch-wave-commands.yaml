          task: |
            ## What to Implement
            Create the prepare-wave command that combines worktree creation and
            per-agent preparation into a single atomic operation. This command
            reduces the wave setup flow from 5+ commands to 1 command.

            ## Interfaces to Implement
            Implement the PrepareWaveResult struct and newPrepareWaveCmd function:

            ```go
            type PrepareWaveResult struct {
              Wave         int                        `json:"wave"`
              Worktrees    []WorktreeInfo            `json:"worktrees"`  // from protocol.CreateWorktrees
              AgentBriefs  []AgentBriefInfo          `json:"agent_briefs"`
            }

            type AgentBriefInfo struct {
              Agent       string `json:"agent"`
              BriefPath   string `json:"brief_path"`
              BriefLength int    `json:"brief_length"`
              JournalDir  string `json:"journal_dir"`
              FilesOwned  int    `json:"files_owned"`
            }

            func newPrepareWaveCmd() *cobra.Command
            ```

            ## Interfaces to Call
            - protocol.CreateWorktrees(manifestPath, waveNum, repoDir) — creates worktrees, records base commit
            - protocol.Load(manifestPath) — parse IMPL manifest
            - journal.NewObserver(projectRoot, fullAgentID) — init journal observer
            - os.WriteFile(briefPath, []byte(brief), 0644) — write agent brief

            Follow the pattern from prepare_agent.go for brief extraction and
            journal initialization. Key differences:
            - Loop over all agents in the wave (from CreateWorktrees result)
            - Aggregate results into PrepareWaveResult JSON
            - Write briefs to worktree roots (not .saw-state, no --no-worktree flag)

            The brief extraction logic is in prepare_agent.go:48-118. For each agent:
            1. Extract agent.Task from manifest.Waves[waveNum].Agents[agentID]
            2. Extract agent.Files for the file ownership list
            3. Extract manifest.InterfaceContracts and format as markdown (see prepare_agent.go:74-80)
            4. Extract manifest.QualityGates and format as markdown (see prepare_agent.go:84-95)
            5. Combine into brief using prepare_agent.go:98-118 template

            Write brief to {worktreePath}/.saw-agent-brief.md (worktree root, not .saw-state).
            For cross-repo waves, use determineAgentRepo pattern from worktree.go:115-125.

            ## Tests to Write
            No new tests required — this command orchestrates existing tested
            functions. Integration testing via manual verification is sufficient.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./cmd/saw
            go test ./pkg/protocol/... ./cmd/saw/...
            go vet ./...
            ```

            ## Constraints
            - Must call CreateWorktrees first to record base commit before brief extraction
            - Brief path must be {worktreePath}/.saw-agent-brief.md (not .saw-state)
            - Journal cursor must be initialized if it doesn't exist (empty SessionCursor)
            - Command signature: `sawtools prepare-wave <manifest-path> --wave N --repo-dir <path>`
            - Output JSON with all worktree paths and brief paths for orchestrator use
            - Stop on first error; do not continue if CreateWorktrees fails
            - Solo agents (1 agent in wave) should use prepare-agent --no-worktree instead
              of prepare-wave (prepare-wave always creates worktrees, which is unnecessary overhead
              for single-agent waves that execute on main branch)
          files:
            - cmd/saw/prepare_wave.go
        - id: B
          task: |
            ## What to Implement
            Create the finalize-wave command that combines post-agent verification,
            merge, and cleanup into a single atomic operation. This command reduces
            the post-wave flow from 6 commands to 1 command.

            ## Interfaces to Implement
            Implement the FinalizeWaveResult struct and newFinalizeWaveCmd function:

            ```go
            type FinalizeWaveResult struct {
              Wave              int                      `json:"wave"`
              VerifyCommits     *VerifyCommitsResult    `json:"verify_commits"`
              StubReport        *ScanStubsResult        `json:"stub_report,omitempty"`
              GateResults       []GateResult            `json:"gate_results"`
              MergeResult       *MergeAgentsResult      `json:"merge_result"`
              VerifyBuildResult *VerifyBuildResult      `json:"verify_build"`
              CleanupResult     *CleanupResult          `json:"cleanup_result"`
              Success           bool                    `json:"success"`
            }

            func newFinalizeWaveCmd() *cobra.Command
            ```

            ## Interfaces to Call
            - protocol.VerifyCommits(manifestPath, waveNum, repoDir) — E7 check
            - protocol.Load(manifestPath) — parse manifest for file ownership
            - protocol.ScanStubs(files) — E20 stub detection on changed files
            - protocol.RunGates(manifest, waveNum, repoDir) — E21 quality gates
            - protocol.MergeAgents(manifestPath, waveNum, repoDir) — merge all agents
            - protocol.VerifyBuild(manifestPath, repoDir) — post-merge tests
            - protocol.Cleanup(manifestPath, waveNum, repoDir) — remove worktrees

            ## Execution Order
            1. VerifyCommits — stop if any agent has no commits (I5 trip wire)
            2. ScanStubs — collect changed files from each agent's completion report
               (files_changed + files_created from CompletionReport struct), scan for TODO/FIXME
            3. RunGates — run quality gates if defined in manifest
            4. MergeAgents — merge all agent branches to main (stop if conflict)
            5. VerifyBuild — run test_command and lint_command from manifest
            6. Cleanup — remove worktrees and branches

            If any step fails:
            - Set Success=false in result
            - Stop execution (do not continue to next step)
            - Return partial result with error details
            - Exit with non-zero status code

            ## Tests to Write
            No new tests required — this command orchestrates existing tested
            functions. Integration testing via manual verification is sufficient.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./cmd/saw
            go test ./pkg/protocol/... ./cmd/saw/...
            go vet ./...
            ```

            ## Constraints
            - Must stop on first failure; do not continue pipeline if VerifyCommits fails
            - ScanStubs input files must come from completion reports (files_changed + files_created),
              NOT file ownership table (agents may create additional files or skip planned files)
            - If merge fails, do NOT run VerifyBuild or Cleanup
            - Command signature: `sawtools finalize-wave <manifest-path> --wave N --repo-dir <path>`
            - Output comprehensive JSON result for orchestrator diagnostics
            - Exit code 1 if Success=false
          files:
            - cmd/saw/finalize_wave.go
