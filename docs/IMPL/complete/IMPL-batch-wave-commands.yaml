pre_mortem:
    overall_risk: low
    rows:
        - scenario: prepare-wave fails mid-operation after creating some worktrees but before writing briefs
          likelihood: low
          impact: low
          mitigation: CreateWorktrees creates worktrees sequentially and stops on first agent failure. If some worktrees were created before failure, orchestrator can re-run prepare-wave (worktree creation is idempotent) or run cleanup to remove stale worktrees.
        - scenario: finalize-wave fails after merge but before cleanup, leaving stale worktrees
          likelihood: low
          impact: low
          mitigation: Cleanup is idempotent. Orchestrator can run `sawtools cleanup` manually to remove stale worktrees.
        - scenario: JSON output format changes break downstream tooling (web app, orchestrators)
          likelihood: medium
          impact: medium
          mitigation: Add JSON schema validation tests. Document output format in command help text. Web app already handles errors gracefully via SSE error events.
