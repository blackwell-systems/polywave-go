pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent B tests reference `testBaseURL` which Agent A deletes. If Agent B's
            worktree doesn't include Agent A's deletion, the tests will still compile
            (the global still exists in the worktree) but will fail at runtime because
            BaseURL is not threaded to the HTTP client. Merge resolves this.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent B's task explicitly instructs removal of testBaseURL usage and
            replacement with ReviewOpts.BaseURL. Pattern is provided verbatim. Reviewer
            should verify no testBaseURL references remain in the test file at merge time.
        - scenario: |-
            Variable name collision in run_review_cmd.go and reviewer_test.go: existing
            code uses `result` as a local variable name. If Agent B imports the `result`
            package and also declares a local `result` variable, the compiler will reject
            it with "result declared but not used" or a shadowing error.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent B's task specifies using `res` for the Result return value and `got` for
            the extracted data, and explicitly warns about this collision. The task also
            notes that the result package import may not be needed if only methods are called.
        - scenario: |-
            TestReviewDiffEmptyDiff currently asserts Overall=0. After Bug 4 fix it must
            be Overall=100. Agent B's worktree has the updated test but Agent A's reviewer.go
            worktree still has Overall=0, causing test failure in A's isolated run.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent A's task specifies Overall=100 in the empty-diff return block. The test
            mismatch is expected in A's worktree (test file not modified there). The
            post-merge full test run is the canonical correctness gate.
        - scenario: |-
            result.NewFailure panics when called with an empty errors slice. Agent A could
            accidentally pass an empty slice.
          likelihood: low
          impact: high
          mitigation: |-
            Agent A's task provides all NewFailure call sites verbatim, each with exactly
            one SAWError element. Any panic would surface immediately in the smoke test gate.
