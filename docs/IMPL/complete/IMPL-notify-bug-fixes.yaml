               ```go
               // After remove, dispatch should fail with no adapters.
               res2 := d.Dispatch(context.Background(), Event{Title: "t2"}, mockFormatter{})
               if !res2.IsFatal() {
                   t.Fatalf("expected FATAL after remove, got %q", res2.Code)
               }
               ```
               Remove the `a.calls.Load() != 1` check for `res2` (the adapter was removed
               so it will not be called; the check is still valid but the success assertion
               was the broken one).

