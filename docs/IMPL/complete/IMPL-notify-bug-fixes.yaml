pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent C references defaultHTTPTimeout before Agent B's Wave 1 merges. If the orchestrator launches Agent C before Wave 1 is fully merged, the build will fail with "undefined: defaultHTTPTimeout".
          likelihood: low
          impact: high
          mitigation: |
            Wave structure enforces Agent C is in Wave 2 and cannot start until Wave 1 (A + B) completes and merges. The dependency on B is explicit in file_ownership and agent dependencies.
        - scenario: |
            telegram_test.go has three tests checking Markdown format strings. If Agent C misses one test (e.g. FormatNoFields), the test suite will fail on the merged result even if Agent C's individual build passed.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C task explicitly lists all three tests to update with exact expected strings. Run go test ./pkg/notify/... as the final gate.
        - scenario: |
            TestDispatcher_AddRemove in dispatcher_test.go has a second dispatch call after RemoveAdapter that currently asserts IsSuccess. If Agent A only fixes TestDispatch_NoAdapters and misses this second assertion, the test suite will fail.
          likelihood: medium
          impact: low
          mitigation: |
            Agent A task explicitly calls out both tests to update, including the specific lines. The task description lists line 147 as the affected assertion.
        - scenario: |
            readWithFallback is removed from slack.go by Agent B but telegram.go already references it by package-local name. If Agent B only adds it to types.go without verifying telegram.go compiles, the move is incomplete. However this is not a wave-ordering risk since both files are in the same package and Agent B owns slack.go and types.go.
          likelihood: low
          impact: low
          mitigation: |
            Agent B task explicitly states telegram.go already calls readWithFallback and that moving it to types.go (same package) requires no import changes. Agent B's verification gate runs go build ./... which will catch any missing symbol immediately.
