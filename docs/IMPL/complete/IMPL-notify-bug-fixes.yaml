            **Part 2: Rewrite TelegramFormatter.Format to emit HTML**

            File: `pkg/notify/telegram.go`, function `TelegramFormatter.Format` (line 117-143).

            Replace the Markdown formatting with HTML formatting:
            - Title: `<b>Title</b>` instead of `*Title*`
            - Fields: `<i>key:</i> value` instead of `_key:_ value`
            - Body text: unchanged (plain text, no Markdown/HTML wrapping needed)

            New implementation:
            ```go
            func (f *TelegramFormatter) Format(event Event) Message {
                var sb strings.Builder
                sb.WriteString("<b>")
                sb.WriteString(event.Title)
                sb.WriteString("</b>\n")
                sb.WriteString(event.Body)

                if len(event.Fields) > 0 {
                    sb.WriteString("\n")
                    keys := make([]string, 0, len(event.Fields))
                    for k := range event.Fields {
                        keys = append(keys, k)
                    }
                    sort.Strings(keys)
                    for _, k := range keys {
                        sb.WriteString("\n<i>")
                        sb.WriteString(k)
                        sb.WriteString(":</i> ")
                        sb.WriteString(event.Fields[k])
                    }
                }

                return Message{
                    Text: sb.String(),
                }
            }
            ```

