            ## What to implement

            Fix Bugs 1 and 4 in dispatcher.go, dispatcher_test.go, and pkg/result/codes.go.

            ### Bug 1 — Dispatch returns SUCCESS for zero adapters (should be FATAL)

            File: `pkg/notify/dispatcher.go`, lines 37-39.

            The doc comment (line 27-28) says "FATAL if no adapters are registered" but
            the code returns `result.NewSuccess(DispatchData{})`. Fix: change the zero-adapter
            branch to return `result.NewFailure` using the new constant `result.CodeDispatchNoAdapters`.

            Current code:
            ```go
            if len(snapshot) == 0 {
                return result.NewSuccess(DispatchData{})
            }
            ```

            Replace with:
            ```go
            if len(snapshot) == 0 {
                return result.NewFailure[DispatchData]([]result.SAWError{
                    {
                        Code:     result.CodeDispatchNoAdapters,
                        Message:  "dispatch: no adapters registered",
                        Severity: "fatal",
                    },
                })
            }
            ```

            ### Bug 4 — DISPATCH_ALL_FAILED inline string

            File: `pkg/result/codes.go`.

            Add two new constants in the Engine error codes section (alongside
            CodeContextCancelled at line 149). Insert after CodeContextCancelled:

            ```go
            // CodeDispatchNoAdapters is emitted by Dispatcher.Dispatch when no adapters are registered.
            CodeDispatchNoAdapters = "DISPATCH_NO_ADAPTERS"
            // CodeDispatchAllFailed is emitted by Dispatcher.Dispatch when all adapters fail.
            CodeDispatchAllFailed = "DISPATCH_ALL_FAILED"
            ```

            File: `pkg/notify/dispatcher.go`, line 123.

            Replace the inline string `"DISPATCH_ALL_FAILED"` with `result.CodeDispatchAllFailed`.

            Current:
            ```go
            Code: "DISPATCH_ALL_FAILED",
            ```
            Replace with:
            ```go
            Code: result.CodeDispatchAllFailed,
            ```

            ### Test updates in dispatcher_test.go

            Two existing tests assert the current incorrect behavior and MUST be updated:

            1. `TestDispatch_NoAdapters` (line 123-129): currently expects `IsSuccess()`.
               Change to expect `IsFatal()` and verify the error code is
               `result.CodeDispatchNoAdapters`:
               ```go
               func TestDispatch_NoAdapters(t *testing.T) {
                   d := NewDispatcher()
                   res := d.Dispatch(context.Background(), Event{}, mockFormatter{})
                   if !res.IsFatal() {
                       t.Fatalf("dispatch with no adapters should be FATAL, got: %q", res.Code)
                   }
                   if len(res.Errors) == 0 || res.Errors[0].Code != result.CodeDispatchNoAdapters {
                       t.Errorf("expected DISPATCH_NO_ADAPTERS error, got %v", res.Errors)
                   }
               }
               ```

            2. `TestDispatcher_AddRemove` (line 131-153): after `d.RemoveAdapter("x")`,
               the test dispatches again and asserts `IsSuccess()` on `res2` (line 147).
               With the fix, dispatching with zero adapters is now FATAL. Update the
