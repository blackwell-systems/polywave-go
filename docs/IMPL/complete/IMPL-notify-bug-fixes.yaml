            func TestSlackFormatter_UnknownSeverity(t *testing.T) {
                f := &SlackFormatter{}
                event := Event{
                    Severity: Severity("unknown"),
                    Title:    "Unknown Severity",
                }
                msg := f.Format(event)
                blocks := msg.Embeds.([]interface{})
