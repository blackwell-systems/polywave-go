suitability_assessment: |
    7 bugs across 5 files in pkg/notify. File decomposition is clean with one
    cross-agent dependency: Bug 2's shared HTTP timeout constant in types.go must
    be defined before discord.go and telegram.go can reference it (both are in the
    same package, so duplicate const declaration would be a compile error).

    Resolution: 2-wave structure. Wave 1 handles dispatcher (Agent A) and the
    slack+types work (Agent B, which adds the shared constant and moves
    readWithFallback). Wave 2 handles discord+telegram (Agent C), which references
    the constant already present in types.go after Agent B merges.

    Test impact: TestDispatch_NoAdapters and part of TestDispatcher_AddRemove
    assert the current (incorrect) SUCCESS behavior for zero adapters. Agent A
    must flip both to expect FATAL. Similarly, telegram_test.go asserts
    parse_mode=Markdown; Agent C must update that assertion to HTML.

    Suitability gate answers:
    1. File decomposition: 5 source files + 4 test files = 9 distinct files,
       3 agents, fully disjoint. PASS.
    2. No root-cause investigation needed. PASS.
    3. Interface contracts are well-defined (constant names, function moves,
       formatter output format). PASS.
    4. All 7 items are TODO. PASS.
    5. Build + test cycle: go test ./pkg/notify/... runs quickly, but 3 agents
       and non-trivial logic changes (behavior flip, formatter rewrite, refactor)
       make parallelization worthwhile. PASS.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: Wave 1 (2 agents x ~10 min avg) = ~10 min; Wave 2 (~10 min) = ~10 min
    - Merge and verification: ~5 min
    Total SAW time: ~35 min
    Sequential baseline: 3 agents x 15 min avg = ~45 min
    Time savings: ~10 min (22% faster)
    Recommendation: Clear speedup, proceed.
