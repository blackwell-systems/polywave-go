interface_contracts:
    - name: protocol.Agent replaces types.AgentSpec
      description: |
        All callers that construct or consume types.AgentSpec must switch to
        protocol.Agent. Field mapping: Letter->ID, Prompt->Task, FilesOwned->Files,
        Model->Model (unchanged).
      definition: |
        // Already exists in pkg/protocol/types.go
        type Agent struct {
            ID           string   `yaml:"id" json:"id"`
            Task         string   `yaml:"task" json:"task"`
            Files        []string `yaml:"files" json:"files"`
            Dependencies []string `yaml:"dependencies,omitempty" json:"dependencies,omitempty"`
            Model        string   `yaml:"model,omitempty" json:"model,omitempty"`
        }
      location: pkg/protocol/types.go
    - name: protocol.FailureTypeEnum replaces types.FailureType
      description: |
        All callers using types.FailureType constants must switch to
        protocol.FailureTypeEnum constants. Mapping:
        types.FailureTypeTransient -> protocol.FailureTransient
        types.FailureTypeFixable -> protocol.FailureFixable
        types.FailureTypeNeedsReplan -> protocol.FailureNeedsReplan
        types.FailureTypeEscalate -> protocol.FailureEscalate
        types.FailureTypeTimeout -> protocol.FailureTimeout
      definition: |
        // Already exists in pkg/protocol/failure.go
        type FailureTypeEnum string
        const (
            FailureTransient   FailureTypeEnum = "transient"
            FailureFixable     FailureTypeEnum = "fixable"
            FailureNeedsReplan FailureTypeEnum = "needs_replan"
            FailureEscalate    FailureTypeEnum = "escalate"
            FailureTimeout     FailureTypeEnum = "timeout"
        )
      location: pkg/protocol/failure.go
    - name: Runner.Execute signature change
      description: |
        pkg/agent/runner.go Execute method changes from types.AgentSpec to
        protocol.Agent. All callers in engine and orchestrator must update.
      definition: |
        func (r *Runner) Execute(ctx context.Context, agent *protocol.Agent, worktreePath string) (string, error)
      location: pkg/agent/runner.go
    - name: orchestrator failure routing signature change
      description: |
        RouteFailure, RouteFailureWithReactions, MaxAttemptsFor, and
        reactionEntryForOrchestrator change parameter type from
        types.FailureType to protocol.FailureTypeEnum.
      definition: |
        func RouteFailure(failureType protocol.FailureTypeEnum) OrchestratorAction
        func RouteFailureWithReactions(failureType protocol.FailureTypeEnum, reactions *protocol.ReactionsConfig) OrchestratorAction
        func MaxAttemptsFor(failureType protocol.FailureTypeEnum, reactions *protocol.ReactionsConfig) int
      location: pkg/orchestrator/failure.go
    - name: orchestrator quality gates signature change
      description: |
        RunQualityGates and runGate change from types.QualityGates/QualityGate
        to protocol.QualityGates/QualityGate.
      definition: |
        func RunQualityGates(repoPath string, gates *protocol.QualityGates) ([]QualityGateResult, error)
        func runGate(repoPath string, gate protocol.QualityGate) QualityGateResult
      location: pkg/orchestrator/quality_gates.go
    - name: orchestrator stubs signature change
      description: |
        RunStubScan changes from map[string]*types.CompletionReport to
        map[string]*protocol.CompletionReport.
      definition: |
        func RunStubScan(implDocPath string, waveNum int, reports map[string]*protocol.CompletionReport, sawRepoPath string) error
      location: pkg/orchestrator/stubs.go
    - name: protocol.ValidateIMPLDoc return type change
      description: |
        The markdown-era ValidateIMPLDoc in validator.go returns
        []types.ValidationError. This must change to return
        []protocol.ValidationError (the YAML schema version).
        The types.ValidationError has fields BlockType/LineNumber/Message.
        protocol.ValidationError has Code/Message/Field/Line/Slug/Wave/AgentID.
        The validator must be updated to use protocol.ValidationError fields.
      definition: |
        func ValidateIMPLDoc(path string) ([]ValidationError, error)
      location: pkg/protocol/validator.go
    - name: engine.ParseIMPLDoc removal
      description: |
        The adapter function ParseIMPLDoc in engine/runner.go that converts
        protocol.IMPLManifest to types.IMPLDoc will be removed. All callers
        must switch to protocol.Load() directly. Similarly ParseCompletionReport
        adapter will be removed.
      definition: |
        // REMOVED — callers use protocol.Load() and protocol.ParseCompletionReport() directly
      location: pkg/engine/runner.go
