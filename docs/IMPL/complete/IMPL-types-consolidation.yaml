        - id: C
          task: |
            **Migrate protocol/validator.go from types.ValidationError to protocol.ValidationError.**

            **What to implement:**

            1. **pkg/protocol/validator.go** — This file implements `ValidateIMPLDoc` which
               returns `[]types.ValidationError`. The types.ValidationError has fields:
               `BlockType string`, `LineNumber int`, `Message string`.
               The protocol.ValidationError has fields:
               `Code string`, `Message string`, `Field string`, `Line int`, `Slug string`,
               `Wave int`, `AgentID string`.

               Change the return type to `[]ValidationError` (same package, no prefix needed).
               Map fields:
               - `BlockType` -> `Code` (use the same block type string as the code)
               - `LineNumber` -> `Line`
               - `Message` -> `Message` (unchanged)

               Update every `types.ValidationError{...}` literal to `ValidationError{...}`
               with the new field names. There are ~30 such literals across the
               `validateFileOwnership`, `validateDepGraph`, `validateWaveStructure`,
               and `validateCompletionReport` helper functions.

               Remove the `pkg/types` import entirely.

            **Interface contracts:**
            - `func ValidateIMPLDoc(path string) ([]ValidationError, error)` — returns protocol.ValidationError

            **Tests:** The validator tests are in validator_test.go which does NOT import
            pkg/types — it should work after the return type change. Verify:
            `go test ./pkg/protocol/... -run TestValidateIMPLDoc`

            **Verification gate:**
            `go build ./pkg/protocol/... && go vet ./pkg/protocol/... && go test ./pkg/protocol/...`

            **Constraints:**
            - Do NOT modify files outside your ownership
            - Do NOT delete pkg/types
            - Since validator.go is inside the protocol package, use `ValidationError` not `protocol.ValidationError`
            - Map BlockType to Code, LineNumber to Line — these are the semantic equivalents
          files:
            - pkg/protocol/validator.go
