completion_date: "2026-03-22"
title: Remove deprecated pkg/types package — consolidate all types into pkg/protocol
feature_slug: types-consolidation
verdict: SUITABLE
suitability_assessment: |
    File decomposition: 20 Go files import pkg/types across 4 packages (agent, engine,
    orchestrator, protocol) plus 2 CLI commands. Files decompose cleanly into 5 agent
    scopes with disjoint ownership across 3 waves.

    Investigation-first: No. The dual-type hierarchy is fully understood. pkg/types
    was built for the deprecated markdown-parsed IMPL format. pkg/protocol has YAML
    equivalents for every type. This is a mechanical migration with known mappings:
    - types.AgentSpec -> protocol.Agent (Letter->ID, Prompt->Task, FilesOwned->Files)
    - types.FailureType -> protocol.FailureTypeEnum (already exists with different const names)
    - types.CompletionReport -> protocol.CompletionReport (Status is string not enum)
    - types.QualityGates/QualityGate -> protocol.QualityGates/QualityGate
    - types.ValidationError (markdown) -> protocol.ValidationError (already exists, different schema)
    - types.IMPLDoc -> protocol.IMPLManifest (callers already use manifest in many places)

    Interface discoverability: Yes. All target types already exist in pkg/protocol/types.go.
    The migration is changing import paths and adapting field name differences. No new
    types need to be designed.

    Pre-implementation status: A prior IMPL (type-unification, completed 2026-03-22)
    migrated the orchestrator from types.IMPLDoc to protocol.IMPLManifest but left
    the pkg/types import in place for FailureType constants and AgentSpec. This IMPL
    finishes that work by eliminating ALL remaining references and deleting the package.

    Parallelization value: High. Build/test cycle is >30s (full Go test suite). Four
    agents each touch 3-6 files across distinct packages. Wave 1 handles the three
    leaf packages (agent, orchestrator, protocol/validator) in parallel. Wave 2
    handles engine (which depends on all three) plus CLI commands. Wave 3 deletes
    the now-unused pkg/types package.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (5 agents, ~8 min avg, 3 waves with parallelism)
    - Merge and verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~35 min (5 agents x ~7 min avg)
    Time savings: ~7 min (20% faster)
    Recommendation: Clear speedup plus coordination value for cross-package refactor.
test_command: go test ./...
lint_command: go vet ./...
