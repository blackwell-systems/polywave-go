               `types.FailureType` to `protocol.FailureTypeEnum`. Update constant
               references:
               - `types.FailureTypeTransient` -> `protocol.FailureTransient`
               - `types.FailureTypeFixable` -> `protocol.FailureFixable`
               - `types.FailureTypeNeedsReplan` -> `protocol.FailureNeedsReplan`
               - `types.FailureTypeEscalate` -> `protocol.FailureEscalate`
               - `types.FailureTypeTimeout` -> `protocol.FailureTimeout`
               Remove the `pkg/types` import. Functions affected:
               - `RouteFailure(failureType protocol.FailureTypeEnum) OrchestratorAction`
               - `RouteFailureWithReactions(failureType protocol.FailureTypeEnum, ...)`
               - `MaxAttemptsFor(failureType protocol.FailureTypeEnum, ...)`
               - `reactionEntryForOrchestrator(failureType protocol.FailureTypeEnum, ...)`
               - `defaultMaxAttempts(failureType protocol.FailureTypeEnum)`

            2. **pkg/orchestrator/failure_test.go** — Update all test references from
               `types.FailureType*` constants to `protocol.Failure*` constants. Remove
               `pkg/types` import.

            3. **pkg/orchestrator/quality_gates.go** — Change `RunQualityGates` signature
               from `*types.QualityGates` to `*protocol.QualityGates`. Change `runGate`
               from `types.QualityGate` to `protocol.QualityGate`. Remove `pkg/types` import.

            4. **pkg/orchestrator/quality_gates_test.go** — Update test structs from
               `types.QualityGates`/`types.QualityGate` to `protocol.QualityGates`/
               `protocol.QualityGate`. Remove `pkg/types` import.

            5. **pkg/orchestrator/stubs.go** — Change `RunStubScan` parameter from
               `map[string]*types.CompletionReport` to `map[string]*protocol.CompletionReport`.
               Remove `pkg/types` import. Note: protocol.CompletionReport uses `Status string`
               not `Status CompletionStatus` — no enum conversion needed.

            6. **pkg/orchestrator/stubs_test.go** — Update test structs to use
               `protocol.CompletionReport`. Remove `pkg/types` import.

            **Interface contracts:**
            - `RouteFailure(failureType protocol.FailureTypeEnum) OrchestratorAction`
            - `RunQualityGates(repoPath string, gates *protocol.QualityGates) ([]QualityGateResult, error)`
            - `RunStubScan(implDocPath string, waveNum int, reports map[string]*protocol.CompletionReport, sawRepoPath string) error`

