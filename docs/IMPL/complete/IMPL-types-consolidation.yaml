pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B and A both touch orchestrator package files — potential merge conflict
          likelihood: low
          impact: medium
          mitigation: |
            File ownership is strictly disjoint: A owns failure.go, quality_gates.go, stubs.go
            (and their tests). B owns orchestrator.go, structured_wave.go (and test). No overlap.
        - scenario: Engine adapter removal in Wave 2 breaks callers not yet migrated
          likelihood: low
          impact: high
          mitigation: |
            Wave 2 Agent D owns ALL engine files and CLI files that call ParseIMPLDoc.
            No caller is left unowned. Full build verification catches any missed reference.
        - scenario: types.ValidationError field mapping (BlockType->Code) loses information
          likelihood: medium
          impact: low
          mitigation: |
            BlockType values like "impl-file-ownership" map cleanly to Code field.
            LineNumber maps to Line. Message is identical. No semantic information is lost.
        - scenario: Agent E deletes pkg/types while imports still exist
          likelihood: low
          impact: high
          mitigation: |
            Agent E has a mandatory grep pre-check and depends on Agent D completing.
            The full build gate (go build ./...) will catch any missed import immediately.
