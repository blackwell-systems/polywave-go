pre_mortem:
    overall_risk: low
    rows:
        - scenario: Directory-level granularity in migration validator produces false positives for large packages where only one file changed signatures
          likelihood: medium
          impact: low
          mitigation: Warnings are non-blocking — false positives are informational only. Future enhancement could add signature-change detection.
        - scenario: Migration failure regex patterns miss language-specific error formats
          likelihood: low
          impact: low
          mitigation: Patterns cover the most common Go/TS/Python/Rust error messages. Additional patterns can be added incrementally.
        - scenario: Scout prompt changes conflict with concurrent protocol repo work
          likelihood: low
          impact: medium
          mitigation: The change is additive (new section), not modifying existing text. Merge conflicts would be trivial to resolve.
