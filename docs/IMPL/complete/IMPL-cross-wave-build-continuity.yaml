      agents:
        - id: A
          task: |
            ## Layer 2: Migration boundary validator

            Create `pkg/protocol/validate_migration.go` with function `ValidateMigrationBoundaries(m *IMPLManifest) []ValidationError`.

            **Algorithm:**
            1. Build a map of wave -> set of directories containing owned files.
               For each FileOwnership entry, extract the directory (filepath.Dir of the file path).
            2. For each consecutive wave pair (N, N+1):
               - Get the set of directories modified in wave N
               - Get the set of directories containing files owned in wave N+1
               - If any directory appears in both sets, emit a warning
            3. Return ValidationErrors with:
               - Code: "MIGRATION_BOUNDARY_WARNING"
               - Message: "Wave {N} modifies files in {dir}, wave {N+1} has callers — verify re-export bridge or consolidate into one wave"
               - Field: "file_ownership"

            **Important design decisions:**
            - This emits WARNINGS, not errors. The Scout may have intentionally used bridge patterns.
            - Only check consecutive wave pairs (N to N+1), not arbitrary wave distances.
            - Use directory-level granularity, not individual file imports. This keeps the check
              language-agnostic — no need to parse Go imports, TypeScript imports, etc.
            - Do NOT wire this into the Validate() function in validation.go — it should be
              callable independently. The orchestrator or prepare-wave can call it separately
              because warnings should not block validation.

            **Wire into validation.go:**
            Add `ValidateMigrationBoundaries` as an additional call in the `Validate()` function
            in `validation.go`. Since these are warnings (not errors), they will appear in
            validation output but won't block prepare-wave (which only blocks on specific error codes).

            Actually — do NOT modify validation.go. Keep the function standalone. The caller
            (prepare-wave or sawtools validate) can invoke it separately if desired. This avoids
            coupling warnings into the hard-error validation path.

            **Test file:** Create `pkg/protocol/validate_migration_test.go` with:
            - TestValidateMigrationBoundaries_NoBoundary: wave 1 and wave 2 touch different dirs → no warnings
            - TestValidateMigrationBoundaries_SameDir: wave 1 modifies pkg/auth/token.go, wave 2 modifies pkg/auth/middleware.go → warning
            - TestValidateMigrationBoundaries_NonConsecutive: wave 1 and wave 3 share a dir but wave 2 doesn't → no warning (only consecutive pairs checked)
            - TestValidateMigrationBoundaries_SingleWave: only 1 wave → no warnings
            - TestValidateMigrationBoundaries_MultipleOverlaps: multiple dirs overlap → one warning per dir

            **Verification gate:** `go build ./pkg/protocol/ && go test ./pkg/protocol/ -run TestValidateMigration -count=1`
          files:
            - pkg/protocol/validate_migration.go
            - pkg/protocol/validate_migration_test.go
        - id: B
          task: |
            ## Layer 3: Enhanced baseline failure messaging

            Modify `cmd/saw/baseline_output.go` to add migration-aware failure diagnosis.

            **Add function `DiagnoseMigrationFailure`:**
            ```go
            func DiagnoseMigrationFailure(result *protocol.BaselineResult) string
            ```

            This function inspects the failed gate results for patterns indicating a
            cross-wave migration break:
            - Scan Stderr and Stdout of each failed GateResult for these regex patterns:
              - `cannot use .+ as .+` (Go type mismatch)
              - `undefined: \w+` (Go undefined reference)
              - `imported and not used` (Go unused import after rename)
              - `cannot find module` (Go module not found)
              - `Module not found` (TypeScript/Node)
              - `No module named` (Python)
              - `unresolved import` (Rust)
            - If ANY pattern matches, return a suggestion string:
              "Baseline broken at wave boundary. Consider: (1) consolidate all callers
              into the same wave as the signature change, or (2) add re-export aliases
              in the old package to forward to the new signatures."
            - If no patterns match, return "".

            **Integrate into FormatBaselineOutput:**
            After the existing "Error: baseline verification failed..." line, add:
            ```go
            if suggestion := DiagnoseMigrationFailure(result); suggestion != "" {
                b.WriteByte('\n')
                b.WriteString("Hint: " + suggestion)
            }
            ```

            **Test file:** Add to `cmd/saw/baseline_output_test.go`:
            - TestDiagnoseMigrationFailure_GoUndefined: Stderr contains "undefined: FooType" → returns suggestion
            - TestDiagnoseMigrationFailure_GoTypeMismatch: Stderr contains "cannot use X as Y" → returns suggestion
            - TestDiagnoseMigrationFailure_PythonModuleNotFound: Stderr contains "No module named foo" → returns suggestion
            - TestDiagnoseMigrationFailure_Unrelated: Stderr contains "syntax error" → returns ""
            - TestDiagnoseMigrationFailure_AllPassing: All gates passed → returns ""
            - TestFormatBaselineOutput_WithMigrationHint: Full integration test — failed baseline with migration pattern includes hint in output

            **Verification gate:** `go build ./cmd/saw/ && go test ./cmd/saw/ -run "TestDiagnoseMigration|TestFormatBaselineOutput_WithMigration" -count=1`
          files:
            - cmd/saw/baseline_output.go
            - cmd/saw/baseline_output_test.go
        - id: C
          task: |
            ## Layer 1: Scout prompt migration guidance

            Modify `implementations/claude-code/prompts/agents/scout.md` in the
            scout-and-wave PROTOCOL repo (not the Go repo).

            **Add a new section** after step 8 (Structure waves from the DAG) and before
            step 9 (Integration completeness audit). Insert as step 8.5 or renumber
            appropriately. Title: "Cross-wave migration safety".

            **Content to add (adapt to match the existing prompt style):**

            ```
            **Cross-wave migration safety.** When a feature removes, renames, or
            consolidates a module/package (e.g., migrating `pkg/types` into
            `pkg/protocol`), apply these rules to prevent intermediate build breaks:

            **Rule 1 — Single-wave preference.** If ALL files importing the old module
            fit in one wave (≤6 agents), put them in the same wave as the signature
            changes. This eliminates the cross-wave break entirely.

            **Rule 2 — Re-export bridge pattern.** When too many callers exist for a
            single wave, use a 3-wave approach:
            - Wave 1: Make signature changes in the target package AND add re-export
              bridges (type aliases, wrapper functions, re-exports) in the old package
              that forward to the new signatures.
            - Wave 2: Update callers to import from the new package directly.
            - Wave 3: Remove the re-export bridges (cleanup wave).

            The bridge keeps the codebase buildable between waves because old import
            paths still resolve.

            **Rule 3 — Detection heuristic.** Before finalizing wave assignments, check:
            if file_ownership puts files from the same directory/package in different
            waves AND any agent changes exported function signatures or type definitions,
            flag it as a potential migration boundary. Either consolidate into one wave
            (Rule 1) or ensure re-export bridges are planned (Rule 2).

            Language-specific bridge mechanisms:
            - Go: type alias (`type OldName = newpkg.NewName`), var alias, wrapper function
            - TypeScript/JavaScript: `export { NewName as OldName } from './new-module'`
            - Python: `from new_module import NewName as OldName` in `__init__.py`
            - Rust: `pub use new_crate::NewType as OldType;`
            ```

            **Important:** Do NOT renumber existing steps. Add this as a new subsection
            within step 8, or as a clearly labeled callout box. Match the existing
            formatting style (bold headers, bullet points, code examples).

            **Verification gate:** The file must remain valid markdown. Run:
            `wc -l implementations/claude-code/prompts/agents/scout.md` — should be
            within ~40 lines of the original length (currently 657 lines, expect ~700).
          files:
            - implementations/claude-code/prompts/agents/scout.md
