interface_contracts:
    - name: ValidateMigrationBoundaries
      description: |
        Detects cross-wave migration boundaries where wave N modifies files in
        a directory/package and wave N+1 has files that import from that same
        directory. Returns warnings (not errors) since the Scout may have
        intentionally used a bridge pattern.
      definition: |
        func ValidateMigrationBoundaries(m *IMPLManifest) []ValidationError
        // Returns errors with code "MIGRATION_BOUNDARY_WARNING"
        // Message format: "Wave N modifies files in {dir}, wave N+1 has callers — verify re-export bridge or consolidate into one wave"
        // Field: "file_ownership"
      location: pkg/protocol/validate_migration.go
    - name: DiagnoseMigrationFailure
      description: |
        Inspects a failed BaselineResult's gate output for type/import mismatch
        patterns (e.g., "cannot use X as Y", "undefined: X", "imported and not used").
        Returns a human-readable suggestion string if a migration boundary issue
        is detected, or empty string if the failure is unrelated.
      definition: |
        func DiagnoseMigrationFailure(result *protocol.BaselineResult) string
        // Returns suggestion text like:
        // "Baseline broken at wave boundary. Consider: (1) consolidate callers into the same wave as the signature change, or (2) add re-export aliases in the old package to forward to the new signatures."
        // Returns "" if the failure pattern does not match migration errors.
      location: cmd/saw/baseline_output.go
waves:
