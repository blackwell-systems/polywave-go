            ### Command structure (follow detect_shared_types_cmd.go pattern)

            ```go
            func newDetectWiringCmd() *cobra.Command {
                var format string
                cmd := &cobra.Command{
                    Use:   "detect-wiring <impl-doc-path>",
                    Short: "Detect cross-agent function calls and generate wiring declarations",
                    Long:  `Analyze IMPL document agent task prompts for cross-agent calls...`,
                    Args:  cobra.ExactArgs(1),
                    RunE: func(cmd *cobra.Command, args []string) error {
                        implDocPath := args[0]
                        // Validate format flag (yaml or json)
                        // Load manifest via protocol.Load(implDocPath)
                        // Determine repo root (use findRepoRoot helper from detect_shared_types_cmd.go)
                        // Call analyzer.DetectWiring(manifest, repoRoot)
                        // Marshal to YAML or JSON
                        // Write to stdout
                    },
                }
                cmd.Flags().StringVar(&format, "format", "yaml", "Output format: yaml or json")
                return cmd
            }
            ```

            ### Output format

            ```yaml
            wiring:
              - symbol: RunVerifyInstall
                defined_in: pkg/engine/verify_install.go
                must_be_called_from: cmd/sawtools/init_cmd.go
                agent: B
                wave: 1
                integration_pattern: call
            ```

            Or JSON equivalent (if `--format json`).

            ### Error handling

