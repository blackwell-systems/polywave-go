interface_contracts:
    - name: DetectWiring
      description: |-
        Analyzes an IMPL manifest's agent task prompts for cross-agent function calls
        and returns WiringDeclaration entries. Patterns detected:
        - "calls `FunctionName()`"
        - "uses `pkg.FunctionName`"
        - "delegates to `X`"
        Cross-references function names against file_ownership to find defining agent.
        Only emits wiring declarations when caller agent ≠ definer agent.
      definition: |-
        func DetectWiring(manifest *protocol.IMPLManifest, repoRoot string) ([]protocol.WiringDeclaration, error)

        Returns: slice of WiringDeclaration structs (symbol, defined_in, must_be_called_from,
        agent, wave, integration_pattern). Empty slice if no cross-agent calls detected.
        Error if manifest is nil or file_ownership is malformed.

        Pattern matching is 80% reliable (regex-based). False negatives are safe (finalize-wave
        catches them); false positives fail validation immediately (symbolFoundInFile returns false).
      location: pkg/analyzer/wiring.go
    - name: WiringDeclaration
      description: |-
        Already-defined type in pkg/protocol/wiring_types.go. Agent A returns []WiringDeclaration;
        Agent B marshals to YAML/JSON for CLI output.
      definition: |-
        type WiringDeclaration struct {
            Symbol             string `yaml:"symbol" json:"symbol"`
            DefinedIn          string `yaml:"defined_in" json:"defined_in"`
            MustBeCalledFrom   string `yaml:"must_be_called_from" json:"must_be_called_from"`
            Agent              string `yaml:"agent" json:"agent"`
            Wave               int    `yaml:"wave" json:"wave"`
            IntegrationPattern string `yaml:"integration_pattern,omitempty" json:"integration_pattern,omitempty"`
        }
      location: pkg/protocol/wiring_types.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Create `pkg/analyzer/wiring.go` with the `DetectWiring` function that scans
            IMPL manifest agent task prompts for cross-agent function call patterns and
            generates wiring declarations.

            ### Detection patterns (regex-based)

            Scan each agent's `task` field for these patterns:
            1. **Direct call:** `calls \`FunctionName()\`` → extract FunctionName
            2. **Package-qualified call:** `uses \`pkg.FunctionName\`` → extract FunctionName
            3. **Delegation:** `delegates to \`FunctionName\`` → extract FunctionName
            4. **Invocation:** `invokes \`FunctionName\`` → extract FunctionName

            For each match:
            - Extract the function name (strip backticks, trailing parens, package prefixes)
            - Search `manifest.FileOwnership` for the file that defines this function:
              - Check `manifest.InterfaceContracts` for a contract with matching `name` field
              - If found, use `contract.Location` as `defined_in`
              - If not in contracts, search `file_ownership` for files owned by other agents
                in prior waves (heuristic: assume function is in the first file owned by the
                earliest-wave agent that is NOT the calling agent)
            - If defining agent ≠ calling agent, emit a WiringDeclaration:
              ```
              Symbol: <FunctionName>
              DefinedIn: <file path from contract.Location or ownership heuristic>
              MustBeCalledFrom: <first file in calling agent's ownership>
              Agent: <calling agent ID>
              Wave: <calling agent's wave number>
              IntegrationPattern: "call" (default for function calls)
              ```

            ### Function signature

            ```go
            func DetectWiring(manifest *protocol.IMPLManifest, repoRoot string) ([]protocol.WiringDeclaration, error)
            ```

            Returns:
            - Empty slice if no cross-agent calls detected
            - Error if manifest is nil or malformed

            ### Edge cases

            - If a function is called by its defining agent (same agent), do NOT emit a wiring entry
            - If a function name appears in multiple agents' tasks but is not in interface_contracts,
              skip it (likely a stdlib or external function)
            - If `must_be_called_from` file is not in the calling agent's file_ownership, the
              wiring declaration is invalid (prepare-wave will catch this in Layer 3A verification)
            - Use the calling agent's first owned file as `must_be_called_from` (the agent prompt
              should specify which file, but for auto-detection, use the first one)

            ## Interfaces to Implement

            - `DetectWiring(manifest, repoRoot) ([]WiringDeclaration, error)` — main detection function

            ## Interfaces to Call

            - `protocol.IMPLManifest` — read from `manifest.Waves`, `manifest.FileOwnership`, `manifest.InterfaceContracts`
            - `protocol.WiringDeclaration` — return type (already exists in pkg/protocol/wiring_types.go)

            ## Tests to Write

            1. `TestDetectWiring_DirectCall` — agent task says "calls `RunScout()`", verify wiring emitted
            2. `TestDetectWiring_PackageQualified` — "uses `engine.RunScout`" → same
            3. `TestDetectWiring_Delegation` — "delegates to `RunCritic`" → same
            4. `TestDetectWiring_SameAgentNoWiring` — defining agent calls its own function → no wiring
            5. `TestDetectWiring_NoInterfaceContract` — function not in contracts → skip
            6. `TestDetectWiring_MultipleCallers` — 2 agents call same function → 2 wiring entries
            7. `TestDetectWiring_EmptyManifest` — no agents → empty result

            Use test fixtures in `pkg/analyzer/testdata/wiring/` (Agent D creates these).

            ## Verification Gate

            ```bash
            go build ./pkg/analyzer/
            go vet ./pkg/analyzer/
            go test ./pkg/analyzer/ -run TestDetectWiring -count=1
            ```

            ## Constraints

            - Do NOT modify any existing files in pkg/analyzer/ (shared_types.go, cascade.go, etc.)
            - Pattern matching is regex-based (80% reliable is acceptable; false positives fail
              validation, false negatives are caught by finalize-wave)
            - If a function is in `interface_contracts` but has no explicit location, use the
              defining agent's first owned file as a fallback
            - Output WiringDeclaration structs must match the schema in pkg/protocol/wiring_types.go
          files:
            - pkg/analyzer/wiring.go
            - pkg/analyzer/wiring_test.go
