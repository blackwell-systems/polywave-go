pre_mortem:
    overall_risk: low
    rows:
        - scenario: Regex pattern matching misses some function call patterns (e.g., "Agent B invokes X" vs "calls X")
          likelihood: medium
          impact: low
          mitigation: Pattern matching is advisory only — false negatives are caught by finalize-wave post-merge validation. Scout reviews detect-wiring output before committing.
        - scenario: Function name appears in task prompt but is not actually called (e.g., mentioned in a comment or as an example)
          likelihood: low
          impact: low
          mitigation: False positives fail validation immediately (symbolFoundInFile returns false if function is not called in must_be_called_from file).
        - scenario: Cross-agent call exists but function is not in interface_contracts (stdlib or external package)
          likelihood: medium
          impact: low
          mitigation: DetectWiring skips functions not in interface_contracts. This is correct behavior — wiring declarations are only for cross-agent internal functions, not stdlib/third-party calls.
