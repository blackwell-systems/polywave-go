suitability_assessment: |
    **REVISED SCOPE (post-coordinator clarification):**

    The feature spans 2 repos (scout-and-wave-go only; protocol repo is IN scout-and-wave-go/protocol/):
    1. **Detection logic** — `pkg/analyzer/wiring.go` (pattern matching agent tasks)
    2. **CLI command** — `cmd/sawtools/detect_wiring_cmd.go` (follows detect_shared_types pattern)
    3. **Protocol docs** — update `protocol/execution-rules.md` E35 section
    4. **Scout integration** — update `implementations/claude-code/prompts/agents/scout.md`
    5. **Test fixtures** — `pkg/analyzer/testdata/wiring/` sample IMPL docs + expected output

    **Suitability gate analysis:**

    1. **File decomposition:** YES. Clean disjoint ownership across 4 agents:
       - Agent A: `pkg/analyzer/wiring.go` + `pkg/analyzer/wiring_test.go` (detection logic)
       - Agent B: `cmd/sawtools/detect_wiring_cmd.go` + `cmd/sawtools/detect_wiring_cmd_test.go`
       - Agent C: `protocol/execution-rules.md` (update E35 section to mention detect-wiring)
       - Agent D: `implementations/claude-code/prompts/agents/scout.md` + test fixtures

       No two agents touch the same file. Agent A → B dependency (B calls A's DetectWiring function).

    2. **Investigation-first items:** None. Pattern matching logic is well-defined:
       - "calls `FunctionName()`" → extract FunctionName, find defining agent via file_ownership
       - "uses `pkg.FunctionName`" → same
       - "delegates to `X`" → same
       Output schema (WiringDeclaration) already exists in pkg/protocol/wiring_types.go.

    3. **Interface discoverability:** YES. Agent A exports `DetectWiring(manifest, repoRoot) ([]WiringDeclaration, error)`.
       Agent B imports and calls it (same pattern as detect_shared_types_cmd.go → shared_types.go).
       No cross-agent runtime dependencies — B depends on A's exported function, satisfied by Wave 1 → Wave 2 sequencing.

    4. **Pre-implementation status:** All 5 components are TODO. Wiring infrastructure
       (validation in pkg/protocol/wiring_validation.go, types in wiring_types.go) exists
       but detection command does not.

    5. **Parallelization value check:** MEDIUM value:
       - **Build/test cycle:** Go build + test ~30s. Agent A writes detection logic with tests (~15 min).
         Agent B writes CLI wrapper (~8 min). Agents C and D write docs concurrently (~5 min each).
       - **Files per agent:** 2-3 files per agent (clean boundaries).
       - **Agent independence:** Wave 1 = A (logic) + C (protocol doc) + D (scout prompt + fixtures).
         Wave 2 = B (CLI command, depends on A's function). Good parallelism in Wave 1.
       - **Task complexity:** Detection is regex + file_ownership lookup (straightforward), but
         cross-repo documentation updates benefit from SAW's parallel execution.

    **Estimated times:**
    - Scout phase: ~10 min (dependency mapping, interface contracts, E35 cross-reference)
    - Agent execution: ~18 min (Wave 1: 3 agents × 8 min avg; Wave 2: 1 agent × 8 min)
    - Merge & verification: ~5 min
    Total SAW time: ~33 min

    Sequential baseline: ~40 min (4 tasks × 10 min avg with context switching)
    Time savings: ~7 min (18% faster)

    **Recommendation:** SUITABLE WITH CAVEATS. The 4-agent decomposition benefits from
    parallel execution, especially Wave 1 (3 independent agents). Caveat: this is a
    "nice to have" feature (E35 wiring validation already exists; detect-wiring just
    auto-generates declarations from task text). If time-to-completion is the priority,
    sequential implementation is faster due to SAW overhead. Use SAW if:
    - Dogfooding the protocol is valuable (self-hosting test)
    - Cross-repo coordination docs (protocol + scout prompt updates) benefit from
      structured planning
    - The IMPL doc itself serves as documentation for future similar features
