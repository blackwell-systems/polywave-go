interface_contracts:
    - name: extractTypeNames
      description: |-
        Shared function that extracts type names from a text string using package-level
        compiled regexes. Replaces the combined regex in pre_agent.go and the 4-regex
        loop in post_agent.go's extractTypeDefinitions. Deduplicates results before
        returning. This is the single authoritative implementation of type-name
        extraction logic.
      definition: |
        // typeNameRe is a compiled package-level regex matching type definition keywords
        // across Go, Rust, TypeScript, and Python.
        // Matches: "type TypeName struct", "type TypeName interface", "struct TypeName",
        // "interface TypeName", "class TypeName", "enum TypeName".
        var typeNameRe = regexp.MustCompile(`(?m)^\s*(?:type|struct|interface|class|enum)\s+(\w+)\s+(?:struct|interface|enum|class|\{)`)

        // extractTypeNames returns deduplicated type names found in text.
        // Uses package-level typeNameRe to avoid repeated compilation.
        func extractTypeNames(text string) []string
      location: pkg/scaffold/types.go
    - name: ScaffoldCandidate
      description: |-
        The ReferencedBy field is renamed to Locations with JSON tag "locations" to
        accurately reflect that it contains file path strings, not agent ID strings.
        The struct comment is updated accordingly.
      definition: |
        // ScaffoldCandidate represents a type that should be extracted to a scaffold file.
        type ScaffoldCandidate struct {
            TypeName      string   `json:"type_name"`
            Locations     []string `json:"locations"`      // File path locations referencing this type
            SuggestedFile string   `json:"suggested_file"` // internal/types/<name>.go
            Definition    string   `json:"definition"`     // Full type definition
        }
      location: pkg/scaffold/pre_agent.go
    - name: extractUniqueLocations
      description: |-
        Renamed from extractAgentsFromLocations. Returns a sorted, deduplicated slice
        of location strings from the locations map. Replaces the misleadingly named
        prior function.
      definition: |
        // extractUniqueLocations returns a sorted slice of unique location strings.
        func extractUniqueLocations(locations map[string]bool) []string
      location: pkg/scaffold/pre_agent.go
