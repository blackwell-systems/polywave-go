                `(?s)type\s+` + regexp.QuoteMeta(typeName) + `\s+interface\s*\{[^}]*\}`,
                `(?s)interface\s+` + regexp.QuoteMeta(typeName) + `\s*\{[^}]*\}`,
                `(?s)class\s+` + regexp.QuoteMeta(typeName) + `\s*\{[^}]*\}`,
