waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Fix the bug where `RunTierGate` in `pkg/protocol/program_tier_gate.go`
            reads IMPL completion status from the stale in-memory PROGRAMManifest
            instead of from the authoritative IMPL doc state on disk.

            ### Root cause

            `RunTierGate` builds `implStatus` by reading `impl.Status` from
            `manifest.Impls` (the PROGRAM manifest's impls array). This value was
            set at PROGRAM parse time and is never refreshed. When `finalize-wave`
            calls `WriteCompletionMarker`, it sets `state: COMPLETE` in the IMPL
            doc on disk but does NOT update the PROGRAM manifest's `impls[].status`.
            So `RunTierGate` always sees "pending" and fails with "not all IMPLs in
            tier are complete".

            ### Fix in `pkg/protocol/program_tier_gate.go`

            At the start of `RunTierGate`, after finding the tier, build an
            initial statusMap from the in-memory manifest (as a fallback), then
            call `enrichIMPLStatusesFromDisk` to overlay real-time status from
            disk. Use the enriched map when checking completion.

            The `enrichIMPLStatusesFromDisk` function is already defined in
            `pkg/protocol/program_status.go` in the same package. Call it
            directly — no import changes needed.

            Concrete change:

            After the tier lookup and before the IMPL status loop, add:

            ```go
            // Build initial status map from manifest (fallback values).
            implStatusMap := make(map[string]string, len(manifest.Impls))
            for _, impl := range manifest.Impls {
                implStatusMap[impl.Slug] = impl.Status
            }
            // Enrich from IMPL docs on disk so finalized IMPLs are seen as complete.
            if repoPath != "" {
                implStatusMap = enrichIMPLStatusesFromDisk(implStatusMap, repoPath)
            }
            ```

            Then replace the per-IMPL status lookup loop to read from
            `implStatusMap` instead of searching `manifest.Impls` directly.

            The updated per-IMPL loop should look like:

            ```go
            for _, implSlug := range tier.Impls {
                implStatus, found := implStatusMap[implSlug]
                if !found {
                    implStatus = "not_found"
                    data.AllImplsDone = false
                }
                status := ImplTierStatus{
                    Slug:   implSlug,
                    Status: implStatus,
                }
                data.ImplStatuses = append(data.ImplStatuses, status)
                if implStatus != "complete" {
                    data.AllImplsDone = false
                }
            }
            ```

            This replaces the current inner loop that searches `manifest.Impls`
            for each slug with a simple map lookup after enrichment.

            ### Tests in `pkg/protocol/program_tier_gate_test.go`

            Add two new test functions after the existing tests:

            **Test 1: `TestRunTierGate_ReadsFromDisk_Complete`**

            Scenario: PROGRAM manifest has `impls[].status = "pending"` for an
            IMPL, but an IMPL doc on disk has `state: COMPLETE`. The tier gate
            should pass (sees the IMPL as complete via disk read).

            Setup:
            1. Create a tmp directory as repoPath.
            2. Write a minimal IMPL YAML file at
               `<repoPath>/docs/IMPL/IMPL-<slug>.yaml` with content:
               ```yaml
               state: COMPLETE
               feature_slug: my-impl
               title: My Impl
               ```
            3. Construct a PROGRAMManifest with that IMPL's slug and
               `Status: "pending"` in the impls array.
            4. Call `RunTierGate(manifest, 1, repoPath)`.
            5. Assert `result.AllImplsDone == true` and `result.Passed == true`.

            Use `os.MkdirAll` to create `<repoPath>/docs/IMPL/` and
            `os.WriteFile` to write the IMPL YAML.

            **Test 2: `TestRunTierGate_FallsBackToManifest_WhenDocMissing`**

            Scenario: PROGRAM manifest has `impls[].status = "pending"` and no
            IMPL doc exists on disk. The tier gate should fail (status stays
            "pending" — the fallback path).

            Setup:
            1. Create a tmp directory as repoPath (no IMPL doc written).
            2. Construct a PROGRAMManifest with one IMPL, `Status: "pending"`.
            3. Call `RunTierGate(manifest, 1, repoPath)`.
            4. Assert `result.AllImplsDone == false` and `result.Passed == false`.

            Use `require` and `assert` from `github.com/stretchr/testify` as
            the existing tests do. Import `os` and `path/filepath` for test
            setup. Do NOT import any package outside the existing test file's
            import list except those two standard library packages.

            ### Verification gate

            Run:
            ```
            go build ./...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestRunTierGate
            ```

            All must pass with exit code 0. The new tests must not be skipped.

            ### Constraints

            - Do NOT change the signature of `RunTierGate`.
            - Do NOT change `enrichIMPLStatusesFromDisk` or any function in
              `program_status.go`.
            - Do NOT add any new exported functions or types.
            - The fix must be backward-compatible: if repoPath is empty string,
              skip disk enrichment and fall back to manifest values only.
            - The fix must be idempotent: calling RunTierGate multiple times
              produces the same result if the disk state hasn't changed.
          files:
            - pkg/protocol/program_tier_gate.go
            - pkg/protocol/program_tier_gate_test.go
          context_source: prepared-brief
