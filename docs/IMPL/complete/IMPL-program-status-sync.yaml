pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            enrichIMPLStatusesFromDisk searches fixed subdirectory paths
            (docs/IMPL/complete/, docs/IMPL/, etc.) and may miss an IMPL doc
            stored at a custom path via abs_path in the PROGRAM manifest.
          likelihood: low
          impact: medium
          mitigation: |
            The existing enrichIMPLStatusesFromDisk already handles this case the
            same way GetProgramStatus does — it uses abs_path fallback via
            IMPLPath(). No additional handling needed; behavior is consistent
            with the status display path already in production.
        - scenario: |
            The disk read in RunTierGate adds latency for large PROGRAM manifests
            with many IMPLs, since each IMPL doc is read from disk on every
            RunTierGate call.
          likelihood: low
          impact: low
          mitigation: |
            enrichIMPLStatusesFromDisk gracefully swallows read errors and returns
            the fallback status. The function already exists and is used in the hot
            path of program-status. For gate checking (called infrequently at tier
            boundaries), the added latency is negligible.
        - scenario: |
            A test that constructs a PROGRAMManifest with Status="complete" and
            passes an empty repoPath may behave differently after the fix because
            the enrichment is skipped when repoPath=="". Existing tests use the
            manifest values directly.
          likelihood: low
          impact: low
          mitigation: |
            Existing tests pass non-empty repoPath (a tmpDir) but do not write
            IMPL docs there, so enrichIMPLStatusesFromDisk returns fallback values
            (the manifest Status). The existing test behavior is unchanged. The
            agent must verify this by running the existing tests unchanged.
