title: PROGRAM manifest IMPL status sync on finalize-wave
feature_slug: program-status-sync
verdict: SUITABLE
suitability_assessment: |
    The bug is confined to a single protocol function: RunTierGate in
    pkg/protocol/program_tier_gate.go reads impl.Status directly from the
    in-memory PROGRAMManifest struct, which is populated from disk at parse
    time and never refreshed. When finalize-wave completes, WriteCompletionMarker
    sets state: COMPLETE in the IMPL doc on disk, but the PROGRAM manifest's
    impls[].status field is never updated, so RunTierGate always sees "pending".

    Fix direction: enrich IMPL statuses from disk inside RunTierGate before
    performing the completion check, reusing the existing enrichIMPLStatusesFromDisk
    helper that GetProgramStatus already calls. This is a self-contained change
    with no signature modifications: repoPath is already in scope, and the
    helper is already in the same package.

    Suitability: 2 files change (gate logic + test), clearly disjoint. 1 wave,
    1 agent is sufficient. The fix is targeted, well-contained, and testable.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~10 min (1 agent, 2 files, logic + tests)
    - Merge & verification: ~3 min
    Total SAW time: ~18 min

    Sequential baseline: ~12 min
    Time savings: marginal; value is audit trail and interface spec.

    Recommendation: Coordination value independent of speed. The IMPL doc
    provides a clear record of the fix and test coverage expectations.
