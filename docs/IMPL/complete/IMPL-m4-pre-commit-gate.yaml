pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A and Agent B compile independently but gate_discovery import path is wrong at link time
          likelihood: low
          impact: medium
          mitigation: |
            Agent B's prompt explicitly states the import path:
            github.com/blackwell-systems/scout-and-wave-go/pkg/protocol.
            Agent D's build gate catches any import errors before merge.
        - scenario: prepare_wave.go hooks check introduces a nil pointer if verifyHookInstalled returns unexpected error
          likelihood: low
          impact: low
          mitigation: |
            Agent D's prompt specifies the check must be non-blocking. Wrap the call
            in a guard that only prints the warning on non-nil result with Valid==false.
        - scenario: install-hooks appends duplicate snippets if hook content detection is case-sensitive or whitespace-sensitive
          likelihood: medium
          impact: low
          mitigation: |
            Agent C's prompt specifies using strings.Contains on the literal
            "sawtools pre-commit-check" as the idempotency check. This is
            robust to surrounding whitespace.
        - scenario: saw-skill.md update (Agent E) conflicts with concurrent changes on develop branch
          likelihood: low
          impact: low
          mitigation: |
            Agent E works in a different repo (scout-and-wave). No other agents
            touch that file. Low merge conflict risk.
        - scenario: Active IMPL detection in gate_discovery.go incorrectly treats a closed IMPL as active
          likelihood: low
          impact: low
          mitigation: |
            Agent A's prompt explicitly lists the state values to exclude (COMPLETE, CLOSED).
            Test coverage for the state-filtering logic is required.
