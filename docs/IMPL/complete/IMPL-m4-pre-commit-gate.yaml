            ## Task 1: Register commands in main.go

            In `cmd/sawtools/main.go`, add two entries to the `rootCmd.AddCommand(...)` call:
            ```go
            newPreCommitCheckCmd(),
            newInstallHooksCmd(),
            ```
            Add them after `newVerifyHookInstalledCmd()` to keep hook-related commands grouped.

            ## Task 2: Add hooks check warning to prepare-wave

            In `cmd/sawtools/prepare_wave.go`, find the pre-flight check section (before
            worktree creation). Add a non-blocking check: look for a `.git/hooks/pre-commit`
            file in the repo root and check if it contains the string `sawtools pre-commit-check`.
            If the hook is missing or doesn't contain the M4 lint gate call, print a
            warning to stderr:
            ```
            [prepare-wave] WARNING: M4 lint gate hook not installed. Run 'sawtools install-hooks' to enable pre-commit lint checking.
            ```
            This warning must be non-blocking — prepare-wave continues regardless.
            Do NOT call `verifyHookInstalled` — that function checks for SAW isolation
            hooks, not M4 lint gate hooks.

            ## Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/... -run TestPrepareWave
            ```

            ## Constraints
            - Only modify main.go and prepare_wave.go
            - The hooks warning must be non-blocking (never return an error for missing hook)
          files:
