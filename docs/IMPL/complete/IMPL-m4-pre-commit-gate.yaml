interface_contracts:
    - name: DiscoverLintGate
      description: |
        Discovers the active IMPL doc for the given repo directory and returns
        the lint gate command string. Falls back to saw.config.json if no active
        IMPL is found. Returns empty string and nil error if neither is present
        (silent pass).
      definition: |
        // DiscoverLintGate searches for an active IMPL doc under repoDir/docs/IMPL/
        // and extracts the first gate of type "lint". If no IMPL doc is found or
        // none defines a lint gate, it falls back to saw.config.json's lint_command
        // field. Returns ("", nil) if nothing is configured (silent pass).
        func DiscoverLintGate(repoDir string) (command string, err error)
      location: pkg/protocol/gate_discovery.go
    - name: RunPreCommitCheck
      description: |
        Core logic for the pre-commit-check command. Calls DiscoverLintGate,
        runs the lint command if non-empty, and returns exit code 0 on pass
        or 1 on failure. Silent pass (exit 0) if no gate discovered.
      definition: |
        // RunPreCommitCheck discovers and executes the lint gate for the repo.
        // Returns nil on pass (including silent pass with no gate configured).
        // Returns error with lint output on failure.
        func RunPreCommitCheck(repoDir string) error
      location: cmd/sawtools/pre_commit_cmd.go
    - name: newPreCommitCheckCmd
      description: cobra.Command constructor for sawtools pre-commit-check
      definition: |
        func newPreCommitCheckCmd() *cobra.Command
      location: cmd/sawtools/pre_commit_cmd.go
    - name: newInstallHooksCmd
      description: cobra.Command constructor for sawtools install-hooks
      definition: |
        func newInstallHooksCmd() *cobra.Command
      location: cmd/sawtools/install_hooks_cmd.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Implement `pkg/protocol/gate_discovery.go` in the scout-and-wave-go repo
            (`/Users/dayna.blackwell/code/scout-and-wave-go`).

            ## What to implement

            Create `pkg/protocol/gate_discovery.go` with package `protocol`.

            Export one function:

            ```go
            func DiscoverLintGate(repoDir string) (string, error)
            ```

            Discovery logic (in order):
            1. Look for YAML files in `<repoDir>/docs/IMPL/` matching `IMPL-*.yaml`.
               For each file found, parse it as an `IMPLManifest` (use the existing
               `protocol.Load(path)` function already present in the package).
               Check `manifest.State` — only consider manifests whose state is NOT
               "COMPLETE" and NOT "NOT_SUITABLE" (i.e., active IMPLs).
               For each active manifest, scan `manifest.QualityGates.Gates` for a gate
               with `Type == "lint"`. Return `gate.Command` for the first lint gate found.
            2. If no active IMPL with a lint gate is found, look for `<repoDir>/saw.config.json`.
               Parse it as a struct with a top-level `lint_command` string field. Return
               that value if non-empty.
            3. If neither source provides a command, return `("", nil)` — silent pass.

            Return an error only for unexpected I/O failures (malformed YAML is
            non-fatal: skip that file and continue).

            ## Imports to use
            - `os`, `path/filepath`, `strings`
            - `encoding/json` (for saw.config.json parsing)
            - `gopkg.in/yaml.v3` (already a project dependency)
            - Do NOT import cmd packages from pkg/protocol

            ## Tests
            Create `pkg/protocol/gate_discovery_test.go`. Write table-driven tests:
            - No docs/IMPL/ directory: returns ("", nil)
            - IMPL present but state=COMPLETE: skips it, returns ("", nil)
            - Active IMPL with lint gate: returns the command
            - Active IMPL without lint gate, but saw.config.json present: returns config value
            - Both absent: returns ("", nil)
            Use `os.MkdirTemp` for test fixtures.

            ## Verification gate
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestDiscoverLintGate
            ```

            ## Constraints
            - Language-agnostic: do not hardcode any lint command strings
            - Must not modify any existing files
            - Reuse `IMPLManifest`, `QualityGates`, `QualityGate` types from `pkg/protocol/types.go`
          files:
            - pkg/protocol/gate_discovery.go
        - id: B
          task: |
            Implement `cmd/sawtools/pre_commit_cmd.go` in the scout-and-wave-go repo
            (`/Users/dayna.blackwell/code/scout-and-wave-go`).

            ## What to implement

            Create `cmd/sawtools/pre_commit_cmd.go` with package `main`.

            This file provides the `sawtools pre-commit-check` CLI command. It calls
            `protocol.DiscoverLintGate` and runs the result.

            ### Interface contract to implement against

            Agent A (wave 1, parallel) is implementing `protocol.DiscoverLintGate(repoDir string) (string, error)`.
            Use it exactly as specified. The import path is:
            `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`

            ### cobra command

            ```go
            func newPreCommitCheckCmd() *cobra.Command
            ```

            Use: `pre-commit-check`
            Short: `Run lint gate from active IMPL doc (pre-commit hook entry point)`
            Flags: `--repo-dir string` (default: `.`)

            RunE logic:
            1. Call `protocol.DiscoverLintGate(repoDir)`
            2. If err != nil: print error, return err
            3. If command == "": print nothing, return nil (silent pass)
            4. Print `[pre-commit] running lint gate: <command>` to stderr
            5. Execute the command via `exec.Command("sh", "-c", command)` with
               Dir=repoDir, Stdout=os.Stdout, Stderr=os.Stderr
            6. If exit code != 0: return fmt.Errorf("lint gate failed: exit %d", code)
            7. Return nil on success

            Also export a helper used by tests:
            ```go
            func RunPreCommitCheck(repoDir string) error
            ```
            (Same logic as RunE body, minus cobra boilerplate.)

            ## Tests
            Create `cmd/sawtools/pre_commit_cmd_test.go`. Test:
            - Silent pass when DiscoverLintGate would return "" (use a temp dir with no IMPL)
            - Command runs successfully when a valid lint gate is discovered
            Test against `go vet ./...` on the repo itself for the success case.

            ## Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/... -run TestPreCommitCheck
            ```

            ## Constraints
            - Do NOT register the command in main.go (Agent D does that in wave 2)
            - Do NOT modify any existing files
            - Use `github.com/spf13/cobra` (already a project dependency)
          files:
            - cmd/sawtools/pre_commit_cmd.go
        - id: C
          task: |
            Implement `cmd/sawtools/install_hooks_cmd.go` in the scout-and-wave-go repo
            (`/Users/dayna.blackwell/code/scout-and-wave-go`).

            ## What to implement

            Create `cmd/sawtools/install_hooks_cmd.go` with package `main`.

            This file provides the `sawtools install-hooks` CLI command. It installs
            a pre-commit hook that calls `sawtools pre-commit-check`.

            ### cobra command

            ```go
            func newInstallHooksCmd() *cobra.Command
            ```

            Use: `install-hooks`
            Short: `Install SAW pre-commit quality gate hook into .git/hooks/pre-commit`
            Flags: `--repo-dir string` (default: `.`)

            RunE logic:
            1. Resolve the .git directory (handle both regular repos and worktrees,
               same pattern as `verifyHookInstalled` in `verify_hook_installed.go`).
            2. Compute hookPath = `<gitDir>/hooks/pre-commit`
            3. Read existing hook content (empty string if file doesn't exist).
            4. Define the snippet to inject:
               ```
               # SAW pre-commit quality gate (M4)
               sawtools pre-commit-check --repo-dir "$(git rev-parse --show-toplevel)"
               ```
            5. If existing content already contains `sawtools pre-commit-check`: print
               "[install-hooks] already installed" and return nil (idempotent).
            6. If file is empty/missing: write a new hook file:
               ```
               #!/bin/sh
               set -e
               # SAW pre-commit quality gate (M4)
               sawtools pre-commit-check --repo-dir "$(git rev-parse --show-toplevel)"
               ```
            7. If file exists and doesn't already contain the snippet: append the
               snippet to the end of the existing content (preserve existing hooks).
            8. Set file permissions to 0755 (executable).
            9. Print "[install-hooks] pre-commit hook installed at <hookPath>"

            ## Tests
            Create `cmd/sawtools/install_hooks_cmd_test.go`. Test:
            - Fresh install (no existing hook): creates executable hook with correct content
            - Idempotent: running twice does not duplicate the snippet
            - Append mode: existing hook content is preserved, snippet is appended
            Use `os.MkdirTemp` and a synthetic `.git/hooks/` directory for fixtures.

            ## Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/... -run TestInstallHooks
            ```

            ## Constraints
            - Do NOT register the command in main.go (Agent D does that in wave 2)
            - Do NOT modify any existing files
            - Reuse the .git resolution pattern from verify_hook_installed.go for
              consistency (read and follow the same gitdir pointer logic)
          files:
            - cmd/sawtools/install_hooks_cmd.go
