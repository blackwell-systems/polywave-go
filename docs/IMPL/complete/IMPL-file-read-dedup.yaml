pre_mortem:
    overall_risk: low
    rows:
        - scenario: Middleware ordering causes dedup to miss invalidation
          likelihood: low
          impact: medium
          mitigation: |
            WithDedup wraps executors at the innermost layer (before constraints/timing),
            so it sees every write_file/edit_file call. TestWithDedup verifies the
            full invalidation cycle end-to-end.
        - scenario: Large file content hashing adds latency
          likelihood: low
          impact: low
          mitigation: |
            sha256 hashing is fast (~400 MB/s). Agent files are typically <100KB.
            The token savings from dedup far outweigh microseconds of hashing.
        - scenario: Bedrock/OpenAI backends don't get dedup
          likelihood: high
          impact: low
          mitigation: |
            Intentional scope limit. Each backend has its own buildWorkshop or
            equivalent. Follow-up work adds the same one-line WithDedup call.
            The dedup package is backend-agnostic by design.
