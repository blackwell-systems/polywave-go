interface_contracts:
    - name: DedupCache
      description: Per-agent content-hash cache that detects redundant file reads
      definition: |
        package dedup

        import "sync"

        // Cache is a per-agent content-hash cache for file read dedup.
        // It is safe for concurrent use.
        type Cache struct {
            mu      sync.Mutex
            entries map[string]Entry
            Hits    int
            Misses  int
        }

        // Entry records the hash and metadata for a cached file read.
        type Entry struct {
            ContentHash string
            LineCount   int
            ReadAt      time.Time
        }

        // New creates a new empty Cache.
        func New() *Cache

        // Check compares content against the cached hash for path.
        // Returns (true, summary) if content is unchanged since last read.
        // Returns (false, "") if this is a new read or content changed.
        // Updates the cache entry on miss.
        func (c *Cache) Check(path string, content []byte) (deduped bool, summary string)

        // Invalidate removes the cache entry for path.
        // Called when the agent writes or edits a file.
        func (c *Cache) Invalidate(path string)

        // Stats returns current dedup metrics.
        func (c *Cache) Stats() Stats

        // Stats holds dedup metrics for inclusion in completion reports.
        type Stats struct {
            Hits               int
            Misses             int
            TokensSavedEstimate int
        }
      location: pkg/agent/dedup/cache.go
    - name: DedupMiddleware
      description: Tool middleware that intercepts read_file results for dedup and invalidates on write_file/edit_file
      definition: |
        package dedup

        import "github.com/blackwell-systems/scout-and-wave-go/pkg/tools"

        // WithDedup returns a new Workshop where read_file results are deduped
        // and write_file/edit_file calls invalidate the cache.
        // The returned Cache can be queried for Stats() after agent completion.
        func WithDedup(w tools.Workshop) (tools.Workshop, *Cache)
      location: pkg/agent/dedup/middleware.go
    - name: CompletionReport.DedupStats
      description: Dedup metrics field added to CompletionReport for observability
      definition: |
        // Added to CompletionReport struct:
        DedupStats *DedupStats `yaml:"dedup_stats,omitempty" json:"dedup_stats,omitempty"`

        // DedupStats records file-read dedup metrics for an agent's session.
        type DedupStats struct {
            Hits               int `yaml:"hits" json:"hits"`
            Misses             int `yaml:"misses" json:"misses"`
            TokensSavedEstimate int `yaml:"tokens_saved_estimate" json:"tokens_saved_estimate"`
        }
      location: pkg/protocol/types.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Dedup Cache Package

            **What to implement:**
            Create the new `pkg/agent/dedup/` package with the content-hash dedup
            cache and tool middleware. Three files total.

            **File 1: pkg/agent/dedup/cache.go**
            - `Cache` struct with `sync.Mutex`, `map[string]Entry`, hit/miss counters
            - `Entry` struct: `ContentHash string`, `LineCount int`, `ReadAt time.Time`
            - `New() *Cache` constructor
            - `Check(path string, content []byte) (bool, string)`:
              - Compute sha256 hex of content
              - If path exists in cache AND hash matches: increment Hits, return
                `(true, "[file unchanged since last read — N lines, hash XXXXXXXX]")`
              - Otherwise: update cache entry, increment Misses, return `(false, "")`
            - `Invalidate(path string)`: delete entry from map (under lock)
            - `Stats() Stats`: return `Stats{Hits, Misses, TokensSavedEstimate}`
              where TokensSavedEstimate = sum of (LineCount * 4) for each hit
              (4 tokens per line estimate)
            - `Stats` struct: `Hits int`, `Misses int`, `TokensSavedEstimate int`
            - Use `crypto/sha256` and `encoding/hex` — no external deps
            - Skip binary file detection: just hash and dedup like any other file
              (the agent sees the summary either way)

            **File 2: pkg/agent/dedup/middleware.go**
            - `WithDedup(w tools.Workshop) (tools.Workshop, *Cache)`:
              - Create a new `Cache`
              - Wrap `read_file` executor: after calling inner executor, if result
                does not start with "error:", call `cache.Check(path, []byte(result))`.
                If deduped, return the summary string instead of the full content.
              - Wrap `write_file` executor: after calling inner executor, call
                `cache.Invalidate(path)` on the file_path from input
              - Wrap `edit_file` executor: same invalidation pattern as write_file
              - Return the wrapped Workshop and the Cache pointer
            - Follow the same pattern as `tools.WithTiming` and `tools.WithPermissions`
              in `pkg/tools/middleware.go`: iterate `w.All()`, wrap matching tools,
              re-register in a new Workshop

            **File 3: pkg/agent/dedup/cache_test.go**
            - `TestCheckMiss`: first read returns (false, "")
            - `TestCheckHit`: same content read twice returns (true, summary)
            - `TestCheckChanged`: different content returns (false, "")
            - `TestInvalidate`: invalidated path returns miss on next read
            - `TestStats`: verify Hits/Misses/TokensSavedEstimate counts
            - `TestConcurrentAccess`: launch 10 goroutines doing Check/Invalidate
              in parallel, verify no races (run with -race)
            - `TestWithDedup`: create a StandardTools workshop, wrap with WithDedup,
              execute read_file twice on same temp file, verify second call returns
              dedup summary. Execute write_file, verify next read_file returns full
              content (cache invalidated).

            **Interface contracts (binding):**
            - `func New() *Cache`
            - `func (c *Cache) Check(path string, content []byte) (deduped bool, summary string)`
            - `func (c *Cache) Invalidate(path string)`
            - `func (c *Cache) Stats() Stats`
            - `func WithDedup(w tools.Workshop) (tools.Workshop, *Cache)`

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test -race ./pkg/agent/dedup/...
            ```

            **Constraints:**
            - No external dependencies. Only stdlib + pkg/tools from this repo.
            - Package path must be `pkg/agent/dedup/` (not `pkg/dedup/` or `pkg/tools/dedup/`)
            - Do NOT modify any existing files. Only create new files.
          files:
            - pkg/agent/dedup/cache.go
            - pkg/agent/dedup/middleware.go
            - pkg/agent/dedup/cache_test.go
