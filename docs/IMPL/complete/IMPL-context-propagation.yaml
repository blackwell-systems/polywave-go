    rows:
        - scenario: |-
            Agent A and Agent B both depend on manifest.go's Load() and Save() wrapper
            signatures. Agent A owns manifest.go and may remove ctx from Load/Save. Agent B
            calls Load(ctx, ...) and Save(ctx, ...) in its protocol files. If Agent A
            removes ctx from Load/Save while Agent B adds ctx threading to those calls, the
            two agents produce contradictory changes to the same interface. At merge time
            the build will fail.
          likelihood: medium
          impact: high
          mitigation: |-
            Agreed split: Agent A removes ctx from LoadYAML/SaveYAML (the primitives) and
            updates manifest.go's Load/Save to no longer accept or forward ctx. Agent B
            updates the internal Load/Save calls in its protocol files from
            Load(context.TODO(), path) to Load(path) — matching Agent A's new signature.
            The two agents coordinate via the interface contract: Load(path) and Save(manifest, path).
            Both agents must read the Load/Save signatures in manifest.go before starting.
        - scenario: |-
            Agent B's autoRemediateVerifyBuildFunc and daemonCreateWorktreesFunc are
            package-level function vars. Their function type signatures must match the
            new protocol signatures. If test files in pkg/engine/ override these vars,
            those test files also need updating — but they are not in Agent B's file list.
          likelihood: medium
