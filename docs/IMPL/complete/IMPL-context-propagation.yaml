title: Context Propagation in pkg/protocol (IMPL 4)
feature_slug: context-propagation
verdict: SUITABLE
suitability_assessment: |
    IMPL 4 from the Go Engine refactor audit. Two fully independent changes to
    pkg/protocol/ that can run in parallel:

    1. Issue 11 (Decision 1 - Choice A): Remove `ctx context.Context` from
       LoadYAML and SaveYAML. The parameter is a no-op today (body reads
       `_ = ctx`). Remove it and clean up all ~26 call sites that pass
       context.TODO() or context.Background() to these functions.

    2. Issues 5 and 14: Add `ctx context.Context` as first parameter to six
       protocol functions that run git/shell commands without cancellation
       support: SetImplState, UpdateStatus, VerifyBuild (and its internal
       runCommand), MergeAgents, CreateWorktrees, AppendStubReport, and
       PopulateVerificationGates. Their engine and sawtools callers already
       carry a live ctx and can pass it directly.

    File ownership is disjoint: Agent A owns the yaml_io.go definition file
    plus all call sites that pass ctx to LoadYAML/SaveYAML. Agent B owns the
    seven protocol function definition files plus the engine/cmd caller files
    that invoke those functions. No file appears in both lists.

    The two agents do not share any interface contracts: Agent B's new
    signatures are not consumed by Agent A (Agent A is removing a ctx parameter,
    not adding one). No scaffolds are needed.

    Prerequisite: IMPL 3 (engine-structural-debt) must be complete before
    merging IMPL 4, because runner.go and finalize.go are excluded from Agent
    B's scope as IMPL 3 territory. Agent B updates the engine caller files
    that are NOT runner.go or finalize.go.

    Estimated times:
    - Scout phase: ~15 min (dependency tracing, contract definitions)
    - Agent A execution: ~20 min (mechanical ctx removal across 26 files)
    - Agent B execution: ~25 min (ctx threading + runCommand exec.CommandContext update)
    - Merge and verification: ~5 min
    Total SAW time: ~45 min
    Sequential baseline: ~60 min
    Time savings: ~15 min (25% faster). Clear speedup on a mechanical change.
