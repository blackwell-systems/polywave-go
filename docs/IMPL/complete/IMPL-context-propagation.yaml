            ## 2. Interfaces You Must Implement

            ```go
            // pkg/protocol/yaml_io.go — AFTER this change:
            func LoadYAML[T any](path string) (T, error)
            func SaveYAML[T any](path string, v T) error
            ```

            IMPORTANT: `manifest.go` likely contains `Load()` and `Save()` wrapper
            functions that forward ctx to LoadYAML/SaveYAML. Read manifest.go first
            to understand whether Load/Save also need their ctx parameter removed or
            only the forwarding arg to LoadYAML/SaveYAML updated.

            The file `pkg/protocol/yaml_io.go` header comment lists all EXEMPT call sites
            (yaml.Node API users, stdout encoders, in-memory callers). Do NOT modify those
            files — they don't call LoadYAML/SaveYAML at all.

            ## 3. Interfaces You May Call

            These are the existing signatures before your change (for reference):
            ```go
            // BEFORE (what you're removing):
            func LoadYAML[T any](ctx context.Context, path string) (T, error)
            func SaveYAML[T any](ctx context.Context, path string, v T) error
            ```

            ## 4. What to Implement

            **Step 1: Update yaml_io.go**
            - Remove `ctx context.Context` parameter from both `LoadYAML` and `SaveYAML`
            - Remove the `_ = ctx // reserved for future cancellation support` line from each
            - Remove the `"context"` import (it will no longer be used)
            - The function bodies are otherwise unchanged

            **Step 2: Update all call sites**
            The mechanical pattern is: every call that currently looks like:
            ```go
            LoadYAML[T](context.TODO(), path)
            LoadYAML[T](context.Background(), path)
            SaveYAML[T](context.TODO(), path, v)
            Save(context.TODO(), manifest, path)
            Load(context.TODO(), path)
            ```
            becomes:
            ```go
            LoadYAML[T](path)
            SaveYAML[T](path, v)
            Save(manifest, path)
            Load(path)
            ```

            After removing the ctx argument, if the file no longer uses `context` at all,
            remove the `"context"` import. If the file still uses context for other purposes,
            leave the import.

            **Step 3: grep validation**
            After making all changes, run:
            ```bash
            grep -rn 'LoadYAML.*context\.\|SaveYAML.*context\.' pkg/ cmd/
            ```
            This should produce zero matches. Any remaining match is a missed call site.

            **IMPORTANT — manifest.go wrappers:**
            The `Load()` and `Save()` functions in manifest.go are higher-level wrappers
            around LoadYAML/SaveYAML. They may also accept a ctx parameter that they pass
            through to LoadYAML/SaveYAML. If so:
            - You own manifest.go, so you may remove ctx from Load() and Save() signatures too
            - BUT: Agent B's files call Load(context.TODO(), path) and Save(context.TODO(), ...).
              Agent B's changes will update those call sites. Do not try to update Agent B's
              call sites — they are out of scope for you.
            - Your job is only to update the call sites in YOUR owned files and the
              yaml_io.go definitions.

            If `Load()` and `Save()` will also have their ctx removed (because they only
            forward to LoadYAML/SaveYAML), make that change in manifest.go. Agent B will
            independently update their call sites to match.

            ## 5. Tests to Write

            No new tests are required for this change — it is a pure mechanical API cleanup
            with no behavior change. However, verify that existing tests still compile and
            pass after your changes (the verification gate handles this).

            If any test file in a package you own calls LoadYAML/SaveYAML with ctx, update
            the test file too (test files that call these functions are in scope even if
            not listed above — follow the same pattern).

