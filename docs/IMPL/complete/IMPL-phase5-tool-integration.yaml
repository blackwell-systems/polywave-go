pre_mortem:
  overall_risk: low
  rows:
    - scenario: Language inference misidentifies toolchain
      likelihood: low
      impact: medium
      mitigation: |
        Test coverage includes edge cases (Rust/Go substring match).
        Worst case: diagnosis not appended, manual investigation required.
    - scenario: Validator performance impact on large IMPL docs
      likelihood: low
      impact: low
      mitigation: |
        Agent ID validation is O(n) where n = agent count. Even 234 agents (max)
        is trivially fast. E16 validation already scans entire doc.
    - scenario: run-scout slug collision with existing IMPL doc
      likelihood: low
      impact: low
      mitigation: |
        User receives clear error when writing to existing path. Manual rename
        or deletion required (expected behavior for duplicate features).
