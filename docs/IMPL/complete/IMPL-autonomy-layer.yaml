        - id: G
          task: |
            ## What to Implement
            Implement CLI commands for queue management in cmd/saw/queue_cmd.go.

            Create 3 subcommands under a `queue` parent command:

            1. `sawtools queue add --title "..." --priority N --description "..."`
               - Creates a queue item via queue.Manager.Add()
               - Outputs JSON: {"added": true, "slug": "...", "path": "..."}

            2. `sawtools queue list`
               - Lists all queue items via queue.Manager.List()
               - Outputs JSON array of items with status, priority, title

            3. `sawtools queue next`
               - Returns next eligible item via queue.Manager.Next()
               - Outputs JSON: {"slug": "...", "title": "...", "priority": N}
               - Outputs {"next": null} if no eligible items

            Use cobra's subcommand pattern:
            ```go
            func newQueueCmd() *cobra.Command {
                cmd := &cobra.Command{Use: "queue", Short: "Manage IMPL queue"}
                cmd.AddCommand(newQueueAddCmd(), newQueueListCmd(), newQueueNextCmd())
                return cmd
