            2. TestCheckQueue_AutonomyBlocked — gated level blocks advance
            3. TestCheckQueue_Advances — supervised level advances
            4. TestCheckQueue_RespectsOverride — item with gated override blocks
            5. TestCheckQueue_EmitsEvent — queue_advanced event fires

