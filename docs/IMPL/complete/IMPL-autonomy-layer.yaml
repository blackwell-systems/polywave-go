    - number: 3
      agents:
        - id: H
          task: |
            ## What to Implement
            Implement the daemon run loop (R4) in pkg/engine/daemon.go.

            The daemon is a persistent loop that processes IMPL queue items and
            auto-advances through the full Scout -> Wave -> Merge -> Complete cycle.

            1. Define types:
               ```go
               type DaemonOpts struct {
                   RepoPath        string
                   AutonomyConfig  autonomy.Config
                   SAWRepoPath     string           // for Scout agent
                   ChatModel       string           // default model
                   PollInterval    time.Duration     // how often to check queue (default: 30s)
                   OnEvent         func(Event)
               }

               type DaemonState struct {
                   Running          bool   `json:"running"`
                   CurrentIMPL      string `json:"current_impl,omitempty"`
                   CurrentWave      int    `json:"current_wave,omitempty"`
                   QueueDepth       int    `json:"queue_depth"`
                   CompletedCount   int    `json:"completed_count"`
                   BlockedCount     int    `json:"blocked_count"`
               }
               ```

            2. `RunDaemon(ctx context.Context, opts DaemonOpts) error`
               Main loop (runs until ctx is cancelled):
               a. Check queue via CheckQueue()
               b. If no items, sleep PollInterval, continue
               c. If item found and autonomy permits:
                  i.  Run Scout (engine.RunScout) to generate IMPL
                  ii. If autonomy level is supervised, pause for human review
                      (emit "daemon_awaiting_review" event and wait)
                  iii. For each wave in the IMPL:
                       - Create worktrees
                       - Run wave (orchestrator.RunWave)
                       - Finalize wave
                       - If finalize fails and autonomy permits, AutoRemediate (R1)
                       - If still failing, mark blocked and move to next queue item
                  iv. Mark IMPL complete
                  v.  Update queue item status to "complete"
                  vi. Advance queue (back to step a)

            3. `StopDaemon()` — cancel function (ctx cancellation)

            Note: The daemon does NOT need to implement the full orchestrator flow
            in detail. It should call existing engine functions via function variables
            (for testability):
            - engine.RunScout (existing)
            - engine.FinalizeWave (existing)
            - engine.AutoRemediate (Wave 2, Agent D)
            - engine.CheckQueue (Wave 2, Agent F)
            - engine.MarkIMPLComplete (existing)

            ## Tests to Write
            1. TestRunDaemon_ProcessesOneItem — mock queue with one item, verify full cycle
            2. TestRunDaemon_StopsOnCancel — verify clean shutdown via context
            3. TestRunDaemon_EmptyQueue — sleeps and polls
            4. TestRunDaemon_AutoRemediatesOnFailure — verify R1 integration
            5. TestRunDaemon_PausesForReview — supervised mode pauses at impl_review
            6. TestRunDaemon_EmitsEvents — verify all daemon events fire

            Mock all engine functions via function variables.

            ## Verification Gate
            ```bash
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/ -run TestRunDaemon
            ```

            ## Constraints
            - Use context cancellation for clean shutdown
            - Emit events: "daemon_started", "daemon_poll", "daemon_processing",
              "daemon_awaiting_review", "daemon_wave_complete", "daemon_impl_complete",
              "daemon_blocked", "daemon_stopped"
            - Max concurrent IMPLs: 1 (sequential processing)
            - Use function variables for engine calls so tests can mock them
            - Import pkg/autonomy for level checking
            - Import pkg/queue for Manager
          files:
            - pkg/engine/daemon.go
            - pkg/engine/daemon_test.go
          dependencies:
            - D
            - E
            - F
    - number: 4
      agents:
        - id: I
          task: |
            ## What to Implement
            Implement the daemon CLI command in cmd/saw/daemon_cmd.go.

            1. `sawtools daemon --repo-dir <path> --autonomy <level> [--model <model>] [--poll-interval <duration>]`
               - Loads autonomy config from saw.config.json (via autonomy.LoadConfig)
               - Overrides level if --autonomy flag is set
               - Creates DaemonOpts and calls engine.RunDaemon
               - Handles SIGINT/SIGTERM for clean shutdown
               - Streams daemon events as JSON lines to stdout

            2. Signal handling:
               - Trap SIGINT and SIGTERM
               - Cancel context on signal receipt
               - Print "daemon shutting down..." message
               - Wait for RunDaemon to return cleanly

            ## Interfaces to Call
            - `autonomy.LoadConfig(repoDir)` — load config (Wave 1, Agent B)
            - `autonomy.ParseLevel(levelStr)` — validate --autonomy flag (Wave 1, Agent A)
            - `engine.RunDaemon(ctx, opts)` — daemon loop (Wave 3, Agent H)

            ## Tests to Write
            1. TestDaemonCmd_Flags — verify flag parsing
            2. TestDaemonCmd_DefaultConfig — uses saw.config.json
