suitability_assessment: |
    SUITABLE. The autonomy layer decomposes into 6 requirements (R0-R5) spanning
    a new pkg/autonomy/ package, a new pkg/queue/ package, extensions to
    pkg/engine/ and pkg/orchestrator/, 5 new CLI commands, and frontend components
    in the secondary repo. All interfaces are discoverable from the seed document.
    The existing retry/fixbuild infrastructure (retryctx, retry.RetryLoop,
    engine.FixBuildFailure) provides a strong foundation for R1 auto-remediation.
    R5 pipeline visualization is scoped to the secondary web repo and will be a
    separate IMPL after this one completes.
