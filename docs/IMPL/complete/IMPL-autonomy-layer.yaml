pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Circular import between pkg/engine and pkg/autonomy
          likelihood: low
          impact: high
          mitigation: |
            pkg/autonomy is designed as a leaf package with zero internal imports.
            Engine imports autonomy, not the reverse. Agents must not add imports
            from autonomy back to engine.
        - scenario: Daemon test flakiness from timing/polling
          likelihood: medium
          impact: medium
          mitigation: |
            Agent H should use function variables for all engine calls and test
            with deterministic mock functions. No real sleep in tests — use
            channels for synchronization.
        - scenario: Queue file format changes break across agents
          likelihood: low
          impact: medium
          mitigation: |
            Queue Item type is defined in scaffold (types.go). All agents read
            the same type definition. Agent C owns the only code that reads/writes
            queue files.
        - scenario: Auto-remediation loop runs unbounded if MaxRetries is misconfigured
          likelihood: low
          impact: high
          mitigation: |
            AutoRemediate enforces MaxRetries hard cap. Default is 2. Config
            validation in LoadConfig should reject negative values.
        - scenario: FixBuildFailure function variable not mockable in auto_remediate_test.go
          likelihood: medium
          impact: medium
          mitigation: |
            Agent D must define a package-level function variable (like existing
            patterns in orchestrator.go: newBackendFunc, mergeWaveFunc) to allow
            test injection of mock FixBuildFailure.
