interface_contracts:
    - name: ShouldAutoApprove
      description: |
        Central decision function checked at every autonomy decision point.
        All R1-R4 features call this instead of hardcoding behavior.
      definition: |
        func ShouldAutoApprove(level Level, stage Stage) bool
      location: pkg/autonomy/autonomy.go
    - name: LoadConfig
      description: |
        Loads autonomy configuration from saw.config.json in the repo root.
        Falls back to DefaultConfig() if file is missing.
      definition: |
        func LoadConfig(repoPath string) (Config, error)
      location: pkg/autonomy/config.go
    - name: EffectiveLevel
      description: |
        Returns the effective autonomy level, considering per-IMPL override.
        If overrideLevel is non-empty, it takes precedence over config.Level.
      definition: |
        func EffectiveLevel(cfg Config, overrideLevel string) Level
      location: pkg/autonomy/autonomy.go
    - name: AutoRemediate
      description: |
        Engine-level function that auto-remediates a failed FinalizeWave result.
        Uses existing retryctx + FixBuildFailure. Returns updated result after fix.
      definition: |
        func AutoRemediate(ctx context.Context, opts AutoRemediateOpts) (*AutoRemediateResult, error)
      location: pkg/engine/auto_remediate.go
    - name: ClosedLoopGateRetry
      description: |
        Pre-merge per-agent gate retry. When a retryable gate fails, sends error
        context to the responsible agent in its worktree for a fix attempt.
      definition: |
        func ClosedLoopGateRetry(ctx context.Context, opts ClosedLoopRetryOpts) (*ClosedLoopRetryResult, error)
      location: pkg/engine/closed_loop_gate.go
    - name: queue.Manager
      description: |
        Manages the IMPL queue directory (docs/IMPL/queue/).
        Provides Add, List, Next, UpdateStatus operations.
      definition: |
        type Manager struct { ... }
        func NewManager(repoPath string) *Manager
        func (m *Manager) Add(item Item) error
        func (m *Manager) List() ([]Item, error)
        func (m *Manager) Next() (*Item, error)
        func (m *Manager) UpdateStatus(slug string, status string) error
      location: pkg/queue/manager.go
    - name: CheckQueue
      description: |
        Called after MarkIMPLComplete. If autonomy allows, triggers Scout for
        the next eligible queue item.
      definition: |
        func CheckQueue(ctx context.Context, opts CheckQueueOpts) (*CheckQueueResult, error)
      location: pkg/engine/queue_advance.go
    - name: RunDaemon
      description: |
        Engine-level daemon loop. Processes queue items, runs Scout/Wave cycles,
        auto-remediates failures, advances queue.
      definition: |
        func RunDaemon(ctx context.Context, opts DaemonOpts) error
      location: pkg/engine/daemon.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement
            Implement the core autonomy decision logic in pkg/autonomy/autonomy.go.

            The scaffold file will already contain the Level, Stage, Config types and
            DefaultConfig(). You need to implement:

            1. `ShouldAutoApprove(level Level, stage Stage) bool` — the central decision
               function. Behavior matrix:
               - gated: always returns false (all stages require human approval)
               - supervised:
                 - impl_review: false (human approves)
                 - wave_advance: true (auto-advance)
                 - gate_failure: true (auto-fix)
                 - queue_advance: true (auto-scout, but impl_review still gated)
               - autonomous:
                 - All stages: true

            2. `EffectiveLevel(cfg Config, overrideLevel string) Level` — returns
               overrideLevel if non-empty and valid, otherwise cfg.Level. This supports
               per-IMPL queue item overrides.

            3. `ParseLevel(s string) (Level, error)` — validates a string is a valid
               autonomy level. Returns error for unknown values.

            ## Tests to Write
            1. TestShouldAutoApprove_Gated — all stages return false
            2. TestShouldAutoApprove_Supervised — matrix test for each stage
            3. TestShouldAutoApprove_Autonomous — all stages return true
            4. TestEffectiveLevel_Override — override takes precedence
            5. TestEffectiveLevel_NoOverride — falls back to config
            6. TestParseLevel_Valid — all three levels parse correctly
            7. TestParseLevel_Invalid — unknown string returns error

            ## Verification Gate
            ```bash
            go build ./pkg/autonomy/...
            go vet ./pkg/autonomy/...
            go test ./pkg/autonomy/...
            ```

            ## Constraints
            - Do NOT import any other pkg/ packages — autonomy is a leaf package
            - Keep types minimal — no complex logic, just level checking
            - The scaffold already defines Level, Stage, Config, DefaultConfig — build on them
          files:
            - pkg/autonomy/autonomy.go
            - pkg/autonomy/autonomy_test.go
        - id: B
          task: |
            ## What to Implement
            Implement configuration loading in pkg/autonomy/config.go.

            1. `LoadConfig(repoPath string) (Config, error)` — loads autonomy config
               from `<repoPath>/saw.config.json`. The JSON structure is:
               ```json
               {
                 "autonomy": {
                   "level": "supervised",
                   "max_auto_retries": 2,
                   "max_queue_depth": 10
                 }
               }
               ```
               If the file doesn't exist, return DefaultConfig() with no error.
               If the file exists but has invalid JSON, return error.
               If the autonomy section is missing, return DefaultConfig().

            2. `SaveConfig(repoPath string, cfg Config) error` — writes the config
               back to saw.config.json. Reads existing file first to preserve other
               sections, then updates the "autonomy" key.

            The Config struct and DefaultConfig() are defined in the scaffold
            (autonomy.go). Import and use them.

            ## Tests to Write
            1. TestLoadConfig_NoFile — returns DefaultConfig, no error
            2. TestLoadConfig_ValidFile — parses all fields correctly
            3. TestLoadConfig_InvalidJSON — returns error
            4. TestLoadConfig_MissingAutonomySection — returns DefaultConfig
            5. TestSaveConfig_NewFile — creates saw.config.json
            6. TestSaveConfig_PreservesOtherKeys — doesn't clobber existing config

            ## Verification Gate
            ```bash
            go build ./pkg/autonomy/...
            go vet ./pkg/autonomy/...
            go test ./pkg/autonomy/...
            ```

            ## Constraints
            - Use encoding/json for parsing — no external dependencies
            - Use os.ReadFile / os.WriteFile — no complex file handling
            - Preserve unknown keys in saw.config.json when saving (use map[string]any)
          files:
            - pkg/autonomy/config.go
            - pkg/autonomy/config_test.go
        - id: C
          task: |
            ## What to Implement
            Implement the IMPL queue manager in pkg/queue/.

            The scaffold provides the Item type in types.go. You need to implement
            pkg/queue/manager.go with:

            1. `type Manager struct` — holds repoPath, manages docs/IMPL/queue/ directory
            2. `NewManager(repoPath string) *Manager`
            3. `(m *Manager) Add(item Item) error` — writes item as YAML to
               docs/IMPL/queue/{priority:03d}-{slug}.yaml. Auto-generates slug from
               title if item.Slug is empty (lowercase, hyphens, no special chars).
               Sets status to "queued" if empty.
            4. `(m *Manager) List() ([]Item, error)` — reads all YAML files in
               docs/IMPL/queue/, sorts by priority (ascending), returns slice.
               Populates FilePath field on each item.
            5. `(m *Manager) Next() (*Item, error)` — returns the highest-priority
               (lowest number) item whose status is "queued" AND all depends_on
               slugs have status "complete" (checked by scanning queue dir and
               docs/IMPL/complete/ for matching IMPL files). Returns nil if no
               eligible item.
            6. `(m *Manager) UpdateStatus(slug string, status string) error` —
               updates the status field in the queue item's YAML file.

            ## Tests to Write
            1. TestAdd_CreatesFile — file appears in queue dir with correct YAML
            2. TestAdd_AutoSlug — generates slug from title
            3. TestList_SortsByPriority — lower priority number comes first
            4. TestList_EmptyDir — returns empty slice, no error
            5. TestNext_ReturnsHighestPriority — picks lowest priority number
            6. TestNext_SkipsDependencies — item with unmet deps is skipped
            7. TestNext_NoneEligible — returns nil when all blocked
            8. TestUpdateStatus — status field changes in file

            Use t.TempDir() for all tests.

            ## Verification Gate
            ```bash
            go build ./pkg/queue/...
            go vet ./pkg/queue/...
            go test ./pkg/queue/...
            ```

            ## Constraints
            - Use gopkg.in/yaml.v3 for YAML (already in go.mod)
            - Use os.ReadDir to list queue directory
            - Queue directory is docs/IMPL/queue/ relative to repoPath
            - Create queue directory in Add() if it doesn't exist (os.MkdirAll)
            - File naming: {priority:03d}-{slug}.yaml (e.g., 001-dark-mode.yaml)
          files:
            - pkg/queue/types.go
            - pkg/queue/manager.go
            - pkg/queue/manager_test.go
    - number: 2
      agents:
        - id: D
          task: |
            ## What to Implement
            Implement auto-remediation (R1) in pkg/engine/auto_remediate.go.

            When FinalizeWave returns BuildPassed=false, the orchestrator should
            automatically attempt to fix the failure. This function wires existing
            infrastructure (retryctx, engine.FixBuildFailure) into an automated loop.

            1. Define types:
               ```go
               type AutoRemediateOpts struct {
                   IMPLPath       string
                   RepoPath       string
                   WaveNum        int
                   FailedResult   *FinalizeWaveResult  // the failed finalize result
                   MaxRetries     int                   // from autonomy.Config.MaxAutoRetries
                   ChatModel      string                // model for fix agent
                   OnEvent        func(Event)           // progress events
               }

               type AutoRemediateResult struct {
                   Fixed          bool                  `json:"fixed"`
                   Attempts       int                   `json:"attempts"`
                   FinalResult    *FinalizeWaveResult   `json:"final_result"`
               }
               ```

            2. `AutoRemediate(ctx context.Context, opts AutoRemediateOpts) (*AutoRemediateResult, error)`
               Loop up to MaxRetries times:
               a. Extract error log from FailedResult.VerifyBuild (TestOutput + LintOutput)
               b. Determine gate type from which gate failed
               c. Call engine.FixBuildFailure with error context
               d. After fix agent completes, re-run protocol.VerifyBuild
               e. If build passes, return Fixed=true
               f. If still failing, increment attempt, loop
               g. After MaxRetries exhausted, return Fixed=false

            ## Interfaces to Call
            - `engine.FixBuildFailure(ctx, FixBuildOpts)` — existing AI fixer in pkg/engine/fix_build.go
            - `protocol.VerifyBuild(implPath, repoPath)` — re-run gates after fix
            - Event publishing via opts.OnEvent callback

            ## Tests to Write
            1. TestAutoRemediate_FixesOnFirstAttempt — mock FixBuildFailure + VerifyBuild
            2. TestAutoRemediate_FixesOnSecondAttempt — first fix fails, second succeeds
            3. TestAutoRemediate_ExhaustsRetries — all retries fail, returns Fixed=false
            4. TestAutoRemediate_ZeroRetries — returns immediately with Fixed=false
            5. TestAutoRemediate_EmitsEvents — verify event callbacks fire

            Use package-level function variables for FixBuildFailure and VerifyBuild
            so tests can mock them without real builds. Follow the same pattern as
            orchestrator.go (newBackendFunc, mergeWaveFunc, etc).

            ## Verification Gate
            ```bash
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/ -run TestAutoRemediate
            ```

            ## Constraints
            - Do NOT modify finalize.go — the integration agent will wire this in later
            - Use function variables for FixBuildFailure and VerifyBuild for testability
            - Import pkg/autonomy for Level checking (ShouldAutoApprove)
            - Emit events: "auto_remediate_started", "auto_remediate_attempt",
              "auto_remediate_success", "auto_remediate_exhausted"
          files:
            - pkg/engine/auto_remediate.go
            - pkg/engine/auto_remediate_test.go
          dependencies:
            - A
        - id: E
          task: |
            ## What to Implement
            Implement closed-loop per-agent gate retry (R3) in
            pkg/engine/closed_loop_gate.go.

            This differs from R1 auto-remediation: R1 handles POST-merge build
            failures (whole-wave). R3 handles PRE-merge gate failures on individual
            agents still in their worktrees.

            1. Define types:
               ```go
               type ClosedLoopRetryOpts struct {
                   IMPLPath      string
                   RepoPath      string
                   WaveNum       int
                   AgentID       string                // which agent's gate failed
                   GateType      string                // "build", "test", "lint"
                   GateCommand   string                // exact command that failed
                   GateOutput    string                // error output from the gate
                   WorktreePath  string                // agent's worktree path
                   MaxRetries    int                   // per-gate retry limit
                   ChatModel     string                // model for retry agent
                   OnEvent       func(Event)
               }

               type ClosedLoopRetryResult struct {
                   Fixed      bool   `json:"fixed"`
                   Attempts   int    `json:"attempts"`
                   AgentID    string `json:"agent_id"`
                   GateOutput string `json:"final_gate_output"`
               }
               ```

            2. `ClosedLoopGateRetry(ctx context.Context, opts ClosedLoopRetryOpts) (*ClosedLoopRetryResult, error)`
               Loop up to MaxRetries:
               a. Build a fix prompt with gate output + error classification
                  (use retryctx.ClassifyError and retryctx.SuggestFixes)
               b. Launch a fix agent in the agent's worktree (not main repo)
                  using orchestrator.NewBackendFromModel
               c. After fix agent completes, re-run the gate command in the worktree
                  (use os/exec.CommandContext)
               d. If gate passes, return Fixed=true
               e. If still failing, loop

            ## Interfaces to Call
            - `retryctx.ClassifyError(output)` — error classification (existing)
            - `retryctx.SuggestFixes(class)` — fix suggestions (existing)
            - `orchestrator.NewBackendFromModel(model)` — backend creation (existing)
            - `agent.NewRunner(backend, nil)` — agent runner (existing)

            ## Tests to Write
            1. TestClosedLoopGateRetry_FixesOnFirstAttempt
            2. TestClosedLoopGateRetry_ExhaustsRetries
            3. TestClosedLoopGateRetry_EmitsEvents
            4. TestClosedLoopGateRetry_RunsInWorktree — verify commands run in wtPath

            Mock the backend and exec commands for tests using function variables.

            ## Verification Gate
            ```bash
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/ -run TestClosedLoop
            ```

            ## Constraints
            - Work in the WORKTREE directory, not main repo
            - Use exec.CommandContext for running gate commands
            - Import retryctx for error classification
            - Import orchestrator for NewBackendFromModel
            - Emit events: "closed_loop_started", "closed_loop_attempt",
              "closed_loop_fixed", "closed_loop_exhausted"
          files:
            - pkg/engine/closed_loop_gate.go
            - pkg/engine/closed_loop_gate_test.go
          dependencies:
            - A
        - id: F
          task: |
            ## What to Implement
            Implement queue advance logic (R2 engine side) in
            pkg/engine/queue_advance.go.

            After MarkIMPLComplete succeeds, the engine should check the queue and
            auto-trigger Scout for the next eligible item.

            1. Define types:
               ```go
               type CheckQueueOpts struct {
                   RepoPath       string
                   AutonomyConfig autonomy.Config
                   OnEvent        func(Event)
               }

               type CheckQueueResult struct {
                   Advanced       bool   `json:"advanced"`
                   NextSlug       string `json:"next_slug,omitempty"`
                   NextTitle      string `json:"next_title,omitempty"`
                   Reason         string `json:"reason"` // "no_items", "deps_unmet", "autonomy_blocked", "triggered"
               }
               ```

            2. `CheckQueue(ctx context.Context, opts CheckQueueOpts) (*CheckQueueResult, error)`
               a. Create a queue.Manager for the repo
               b. Call manager.Next() to find next eligible item
               c. If no item, return Advanced=false, Reason="no_items"
               d. Check autonomy: call autonomy.ShouldAutoApprove(level, StageQueueAdvance)
               e. If autonomy says no, return Reason="autonomy_blocked"
               f. If autonomy says yes, update queue item status to "in_progress"
                  and return Advanced=true with the item details
               g. The actual Scout trigger is the caller's responsibility (daemon or web app)

            ## Interfaces to Call
