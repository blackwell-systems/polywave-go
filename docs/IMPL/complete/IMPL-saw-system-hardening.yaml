        - id: E
          task: |
            ## Problem 5 — Build gate before agent commit in pre-commit hook

            ### Context
            The pre-commit hook installed by `sawtools install-hooks` runs
            `RunPreCommitCheck`, which calls `protocol.DiscoverLintGate(repoDir)` and
            executes only the lint gate (typically `go vet ./...`). An agent can commit
            code that passes `go vet` but produces type errors in callers
            (`go build ./...` fails). The build failure is only discovered at
            `finalize-wave` when all agents' branches are merged and the full build runs.

            Fix: extend the pre-commit hook to also discover and run a build gate.

            ### What to implement

            **File 1: `pkg/protocol/gate_discovery.go`**

            1. Extend the `sawConfig` struct with a `BuildCommand` field:
               ```go
               type sawConfig struct {
                   LintCommand  string `json:"lint_command"`
                   BuildCommand string `json:"build_command"`
               }
               ```

            2. Add `DiscoverBuildGate` matching the interface contract:
               ```go
               // DiscoverBuildGate searches for an active IMPL doc under repoDir/docs/IMPL/
               // and extracts the first gate of type "build". Falls back to saw.config.json
               // build_command field. Returns ("", nil) if nothing is configured.
               func DiscoverBuildGate(repoDir string) (string, error)
               ```
               Implementation mirrors `DiscoverLintGate` exactly, with two changes:
               - Filter `gate.Type == "build"` instead of `gate.Type == "lint"`.
               - In the config fallback, return `cfg.BuildCommand` instead of
                 `cfg.LintCommand`.

            **File 2: `pkg/protocol/gate_discovery_test.go`**

            Add `TestDiscoverBuildGate` with these cases (mirror `TestDiscoverLintGate`
            structure):
            - No IMPL doc present: returns `("", nil)`.
            - IMPL doc with `type: build` gate: returns the gate command.
            - IMPL doc with no build gate but `saw.config.json` has `build_command`:
              returns the config value.
            - IMPL doc in StateComplete: skipped; returns `("", nil)`.
            - IMPL doc with build gate scoped to different repo: skipped.

            **File 3: `cmd/sawtools/pre_commit_cmd.go`**

            Refactor `RunPreCommitCheck` to run both lint and build gates:

            ```go
            func RunPreCommitCheck(repoDir string) error {
                // Lint gate (existing behavior)
                lintCmd, err := protocol.DiscoverLintGate(repoDir)
                if err != nil {
                    return fmt.Errorf("pre-commit-check: %w", err)
                }
                if lintCmd != "" {
                    fmt.Fprintf(os.Stderr, "[pre-commit] running lint gate: %s\n", lintCmd)
                    if err := runGateCommand(repoDir, lintCmd); err != nil {
                        return err
                    }
                }

                // Build gate (new — runs after lint so lint fails fast)
                buildCmd, err := protocol.DiscoverBuildGate(repoDir)
                if err != nil {
                    return fmt.Errorf("pre-commit-check: %w", err)
                }
                if buildCmd != "" {
                    fmt.Fprintf(os.Stderr, "[pre-commit] running build gate: %s\n", buildCmd)
                    if err := runGateCommand(repoDir, buildCmd); err != nil {
                        return err
                    }
                }

                return nil
            }

            // runGateCommand executes a shell command in repoDir, streaming output
            // to stdout/stderr. Returns error on non-zero exit.
            func runGateCommand(repoDir, command string) error {
                cmd := exec.Command("sh", "-c", command)
                cmd.Dir = repoDir
                cmd.Stdout = os.Stdout
                cmd.Stderr = os.Stderr
                if err := cmd.Run(); err != nil {
                    if exitErr, ok := err.(*exec.ExitError); ok {
                        return fmt.Errorf("gate failed: exit %d", exitErr.ExitCode())
                    }
                    return fmt.Errorf("gate failed: %w", err)
                }
                return nil
            }
            ```

            The existing inline `exec.Command` block in `RunPreCommitCheck` is replaced
            by the `runGateCommand` helper. Remove the old inline block.

            ### Verification gate
            ```
            go build ./...
            go vet ./pkg/protocol/... ./cmd/sawtools/...
            go test ./pkg/protocol/... -run TestDiscoverBuildGate -v
            ```

            ### Constraints
            - Do not modify `DiscoverLintGate` behavior.
            - The `sawConfig` struct is unexported in `gate_discovery.go`; extend it freely.
            - Build gate runs AFTER lint (lint is faster; fail fast on lint errors).
            - Keep `runGateCommand` unexported in `pre_commit_cmd.go`.
          files:
            - pkg/protocol/gate_discovery.go
            - pkg/protocol/gate_discovery_test.go
            - cmd/sawtools/pre_commit_cmd.go
