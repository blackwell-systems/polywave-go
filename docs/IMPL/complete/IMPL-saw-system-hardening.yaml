            `result.CodeDisjointOwnership` which equals `"V002_DISJOINT_OWNERSHIP"`.
            The string `"I1_VIOLATION"` is never emitted anywhere in the codebase, so
            the filter catches nothing. All I1 violations pass silently through
            `prepare-wave`.

            ### What to implement

            **File 1: `pkg/engine/prepare.go`**

            Find the block starting with the comment
            `// Step: I1 disjoint ownership verification (E3)` (approximately line 433).
