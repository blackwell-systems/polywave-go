pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A and Agent B both touch full_validate.go: A adds RepoPath to
            FullValidateOpts and a TODO comment; B uncomments the CheckAgentLOCBudget call.
            If B merges before A, B will not find the TODO comment and the wiring will
            be missing.
          likelihood: low
          impact: medium
          mitigation: |
            Both agent tasks document the exact TODO comment text and line. The merge
            order is enforced by the wave: both are Wave 1 agents who must complete before
            finalize-wave runs. The integration gate (go build ./...) will fail if the
            wiring is incomplete, surfacing the gap before the wave closes.
        - scenario: |
            pkg/result/codes.go is not in any agent's ownership. Agent B uses an unexported
            string constant in complexity.go for the new error code. External callers who
            want to check for V048_AGENT_LOC_BUDGET by name cannot use the result package
            constant.
          likelihood: medium
          impact: low
          mitigation: |
            Unexported constant is sufficient for initial implementation. The code string
            "V048_AGENT_LOC_BUDGET" is documented in the interface contract above. A
            follow-up IMPL can promote it to codes.go when external callers need it.
        - scenario: |
            Agent C must verify that the `result` package is already imported in
            prepare.go. If it is not, the one-line filter fix requires adding an import,
            slightly expanding scope.
          likelihood: low
          impact: low
          mitigation: |
            Agent C's task includes a grep command to check the import before proceeding.
            Adding one import line is within scope for a one-file agent.
