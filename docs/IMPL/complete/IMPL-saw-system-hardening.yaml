            ## Problem 2 — LOC budget enforcement in sawtools validate

            ### Context
            `CheckAgentComplexity` in `pkg/protocol/complexity.go` checks file *count*
            per agent (>8 files => W001 warning) but never reads actual line counts. A
            single agent can legitimately own 3 files totalling 6,000 lines, exhausting
            context window before any commit happens.

            ### What to implement

            **File 1: `pkg/protocol/complexity.go`**

            Add a new exported function `CheckAgentLOCBudget` exactly matching the
            interface contract:

            ```go
            func CheckAgentLOCBudget(m *IMPLManifest, repoPath string, maxLOC int) []result.SAWError
            ```

            Also add an unexported string constant for the error code:
            ```go
            const codeAgentLOCBudget = "V048_AGENT_LOC_BUDGET"
            ```

            Implementation requirements:
            1. If `repoPath == ""`, return nil immediately (offline/schema-only mode).
            2. Build a map of `agentID -> total LOC` and `agentID -> file count` from
               `m.FileOwnership`. Only count files with `action == "modify"`. For each
               such file, open `filepath.Join(repoPath, fo.File)` and count lines with
               `bufio.Scanner`. If the file does not exist (stat error), skip silently.
            3. If an agent's total LOC > maxLOC, append a blocking error:
               - Code: `codeAgentLOCBudget` ("V048_AGENT_LOC_BUDGET")
               - Severity: `"error"` (blocking, not warning)
               - Message: `fmt.Sprintf("agent %s owns %d lines across %d files (limit: %d) — split the agent or reduce scope", agentID, totalLOC, fileCount, maxLOC)`
               - Field: `"file_ownership"`

