              UpdateStatusOpts{})`. Asserts success (existing commit satisfies guard).

            - `TestUpdateStatus_PartialNoCommitRequired`: calls `UpdateStatus(...,
              StatusPartial, UpdateStatusOpts{})`. Asserts success (partial does not
              require a commit).

            ### Verification gate
            ```
            go build ./...
            go vet ./pkg/protocol/... ./cmd/sawtools/...
            go test ./pkg/protocol/... -run TestUpdateStatus -v
            ```

