            ## Problem 4 — Completion report enforcement in update-status

            ### Context
            `CompletionReportBuilder.Validate()` in `pkg/protocol/completion_report.go`
            correctly enforces `commit != ""` when `status == "complete"`. But
            `pkg/protocol/status_update.go` (`UpdateStatus` function) bypasses the builder
            entirely — it reads the existing report from the manifest, sets `report.Status`,
            and writes back without ever calling `Validate()`. An agent can therefore call:

                sawtools update-status --wave 1 --agent A --status complete

            without providing a commit, producing a manifest that passes `update-status`
            but then fails `verify-commits` (E7 gate) downstream in `finalize-wave`.

            ### What to implement

            **File 1: `pkg/protocol/status_update.go`**

            1. Add `UpdateStatusOpts` struct (see interface contract):
               ```go
               type UpdateStatusOpts struct {
                   Commit string // required when Status == StatusComplete and no commit in existing report
               }
               ```

            2. Change `UpdateStatus` function signature to accept opts as last parameter:
               ```go
               func UpdateStatus(manifestPath string, waveNum int, agentID string, status CompletionStatus, opts UpdateStatusOpts) result.Result[*UpdateStatusData]
               ```

            3. After the existing agent-not-found check and before writing the report,
               add a commit guard:
               ```go
               if status == StatusComplete {
                   existingCommit := ""
                   if existing, ok := manifest.CompletionReports[agentID]; ok {
                       existingCommit = existing.Commit
                   }
                   effectiveCommit := opts.Commit
                   if effectiveCommit == "" {
                       effectiveCommit = existingCommit
                   }
                   if strings.TrimSpace(effectiveCommit) == "" {
                       return result.NewFailure[*UpdateStatusData]([]result.SAWError{{
                           Code:     result.CodeCommitMissing,
                           Message:  fmt.Sprintf("cannot set agent %s status to complete: commit is required", agentID),
                           Severity: "fatal",
                           Field:    "completion_reports." + agentID + ".commit",
                       }})
                   }
               }
               ```

            4. When writing the report, also apply opts.Commit if provided:
               ```go
               report := manifest.CompletionReports[agentID]
               report.Status = status
               if opts.Commit != "" {
                   report.Commit = opts.Commit
               }
               manifest.CompletionReports[agentID] = report
               ```

            **File 2: `cmd/sawtools/update_status.go`**

            Update the `UpdateStatus` call in `newUpdateStatusCmd` to pass the new opts
            parameter:
            ```go
            res := protocol.UpdateStatus(manifestPath, waveNum, agentID,
                protocol.CompletionStatus(status),
                protocol.UpdateStatusOpts{}) // commit not accepted by this command
            ```
            The `update-status` command does not take `--commit`. The guard will allow
            `--status complete` only if the manifest already contains a commit for that
            agent (placed there by a prior `set-completion` call).

            **File 3: `pkg/protocol/status_update_test.go`**

            Add the following test cases:

            - `TestUpdateStatus_CompleteRequiresCommit`: manifest has wave 1 agent A,
              no prior completion report. Calls `UpdateStatus(..., StatusComplete,
              UpdateStatusOpts{})`. Asserts result is fatal with code
              `result.CodeCommitMissing`.

            - `TestUpdateStatus_CompleteWithCommitInOpts`: calls `UpdateStatus(...,
