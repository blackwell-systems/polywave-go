interface_contracts:
    - name: FullValidateOpts
      description: |
        Extended to accept RepoPath for file-existence checks. Agents writing callers
        should pass the repo root when available; empty string means skip the check.
      definition: |
        type FullValidateOpts struct {
            AutoFix   bool   // auto-correct fixable issues (gate types, unknown keys)
            UseSolver bool   // use CSP solver for wave assignment validation
            RepoPath  string // optional: absolute path to repo root for file-existence checks
        }
      location: pkg/protocol/full_validate.go
    - name: CheckAgentLOCBudget
      description: |
        New function added to complexity.go. Reads line counts for all files owned by
        each agent (action=modify only; action=new files do not yet exist). Emits a
        blocking error if any agent exceeds the LOC threshold (2000 lines total across
        owned files). Returns nil (empty slice) when repoPath is empty (offline/schema-only
        validation).
      definition: |
        // CheckAgentLOCBudget checks that no agent owns files totalling more than maxLOC
        // lines. Only action=modify files are counted (action=new files do not yet exist).
        // Returns blocking errors for agents over budget.
        // If repoPath is empty, all checks are skipped (allows offline validation).
        func CheckAgentLOCBudget(m *IMPLManifest, repoPath string, maxLOC int) []result.SAWError
      location: pkg/protocol/complexity.go
    - name: DiscoverBuildGate
      description: |
        New function parallel to DiscoverLintGate. Returns the command for the first
        quality gate of type "build" found in the active IMPL doc, or falls back to
        saw.config.json build_command field. Returns ("", nil) if nothing configured.
      definition: |
        func DiscoverBuildGate(repoDir string) (string, error)
      location: pkg/protocol/gate_discovery.go
    - name: UpdateStatusOpts and UpdateStatus
      description: |
        UpdateStatus will reject setting status=complete when the existing completion
        report has an empty commit field AND no commit is supplied in the call. The
        UpdateStatusOpts struct allows callers to supply a commit SHA alongside the
        status change. Existing callers that pass status != complete are unaffected.
      definition: |
        // UpdateStatusOpts carries optional fields for update-status beyond the status string.
        type UpdateStatusOpts struct {
            Commit string // required when Status == StatusComplete and no commit in existing report
        }

        // UpdateStatus loads the manifest, updates the agent completion report status,
        // and saves back to disk. Returns failure if status=complete is requested but
        // no commit is available (neither in opts.Commit nor in the existing report).
        func UpdateStatus(manifestPath string, waveNum int, agentID string, status CompletionStatus, opts UpdateStatusOpts) result.Result[*UpdateStatusData]
      location: pkg/protocol/status_update.go
