            ## What to Implement

            Create the `sawtools diagnose-build-failure` CLI command that reads error logs and outputs YAML diagnosis.

            ## Interfaces to Implement

            ```go
            // cmd/saw/diagnose_build_failure_cmd.go
            package main

            import (
              "fmt"
              "os"
              "github.com/spf13/cobra"
              "gopkg.in/yaml.v3"
              "github.com/blackwell-systems/scout-and-wave-go/pkg/builddiag"
            )

            func newDiagnoseBuildFailureCmd() *cobra.Command {
              var language string

              cmd := &cobra.Command{
                Use:   "diagnose-build-failure <error-log>",
                Short: "Pattern-match build errors and suggest fixes",
                Long: `Analyzes build error logs against known pattern catalogs.

            Supported languages: go, rust, javascript, typescript, python

            Outputs structured YAML with:
            - diagnosis: Pattern name
            - confidence: Match confidence (0.0-1.0)
            - fix: Recommended action
            - rationale: Why this fix works
            - auto_fixable: Whether fix can be automated`,
                Args: cobra.ExactArgs(1),
                RunE: func(cmd *cobra.Command, args []string) error {
                  errorLogPath := args[0]

                  // Read error log
                  content, err := os.ReadFile(errorLogPath)
                  if err != nil {
                    return fmt.Errorf("failed to read error log: %w", err)
                  }

                  // Diagnose error
                  diagnosis, err := builddiag.DiagnoseError(string(content), language)
                  if err != nil {
                    return fmt.Errorf("failed to diagnose error: %w", err)
                  }

                  // Output YAML
                  enc := yaml.NewEncoder(os.Stdout)
                  if err := enc.Encode(diagnosis); err != nil {
                    return fmt.Errorf("failed to encode diagnosis: %w", err)
                  }

                  return nil
                },
              }

              cmd.Flags().StringVar(&language, "language", "", "Language (go, rust, js, ts, python) [required]")
              cmd.MarkFlagRequired("language")

              return cmd
            }
            ```

            ## Interfaces to Call

            - `builddiag.DiagnoseError(errorLog, language)` — run pattern matching
            - `yaml.NewEncoder(os.Stdout).Encode(diagnosis)` — output YAML

            ## Tests to Write

            1. `TestDiagnoseBuildFailureCmd_GoError` - diagnoses Go error correctly
            2. `TestDiagnoseBuildFailureCmd_RustError` - diagnoses Rust error correctly
            3. `TestDiagnoseBuildFailureCmd_InvalidLanguage` - returns error for unsupported language
            4. `TestDiagnoseBuildFailureCmd_FileNotFound` - returns error for missing log file
            5. `TestDiagnoseBuildFailureCmd_YAMLOutput` - validates YAML format
            6. `TestDiagnoseBuildFailureCmd_MissingLanguageFlag` - returns error when --language not provided

            ## Verification Gate

            ```bash
            go build ./cmd/saw/...
            go vet ./cmd/saw/...
            go test ./cmd/saw/... -run TestDiagnoseBuildFailure -v

            # Integration test with sample error log
            echo 'cannot find package "foo"' > /tmp/error.log
            ./sawtools diagnose-build-failure /tmp/error.log --language go
            ```

