interface_contracts:
    - name: resolveAgentBranch
      description: |-
        Unexported helper in branchname.go. Returns the active branch name for
        the given agent by checking whether the slug-scoped branch exists in repoDir
        via git.BranchExists. Falls back to LegacyBranchName if slug-scoped does
        not exist. isLegacy is true when the legacy fallback was used. If neither
        exists, returns the slug-scoped form and isLegacy=false.
      definition: |
        func resolveAgentBranch(featureSlug, agentID string, waveNum int, repoDir string) (branchName string, isLegacy bool)
      location: pkg/protocol/branchname.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — resolveAgentBranch wiring + manifest.go ctx cleanup

            ### Context
            You are working in pkg/protocol in the scout-and-wave-go repository.
            This is a mechanical cleanup with no new behavior.

            ### Item 1: Wire resolveAgentBranch into the 5 caller files

            `pkg/protocol/branchname.go` defines:
            ```go
            func resolveAgentBranch(featureSlug, agentID string, waveNum int, repoDir string) (branchName string, isLegacy bool)
            ```
            This helper checks git to return the active branch (slug-scoped if it exists,
            legacy if the slug form does not, slug-scoped form if neither exists).

            Five files compute `BranchName(...)` and `LegacyBranchName(...)` inline and
            then try one then fall back to the other. Replace those with `resolveAgentBranch`
            where the semantics match. Apply the following rules:

            **File: pkg/protocol/merge_agents.go**
            - Lines ~290-305 (mergeAgentsSingleRepo loop): `branch` and `legacyBranch` are
              computed, then `isAgentAlreadyMerged` is called with both, and later
              `MergeNoFFWithOwnership` is tried with slug first then legacy.
              - `isAgentAlreadyMerged` needs both names independently — do NOT replace
                those two variable declarations. Keep `branch` and `legacyBranch` as-is
                for `isAgentAlreadyMerged`.
              - The merge attempt block (~line 325) tries `branch` then falls back to
                `legacyBranch` — this pattern CAN use `resolveAgentBranch`. Replace the
                try-slug-then-try-legacy merge pattern with a single call to
                `resolveAgentBranch(manifest.FeatureSlug, agent.ID, waveNum, repoDir)`
                to determine the active branch, then call `MergeNoFFWithOwnership` once
                with that branch. Update `status.Branch` accordingly.
            - Lines ~452-488 (mergeAgentsMultiRepo loop): same analysis and same approach.
              Use `resolveAgentBranch` for the merge step; keep both names for
              `isAgentAlreadyMerged`.

            **File: pkg/protocol/commit_verify.go**
            - Lines ~171-172: `branchName` and `legacyBranch` are computed. The subsequent
              rev-list block tries slug first, falls back to legacy via repeated git.Run calls.
              Replace this with `resolveAgentBranch(manifest.FeatureSlug, agent.ID, waveNum, agentRepoDir)`
              to get the active branch, then run rev-list once against it.
              Note: the fallback cross-repo HEAD..branch logic must still be preserved for
              the case where the base commit doesn't exist in the agent's repo.

            **File: pkg/protocol/worktree.go**
            - Lines ~148-151: `branchName` and `legacyBranch` are computed. The file
              creates NEW worktrees — it doesn't resolve which branch exists. The legacy
              branch variables are used for stale branch cleanup (checking if stale legacy
              branches should be pruned), not for resolving which branch to use.
              Do NOT apply `resolveAgentBranch` here. The creation path uses `BranchName`
              to create a NEW branch — `resolveAgentBranch` is semantically wrong for
              creation. Leave worktree.go unchanged for this pattern.

            **File: pkg/protocol/cleanup.go**
            - Lines ~176-177: `branchName` and `legacyBranch` are computed. Cleanup
              attempts to delete slug-scoped first, falls back to legacy if not found.
              This IS a resolve-then-operate pattern. Replace the two-step deletion
              attempt with a single `resolveAgentBranch(manifest.FeatureSlug, agent.ID,
              waveNum, agentRepoDir)` call to find the active branch, then call
              `git.DeleteBranch` once on the resolved branch. The not-found check in the
              error message handling still applies to the resolved branch.

            **File: pkg/protocol/completion_validator.go**
            - Line ~75: `BranchName(manifest.FeatureSlug, waveNum, agentID)` is called
              once to compute `expectedBranch`. There is no legacy fallback and no git
              check — this is a pure name computation for comparison against
              `report.Branch`. Do NOT apply `resolveAgentBranch` here (no git check
              needed, no fallback).

            ### Item 2: manifest.go ctx param

            Open `pkg/protocol/manifest.go`. Read the `Load` and `Save` function bodies.

            Both functions already have `_ = ctx // reserved for future cancellation support`.
            This is intentional — the ctx parameter is kept for API stability while being
            a no-op today.

            **Decision**: Keep option (b) — retain signatures, no change to Load/Save
            signatures or their `_ = ctx` lines. The parameter is correctly documented.

            **What to do**: Audit the two internal callers within pkg/protocol that pass
            `context.TODO()` to Load (cleanup.go line 97, commit_verify.go line 50).
            These are fine as-is since the ctx is a no-op. No code changes are needed
            for Item 2. Add a brief inline comment if it aids clarity, but do not modify
            the function signatures.

            If you find that no changes are needed for Item 2, document that finding
            in a single-line comment in manifest.go (e.g., `// ctx param intentionally
            no-op; callers may pass context.TODO() or a live context`), only if such
            a comment would be a net improvement. Do not add noise.

            ### Verification gate
            After making changes:
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/...
            ```
            Ensure all tests pass. Do not change any test files.
