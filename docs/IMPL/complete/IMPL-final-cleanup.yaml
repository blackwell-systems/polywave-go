suitability_assessment: |
    All three items are mechanical/structural with no new behavior or interface changes.

    Item 1 (resolveAgentBranch wiring): Five files in pkg/protocol use inline
    BranchName+LegacyBranchName patterns instead of calling the resolveAgentBranch
    helper. However, the helper is unexported and accepts a repoDir for a git
    check — callers that need both branch names for other operations (e.g.,
    isAgentAlreadyMerged which needs slug+legacy separately, or worktree.go which
    creates rather than resolves branches) cannot always use the helper directly.
    The agent must read each call site carefully and apply resolveAgentBranch only
    where the semantic matches (try-slug-then-legacy-then-return-slug-scoped form).
    Files that only compute branch names for creation/deletion may not benefit from
    the helper at every location.

    Item 2 (manifest.go ctx): Load and Save already have `_ = ctx` with the comment
    "reserved for future cancellation support". The ctx parameter is intentionally
    kept as a no-op for API stability. The fix is minimal: ensure internal callers
    that pass context.TODO() are consistent, and note that the wrappers already
    document the no-op. No signature changes are needed or desirable; the ctx
    parameter documents intent for future work.

    Item 3 (%w sweep): Investigation reveals the 229-call estimate does not match
    actual codebase state. All non-test fmt.Errorf calls that appear without %w
    are either (a) formatting non-error types ([]SAWError slices, Result structs,
    booleans) correctly with %v, or (b) using %s/%d on strings/ints. The fmt.Sprintf
    calls inside Message: string fields cannot use %w (which only applies to
    fmt.Errorf). Zero fmt.Errorf calls wrap an error variable using %v instead of %w.
    This item is a VERIFY task: the agent should confirm this finding and document it,
    touching no code if the finding holds.

    Parallelization value: Items 1+2 are pkg/protocol only (one agent, ~7 files).
    Item 3 is a verification/documentation task with no code changes expected.
    Single-wave execution is appropriate.

    Estimated times:
    - Scout phase: ~20 min (file analysis, pattern investigation)
    - Agent execution: ~25 min (1 agent for items 1+2, 1 agent for item 3 verify)
    - Merge and verification: ~5 min
    Total SAW time: ~50 min

    Sequential baseline: ~45 min (items 1+2 together, item 3 verify)
    Time savings: marginal; value is coordination and audit trail.

    Recommendation: Marginal parallelization gains. Proceed for audit trail and
    to ensure item 3 is definitively verified and documented.
