        - id: B
          task: |
            ## Agent B — %w sweep verification

            ### Context
            The task description estimated 229 fmt.Errorf calls using %v instead of %w
            for error wrapping. Before making any changes, verify this claim against the
            actual codebase.

            ### Investigation steps

            Run the following commands from the repository root and record your findings:

            1. Count all non-test fmt.Errorf calls that do NOT contain %w:
            ```
            grep -rn 'fmt\.Errorf' pkg/ cmd/ internal/ --include='*.go' | grep -v '%w' | grep -v '_test\.go' | wc -l
            ```

            2. Among those, find ones that use %v to format a variable:
            ```
            grep -rn 'fmt\.Errorf.*%v' pkg/ cmd/ internal/ --include='*.go' | grep -v '_test\.go'
            ```

            3. For each result in step 2, determine the type of the variable formatted
            with %v:
            - If the variable is of type `error`, it SHOULD use %w (eligible for change)
            - If the variable is of type []SAWError, result.Result, bool, []string,
              or any non-error type, it MUST stay as %v (%w only works for error values)
            - Note: fmt.Sprintf calls building Message: string fields cannot use %w at all

            4. Search for any fmt.Errorf that wraps an error variable (named `err` or
            similar) using %v instead of %w:
            ```
            grep -rn 'fmt\.Errorf.*%v.*\berr\b' pkg/ cmd/ internal/ --include='*.go' | grep -v '_test\.go'
            ```

            ### Expected finding
            Prior analysis indicates zero fmt.Errorf calls wrap an `error` value with %v.
            All %v usages in fmt.Errorf format non-error types. If this holds, NO code
            changes are needed.

            ### What to do
            - If zero eligible fmt.Errorf calls found: write a brief Markdown report to
              `docs/IMPL/IMPL-final-cleanup-item3-report.md` documenting the finding.
              Include the grep command outputs and conclusion. No source code changes.
            - If eligible calls are found: make the changes (replace %v with %w in
              fmt.Errorf calls that wrap an `error` value). Do NOT change:
              - fmt.Sprintf calls (cannot use %w)
              - fmt.Errorf calls where %v formats a non-error type ([]SAWError, bool, etc.)
              - Error message text (only change the verb, not the surrounding string)

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./...
            ```
            If no code was changed, go build/vet/test will pass unchanged.
          files:
            - docs/IMPL/IMPL-final-cleanup-item3-report.md
