pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            TierSuggestion map key mismatch. CheckIMPLConflicts currently keys TierSuggestion
            by the raw input ref string (slug). After the change, when refs are absolute paths,
            the key would be the path string. But GenerateProgramFromIMPLs looks up
            TierSuggestion[slug] where slug is now implDoc.FeatureSlug. If CheckIMPLConflicts
            still keys by raw ref, the tier lookup returns 0 (default) for every path-based IMPL
            and all IMPLs end up in tier 1, ignoring conflict detection.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent A (program_conflict.go) must key TierSuggestion by implDoc.FeatureSlug, not
            by the raw ref. Agent B's brief explicitly coordinates this. The test
            TestGenerateProgramFromIMPLs_AbsolutePaths with overlapping files will catch this
            regression if the tier assignment comes out wrong.
        - scenario: |-
            filepath.Separator portability. On Windows, paths use backslash as separator.
            The path-detection logic using strings.ContainsRune(ref, os.PathSeparator) handles
            this but the HasPrefix("/") check is Unix-only. Windows absolute paths start with
            a drive letter (C:\...).
          likelihood: low
          impact: low
          mitigation: |-
            The codebase targets Unix (macOS/Linux) based on project conventions in CONTEXT.md.
            Use filepath.IsAbs(ref) instead of strings.HasPrefix(ref, "/") for the
            absolute-path detection — this handles both Unix and Windows correctly and is
            semantically clearer. Agents should use filepath.IsAbs in their implementation
            rather than the HasPrefix heuristic described in the briefs.
        - scenario: |-
            Auto-slug derivation from path refs. When 2-3 ImplRefs are paths, the auto-slug
            code currently uses strings.Join(opts.ImplRefs, "-and-") which would produce a
            slug like "auto-program-/Users/dayna/.../IMPL-foo.yaml-and-..." — an invalid slug.
          likelihood: high
          impact: medium
          mitigation: |-
            Agent B's brief covers this: build a slugList from loaded implDoc.FeatureSlug values
            and use that for auto-derivation instead of iterating ImplRefs directly. The test
            TestGenerateProgramFromIMPLs_AbsolutePaths should assert that the auto-derived slug
            is a valid short slug string (no slashes, no .yaml extension).
        - scenario: |-
            The single-ref guard in GenerateProgramFromIMPLs (len(opts.ImplRefs) == 0) and the
            2-ref minimum in the CLI command both still work correctly since we're not changing
            the semantics of the count check.
          likelihood: low
          impact: low
          mitigation: No change needed. Existing validation passes through unchanged.
