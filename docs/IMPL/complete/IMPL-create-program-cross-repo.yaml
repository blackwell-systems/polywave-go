completion_date: "2026-03-25"
title: Cross-repo IMPL support for sawtools create-program
feature_slug: create-program-cross-repo
verdict: SUITABLE
suitability_assessment: |
    The feature touches 3 clearly separable files with disjoint ownership:
    1. pkg/protocol/program_conflict.go — resolveIMPLPath needs path-vs-slug detection
    2. pkg/protocol/program_generator.go — GenerateProgramOpts.ImplSlugs becomes ImplRefs (or the
       function must normalize absolute paths to slugs for tier key/slug derivation), plus
       ProgramIMPL gets an optional AbsPath field for cross-repo identification
    3. cmd/sawtools/create_program_cmd.go — CLI parsing of --from-impls and routing to the updated API

    Tests live in sibling _test.go files and are owned by the same agents as the source files,
    so test files and implementation files are co-owned (no conflict).

    All cross-agent interfaces can be defined before implementation starts (resolveIMPLPathOrAbs
    signature, updated GenerateProgramOpts, updated ProgramIMPL struct). No investigation-first
    work is required; the bug is fully understood from code reading.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~2 agents x ~15 min avg = ~30 min (parallel wave 1)
    - Merge and verification: ~5 min
    Total SAW time: ~15 min (parallel)
    Sequential baseline: ~35 min
    Time savings: ~20 min (57% faster)
    Recommendation: Clear speedup. Proceed.

    Implementation notes:
    - resolveIMPLPath in program_conflict.go is the CANONICAL location for path resolution.
      All callers (program_generator.go, program_tier_prepare.go, CheckIMPLConflicts) call through
      this single function. The fix only needs to happen in one place.
    - The create-program cmd passes fromImpls directly as ImplSlugs to GenerateProgramOpts.
      The cmd needs to be updated to pre-classify each entry and the opts struct needs to
      accommodate paths in addition to slugs.
    - ProgramIMPL.Slug is used as the map key in TierSuggestion and as the label in conflict
      reporting. For cross-repo IMPLs supplied by path, the slug must still be extracted from
      the loaded IMPL doc (implDoc.FeatureSlug), not derived from the path string. The absolute
      path is stored in a separate field (AbsPath) so the orchestrator can locate the file.
    - list-impls is NOT in the call path for create-program's conflict check. CheckIMPLConflicts
      receives a []string of slugs and calls resolveIMPLPath internally. The fix to
      resolveIMPLPath covers the conflict-check path automatically — no list-impls changes needed.
    - check-impl-conflicts cmd in create_program_cmd.go also calls CheckIMPLConflicts with raw
      slugs; it should also be updated to accept absolute paths via its --impls flag (same
      path-vs-slug classification logic).
test_command: go test ./...
