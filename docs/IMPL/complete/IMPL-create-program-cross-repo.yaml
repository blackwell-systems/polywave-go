interface_contracts:
    - name: resolveIMPLPathOrAbs
      description: |-
        Resolves a single IMPL reference to an absolute file path.
        If ref starts with "/" or contains a filepath separator (os.PathSeparator),
        it is treated as an absolute or relative path and returned after existence check.
        Otherwise it is treated as a slug and resolved via the existing slug lookup
        (docs/IMPL/ and docs/IMPL/complete/).
      definition: |
        // resolveIMPLPathOrAbs resolves a single IMPL reference (slug or absolute path)
        // to an absolute file path.
        //
        // Path detection rules:
        //   - starts with "/" → absolute path; verify exists, return as-is
        //   - contains os.PathSeparator → relative path; join with repoPath, verify exists
        //   - otherwise → slug; check docs/IMPL/IMPL-<slug>.yaml and docs/IMPL/complete/IMPL-<slug>.yaml
        func resolveIMPLPathOrAbs(repoPath, ref string) (string, error)
      location: pkg/protocol/program_conflict.go
    - name: ProgramIMPL.AbsPath
      description: |-
        Optional absolute path field on ProgramIMPL. Set when the IMPL was supplied
        by path rather than slug, so the orchestrator can locate the file across repos.
        Empty for same-repo IMPLs supplied by slug.
      definition: |
        // In ProgramIMPL struct (pkg/protocol/program_types.go):
        AbsPath string `yaml:"abs_path,omitempty" json:"abs_path,omitempty"`
      location: pkg/protocol/program_types.go
    - name: GenerateProgramOpts.ImplRefs
      description: |-
        Replaces ImplSlugs in GenerateProgramOpts. Accepts both slugs and absolute
        paths. The generator internally resolves each ref to a path, loads the IMPL
        doc, and extracts the slug from implDoc.FeatureSlug for use as the canonical
        key in TierSuggestion maps and conflict reporting. The resolved absolute path
        is stored in ProgramIMPL.AbsPath if the ref was a path (not a slug).
      definition: |
        type GenerateProgramOpts struct {
            ImplRefs    []string // IMPL slugs or absolute paths to include
            RepoPath    string   // repository root (used for slug resolution only)
            ProgramSlug string   // slug for the generated PROGRAM (auto-derived if empty)
            Title       string   // title for the generated PROGRAM (auto-derived if empty)
        }
      location: pkg/protocol/program_generator.go
    - name: CheckIMPLConflictsRefs
      description: |-
        Updated signature for CheckIMPLConflicts that accepts refs (slugs or absolute
        paths) in addition to pure slugs. Internally calls resolveIMPLPathOrAbs for
        each entry. This is a backward-compatible change: existing callers passing
        pure slugs continue to work unchanged.
      definition: |
        // CheckIMPLConflicts loads IMPL docs and performs cross-IMPL disjointness analysis.
        // implRefs: list of IMPL slugs or absolute paths to analyze
        // repoPath: repository root for resolving slug-based refs
        // (Signature unchanged — parameter renamed from implSlugs to implRefs in docs only;
        // the []string type is compatible. Internal call changes from resolveIMPLPath to
        // resolveIMPLPathOrAbs.)
        func CheckIMPLConflicts(implRefs []string, repoPath string) (*ConflictReport, error)
      location: pkg/protocol/program_conflict.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context
            You are implementing cross-repo IMPL path support in the protocol layer.
            The bug: resolveIMPLPath in pkg/protocol/program_conflict.go only handles
            slug-based lookup. When an absolute path like
            "/Users/.../docs/IMPL/IMPL-engine-reference-injection.yaml" is passed,
            it constructs a broken path because it blindly prepends the slug-resolution
            prefix.

            ## Files to modify
            - pkg/protocol/program_conflict.go
            - pkg/protocol/program_conflict_test.go

            ## What to implement

            ### 1. Add resolveIMPLPathOrAbs (new function in program_conflict.go)

            Add a new function `resolveIMPLPathOrAbs(repoPath, ref string) (string, error)` with
            this detection logic:
            - If `strings.HasPrefix(ref, "/")` → treat as absolute path; call `os.Stat(ref)`;
              if the file exists return ref, else return an error like
              `"IMPL path %q does not exist"`.
            - Else if `strings.ContainsRune(ref, os.PathSeparator)` → treat as relative path;
              join with repoPath; call os.Stat; if exists return joined path, else error.
            - Else → treat as slug; call the existing `resolveIMPLPath(repoPath, ref)` and
              return its result.

            Keep the existing `resolveIMPLPath` function unchanged — it is used directly by
            program_tier_prepare.go which only receives slugs from the PROGRAM manifest's
            tier.Impls list.

            ### 2. Update CheckIMPLConflicts to use resolveIMPLPathOrAbs

            In CheckIMPLConflicts, change the call on line ~39 from:
            ```go
            implPath, err := resolveIMPLPath(repoPath, slug)
            ```
            to:
            ```go
            implPath, err := resolveIMPLPathOrAbs(repoPath, slug)
            ```
            The variable name `slug` in the loop body can remain (it's just a loop variable name);
            the semantics change is in the resolver function.

            Also update the error message from `"cannot resolve IMPL %q"` to
            `"cannot resolve IMPL ref %q"` to reflect that refs are no longer only slugs.

            ### 3. Tests in program_conflict_test.go

            Add test cases for `resolveIMPLPathOrAbs`:

            **Test A — absolute path that exists:**
            Create a temp dir, write a dummy file, pass its absolute path. Expect the
            absolute path returned without modification.

            **Test B — absolute path that does not exist:**
            Pass `/nonexistent/path/IMPL-missing.yaml`. Expect an error containing
            "does not exist".

            **Test C — slug still works:**
            Create a temp repo with docs/IMPL/IMPL-my-slug.yaml. Pass "my-slug" as ref.
            Expect the resolved path returned.

            **Test D — CheckIMPLConflicts with absolute paths:**
            Create two real IMPL files in separate temp dirs (simulating cross-repo scenario).
            Pass their absolute paths to CheckIMPLConflicts. Expect no error, conflict report
            returned with correct slug values (extracted from loaded IMPL docs, NOT from the
            path strings).

            Use the existing `writeGeneratorTestIMPL` helper (in program_generator_test.go)
            as a reference for IMPL file construction — write a minimal IMPL YAML with
            feature_slug, file_ownership, and waves fields.

            ### 4. TierSuggestion keying — coordination with Agent B

            **CRITICAL (high-likelihood/medium-impact):** When you update `CheckIMPLConflicts`
            to call `resolveIMPLPathOrAbs`, you must ALSO change how `TierSuggestion` map
            keys are populated. Currently the map is keyed by the raw input slug/ref string.
            After your change, the key must be `implDoc.FeatureSlug` (the slug extracted
            from the loaded IMPL doc), NOT the raw ref.

            This is required because `GenerateProgramFromIMPLs` (Agent B's file) looks up
            tiers via `conflictReport.TierSuggestion[slug]` where `slug` is `implDoc.FeatureSlug`.
            If you key by raw ref and Agent B keys by feature slug, all path-based IMPLs
            silently get tier 0 (the Go map zero value), collapsing them all into tier 1.

            Agent B's brief section 4 documents this coordination. Read it before implementing.

            ## Verification gate
            ```
            go build ./...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestResolveIMPLPathOrAbs -v
            go test ./pkg/protocol/... -run TestCheckIMPLConflicts -v
            go test ./pkg/protocol/...
            ```
          files:
            - pkg/protocol/program_conflict.go
            - pkg/protocol/program_conflict_test.go
        - id: B
          task: |
            ## Context
            You are updating the PROGRAM generator data types and logic to support
            cross-repo IMPLs supplied by absolute path.

            The current GenerateProgramOpts.ImplSlugs field only accepts slug strings.
            The current ProgramIMPL struct has no field to record the absolute path
            of a cross-repo IMPL.

            ## Files to modify
            - pkg/protocol/program_generator.go
            - pkg/protocol/program_types.go
            - pkg/protocol/program_generator_test.go

            ## What to implement

            ### 1. Add AbsPath field to ProgramIMPL (program_types.go)

            In the ProgramIMPL struct, add:
            ```go
            AbsPath string `yaml:"abs_path,omitempty" json:"abs_path,omitempty"`
            ```
            Place it after the `Slug` field. This field is only set when the IMPL was
            supplied by an absolute path (cross-repo case). It is empty for same-repo
            IMPLs supplied by slug.

            ### 2. Rename ImplSlugs to ImplRefs in GenerateProgramOpts (program_generator.go)

            In `GenerateProgramOpts`:
            - Rename `ImplSlugs []string` to `ImplRefs []string`
            - Update the comment from "IMPL slugs to include" to
              "IMPL slugs or absolute paths to include"

            Update all uses of `opts.ImplSlugs` within GenerateProgramFromIMPLs to
            `opts.ImplRefs`. There are exactly 6 references in this function:
            1. `len(opts.ImplSlugs) == 0` guard (line 35)
            2. `CheckIMPLConflicts(opts.ImplSlugs, ...)` call (line 51)
            3. `for _, slug := range opts.ImplSlugs {` loop (line 64)
            4. `len(opts.ImplSlugs) <= 3` slug-derivation check (line 138)
            5. `strings.Join(opts.ImplSlugs, "-and-")` (line 139)
            6. `opts.ImplSlugs[0]` in the else branch (line 141)

            NOTE: For items 4 and 5 (auto-slug derivation), the logic currently uses
            ImplSlugs values as the slug components. After the rename, you need to
            handle the case where a ref is a path (not a slug) — derive the slug
            component from the loaded implDoc.FeatureSlug instead of from the ref string.
            The easiest approach: build a `slugList []string` from the loaded impls
            (collecting `impl.Slug` which is set from `implDoc.FeatureSlug`) and use
            that for auto-derivation instead of iterating `opts.ImplRefs` directly.

            ### 3. Update the IMPL loading loop (program_generator.go)

            In the loop `for _, slug := range opts.ImplSlugs { ... }`, after renaming
            to ImplRefs:
            - Rename the loop variable from `slug` to `ref` to clarify it may be a path.
            - Change the path resolution call from `resolveIMPLPath(opts.RepoPath, slug)`
              to `resolveIMPLPathOrAbs(opts.RepoPath, ref)`.
              (`resolveIMPLPathOrAbs` is implemented by Agent A in program_conflict.go.)
            - The slug for this IMPL entry must come from the loaded doc: use
              `implDoc.FeatureSlug` (already loaded as `implDoc`). The existing code
              already uses `implDoc.Title` and iterates `implDoc.Waves` — add:
              ```go
              slug := implDoc.FeatureSlug
              if slug == "" {
                  slug = filepath.Base(implPath) // fallback for malformed docs
              }
              ```
            - When building the `ProgramIMPL` entry, set `AbsPath` if the ref looks
              like a path (starts with "/" or contains filepath.Separator):
              ```go
              var absPath string
              if strings.HasPrefix(ref, "/") || strings.ContainsRune(ref, os.PathSeparator) {
                  absPath = implPath
              }
              ```
              Then in the ProgramIMPL literal: `AbsPath: absPath`.

            - The tier lookup uses `conflictReport.TierSuggestion[slug]` — this still
              works because CheckIMPLConflicts (updated by Agent A) will also extract
              slugs from loaded docs when building TierSuggestion.

            ### 4. Update TierSuggestion key in CheckIMPLConflicts (if needed)

            IMPORTANT: The TierSuggestion map in ConflictReport is keyed by the input
            ref strings (currently slugs). After the change, when refs are absolute
            paths, the keys would be absolute paths. But in GenerateProgramFromIMPLs
            step where we look up `conflictReport.TierSuggestion[slug]`, we now use
            the extracted `slug` (implDoc.FeatureSlug), not the original ref.

            This means the TierSuggestion map must ALSO be keyed by feature slugs, not
            by raw refs. Coordinate with Agent A: the TierSuggestion map in
            CheckIMPLConflicts should extract the slug from each loaded IMPL doc
            (implDoc.FeatureSlug) and use that as the key, not the raw ref string.

            Document this in a comment in program_generator.go near the TierSuggestion
            lookup to make the contract explicit:
            ```go
            // TierSuggestion keys are IMPL feature slugs (extracted from loaded docs),
            // not raw refs. This ensures compatibility with both slug and path refs.
            tier := 1
            if t, ok := conflictReport.TierSuggestion[slug]; ok {
                tier = t
            }
            ```

            ### 5. Tests in program_generator_test.go

            Add one new test:

            **TestGenerateProgramFromIMPLs_AbsolutePaths:**
            - Create two temp directories to simulate two separate repos.
            - Write a minimal IMPL YAML to each (use same helper pattern as existing tests).
            - Call GenerateProgramFromIMPLs with ImplRefs set to the two absolute paths
              (not slugs).
            - RepoPath must be a non-empty temp dir (use t.TempDir()). The existing
              guard at lines 42-48 of program_generator.go returns a fatal error when
              RepoPath == "" — do not remove or conditionalize this guard. The PROGRAM
              manifest output path will go into the temp dir; assert against that path.
            - Assert IsSuccess() or IsPartial() (not fatal).
            - Assert len(d.Manifest.Impls) == 2.
            - Assert d.Manifest.Impls[0].AbsPath != "" (cross-repo path is recorded).
            - Assert d.Manifest.Impls[0].Slug == the feature_slug from the written IMPL.

            ## Verification gate
            ```
            go build ./...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestGenerateProgram -v
            go test ./pkg/protocol/...
            ```
          files:
            - pkg/protocol/program_generator.go
            - pkg/protocol/program_types.go
            - pkg/protocol/program_generator_test.go
      base_commit: 5283c0a1a6a0de33d9f596b9dfaaa8909b3c76e3
