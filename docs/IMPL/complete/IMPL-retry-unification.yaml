pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Wave 1 agents A and B both produce files in package retry. If either introduces a
            function or variable name that conflicts with the other (e.g., both define a helper
            called buildPromptText or maxExcerptLen), the package will fail to compile in Wave 2.
          likelihood: medium
          impact: high
          mitigation: |-
            Interface contracts specify exactly which symbols each file defines. Agent A owns
            only classify.go (ErrorClass, ClassifyError, SuggestFixes, pattern vars). Agent B
            owns only attempt.go (RetryAttempt, BuildRetryAttempt, BuildPromptText, maxExcerptLen).
            The const maxExcerptLen should be defined in attempt.go only — classify.go must not
            define it. Both agents must read the other's interface contract before coding.
        - scenario: |-
            The binary contract for sawtools build-retry-context may silently break if Agent B
            introduces RetryAttempt with different JSON field names from RetryContext. The
            orchestrator parses fields like attempt_number, error_class, etc. by name.
          likelihood: low
          impact: high
          mitigation: |-
            Interface contract specifies all JSON tags explicitly. Agent D (who updates
            build_retry_context_cmd.go) should verify the JSON output by running:
            echo '{}' | sawtools build-retry-context --help and inspecting the struct tags
            in pkg/retry/attempt.go before committing.
        - scenario: |-
            pkg/retry/impl_generator.go already imports retryctx (at time of planning). After
            Agent A creates classify.go in the same package, Agent C removes the retryctx import
            and uses unqualified calls. If Agent A's classify.go is not yet merged, Agent C's
            build will fail on unresolved symbols ClassifyError and SuggestFixes.
          likelihood: low
          impact: medium
          mitigation: |-
            Wave 2 is explicitly blocked on Wave 1 completing. The orchestrator merges Wave 1
            before launching Wave 2. No worktree isolation issue.
        - scenario: |-
            The type alias `type RetryContext = retry.RetryAttempt` in the shim may cause a
            redeclaration error if retryctx_test.go still references retryctx.RetryContext
            directly before Agent E replaces the test file.
          likelihood: low
          impact: low
          mitigation: |-
            Agent E replaces both files atomically in one commit. The old test file is deleted
            and replaced simultaneously.
        - scenario: |-
            pkg/engine/runner.go may already import pkg/retry (for RetryConfig or RetryResult).
            If so, Agent D's task of adding a second import from pkg/retry is a no-op — but the
            removal of the retryctx import must still happen or the build will fail.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent D's task explicitly says: "check if pkg/retry is already imported — if so,
            just remove the retryctx import." The agent must read the full import block before
            making changes.
        - scenario: |-
            scout-and-wave-web/pkg/api/wave_runner.go (external repo) imports retryctx.BuildRetryContext
            and is not in this repo's file_ownership. It is not migrated in Wave 2. If the Wave 3
            shim is broken or incomplete, wave_runner.go will fail to compile against a new
            scout-and-wave-go release.
          likelihood: low
          impact: high
          mitigation: |-
            The Wave 3 shim must preserve the exact BuildRetryContext(manifestPath, agentID string,
            attemptNum int) (*RetryContext, error) signature. Since RetryContext = retry.RetryAttempt
            (type alias), the return type is compatible. After Wave 3, run `go build ./...` in
            scout-and-wave-web to verify before releasing a new scout-and-wave-go version.
