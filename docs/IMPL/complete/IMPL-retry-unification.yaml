completion_date: "2026-03-26"
title: Retry Abstraction Unification
feature_slug: retry-unification
verdict: SUITABLE
suitability_assessment: |-
    The codebase has three retry-related types split across two packages:
    pkg/retryctx (ErrorClass, ClassifyError, SuggestFixes, RetryContext, BuildRetryContext)
    and pkg/retry (RetryConfig, RetryResult, QualityGateFailure, RetryLoop, GenerateRetryIMPL).
    They already have a dependency relationship: pkg/retry/impl_generator.go imports
    pkg/retryctx to call ClassifyError and SuggestFixes.

    The proposed design in the feature description requires adjustment for reality:
    - The proposed ErrorClass values (transient/fixable/needs_replan/escalate/timeout) do NOT
      match the actual ErrorClass values in retryctx. Those values live in pkg/protocol as
      FailureTypeEnum. The actual ErrorClass values are: import_error, type_error,
      test_failure, build_error, lint_error, unknown.
    - RetryContext and the proposed RetryAttempt serve similar purposes; the real migration
      is to consolidate RetryContext into pkg/retry as RetryAttempt, move ClassifyError
      and ErrorClass from pkg/retryctx into pkg/retry/classify.go, keep SuggestFixes and
      BuildPromptText in pkg/retry as well, and provide a thin shim in pkg/retryctx that
      re-exports from pkg/retry for backward compat.

    Callers of pkg/retryctx (non-test):
    1. cmd/sawtools/build_retry_context_cmd.go — calls BuildRetryContext(), marshals *RetryContext to JSON
    2. pkg/engine/closed_loop_gate.go — calls ClassifyError() + SuggestFixes(), uses ErrorClass as type
    3. pkg/engine/runner.go — calls BuildRetryContext()
    4. pkg/retry/impl_generator.go — calls ClassifyError() + SuggestFixes()
    5. pkg/orchestrator/orchestrator.go — calls BuildRetryContext() on line 1021 (E24 auto-retry path)

    External consumers (separate repo):
    - scout-and-wave-web/pkg/api/wave_runner.go — calls retryctx.BuildRetryContext() on line 853.
      This is a cross-repo consumer (github.com/blackwell-systems/scout-and-wave-web). It is NOT
      in this repo's file_ownership. The Wave 3 shim is load-bearing for this consumer — it must
      preserve the BuildRetryContext() signature and *RetryContext return type exactly.

    Binary contract: sawtools build-retry-context emits JSON with fields attempt_number,
    agent_id, error_class, error_excerpt, gate_results, suggested_fixes, prior_notes,
    prompt_text, failure_type. These field names are fixed. The retryctx.RetryContext struct
    drives this output via json.MarshalIndent. This struct must either be preserved in-place
    or re-exported from pkg/retry with identical JSON tags.

    Migration strategy: Wave 1 builds new pkg/retry types. Wave 2 updates all 5 internal
    callers. Wave 3 replaces pkg/retryctx body with a thin shim (type aliases + wrapper
    functions). The shim is REQUIRED — scout-and-wave-web is an external consumer that
    imports pkg/retryctx directly; deletion would break it at runtime.

    Suitability: SUITABLE. 3+ distinct files change per agent, build+test cycle is
    non-trivial (go test ./...), agents can have disjoint file ownership.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~4 agents x ~15 min avg, wave1+wave2 run in parallel = ~30 min
    - Merge and verification: ~5 min
    Total SAW time: ~50 min
    Sequential baseline: ~4 agents x 20 min = ~80 min
    Time savings: ~30 min (37% faster)
    Recommendation: Clear speedup for a refactor spanning 3 packages with tests.
test_command: go test ./...
lint_command: go vet ./...
