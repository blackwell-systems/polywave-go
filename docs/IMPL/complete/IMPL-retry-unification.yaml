            ## Files to modify

            ### pkg/retryctx/retryctx.go

            Replace the entire file with a thin shim that re-exports from pkg/retry using
            type aliases and wrapper functions. This preserves the public API of pkg/retryctx
            while removing all implementation duplication.

            The shim must define:
            ```go
            package retryctx

            import "github.com/blackwell-systems/scout-and-wave-go/pkg/retry"

            // Type alias — same underlying type, no conversion needed by callers.
            type ErrorClass = retry.ErrorClass

            // Constant re-exports.
            const (
                ErrorClassImport  = retry.ErrorClassImport
                ErrorClassType    = retry.ErrorClassType
                ErrorClassTest    = retry.ErrorClassTest
                ErrorClassBuild   = retry.ErrorClassBuild
                ErrorClassLint    = retry.ErrorClassLint
                ErrorClassUnknown = retry.ErrorClassUnknown
            )

            // RetryContext is a type alias to preserve JSON serialization contract.
            type RetryContext = retry.RetryAttempt

            // Function re-exports — delegate to pkg/retry.
            func ClassifyError(output string) ErrorClass { return retry.ClassifyError(output) }
            func SuggestFixes(class ErrorClass) []string  { return retry.SuggestFixes(class) }
            func BuildRetryContext(manifestPath, agentID string, attemptNum int) (*RetryContext, error) {
                return retry.BuildRetryAttempt(manifestPath, agentID, attemptNum)
            }
            ```

            Remove all the old implementation code: pattern variables, ClassifyError body,
            SuggestFixes body, BuildRetryContext body, buildPromptText body, maxExcerptLen const.

            IMPORTANT: Do NOT use `type RetryContext = retry.RetryAttempt` if it causes a
            "cannot use type alias with different JSON tags" issue — if RetryAttempt has the
            same fields and tags as RetryContext (which it does by design), the alias is safe.

            ### pkg/retryctx/retryctx_test.go

            The existing tests in this file test functions that are now implemented in pkg/retry
            and covered by pkg/retry/classify_test.go and pkg/retry/attempt_test.go.

