interface_contracts:
    - name: ErrorClass
      description: |-
        Typed string for Go error classification. Moves from pkg/retryctx to pkg/retry.
        Existing values are preserved exactly (import_error, type_error, etc.) — the
        proposed design's values (transient/fixable) are FailureTypeEnum, not ErrorClass.
      definition: |
        // pkg/retry/classify.go
        type ErrorClass string

        const (
            ErrorClassImport  ErrorClass = "import_error"
            ErrorClassType    ErrorClass = "type_error"
            ErrorClassTest    ErrorClass = "test_failure"
            ErrorClassBuild   ErrorClass = "build_error"
            ErrorClassLint    ErrorClass = "lint_error"
            ErrorClassUnknown ErrorClass = "unknown"
        )
      location: pkg/retry/classify.go
    - name: ClassifyError
      description: |-
        Moves from pkg/retryctx to pkg/retry. Signature is identical; only the
        package changes. engine/closed_loop_gate.go currently annotates its local
        variable as retryctx.ErrorClass — after migration it uses retry.ErrorClass.
      definition: |
        // pkg/retry/classify.go
        func ClassifyError(output string) ErrorClass
      location: pkg/retry/classify.go
    - name: SuggestFixes
      description: |-
        Moves from pkg/retryctx to pkg/retry. Signature changes only in return type
        (now uses retry.ErrorClass instead of retryctx.ErrorClass).
      definition: |
        // pkg/retry/classify.go
        func SuggestFixes(class ErrorClass) []string
      location: pkg/retry/classify.go
    - name: BuildPromptText
      description: |-
        Extracted from the unexported buildPromptText() in pkg/retryctx into
        an exported function in pkg/retry. Signature takes a RetryAttempt to
        bundle all parameters. Engine code that calls BuildRetryContext can now
        call BuildPromptText directly if needed.
      definition: |
        // pkg/retry/attempt.go
        func BuildPromptText(attempt RetryAttempt) string
      location: pkg/retry/attempt.go
    - name: RetryAttempt
      description: |-
        New unified type in pkg/retry replacing retryctx.RetryContext. Has identical
        JSON field names to preserve the binary contract of sawtools build-retry-context.
        The json tags MUST match retryctx.RetryContext exactly: attempt_number, agent_id,
        error_class, error_excerpt, gate_results, suggested_fixes, prior_notes,
        prompt_text, failure_type. PriorNotes replaces the prior Notes + Verification
        concatenation that BuildRetryContext currently performs.
      definition: |
        // pkg/retry/attempt.go
        type RetryAttempt struct {
            AttemptNumber  int        `json:"attempt_number"`
            AgentID        string     `json:"agent_id"`
            ErrorClass     ErrorClass `json:"error_class"`
            ErrorExcerpt   string     `json:"error_excerpt"`
            GateResults    []string   `json:"gate_results"`
            SuggestedFixes []string   `json:"suggested_fixes"`
            PriorNotes     string     `json:"prior_notes"`
            PromptText     string     `json:"prompt_text"`
            FailureType    string     `json:"failure_type,omitempty"`
        }
      location: pkg/retry/attempt.go
    - name: BuildRetryAttempt
      description: |-
        New function in pkg/retry replacing retryctx.BuildRetryContext. Reads the manifest
        at manifestPath, looks up the agent completion report, classifies the error, and
        returns a populated *RetryAttempt. The return type changes from *retryctx.RetryContext
        to *retry.RetryAttempt. engine/runner.go and build_retry_context_cmd.go are the
        callers that must be updated to use this function.
      definition: |
        // pkg/retry/attempt.go
        func BuildRetryAttempt(manifestPath string, agentID string, attemptNum int) (*RetryAttempt, error)
      location: pkg/retry/attempt.go
