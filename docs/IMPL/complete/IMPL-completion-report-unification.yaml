            You own one file: `cmd/sawtools/set_completion_cmd.go`.

            ## Task — Migrate CLI write path

            Read `cmd/sawtools/set_completion_cmd.go` in full before making changes.
            The current implementation:
            - Declares flags including agentID, status, commit, worktree, branch,
              filesChanged, filesCreated, testsAdded, verification
            - Validates status enum in a switch statement (lines 47-52)
            - Manually constructs `protocol.CompletionReport` struct (lines 61-70)
            - Calls `protocol.SetCompletionReport` + `protocol.Save` directly (lines 73-80)

            **Change 1: Add new flag variables.**
            Add `var notes string` and `var failureType string` alongside the existing vars.

            **Change 2: Register the new flags.**
            Add after the existing flag registrations:
            ```go
            cmd.Flags().StringVar(&notes, "notes", "", "Free-text notes")
            cmd.Flags().StringVar(&failureType, "failure-type", "", "Failure type: transient|fixable|needs_replan|escalate|timeout")
            ```

            **Change 3: Remove MarkFlagRequired for --commit.**
            The current code has `_ = cmd.MarkFlagRequired("commit")`. Remove this line.
            The builder's Validate() will enforce that commit is required for "complete" status,
            but NOT for "blocked" or "partial" (where commit may be absent). The old behavior
            required commit unconditionally which was too strict.

            **Change 4: Replace the manual construction + save block.**
            Replace the status validation switch, manual struct construction, SetCompletionReport,
            and Save calls with the builder pattern:

            ```go
            // Build completion report using the canonical builder.
            builder := protocol.NewCompletionReport(agentID).
                WithStatus(status).
                WithCommit(commit).
                WithWorktree(worktree).
                WithBranch(branch).
                WithFiles(splitCSV(filesChanged), splitCSV(filesCreated)).
                WithTestsAdded(splitCSV(testsAdded)).
                WithVerification(verification).
                WithNotes(notes)

            if failureType != "" {
                builder = builder.WithFailureType(failureType)
            }

            // Validate before touching disk.
            if err := builder.Validate(); err != nil {
                return fmt.Errorf("set-completion: %w", err)
            }

            // Persist with consolidated lock.
            if err := protocol.WithCompletionReportLock(func() error {
                m, loadErr := protocol.Load(manifestPath)
                if loadErr != nil {
                    return fmt.Errorf("set-completion: %w", loadErr)
                }
                if appendErr := builder.AppendToManifest(m); appendErr != nil {
                    return fmt.Errorf("set-completion: %w", appendErr)
                }
                return protocol.Save(m, manifestPath)
            }); err != nil {
                return err
            }

            // Print result
            out, _ := json.Marshal(map[string]interface{}{
                "agent":  agentID,
                "status": status,
                "saved":  true,
            })
            fmt.Println(string(out))
            return nil
            ```

            Note: The old status validation switch (lines 47-52) can be removed since
            builder.Validate() now handles status validation with better error messages.
            However, if you prefer to keep it as a fast-fail pre-check, that is acceptable.

