                    manifest, loadErr := protocol.Load(o.implDocPath)
                    if loadErr != nil {
                        return loadErr
                    }
                    if appendErr := builder.AppendToManifest(manifest); appendErr != nil {
                        return appendErr
                    }
                    return protocol.Save(manifest, o.implDocPath)
                }); saveErr != nil {
                    o.log().Warn("orchestrator: failed to save report", "agent", agentSpec.ID, "err", saveErr)
                }
            }
            ```

            The `reportMu.Lock()` / `reportMu.Unlock()` calls are removed from this write site.

            ## Task 2 — Migrate structured_wave.go read-lock

            Read `pkg/orchestrator/structured_wave.go` in full. The read-lock block at lines
            135-143 uses `reportMu` to protect a manifest re-load:

            ```go
            reportMu.Lock()
            if manifest, loadErr := protocol.Load(o.implDocPath); loadErr == nil {
                if r, ok := manifest.CompletionReports[protoAgent.ID]; ok {
                    savedStatus = r.Status
                    savedFailureType = r.FailureType
                    status = r.Status
                }
            }
            reportMu.Unlock()
            ```

            Replace with `WithCompletionReportLock` for consistency:

            ```go
            _ = protocol.WithCompletionReportLock(func() error {
                manifest, loadErr := protocol.Load(o.implDocPath)
                if loadErr != nil {
                    return loadErr
                }
                if r, ok := manifest.CompletionReports[protoAgent.ID]; ok {
                    savedStatus = r.Status
                    savedFailureType = r.FailureType
                    status = r.Status
                }
                return nil
            })
            ```

