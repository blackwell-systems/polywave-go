            ## Task 1 — Modify pkg/protocol/types.go

            Read `pkg/protocol/types.go` lines 101-118 (the `CompletionReport` struct).
            Add one field after the `Repo` field (the last field):

            ```go
            WrittenAt *time.Time `yaml:"written_at,omitempty" json:"written_at,omitempty"`
