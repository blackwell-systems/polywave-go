title: Unify completion report write paths — builder pattern, consolidated lock, consistent field population
feature_slug: completion-report-unification
feature: |
    Three write paths for CompletionReport (orchestrator, engine, CLI) each use their own
    local mutex and manually construct the struct, leading to lock fragmentation, inconsistent
    field population, and no early validation. This IMPL adds a builder API
    (pkg/protocol/completion_report.go) with Validate() semantics, consolidates the two
    independent locks into a single WithCompletionReportLock() in pkg/protocol/manifest.go,
    migrates all three callers to the builder, and populates previously-missing fields
    (FailureType in engine path, WrittenAt timestamp on all paths).
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 7 files across 4 packages (pkg/protocol, pkg/orchestrator,
       pkg/engine, cmd/sawtools). Wave 1 owns protocol package additions in disjoint files
       (types.go + completion_report.go to Agent A; manifest.go to Agent B). Wave 2 migrates
       three write paths in fully disjoint packages (engine to Agent C, orchestrator to Agent D,
       CLI to Agent E). No conflicting modifications.

    2. Investigation-first items: None. Research doc (docs/research-completion-report-unification.md)
       has fully identified all write sites, lock locations, missing fields, and race conditions.
       Root cause is understood.

    3. Interface discoverability: Builder API fully specifiable before wave launch (see
       interface_contracts). Lock mechanism is self-contained in manifest.go. All cross-agent
       interfaces are locked in before Wave 2 begins.

    4. Pre-implementation status check: No builder exists yet. All 7 planned files need
       implementation (6 modify, 1 new). Research confirms all three write paths are
       unmodified. No DONE or PARTIAL items.

    5. Parallelization value: High. Wave 2 has 3 fully independent agents in different
       packages. Go build cycles ~5-10s each. Builder API defined upfront enables true
       parallel migration with no coordination needed between Wave 2 agents.

    Estimated times:
    - Scout phase: ~20 min (research pre-done; primarily IMPL doc writing + validation)
    - Agent execution: ~25 min (2 Wave 1 agents x 12 min avg + 3 Wave 2 agents x 10 min avg, full parallelism per wave)
    - Merge & verification: ~5 min
    Total SAW time: ~50 min
    Sequential baseline: ~75 min (5 agents x 15 min avg sequential)
    Time savings: ~25 min (~33% faster)
    Recommendation: Clear speedup. Three-way parallel caller migration in Wave 2 is the primary win.
