          task: |
            ## Context

            You are implementing Wave 2 Agent E of the completion-report-unification feature
            in `github.com/blackwell-systems/scout-and-wave-go`. Wave 1 has already added:
            - `protocol.CompletionReportBuilder` and `protocol.NewCompletionReport` in
              `pkg/protocol/completion_report.go`
            - `protocol.WithCompletionReportLock` in `pkg/protocol/manifest.go`
