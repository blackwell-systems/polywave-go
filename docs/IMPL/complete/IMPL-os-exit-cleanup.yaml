completion_date: "2026-03-26"
title: Remove os.Exit() from CLI Handlers
feature_slug: os-exit-cleanup
verdict: SUITABLE
suitability_assessment: |
    Pre-analyzed research context incorporated directly (no discovery work repeated).

    The change is a mechanical find-and-replace across 38 source files in cmd/sawtools/.
    Every affected call site follows one of two identical patterns inside a RunE handler:

      fmt.Fprintf(os.Stderr, "cmd: message: %v\n", err)
      os.Exit(1)   # or os.Exit(2)

    Each pair is replaced with a single `return fmt.Errorf("cmd: message: %v", err)`.
    Cobra propagates the error to main(), which prints to stderr and exits 1.

    Exit-code semantics: Cobra always calls os.Exit(1) on a returned error — so the
    distinction between os.Exit(1) and os.Exit(2) is lost when using return. For the
    commands that currently emit exit 2 (parse errors, missing flags), the behaviour
    change is acceptable per the feature description ("no backward compatibility required").

    One call is kept: cmd/sawtools/main.go line 116 — this is the Cobra root executor
    and must remain.

    13 skipped tests across 8 test files will be un-skipped once os.Exit() is gone
    from the production code they exercise.

    File decomposition: 38 implementation files + 8 test files = 46 files, all in
    cmd/sawtools/. One agent can own all files because the package is a single
    compilation unit and the changes are independent per file (no cross-file
    dependencies to sequence). Single-agent single-wave structure is correct here.

    Suitability: SUITABLE. The parallelization value is low (mechanical edits), but the
    IMPL doc provides coordination value as an audit trail and tracking artifact.

    Estimated times:
    - Scout phase: ~5 min (research pre-provided, IMPL doc writing only)
    - Agent execution: ~15 min (38 files, mechanical substitution + test un-skipping)
    - Merge and verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~15 min (same work, one agent either way)
    Time savings: marginal; value is audit trail and structured tracking.
