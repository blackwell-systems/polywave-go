pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Exit code 2 is currently used in some commands to distinguish parse errors from runtime failures. After the change, all error returns produce exit code 1 via Cobra. Any script or CI step that tests for exit code 2 will break.
          likelihood: low
          impact: medium
          mitigation: |
            Feature description explicitly states no backward compatibility required. Document the exit-code flattening in commit message so callers are aware.
        - scenario: |
            Some commands print JSON output to stdout before the failure guard (e.g., tier-gate prints results then checks !data.Passed). If the agent replaces the os.Exit(1) but forgets to also remove the preceding fmt.Fprintf(os.Stderr, ...) call, Cobra will double-print the error message.
          likelihood: medium
          impact: low
          mitigation: |
            Agent brief explicitly instructs: remove the Fprintf line when replacing the os.Exit that follows it. Verification: grep for residual "Fprintf.*Stderr" near the replaced sites. The double-print is cosmetic (stderr only) and does not affect correctness or tests.
        - scenario: |
            An un-skipped test expects the command to fail but the production fix introduced a regression (e.g., the return path is unreachable, or the error message format changed). The test could pass vacuously or fail with a confusing message.
          likelihood: low
          impact: low
          mitigation: |
            Agent brief requires asserting err != nil (not just absence of panic) for each un-skipped test. go test ./cmd/sawtools/... must pass cleanly — any newly-un-skipped test that now fails will surface immediately.
        - scenario: |
            A file that used os.Getwd() or os.ReadFile() also had os.Exit() as the only additional os.* usage. The agent incorrectly removes the "os" import, causing a compile error.
          likelihood: low
          impact: low
          mitigation: |
            Agent brief explicitly lists os.Getwd, os.Stderr, etc. as reasons to retain the import. `go build ./...` will catch this immediately.
