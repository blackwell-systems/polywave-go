        - id: D
          task: |
            Fix the deprecated `strings.Title` usage in `pkg/protocol/gate_populator.go`
            and add the required `golang.org/x/text` dependency to `go.mod`.

            ## What to implement

            ### Context

            `strings.Title` is deprecated since Go 1.18 (and the project targets Go 1.25).
            The replacement is `cases.Title(language.Und).String(s)` from the
            `golang.org/x/text` package.

            The affected line is in `DetermineFocusedTestPattern` in
            `pkg/protocol/gate_populator.go`:
            ```go
            testPrefix := "Test" + strings.Title(pkgName)
            ```

            ### Step 1: Add golang.org/x/text to go.mod

            `golang.org/x/text` is NOT currently in go.mod. Run:
            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go && go get golang.org/x/text@latest
            ```

            This will update both `go.mod` and `go.sum` to include the dependency.
            If `go get` fails due to network issues, use the most recent stable version
            explicitly: `go get golang.org/x/text@v0.21.0`.

            ### Step 2: Update gate_populator.go imports

            In `pkg/protocol/gate_populator.go`, the current import block includes `"strings"`.
            Add the two new imports:
            ```go
            "golang.org/x/text/cases"
            "golang.org/x/text/language"
            ```

            The `"strings"` import must remain (it is used elsewhere in the file).

            ### Step 3: Replace strings.Title call

            In `DetermineFocusedTestPattern`, find the line (approximately line 172):
            ```go
            testPrefix := "Test" + strings.Title(pkgName)
            ```

            Replace it with:
            ```go
            testPrefix := "Test" + cases.Title(language.Und).String(pkgName)
            ```

            ### Verification

            After making changes, confirm there are no remaining `strings.Title` references
            in the file:
            ```bash
            grep -n "strings.Title" /Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/protocol/gate_populator.go
            ```
            Expected output: empty (no matches).

            ## Verification gate

            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/protocol/...
            ```

            ## Constraints

            - Modify only `pkg/protocol/gate_populator.go` and `go.mod` (and `go.sum`
              as a side effect of `go get`).
            - Use `language.Und` (Undetermined/universal) for the language tag — this
              matches the behavior of `strings.Title` for ASCII identifiers.
            - Do not change any logic in `DetermineFocusedTestPattern` other than the
              `strings.Title` call.
            - `go.sum` is modified automatically by `go get`; commit it along with `go.mod`.
          files:
            - pkg/protocol/gate_populator.go
            - go.mod
