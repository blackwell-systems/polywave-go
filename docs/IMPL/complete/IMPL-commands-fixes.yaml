waves:
    - number: 1
      agents:
        - id: A
          task: |
            Fix two bugs in `pkg/commands/makefile.go`.

            ## What to implement

            ### Fix 1: Remove space-indentation acceptance (CRITICAL — lines 80 and 106)

            Makefiles only allow tab indentation. The current code incorrectly accepts
            4-space indentation as valid. Remove all `strings.HasPrefix(line, "    ")` checks.

            **Line 80** — target detection guard. The current condition is:
            ```go
            if strings.Contains(line, ":") && !strings.HasPrefix(line, "\t") && !strings.HasPrefix(line, "    ") {
            ```
            Change to:
            ```go
            if strings.Contains(line, ":") && !strings.HasPrefix(line, "\t") {
            ```

            **Line 106** — command line detection. The current condition is:
            ```go
            } else if currentTarget != nil && (strings.HasPrefix(line, "\t") || strings.HasPrefix(line, "    ")) {
            ```
            Change to:
            ```go
            } else if currentTarget != nil && strings.HasPrefix(line, "\t") {
            ```

            ### Fix 2: Recursive target chain resolution (MEDIUM — lines 127-159)

            The current `resolveTargetChains` function only resolves one level of
            dependencies. For a Makefile like:
            ```
            test: integration
            integration: test-unit
            test-unit:
                go test ./... -short
            ```
            The current code would find `integration` as a dependency of `test`, but
            since `integration` has no commands of its own, it would be skipped rather
            than recursed into to find `test-unit`.

            Rewrite `resolveTargetChains` to recursively resolve dependencies using a
            visited set to prevent infinite loops. The algorithm:

            1. Define a helper function `collectLeaves(name string, targets map[string]*makeTarget, visited map[string]bool) []*makeTarget` that:
               - Returns empty slice if name not in targets or already visited
               - Marks name as visited
               - If target has commands, returns `[]*makeTarget{target}`
               - Otherwise, recurses into each dependency and collects their leaves
            2. For each target in `targetOrder`, call `collectLeaves` and add results to `leafTargets`/`leafOrder` (deduplicating by name)

            The function signature remains the same:
            ```go
            func resolveTargetChains(targets map[string]*makeTarget, targetOrder []string) (map[string]*makeTarget, []string)
            ```

            ## Tests

            No test file changes are required. The existing `TestMakefileParser_TargetChaining`
            test covers a two-level chain (test → build, lint, test-unit) and already passes
            because those direct deps have commands. However, you should add a test
            `TestMakefileParser_TransitiveDependencies` in `pkg/commands/makefile_test.go`
            that covers a 3-level chain (test → integration → test-unit where test-unit
            has the actual command). The test should verify that `make test-unit` is
            extracted as the test command.

            Also, `TestMakefileParser_TabIndentation` already verifies that tab-only
            indentation works. No changes needed there.

            ## Verification gate

            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/commands/...
            ```

            ## Constraints

            - Do not modify any file outside `pkg/commands/makefile.go` and
              `pkg/commands/makefile_test.go`.
            - The helper `collectLeaves` should be unexported (lowercase).
            - Use a `map[string]bool` visited set, not a slice, for O(1) lookup.
            ### Fix 3: prettier classified as Check instead of Fix (HIGH — package_json.go line 52)

            prettier writes files by default — Fix mode, not Check. Change line 52.
            Replace the single line with two:
              cmdSet.Commands.Format.Fix = extractCommand(pkg.Scripts, []string{"prettier"})
              cmdSet.Commands.Format.Check = extractCommand(pkg.Scripts, []string{"format"})
            Update TestPackageJSONParser_AlternativeScriptNames (~line 212) to assert
            Format.Fix instead of Format.Check for prettier.

            ### Fix 4: Broken contains() helper (HIGH — github_actions_test.go lines 434-438)

            Replace the broken helper body with:
              func contains(s, substr string) bool { return strings.Contains(s, substr) }
            Add "strings" to the test file imports if not already present.

            ### Fix 5: Document toolchain tie-breaking order (MEDIUM — github_actions.go ~line 225)

            Add a comment before the max := 0 declaration documenting the priority order
            Go > Rust > Node > Python. Do NOT change the logic itself.

            ## Verification gate

            go build ./...
            go vet ./...
            go test ./pkg/commands/...

            ## Constraints

            - Do not modify extractor.go or wrapper.go — you own them for E35 but they need no changes.
            - Do not change extractCommand helper — only call sites change.
            - Use strings.Contains for the contains() fix — do not re-implement.
          files:
            - pkg/commands/makefile.go
