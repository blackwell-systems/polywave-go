pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent D runs `go get golang.org/x/text` but network is unavailable or module
            proxy is down. The go.mod update fails.
          likelihood: low
          impact: medium
          mitigation: |
            Use an explicit version: `go get golang.org/x/text@v0.21.0`. If proxy fails,
            set GONOSUMCHECK or use GOFLAGS=-mod=mod. The agent should fall back to the
            explicit version flag if `@latest` fails.
        - scenario: |
            Agent B's test analysis is wrong: TestPackageJSONParser_SimpleScripts actually
            breaks after the prettier/format split because the fixture `format` script
            maps to Fix not Check.
          likelihood: low
          impact: low
          mitigation: |
            The fixture script is named `"format"` which maps to Format.Check in the new
            code (only `prettier` maps to Fix). The assertion `Format.Check != "npm run format"`
            remains correct. If the test still fails, agent B should re-read the fixture
            and assertion carefully.
        - scenario: |
            Agent A's recursive `resolveTargetChains` introduces an infinite loop for
            Makefiles with circular dependencies (e.g., a: b, b: a).
          likelihood: low
          impact: medium
          mitigation: |
            The visited set in `collectLeaves` prevents revisiting nodes. Agent A must
            pass the same visited map through all recursive calls (not create a new map
            per call).
        - scenario: |
            go.sum conflict at merge: Agent D modifies go.sum and another in-flight
            branch also has go.sum changes.
          likelihood: low
          impact: low
          mitigation: |
            Merge Agent D first or run `go mod tidy` post-merge to regenerate go.sum
            deterministically.
