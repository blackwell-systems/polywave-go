               SM-02 per the SAW protocol spec.
            2. pkg/orchestrator/transitions.go — `validTransitions` map used by the orchestrator's
               private `isValidTransition()`. This is an ORCHESTRATOR-SCOPED FSM for the
               orchestrator's own state tracking.

            Previously a third definition existed in pkg/protocol/manifest.go (the dead code being
            deleted by Agent A). After Agent A's deletion, only these two remain. The orchestrator
            file's existing comment reads:

            ```
            // validTransitions maps each state to the set of states reachable from it.
            // The SAW protocol defines 11 states with the following directed edges.
            ```

            ## What to implement

            Review the comment block at lines 7–8 of
            `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/orchestrator/transitions.go`.

            Update the comment to make clear that this map is the orchestrator's private FSM,
            NOT the protocol-level SM-02 implementation (which lives in
