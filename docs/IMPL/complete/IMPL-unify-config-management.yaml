pre_mortem:
    overall_risk: low
    rows:
        - scenario: Import alias collision in bedrock/client.go
          likelihood: medium
          impact: low
          mitigation: |
            Agent A instructions explicitly call out the aws config vs saw config
            import conflict and specify using sawconfig alias.
        - scenario: autonomy.Config field type mismatch after migration
          likelihood: low
          impact: medium
          mitigation: |
            config.AutonomyConfig.Level is string, autonomy.Level is a string typedef.
            Agent B instructions include explicit cast. If MaxAutoRetries/MaxQueueDepth
            are zero in config (missing section), DefaultConfig() is used as fallback.
        - scenario: Removal of autonomy.SaveConfig breaks unknown caller
          likelihood: low
          impact: medium
          mitigation: |
            Grep shows SaveConfig is only defined, never called outside the package.
            config.Save() in pkg/config already handles autonomy section persistence.
            If a caller exists in scout-and-wave-web, it would use the web app's own
            config handling, not this Go SDK function directly.
state: COMPLETE
