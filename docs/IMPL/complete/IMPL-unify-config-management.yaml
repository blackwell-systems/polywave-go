interface_contracts:
    - name: config.Load
      description: |
        Existing function — no changes needed. Callers will use this instead of
        their package-local config loading. Returns Result[*SAWConfig] with
        parent-directory walking (up to 10 levels).
      definition: |
        func Load(startDir string) result.Result[*SAWConfig]
      location: pkg/config/config.go
    - name: config.LoadOrDefault
      description: |
        Existing convenience function — returns default config if Load fails.
        daemon_cmd.go will use this to replace autonomy.LoadConfig() which had
        similar default-on-missing behavior.
      definition: |
        func LoadOrDefault(startDir string) *SAWConfig
      location: pkg/config/config.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Migrate backend provider credential loading from the duplicate
            `backend.LoadProvidersFromConfig()` to the canonical `config.Load()`.

            ### Step 1: Modify pkg/agent/backend/api/client.go

            In the `New()` function (line ~48-80), replace the credential fallback block:

            **Current code (lines 52-58):**
            ```go
            if apiKey == "" {
                cwd, _ := os.Getwd()
                providers := backend.LoadProvidersFromConfig(cwd)
                if providers.Anthropic.APIKey != "" {
                    apiKey = providers.Anthropic.APIKey
                }
            }
            ```

            **Replace with:**
            ```go
            if apiKey == "" {
                cwd, _ := os.Getwd()
                r := config.Load(cwd)
                if r.IsSuccess() {
                    if key := r.GetData().Providers.Anthropic.APIKey; key != "" {
                        apiKey = key
                    }
                }
            }
            ```

            Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
            Remove the `backend` import if it was only used for LoadProvidersFromConfig
            (it is still used for `backend.Config`, `backend.ToolCallCallback`, etc.,
            so keep it).

            ### Step 2: Modify pkg/agent/backend/bedrock/client.go

            In the `New()` function (line ~40-80), replace the credential fallback block:

            **Current code (lines 45-59):**
            ```go
            if cfg.BedrockProfile == "" && cfg.BedrockRegion == "" && cfg.BedrockAccessKeyID == "" {
                cwd, _ := os.Getwd()
                providers := backend.LoadProvidersFromConfig(cwd)
                if providers.Bedrock.Profile != "" {
                    cfg.BedrockProfile = providers.Bedrock.Profile
                }
                if providers.Bedrock.Region != "" && cfg.BedrockRegion == "" {
                    cfg.BedrockRegion = providers.Bedrock.Region
                }
                if providers.Bedrock.AccessKeyID != "" {
                    cfg.BedrockAccessKeyID = providers.Bedrock.AccessKeyID
                    cfg.BedrockSecretAccessKey = providers.Bedrock.SecretAccessKey
                    cfg.BedrockSessionToken = providers.Bedrock.SessionToken
                }
            }
            ```

            **Replace with:**
            ```go
            if cfg.BedrockProfile == "" && cfg.BedrockRegion == "" && cfg.BedrockAccessKeyID == "" {
                cwd, _ := os.Getwd()
                r := config.Load(cwd)
                if r.IsSuccess() {
                    p := r.GetData().Providers.Bedrock
                    if p.Profile != "" {
                        cfg.BedrockProfile = p.Profile
                    }
                    if p.Region != "" && cfg.BedrockRegion == "" {
                        cfg.BedrockRegion = p.Region
                    }
                    if p.AccessKeyID != "" {
                        cfg.BedrockAccessKeyID = p.AccessKeyID
                        cfg.BedrockSecretAccessKey = p.SecretAccessKey
                        cfg.BedrockSessionToken = p.SessionToken
                    }
                }
            }
            ```

            Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
            Note: This file already imports `"github.com/aws/aws-sdk-go-v2/config"` —
            use an alias for the SAW config: `sawconfig "github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
            and reference `sawconfig.Load(cwd)`.

            ### Step 3: Delete pkg/agent/backend/configfile.go

            Delete the entire file. It contains:
            - `SAWProviders` struct (duplicates `config.ProvidersConfig`)
            - `LoadProvidersFromConfig()` (replaced by `config.Load().Providers`)
            - `findConfigFile()` (replaced by `config.FindConfigPath()`)

            After deletion, verify no other files in pkg/agent/backend/ reference
            SAWProviders or LoadProvidersFromConfig.

            ### Step 4: Write migration test

            Create `pkg/agent/backend/configfile_migration_test.go` that verifies:
            - `config.Load()` returns provider credentials when saw.config.json exists
            - The providers section fields match the old SAWProviders struct layout
            - Parent-directory walking works (create config in parent, load from child)

            Use `t.TempDir()` and write a test saw.config.json with known provider values.

            ## Interface contracts

            Use existing `config.Load(startDir string) result.Result[*SAWConfig]` from
            pkg/config/config.go. Access providers via `.GetData().Providers`.

            Field mapping (old -> new):
            - `SAWProviders.Anthropic.APIKey` -> `SAWConfig.Providers.Anthropic.APIKey`
            - `SAWProviders.Bedrock.Region` -> `SAWConfig.Providers.Bedrock.Region`
            - `SAWProviders.Bedrock.AccessKeyID` -> `SAWConfig.Providers.Bedrock.AccessKeyID`
            - `SAWProviders.Bedrock.SecretAccessKey` -> `SAWConfig.Providers.Bedrock.SecretAccessKey`
            - `SAWProviders.Bedrock.SessionToken` -> `SAWConfig.Providers.Bedrock.SessionToken`
            - `SAWProviders.Bedrock.Profile` -> `SAWConfig.Providers.Bedrock.Profile`
            - `SAWProviders.OpenAI.APIKey` -> `SAWConfig.Providers.OpenAI.APIKey`

            ## Verification gate

            ```bash
            go build ./pkg/agent/backend/... && go build ./pkg/agent/backend/api/... && go build ./pkg/agent/backend/bedrock/... && go vet ./pkg/agent/backend/... && go test ./pkg/agent/backend/...
            ```

            ## Constraints

            - Do NOT modify pkg/config/config.go — it is correct as-is.
            - The bedrock client.go imports `"github.com/aws/aws-sdk-go-v2/config"` which
              conflicts with `"github.com/blackwell-systems/scout-and-wave-go/pkg/config"`.
              Use import alias `sawconfig` for the SAW config package.
            - Preserve all existing credential fallback behavior exactly (env vars checked
              first, then config file).
          files:
            - pkg/agent/backend/configfile.go
            - pkg/agent/backend/api/client.go
            - pkg/agent/backend/bedrock/client.go
            - pkg/agent/backend/configfile_migration_test.go
        - id: B
          task: |
            ## What to implement

            Migrate autonomy config loading from the duplicate `autonomy.LoadConfig()`
            to the canonical `config.Load()`, and update the daemon command caller.

            ### Step 1: Modify pkg/autonomy/config.go

            Remove `LoadConfig()` and `SaveConfig()` functions entirely. Also remove the
            `configFileName` constant. Keep all other code in the file (it only contains
            these config IO functions — the `Config` struct, `DefaultConfig()`, and
            decision logic are in autonomy.go).

            After removal, the file should be empty or contain only the package declaration.
            If empty, delete the file entirely.

            **Important:** The `autonomy.Config` type in autonomy.go must remain unchanged.
            It is referenced by `engine.DaemonOpts.AutonomyConfig` and other packages.
            Only the config IO functions are being removed.

            ### Step 2: Modify cmd/sawtools/daemon_cmd.go

            Replace the autonomy.LoadConfig call with config.Load:

            **Current code (lines 31-35):**
            ```go
            // Load autonomy config from saw.config.json.
            cfg, err := autonomy.LoadConfig(repoDir)
            if err != nil {
                return fmt.Errorf("daemon: load config: %w", err)
            }
            ```

            **Replace with:**
            ```go
            // Load config from saw.config.json (walks parent dirs).
            sawCfg := config.LoadOrDefault(repoDir)
            cfg := autonomy.Config{
                Level:          autonomy.Level(sawCfg.Autonomy.Level),
                MaxAutoRetries: sawCfg.Autonomy.MaxAutoRetries,
                MaxQueueDepth:  sawCfg.Autonomy.MaxQueueDepth,
            }
            if cfg.Level == "" {
                cfg = autonomy.DefaultConfig()
            }
            ```

            Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
            The `autonomy` import is still needed for `autonomy.Config`, `autonomy.ParseLevel`,
            `autonomy.DefaultConfig`.

            Note the mapping from config types:
            - `config.AutonomyConfig.Level` is `string`, `autonomy.Config.Level` is `autonomy.Level` (also string type)
            - `config.AutonomyConfig.MaxAutoRetries` -> `autonomy.Config.MaxAutoRetries`
            - `config.AutonomyConfig.MaxQueueDepth` -> `autonomy.Config.MaxQueueDepth`

            Also remove the now-unused `"errors"` import if present (it was used by
            LoadConfig's error handling), and the `"encoding/json"` import is still needed
            for the OnEvent handler.

            ### Step 3: Write migration test

            Create `pkg/autonomy/config_migration_test.go` that verifies:
            - `config.Load()` returns autonomy config when saw.config.json has autonomy section
            - The autonomy section fields map correctly to `autonomy.Config` struct
            - Default values work when autonomy section is missing
            - `config.LoadOrDefault()` returns sensible defaults when no config file exists

            Use `t.TempDir()` and write test saw.config.json files.

            ## Interface contracts

            Use existing `config.LoadOrDefault(startDir string) *SAWConfig` from
            pkg/config/config.go. Access autonomy via `.Autonomy`.

            Field mapping (old -> new):
            - `autonomy.Config.Level` <- `config.SAWConfig.Autonomy.Level` (cast string to autonomy.Level)
            - `autonomy.Config.MaxAutoRetries` <- `config.SAWConfig.Autonomy.MaxAutoRetries`
            - `autonomy.Config.MaxQueueDepth` <- `config.SAWConfig.Autonomy.MaxQueueDepth`

            ## Verification gate

            ```bash
            go build ./pkg/autonomy/... && go build ./cmd/sawtools/... && go vet ./pkg/autonomy/... && go vet ./cmd/sawtools/... && go test ./pkg/autonomy/... && go test ./cmd/sawtools/...
            ```

            ## Constraints

            - Do NOT modify pkg/config/config.go — it is correct as-is.
            - Do NOT modify pkg/autonomy/autonomy.go — keep the Config struct,
              DefaultConfig(), ShouldAutoApprove(), and all decision logic intact.
            - Only remove the config IO functions (LoadConfig, SaveConfig) and the
              configFileName constant from pkg/autonomy/config.go.
            - The daemon_cmd.go still needs the `autonomy` import for Config type,
              ParseLevel, and DefaultConfig — do not remove it.
          files:
            - pkg/autonomy/config.go
            - cmd/sawtools/daemon_cmd.go
            - pkg/autonomy/config_migration_test.go
      base_commit: f97e7019508b2f7c55038f6e16a52f412591827e
