completion_date: "2026-03-24"
title: Unify Configuration Management
feature_slug: unify-config-management
verdict: SUITABLE
suitability_assessment: |
    Parallel-systems-audit Finding #2: Three separate config loading implementations
    exist in scout-and-wave-go. The canonical pkg/config/ package already has Load()
    with parent-directory walking and full schema support. Two legacy callers bypass it:

    1. pkg/agent/backend/configfile.go: LoadProvidersFromConfig() — duplicate parent-dir
       walker, parses only providers section. Called by api/client.go and bedrock/client.go.
    2. pkg/autonomy/config.go: LoadConfig() — loads only autonomy section from a fixed
       path (no parent walking). Called by cmd/sawtools/daemon_cmd.go.

    Suitability:
    - File decomposition: 5 files change across 3 packages, cleanly split into 2 agents.
    - No investigation needed — the fix is well-defined migration to existing API.
    - Interface discoverability: config.Load() already exists with the right signature.
    - Pre-implementation: All 3 implementations verified in current codebase — none
      already consolidated.
    - Parallelization value: 2 independent agents (backend callers vs autonomy caller)
      can run simultaneously. Build/test cycle ~15s for Go. Marginal speedup but
      coordination value is high — the IMPL doc tracks which callers were migrated.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~5 min (2 agents x 3 min avg, single wave)
    - Merge and verification: ~3 min
    Total SAW time: ~13 min
    Sequential baseline: ~10 min (2 tasks x 5 min)
    Time savings: Marginal (~3 min slower due to overhead)
    Recommendation: Coordination value — IMPL doc serves as audit trail for finding #2.
test_command: go test ./...
lint_command: go vet ./...
