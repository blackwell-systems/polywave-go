pre_mortem:
    overall_risk: medium
    rows:
        - scenario: go.mod dependency update needed for scout-and-wave-web to import new pkg/notify
          likelihood: high
          impact: low
          mitigation: Integration agent (G) updates go.mod. If using local replace directives, this is trivial.
        - scenario: Slack/Discord/Telegram API format changes or undocumented behavior
          likelihood: low
          impact: medium
          mitigation: Adapters use well-documented webhook APIs. Tests use httptest mock servers, not real APIs.
        - scenario: NotificationBus hookpoint requires refactoring for webhook bridge
          likelihood: medium
          impact: medium
          mitigation: Bridge wraps existing Notify() pattern. Integration agent adds a second call site or wraps the bus to fan out to both SSE and webhooks.
        - scenario: Zero-import constraint violation in pkg/notify
          likelihood: medium
          impact: high
          mitigation: Each adapter agent has explicit constraint in task. Build verification gate catches SAW imports at compile time.
        - scenario: Config schema conflict between webhooks and existing notifications prefs
          likelihood: low
          impact: medium
          mitigation: Webhooks use separate 'webhooks' key in saw.config.json, not the existing 'notifications' key.
