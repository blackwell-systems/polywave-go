            **webhook_bridge.go contracts:**
            ```go
            type WebhookBridge struct {
                dispatcher *notify.Dispatcher
                formatter  notify.Formatter
            }

            func NewWebhookBridge(dispatcher *notify.Dispatcher) *WebhookBridge
            func (wb *WebhookBridge) HandleNotification(event NotificationEvent)
            ```

            HandleNotification translates the existing NotificationEvent (from notification_types.go)
            to a notify.Event and dispatches it. Event mapping:
            - NotificationEvent.Type -> Event.Type (string cast)
            - NotificationEvent.Severity -> Event.Severity (map "info"->SeverityInfo, etc.)
            - NotificationEvent.Title -> Event.Title
            - NotificationEvent.Message -> Event.Body
            - Add Fields: {"slug": event.Slug}

            Use a DefaultFormatter that produces plain-text Messages. Each adapter's own
            formatter (Slack/Discord/Telegram) handles rich formatting internally via
            its Send method.

            **webhook_handler.go contracts:**
            ```go
            // handleGetWebhookAdapters - GET /api/webhooks
            func (s *Server) handleGetWebhookAdapters(w http.ResponseWriter, r *http.Request)

            // handleSaveWebhookAdapters - POST /api/webhooks
