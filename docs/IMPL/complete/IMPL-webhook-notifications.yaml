suitability_assessment: |
    1. File decomposition: The work decomposes cleanly across two repos and multiple
       packages. The core notify library (pkg/notify/) in scout-and-wave-go is entirely
       new code with zero dependencies on existing packages. The bridge layer in
       scout-and-wave-web connects the existing NotificationBus to the new library.
       The web UI extends the existing NotificationSettings component and adds new
       webhook adapter API handlers. At least 6 agents with disjoint file ownership.

    2. Investigation-first items: None. All requirements are well-specified with
       clear interfaces (Slack Block Kit, Discord embeds, Telegram Bot API).

    3. Interface discoverability: Yes. The Event, Message, Adapter, Formatter, and
       Dispatcher interfaces can be fully specified before implementation. The bridge
       layer depends on the notify package types, which will be scaffolded.

    4. Pre-implementation status check: The existing notification system is in-app
       only (SSE + browser notifications via NotificationBus). No webhook/external
       notification code exists. pkg/notify/ does not exist yet. The existing
       NotificationPreferences type in the web app handles browser/toast prefs only.
       All work is TODO.

    5. Parallelization value: High. 6 agents across 2 repos, Go build+test cycle
       is >30s, each agent owns 2-4 files with non-trivial logic (HTTP clients,
       formatting, config management, React UI). Wave 1 agents are fully independent.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~15 min (3 parallel Wave 1 agents x 12 min avg, then 2 Wave 2 agents x 10 min)
    - Merge & verification: ~5 min
    Total SAW time: ~28 min

    Sequential baseline: ~72 min (6 agents x 12 min avg sequential time)
    Time savings: ~44 min (61% faster)

    Recommendation: Clear speedup. Proceed.
