pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            The upfront category-count and per-category-cap validation is added inside
            AssignAgentIDs but placed AFTER the length-mismatch check and BEFORE the call
            to generateGroupedIDs. If placed in the wrong order (e.g., before the
            length-mismatch check), a caller passing mismatched lengths would get a
            different error message than the existing test expects.
          likelihood: low
          impact: medium
          mitigation: |-
            Place new validation after the existing `len(grouping) != count` guard.
            Existing tests (TestAssignAgentIDs_GroupingLengthMismatch) will catch
            ordering mistakes immediately.
        - scenario: |-
            The per-category cap check iterates grouping to build a count map, using the
            same first-tag logic as generateGroupedIDs. If the implementation uses a
            slightly different key extraction (e.g., fails to handle empty tag slices),
            the cap check and the ID assignment will disagree on category membership,
            causing valid inputs to be rejected or invalid inputs to slip through.
          likelihood: low
          impact: medium
          mitigation: |-
            Extract the category-key logic into a single inline expression (or a small
            helper) used by both the validation block and generateGroupedIDs. The existing
            TestAssignAgentIDs_Grouped_EmptyTags test exercises the empty-tag path.
        - scenario: |-
            Removing the `count` parameter from generateGroupedIDs while forgetting to
            update the call site produces a compile error.
          likelihood: low
          impact: low
          mitigation: '`go build ./...` in the verification gate catches this immediately.'
