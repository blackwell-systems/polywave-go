interface_contracts:
    - name: AssignAgentIDs
      description: |-
        Public entry point — signature unchanged. Validation now rejects grouped-mode
        inputs that would produce invalid IDs upfront rather than letting the
        post-generation regex catch them with a confusing message.
      definition: |
        func AssignAgentIDs(count int, grouping [][]string) ([]string, error)
        // Behavior after fix:
        //   - grouping == nil → sequential mode
        //   - grouping != nil → grouped mode; validated upfront:
        //       • len(distinct categories) must be ≤ 26
        //       • agents per category must be ≤ 9
        //   - grouping != nil && len(grouping) == 0 → fails length-mismatch validation
        //     (only nil triggers sequential mode — docstring corrected to say this)
      location: pkg/idgen/generator.go
    - name: generateGroupedIDs
      description: |-
        Private helper — count parameter removed. Uses len(grouping) internally since
        the caller already ensures len(grouping) == count. Dead categoryIndices map removed.
      definition: |
        func generateGroupedIDs(grouping [][]string) []string
      location: pkg/idgen/generator.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Fix five confirmed bugs in `pkg/idgen/generator.go` and add tests in
            `pkg/idgen/generator_test.go`. Make no changes to any other file.

            ### Fix 1 — Remove dead `categoryIndices` map (Bug 1, low)

            In `generateGroupedIDs` (line 81), the map `categoryIndices` (declared line 83,
            populated at line 98) is never read after population. Remove:
            - The declaration: `categoryIndices := make(map[string][]int)`
            - The append statement: `categoryIndices[category] = append(categoryIndices[category], i)`
            Leave `categoryOrder` and everything else intact — `categoryOrder` IS used.

            ### Fix 2 — Add per-category agent cap (Bug 2, medium)

            In `AssignAgentIDs`, after the existing `count > 234` check and before calling
            `generateGroupedIDs`, add upfront validation for grouped mode:

            When `grouping != nil`, count agents per category. If any category has more than
            9 agents, return an error with a clear message such as:
              `fmt.Errorf("category %q has %d agents, maximum is 9 per category", category, n)`

            Use the same first-tag extraction logic that `generateGroupedIDs` uses:
            if `len(tags) > 0` use `tags[0]`, else use `""` as the category key.

            This prevents "A10", "A11", etc. from reaching the post-generation regex check.

            ### Fix 3 — Add category count cap (Bug 3, medium)

            In the same upfront validation block (grouped mode, after the per-category cap
            check), count distinct categories. If there are more than 26, return:
              `fmt.Errorf("grouped mode requires ≤ 26 distinct categories, got %d", n)`

            This prevents `rune('A' + 26)` = `'['` from being assigned as a letter.

            ### Fix 4 — Correct docstring and remove unreachable branch condition (Bug 4, low)

            a. Update the public docstring on `AssignAgentIDs` (lines 11-26). The current
               text says "If grouping is nil/empty, uses sequential mode". Change this to
               accurately describe behavior: only nil triggers sequential mode. An empty
               non-nil slice fails the length-mismatch validation before reaching the
               sequential branch. Suggested replacement for the relevant line:
                 "If grouping is nil, uses sequential mode (A-Z, A2-Z2, ...)."

            b. At line 45, the condition reads:
                 `if grouping == nil || len(grouping) == 0 {`
               The `len(grouping) == 0` half is unreachable because an empty non-nil slice
               with count > 0 fails the length-mismatch check at line 33. Simplify to:
                 `if grouping == nil {`

            ### Fix 5 — Remove redundant `count` parameter from `generateGroupedIDs` (Bug 5, low)

            Change the private function signature from:
              `func generateGroupedIDs(count int, grouping [][]string) []string`
            to:
              `func generateGroupedIDs(grouping [][]string) []string`

            Inside the function body, replace all uses of `count` with `len(grouping)`.
            There is exactly one use: `ids := make([]string, count)` → `ids := make([]string, len(grouping))`.

            Update the call site at line 48:
              `ids = generateGroupedIDs(count, grouping)` → `ids = generateGroupedIDs(grouping)`

            ### Tests to add in `generator_test.go`

            Add the following three test functions. Do not modify existing tests except
            as noted in (c) below.

            a. `TestAssignAgentIDs_Grouped_TooManyAgentsPerCategory`
               Call `AssignAgentIDs(10, grouping)` where grouping is 10 entries all tagged
               `"data"`. Expect a non-nil error. Verify the error message contains "category"
               and "9" (or the full string — your choice) so it is clearly a validation
               error, not a regex error.

            b. `TestAssignAgentIDs_Grouped_TooManyCategories`
               Build a grouping slice with 27 entries, each with a unique tag ("cat0" through
               "cat26"). Call `AssignAgentIDs(27, grouping)`. Expect a non-nil error. Verify
               the error message mentions "26" or "categories".

            c. Update the comment in `TestAssignAgentIDs_EmptyGrouping` (lines 284-286).
               The current comment says "This is expected behavior — if you pass a grouping
               array, it must match count / To trigger sequential mode, pass nil instead."
               Update it to be consistent with the corrected docstring: passing an empty
               non-nil slice fails the length-mismatch validation; only nil triggers
               sequential mode. The test assertion and behavior do NOT change, only the comment.

            ## Verification gate

            ```
            go build ./...
            go vet ./pkg/idgen/...
            go test ./pkg/idgen/...
            ```

            All existing tests must continue to pass. The two new error-path tests must pass.

            ## Constraints

            - Touch only `pkg/idgen/generator.go` and `pkg/idgen/generator_test.go`.
            - Do not change any exported function signatures other than the private
              `generateGroupedIDs` (which you are removing the `count` parameter from).
            - Do not reformat unrelated code; keep diffs minimal.
            - Follow existing code style: `fmt.Errorf` for errors, no external dependencies.
          files:
            - pkg/idgen/generator.go
            - pkg/idgen/generator_test.go
          context_source: prepared-brief
