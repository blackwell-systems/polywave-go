title: Fix bugs and dead code in pkg/idgen
feature_slug: idgen-bug-fixes
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    Only two files change (generator.go and generator_test.go), both in the same package.
    This is a single-agent, single-wave IMPL by design — the feature request explicitly asks
    for that structure. Parallelization value is low (the changes are small and sequential),
    but the IMPL doc provides value as an audit trail and progress tracker.

    Pre-implementation status check:
    - Bug 1 (dead categoryIndices map): TODO — map is built and populated at lines 83-98
      of generator.go but never read after that; confirmed dead code.
    - Bug 2 (no per-category agent cap): TODO — generateGroupedIDs has no guard preventing
      more than 9 agents per category; 10 same-category agents produce "A10" which fails the
      post-generation regex with an opaque error.
    - Bug 3 (no category count cap): TODO — no guard preventing 27+ distinct categories;
      letter assignment at line 104 produces rune('A' + 26) = '[' which is invalid.
    - Bug 4 (doc/behavior mismatch + unreachable branch): TODO — docstring at line 12 says
      "nil/empty grouping uses sequential mode" but the empty-non-nil path fails validation
      at line 33-35 (grouping length mismatch) before reaching the sequential branch at line 45.
      The `len(grouping) == 0` half of the OR condition at line 45 is unreachable.
      TestAssignAgentIDs_EmptyGrouping already asserts the correct (failing) behavior,
      but its comment on line 284 says "This is expected behavior" — that comment must be
      updated to match the corrected docstring.
    - Bug 5 (redundant count param in generateGroupedIDs): TODO — the caller at line 48
      passes count but since len(grouping) == count is already validated, the private
      function can simply use len(grouping) and drop the parameter.

    All five issues are confirmed TODO. No prior implementation found.

    Caveats: single-agent execution — parallelization benefit is minimal. Value is
    coordination artifact and audit trail.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~10 min (1 agent, 2 files, targeted changes + new tests)
    - Merge and verification: ~2 min
    Total SAW time: ~17 min

    Sequential baseline: ~12 min
    Time savings: marginal (overhead roughly equals savings at this scale).
    Recommendation: Proceed — explicit test coverage for two new error paths justifies
    the coordination overhead.
