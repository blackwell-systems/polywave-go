suitability_assessment: |
    This is a mechanical substitution task: define ~67 constants in pkg/result/codes.go,
    then replace every matching string literal across ~20 files with the constant reference.
    The work is fully enumerable upfront (grep produces the complete list) and there are
    no interface signature changes.

    Suitability gate answers:
    1. File decomposition: The constants file is the single foundation dependency. All
       replacements in engine/ and notify/ are independent of each other once codes.go
       is written. A single solo agent is appropriate — this is a mechanical sweep, not
       creative parallel implementation. Splitting across two agents would require careful
       file partitioning that adds overhead for minimal benefit.
    2. Investigation-first: No — all ad-hoc strings are enumerated by grep.
    3. Interfaces: No cross-agent interfaces; additive constants only.
    4. Pre-implementation status: IMPL 1 (commit 47af66c) modified runner.go and
       finalize.go for nil-guard fixes. IMPL 2's changes to those files are in different
       regions (error code string literals, not nil guards). IMPL 3 will also touch runner.go
       and finalize.go for StartWave/startWaveWithGate merge — IMPL 2 must land first or
       the merge regions must be noted as non-overlapping cascade patches.
    5. Parallelization value: Solo wave, 1 agent — coordination value here is the audit
       trail and the pre-enumerated constant list, not parallelization speed.

    Caveats:
    - pkg/notify/ files (slack.go, discord.go, telegram.go, dispatcher.go, dispatcher_test.go)
      use CONTEXT_CANCELLED with no other ENGINE_* codes. Including them keeps the constant
      fully exercised; excluding them leaves inconsistency. They are in scope.
    - Test files (program_progress_test.go, scout_correction_loop_test.go, dispatcher_test.go)
      assert on the string literals directly and must also be updated.
    - IMPL 3 also owns runner.go and finalize.go. If IMPL 2 and IMPL 3 run in parallel,
      the changes are non-overlapping (string replacements vs wave-loop restructuring) but
      a merge conflict is possible if the same lines appear in both patches. Run IMPL 2
      first or declare a cascade patch contract.

    Estimated times:
    - Scout phase: ~15 min (grep enumeration, constant assignment, IMPL doc)
    - Agent execution: ~25 min (1 agent, 20 files, mechanical replacements + compile check)
    - Merge and verification: ~5 min
    Total SAW time: ~45 min

    Sequential baseline: ~30 min (single developer with IDE)
    Recommendation: Marginal speed gain; primary value is the pre-enumerated constant list
    and audit trail. Proceed as SUITABLE_WITH_CAVEATS.
