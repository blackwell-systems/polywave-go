pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Makefile parser fails on complex target chaining (recursive dependencies, wildcards)
          likelihood: medium
          impact: low
          mitigation: Start with simple target parsing, defer recursive dependency resolution if time-constrained. Document limitation and recommend manual override.
        - scenario: GitHub Actions matrix builds have platform-specific commands that differ subtly (e.g., 'cargo clippy' on Linux, 'cargo clippy --all-features' on macOS)
          likelihood: medium
          impact: medium
          mitigation: Detect host platform from Go runtime (runtime.GOOS), filter matrix entries by 'runs-on' or 'os' fields, select matching entry. If no match, fall back to first entry.
        - scenario: CI workflow uses custom scripts or external tools not parseable from YAML alone (e.g., './scripts/run-tests.sh')
          likelihood: high
          impact: low
          mitigation: 'Extract the script invocation as-is (e.g., ''run: ./scripts/run-tests.sh''). This is better than failing - Scout can use it verbatim.'
        - scenario: Agent F cannot complete CLI integration until all parsers (B, C, D, E) are merged
          likelihood: low
          impact: medium
          mitigation: Agent F is in Wave 2, blocked on Wave 1 completion. This is by design. If Wave 1 runs into issues, Agent F will adapt prompt based on available parsers.
