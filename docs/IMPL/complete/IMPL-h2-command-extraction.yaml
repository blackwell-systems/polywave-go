            ## What to Implement

            Create `pkg/commands/package_json.go` with:
            - `PackageJSONParser` struct (implements BuildSystemParser interface)
            - `ParseBuildSystem(repoRoot string) (*CommandSet, error)` method
            - `Priority() int` method (return 40)

            Parsing logic:
            1. Check if package.json exists at repoRoot/package.json
            2. Parse JSON (use encoding/json)
            3. Extract commands from `scripts` section
            4. Classify scripts by name:
               - Build: "build", "compile"
               - Test: "test", "test:unit", "test:e2e"
               - Lint: "lint", "eslint"
               - Format: "format", "prettier"
            5. Handle monorepo workspaces per roadmap edge case #3:
               - Detect workspace structure from package.json `workspaces` field
               - Provide both full repo command ("npm test") and focused pattern
                 ("npm test --workspace=packages/foo")

            ## Interfaces to Implement

            - `BuildSystemParser.ParseBuildSystem(repoRoot string) (*CommandSet, error)` - from types.go
            - `BuildSystemParser.Priority() int` - from types.go

            ## Interfaces to Call

            None - this parser is independent.

            ## Tests to Write

            1. TestPackageJSONParser_SimpleScripts - parse package.json with standard scripts
            2. TestPackageJSONParser_MonorepoWorkspaces - handle workspaces field
            3. TestPackageJSONParser_NoPackageJSON - return nil when package.json absent
            4. TestPackageJSONParser_MalformedJSON - return error for syntax errors

            ## Verification Gate

            ```bash
            go build ./pkg/commands/...
            go vet ./pkg/commands/...
            go test ./pkg/commands/... -v -run TestPackageJSON
            ```

            ## Constraints

            - Return nil (not error) when package.json doesn't exist
            - Priority must be 40 (lower than Makefile)
            - npm scripts use "npm run <script>", not just "<script>"
            - Workspace commands require --workspace flag
          files:
            - pkg/commands/package_json.go
            - pkg/commands/package_json_test.go
        - id: E
          task: |
            Implement language defaults fallback that provides standard commands
            when no CI/build system configs are found.

            ## What to Implement

            Create `pkg/commands/defaults.go` with:
            - `LanguageDefaults(repoRoot string) (*CommandSet, error)` function

            Detection logic:
            1. Scan repoRoot for marker files:
               - go.mod → Go toolchain
               - Cargo.toml → Rust toolchain
               - package.json → Node toolchain
               - pyproject.toml → Python toolchain
            2. Return standard commands for detected toolchain:

            Go defaults:
              build: "go build ./..."
              test: "go test ./..."
              lint.check: "go vet ./..."
              format.fix: "gofmt -w ."

            Rust defaults:
              build: "cargo build"
              test: "cargo test"
              lint.check: "cargo clippy -- -D warnings"
              format.check: "cargo fmt -- --check"
              format.fix: "cargo fmt"

            Node defaults:
              build: "npm run build"
              test: "npm test"
              lint.check: "npm run lint"
              format.check: "npm run format:check"

            Python defaults:
              build: null (interpreted language)
              test: "pytest"
              lint.check: "ruff check ."
              format.fix: "black ."

            ## Interfaces to Implement

            - `LanguageDefaults(repoRoot string) (*CommandSet, error)` - standalone function

            ## Interfaces to Call

            None - this is a fallback, called only when all parsers return nil.

            ## Tests to Write

            1. TestLanguageDefaults_Go - detect go.mod and return Go defaults
            2. TestLanguageDefaults_Rust - detect Cargo.toml and return Rust defaults
            3. TestLanguageDefaults_Node - detect package.json and return Node defaults
            4. TestLanguageDefaults_Python - detect pyproject.toml and return Python defaults
            5. TestLanguageDefaults_NoMarkers - return error when no toolchain detected

            ## Verification Gate

            ```bash
            go build ./pkg/commands/...
            go vet ./pkg/commands/...
            go test ./pkg/commands/... -v -run TestLanguageDefaults
            ```

            ## Constraints

            - This is the lowest-priority fallback (priority 0)
            - Return error if no marker files found
            - Do not hardcode paths - use filepath.Join for portability
          files:
            - pkg/commands/defaults.go
            - pkg/commands/defaults_test.go
