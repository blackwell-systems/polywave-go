            from Makefile targets.

            ## What to Implement

            Create `pkg/commands/makefile.go` with:
            - `MakefileParser` struct (implements BuildSystemParser interface)
            - `ParseBuildSystem(repoRoot string) (*CommandSet, error)` method
            - `Priority() int` method (return 50)

            Parsing logic:
            1. Check if Makefile exists at repoRoot/Makefile
            2. Parse Makefile to extract targets and dependencies
            3. Handle target chaining per roadmap edge case #1:
               - If target has dependencies (e.g., `test: build lint test-unit`),
                 parse the dependency tree and select leaf targets
               - Leaf targets are those with no further dependencies
            4. Classify targets by name pattern:
               - Build: "build", "compile", "all"
               - Test: "test", "test-unit", "test-integration", "check"
               - Lint: "lint", "vet", "check"
               - Format: "fmt", "format"
            5. Extract command from target body (lines following target declaration)

            ## Interfaces to Implement

            - `BuildSystemParser.ParseBuildSystem(repoRoot string) (*CommandSet, error)` - from types.go
            - `BuildSystemParser.Priority() int` - from types.go

            ## Interfaces to Call

            None - this parser is independent.

            ## Tests to Write

            1. TestMakefileParser_SimpleTargets - parse Makefile with independent targets
            2. TestMakefileParser_TargetChaining - handle "test: build lint test-unit"
            3. TestMakefileParser_NoMakefile - return nil when Makefile absent
            4. TestMakefileParser_EmptyTargets - handle Makefile with no targets

            ## Verification Gate

            ```bash
            go build ./pkg/commands/...
            go vet ./pkg/commands/...
            go test ./pkg/commands/... -v -run TestMakefile
            ```

            ## Constraints

            - Return nil (not error) when Makefile doesn't exist
            - Priority must be 50 (lower than CI parsers, higher than package.json)
            - Handle tab indentation (Makefile requirement)
            - Target chaining: select leaf targets, not intermediate targets
          files:
            - pkg/commands/makefile.go
            - pkg/commands/makefile_test.go
        - id: D
