interface_contracts:
    - name: Extractor.Extract
      description: |
        Main entry point for command extraction. Orchestrates priority-based
        resolution across CI parsers and build system parsers. Returns the
        highest-priority CommandSet found, or language defaults if no config
        files are present.
      definition: |
        func (e *Extractor) Extract(repoRoot string) (*CommandSet, error)
      location: pkg/commands/extractor.go
    - name: CIParser interface
      description: |
        Interface for CI system parsers (GitHub Actions, GitLab CI, CircleCI).
        Each parser returns a CommandSet and a priority indicating confidence.
        Higher priority = more specific/explicit command definitions.
      definition: |
        type CIParser interface {
          ParseCI(repoRoot string) (*CommandSet, error)
          Priority() int
        }
      location: pkg/commands/types.go
    - name: BuildSystemParser interface
      description: |
        Interface for build system parsers (Makefile, package.json, Cargo.toml,
        pyproject.toml). Returns CommandSet and priority like CIParser.
      definition: |
        type BuildSystemParser interface {
          ParseBuildSystem(repoRoot string) (*CommandSet, error)
          Priority() int
        }
      location: pkg/commands/types.go
    - name: GithubActionsParser.ParseCI
      description: |
        Parses .github/workflows/*.yml files to extract build/test/lint/format
        commands. Handles matrix builds by detecting host platform. Priority: 100.
      definition: |
        func (p *GithubActionsParser) ParseCI(repoRoot string) (*CommandSet, error)
        func (p *GithubActionsParser) Priority() int { return 100 }
      location: pkg/commands/github_actions.go
    - name: MakefileParser.ParseBuildSystem
      description: |
        Parses Makefile to extract commands from targets. Handles target chaining
        by parsing dependency tree and selecting leaf targets. Priority: 50.
      definition: |
        func (p *MakefileParser) ParseBuildSystem(repoRoot string) (*CommandSet, error)
        func (p *MakefileParser) Priority() int { return 50 }
      location: pkg/commands/makefile.go
    - name: PackageJSONParser.ParseBuildSystem
      description: |
        Parses package.json scripts section to extract build/test/lint/format
        commands. Detects workspace structure for monorepos. Priority: 40.
      definition: |
        func (p *PackageJSONParser) ParseBuildSystem(repoRoot string) (*CommandSet, error)
        func (p *PackageJSONParser) Priority() int { return 40 }
      location: pkg/commands/package_json.go
    - name: LanguageDefaults
      description: |
        Fallback defaults when no CI/build system configs are found. Detects
        toolchain from marker files (go.mod, Cargo.toml, package.json, pyproject.toml)
        and returns standard commands for that language.
      definition: |
        func LanguageDefaults(repoRoot string) (*CommandSet, error)
      location: pkg/commands/defaults.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Implement the core Extractor that orchestrates priority-based command
            resolution across CI parsers and build system parsers.

            ## What to Implement

            Create `pkg/commands/extractor.go` with:
            - `Extractor` struct (holds registered parsers)
            - `New() *Extractor` constructor
            - `Extract(repoRoot string) (*CommandSet, error)` main entry point
            - Priority resolution logic: collect results from all parsers, sort by
              priority descending, return first non-nil CommandSet

            Priority ordering (per roadmap):
            1. CI parsers (priority 100+): GitHub Actions, GitLab CI, CircleCI
            2. Build system parsers (priority 50-): Makefile, package.json, Cargo.toml
            3. Language defaults (priority 0): fallback when no configs found

            The Extractor should:
            - Accept parsers via constructor or Register methods
            - Call each parser's Parse method and collect results
            - Filter out nil results
            - Sort by priority (descending)
            - Return highest-priority CommandSet or language defaults

            ## Interfaces to Implement

            None - this agent consumes interfaces defined in types.go (scaffold).

            ## Interfaces to Call

            - `CIParser.ParseCI(repoRoot string) (*CommandSet, error)` - from types.go
            - `CIParser.Priority() int` - from types.go
            - `BuildSystemParser.ParseBuildSystem(repoRoot string) (*CommandSet, error)` - from types.go
            - `BuildSystemParser.Priority() int` - from types.go
            - `LanguageDefaults(repoRoot string) (*CommandSet, error)` - from defaults.go (Agent E)

            ## Tests to Write

            1. TestExtractor_PriorityResolution - verify CI parsers beat build system parsers
            2. TestExtractor_FallbackToDefaults - verify defaults used when no parsers return results
            3. TestExtractor_NilResults - verify nil results are filtered out
            4. TestExtractor_EmptyParsers - verify fallback to defaults when no parsers registered

            ## Verification Gate

            ```bash
            go build ./pkg/commands/...
            go vet ./pkg/commands/...
            go test ./pkg/commands/... -v -run TestExtractor
            ```

            ## Constraints

            - Do not implement any parsers - those are owned by other agents
            - Extractor must be agnostic to parser implementations
            - If all parsers return nil, fall back to LanguageDefaults
            - Priority ties: first parser wins (stable sort)
          files:
            - pkg/commands/extractor.go
            - pkg/commands/extractor_test.go
        - id: B
          task: |
            Implement GitHub Actions parser that extracts build/test/lint/format
            commands from .github/workflows/*.yml files.

            ## What to Implement

            Create `pkg/commands/github_actions.go` with:
            - `GithubActionsParser` struct (implements CIParser interface)
            - `ParseCI(repoRoot string) (*CommandSet, error)` method
            - `Priority() int` method (return 100)

            Parsing logic:
            1. Find all .github/workflows/*.yml files
            2. Parse YAML (use gopkg.in/yaml.v3)
            3. Extract `run:` commands from `steps:` sections
            4. Classify commands by pattern matching:
               - Build: "go build", "cargo build", "npm run build"
               - Test: "go test", "cargo test", "npm test", "pytest"
               - Lint: "go vet", "golangci-lint", "cargo clippy", "eslint", "ruff check"
               - Format: "gofmt", "cargo fmt", "prettier", "black"
            5. Distinguish check mode vs fix mode for lint/format:
               - Check: "cargo clippy" (no --fix), "eslint ." (no --fix), "ruff check"
               - Fix: "cargo clippy --fix", "eslint --fix", "ruff --fix"
            6. Handle matrix builds: detect host platform from env vars, select matching matrix entry

            ## Interfaces to Implement

            - `CIParser.ParseCI(repoRoot string) (*CommandSet, error)` - from types.go
            - `CIParser.Priority() int` - from types.go

            ## Interfaces to Call

            None - this parser is independent.

            ## Tests to Write

            1. TestGithubActionsParser_ValidWorkflow - parse real GitHub Actions file
            2. TestGithubActionsParser_MatrixBuild - handle matrix with multiple OS/toolchain combos
            3. TestGithubActionsParser_NoWorkflows - return nil when .github/workflows/ absent
            4. TestGithubActionsParser_MalformedYAML - return error for syntax errors

            ## Verification Gate

            ```bash
            go build ./pkg/commands/...
            go vet ./pkg/commands/...
            go test ./pkg/commands/... -v -run TestGithubActions
            ```

            ## Constraints

            - Return nil (not error) when .github/workflows/ directory doesn't exist
            - Priority must be 100 (higher than Makefile)
            - Only extract commands from `run:` fields in steps
            - Ignore commented-out commands
          files:
