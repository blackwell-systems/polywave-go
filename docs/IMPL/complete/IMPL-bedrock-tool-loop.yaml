        - id: B
          task: |
            ## What to Implement

            Comprehensive tests for the Bedrock backend tool-use loop in a new file
            `pkg/agent/backend/bedrock/client_test.go`. Follow the test patterns from
            `pkg/agent/backend/openai/client_test.go` which uses `httptest.NewServer`
            to mock API responses.

            **Challenge:** The Bedrock backend uses `bedrockruntime.Client` from AWS SDK,
            not raw HTTP. To test without real AWS credentials, you must test at the
            integration boundary. Use one of these strategies:

            ### Strategy: Interface-based mock

            The existing code creates `bedrockruntime.Client` in `New()`. For testability,
            create a minimal internal interface and a mock:

            ```go
            // bedrockAPI is an internal interface for the subset of bedrockruntime.Client
            // methods used by this package. Enables test mocking without AWS credentials.
            type bedrockAPI interface {
              InvokeModel(ctx context.Context, params *bedrockruntime.InvokeModelInput, optFns ...func(*bedrockruntime.Options)) (*bedrockruntime.InvokeModelOutput, error)
              InvokeModelWithResponseStream(ctx context.Context, params *bedrockruntime.InvokeModelWithResponseStreamInput, optFns ...func(*bedrockruntime.Options)) (*bedrockruntime.InvokeModelWithResponseStreamOutput, error)
            }
            ```

            Then change `Client.client` from `*bedrockruntime.Client` to `bedrockAPI`, and
            add a `WithClient(api bedrockAPI) *Client` method for test injection.

            **IMPORTANT:** Agent A is modifying client.go concurrently. Your interface
            extraction must be compatible. The `bedrockAPI` interface and the `WithClient`
            method should go in a new file `pkg/agent/backend/bedrock/mock_test.go` using
            a test-only approach that does NOT require modifying client.go. Instead:

            Use the exported `New()` constructor and then replace the internal client field
            via an unexported test helper. Since tests are in the same package, you can
            directly access `c.client`. Create a mock that satisfies the
            `*bedrockruntime.Client` interface by implementing the required methods.

            **Simplest approach:** Since `c.client` is `*bedrockruntime.Client` (a concrete
            type, not an interface), the cleanest test strategy is:

            1. Test `buildToolsJSON` and `executeTool` directly (they don't need AWS).
            2. For the streaming loop, test the stream parsing logic by extracting it into
               a testable helper, OR use build tags to skip integration tests.
            3. Write unit tests for the helpers and parsing logic.

            ### Tests to Write

            1. **TestBuildToolsJSON** â€” Verify that `buildToolsJSON` converts a Workshop
               with 2+ tools into the correct JSON structure. Check that each tool has
               `name`, `description`, and `input_schema` keys.

            2. **TestExecuteTool_KnownTool** â€” Create a Workshop with a mock tool, call
               `executeTool`, verify result is returned and isError is false.

            3. **TestExecuteTool_UnknownTool** â€” Call `executeTool` with a name not in the
               workshop. Verify error message and isError is true.

            4. **TestBuildWorkshop_StandardMode** â€” Create a Client with `readOnly: false`,
               call `buildWorkshop`, verify all 7 tools are registered.

            5. **TestBuildWorkshop_ReadOnlyMode** â€” Create a Client with `readOnly: true`,
               call `buildWorkshop`, verify write_file and edit_file are blocked.

            6. **TestMaxTurns_Default** â€” Verify `maxTurns()` returns 50 when cfg.MaxTurns is 0.

            7. **TestMaxTurns_Custom** â€” Verify `maxTurns()` returns cfg value when set.

            8. **TestRunStreamingWithTools_NilClient** â€” Call with nil AWS client, expect
               error about AWS config.

            9. **TestStreamEventParsing** â€” If the stream event struct types are exported
               or accessible within the package, test JSON unmarshaling of each event type:
               content_block_start (text), content_block_start (tool_use),
               content_block_delta (text_delta), content_block_delta (input_json_delta),
               message_delta with stop_reason.

            ## Interfaces to Call
            - `tools.StandardTools(workDir string) Workshop`
            - `tools.NewWorkshop() Workshop`
            - `workshop.Register(tool Tool) error`
            - `workshop.All() []Tool`
            - `workshop.Get(name string) (Tool, bool)`
            - `buildToolsJSON(workshop tools.Workshop) []interface{}`
            - `executeTool(ctx, workshop, name, input, workDir) (string, bool)`
            - `Client.buildWorkshop(workDir string) tools.Workshop`

            ## Verification Gate
