            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./...
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go vet ./...
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/agent/backend/bedrock/...
            ```

            ## Constraints
            - Tests are in package `bedrock` (same package, not `bedrock_test`) so you can
              access unexported fields and functions.
            - Do NOT require real AWS credentials â€” all tests must pass without network.
            - Do NOT modify client.go or tools.go â€” those belong to Agent A.
            - Follow the test naming patterns from openai/client_test.go.
            - Use `t.TempDir()` for workDir in tests.
            - Use `context.Background()` for test contexts.
