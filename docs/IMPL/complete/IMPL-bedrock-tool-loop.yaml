interface_contracts:
    - name: buildWorkshop
      description: |
        Creates a Workshop with appropriate middleware based on client config.
        Mirrors the identical method in api/client.go and openai/client.go.
        Uses ReadOnlyTools for Scout agents, StandardTools for wave agents.
        Wraps with WithTiming if onToolCall callback is configured.
      definition: |
        func (c *Client) buildWorkshop(workDir string) tools.Workshop
      location: pkg/agent/backend/bedrock/client.go
    - name: buildToolsJSON
      description: |
        Converts Workshop tools to the Bedrock/Anthropic Messages API JSON format.
        Returns a []interface{} where each element is a map with name, description,
        and input_schema fields. This is the same format as the direct Anthropic API
        since Bedrock uses the Messages API wire format.
      definition: |
        func buildToolsJSON(workshop tools.Workshop) []interface{}
        // Each tool becomes:
        // map[string]interface{}{
        //   "name":         tool.Name,
        //   "description":  tool.Description,
        //   "input_schema": tool.InputSchema,
        // }
      location: pkg/agent/backend/bedrock/tools.go
    - name: executeTool
      description: |
        Looks up a tool by name in the Workshop and executes it.
        Returns (resultString, isError). Mirrors the pattern from api/client.go.
      definition: |
        func executeTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, bool)
      location: pkg/agent/backend/bedrock/client.go
    - name: RunStreamingWithTools (updated)
      description: |
        Full multi-turn tool-use loop via InvokeModelWithResponseStream.
        Streams text deltas via onChunk, emits tool call events via onToolCall.
        Loops until stop_reason is "end_turn" or maxTurns exceeded.
        Parses content_block_start (tool_use detection), content_block_delta
        (text_delta + input_json_delta), and message_delta (stop_reason).
      definition: |
        func (c *Client) RunStreamingWithTools(
          ctx context.Context,
          systemPrompt, userMessage, workDir string,
          onChunk backend.ChunkCallback,
          onToolCall backend.ToolCallCallback,
        ) (string, error)
      location: pkg/agent/backend/bedrock/client.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Implement the full multi-turn agentic tool-use loop in the Bedrock backend.
            This makes `RunStreamingWithTools` functional instead of falling back to
            single-turn `RunStreaming`.

            ### File 1: `pkg/agent/backend/bedrock/tools.go` (NEW)

            Create a new file with:

            1. `buildToolsJSON(workshop tools.Workshop) []interface{}` â€” converts Workshop
               tools to Bedrock/Anthropic Messages API JSON format. Each tool becomes a map
               with `name`, `description`, and `input_schema` keys. The `input_schema` is
               taken directly from `tool.InputSchema` (it is already JSON Schema format).

            2. `executeTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, bool)` â€”
               looks up a tool by name via `workshop.Get(name)`, executes it with
               `tools.ExecutionContext{WorkDir: workDir}`, returns `(result, isError)`.
               On unknown tool: return `("error: unknown tool \"name\"", true)`.
               On execution error: return `(fmt.Sprintf("error: %v", err), true)`.
               This mirrors `executeTool` in `pkg/agent/backend/api/client.go` lines 137-148.

            ### File 2: `pkg/agent/backend/bedrock/client.go` (MODIFY)

            1. Add `onToolCall` and `readOnly` fields to the `Client` struct:
               ```go
               type Client struct {
                 client     *bedrockruntime.Client
                 cfg        backend.Config
                 onToolCall backend.ToolCallCallback
                 readOnly   bool
               }
               ```

            2. Update `New()` to store these from config:
               ```go
               return &Client{
                 client:     bedrockruntime.NewFromConfig(awsCfg),
                 cfg:        cfg,
                 onToolCall: cfg.OnToolCall,
                 readOnly:   cfg.ReadOnly,
               }
               ```

            3. Add `buildWorkshop` method (same pattern as api/client.go lines 71-89):
               ```go
               func (c *Client) buildWorkshop(workDir string) tools.Workshop {
                 var w tools.Workshop
                 if c.readOnly {
                   w = tools.ReadOnlyTools(workDir)
                 } else {
                   w = tools.StandardTools(workDir)
                 }
                 if c.onToolCall != nil {
                   w = tools.WithTiming(w, func(ev tools.ToolCallEvent) {
                     c.onToolCall(backend.ToolCallEvent{
                       Name:       ev.ToolName,
                       DurationMs: ev.DurationMs,
                       IsError:    ev.IsError,
                       IsResult:   true,
                     })
                   })
                 }
                 return w
               }
               ```

            4. Add `maxTurns` helper method:
               ```go
               func (c *Client) maxTurns() int {
                 if c.cfg.MaxTurns > 0 { return c.cfg.MaxTurns }
                 return 50
               }
               ```

            5. Rewrite `RunStreamingWithTools` to implement the full tool-use loop.
               The method must:

               a. Build workshop via `c.buildWorkshop(workDir)` and convert to JSON
                  via `buildToolsJSON(workshop)`.

               b. Construct initial messages array: `[{"role": "user", "content": userPrompt}]`.

               c. For each turn (up to `c.maxTurns()`):
                  - Build request body with `anthropic_version`, `max_tokens`, `system` (if non-empty),
                    `tools`, and `messages`.
                  - Call `c.client.InvokeModelWithResponseStream(ctx, ...)`.
                  - Parse the stream using the EXISTING event loop pattern (lines 127-151 of
                    current client.go) but EXTENDED to handle:
                    - `content_block_start` with `content_block.type == "tool_use"`: extract
                      `content_block.id` and `content_block.name`, track in a blockMap indexed
                      by `index` field.
                    - `content_block_delta` with `delta.type == "text_delta"`: append to text
                      builder, call `onChunk` if non-nil.
                    - `content_block_delta` with `delta.type == "input_json_delta"`: append
                      `delta.partial_json` to the tool input builder for this block index.
                    - `message_delta`: extract `delta.stop_reason`.

                  - After stream completes, check stop_reason:
                    - `"end_turn"`: return accumulated text.
                    - `"tool_use"`: for each tool_use block in blockMap:
                      1. Parse accumulated JSON input into `map[string]interface{}`.
                      2. Emit onToolCall event with Name, Input (if callback non-nil).
                      3. Call `executeTool(ctx, workshop, name, inputMap, workDir)`.
                      4. Emit onToolCall result event with IsResult=true, DurationMs.
                      5. Build tool_result content block.
                    - Append assistant message (text blocks + tool_use blocks) to messages.
                    - Append user message with tool_result blocks to messages.
                    - Continue loop.

               d. If maxTurns exceeded, return error.

               **IMPORTANT streaming parse format.** Each chunk from Bedrock arrives as
               `types.ResponseStreamMemberChunk` with `Value.Bytes` containing JSON.
               The JSON has a `type` field. Parse into a generic struct:

               ```go
               type streamEvent struct {
                 Type         string       `json:"type"`
                 Index        int          `json:"index"`
                 ContentBlock *contentBlock `json:"content_block,omitempty"`
                 Delta        *deltaBlock  `json:"delta,omitempty"`
               }
               type contentBlock struct {
                 Type string `json:"type"`
                 ID   string `json:"id"`
                 Name string `json:"name"`
                 Text string `json:"text"`
               }
               type deltaBlock struct {
                 Type        string `json:"type"`
                 Text        string `json:"text"`
                 PartialJSON string `json:"partial_json"`
                 StopReason  string `json:"stop_reason"`
               }
               ```

               **Messages format for multi-turn.** Messages are `[]interface{}` where each
               message is `map[string]interface{}` with `role` and `content` fields. Content
               for tool_use turns is an array of content blocks:
               ```json
               {"role": "assistant", "content": [
                 {"type": "text", "text": "..."},
                 {"type": "tool_use", "id": "toolu_xxx", "name": "bash", "input": {...}}
               ]}
               {"role": "user", "content": [
                 {"type": "tool_result", "tool_use_id": "toolu_xxx", "content": "..."}
               ]}
               ```

            6. Add import for `"github.com/blackwell-systems/scout-and-wave-go/pkg/tools"`.

            ## Interfaces to Call
            - `tools.StandardTools(workDir string) Workshop` (pkg/tools/standard.go)
            - `tools.ReadOnlyTools(workDir string) Workshop` (pkg/tools/middleware.go)
            - `tools.WithTiming(w Workshop, onCall func(ToolCallEvent)) Workshop` (pkg/tools/middleware.go)
            - `workshop.All() []Tool` â€” to enumerate tools for JSON serialization
            - `workshop.Get(name string) (Tool, bool)` â€” for tool lookup during execution
            - `tool.Executor.Execute(ctx, execCtx, input) (string, error)` â€” tool execution
            - `bedrockruntime.Client.InvokeModelWithResponseStream(ctx, input)` â€” AWS SDK streaming call

            ## Tests to Write
            None â€” Agent B owns all tests.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./...
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go vet ./...
            ```

            ## Constraints
            - Do NOT modify `Run` or `RunStreaming` methods â€” they must continue working as-is.
            - Do NOT import the anthropic Go SDK â€” Bedrock uses raw JSON via AWS SDK, not the anthropic SDK.
            - Tool type structs are package-local (architectural decision from CONTEXT.md).
            - The `workDir` parameter (4th arg, currently `_`) must be used as the working
              directory for tool execution, not discarded.
            - If `onChunk` is nil, still accumulate text but skip the callback.
            - If `onToolCall` is nil, still execute tools but skip the callback.
            - The initial user message content is a string, not an array. Only tool_result
              messages use the array-of-content-blocks format.
