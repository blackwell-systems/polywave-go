pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A changes the missing-ref error message format by delegating to ValidateRefs.
            The new message is 'agent "X" depends on "Y" which does not exist' vs the old
            'missing dep: agent X references unknown agent Y'. If solver_integration.go parses
            the error string for "missing" or "unknown", it would still match. But if any other
            code does string-contains matching on the exact old format, it would break.
          likelihood: low
          impact: low
          mitigation: |-
            solver_integration.go checks strings.Contains(lower, "missing") || strings.Contains(lower, "unknown")
            — both match the new format. Grep confirms no other code parses solver error strings.
            Agent A should run the full test suite for pkg/solver/... and pkg/protocol/... to catch
            any string-matching regressions.
        - scenario: |-
            Agent B unexports DetectCycles but misses a caller in a worktree or stale binary.
            External callers at grep time: zero. But the worktrees under .claude/worktrees/ contain
            stale copies with the exported names.
          likelihood: low
          impact: low
          mitigation: |-
            Worktrees are not production code and not compiled by go build ./.... The rename is safe.
            Agents run in isolated worktrees themselves, so the main branch is the only concern.
        - scenario: |-
            Agent C's checkCriticalPath emits SOLVER_OVER_SEQUENCED for manifests where the scout
            deliberately used more waves for human-readability reasons (e.g., wave 1: foundations,
            wave 2: features, wave 3: integration — even though foundations and features are independent).
            This would produce spurious warnings on valid manifests.
          likelihood: medium
          impact: low
          mitigation: |-
            The check is advisory (severity: "warning") and does not block wave execution.
            The warning message includes the manifest wave count and critical path count so users
            can evaluate whether the extra waves are intentional. No action needed beyond ensuring
            severity is "warning" not "error".
        - scenario: |-
            CriticalPath returns a path of length 1 for a flat graph (all agents in wave 1, no deps).
            A manifest with len(m.Waves) == 1 would match and not warn. But a manifest with 2+ waves
            where all agents are in wave 1 would be flagged — which is valid behavior.
          likelihood: low
          impact: low
          mitigation: |-
            The condition `len(m.Waves) <= minWaves` correctly handles this. If minWaves=1 and
            len(m.Waves)=1, no warning. The test TestValidateWithSolver_OverSequencedWarns covers
            the case where independent agents are unnecessarily sequenced.
