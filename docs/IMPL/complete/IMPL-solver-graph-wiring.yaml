suitability_assessment: |-
    Four exported functions in pkg/solver/graph.go have zero production callers. Three are genuine
    wiring gaps; one is a speculative API that should be unexported. The work decomposes cleanly
    across three files with disjoint ownership:

    - Agent A: pkg/solver/solver.go (Gap 1 — delegate to ValidateRefs, remove inline duplicate)
    - Agent B: pkg/solver/graph.go + pkg/solver/graph_test.go (Gap 2 — unexport detectCycles/transitiveDeps, doc comment on divergence)
    - Agent C: pkg/protocol/solver_integration.go (Gap 3 — wire CriticalPath advisory check into ValidateWithSolver)

    Gap 2 (DetectCycles adaptation): the analyzer's private detectCycles operates on
    map[string][]string (file-level adjacency), while solver.DetectCycles operates on []DepNode
    (agent-level). Input types are genuinely different and serve different domains. The right fix
    is to unexport solver.DetectCycles (zero external callers confirmed by LSP + grep) and add a
    doc comment noting the intentional separation. No import changes to pkg/analyzer are needed.

    All three gaps have well-defined interfaces; contracts can be specified before implementation.
    File ownership is fully disjoint (solver.go / graph.go / solver_integration.go are separate files).
    Build+test cycle is moderate (~5–10s for Go). Parallelization benefit: moderate — mostly surgical
    edits, but the three agents are fully independent in Wave 1.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~3 agents × ~8 min avg, all parallel in Wave 1 = ~8 min
    - Merge and verification: ~3 min
    Total SAW time: ~21 min

    Sequential baseline: ~3 × 8 min = ~24 min
    Time savings: ~3 min (12% faster). Coordination value: documents the DetectCycles divergence
    decision in the IMPL trail.
