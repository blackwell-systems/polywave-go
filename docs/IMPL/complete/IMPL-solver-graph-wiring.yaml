            ## What to implement

            ### Step 1 — Replace the inline missing-reference check in Solve()

            In pkg/solver/solver.go, lines 28–40 contain:

            ```go
            // Validate: all DependsOn references must exist.
            var missingErrs []string
            for _, n := range nodes {
            	for _, dep := range n.DependsOn {
            		if _, ok := nodeSet[dep]; !ok {
            			missingErrs = append(missingErrs, fmt.Sprintf("missing dep: agent %s references unknown agent %s", n.AgentID, dep))
            		}
            	}
            }
            if len(missingErrs) > 0 {
            	sort.Strings(missingErrs)
            	return SolveResult{Valid: false, Errors: missingErrs}
            }
            ```

            Replace that entire block with a call to ValidateRefs:

            ```go
            // Validate: all DependsOn references must exist.
            if refErrs := ValidateRefs(nodes); refErrs != nil {
            	return SolveResult{Valid: false, Errors: refErrs}
            }
            ```

            ValidateRefs is in the same package (graph.go), so no import is needed.

            ### Step 2 — Remove now-unused imports if any

            After the substitution, check whether fmt and/or any other import in solver.go became
