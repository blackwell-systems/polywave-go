        - id: C
          task: |-
            ## Context

            You are working on pkg/protocol/solver_integration.go. The goal is to add an advisory
            CriticalPath check inside ValidateWithSolver() so that over-sequenced manifests (more
            waves than the graph's critical path requires) produce a SOLVER_OVER_SEQUENCED warning.
            This is advisory only — it must not block wave execution.

            ## Files owned
            - pkg/protocol/solver_integration.go

            ## What to implement

            ### Step 1 — Add a checkCriticalPath helper

            Add a new private function after the existing compareAssignments function:

            ```go
            // checkCriticalPath returns a warning SAWError if the manifest declares more waves
            // than the dependency graph's critical path requires. This indicates the scout wrote
            // an over-sequenced wave structure (e.g., 3 waves for a graph whose longest chain is 2).
            // Returns nil if:
            //   - the graph has cycles (CriticalPath returns nil — cycle errors are reported elsewhere)
            //   - len(m.Waves) <= len(critical path) (manifest is optimal or under-waved relative to solver)
            func checkCriticalPath(m *IMPLManifest, nodes []solver.DepNode) *result.SAWError {
            	cp := solver.CriticalPath(nodes)
            	if cp == nil {
            		// Cyclic graph — cycle errors are already reported by the solver.
            		return nil
            	}
            	minWaves := len(cp)
            	if len(m.Waves) <= minWaves {
            		return nil
            	}
            	return &result.SAWError{
            		Code:     "SOLVER_OVER_SEQUENCED",
            		Message:  fmt.Sprintf("manifest has %d waves but critical path requires only %d; consider collapsing waves", len(m.Waves), minWaves),
            		Severity: "warning",
            		Field:    "waves",
            	}
            }
            ```

            ### Step 2 — Call checkCriticalPath from ValidateWithSolver

            In ValidateWithSolver, after the mismatch loop and before the base Validate() call,
            add the advisory check. Find this exact text:

            ```go
            	// Append standard validation errors.
            	errs = append(errs, Validate(m)...)
            	return errs
            ```

            Insert before it:

            ```go
            	// Advisory: check if the manifest is over-sequenced relative to the critical path.
            	if cpErr := checkCriticalPath(m, nodes); cpErr != nil {
            		errs = append(errs, *cpErr)
            	}

            	// Append standard validation errors.
            	errs = append(errs, Validate(m)...)
            	return errs
            ```

            Note: this insertion goes in the "solver succeeded" branch (after the early return for
            solver failure). The nodes variable is already in scope (assigned at line 28 of the
            current file: `nodes := manifestToNodes(m)`).

            ### Step 3 — Verify no import changes needed

            solver_integration.go already imports:
            - "github.com/blackwell-systems/scout-and-wave-go/pkg/result"
            - "github.com/blackwell-systems/scout-and-wave-go/pkg/solver"
            - "fmt"

            No new imports are needed.

            ## Tests

            Add the following test to pkg/protocol/solver_integration_test.go:

            ```go
            func TestValidateWithSolver_OverSequenced(t *testing.T) {
            	// A->B->C is a linear chain: critical path length = 3, minimum waves = 3.
            	// Putting them in 3 waves is optimal — should NOT warn.
            	m := buildManifest("Test", "test", "SUITABLE",
            		[]Wave{
            			makeWave(1, agentSpec{"A", nil, []string{"a.go"}}),
            			makeWave(2, agentSpec{"B", []string{"A"}, []string{"b.go"}}),
            			makeWave(3, agentSpec{"C", []string{"B"}, []string{"c.go"}}),
            		},
            		[]FileOwnership{
            			makeFO("a.go", "A", 1),
            			makeFO("b.go", "B", 2, "A"),
            			makeFO("c.go", "C", 3, "B"),
            		},
            	)
            	errs := ValidateWithSolver(m)
            	for _, e := range errs {
            		if e.Code == "SOLVER_OVER_SEQUENCED" {
            			t.Errorf("unexpected SOLVER_OVER_SEQUENCED for optimal manifest: %+v", e)
            		}
            	}
            }

            func TestValidateWithSolver_OverSequencedWarns(t *testing.T) {
            	// A and B are independent (no deps). Critical path = 1 agent = 1 minimum wave.
            	// Putting them in 2 separate waves is over-sequenced.
            	m := buildManifest("Test", "test", "SUITABLE",
            		[]Wave{
            			makeWave(1, agentSpec{"A", nil, []string{"a.go"}}),
            			makeWave(2, agentSpec{"B", nil, []string{"b.go"}}),
            		},
            		[]FileOwnership{
            			makeFO("a.go", "A", 1),
            			makeFO("b.go", "B", 2),
            		},
            	)
            	errs := ValidateWithSolver(m)
            	found := false
            	for _, e := range errs {
            		if e.Code == "SOLVER_OVER_SEQUENCED" {
            			found = true
            			if e.Severity != "warning" {
            				t.Errorf("expected severity=warning, got %s", e.Severity)
            			}
            		}
            	}
            	if !found {
            		t.Errorf("expected SOLVER_OVER_SEQUENCED warning, got: %+v", errs)
            	}
            }
            ```

            Note: the test file is NOT in your file_ownership list. Add the tests to
            pkg/protocol/solver_integration_test.go. Wait — solver_integration_test.go is in
