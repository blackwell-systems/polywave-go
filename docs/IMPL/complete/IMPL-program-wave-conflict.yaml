suitability_assessment: |
    The work decomposes cleanly across 4 agents with disjoint file ownership:
    Agent A owns the new wave-level conflict detection logic in pkg/protocol/program_conflict.go
    and its test file. Agent B owns the ProgramIMPL schema extension in pkg/protocol/program_types.go
    and pkg/protocol/program_generator.go (updating generator to populate serial_waves).
    Agent C owns the tier loop enforcement in pkg/engine/program_tier_loop.go.
    Agent D owns a new test file for the wave-level conflict cmd integration test.

    Design decision: Option A (serial_waves field on ProgramIMPL) is recommended over
    Options B and C. Option A is backwards-compatible (omitempty means existing PROGRAM
    manifests are unaffected), requires the smallest schema delta (one new []int field),
    and maps cleanly to the tier loop's existing per-IMPL wave iteration. Option C
    (wave_tiers) would require restructuring the entire PROGRAM manifest schema and
    rewriting the tier loop engine. Option B (cross_impl_serial_agents) is verbose,
    agent-ID-coupled, and would go stale when agents are reassigned.

    The serial_waves field says: "when executing this IMPL within a tier, wave numbers
    listed here must not run concurrently with the same-numbered wave of any other IMPL
    in the same tier." The conflict detection computes which wave numbers need serialization
    by checking which wave-wave intersections share files.

    All 5 files that will change are distinct. Wave 1 work (conflict detection logic +
    schema) is independent of Wave 2 work (tier loop enforcement). Interfaces are
    fully specifiable before implementation.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~4 agents x ~10 min avg, Wave 1 parallel + Wave 2 parallel = ~20 min
    - Merge and verification: ~5 min
    Total SAW time: ~35 min
    Sequential baseline: ~4 agents x 15 min = ~60 min
    Time savings: ~25 min (42% faster). Clear speedup given non-trivial logic and Go build cycles.
