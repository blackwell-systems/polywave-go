interface_contracts:
    - name: WaveConflictReport
      description: |
        Extended conflict report that includes wave-level conflict detail.
        Returned by CheckIMPLConflictsWaveLevel. Embeds the existing ConflictReport
        fields and adds WaveConflicts for per-wave analysis.
      definition: |
        // WaveConflict describes a file owned by multiple IMPLs in the same wave number.
        type WaveConflict struct {
            File      string              `json:"file"`
            WaveNum   int                 `json:"wave_num"`
            Impls     []string            `json:"impls"`
            Repos     []string            `json:"repos,omitempty"`
        }

        // WaveConflictReport extends ConflictReport with per-wave analysis.
        // ConflictReport.Conflicts (IMPL-level) is still populated for backwards compat.
        // WaveConflicts contains only the concurrent-wave-level conflicts.
        // SerialWaves maps each IMPL slug to the set of wave numbers that must serialize.
        type WaveConflictReport struct {
            ConflictReport                          // embedded: Conflicts, DisjointSets, TierSuggestion
            WaveConflicts  []WaveConflict           `json:"wave_conflicts"`
            SerialWaves    map[string][]int          `json:"serial_waves"`
        }
      location: pkg/protocol/program_conflict.go
    - name: CheckIMPLConflictsWaveLevel
      description: |
        Wave-aware conflict check. Loads IMPL docs, builds per-wave file ownership maps,
        and detects only concurrent-wave conflicts. Returns both the legacy ConflictReport
        (IMPL-level) and the new WaveConflictReport (wave-level) fields.
      definition: |
        // CheckIMPLConflictsWaveLevel performs wave-aware cross-IMPL conflict detection.
        // It replaces the coarse IMPL-level check used in GenerateProgramFromIMPLs.
        // implSlugs: IMPL slugs to analyze
        // repoPath: repository root
        // Returns WaveConflictReport, which embeds ConflictReport for backwards compat.
        func CheckIMPLConflictsWaveLevel(implSlugs []string, repoPath string) (*WaveConflictReport, error)
      location: pkg/protocol/program_conflict.go
    - name: ProgramIMPL.SerialWaves
      description: |
        New field on ProgramIMPL. Lists wave numbers that must not execute concurrently
        with the same-numbered wave of any other IMPL in the same program tier.
        Empty slice (default) means all waves of this IMPL can run freely in parallel
        with other IMPLs in the tier. Populated by GenerateProgramFromIMPLs using
        WaveConflictReport.SerialWaves.
      definition: |
        // In ProgramIMPL struct (pkg/protocol/program_types.go), add:
        SerialWaves []int `yaml:"serial_waves,omitempty" json:"serial_waves,omitempty"`

        // Example serialized form:
        // impls:
        //   - slug: scout-prompt-extraction
        //     tier: 1
        //     serial_waves: [2]   # Wave 2 must not run concurrently with Wave 2 of other tier-1 IMPLs
      location: pkg/protocol/program_types.go
    - name: buildWaveFileOwnershipMap
      description: |
        Helper used inside CheckIMPLConflictsWaveLevel. Returns a nested map:
        waveNum -> qualifiedFile -> []slug. Used to detect concurrent-wave file conflicts.
      definition: |
        // buildWaveFileOwnershipMap builds a per-wave file ownership index for a set of loaded IMPL docs.
        // implDocs maps slug -> *IMPLManifest.
        // Returns: map[waveNum]map[qualifiedFile][]slug
        func buildWaveFileOwnershipMap(implDocs map[string]*IMPLManifest) map[int]map[string][]string
      location: pkg/protocol/program_conflict.go
    - name: isCrossImplSerialWaveBlocked
      description: |
        Engine helper: returns true if IMPL slug's waveNum is a serial wave AND any
        other IMPL in the same tier has that wave number still in-progress or not yet
        complete. Called in the tier loop before launching a wave for a given IMPL.
      definition: |
        // isCrossImplSerialWaveBlocked checks whether starting wave waveNum for impl slug
        // would violate cross-IMPL serialization constraints.
        // manifest: the current PROGRAM manifest
        // tierNumber: the currently executing tier
        // slug: the IMPL about to start wave waveNum
        // waveNum: the wave number being considered
        // waveProgress: map[slug]int tracking the highest wave number currently complete per IMPL
        // Returns true if this wave is blocked (must wait), false if safe to start.
        func isCrossImplSerialWaveBlocked(manifest *protocol.PROGRAMManifest, tierNumber int, slug string, waveNum int, waveProgress map[string]int) bool
      location: pkg/engine/program_tier_loop.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context
            You are implementing wave-level conflict detection for the `create-program` command.
            The current `CheckIMPLConflicts` function in `pkg/protocol/program_conflict.go` checks
            whether any two IMPLs own the same file anywhere across all their waves — it is
            too coarse. You will add `CheckIMPLConflictsWaveLevel` that only flags conflicts
            between concurrent waves (same wave number across IMPLs that would run simultaneously).

            ## What to implement

            ### 1. New types in pkg/protocol/program_conflict.go

            Add two new types immediately after the existing `IMPLFileConflict` type:

            ```go
            // WaveConflict describes a file owned by multiple IMPLs in the same wave number.
            type WaveConflict struct {
                File    string   `json:"file"`
                WaveNum int      `json:"wave_num"`
                Impls   []string `json:"impls"`
                Repos   []string `json:"repos,omitempty"`
            }

            // WaveConflictReport extends ConflictReport with per-wave analysis.
            // ConflictReport fields are still populated for backwards compatibility.
            // WaveConflicts contains only concurrent-wave-level conflicts.
            // SerialWaves maps each IMPL slug to the wave numbers that must serialize.
            type WaveConflictReport struct {
                ConflictReport
                WaveConflicts []WaveConflict  `json:"wave_conflicts"`
                SerialWaves   map[string][]int `json:"serial_waves"`
            }
            ```

            ### 2. Helper: buildWaveFileOwnershipMap

            Add a private helper after the new types:

            ```go
            // buildWaveFileOwnershipMap builds a per-wave file ownership index.
            // implDocs maps slug -> *IMPLManifest.
            // Returns: map[waveNum]map[qualifiedFile][]slug
            func buildWaveFileOwnershipMap(implDocs map[string]*IMPLManifest) map[int]map[string][]string {
                result := make(map[int]map[string][]string)
                for slug, manifest := range implDocs {
                    for _, fo := range manifest.FileOwnership {
                        waveNum := fo.Wave
                        if waveNum == 0 {
                            waveNum = 1 // default
                        }
                        key := fo.File
                        if fo.Repo != "" {
                            key = fo.Repo + ":" + fo.File
                        }
                        if result[waveNum] == nil {
                            result[waveNum] = make(map[string][]string)
                        }
                        // deduplicate slugs per file per wave
                        found := false
                        for _, existing := range result[waveNum][key] {
                            if existing == slug {
                                found = true
                                break
                            }
                        }
                        if !found {
                            result[waveNum][key] = append(result[waveNum][key], slug)
                        }
                    }
                }
                return result
            }
            ```

            ### 3. New function: CheckIMPLConflictsWaveLevel

            Add this function after `CheckIMPLConflicts`. It:
            1. Loads all IMPL docs (same loop as CheckIMPLConflicts)
            2. Calls the existing `CheckIMPLConflicts` to populate the embedded ConflictReport
            3. Calls `buildWaveFileOwnershipMap` to get per-wave ownership
            4. Detects wave-level conflicts: any file with 2+ slugs at the same wave number
            5. Builds `SerialWaves`: for each slug, collects wave numbers where it has a wave conflict
            6. Computes `TierSuggestion` from wave conflicts only (not IMPL-level conflicts)

            ```go
            func CheckIMPLConflictsWaveLevel(implSlugs []string, repoPath string) (*WaveConflictReport, error) {
                // Step 1: Run existing IMPL-level check for backwards compat
                implReport, err := CheckIMPLConflicts(implSlugs, repoPath)
                if err != nil {
                    return nil, err
                }

                // Step 2: Load all IMPL docs
                implDocs := make(map[string]*IMPLManifest)
                for _, slug := range implSlugs {
                    implPath, err := resolveIMPLPath(repoPath, slug)
                    if err != nil {
                        return nil, fmt.Errorf("cannot resolve IMPL %q: %w", slug, err)
                    }
                    manifest, err := Load(implPath)
                    if err != nil {
                        return nil, fmt.Errorf("cannot load IMPL %q: %w", slug, err)
                    }
                    implDocs[slug] = manifest
                }

                // Step 3: Build per-wave ownership map
                waveOwnership := buildWaveFileOwnershipMap(implDocs)

                // Step 4: Detect wave-level conflicts
                var waveConflicts []WaveConflict
                waveConflictMap := make(map[string]map[string]bool) // slug -> set of conflicting slugs (wave-level only)

                // Sort wave numbers for deterministic output
                var waveNums []int
                for wn := range waveOwnership {
                    waveNums = append(waveNums, wn)
                }
                sort.Ints(waveNums)

                for _, wn := range waveNums {
                    fileMap := waveOwnership[wn]
                    // Sort files for deterministic output
                    var files []string
                    for f := range fileMap {
                        files = append(files, f)
                    }
                    sort.Strings(files)

                    for _, file := range files {
                        owners := fileMap[file]
                        if len(owners) > 1 {
                            sorted := make([]string, len(owners))
                            copy(sorted, owners)
                            sort.Strings(sorted)
                            waveConflicts = append(waveConflicts, WaveConflict{
                                File:    file,
                                WaveNum: wn,
                                Impls:   sorted,
                            })
                            // Build wave-level overlap graph
                            for _, a := range sorted {
                                for _, b := range sorted {
                                    if a != b {
                                        if waveConflictMap[a] == nil {
                                            waveConflictMap[a] = make(map[string]bool)
                                        }
                                        waveConflictMap[a][b] = true
                                    }
                                }
                            }
                        }
                    }
                }

                // Step 5: Build SerialWaves: for each slug, which wave numbers need serialization
                serialWaves := make(map[string][]int)
                for _, wc := range waveConflicts {
                    for _, slug := range wc.Impls {
                        // Check if wc.WaveNum already in serialWaves[slug]
                        found := false
                        for _, existing := range serialWaves[slug] {
                            if existing == wc.WaveNum {
                                found = true
                                break
                            }
                        }
                        if !found {
                            serialWaves[slug] = append(serialWaves[slug], wc.WaveNum)
                        }
                    }
                }
                // Sort serial wave numbers for determinism
                for slug := range serialWaves {
                    sort.Ints(serialWaves[slug])
                }

                // Step 6: Compute wave-level TierSuggestion (override IMPL-level suggestion)
                // IMPLs with ONLY wave-level conflicts (not total-file conflicts) can be in tier 1
                // because their Wave 1 is disjoint. Use waveConflictMap for tier suggestion only
                // if there are wave conflicts; fall back to IMPL-level overlaps otherwise.
                waveTierSuggestion := computeTierSuggestion(implSlugs, waveConflictMap)

                // Override TierSuggestion in the embedded ConflictReport with wave-level result
                implReport.TierSuggestion = waveTierSuggestion

                return &WaveConflictReport{
                    ConflictReport: *implReport,
                    WaveConflicts:  waveConflicts,
                    SerialWaves:    serialWaves,
                }, nil
            }
            ```

            Note: The `waveConflictMap` uses only wave-level conflicts to compute tier suggestion.
            This means two IMPLs that only conflict in Wave 2 (not Wave 1) will both be assigned
            to tier 1, since their Wave 1 is disjoint. The serialization constraint is captured
            in `SerialWaves`, not in tier separation.

            ### 4. Tests in pkg/protocol/program_conflict_test.go

            Add tests after the existing tests. Create a helper `writeConflictTestIMPLWithWaves`
            that accepts per-wave file ownership (wave number per file entry). Add these tests:

            - `TestCheckIMPLConflictsWaveLevel_DisjointWave1ConflictWave2`: 2 IMPLs share a file
              only in Wave 2. Expect: both in tier 1 (wave-level TierSuggestion), SerialWaves
              has wave 2 for both IMPLs, WaveConflicts has 1 entry with WaveNum=2.
            - `TestCheckIMPLConflictsWaveLevel_Wave1Conflict`: 2 IMPLs share a file in Wave 1.
              Expect: different tiers, SerialWaves has wave 1 for both.
            - `TestCheckIMPLConflictsWaveLevel_NoConflicts`: 2 IMPLs fully disjoint across all
              waves. Expect: empty WaveConflicts, empty SerialWaves, both in tier 1.
            - `TestCheckIMPLConflictsWaveLevel_MultipleWaveConflicts`: 3 IMPLs where A+B share
              a file in Wave 1, and B+C share a file in Wave 2. Expect: A and B in different
              tiers (Wave 1 conflict), C in tier 1 (Wave 1 disjoint from A and B).

            ## Verification gate
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestCheckIMPLConflictsWaveLevel
            ```

            ## Constraints
            - Do NOT modify any function signatures in program_conflict.go other than adding new ones
            - The existing CheckIMPLConflicts function must remain unchanged (called by WaveLevel)
            - computeTierSuggestion and computeDisjointSets are already defined — call them, don't redefine
            - All new types must have json and yaml struct tags
            - Keep deterministic output: sort slices before returning
          files:
            - pkg/protocol/program_conflict.go
            - pkg/protocol/program_conflict_test.go
