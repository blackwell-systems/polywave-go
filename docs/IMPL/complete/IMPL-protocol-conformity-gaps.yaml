interface_contracts:
    - name: EmitEvent
      description: |
        Non-blocking observability event emitter. Wraps Store.RecordEvent with
        goroutine fire-and-forget semantics. nil store silently no-ops.
      definition: |
        // In pkg/observability/emitter.go
        type Emitter struct {
            store Store
        }

        func NewEmitter(store Store) *Emitter
        func (e *Emitter) Emit(ctx context.Context, event Event)
        // Emit is non-blocking: launches goroutine, logs errors to stderr.
        // If e is nil or e.store is nil, Emit is a no-op.
      location: pkg/observability/emitter.go
    - name: PredictConflictsFromManifest
      description: |
        Protocol-package version of conflict prediction that works with
        IMPLManifest and CompletionReport types (not orchestrator types).
        Enables finalize-wave CLI to call E11 check without importing
        pkg/orchestrator.
      definition: |
        // In pkg/protocol/conflict_predict.go
        func PredictConflictsFromReports(manifest *IMPLManifest, waveNum int) error
        // Cross-references files_changed and files_created from completion
        // reports for all agents in the given wave. Returns error if any
        // non-IMPL file appears in more than one agent's report.
      location: pkg/protocol/conflict_predict.go
    - name: SuitabilityAssessment structured fields
      description: |
        Add Reasoning field to support structured suitability data while
        maintaining backward compatibility with string-only assessment.
      definition: |
        // In pkg/protocol/types.go — add field to IMPLManifest:
        SuitabilityReasoning string `yaml:"suitability_reasoning,omitempty" json:"suitability_reasoning,omitempty"`
        // Verdict already exists as top-level field.
        // SuitabilityAssessment remains as prose string for backward compat.
      location: pkg/protocol/types.go
    - name: ArchitectureDescription with Modules
      description: |
        Add Modules field and Description alias to ArchitectureDescription
        to align with protocol spec.
      definition: |
        // In pkg/protocol/memory.go
        type ArchitectureModule struct {
            Name           string `yaml:"name" json:"name"`
            Path           string `yaml:"path" json:"path"`
            Responsibility string `yaml:"responsibility" json:"responsibility"`
        }

        type ArchitectureDescription struct {
            Language    string               `yaml:"language"`
            Stack       []string             `yaml:"stack,omitempty"`
            Summary     string               `yaml:"summary,omitempty"`
            Description string               `yaml:"description,omitempty"`
            Modules     []ArchitectureModule `yaml:"modules,omitempty"`
        }
      location: pkg/protocol/memory.go
