suitability_assessment: |
    20 audit findings across 2 repos (scout-and-wave-go engine, scout-and-wave protocol docs).
    Files decompose cleanly into 6 agents across 2 waves with disjoint ownership.
    No investigation-first items — the audit provides exact file locations and fixes.

    Item 20 (E38 cache key completeness): ALREADY IMPLEMENTED. gatecache.BuildKey()
    includes HeadCommit + StagedStat (git diff --cached --stat) + UnstagedStat
    (git diff --stat) + Command. No fix needed.

    Item 16 (E6 automated deviation propagation): Intentionally human-in-the-loop.
    E6 requires human judgment to determine correct prompt updates when interface
    deviations occur. Document this explicitly in execution-rules.md.

    Item 17 (E8 needs_replan loop): ActionReplan is correctly a "pause" operation.
    The orchestrator surfaces it to the human. Auto-replan would be risky without
    human validation of contract changes. Document in execution-rules.md.

    Item 18 (E26 precondition validation): Should be mechanically enforced. Add
    E26-P1/P2 checks before integration agent launch. Assigned to Agent B.

    Item 19 (E22 full-project build verification): Not feasible for large codebases
    where go build ./... takes minutes. Current per-file validation is the right
    tradeoff. Document rationale in execution-rules.md.

    Estimated times:
    - Scout phase: ~10 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~15 min (6 agents, ~8 min avg, 2 waves with parallelism)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~50 min (6 agents x ~8 min avg)
    Time savings: ~20 min (40% faster)

    Recommendation: Clear speedup. Proceed.
