interface_contracts:
    - name: EventCallback
      description: |
        Composable event hook for engine step functions. CLI prints to stdout;
        web app publishes SSE events. nil-safe — step functions must check for nil
        before calling.
      definition: |
        type EventCallback func(step string, status string, detail string)
      location: pkg/engine/step_types.go
    - name: StepResult
      description: |
        Common return type for individual step functions. Each finalization step
        returns one of these, and FinalizeWave aggregates them.
      definition: |
        type StepResult struct {
            Step    string      `json:"step"`
            Status  string      `json:"status"`
            Detail  string      `json:"detail,omitempty"`
            Data    interface{} `json:"data,omitempty"`
        }
      location: pkg/engine/step_types.go
    - name: PrepareWave
      description: |
        Engine-level wave preparation: dep checking, baseline gates, worktree creation,
        brief extraction, journal init. Replaces 500+ lines in CLI prepare_wave.go.
        Both CLI and web app call this single function.
      definition: |
        func PrepareWave(ctx context.Context, opts PrepareWaveOpts) (*PrepareWaveResult, error)
      location: pkg/engine/prepare.go
    - name: FinalizeWaveStepFunctions
      description: |
        Decomposed finalization steps. Each accepts FinalizeWaveOpts and an EventCallback.
        FinalizeWave() becomes a thin orchestrator that calls these in sequence.
      definition: |
        func StepVerifyCommits(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, error)
        func StepScanStubs(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)
        func StepRunGates(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, *protocol.GatesData, error)
        func StepValidateIntegration(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, *protocol.IntegrationReport, error)
        func StepMergeAgents(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, error)
        func StepFixGoMod(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, error)
        func StepVerifyBuild(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, error)
        func StepCleanup(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, error)
      location: pkg/engine/finalize_steps.go
    - name: RunTestCommand
      description: |
        Consolidated test runner. Loads IMPL manifest, extracts test_command,
        runs via sh -c, streams output line-by-line through a callback.
        Replaces duplicate implementations in service.RunTests and api.handleWaveTest.
      definition: |
        func RunTestCommand(ctx context.Context, implPath string, repoPath string, onOutput func(line string)) error
      location: pkg/engine/test_runner.go
    - name: PostMergeCleanup
      description: |
        Consolidated post-merge processing: go.mod fixup + worktree cleanup.
        Replaces character-for-character duplicate code in service.MergeWave,
        api.handleWaveMerge, and api.handleResolveConflicts.
      definition: |
        func PostMergeCleanup(ctx context.Context, implPath string, waveNum int, repoPath string, onEvent EventCallback) error
      location: pkg/engine/merge_cleanup.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Create engine.PrepareWave() and shared types — Audit Item #1

            **Goal:** Create `pkg/engine/step_types.go` with shared types AND
            `pkg/engine/prepare.go` with an `engine.PrepareWave()` function that
            encapsulates the full wave preparation pipeline currently spread across
            `cmd/sawtools/prepare_wave.go` (593 lines).

            **Part 1: Create `pkg/engine/step_types.go`** (shared types scaffold)

            This file defines types used by ALL engine step functions (your code
            and Agents B and C in this wave). Create it FIRST. Contents:

            ```go
            package engine

            import "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"

            // EventCallback is the composable event hook for engine step functions.
            type EventCallback func(step string, status string, detail string)

            // StepResult is the common return type for individual step functions.
            type StepResult struct {
                Step    string      `json:"step"`
                Status  string      `json:"status"` // "success", "failed", "skipped"
                Detail  string      `json:"detail,omitempty"`
                Data    interface{} `json:"data,omitempty"`
            }

            // PrepareWaveOpts configures the engine-level wave preparation pipeline.
            type PrepareWaveOpts struct {
                IMPLPath    string
                RepoPath    string
                WaveNum     int
                MergeTarget string
                NoCache     bool
                OnEvent     EventCallback
            }

            // PrepareWaveResult captures results of all preparation steps.
            type PrepareWaveResult struct {
                Wave        int                          `json:"wave"`
                Worktrees   []protocol.WorktreeInfo      `json:"worktrees"`
                AgentBriefs []AgentBriefInfo             `json:"agent_briefs"`
                Steps       []StepResult                 `json:"steps"`
                Success     bool                         `json:"success"`
            }

            // AgentBriefInfo contains metadata about a prepared agent brief.
            type AgentBriefInfo struct {
                Agent       string `json:"agent"`
                BriefPath   string `json:"brief_path"`
                BriefLength int    `json:"brief_length"`
                JournalDir  string `json:"journal_dir"`
                FilesOwned  int    `json:"files_owned"`
                Repo        string `json:"repo,omitempty"`
                MergeTarget string `json:"merge_target,omitempty"`
            }
            ```

            **CRITICAL:** Agents B and C in this same wave will import these types.
            The scaffold file must compile on its own before the other agents' code
            can build. Create step_types.go as the first thing you do.

            **Part 2: Create `pkg/engine/prepare.go`**

            `func PrepareWave(ctx context.Context, opts PrepareWaveOpts) (*PrepareWaveResult, error)`

            The function must perform these steps in order, calling `opts.OnEvent` at each:
            - Resume detection (warn on orphaned worktrees)
            - Dependency checking via `deps.CheckDeps()`
            - Load and validate manifest (`protocol.Load`, `protocol.Validate`)
            - Critic verdict enforcement (E37)
            - Stale worktree cleanup for same slug
            - Repo match validation (`protocol.ValidateRepoMatch`)
            - Dependency output verification (H2, wave > 1 only)
            - File ownership coverage check (H1, wave > 1, warning only)
            - File existence validation across repos
            - Merge target checkout (when set)
            - Baseline quality gates (E21A) with gate cache
            - Cross-repo baseline gates (E21B, multi-repo only)
            - Wiring ownership validation (E35 Layer 3A)
            - Scaffold commit validation (I2)
            - Freeze check (I2, when WorktreesCreatedAt set)
            - I1 disjoint ownership verification (E3)
            - Type collision check (E41)
            - Pre-wave readiness gate (C7)
            - Create worktrees
            - Verify pre-commit hooks (H10)
            - Extract agent briefs + init journals

            **Reference:** Read `cmd/sawtools/prepare_wave.go` carefully. Every step in
            `newPrepareWaveCmd()` must be replicated in the engine function. The CLI
            command will become a thin wrapper in Wave 2.

            **Constraints:**
            - nil-check `opts.OnEvent` before calling
            - Return partial `PrepareWaveResult` on failure (include completed steps)
            - Do NOT modify `cmd/sawtools/prepare_wave.go` — that happens in Wave 2

            **Tests:** Create `pkg/engine/prepare_test.go` with:
            - Test that OnEvent callback is invoked for each step
            - Test that missing IMPLPath/RepoPath returns error
            - Test that dep conflict returns error with partial result

            **Verification gate:** `go build ./pkg/engine/... && go test ./pkg/engine/ -run TestPrepare -count=1`
          files:
            - pkg/engine/step_types.go
            - pkg/engine/prepare.go
            - pkg/engine/prepare_test.go
        - id: B
          task: |
            ## Decompose engine.FinalizeWave() into Step Functions — Audit Item #2

            **Goal:** Create `pkg/engine/finalize_steps.go` with individual step functions
            that FinalizeWave() delegates to. This is the core decomposition work.

            **IMPORTANT:** Agent A (same wave) creates `pkg/engine/step_types.go` with
            the `EventCallback` and `StepResult` types. Your code imports these types.
            If step_types.go is not yet present when you start, define the types yourself
            in finalize_steps.go — but prefer importing from step_types.go.

            **What to implement:**

            Create these functions in `pkg/engine/finalize_steps.go`:
            1. `StepVerifyCommits(ctx, opts, onEvent) (*StepResult, error)`
            2. `StepScanStubs(ctx, opts, manifest, onEvent) (*StepResult, error)`
            3. `StepRunGates(ctx, opts, manifest, onEvent) (*StepResult, *protocol.GatesData, error)`
            4. `StepValidateIntegration(ctx, opts, manifest, onEvent) (*StepResult, *protocol.IntegrationReport, error)`
            5. `StepMergeAgents(ctx, opts, onEvent) (*StepResult, error)`
            6. `StepFixGoMod(ctx, opts, onEvent) (*StepResult, error)`
            7. `StepVerifyBuild(ctx, opts, onEvent) (*StepResult, error)`
            8. `StepCleanup(ctx, opts, onEvent) (*StepResult, error)`

            Each step function:
            - Takes `FinalizeWaveOpts` (existing type in finalize.go) + `EventCallback`
            - Calls `onEvent(stepName, "running", "")` at start, `onEvent(stepName, "complete", "")` at end
            - nil-checks onEvent before calling
            - Returns a `StepResult` plus any typed data the caller needs
            - Extracts logic from the current monolithic `FinalizeWave()` in finalize.go

            **Then modify `pkg/engine/finalize.go`:**
            - Refactor `FinalizeWave()` to call the step functions in sequence
            - Keep the same `FinalizeWaveOpts` and `FinalizeWaveResult` types
            - Add `OnEvent EventCallback` field to `FinalizeWaveOpts`
            - Keep backward compatibility: existing callers that pass no OnEvent still work

            **IMPORTANT:** The web app's `runFinalizeSteps()` in `wave_runner.go` lines 400-720
            already demonstrates the correct decomposition with resume support and SSE events.
            Study that function as the reference architecture, then implement the equivalent
            in the engine. The web app will be updated to call your step functions in a
            follow-up IMPL.

            **Constraints:**
            - Use `StepResult` and `EventCallback` from step_types.go (Agent A creates this)
            - Do NOT modify any files outside pkg/engine/
            - Preserve all existing FinalizeWaveResult fields and behavior
            - The existing FinalizeWave signature must still work (OnEvent defaults to nil)

            **Tests:** Create `pkg/engine/finalize_steps_test.go` with:
            - Test each step function individually with a mock EventCallback
            - Test that FinalizeWave still works end-to-end (backward compat)

            **Verification gate:** `go build ./pkg/engine/... && go test ./pkg/engine/ -run TestStep -count=1`
          files:
            - pkg/engine/finalize_steps.go
            - pkg/engine/finalize_steps_test.go
            - pkg/engine/finalize.go
            - pkg/engine/finalize_test.go
        - id: C
          task: |
            ## Consolidate Test Runner and Merge Post-Processing — Audit Items #3 and #4

            **Goal:** Create two new engine functions that eliminate duplicate implementations
            in the web layer.

            **IMPORTANT:** Agent A (same wave) creates `pkg/engine/step_types.go` with
            the `EventCallback` type. Your `PostMergeCleanup` function uses this type.
            If step_types.go is not yet present when you start, define EventCallback
            yourself — but prefer importing from step_types.go.

            **Part 1: Consolidated test runner** (`pkg/engine/test_runner.go`)

            Create `func RunTestCommand(ctx context.Context, implPath, repoPath string, onOutput func(line string)) error`

            This function:
            - Loads the IMPL manifest to get test_command
            - Returns error if test_command is empty
            - Runs test_command via `exec.CommandContext(ctx, "sh", "-c", testCommand)`
            - Sets cmd.Dir = repoPath
            - Sets Setpgid for process group management
            - Streams stdout+stderr line-by-line through onOutput callback
            - Kills process group on context cancellation
            - Returns nil on success, error on failure (includes accumulated output)

            Reference implementations to replace:
            - `service.runTestCommand()` in scout-and-wave-web/pkg/service/merge_service.go (simple CombinedOutput)
            - `api.handleWaveTest()` inline test execution in scout-and-wave-web/pkg/api/merge_test_handlers.go (streaming)

            **Part 2: Consolidated post-merge cleanup** (`pkg/engine/merge_cleanup.go`)

            Create `func PostMergeCleanup(ctx context.Context, implPath string, waveNum int, repoPath string, onEvent EventCallback) error`

            This function:
            - Calls `protocol.FixGoModReplacePaths(repoPath)` with event reporting
            - Calls `protocol.Cleanup(implPath, waveNum, repoPath)` with event reporting
            - Reports step progress through onEvent callback
            - Returns nil (errors are non-fatal, reported through onEvent)

            This replaces the identical go.mod fixup + cleanup code blocks in:
            - `service.MergeWave()` lines 103-114 (scout-and-wave-web)
            - `api.handleWaveMerge()` lines 99-110 (scout-and-wave-web)
            - `api.handleResolveConflicts()` lines 394-404 (scout-and-wave-web)
            - `service.ResolveConflicts()` lines 325-336 (scout-and-wave-web)

            **Constraints:**
            - Use `EventCallback` from step_types.go (Agent A creates this)
            - Both functions must be backend-agnostic (no CLI/web assumptions)
            - onOutput and onEvent must be nil-safe

            **Tests:**
            - `test_runner_test.go`: test with empty test_command, test callback invocation
            - `merge_cleanup_test.go`: test callback invocation, test non-fatal error handling

            **Verification gate:** `go build ./pkg/engine/... && go test ./pkg/engine/ -run "TestRunTest|TestPostMerge" -count=1`
          files:
            - pkg/engine/test_runner.go
            - pkg/engine/test_runner_test.go
            - pkg/engine/merge_cleanup.go
            - pkg/engine/merge_cleanup_test.go
