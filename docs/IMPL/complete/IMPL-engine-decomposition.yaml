suitability_assessment: |
    Suitability gate — all five checks pass:

    1. File decomposition: 14+ files in scout-and-wave-go will change. Work decomposes
       cleanly into 5 audit items mapping to disjoint file groups. No two agents need
       conflicting modifications to the same file.

    2. Investigation-first items: None. Root cause is fully identified in the parallel
       systems audit. The three copies of finalization logic, the missing PrepareWave
       engine function, and the duplicate merge post-processing are all documented with
       file paths and line numbers.

    3. Interface discoverability: Yes. The EventCallback type and step function signatures
       can be defined upfront. The web app's runFinalizeSteps() already demonstrates the
       correct decomposition — we are pulling it down into the engine.

    4. Pre-implementation status: All 5 items are TODO (unaddressed per audit 2026-03-24).

    5. Parallelization value: High. Build+test cycle is >30s (Go compile + test suite).
       Wave 1 has 3 independent agents each touching 2-4 files. Wave 2 has 2 agents
       updating CLI callers. Clear speedup over sequential.

    Scope: Engine repo only (scout-and-wave-go). Web app caller updates
    (scout-and-wave-web) are deferred to a follow-up IMPL after the engine
    step functions stabilize. This avoids cross-repo coordination complexity
    and lets us validate the engine API before updating consumers.

    Estimated times:
    - Scout phase: ~10 min (dependency mapping)
    - Agent execution: ~15 min (Wave 1: 3 agents x 8 min parallel, Wave 2: 2 agents x 8 min parallel)
    - Merge and verification: ~5 min per wave
    Total SAW time: ~30 min

    Sequential baseline: ~50 min (5 agents x 10 min avg)
    Time savings: ~20 min (40% faster)

    Recommendation: Clear speedup. Proceed.
