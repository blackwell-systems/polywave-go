interface_contracts:
    - name: LockFileParser
      description: |
        Interface for parsing lock files across different package managers.
        Each language implementation (Go, Rust, JS, Python) must implement this interface.
      definition: |
        type LockFileParser interface {
          // Parse reads a lock file and returns package metadata
          Parse(filePath string) ([]PackageInfo, error)

          // Detect checks if this parser can handle the given file
          Detect(filePath string) bool
        }

        type PackageInfo struct {
          Name    string
          Version string
          Source  string // registry URL or repo URL
        }
      location: pkg/deps/types.go
    - name: CheckDeps
      description: |
        Main entrypoint for dependency conflict detection.
        Called by CLI command to analyze IMPL doc and lock files.
      definition: |
        func CheckDeps(implPath string, wave int) (*ConflictReport, error)

        type ConflictReport struct {
          MissingDeps      []MissingDep      `json:"missing_deps"`
          VersionConflicts []VersionConflict `json:"version_conflicts"`
          Recommendations  []string          `json:"recommendations"`
        }

        type MissingDep struct {
          Agent        string `json:"agent"`
          Package      string `json:"package"`
          RequiredBy   string `json:"required_by"`
          AvailableVer string `json:"available_version"`
        }

        type VersionConflict struct {
          Agents             []string `json:"agents"`
          Package            string   `json:"package"`
          Versions           []string `json:"versions"`
          ResolutionNeeded   bool     `json:"resolution_needed"`
        }
      location: pkg/deps/checker.go
