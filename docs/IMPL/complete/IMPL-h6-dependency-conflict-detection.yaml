            ## What to Implement

            Create the core types and checker logic for dependency conflict detection. This includes the `LockFileParser` interface, data structures for conflict reporting, and the main `CheckDeps` function.

            ## Interfaces to Implement

            ```go
            // pkg/deps/types.go
            package deps

            // LockFileParser interface for multi-language lock file parsing
            type LockFileParser interface {
              Parse(filePath string) ([]PackageInfo, error)
              Detect(filePath string) bool
            }

            type PackageInfo struct {
              Name    string `json:"name"`
              Version string `json:"version"`
              Source  string `json:"source"`
            }

            type ConflictReport struct {
              MissingDeps      []MissingDep      `json:"missing_deps"`
              VersionConflicts []VersionConflict `json:"version_conflicts"`
              Recommendations  []string          `json:"recommendations"`
            }

            type MissingDep struct {
              Agent        string `json:"agent"`
              Package      string `json:"package"`
              RequiredBy   string `json:"required_by"`
              AvailableVer string `json:"available_version"`
            }

            type VersionConflict struct {
              Agents           []string `json:"agents"`
              Package          string   `json:"package"`
              Versions         []string `json:"versions"`
              ResolutionNeeded bool     `json:"resolution_needed"`
            }
            ```

            ```go
            // pkg/deps/checker.go
            package deps

            import (
              "fmt"
              "path/filepath"
              "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
            )

            // CheckDeps analyzes IMPL doc and lock files for dependency conflicts
            func CheckDeps(implPath string, wave int) (*ConflictReport, error) {
              // 1. Parse IMPL doc to get file ownership for specified wave
              // 2. Extract import statements from owned files (use existing analyzer package)
              // 3. Detect lock files in repo root (go.sum, package-lock.json, etc.)
              // 4. Parse lock files using registered parsers
              // 5. Cross-reference imports against lock file contents
              // 6. Identify missing deps and version conflicts
              // 7. Generate recommendations
              return &ConflictReport{}, nil
            }

            // RegisterParser adds a lock file parser to the registry
            var parsers []LockFileParser

            func RegisterParser(p LockFileParser) {
              parsers = append(parsers, p)
            }

            // DetectLockFiles scans repo root for lock files
            func DetectLockFiles(repoRoot string) ([]string, error) {
              // Check for go.sum, package-lock.json, Cargo.lock, poetry.lock
              return nil, nil
            }
            ```

            ## Interfaces to Call

            - `protocol.ParseIMPLManifest(implPath)` — parse IMPL doc to get file ownership
            - `analyzer.AnalyzeDeps(repoRoot, files)` — extract import statements (already exists in pkg/analyzer/)

            ## Tests to Write

            1. `TestLockFileParserInterface` - verify interface contract
            2. `TestCheckDeps_NoConflicts` - happy path with clean dependencies
            3. `TestCheckDeps_MissingDeps` - detects packages not in lock file
            4. `TestCheckDeps_VersionConflicts` - detects conflicting version requirements
            5. `TestRegisterParser` - parser registration works
            6. `TestDetectLockFiles` - finds lock files in repo root

            ## Verification Gate

            ```bash
            go build ./pkg/deps/...
            go vet ./pkg/deps/...
            go test ./pkg/deps/... -v
            ```

            ## Constraints

            - Use existing `pkg/analyzer` for import extraction (do NOT reimplement)
            - Use existing `pkg/protocol` for IMPL doc parsing
            - Keep parser registration simple (global slice, init-time registration)
            - Return JSON-serializable types (for CLI output)
            - Handle missing lock files gracefully (empty report, not error)
