            ## What to Implement

            Create the `sawtools check-deps` CLI command that invokes the dependency conflict detector and outputs JSON results.

            ## Interfaces to Implement

            ```go
            // cmd/saw/check_deps_cmd.go
            package main

            import (
              "encoding/json"
              "fmt"
              "os"
              "github.com/spf13/cobra"
              "github.com/blackwell-systems/scout-and-wave-go/pkg/deps"
            )

            func newCheckDepsCmd() *cobra.Command {
              var wave int

              cmd := &cobra.Command{
                Use:   "check-deps <impl-doc>",
                Short: "Detect dependency conflicts before wave execution",
                Long: `Analyzes IMPL doc file ownership and lock files to detect:
            - Missing dependencies (imports not in lock file)
            - Version conflicts (agents requiring different versions)

            Prevents agents wasting time on dependency thrashing.`,
                Args: cobra.ExactArgs(1),
                RunE: func(cmd *cobra.Command, args []string) error {
                  implPath := args[0]

                  // Run conflict detection
                  report, err := deps.CheckDeps(implPath, wave)
                  if err != nil {
                    return fmt.Errorf("failed to check deps: %w", err)
                  }

                  // Output JSON
                  enc := json.NewEncoder(os.Stdout)
                  enc.SetIndent("", "  ")
                  if err := enc.Encode(report); err != nil {
                    return fmt.Errorf("failed to encode report: %w", err)
                  }

                  // Exit code: 0 if no conflicts, 1 if conflicts found
                  if len(report.MissingDeps) > 0 || len(report.VersionConflicts) > 0 {
                    os.Exit(1)
                  }

                  return nil
                },
              }

              cmd.Flags().IntVar(&wave, "wave", 0, "Wave number to check (0 = all waves)")

              return cmd
            }
            ```

            ## Interfaces to Call

            - `deps.CheckDeps(implPath, wave)` — run conflict detection
            - `json.NewEncoder(os.Stdout).Encode(report)` — output JSON

