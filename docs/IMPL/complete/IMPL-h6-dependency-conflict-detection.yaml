            go vet ./cmd/saw/...
            go test ./cmd/saw/... -run TestCheckDeps -v

            # Integration test with real IMPL doc
            ./sawtools check-deps docs/IMPL/IMPL-h6-dependency-conflict-detection.yaml --wave 1
            ```

            ## Constraints

