            }
            ```

            Also add the import context to the code block. The full corrected block should be:
            ```go
            import "github.com/blackwell-systems/scout-and-wave-go/pkg/result"

            type Adapter interface {
                Name() string
                Send(ctx context.Context, msg Message) result.Result[SendData]
            }

            type Formatter interface {
                Format(event Event) Message
            }
            ```

            ### 2. LOW: Add TestReadWithFallback table-driven test (new file types_test.go)
            Create pkg/notify/types_test.go with a table-driven test for readWithFallback:

            ```go
            package notify

            import "testing"

            func TestReadWithFallback(t *testing.T) {
                tests := []struct {
                    name     string
                    cfg      map[string]string
                    key      string
                    fallback string
                    want     string
                }{
                    {
                        name:     "primary key present",
                        cfg:      map[string]string{"token": "abc", "bot_token": "def"},
                        key:      "token",
                        fallback: "bot_token",
                        want:     "abc",
                    },
                    {
                        name:     "fallback key used",
                        cfg:      map[string]string{"bot_token": "def"},
                        key:      "token",
                        fallback: "bot_token",
                        want:     "def",
                    },
                    {
                        name:     "neither key present",
                        cfg:      map[string]string{"other": "val"},
                        key:      "token",
                        fallback: "bot_token",
                        want:     "",
                    },
                    {
                        name:     "primary key empty falls back",
                        cfg:      map[string]string{"token": "", "bot_token": "def"},
                        key:      "token",
                        fallback: "bot_token",
                        want:     "def",
                    },
                    {
                        name:     "both empty",
                        cfg:      map[string]string{"token": "", "bot_token": ""},
                        key:      "token",
                        fallback: "bot_token",
                        want:     "",
                    },
                    {
                        name:     "nil map",
                        cfg:      nil,
                        key:      "token",
                        fallback: "bot_token",
                        want:     "",
                    },
                }
                for _, tt := range tests {
                    t.Run(tt.name, func(t *testing.T) {
                        got := readWithFallback(tt.cfg, tt.key, tt.fallback)
                        if got != tt.want {
                            t.Errorf("readWithFallback() = %q, want %q", got, tt.want)
                        }
                    })
                }
            }
            ```

            Note: readWithFallback is unexported, so the test must be in package notify
            (not notify_test). Check that the nil map case actually works -- looking at
            the implementation: `cfg[key]` on a nil map returns "" in Go, so it works.

            ## Interfaces
            - readWithFallback(cfg map[string]string, key, fallbackKey string) string (in types.go, unexported)

            ## Tests
            - TestReadWithFallback with 6 test cases as specified above
            - Existing tests must not be affected

            ## Verification gate
            ```bash
            go build ./pkg/notify/... && go vet ./pkg/notify/... && go test ./pkg/notify/... -count=1 -run "TestReadWithFallback"
            ```

            ## Constraints
            - Do NOT modify any .go files other than creating types_test.go
