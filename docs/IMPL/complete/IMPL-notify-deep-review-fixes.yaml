      agents:
        - id: A
          task: |
            ## Role
            Fix Slack adapter bugs and add missing bot token tests.

            ## What to implement

            ### 1. HIGH: Fix silent JSON decode failure (slack.go line 155-165)
            The current code at line 160:
            ```go
            if err := json.NewDecoder(resp.Body).Decode(&apiResp); err == nil && !apiResp.OK {
            ```
            silently succeeds when JSON decode fails. Split into two separate checks:

            ```go
            if err := json.NewDecoder(resp.Body).Decode(&apiResp); err != nil {
                return result.NewFailure[SendData]([]result.SAWError{
                    {Code: "SLACK_DECODE_ERROR", Message: fmt.Sprintf("slack: decode API response: %v", err), Severity: "fatal"},
                })
            }
            if !apiResp.OK {
                return result.NewFailure[SendData]([]result.SAWError{
                    {Code: "SLACK_API_ERROR", Message: fmt.Sprintf("slack: API error: %s", apiResp.Error), Severity: "fatal"},
                })
            }
            ```

            ### 2. MEDIUM: Populate MessageID from Slack Bot API response (slack.go line 155-170)
            Add `TS string json:"ts"` to the apiResp struct. After the OK check, use apiResp.TS
            as the MessageID in the returned SendData. Only for bot token mode -- webhook mode
            does not return a message ID, so leave MessageID empty for webhook sends.

            The success return (currently line 167-170) should become:
            ```go
            sd := SendData{
                Timestamp: time.Now(),
                Provider:  "slack",
            }
            if s.token != "" {
                sd.MessageID = apiResp.TS
            }
            return result.NewSuccess(sd)
            ```

            Move the apiResp variable declaration and body decode to only run in bot token mode
            (it's already inside the `if s.token != ""` block). Keep the success return after the block.

            ### 3. HIGH: Add bot token mode tests (slack_test.go)
            Add three new test functions using httptest.NewServer:

            **TestSlackAdapter_Send_BotTokenSuccess**: Create a SlackAdapter with token + destination
            (no webhook_url). Mock server returns `{"ok":true,"ts":"1234567890.123456"}`. Verify:
            - Request has Authorization: Bearer header
            - Request URL path is /api/chat.postMessage (the mock server will receive the request at its root, but verify Content-Type and auth header)
            - Request body contains "channel" field
            - Result is success
            - SendData.MessageID equals "1234567890.123456"
            - SendData.Provider equals "slack"

            To test bot token mode, you need to override the API URL. The SlackAdapter currently
            hardcodes "https://slack.com/api/chat.postMessage". Create the adapter directly as
            `&SlackAdapter{token: "xoxb-test", destination: "#test", client: srv.Client()}` and
            then the token != "" branch will use the hardcoded URL. BUT that won't hit the test
            server. Instead, you need to make the adapter hit the test server URL.

            The cleanest approach: construct the adapter via NewSlackAdapter with token+destination,
            then type-assert to *SlackAdapter and replace the client. But the hardcoded URL
            "https://slack.com/api/chat.postMessage" is the problem. You'll need to also add a
            `botAPIURL` field to SlackAdapter (unexported, defaults to the real URL, overridable
            for tests). Set it in the test to srv.URL. Update Send() to use `s.botAPIURL` instead
            of the hardcoded string. Default it in NewSlackAdapter:
            ```go
            botAPIURL: "https://slack.com/api/chat.postMessage",
            ```

            **TestSlackAdapter_Send_BotTokenAPIError**: Mock returns `{"ok":false,"error":"channel_not_found"}`.
            Verify result is fatal with code "SLACK_API_ERROR" and message contains "channel_not_found".

            **TestSlackAdapter_Send_BotTokenDecodeError**: Mock returns invalid JSON (e.g., `{invalid`).
            Verify result is fatal with code "SLACK_DECODE_ERROR".

            ### 4. MEDIUM: Add doc comments for adapter-specific error codes
            Add a block comment near the top of slack.go (after the import block, before the type
            declarations) explaining the adapter-specific error codes:
            ```go
            // Slack adapter error codes (not registered in pkg/result/codes.go because
            // this package is designed as an extractable library with its own error domain):
            //   SLACK_MARSHAL_ERROR   — JSON marshal of outbound payload failed
            //   SLACK_REQUEST_ERROR   — http.NewRequestWithContext failed
            //   SLACK_SEND_ERROR      — HTTP client.Do failed (non-context error)
            //   SLACK_RATE_LIMITED    — 429 Too Many Requests
            //   SLACK_HTTP_ERROR      — non-2xx HTTP status (not 429)
            //   SLACK_API_ERROR       — Bot API returned {"ok": false}
            //   SLACK_DECODE_ERROR    — Bot API response JSON decode failed
            ```

