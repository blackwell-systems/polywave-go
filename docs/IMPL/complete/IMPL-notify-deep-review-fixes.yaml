            - result.NewSuccess, result.NewFailure from pkg/result (read-only)
            - result.CodeContextCancelled from pkg/result/codes.go (read-only)

            ## Tests
            - Existing tests must continue to pass (webhook mode tests)
            - Add TestSlackAdapter_Send_BotTokenSuccess
            - Add TestSlackAdapter_Send_BotTokenAPIError
            - Add TestSlackAdapter_Send_BotTokenDecodeError

