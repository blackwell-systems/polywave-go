          task: |
            ## Role
            Fix Discord and Telegram adapters: populate MessageID and add comment.

            ## What to implement

            ### 1. MEDIUM: Populate MessageID in Discord adapter (discord.go ~line 114-128)
            After the HTTP status check (line 114-122), before the success return, parse the
            response body to extract the message ID. Discord webhooks with `?wait=true` return
            a message object with an "id" field. Without `?wait=true`, Discord returns 204 No Content
            and there's no body to parse.

            Update the adapter to append `?wait=true` to the webhook URL so Discord returns the
            message object. Then parse the response:
            ```go
            var discordResp struct {
                ID string `json:"id"`
            }
            // Best-effort parse -- if decode fails, we still got a 2xx so the message was sent.
            // Just leave MessageID empty.
            json.NewDecoder(resp.Body).Decode(&discordResp)
            ```

            Update the webhookURL in the request to append "?wait=true":
            ```go
            reqURL := a.webhookURL + "?wait=true"
            ```
            (Add this before the http.NewRequestWithContext call, use reqURL instead of a.webhookURL)

            Return SendData with MessageID:
            ```go
            return result.NewSuccess(SendData{
                MessageID: discordResp.ID,
                Timestamp: time.Now(),
                Provider:  "discord",
            })
            ```

            ### 2. MEDIUM: Populate MessageID in Telegram adapter (telegram.go ~line 96-111)
            After the HTTP status check, before the success return, parse the response body:
            ```go
            var telegramResp struct {
                OK     bool `json:"ok"`
                Result struct {
                    MessageID int `json:"message_id"`
                } `json:"result"`
            }
            var msgID string
            if err := json.NewDecoder(resp.Body).Decode(&telegramResp); err == nil && telegramResp.OK {
                msgID = fmt.Sprintf("%d", telegramResp.Result.MessageID)
            }
            ```

            Update the success return to include MessageID:
            ```go
            return result.NewSuccess(SendData{
                MessageID: msgID,
                Timestamp: time.Now(),
                Provider:  "telegram",
            })
            ```

            Note: Telegram's existing test server already returns `{"ok":true}` so the existing
            tests won't break -- msgID will just be "0" since message_id defaults to 0.
            Update the test server in TestTelegramAdapter_SendSuccess to return a message_id:
            ```go
            w.Write([]byte(`{"ok":true,"result":{"message_id":42}}`))
            ```
            Then verify data.MessageID == "42" in the test assertions. This requires modifying
            telegram_test.go -- but that file is NOT in your ownership. Instead, make the parse
            best-effort so existing tests still pass: if message_id is 0, leave MessageID as
            empty string:
            ```go
            if err == nil && telegramResp.OK && telegramResp.Result.MessageID > 0 {
                msgID = fmt.Sprintf("%d", telegramResp.Result.MessageID)
            }
            ```
            This way the existing test (which returns `{"ok":true}` with no result.message_id)
            still passes with empty MessageID.

            Wait -- re-reading telegram_test.go, the test server returns `{"ok":true}` which
            will decode with MessageID=0. With the > 0 check, msgID stays empty. Good.

            Actually, looking more carefully at telegram_test.go line 56-57, it writes
            `{"ok":true}`. The test does NOT check MessageID. So even if we set it to "0",
            the test passes. But using > 0 is cleaner.

            ### 3. LOW: Add comment to Discord's embeds assertion block (discord.go ~line 65-68)
            The Slack adapter has a detailed comment explaining the type assertion fallback
            (slack.go lines 81-85). Discord lacks this. Add a similar comment before line 65:
            ```go
            // msg.Embeds must be []discordEmbed (as produced by DiscordFormatter.Format)
            // for the assertion to succeed. If Embeds is any other type (e.g. nil
            // or []interface{}), the assertion fails silently and the message falls
            // back to content-only mode. Callers using a non-Discord formatter
            // must ensure Embeds is []discordEmbed or leave it nil.
            ```

            ### 4. MEDIUM: Add doc comments for adapter-specific error codes
            Add block comments near the top of discord.go and telegram.go (after imports,
            before type declarations) explaining the error codes, similar to:

            discord.go:
            ```go
            // Discord adapter error codes (not registered in pkg/result/codes.go because
