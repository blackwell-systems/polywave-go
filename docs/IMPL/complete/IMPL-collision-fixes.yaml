pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            The "log/slog" import conflicts with an existing logger injection pattern
            in the collision package. If the package has a package-level logger variable
            or accepts a *slog.Logger parameter, using slog.Default() may be inconsistent.
          likelihood: low
          impact: low
          mitigation: |
            The collision package currently has no logger injection — no *slog.Logger
            parameters or package-level logger variables exist in detector.go or types.go.
            Using slog.Default() is consistent with how simple packages log in this codebase.
            Verified by reading all three files in the package.
        - scenario: |
            The root-package pkgPath normalization (. -> "") changes collision key format
            from "./TypeName" to "/TypeName". If any existing caller parses these keys
            expecting the "./" prefix, it would break.
          likelihood: low
          impact: medium
          mitigation: |
            CollisionReport is consumed by CLI output formatting and callers that only
            read the TypeCollision.Package field — they do not parse the raw map keys.
            The internal key format is an implementation detail of detectCollisionsInTypes
            and never escapes the function. The fix is safe.
        - scenario: |
            The new test case for root-package files fails because the pkgPath
            normalization fix is not applied, causing Package to be "." instead of "".
          likelihood: low
          impact: low
          mitigation: |
            Fix 2 and Fix 5 (test) are in the same file batch assigned to Agent A,
            so they are implemented together. The test directly validates the fix.
