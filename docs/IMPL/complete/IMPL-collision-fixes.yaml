interface_contracts:
    - name: extractTypeDecls (pkgPath normalization)
      description: |
        When filepath.Dir(filePath) returns ".", normalize pkgPath to "" so that
        root-package files produce keys like "/TypeName" rather than "./TypeName".
        This ensures consistent collision detection for files at the repo root
        (e.g., "main.go").
      definition: |
        // Inside extractTypeDecls, after line 179:
        pkgPath := filepath.Dir(filePath)
        if pkgPath == "." {
            pkgPath = ""
        }
      location: pkg/collision/detector.go
    - name: extractTypesFromFiles (git show error logging)
      description: |
        When git show fails for a file, log at debug level before continuing.
        The package uses log/slog (standard library) consistent with the rest of
        the codebase. The logger is obtained via slog.Default().
      definition: |
        // Replace the silent continue at lines 151-153:
        content, err := igit.Run(repoPath, "show", branchName+":"+file)
        if err != nil {
            slog.Debug("skipping file: git show failed", "file", file, "branch", branchName, "err", err)
            continue
        }
      location: pkg/collision/detector.go
    - name: detectCollisionsInTypes (concurrency safety comment)
      description: |
        Add a comment above the map append at line 223 (inside the loop body)
        making the non-goroutine-safe constraint explicit.
      definition: |
        // NOT goroutine-safe: this map is accessed and mutated from a single goroutine.
        // If this loop is ever parallelized, protect typeOccurrences with a sync.Mutex.
        typeOccurrences[key] = append(typeOccurrences[key], agentID)
      location: pkg/collision/detector.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Apply 4 targeted fixes to pkg/collision/detector.go and add 1 missing test
            case to pkg/collision/detector_test.go. All changes are in the same package.

            ### Fix 1 — CRITICAL: Replace context.TODO() with ctx (detector.go line 36)

            At line 36 in DetectCollisions(), change:
              manifest, err := protocol.Load(context.TODO(), manifestPath)
            to:
              manifest, err := protocol.Load(ctx, manifestPath)

            The function already receives a ctx parameter that is checked on line 32.
            Using context.TODO() here defeats cancellation propagation to protocol.Load.

            ### Fix 2 — CRITICAL: Normalize root-package pkgPath (detector.go lines 171-179)

            In extractTypeDecls(), after the line:
              pkgPath := filepath.Dir(filePath)
            add immediately below it:
              if pkgPath == "." {
                  pkgPath = ""
              }

            Rationale: filepath.Dir("main.go") returns ".", which produces collision
            keys like "./TypeName". Normalizing to "" gives "/TypeName" — consistent
            with how other top-level packages are handled and avoids the anomalous
            dot-slash prefix in collision reports.

            ### Fix 3 — HIGH: Add debug log on git show failure (detector.go lines 151-153)

            In extractTypesFromFiles(), find the block:
              content, err := igit.Run(repoPath, "show", branchName+":"+file)
              if err != nil {
                  // File might have been deleted or is binary — skip
                  continue
              }

            Change it to:
              content, err := igit.Run(repoPath, "show", branchName+":"+file)
              if err != nil {
                  slog.Debug("skipping file: git show failed", "file", file, "branch", branchName, "err", err)
                  continue
              }

            Add "log/slog" to the import block at the top of detector.go (it is part of
            the Go standard library, no new dependency). The existing import block already
            has several stdlib imports — insert slog alphabetically among them.

            ### Fix 4 — MEDIUM: Add concurrency safety comment (detector.go line 223)

            In detectCollisionsInTypes(), find the map append inside the inner for loop:
              typeOccurrences[key] = append(typeOccurrences[key], agentID)

            Add a comment immediately above it:
              // NOT goroutine-safe: this map is written from a single goroutine.
              // Do not parallelize this loop without protecting typeOccurrences with a sync.Mutex.

            ### Fix 5 — TEST: Add root-package file test case (detector_test.go)

            In TestExtractTypeDecls, add a new test case entry to the existing tests slice.
            Insert it after the "type alias" case and before the "multiple types" case:

              {
                  name:     "root package file - filepath.Dir returns dot",
                  filePath: "main.go",
                  content: `package main

            type AppConfig struct {
                Port int
            }
            `,
                  want: []TypeDeclaration{
                      {Name: "AppConfig", Package: "", Kind: "struct"},
                  },
                  wantErr: false,
              },

            This test verifies that a file at the repo root (where filepath.Dir returns ".")
            produces a TypeDeclaration with Package: "" rather than Package: ".".

            ## Verification gate

            Run after all changes:
              go build ./pkg/collision/...
              go vet ./pkg/collision/...
              go test ./pkg/collision/...

            All existing tests must continue to pass. The new test case must pass.

            ## Constraints

            - Do NOT change any function signatures or exported types.
            - Do NOT modify pkg/collision/types.go.
            - The only import to add is "log/slog" (stdlib). No new dependencies.
            - Do NOT change test infrastructure (skip directives, helper functions).
            - The concurrency comment (Fix 4) is documentation only — do not add a mutex
              or change the function's behavior.
          files:
            - pkg/collision/detector.go
            - pkg/collision/detector_test.go
          context_source: prepared-brief
