pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A migrates New() return type but pkg/engine/runner.go still compiles
            against the old signature at Wave 1 merge time, causing build gate failure
            before Agent A2 can fix callers.
          likelihood: medium
          impact: medium
          mitigation: |-
            Wave 1 quality gates scope to ./pkg/orchestrator/... only (not ./pkg/engine/...).
            Wave 2 gates cover both packages. The post-wave-1 build gate should be scoped
            accordingly. If the orchestrator runs a full `go build ./...` gate after Wave 1,
            it will fail until A2 completes — the Orchestrator should configure the Wave 1
            gate to scope to ./pkg/orchestrator/... and ./pkg/protocol/... only.
        - scenario: |-
            Agent C deletes journal_integration.go but loggerFrom() was only defined there,
            causing a compile error in stubs.go.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent C task explicitly instructs checking for loggerFrom before deleting.
            If only found in journal_integration.go, move it to stubs.go first.
        - scenario: |-
            Agent D's validTransitions map diverges from protocol allowedTransitions:
            the orchestrator map allowed StateBlocked to transition to any state, but
            protocol's map is more restrictive. Removing validTransitions breaks tests
            that transition from Blocked.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent D task requires diffing both maps before removal. If protocol is more
            restrictive, missing Blocked recovery transitions must be added to protocol
            allowedTransitions first. Tests will catch regressions at the verification gate.
        - scenario: |-
            Agent E rewrites doc.go referencing New() with the old signature before
            reading post-Wave-1 orchestrator.go, causing compile failure.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent E task explicitly states to read orchestrator.go after Wave 1 completes
            and that New() returns result.Result[*Orchestrator]. Agent E should not use
            runnable Go example functions in doc.go to avoid compile risk.
        - scenario: |-
            Agent B adds executeRetryLoop call but passes a zero-value savedReport
            (report never populated because no CompletionReport existed for the agent),
            causing the retry loop to see empty FailureType and escalate instead of retry.
          likelihood: low
          impact: low
          mitigation: |-
            The existing outer guard `if savedStatus == "partial" || savedStatus == "blocked"`
            ensures executeRetryLoop is only called when savedReport was actually populated.
            Agent B must not call executeRetryLoop outside that guard.
