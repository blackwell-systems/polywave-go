        Public constructor for Orchestrator. Migrated from (*Orchestrator, error) to
        result.Result[*Orchestrator] per canonical return-type convention. Callers in
        runner.go (Wave 2 Agent A2) must be updated to use .IsFatal() / .GetData().
      definition: |
        func New(ctx context.Context, repoPath string, implDocPath string) result.Result[*Orchestrator]
      location: pkg/orchestrator/orchestrator.go
    - name: NewBackendFromModel
      description: |-
        Exported backend constructor. Migrated from (backend.Backend, error) to
        result.Result[backend.Backend]. Three call sites in runner.go must be updated
        by Wave 2 Agent A2.
      definition: |
