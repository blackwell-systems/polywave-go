            ## Agent D — Replace duplicate validTransitions with protocol.IsValidTransition

            ### Context
            `pkg/orchestrator/transitions.go` maintains a private `validTransitions`
            map (P2-3) that duplicates `allowedTransitions` in
            `pkg/protocol/state_transition.go`. No sync check exists: new protocol
            states silently diverge. `protocol.IsValidTransition` does not yet exist —
            you must add it.

            ### Changes required

            **1. Add `IsValidTransition` to `pkg/protocol/state_transition.go`**

            Add after the `allowedTransitions` map declaration:
            ```go
            // IsValidTransition reports whether transitioning from -> to is a valid
            // protocol state machine transition per the canonical allowedTransitions map.
            func IsValidTransition(from, to ProtocolState) bool {
                allowed, ok := allowedTransitions[from]
                if !ok {
                    return false
                }
                for _, s := range allowed {
                    if s == to {
                        return true
                    }
                }
                return false
            }
            ```

            **2. Update `pkg/orchestrator/transitions.go`**

            IMPORTANT: Before removing the local map, diff the two maps to detect
            divergence:
            - `orchestrator/transitions.go` `validTransitions` includes
              `StateScoutValidating` as a source state and broader `StateBlocked`
              recovery paths (to any state).
            - `pkg/protocol/state_transition.go` `allowedTransitions` may cover
              fewer transitions.

            If differences exist, decide per case:
            - If orchestrator transitions are correct and protocol is missing them,
              add the missing transitions to `allowedTransitions` in protocol first.
            - If both maps agree, proceed with deletion.

            Replace `isValidTransition` to delegate:
            ```go
            // isValidTransition delegates to protocol.IsValidTransition — the canonical
            // state machine FSM. The private validTransitions map has been removed to
            // prevent silent divergence when protocol adds new states.
            func isValidTransition(from, to protocol.ProtocolState) bool {
                return protocol.IsValidTransition(from, to)
            }
            ```

            Delete the entire `validTransitions` var declaration.

            **3. Add a test for `IsValidTransition`**

            Add to `pkg/protocol` (check if `state_transition_test.go` exists; if not,
            create `is_valid_transition_test.go`). Include at least 3 valid transitions
            and 2 invalid transitions as table-driven test cases.

