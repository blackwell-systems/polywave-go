            _ = protocol.WithCompletionReportLock(ctx, func(ctx context.Context) error {
            ```
            This is superseded by the savedReport refactor in change #1 above; if you
            apply change #1 first, `context.TODO()` will no longer exist in the file.

            ### Verification gate
