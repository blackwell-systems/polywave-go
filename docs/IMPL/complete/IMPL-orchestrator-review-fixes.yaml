            ## Agent B — E19 retry loop + context.TODO() fix in structured_wave.go

            ### Context
            `pkg/orchestrator/structured_wave.go` has two bugs:
            1. (P0-3) `launchAgentStructured` detects `partial`/`blocked` and publishes
               `agent_blocked` but does NOT call `executeRetryLoop`. E19 routing is
               broken for structured output agents — they never auto-retry.
            2. (P1-2) `context.TODO()` used inside `launchAgentStructured` despite
