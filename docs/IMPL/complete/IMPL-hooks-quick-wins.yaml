            ## Agent B — CLI hook: warn_stubs (H3)

            **Repo:** scout-and-wave (protocol repo)
            **Files:** implementations/claude-code/hooks/warn_stubs

            ### What to implement

            Create a PostToolUse hook script for the Write|Edit matcher that:
            1. Reads JSON from stdin (fields: tool_name, tool_input, tool_output, agent_type)
            2. Only activates for wave-agent, integration-agent, scaffold-agent
               (skip scout and general-purpose, exit 0)
            3. Extracts tool_input.content (for Write) or tool_input.new_string (for Edit)
            4. Scans the content for stub patterns (case-insensitive where appropriate):
               - `TODO` (case sensitive — common in comments)
               - `FIXME` (case sensitive)
               - `pass` alone on a line (Python stub — match `^\s*pass\s*$`)
               - `raise NotImplementedError`
               - `unimplemented!()`
               - `throw new Error("not implemented")`
               - `panic("not implemented")`
               - `panic("TODO")`
            5. If stubs found: output JSON to stdout with additionalContext warning.
               Exit 0 (non-blocking).
            6. If no stubs: exit 0 silently.

            Output format when stubs detected:
            ```json
            {"additionalContext": "Warning: stub pattern detected in written content. Patterns found: TODO (line 15), FIXME (line 23). Complete the implementation before committing."}
            ```

            ### Patterns to follow

            Same bash/jq patterns as other hooks. Key difference: this is PostToolUse
            and NON-BLOCKING. Always exit 0. The warning goes to stdout as JSON, not stderr.

            ### Line number detection

            To find line numbers, split the content and grep with -n:
            ```bash
            echo "$content" | grep -n -E 'TODO|FIXME|raise NotImplementedError|...' | head -5
            ```
            Limit to first 5 matches to keep the warning concise.

            ### Verification gate

            ```bash
            # Test: Write with TODO triggers warning
            echo '{"tool_name":"Write","tool_input":{"file_path":"foo.go","content":"func foo() {\n  // TODO: implement\n}"},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/warn_stubs
            # Expected: JSON with additionalContext warning, exit 0

            # Test: Clean write produces no output
            echo '{"tool_name":"Write","tool_input":{"file_path":"foo.go","content":"func foo() { return 42 }"},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/warn_stubs
            # Expected: no output, exit 0

            # Test: Scout agent skipped
            echo '{"tool_name":"Write","tool_input":{"file_path":"foo.go","content":"// TODO"},"agent_type":"scout"}' | bash implementations/claude-code/hooks/warn_stubs
            # Expected: no output, exit 0
            ```

            ### Constraints
            - MUST be non-blocking (always exit 0)
            - Output JSON to stdout only when stubs found
            - Keep under 60 lines
            - Handle missing content gracefully
          files:
            - implementations/claude-code/hooks/warn_stubs
        - id: C
