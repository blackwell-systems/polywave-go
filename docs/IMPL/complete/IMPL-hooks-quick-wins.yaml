            ## Agent E — Go engine: stub warning middleware (H3)

            **Repo:** scout-and-wave-go
            **Files:** pkg/hooks/stub_warning.go, pkg/hooks/stub_warning_test.go

            ### What to implement

            Add to the existing `pkg/hooks` package:

            **stub_warning.go:**

            ```go
            package hooks

            // StubMatch represents a detected stub pattern in content.
            type StubMatch struct {
                Pattern string
                Line    int
            }

            // ScanForStubs scans content for stub patterns and returns all matches.
            // Returns nil if no stubs found.
            func ScanForStubs(content string) []StubMatch

            // FormatStubWarning formats stub matches into a human-readable warning string.
            // Returns empty string if matches is nil or empty.
            func FormatStubWarning(filePath string, matches []StubMatch) string
            ```

            Stub patterns to detect (from roadmap):
            - `TODO` — case sensitive, match as word boundary: `\bTODO\b`
            - `FIXME` — case sensitive: `\bFIXME\b`
            - `^\s*pass\s*$` — Python stub (whole line)
            - `raise NotImplementedError`
            - `unimplemented!()` — Rust
            - `throw new Error("not implemented")` — JS/TS (allow single or double quotes)
            - `panic("not implemented")` — Go
            - `panic("TODO")` — Go

            Implementation:
            1. Split content by newlines
            2. For each line, check against each pattern
            3. Collect StubMatch{Pattern, Line} for each hit
            4. Return the slice (nil if empty)

            FormatStubWarning output format:
            "Warning: stub detected in {filePath}: TODO (line 5), FIXME (line 12)"

            **stub_warning_test.go:**

            Test cases:
            - Clean code returns nil
            - TODO in comment detected
            - FIXME detected
            - Python `pass` on its own line detected
            - `pass` inside a word (e.g., "password") NOT detected
            - `raise NotImplementedError` detected
            - `unimplemented!()` detected
            - Multiple stubs in one file returns all matches
            - FormatStubWarning with empty matches returns ""
            - FormatStubWarning with matches returns formatted string

            ### Design note

            This is intentionally NOT a tools.Middleware — it's a standalone detection
            function in pkg/hooks. The caller (runner.go, orchestrator, or future
            PostToolUse middleware) decides how to surface the warning. This keeps
            the function testable and reusable.

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/hooks/ -run TestScanForStubs -v && go test ./pkg/hooks/ -run TestFormatStubWarning -v
            ```

            ### Constraints
            - No external dependencies (stdlib only: strings, regexp, fmt)
            - Must handle empty content gracefully
            - Line numbers are 1-indexed
          files:
            - pkg/hooks/stub_warning.go
            - pkg/hooks/stub_warning_test.go
