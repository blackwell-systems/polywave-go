            ## Agent A — CLI hook: check_impl_path (H2)

            **Repo:** scout-and-wave (protocol repo)
            **Files:** implementations/claude-code/hooks/check_impl_path

            ### What to implement

            Create a PreToolUse hook script for the Agent tool matcher that:
            1. Reads JSON from stdin (fields: tool_name, tool_input, agent_type)
            2. Only activates when tool_name is "Agent" (skip otherwise, exit 0)
            3. Only activates for SAW agent types: wave-agent, scout, integration-agent,
               scaffold-agent, critic-agent (skip general-purpose, exit 0)
            4. Extracts the IMPL doc path from tool_input.prompt using regex:
               Look for paths matching `docs/IMPL/IMPL-[^\s"']+\.yaml` or absolute
               paths containing `docs/IMPL/IMPL-*.yaml`
            5. If no IMPL path found in the prompt, exit 0 (not all agent launches
               reference IMPL docs — scouts create them)
            6. If IMPL path found, verify the file exists on disk:
               - If exists: exit 0 (allow)
               - If not exists: print error to stderr and exit 2 (block)

            Error message format:
            "IMPL doc not found at {path}. Verify the path and try again."

            ### Patterns to follow

            Follow the exact pattern from check_scout_boundaries and check_wave_ownership:
            - `#!/usr/bin/env bash` shebang
            - `set -euo pipefail`
            - `input=$(cat)` to read stdin
            - `jq -r` for JSON field extraction
            - Early exit 0 for non-matching cases
            - Error message to stderr, exit 2 for blocks. Note: existing hooks
              (check_scout_boundaries, check_wave_ownership) use exit 1 which also
              works, but exit 2 is the correct Claude Code hook API code for
              "intentional block". Use exit 2 for this new hook.

            ### Verification gate

            ```bash
            # Test: non-Agent tool passes through
            echo '{"tool_name":"Write","tool_input":{},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/check_impl_path; echo $?
            # Expected: 0

            # Test: Agent tool with existing IMPL path passes
            echo '{"tool_name":"Agent","tool_input":{"prompt":"Read docs/IMPL/IMPL-hooks-quick-wins.yaml"},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/check_impl_path; echo $?
            # Expected: 0 (if file exists) or 2 (if not)

            # Test: Agent tool with nonexistent IMPL path blocks
            echo '{"tool_name":"Agent","tool_input":{"prompt":"Read docs/IMPL/IMPL-nonexistent-feature.yaml"},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/check_impl_path; echo $?
            # Expected: 2
            ```

            ### Constraints
            - Must be executable (chmod +x)
            - No dependencies beyond bash and jq
            - Must handle missing jq gracefully (exit 0)
            - Keep under 50 lines
          files:
            - implementations/claude-code/hooks/check_impl_path
