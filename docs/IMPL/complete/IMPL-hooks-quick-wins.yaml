            ## Agent C — CLI hook: check_branch_drift (H4)

            **Repo:** scout-and-wave (protocol repo)
            **Files:** implementations/claude-code/hooks/check_branch_drift

            ### What to implement

            Create a PostToolUse hook script for the Bash matcher that:
            1. Reads JSON from stdin (fields: tool_name, tool_input, tool_output, agent_type)
            2. Only activates for wave-agent (skip all other agent types, exit 0)
            3. Extracts tool_input.command
            4. Checks if the command contains a git commit pattern:
               Match `git commit` or `git -c ... commit` (not git add, git push, etc.)
               Use: `echo "$command" | grep -qE '(^|\s|&&|\|)git\s+(\-c\s+\S+\s+)?commit'`
            5. If not a git commit command: exit 0
            6. If git commit detected:
               a. Get the current branch: `git -C "$PWD" rev-parse --abbrev-ref HEAD 2>/dev/null`
               b. If branch is "main" or "master": print error to stderr, exit 2 (block)
               c. Optionally check if branch matches SAW pattern `saw/*/wave*-agent-*`
                  If it does NOT match the SAW pattern, emit a warning via additionalContext
                  (non-blocking) but do NOT block. Only block on main/master.

            Error message for main/master:
            "Branch drift: committed to {branch} but SAW agents must not commit to main/master.
            Expected branch pattern: saw/{slug}/wave{N}-agent-{ID}"

            Warning for non-SAW branch (non-blocking):
            ```json
            {"additionalContext": "Warning: current branch '{branch}' does not match expected SAW pattern saw/{slug}/waveN-agent-ID. Verify you are on the correct worktree branch."}
            ```

            ### Patterns to follow

            Same bash/jq patterns as other hooks. This is PostToolUse on Bash.
            - Block (exit 2) ONLY for main/master. Note: existing hooks use exit 1
              which also works, but exit 2 is the correct Claude Code API code for
              "intentional block". Use exit 2 for this new hook.
            - Warn (additionalContext JSON to stdout, exit 0) for unexpected non-SAW branches
            - Silent pass (exit 0) for correct SAW branches and non-commit commands

            ### Verification gate

            ```bash
            # Test: non-commit command passes
            echo '{"tool_name":"Bash","tool_input":{"command":"go test ./..."},"agent_type":"wave-agent"}' | bash implementations/claude-code/hooks/check_branch_drift
            # Expected: exit 0

            # Test: non-wave-agent passes
            echo '{"tool_name":"Bash","tool_input":{"command":"git commit -m test"},"agent_type":"scout"}' | bash implementations/claude-code/hooks/check_branch_drift
            # Expected: exit 0
            ```

            ### Constraints
            - Block (exit 2) ONLY on main/master after git commit
            - Keep git operations fast (single rev-parse)
            - Handle missing git gracefully (exit 0)
            - Keep under 60 lines
          files:
            - implementations/claude-code/hooks/check_branch_drift
