interface_contracts:
    - name: CLI hook JSON stdin contract
      description: |
        All CLI hooks receive JSON on stdin from Claude Code. The shape depends
        on hook type (PreToolUse vs PostToolUse vs SubagentStart).
      definition: |
        PreToolUse (Agent matcher - H2):
          {"tool_name": "Agent", "tool_input": {"prompt": "...", "description": "..."}, "agent_type": "..."}

        PostToolUse (Write|Edit matcher - H3):
          {"tool_name": "Write", "tool_input": {"file_path": "...", "content": "..."}, "tool_output": "...", "agent_type": "..."}

        PostToolUse (Bash matcher - H4):
          {"tool_name": "Bash", "tool_input": {"command": "..."}, "tool_output": "...", "agent_type": "..."}

        Exit codes:
          0 = allow (no output or JSON with additionalContext for warnings)
          2 = block (stderr message shown to agent)

        Non-blocking warning output (H3):
          {"additionalContext": "Warning: stub detected in {file} at line {N}. Complete the implementation before committing."}
      location: implementations/claude-code/hooks/README.md
    - name: StubWarningMiddleware
      description: |
        Post-write middleware that scans written content for stub patterns and
        returns a warning string prepended to the result. Non-blocking.
      definition: |
        // StubWarningMiddleware returns middleware that scans write_file/edit_file
        // output for stub patterns (TODO, FIXME, pass, raise NotImplementedError,
        // unimplemented!(), throw new Error("not implemented")).
        // Non-blocking: appends warning to result string, does not return error.
        func StubWarningMiddleware(toolName string) Middleware
      location: pkg/hooks/stub_warning.go
    - name: ValidateIMPLPath
      description: |
        Pre-launch validation that extracts IMPL doc path from agent prompt
        and verifies the file exists on disk.
      definition: |
        // ValidateIMPLPath extracts the IMPL doc path from the agent prompt text
        // and verifies the file exists. Returns the extracted path and any error.
        // Error is non-nil if path not found in prompt or file does not exist.
        func ValidateIMPLPath(prompt string) (string, error)
      location: pkg/hooks/impl_path.go
    - name: ValidateBranchDrift
      description: |
        Post-bash validation that checks if a git commit command was run and
        verifies the current branch matches the expected wave branch.
      definition: |
        // ValidateBranchDrift checks if the bash command was a git commit and,
        // if so, verifies the current branch in workDir matches expectedBranch.
        // Returns an error if on main/master or wrong branch. Returns nil if
        // the command was not a git commit or branch matches.
        func ValidateBranchDrift(command, workDir, expectedBranch string) error
      location: pkg/hooks/branch_drift.go
