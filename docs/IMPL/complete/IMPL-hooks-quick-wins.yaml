pre_mortem:
    overall_risk: low
    rows:
        - scenario: CLI hooks fail on systems without jq installed
          likelihood: low
          impact: low
          mitigation: |
            All hooks check for jq availability and exit 0 (allow) if missing.
            This follows the existing pattern in validate_impl_on_write.
        - scenario: H4 branch drift check is slow due to git operations
          likelihood: low
          impact: medium
          mitigation: |
            Single git rev-parse call is <10ms. Only runs after git commit
            commands, not every bash invocation.
        - scenario: H3 stub patterns produce false positives (e.g., 'password' matching 'pass')
          likelihood: medium
          impact: low
          mitigation: |
            Python 'pass' uses whole-line regex (^\s*pass\s*$). TODO/FIXME use
            word boundaries. Non-blocking warning only, so false positives are
            informational, not blocking.
        - scenario: H2 IMPL path regex misses unusual path formats
          likelihood: medium
          impact: low
          mitigation: |
            Returns ("", nil) when no path found — caller decides policy.
            Not finding a path is not a block, only finding a nonexistent
            path blocks. Conservative approach.
