            ## Agent F — Go engine: branch drift detection (H4)

            **Repo:** scout-and-wave-go
            **Files:** pkg/hooks/branch_drift.go, pkg/hooks/branch_drift_test.go

            ### What to implement

            Add to the existing `pkg/hooks` package:

            **branch_drift.go:**

            ```go
            package hooks

            // ValidateBranchDrift checks if the bash command was a git commit and,
            // if so, verifies the current branch in workDir matches expectedBranch.
            // Returns an error if on main/master or wrong branch.
            // Returns nil if not a git commit command or branch is correct.
            func ValidateBranchDrift(command, workDir, expectedBranch string) error

            // IsGitCommitCommand returns true if the command string contains a
            // git commit invocation (not git add, git push, etc).
            func IsGitCommitCommand(command string) bool

            // CurrentBranch returns the current git branch name for the given directory.
            // Returns ("", error) if git is not available or directory is not a git repo.
            func CurrentBranch(dir string) (string, error)
            ```

            IsGitCommitCommand detection:
            - Match: `git commit`, `git -c ... commit`, `git -C ... commit`
            - Do NOT match: `git add --all && echo "commit done"`, `# git commit`
            - Use regexp: `(?:^|&&|\|\||;)\s*git\s+(?:-[cC]\s+\S+\s+)*commit\b`

            CurrentBranch implementation:
            - Run `git -C {dir} rev-parse --abbrev-ref HEAD`
            - Use os/exec.Command

            ValidateBranchDrift logic:
            1. If !IsGitCommitCommand(command): return nil
            2. branch, err := CurrentBranch(workDir)
            3. If err: return nil (can't verify — don't block)
            4. If branch == "main" || branch == "master":
               return fmt.Errorf("branch drift: committed to %s but SAW agents must not commit to main/master", branch)
            5. If expectedBranch != "" && branch != expectedBranch:
               return fmt.Errorf("branch drift: on %s but expected %s", branch, expectedBranch)
            6. return nil

            **branch_drift_test.go:**

            Test cases:
            - IsGitCommitCommand("git commit -m test") returns true
            - IsGitCommitCommand("git add .") returns false
            - IsGitCommitCommand("go test && git commit -m ok") returns true
            - IsGitCommitCommand("echo git commit") returns false (in string)
            - IsGitCommitCommand("git -c user.name=x commit -m test") returns true
            - ValidateBranchDrift with non-commit returns nil
            - ValidateBranchDrift on main returns error (use git init + checkout in temp dir)
            - ValidateBranchDrift on correct branch returns nil

            ### Verification gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/hooks/ -run TestValidateBranchDrift -v && go test ./pkg/hooks/ -run TestIsGitCommitCommand -v
            ```

            ### Constraints
            - os/exec for git calls — no external git libraries
            - Do NOT block if git is unavailable (return nil)
            - Keep git calls to single rev-parse (fast, <10ms)
          files:
            - pkg/hooks/branch_drift.go
            - pkg/hooks/branch_drift_test.go
