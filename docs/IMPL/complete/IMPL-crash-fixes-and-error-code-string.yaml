            **Role:** Crash fix — nil ObsEmitter guards and legacy error code string replacement

            You are applying three surgical fixes identified in the Go engine refactor audit.
            All fixes are in `pkg/engine/`. No new exported APIs. No interface changes.

            ## 1. File Ownership

            You own these files. Do not touch any other files.
            - `pkg/engine/runner.go` — modify
            - `pkg/engine/program_tier_loop.go` — modify
            - `pkg/engine/prepare.go` — modify

            ## 2. Interfaces You Must Implement

            None. These are nil-guard and constant fixes only.

            ## 3. Interfaces You May Call

            `result.CodeRepoMismatch` is defined at `pkg/result/codes.go:71`:
            ```go
            CodeRepoMismatch = "V045_REPO_MISMATCH"
            ```
            The `result` package is already imported in `pkg/engine/prepare.go`.

            The `loggerFrom` nil-safe helper is defined at `pkg/engine/runner.go:35`:
            ```go
            func loggerFrom(l *slog.Logger) *slog.Logger { ... }
            ```
            Use the same `if opts.ObsEmitter != nil` guard pattern already used at
            `runner.go:67-71` and `finalize.go:692-693` as your model.

            ## 4. What to Implement

            ### Fix 1 — runner.go:177: Unguarded ObsEmitter.Emit on scout success path

            **File:** `pkg/engine/runner.go`
            **Line:** 177

            Current code (line 177):
            ```go
            opts.ObsEmitter.Emit(ctx, observability.NewScoutCompleteEvent(implSlug))
            ```

            Replace with:
            ```go
            if opts.ObsEmitter != nil {
                opts.ObsEmitter.Emit(ctx, observability.NewScoutCompleteEvent(implSlug))
            }
            ```

            This is a one-line change within the `RunScout` function, on the success
            path after I6 enforcement passes. The `EmitSync` call at line 67-71 has
            the identical pattern — copy it exactly.

            ### Fix 2 — program_tier_loop.go: Four unguarded ObsEmitter.Emit calls

            **File:** `pkg/engine/program_tier_loop.go`
            **Lines:** 246, 280, 318, 335

            Add `if opts.ObsEmitter != nil` guards around each of these four calls.
            Alternatively, define a package-private `nilSafeEmit` helper in
            `program_tier_loop.go` and use it for all four:

            ```go
            // nilSafeEmit calls emitter.Emit only when emitter is non-nil.
            // Mirrors the loggerFrom nil-safe pattern in runner.go.
            func nilSafeEmit(ctx context.Context, emitter ObsEmitter, event observability.Event) {
                if emitter != nil {
                    emitter.Emit(ctx, event)
                }
            }
            ```

            Then replace each bare call, e.g.:
            ```go
            // line 246 — was: opts.ObsEmitter.Emit(ctx, observability.NewTierGateFailedEvent(...))
            nilSafeEmit(ctx, opts.ObsEmitter, observability.NewTierGateFailedEvent(...))

            // line 280 — was: opts.ObsEmitter.Emit(ctx, observability.NewTierGatePassedEvent(...))
            nilSafeEmit(ctx, opts.ObsEmitter, observability.NewTierGatePassedEvent(...))

            // line 318 — was: opts.ObsEmitter.Emit(ctx, observability.NewTierAdvancedEvent(...))
            nilSafeEmit(ctx, opts.ObsEmitter, observability.NewTierAdvancedEvent(...))

            // line 335 — was: opts.ObsEmitter.Emit(ctx, observability.NewTierAdvancedEvent(...))
            nilSafeEmit(ctx, opts.ObsEmitter, observability.NewTierAdvancedEvent(...))
            ```

            Choose either approach (inline guards or helper) — the helper is preferred
            because it mirrors `loggerFrom` and is easier to extend. If you choose inline
            guards, wrap each call identically with `if opts.ObsEmitter != nil { ... }`.

            Either way: do NOT move nilSafeEmit to runner.go or any other file — keep it
            local to program_tier_loop.go. The `loggerFrom` function in runner.go is
            package-level and accessible, but a new nilSafeEmit function must not be
            defined in runner.go if you are not the file's sole author in a multi-agent
            wave. In this solo-agent IMPL, you own runner.go too, so placing nilSafeEmit
            in runner.go is also acceptable. Just ensure it is defined exactly once.

            ### Fix 3 — prepare.go:255: Hardcoded legacy error code string

            **File:** `pkg/engine/prepare.go`
            **Line:** 255

            Current code:
            ```go
            if w.Code == "E16_REPO_MISMATCH_SUSPECTED" {
            ```

            Replace with:
            ```go
            if w.Code == result.CodeRepoMismatch {
            ```

            The `result` package is already imported in `pkg/engine/prepare.go` (line 17).
            `result.CodeRepoMismatch` evaluates to `"V045_REPO_MISMATCH"` — the canonical
            code emitted by `ValidateFileExistenceMultiRepo` today.

            ## 5. Tests to Write

            Write tests in `pkg/engine/runner_test.go` (create if absent) or an
            appropriate existing test file in `pkg/engine/`:

            1. `TestRunScout_NilObsEmitter_NoScoutCompletePanic` — construct a minimal
               `RunScoutOpts` with `ObsEmitter: nil` and verify that the function does
               not panic when reaching the `scout_complete` emit path. You may need to
