            2. `TestRunTierLoop_NilObsEmitter_NoTierGatePanic` — call `RunTierLoop` with
               `TierLoopOpts{ObsEmitter: nil}` and a minimal manifest that exercises the
               tier gate paths (lines 246, 280). Verify no panic on nil ObsEmitter.

            If the test setup for these is too expensive (requires significant mocking of
