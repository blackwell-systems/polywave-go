            	// .saw-state/) before merge-agents. Prevents dirty working directory from
            	// blocking git merge. Non-fatal — if commit fails, a warning is emitted
            	// but finalize continues.
            	CommitState bool
            ```

            ### 2. Wire StepCommitState into the pipeline

            In the `FinalizeWave` function, insert the commit-state step call
            BEFORE "Step 4: MergeAgents" and AFTER the wiring declarations check
            (Step 3.6). The insertion point is right before this block:

            Insert before this exact text:
            ```go
            		// Step 4: MergeAgents — per repo
            		// Skip for integration waves (type: integration) — agents commit directly to main.
            		skipMergeAgents := false
            ```

            Add this block:
            ```go
            		// Step 3.7: CommitState — commit SAW-owned dirty files before merge
            		if opts.CommitState {
            			_, commitErr := StepCommitState(ctx, opts, manifest, onEvent)
            			if commitErr != nil {
            				// Non-fatal: log warning but continue with merge
            				loggerFrom(opts.Logger).Warn("engine.FinalizeWave: commit-state warning", "err", commitErr)
            			}
            		}

            ```

            Note: Even though StepCommitState is non-fatal internally, wrap
            the call in `if opts.CommitState` so it only runs when requested
            (matching prepare-wave's opt-in behavior).

            ### 3. Add --commit-state flag to CLI

