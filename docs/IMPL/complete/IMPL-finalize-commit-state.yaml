interface_contracts:
    - name: StepCommitState
      description: |
        Commits uncommitted SAW-owned state files (IMPL docs, .saw-state/)
        before merge-agents runs. Non-fatal on failure — reports warning
        and continues. This prevents dirty working directory from blocking
        git merge.
      definition: |
        func StepCommitState(ctx context.Context, opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)

        Behavior:
        - Calls git.StatusPorcelain(opts.RepoPath) to detect dirty files
        - Filters using isSAWOwnedPath(path, opts.IMPLPath, opts.RepoPath)
        - If no dirty SAW files: returns success with "working directory clean"
        - If dirty SAW files exist:
          - Stages each with git.AddForce (not git add -A)
          - Commits with gitCommitAllowMain using message format:
            "chore: advance IMPL state to <state> (pre-merge commit)"
          - State extracted from manifest.State
        - If user-code files are dirty: logs warning but does NOT fail
          (unlike prepare-wave which fails on user code)
        - On commit failure: returns StepResult with status "warning",
          not an error — the step is non-fatal
      location: pkg/engine/finalize_steps.go
waves:
