          task: |
            ## What to implement

            Add `StepCommitState` function to `pkg/engine/finalize_steps.go` and
            tests in a new file `pkg/engine/finalize_steps_commit_test.go`.

            ### StepCommitState function

            Add `StepCommitState` to `pkg/engine/finalize_steps.go`. Follow the
            exact pattern of existing Step functions (StepVerifyCommits, StepMergeAgents, etc.).

            The function signature:
            ```go
            func StepCommitState(ctx context.Context, opts FinalizeWaveOpts,
                manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)
            ```

            Implementation:
            1. Use step name `"commit-state"`.
            2. Call `emitStepEvent(onEvent, stepName, "running", "")`.
            3. Call `git.StatusPorcelain(opts.RepoPath)` to get dirty files.
            4. If status output is empty (clean): return success StepResult with
               detail "working directory clean — no SAW state to commit".
            5. Parse the porcelain output line by line. For each non-empty line,
               classify using `isSAWOwnedPath(line, opts.IMPLPath, opts.RepoPath)`.
               The `isSAWOwnedPath` function is in `pkg/engine/prepare.go` — it is
               already exported at package level (same package), so call it directly.
            6. Collect SAW-owned files and user-code files separately.
            7. If user-code files are dirty: emit a warning event but do NOT return
               error. The commit_state step in finalize is non-fatal unlike prepare-wave.
               Detail: "<N> non-SAW file(s) also dirty (ignored for pre-merge commit)".
            8. If no SAW-owned files are dirty: return success.
            9. Stage each SAW-owned file individually using `git.AddForce(opts.RepoPath, trimmedPath)`.
               Trim the 2-char git status prefix before passing to AddForce.
               If staging fails: emit warning event and return nil error (non-fatal).
            10. Build commit message: use manifest.State if available:
                `fmt.Sprintf("chore: advance IMPL state to %s (pre-merge commit)", manifest.State)`
                If manifest.State is empty, use: `"chore: commit SAW state (pre-merge commit)"`.
            11. Commit using `gitCommitAllowMain(opts.RepoPath, "-m", commitMsg)`.
                If commit fails: return StepResult with status "warning" and nil error.
                This is non-fatal — the orchestrator can work around it.
            12. On success: emit complete event with detail like "committed <N> SAW state file(s)".

            Important: You need to import `"strings"` for parsing porcelain output.
            The `git` package is already imported in finalize_steps.go — verify it is;
            if not, add `"github.com/blackwell-systems/scout-and-wave-go/internal/git"`.

            Insert the function after `StepAutoMergeAppendConflicts` (the last function
            in the file). Place it at the end of the file, before any closing content.

            The `gitCommitAllowMain` function is in `prepare.go` but is package-level
            (unexported) — it is accessible from `finalize_steps.go` since both are
            in `package engine`.

            ### Tests

            Create `pkg/engine/finalize_steps_commit_test.go` with these tests:

            1. `TestStepCommitState_CleanWorkDir` — call with a temp dir that is a
               valid git repo with no dirty files. Assert StepResult.Status == "success"
               and detail contains "clean". Use `collectStepEvents()` helper from
               finalize_steps_test.go (same package, accessible).

            2. `TestStepCommitState_NilOnEvent` — call with nil onEvent callback.
               Assert no panic. Use a temp git repo.

            3. `TestStepCommitState_EmitsRunningEvent` — verify the first event
               emitted is ("commit-state", "running", "").

            For git repo setup in tests, use:
            ```go
            repoDir := t.TempDir()
            // git init
            cmd := exec.Command("git", "-C", repoDir, "init")
            if out, err := cmd.CombinedOutput(); err != nil {
                t.Fatalf("git init: %s: %v", out, err)
            }
            // configure git user for commits
            exec.Command("git", "-C", repoDir, "config", "user.email", "test@test.com").Run()
            exec.Command("git", "-C", repoDir, "config", "user.name", "Test").Run()
            // initial commit
            exec.Command("git", "-C", repoDir, "commit", "--allow-empty", "-m", "init").Run()
            ```

            ### Verification gate
            ```bash
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/ -run TestStepCommitState -count=1 -v
            ```

