pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B's worktree cannot compile because StepCommitState doesn't exist yet
          likelihood: medium
          impact: low
          mitigation: |
            Both agents are in the same wave. Agent B references StepCommitState
            which Agent A creates. In isolation, B's branch won't compile. This is
            expected — the merge resolves it. Agent B should focus on the structural
            edit (adding the call site and field) and not try to stub the function.
            Post-merge build verification will confirm the wiring is correct.
        - scenario: isSAWOwnedPath misclassifies a file, causing user code to be committed
          likelihood: low
          impact: medium
          mitigation: |
            StepCommitState reuses the existing isSAWOwnedPath function which is
            battle-tested in prepare-wave. No new classification logic is introduced.
        - scenario: Pre-commit hook rejects the auto-commit
          likelihood: medium
          impact: low
          mitigation: |
            StepCommitState is non-fatal. If gitCommitAllowMain fails (including
            hook rejection), the step returns a warning and finalize continues.
            The SAW_ALLOW_MAIN_COMMIT env var bypasses the SAW-specific pre-commit
            hook that blocks main-branch commits.
