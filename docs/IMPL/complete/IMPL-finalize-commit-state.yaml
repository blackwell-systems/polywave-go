        - id: B
          task: |
            ## What to implement

            Wire `StepCommitState` into the `FinalizeWave` pipeline in
            `pkg/engine/finalize.go`, and add a `--commit-state` flag to the CLI
            in `cmd/sawtools/finalize_wave.go`.

            ### 1. Add CommitState field to FinalizeWaveOpts

            In `pkg/engine/finalize.go`, add a new field to the `FinalizeWaveOpts`
            struct. Insert it after the `SkipMerge` field:

            Insert after this exact text:
            ```go
            	// SkipMerge: When true, skip steps 1-4 (VerifyCommits, ScanStubs, RunGates, MergeAgents)
            	// and start from verify-build. Used for manual merge escape hatch when E11
            	// blocks merge with false positive.
            	SkipMerge bool
            ```

            Add:
            ```go
