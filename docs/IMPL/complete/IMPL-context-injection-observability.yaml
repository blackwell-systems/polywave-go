    rows:
        - scenario: |-
            Agent B (wave 2) references protocol.InjectionMethod defined by Agent A (wave 1).
            If Agent A's wave did not merge cleanly, B's worktree will fail to compile.
          likelihood: low
          impact: high
          mitigation: |-
            Wave structure enforces A merges before B launches. The orchestrator validates merge
            success (finalize-wave exit 0) before proceeding to wave 2. B's worktree starts from
            the merged HEAD that includes A's types.
        - scenario: |-
            The scoutOutputSchema struct in schema.go mirrors IMPLManifest manually.
            If Agent A forgets to add InjectionMethod to scoutOutputSchema, the JSON Schema
            for Scout output validation will silently omit the new field.
          likelihood: low
          impact: low
          mitigation: |-
            Agent A's task explicitly instructs updating scoutOutputSchema. The field is
            omitempty so omitting it from the schema struct is non-fatal — it just won't
