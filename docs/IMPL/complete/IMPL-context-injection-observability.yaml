interface_contracts:
    - name: InjectionMethod
      description: |-
        Typed string alias recording how the Scout received its reference file content.
        Written by the Scout agent to the IMPL doc before completing.
      definition: |-
        type InjectionMethod string

        const (
            InjectionMethodHook           InjectionMethod = "hook"            // validate_agent_launch injected references via updatedInput
            InjectionMethodManualFallback InjectionMethod = "manual-fallback" // Scout read reference files explicitly (hook absent/failed)
            InjectionMethodUnknown        InjectionMethod = "unknown"         // Scout did not support this field (old IMPL)
        )
      location: pkg/protocol/types.go
    - name: ContextSource
      description: |-
        Typed string alias recording which prompt path the orchestrator used when launching a wave agent.
        Written by the orchestrator to each Agent entry in the IMPL doc during wave preparation.
      definition: |-
        type ContextSource string

        const (
            ContextSourcePreparedBrief      ContextSource = "prepared-brief"        // .saw-agent-brief.md used (normal path)
            ContextSourceFallbackFullContext ContextSource = "fallback-full-context" // full IMPL context passed inline (brief inaccessible)
            ContextSourceCrossRepoFull      ContextSource = "cross-repo-full"       // cross-repo agent, full context payload
        )
      location: pkg/protocol/types.go
    - name: IMPLManifest.InjectionMethod field
      description: New optional top-level field on IMPLManifest. omitempty for backwards compat.
      definition: InjectionMethod InjectionMethod `yaml:"injection_method,omitempty" json:"injection_method,omitempty"`
      location: pkg/protocol/types.go
    - name: Agent.ContextSource field
      description: New optional field on Agent struct. omitempty for backwards compat.
      definition: ContextSource ContextSource `yaml:"context_source,omitempty" json:"context_source,omitempty"`
      location: pkg/protocol/types.go
    - name: validateInjectionMethod
      description: |-
        Unexported validator for the injection_method top-level field. Warning-only, non-blocking.
        Called from validateAllEnums().
      definition: |-
        func validateInjectionMethod(m *IMPLManifest) []result.SAWError
        // Valid: "hook", "manual-fallback", "unknown", or empty (absent).
        // Absent when state is active (not COMPLETE, not empty): warning severity.
        // Absent when state is COMPLETE or empty: skip entirely.
        // Present + invalid value: error severity.
      location: pkg/protocol/schema_enum_validation.go
    - name: validateAgentContextSource
      description: |-
        Unexported validator for context_source on each Agent. Warning-only, non-blocking.
        Called from validateAllEnums().
      definition: |-
        func validateAgentContextSource(m *IMPLManifest) []result.SAWError
        // Valid: "prepared-brief", "fallback-full-context", "cross-repo-full", or empty (absent).
        // Absent on agents when state is WAVE_EXECUTING, WAVE_MERGING, or WAVE_VERIFIED: warning.
        // Absent in other states: skip.
        // Present + invalid value: error severity.
      location: pkg/protocol/schema_enum_validation.go
    - name: newSetInjectionMethodCmd
      description: |-
        New sawtools subcommand. Loads IMPL doc, sets InjectionMethod field, saves, prints JSON.
        Used by Scout agents to record how they received their context.
      definition: |-
        func newSetInjectionMethodCmd() *cobra.Command
        // CLI: sawtools set-injection-method <manifest-path> --method <value>
        // --method required: one of "hook", "manual-fallback", "unknown"
        // Output: {"manifest": "<path>", "injection_method": "<value>", "saved": true}
      location: cmd/sawtools/set_injection_method_cmd.go
