suitability_assessment: |-
    All five suitability gates pass.

    1. File decomposition: The work spans 7 files across two repos (scout-and-wave-go and scout-and-wave).
       In scout-and-wave-go: pkg/protocol/types.go, pkg/protocol/schema_enum_validation.go, pkg/protocol/schema.go
       (Agent A wave 1); cmd/sawtools/set_injection_method_cmd.go (Agent B wave 2);
       cmd/sawtools/main.go (Agent D wave 3). In scout-and-wave: agents/scout.md and saw-skill.md (Agent C wave 2).
       Four agents across 3 waves with disjoint ownership.

    2. Investigation-first: No crash or race condition to diagnose. The gap is a schema/observability gap
       with no fields existing yet, so no pre-investigation required.

    3. Interface discoverability: The new types (InjectionMethod, ContextSource) can be defined before
       implementation. All downstream agents consume them after Agent A's wave merges.

    4. Pre-implementation status: Neither injection_method nor context_source fields exist in types.go.
       Neither appears in any existing .go files. The feature is 100% TODO.

    5. Parallelization value: Build + test cycle is ~30s. Wave 2 runs Agents B and C in parallel
       (different repos, fully independent). Wave 3 is a single integration agent that wires B's
       command into main.go. Total: 4 agents across 3 waves with meaningful parallelism in wave 2.

    Wave structure:
      Wave 1: [A]              — types, validators, schema struct (scout-and-wave-go)
                   | (A complete)
      Wave 2: [B] [C]          — new CLI command (scout-and-wave-go) + prompt updates (scout-and-wave) in parallel
                   | (B complete)
      Wave 3: {D}              — type: integration, wire B into main.go (scout-and-wave-go)

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: Wave 1 ~12 min, Wave 2 ~10 min (B+C parallel), Wave 3 ~5 min
    - Merge and verification: ~8 min total across 3 waves
    Total SAW time: ~35 min

    Sequential baseline: ~4 agents x 8 min = ~32 min sequential + overhead = ~40 min
    Time savings: marginal; primary value is coordination and cross-repo audit trail.
