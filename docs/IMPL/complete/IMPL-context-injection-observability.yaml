            ```go
            // InjectionMethod records how the Scout agent received its reference file content.
            // Written by the Scout itself before completing; absent on pre-feature IMPLs.
            type InjectionMethod string

            const (
                InjectionMethodHook           InjectionMethod = "hook"            // validate_agent_launch injected references via updatedInput
                InjectionMethodManualFallback InjectionMethod = "manual-fallback" // Scout read reference files explicitly (hook absent/failed)
                InjectionMethodUnknown        InjectionMethod = "unknown"         // Scout did not support this field (old IMPL)
            )

            // ContextSource records which prompt path the orchestrator used when launching a wave agent.
            // Written by the orchestrator during wave preparation; absent on old agent entries.
            type ContextSource string

            const (
                ContextSourcePreparedBrief      ContextSource = "prepared-brief"        // .saw-agent-brief.md used (normal path)
                ContextSourceFallbackFullContext ContextSource = "fallback-full-context" // full IMPL context passed inline (brief inaccessible)
                ContextSourceCrossRepoFull      ContextSource = "cross-repo-full"       // cross-repo agent, full context payload
            )
            ```

            Add `InjectionMethod` field to the `IMPLManifest` struct (after the CompletionDate field):
            ```go
            // InjectionMethod records how the Scout agent received its reference file content.
            // Written by the Scout itself before completing; absent on pre-feature IMPLs.
            InjectionMethod InjectionMethod `yaml:"injection_method,omitempty" json:"injection_method,omitempty"`
            ```

            Add `ContextSource` field to the `Agent` struct (after the Model field):
            ```go
            // ContextSource records which prompt path the orchestrator used when launching this agent.
            // Written by the orchestrator during wave preparation; absent on old agent entries.
            ContextSource ContextSource `yaml:"context_source,omitempty" json:"context_source,omitempty"`
            ```

            ### 2. Add validators to pkg/protocol/schema_enum_validation.go

            Read schema_enum_validation.go first to understand the existing pattern.
            The file has validateAllEnums() calling 4 validators. Add two more calls:

            In validateAllEnums(), append:
            ```go
            errs = append(errs, validateInjectionMethod(m)...)
            errs = append(errs, validateAgentContextSource(m)...)
            ```

            Add these two new functions after validatePreMortemRowEnums():

            ```go
            // validateInjectionMethod checks the injection_method top-level field.
            // Valid values: "hook", "manual-fallback", "unknown", or empty (absent = conditional skip).
            // Absent when state is active (not COMPLETE, not empty, not NOT_SUITABLE): warning.
            // Absent when state is COMPLETE, NOT_SUITABLE, or empty string: skip entirely.
            // Present + invalid value: error.
            func validateInjectionMethod(m *IMPLManifest) []result.SAWError {
                var errs []result.SAWError

                validValues := map[string]bool{
                    "hook":            true,
                    "manual-fallback": true,
                    "unknown":         true,
                }

                if m.InjectionMethod == "" {
                    // Only warn when IMPL is in an active (non-terminal, non-empty) state
                    if m.State != "" && m.State != StateComplete && m.State != StateNotSuitable {
                        errs = append(errs, result.SAWError{
                            Code:     SV01InvalidEnum,
                            Severity: "warning",
                            Message:  "injection_method is absent — Scout should write this field before completing (valid: hook, manual-fallback, unknown)",
                            Field:    "injection_method",
                        })
                    }
                    return errs
                }

                if !validValues[string(m.InjectionMethod)] {
                    errs = append(errs, result.SAWError{
                        Code:     SV01InvalidEnum,
                        Severity: "error",
                        Message:  fmt.Sprintf("injection_method has invalid value %q — must be one of: hook, manual-fallback, unknown", m.InjectionMethod),
                        Field:    "injection_method",
                    })
                }

                return errs
            }

            // validateAgentContextSource checks context_source on each agent in all waves.
            // Valid values: "prepared-brief", "fallback-full-context", "cross-repo-full", or empty (absent = conditional skip).
            // Absent on any agent when state is WAVE_EXECUTING, WAVE_MERGING, or WAVE_VERIFIED: warning.
            // Absent in other states: skip.
            // Present + invalid value: error.
            func validateAgentContextSource(m *IMPLManifest) []result.SAWError {
                var errs []result.SAWError

                validValues := map[string]bool{
                    "prepared-brief":        true,
                    "fallback-full-context": true,
                    "cross-repo-full":       true,
                }

                isActiveState := m.State == StateWaveExecuting || m.State == StateWaveMerging || m.State == StateWaveVerified

                for i, w := range m.Waves {
                    for j, agent := range w.Agents {
                        if agent.ContextSource == "" {
                            if isActiveState {
                                errs = append(errs, result.SAWError{
                                    Code:     SV01InvalidEnum,
                                    Severity: "warning",
                                    Message:  fmt.Sprintf("waves[%d].agents[%d] (id=%s) context_source is absent — orchestrator should write this field when launching wave agents (valid: prepared-brief, fallback-full-context, cross-repo-full)", i, j, agent.ID),
                                    Field:    fmt.Sprintf("waves[%d].agents[%d].context_source", i, j),
                                })
                            }
                            continue
                        }
                        if !validValues[string(agent.ContextSource)] {
                            errs = append(errs, result.SAWError{
                                Code:     SV01InvalidEnum,
                                Severity: "error",
                                Message:  fmt.Sprintf("waves[%d].agents[%d] (id=%s) context_source has invalid value %q — must be one of: prepared-brief, fallback-full-context, cross-repo-full", i, j, agent.ID, agent.ContextSource),
                                Field:    fmt.Sprintf("waves[%d].agents[%d].context_source", i, j),
                            })
                        }
                    }
                }

                return errs
            }
            ```

