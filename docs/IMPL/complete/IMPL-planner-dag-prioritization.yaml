pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            ProgramIMPL.Status values are inconsistent across the codebase (e.g., "in_progress"
            vs "IN_PROGRESS" or undocumented values), causing the pending/blocked filter in
            countTransitivelyUnblocked to miss eligible IMPLs and return score=0 for everything.
          likelihood: low
          impact: medium
          mitigation: |
            Agent A should grep for all Status values used in program_types.go, test fixtures,
            and the web app before writing the filter. Document the canonical set in a comment.
            The test suite covers "pending", "blocked", "complete", "in_progress" explicitly.
        - scenario: |
            Agent C's mutation of manifest.Impls in ScoreTierIMPLs causes unexpected side effects
            if the manifest struct is shared by reference across goroutines in the web app's
            concurrent tier execution. Score writes are not protected by a mutex.
          likelihood: low
          impact: medium
          mitigation: |
            ScoreTierIMPLs is called once before launch, not during concurrent execution.
            Add a comment noting it must be called before goroutines are spawned. If the web
            app later introduces concurrent access, a mutex or copy-on-write approach is needed.
        - scenario: |
            The DependsOn field on ProgramIMPL stores IMPL slugs, but if any manifest uses
            IMPL titles or partial slugs, the reverse dep graph lookup fails silently and
            all scores return 0.
          likelihood: low
          impact: low
          mitigation: |
            Tests use exact slug strings. Agent A should add a test that verifies a slug
            mismatch (dep references a non-existent slug) returns 0 without panicking.
