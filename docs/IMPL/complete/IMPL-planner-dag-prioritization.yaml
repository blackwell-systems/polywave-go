title: Planner DAG Prioritization with Unblocking Potential Scoring
feature_slug: planner-dag-prioritization
verdict: SUITABLE
suitability_assessment: |
    File decomposition: 5 distinct files change across 3 clearly separable concerns —
    (1) the scoring algorithm itself in pkg/protocol/, (2) the PROGRAMManifest schema
    fields in pkg/protocol/program_types.go, and (3) the tier execution integration in
    pkg/engine/program_auto.go. File ownership is cleanly disjoint across 3 agents.

    Investigation status: No root cause analysis required. The gap is a missing feature
    (unblocking potential scoring), not a bug. All call sites are known.

    Interface discoverability: The UnblockingScore function signature and PriorityScore
    struct fields can be fully specified before implementation. Agent B (schema) must
    add fields; Agent A (scorer) must implement the function; Agent C (integration)
    consumes both. All cross-agent interfaces are definable upfront.

    Pre-implementation status: No prior attempt found. The existing scheduler.go has
    PrioritizeAgents for IMPL-level agent ordering (critical path depth), but nothing
    at the PROGRAM level for IMPL-to-IMPL unblocking potential scoring.

    Parallelization value: 3 agents with independent files, build+test cycle ~10-15s
    for go test ./pkg/protocol/... and go test ./pkg/engine/... separately. Clear
    speedup: agents A and B can run in parallel (wave 1), then agent C integrates
    (wave 2). Estimated 2x speedup vs sequential.

    Estimated times:
    - Scout phase: ~10 min (this doc)
    - Agent execution: ~25 min (2 wave-1 agents x 10 min parallel + 1 wave-2 agent x 10 min)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~35 min (3 agents x ~12 min avg)
    Time savings: marginal on speed, but coordination value is high — the interface
    contract between the scorer and schema must be precise to avoid round-trip fixes.
    Recommendation: Proceed. Interface precision justifies the parallel planning overhead.
