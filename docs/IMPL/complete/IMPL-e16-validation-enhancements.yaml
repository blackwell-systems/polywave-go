            - Error message format: "file_ownership[N].action has invalid value 'X' — must be new, modify, or delete"
            - Field: "file_ownership[N].action" (N is 0-indexed array position)

            ## Interface Contracts
            Function signature:
            ```go
            func ValidateActionEnums(m *IMPLManifest) []ValidationError
            ```

            Returns []ValidationError (empty slice if all actions are valid).

            ## Tests
            Write pkg/protocol/action_validator_test.go with:
            - TestValidateActionEnums_AllValid: Manifest with new/modify/delete actions -> no errors
            - TestValidateActionEnums_EmptyActionAllowed: FileOwnership entry with empty action -> no errors
            - TestValidateActionEnums_InvalidAction: action="update" -> E16_INVALID_ACTION error
            - TestValidateActionEnums_MultipleInvalid: 2+ invalid actions -> multiple errors returned

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/action_validator.go
            go test ./pkg/protocol -run TestValidateActionEnums -v
            ```

            ## Constraints
            - Do NOT modify validation.go (Wave 2 agent E will integrate)
            - Follow existing enum validation pattern from enumvalidation.go (ValidateCompletionStatuses)
            - Error codes use E16_ prefix (E16 validation enhancements)
          files:
            - pkg/protocol/action_validator.go
            - pkg/protocol/action_validator_test.go
        - id: C
          task: |
            Implement integration checklist warning in pkg/protocol/integration_checklist_validator.go.

            ## What to Implement
            Create ValidateIntegrationChecklist(m *IMPLManifest, repoPath string) []ValidationError function that warns when new handlers/components lack post_merge_checklist.

            Detection heuristic:
            1. Scan m.FileOwnership for entries with action="new"
            2. Match file paths against patterns:
               - pkg/api/*_handler.go (API handlers)
               - web/src/components/*.tsx (React components)
            3. If any matches found AND (m.PostMergeChecklist == nil OR len(m.PostMergeChecklist.Groups) == 0):
               - Emit warning (not error): code="E16_MISSING_CHECKLIST"
               - Message: "new handlers/components detected but post_merge_checklist is empty — integration steps may be needed"
               - Field: "post_merge_checklist"

            If repoPath is non-empty, verify matched files exist before warning (avoids false positives on typos).

            ## Interface Contracts
            Function signature:
            ```go
            func ValidateIntegrationChecklist(m *IMPLManifest, repoPath string) []ValidationError
            ```

            Returns []ValidationError (warnings use ValidationError struct with code prefix E16_).

            ## Tests
            Write pkg/protocol/integration_checklist_validator_test.go with:
            - TestValidateIntegrationChecklist_NoHandlers: Manifest with no API/component files -> no warnings
            - TestValidateIntegrationChecklist_HasChecklist: New handlers + non-empty checklist -> no warnings
            - TestValidateIntegrationChecklist_MissingChecklist: New pkg/api/foo_handler.go + nil checklist -> E16_MISSING_CHECKLIST warning
            - TestValidateIntegrationChecklist_ComponentsDetected: New web/src/components/Bar.tsx + empty checklist -> warning

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/integration_checklist_validator.go
            go test ./pkg/protocol -run TestValidateIntegrationChecklist -v
            ```

            ## Constraints
            - Do NOT modify validation.go (Wave 2 agent E will integrate)
            - This is a warning, not a blocker — do not prevent IMPL from proceeding
            - Pattern matching is substring-based (strings.Contains or filepath.Match)
            - repoPath parameter is optional (empty string skips file existence check)
          files:
            - pkg/protocol/integration_checklist_validator.go
            - pkg/protocol/integration_checklist_validator_test.go
        - id: D
          task: |
            Implement file existence warning in pkg/protocol/file_existence_validator.go.

            ## What to Implement
            Create ValidateFileExistence(m *IMPLManifest, repoPath string) []ValidationError function that warns when action=modify files do not exist.

            For each entry in m.FileOwnership with action="modify":
            1. If repoPath is non-empty, construct full path: filepath.Join(repoPath, fo.File)
            2. Check if file exists with os.Stat
            3. If os.IsNotExist(err), emit warning:
               - code: "E16_FILE_NOT_FOUND"
               - message: "file 'X' marked action=modify but does not exist"
               - field: "file_ownership[N]" (N is array index)

            If repoPath is empty, skip all checks (allows validation without filesystem access).

            ## Interface Contracts
            Function signature:
            ```go
            func ValidateFileExistence(m *IMPLManifest, repoPath string) []ValidationError
            ```

            Returns []ValidationError (warnings for missing files).

            ## Tests
            Write pkg/protocol/file_existence_validator_test.go with:
            - TestValidateFileExistence_EmptyRepoPath: repoPath="" -> no warnings (validation skipped)
            - TestValidateFileExistence_FileExists: action=modify + file exists -> no warnings (use t.TempDir())
            - TestValidateFileExistence_FileMissing: action=modify + file missing -> E16_FILE_NOT_FOUND warning
            - TestValidateFileExistence_ActionNewIgnored: action=new + file missing -> no warnings (new files don't need to exist)

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/file_existence_validator.go
            go test ./pkg/protocol -run TestValidateFileExistence -v
            ```

            ## Constraints
            - Do NOT modify validation.go (Wave 2 agent E will integrate)
            - Use os.Stat for file existence check (not os.Open)
            - Warning only — do not block validation
            - Handle cross-repo FileOwnership entries: if fo.Repo is non-empty and differs from repoPath basename, skip check (file is in different repo)
          files:
            - pkg/protocol/file_existence_validator.go
            - pkg/protocol/file_existence_validator_test.go
