interface_contracts:
    - name: ValidateDuplicateKeys
      description: Detects duplicate top-level YAML keys in raw manifest bytes
      definition: |
        func ValidateDuplicateKeys(rawYAML []byte) []ValidationError

        Returns validation errors for duplicate keys found in YAML.
        Uses yaml.v3 decoder to detect duplicate keys during parse.
        Error format: code="E16_DUPLICATE_KEY", message="duplicate key 'state' at lines 4, 55", field="<key-name>"
      location: pkg/protocol/duplicate_key_validator.go
    - name: ValidateActionEnums
      description: Validates file_ownership action field contains valid enum values
      definition: |
        func ValidateActionEnums(m *IMPLManifest) []ValidationError

        Valid action values: "new", "modify", "delete"
        Error format: code="E16_INVALID_ACTION", message="file_ownership[N].action has invalid value 'X' — must be new, modify, or delete", field="file_ownership[N].action"
      location: pkg/protocol/action_validator.go
    - name: ValidateIntegrationChecklist
      description: Warns when new API handlers/components lack post_merge_checklist
      definition: |
        func ValidateIntegrationChecklist(m *IMPLManifest, repoPath string) []ValidationError

        Pattern detection:
        - Scans file_ownership for action=new entries matching pkg/api/*_handler.go or web/src/components/*.tsx
        - If found AND post_merge_checklist is nil or empty, emit warning (not error)
        - Warning format: code="E16_MISSING_CHECKLIST", message="new handlers detected but post_merge_checklist is empty — integration steps may be needed", field="post_merge_checklist"
        - repoPath parameter used to verify file patterns against actual repository structure
      location: pkg/protocol/integration_checklist_validator.go
    - name: ValidateFileExistence
      description: Warns when action=modify files do not exist in repository
      definition: |
        func ValidateFileExistence(m *IMPLManifest, repoPath string) []ValidationError

        For each file_ownership entry with action=modify:
        - Check if file exists at repoPath + "/" + file path
        - If missing, emit warning (not error): code="E16_FILE_NOT_FOUND", message="file 'X' marked action=modify but does not exist", field="file_ownership[N]"
        - Skip check if repoPath is empty (allows validation without filesystem access)
      location: pkg/protocol/file_existence_validator.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Implement duplicate key detection in pkg/protocol/duplicate_key_validator.go.

            ## What to Implement
            Create ValidateDuplicateKeys(rawYAML []byte) []ValidationError function that detects duplicate top-level YAML keys.

            Use yaml.v3 Node-based parsing to detect duplicates:
            1. Decode rawYAML into yaml.Node with yaml.Unmarshal
            2. Walk the root document node's Content (top-level mapping)
            3. Track keys seen in a map[string][]int (key -> line numbers)
            4. If a key appears more than once, emit E16_DUPLICATE_KEY error with all line numbers

            Error format:
            - code: "E16_DUPLICATE_KEY"
            - message: "duplicate key 'state' at lines 4, 55"
            - field: "<key-name>"

            Caught failure case: program-web-integration IMPL had two `state:` fields (lines 4 and 55), causing YAML parser to silently overwrite. This validator must catch that before Scout completes.

            ## Interface Contracts
            Function signature:
            ```go
            func ValidateDuplicateKeys(rawYAML []byte) []ValidationError
            ```

            Returns []ValidationError (empty slice if no duplicates found).

            ## Tests
            Write pkg/protocol/duplicate_key_validator_test.go with:
            - TestValidateDuplicateKeys_NoDuplicates: Valid YAML with unique keys -> no errors
            - TestValidateDuplicateKeys_SingleDuplicate: YAML with duplicate `state:` key -> E16_DUPLICATE_KEY error
            - TestValidateDuplicateKeys_MultipleDuplicates: YAML with 3+ occurrences of same key -> error lists all line numbers
            - TestValidateDuplicateKeys_NestedNotDetected: Duplicate keys in nested objects are NOT flagged (only top-level)

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/duplicate_key_validator.go
            go test ./pkg/protocol -run TestValidateDuplicateKeys -v
            ```

            ## Constraints
            - Do NOT modify validation.go (Wave 2 agent E will integrate)
            - Use yaml.v3 Node API, not reflection-based parsing
            - Only detect top-level duplicates (manifest root keys)
            - Line numbers are 1-indexed (yaml.Node.Line is 1-based)
          files:
            - pkg/protocol/duplicate_key_validator.go
            - pkg/protocol/duplicate_key_validator_test.go
        - id: B
