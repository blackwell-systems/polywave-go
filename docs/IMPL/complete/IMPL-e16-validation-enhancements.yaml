pre_mortem:
    overall_risk: low
    rows:
        - scenario: Wave 1 agents define incompatible ValidationError formats (different Code prefixes)
          likelihood: low
          impact: medium
          mitigation: Interface contracts specify exact error code values (E16_DUPLICATE_KEY, E16_INVALID_ACTION, etc.). Agent E's integration tests will catch format mismatches.
        - scenario: ValidateDuplicateKeys fails to detect nested duplicates (expected behavior, but unclear from spec)
          likelihood: medium
          impact: low
          mitigation: Agent A's task explicitly states "only detect top-level duplicates" and test suite verifies nested keys are NOT flagged
        - scenario: Integration checklist validator has false positives (warns on non-handler files)
          likelihood: low
          impact: low
          mitigation: Pattern matching is conservative (exact patterns pkg/api/*_handler.go, web/src/components/*.tsx). Agent C's tests verify non-matching files don't trigger warnings.
        - scenario: File existence validator breaks on cross-repo manifests (checks files in wrong repo)
          likelihood: low
          impact: medium
          mitigation: Agent D's task includes constraint to skip check when fo.Repo differs from repoPath basename. Test suite includes cross-repo scenario.
