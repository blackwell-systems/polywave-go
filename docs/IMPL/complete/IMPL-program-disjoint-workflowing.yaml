interface_contracts:
    - name: ProgramWorktreeInfo
      description: |-
        Per-IMPL worktree created for a program tier. Branch naming follows
        saw/program/{program-slug}/tier{N}-impl-{impl-slug}.
      definition: |
        type ProgramWorktreeInfo struct {
            ImplSlug  string `json:"impl_slug"`
            Path      string `json:"path"`
            Branch    string `json:"branch"`
        }
      location: pkg/protocol/program_worktree.go
    - name: CreateProgramWorktreesResult
      description: Result returned by CreateProgramWorktrees after creating all IMPL worktrees for a tier.
      definition: |
        type CreateProgramWorktreesResult struct {
            TierNumber int                    `json:"tier_number"`
            Worktrees  []ProgramWorktreeInfo  `json:"worktrees"`
        }
      location: pkg/protocol/program_worktree.go
    - name: CreateProgramWorktrees
      description: |-
        Creates git worktrees for all IMPLs in a program tier. Branch names follow
        saw/program/{program-slug}/tier{N}-impl-{impl-slug}. Worktree paths follow
        {repoDir}/.claude/worktrees/saw/program/{program-slug}/tier{N}-impl-{impl-slug}.
        Returns an error if any worktree creation fails (no partial state).
      definition: |
        func CreateProgramWorktrees(
            programManifestPath string,
            tierNumber int,
            repoDir string,
        ) (*CreateProgramWorktreesResult, error)
      location: pkg/protocol/program_worktree.go
    - name: ProgramBranchName
      description: |-
        Returns the slug-scoped branch name for a program-tier IMPL.
        Format: saw/program/{program-slug}/tier{N}-impl-{impl-slug}
      definition: |
        func ProgramBranchName(programSlug string, tierNumber int, implSlug string) string
      location: pkg/protocol/program_worktree.go
    - name: ProgramWorktreeDir
      description: |-
        Returns the worktree directory path for a program-tier IMPL.
        Format: {repoDir}/.claude/worktrees/saw/program/{program-slug}/tier{N}-impl-{impl-slug}
      definition: |
        func ProgramWorktreeDir(repoDir, programSlug string, tierNumber int, implSlug string) string
      location: pkg/protocol/program_worktree.go
    - name: FinalizeTierResult
      description: |-
        Result of finalize-tier: per-IMPL merge outcomes plus tier gate result.
        Success is true only if all IMPL merges succeeded and tier gate passed.
      definition: |
        type FinalizeTierResult struct {
            TierNumber      int                          `json:"tier_number"`
            ImplMergeResults map[string]*MergeAgentsResult `json:"impl_merge_results"` // impl_slug -> result
            TierGateResult  *TierGateResult              `json:"tier_gate_result"`
            Success         bool                         `json:"success"`
            Errors          []string                     `json:"errors,omitempty"`
        }
      location: pkg/protocol/program_tier_finalize.go
    - name: FinalizeTier
      description: |-
        Finalizes a program tier: merges all IMPL branches to main in sequence,
        then runs the tier gate. Analogous to finalize-wave but at the program tier level.
        Returns structured JSON with per-IMPL merge results and tier gate result.
        Stops on first merge failure (does not run tier gate if any merge fails).
      definition: |
        func FinalizeTier(
            programManifestPath string,
            tierNumber int,
            repoDir string,
        ) (*FinalizeTierResult, error)
      location: pkg/protocol/program_tier_finalize.go
    - name: CheckProgramConflictsResult
      description: |-
        Result of check-program-conflicts: conflict details per file plus a
        BLOCKED boolean for callers that need a simple pass/fail signal.
      definition: |
        // Note: CheckIMPLConflicts already returns *ConflictReport (program_conflict.go).
        // check-program-conflicts CLI wraps it with tier-scoped slug extraction from
        // the PROGRAM manifest and emits exit code 1 if conflicts found.
        // No new Go type needed — the CLI command reuses protocol.ConflictReport.
      location: cmd/saw/check_program_conflicts_cmd.go
