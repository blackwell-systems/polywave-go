            ## What to implement

            ### pkg/protocol/program_tier_finalize.go

            Add `FinalizeTierResult` struct and `FinalizeTier` function.

            ```go
            type FinalizeTierResult struct {
                TierNumber       int                           `json:"tier_number"`
                ImplMergeResults map[string]*MergeAgentsResult `json:"impl_merge_results"` // impl_slug -> result
                TierGateResult   *TierGateResult               `json:"tier_gate_result"`
                Success          bool                          `json:"success"`
                Errors           []string                      `json:"errors,omitempty"`
            }
            ```

            `FinalizeTier(programManifestPath string, tierNumber int, repoDir string) (*FinalizeTierResult, error)`:

            Implementation steps:
            1. Parse PROGRAM manifest: `protocol.ParseProgramManifest(programManifestPath)`
            2. Find the tier by number
            3. For each impl slug in tier.Impls (in order):
               a. Compute branch: `ProgramBranchName(manifest.ProgramSlug, tierNumber, implSlug)`
               b. Check if branch exists (git.BranchExists); if absent, log and skip (idempotent)
               c. Merge the IMPL branch to main:
                  - Use existing `MergeAgents` pattern from pkg/protocol/merge_agents.go
                  - Specifically: `git merge --no-ff <branch>` in repoDir
                  - If merge fails: stop immediately, set result.Success=false, return result with error
               d. Record merge result in ImplMergeResults[implSlug]
            4. After all merges succeed, run tier gate: `RunTierGate(manifest, tierNumber, repoDir)`
            5. Set result.Success = true only if all merges succeeded AND tier gate passed
            6. Return result

            Look at pkg/protocol/merge_agents.go for the merge pattern to reuse.
            Look at pkg/protocol/program_tier_gate.go for RunTierGate signature (already exists).

            Note: MergeAgents takes (manifestPath, waveNum, repoDir). FinalizeTier works at the
            program level, so it calls git operations directly rather than MergeAgents (which is
            wave-scoped). Use internal/git package functions directly for the merge operation.
            Specifically look at how merge_agents.go calls git.MergeNoFF (internal/git/commands.go:117).
            Note: there is no git.Merge function — use git.MergeNoFF or git.MergeNoFFWithOwnership directly.

