suitability_assessment: |
    All five suitability checks pass cleanly.

    1. File decomposition: Work spans 5+ distinct files across protocol/, cmd/saw/, and
       protocol docs. The four deliverables (check-program-conflicts CLI integration,
       program worktree lifecycle, finalize-tier command, and protocol docs) each own
       disjoint files. Ownership can be cleanly split into 3 parallel agents.

    2. No investigation-first items: All behaviors are well-specified by analogy to
       existing wave-level equivalents (check-conflicts, prepare-wave, finalize-wave).
       No unknown root causes.

    3. Interface discoverability: The cross-agent interfaces are all derivable from
       existing patterns. ProgramWorktreeInfo, FinalizeTierResult, and
       CheckProgramConflictsResult can all be specified before implementation starts.

    4. Pre-implementation status check:
       - check-program-conflicts (CLI): `check-impl-conflicts` already exists in
         cmd/saw/create_program_cmd.go with CheckIMPLConflicts in pkg/protocol/program_conflict.go.
         The feature asks for a NEW `check-program-conflicts` command that takes a PROGRAM
         manifest (not raw impl slugs) and checks conflicts for a specified tier. This is
         a new command wrapping the existing CheckIMPLConflicts function.
       - Program worktree isolation: No existing worktree lifecycle at program level.
         CreateWorktrees operates at the IMPL/wave level. New pkg/protocol/program_worktree.go
         needed with program-scoped branch naming (saw/program/{slug}/tier{N}-impl-{implSlug}).
       - finalize-tier command: The existing `tier-gate` command only checks completion + runs
         gates. A new `finalize-tier` command (analogous to finalize-wave) that sequences
         merge, verify, and cleanup across all IMPL branches in a tier is needed.
       - Protocol docs (P1+): protocol/program-invariants.md currently defines P1-P4. The
         feature requests adding a P1+ constraint covering file-level disjointness (not just
         dependency-graph independence). This is additive documentation.

    5. Parallelization value: Go build+test cycle is ~30s+. Agents A and B both own 2-3
       implementation files each. Agent C owns documentation only. Agents A and B can run
       fully in parallel (completely independent file sets). Clear speedup.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~3 agents, avg 15 min each with 2 parallel = ~20 min wall time
    - Merge and verification: ~5 min
    Total SAW time: ~35 min

    Sequential baseline: ~45 min (3 x 15 min)
    Time savings: ~10 min (22% faster)

    Recommendation: Clear speedup for A+B parallelism. Proceed as SUITABLE.
