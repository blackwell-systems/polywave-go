completion_date: "2026-03-26"
title: Consolidate divergent GateResult types — eliminate pkg/config.GateResult, migrate to pkg/protocol.GateResult
feature_slug: gate-result-consolidation
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    Scout performed an exhaustive audit of both GateResult types before writing this IMPL doc.

    1. File decomposition: Only 2 files change — pkg/config/state.go and pkg/config/state_test.go.
       Both files are in the same package and must be modified by the same agent. There is no
       decomposition into disjoint file sets; a single agent handles all changes.

    2. Investigation-first: No investigation required. The type definitions, their consumers,
       and the migration path are fully understood from static analysis.

    3. Interface discoverability: The change is self-contained. config.GateResult is only
       referenced inside pkg/config, and pkg/config already imports pkg/protocol, so no
       import cycle arises.

    4. Pre-implementation status:
       - config.GateResult (4-field simplified type): EXISTS, must be eliminated.
       - protocol.GateResult (10-field canonical type): EXISTS, is the migration target.
       - WaveState.GateResults field uses config.GateResult but is NEVER populated by
         GetWaveState() — confirmed by reading state.go lines 91-101. This makes the
         migration low-risk: no data loss is possible on an unpopulated field.

    5. Parallelization value: Only 2 files change in a single package. A single agent handles
       both. SAW overhead exceeds the ~5-minute sequential implementation time. However,
       this IMPL doc provides value as an audit trail documenting the migration rationale,
       JSON compatibility analysis, and verification of the "never populated" finding.

    Caveats:
    - Single-agent work: parallelization savings are zero. Value is in audit trail and
      verification, not speed.
    - WaveState.GateResults is never populated by GetWaveState(); it is dead state. After
      migration the field remains dead but carries the correct type.
    - JSON field name change (gate_type -> type): Only affects WaveState serialization. Since
      WaveState is computed on demand from the manifest and is never written to disk, there is
      no .saw-state/ migration needed. The gate-cache.json file uses "gate_type" but that
      belongs to gatecache.CachedResult (pkg/gatecache), a completely separate type
      unaffected by this change.
    - config.GateResult is not referenced outside pkg/config (confirmed: grep -r
      "config.GateResult" returns zero Go source matches). The change scope is minimal.

    Dependency graph (from sawtools analyze-deps . --files "pkg/config/state.go" --format yaml):
      nodes:
        - file: pkg/config/state.go
          depends_on: []
          depended_by: []
          wave_candidate: 0
      waves:
        1: [pkg/config/state.go]
    pkg/config/state.go has zero depended_by entries. No cascade candidates. config.GateResult
    is only used as a bare name within pkg/config; no external package references it.

    Estimated times:
    - Scout phase: ~15 min (exhaustive audit required by mission spec)
    - Agent execution: ~5 min (single agent, 2 files)
    - Merge and verification: ~2 min
    Total SAW time: ~22 min
    Sequential baseline: ~5 min
    Time savings: -17 min (SAW is slower for this task)
    Recommendation: Marginal gains. IMPL doc value is audit trail and verification.
    Implement via a single SAW agent or sequentially.
