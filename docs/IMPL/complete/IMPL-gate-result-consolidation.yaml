interface_contracts:
    - name: WaveState.GateResults field type
      description: Field type change from local config.GateResult to protocol.GateResult
      definition: |
        // Before (pkg/config/state.go):
        GateResults map[string]GateResult `json:"gate_results,omitempty"`

        // After:
        GateResults map[string]protocol.GateResult `json:"gate_results,omitempty"`

        // JSON note: the field name "gate_results" is unchanged. The change is only the
        // value type. Individual entries now use JSON tag "type" (not "gate_type")
        // for the gate type field, but since WaveState is never serialized to disk
        // this has no backward compatibility impact.
      location: pkg/config/state.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            Two structurally different but conceptually identical GateResult types exist:

            - pkg/protocol/gates.go — canonical, 10-field type with JSON tag "type" for gate type
            - pkg/config/state.go — simplified, 4-field type with JSON tag "gate_type" for gate type

            Your task is to eliminate config.GateResult and replace it with protocol.GateResult.

            ## Exhaustive audit findings (verified before writing this brief)

            1. config.GateResult is defined at pkg/config/state.go lines 24-30.
            2. It is only used at state.go line 19 as the value type of WaveState.GateResults.
            3. No external package references config.GateResult — grep -r "config\.GateResult"
               returns zero results. The type is only used as a bare name within pkg/config.
            4. WaveState.GateResults is NEVER populated by GetWaveState() (lines 91-101 of
               state.go). The field exists on the struct but is always nil/empty at runtime.
               No data loss risk.
            5. pkg/config already imports pkg/protocol at state.go line 8. No import change needed.
            6. The JSON tag change (gate_type -> type) affects only WaveState JSON serialization.
               WaveState is never written to disk — it is computed on demand. No state file
               migration is needed.
            7. The .saw-state/gate-cache.json file uses "gate_type" but that is
               gatecache.CachedResult in pkg/gatecache — completely unrelated to this change.

            ## Changes to make in pkg/config/state.go

            Step 1: Delete the entire GateResult type definition (lines 24-30):

              // GateResult is a cached gate execution outcome.
              type GateResult struct {
                  GateType string `json:"gate_type"`
                  Command  string `json:"command"`
                  Passed   bool   `json:"passed"`
                  ExitCode int    `json:"exit_code"`
              }

            Step 2: In the WaveState struct definition, change the GateResults field type
            from the local GateResult to protocol.GateResult:

              Before: GateResults map[string]GateResult         `json:"gate_results,omitempty"`
              After:  GateResults map[string]protocol.GateResult `json:"gate_results,omitempty"`

            Step 3: Verify the import block. pkg/protocol is already imported on line 8.
            The pkg/result import is still needed for result.Result, result.NewFailure,
            result.NewSuccess, and result.SAWError return types — do NOT remove it.

            ## Changes to make in pkg/config/state_test.go

            Read state_test.go in full and verify it contains no references to GateResult,
            GateType, or a WaveState literal with GateResults set. The existing tests only
            verify agent classification (completed/failed/pending), IsComplete, and WaveNum.

            Expected outcome: no test file changes required. Record "verified unchanged" in
            your completion report.

            ## Verification gates

            Run these in order:

            1. go build ./...
               Must pass with zero errors.

            2. go vet ./...
               Must pass with zero errors.

            3. go test ./pkg/config/... -v
               Must pass. All existing TestGetWaveState_* and TestGetAllWaveStates tests pass.

            4. go test ./... -timeout 120s
               Full suite must pass.

            5. grep -r "config\.GateResult" . --include="*.go"
               Must return zero results (no remaining references).

            6. grep -n "protocol\.GateResult" pkg/config/state.go
               Must return at least one match confirming the migration.

            ## Definition of done

            - config.GateResult struct is deleted from pkg/config/state.go
            - WaveState.GateResults field type is map[string]protocol.GateResult
            - All 6 verification gates pass
            - Completion report status: complete
          files:
            - pkg/config/state.go
            - pkg/config/state_test.go
          context_source: prepared-brief
