pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Circular import: pkg/orchestrator cannot import pkg/engine (where
            JournalIntegration lives). Agent A attempts to use NewJournalIntegration
            and hits a compile error.
          likelihood: high
          impact: medium
          mitigation: |
            Agent A task explicitly addresses this: inline the journal calls using
            pkg/journal directly (which orchestrator can import) rather than going
            through JournalIntegration in pkg/engine. The inline pattern is provided
            in the task. Agent A must check imports before writing code.
        - scenario: |
            AgentBriefInfo struct has multiple construction sites in prepare.go;
            Agent C misses one, causing a compile error on missing fields.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C task includes explicit grep instruction to find all construction
            sites before editing. All occurrences must be updated.
        - scenario: |
            Journal sync returns success with NewToolUses=0 on first launch.
            GenerateContext is called unnecessarily and returns empty string,
            causing an empty context.md to be written.
          likelihood: medium
          impact: low
          mitigation: |
            The guard sr.NewToolUses > 0 prevents calling GenerateContext when
            there are no tool uses. Agent tasks specify this guard explicitly.
        - scenario: |
            The 30s periodic sync goroutine in orchestrator.go leaks if the
            agent panics or context cancellation races with goroutine startup.
          likelihood: low
          impact: low
          mitigation: |
            The goroutine uses syncCtx derived from ctx via context.WithCancel.
            The defer cancelSync() ensures cleanup on all exit paths.
        - scenario: |
            Agent D commits to scout-and-wave-go instead of scout-and-wave,
            putting saw-skill.md in the wrong repo.
          likelihood: low
          impact: low
          mitigation: |
            Agent D task specifies the absolute path to saw-skill.md and which
            repo it belongs to. Agent must verify CWD before committing.
