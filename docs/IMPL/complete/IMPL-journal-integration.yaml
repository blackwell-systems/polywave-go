interface_contracts:
    - name: JournalIntegration.PrepareAgentContext
      description: |
        Existing method on runner.go's JournalIntegration struct.
        Creates observer, calls Sync(), calls GenerateContext() if NewToolUses > 0,
        prepends context markdown to original prompt. Non-fatal: returns original
        prompt on any error. Already fully implemented; needs a caller in the
        active code paths.
      definition: |
        func (ji *JournalIntegration) PrepareAgentContext(
            waveNum int,
            agentID string,
            originalPrompt string,
        ) (enrichedPrompt string, observer *journal.JournalObserver, err error)
      location: pkg/engine/runner.go
    - name: JournalIntegration.StartPeriodicSync
      description: |
        Existing method on runner.go's JournalIntegration struct.
        Launches a 30s ticker goroutine that calls observer.Sync() on each tick.
        Returns a cancel func. Safe to call in orchestrator.go: the CLI backend
        runs synchronously (ExecuteStreamingWithTools blocks until agent completes),
        so the goroutine is started before the call and cancelled via defer after
        it returns. Already fully implemented; needs a caller.
      definition: |
        func (ji *JournalIntegration) StartPeriodicSync(
            ctx context.Context,
            observer *journal.JournalObserver,
        ) func()
      location: pkg/engine/runner.go
    - name: PrepareAgentResult (extended)
      description: |
        Add two new exported fields to the PrepareAgentResult struct in
        prepare_agent.go and AgentBriefInfo struct in prepare.go. These fields
        surface journal context availability to the LLM orchestrator CLI path
        after prepare-agent runs, enabling step 6 of saw-skill.md to
        conditionally prepend context.
      definition: |
        // In PrepareAgentResult (prepare_agent.go):
        JournalContextAvailable bool   `json:"journal_context_available"`
        JournalContextFile      string `json:"journal_context_file"`

        // In AgentBriefInfo (prepare.go):
        JournalContextAvailable bool   `json:"journal_context_available,omitempty"`
        JournalContextFile      string `json:"journal_context_file,omitempty"`
      location: pkg/engine/prepare_agent.go
