            **Repo:** scout-and-wave-go at /Users/dayna.blackwell/code/scout-and-wave-go
            **File to modify:** pkg/orchestrator/orchestrator.go

            ## What to implement

            In the `launchAgent` function in `pkg/orchestrator/orchestrator.go`, after the
            retry prefix is applied to `agentSpec.Task` (after the `retryPrefixMap.Load`
            block, around line 841), wire journal context recovery and periodic sync.

            **IMPORTANT — circular import check first:** Read the import block of
            orchestrator.go. Confirm whether `pkg/journal` is already imported. The import
            path is `github.com/blackwell-systems/scout-and-wave-go/pkg/journal`. Do NOT
            import `pkg/engine` from orchestrator.go — that would create a circular import.

            If `pkg/journal` is not yet imported, add it. Also verify `time` is imported.

            **The wiring to add in `launchAgent`, after retry prefix injection and before
            `runner.ExecuteStreamingWithTools(...)`:**

            ```go
            // Journal context recovery: sync and prepend if prior session has entries.
            // Non-fatal: any error is logged and execution continues with original prompt.
            fullAgentID := fmt.Sprintf("wave%d-agent-%s", waveNum, agentSpec.ID)
            if obsRes := journal.NewObserver(o.repoPath, fullAgentID); obsRes.IsSuccess() {
                observer := obsRes.GetData()
                if syncRes := observer.Sync(); syncRes.IsSuccess() {
                    sr := syncRes.GetData()
                    if sr != nil && sr.NewToolUses > 0 {
                        if ctxRes := observer.GenerateContext(); ctxRes.IsSuccess() {
                            agentSpec.Task = ctxRes.GetData() + "\n\n---\n\n" + agentSpec.Task
                            o.log().Info("orchestrator: prepended journal context",
                                "agent", agentSpec.ID, "tool_uses", sr.NewToolUses)
                        }
                    }
                }
                // Periodic sync: 30s goroutine tied to agent execution context.
                syncCtx, cancelSync := context.WithCancel(ctx)
                defer cancelSync()
                go func() {
                    ticker := time.NewTicker(30 * time.Second)
                    defer ticker.Stop()
                    for {
                        select {
                        case <-ticker.C:
                            observer.Sync() //nolint:errcheck // non-fatal periodic sync
                        case <-syncCtx.Done():
                            return
                        }
                    }
                }()
            }
            ```

