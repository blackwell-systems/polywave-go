            In the struct field extraction loop inside `extractExports`, detect
            `json:"..."` tags on fields:

            ```go
            // Inside the struct field extraction (ast.StructType loop):
            hasJSON := false
            if field.Tag != nil {
                tag := reflect.StructTag(strings.Trim(field.Tag.Value, "\`"))
                if tag.Get("json") != "" {
                    hasJSON = true
                }
            }
            exports = append(exports, exportInfo{Name: name.Name, Kind: "field", HasJSON: hasJSON})
            ```

            Import `reflect` and `strings` (strings may already be imported).

