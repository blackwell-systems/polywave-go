suitability_assessment: |-
    Five improvements to sawtools, all parallelizable with disjoint file ownership.

    File decomposition: 5 distinct work areas across pkg/protocol/ (integration
    heuristics, merge_agents, types) and cmd/saw/ (new set-impl-state command,
    finalize_wave, validate_integration, run_scout_cmd). Each area touches
    non-overlapping files.

    Interface discoverability: All cross-agent interfaces can be defined upfront:
    - SetImplState(manifestPath, state string, commit bool) in pkg/protocol/
    - JSON struct heuristic added to classifySeverity() — no new types needed
    - Solo agent detection via os.Stat of worktree directory — no new types
    - Idempotent merge: already handled by existing MergeAgents E9 idempotency
      path; finalize_wave.go just needs the VerifyCommits skip logic adjusted
    - IntegrationGapSeverityThreshold added to IMPLManifest types.go

    Pre-implementation status:
    - Item 1 (set-impl-state): TODO — no such command exists yet
    - Item 2 (solo agent finalize-wave): TODO — finalize_wave.go Step 1 calls
      VerifyCommits which will fail if 0 worktrees; no solo bypass exists
    - Item 3 (idempotent merge re-run): PARTIAL — E9 idempotency exists via
      merge-log, but only if branches still exist; the "branch deleted after
      cleanup" path still errors on the VerifyCommits step, not the merge step
    - Item 4 (JSON struct field heuristic): TODO — classifySeverity() in
      integration.go has no json-tag awareness; extractExports() always emits
      struct fields regardless of tags
    - Item 5 (finalize-impl audit): PARTIAL — run_scout_cmd.go already calls
      protocol.FinalizeIMPL directly; finalize_impl_cmd.go is the standalone
      command. No duplicate validation logic found outside run-scout. The
      audit is primarily confirming and documenting the single-path invariant
      and adding a test to prevent regression.

    Parallelization value: HIGH. Go build + test cycle is ~30s. Each agent
    touches 2-4 files with non-trivial logic. Wave 1 has 3 independent agents.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~25 min (3 wave-1 agents parallel + 1 wave-2 agent)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min
    Sequential baseline: ~70 min (4 x ~17 min avg)
    Time savings: ~30 min (43% faster)
