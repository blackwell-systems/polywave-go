            - `TestIsSoloWave_OneExists` — create one worktree dir -> false
            - `TestAllBranchesAbsent_NoBranches` — git repo with no saw/ branches -> true
            - `TestAllBranchesAbsent_OneBranchExists` — create one branch -> false

