            Agent A's test TestSetImplState_AllowedTransitionsComplete verifies COMPLETE
            has no allowed targets. Task description says "must include all existing
            ProtocolState constants". Cross-check against the constants block in types.go.
        - scenario: |-
            finalize_wave.go already uses goto postMerge for integration waves; adding
            two more goto statements from different locations causes a Go compile error
            if variable declarations appear between the jump points and the label.
          likelihood: low
          impact: high
          mitigation: |-
            Agent E must ensure no new variable declarations are introduced between the
            new goto calls and the postMerge label. The existing integration-wave goto
            serves as a template. Go compiler catches this at build time immediately.
