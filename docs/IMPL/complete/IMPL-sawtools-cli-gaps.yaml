            Agent C adds IsSoloWave/AllBranchesAbsent using an unexported name;
            Agent E calls them from cmd/saw/finalize_wave.go and gets a compile error.
          likelihood: medium
          impact: high
          mitigation: |-
            Interface contracts specify exported names (IsSoloWave, AllBranchesAbsent).
            Agent C's task says "must be exported (uppercase)". Wave 2 go build catches this.
        - scenario: |-
            git.BranchExists doesn't exist in internal/git/ and Agent C creates it,
            but the function signature differs from what Agent E expects.
