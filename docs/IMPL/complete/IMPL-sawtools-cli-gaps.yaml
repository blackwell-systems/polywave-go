interface_contracts:
    - name: SetImplState
      description: |-
        Atomic read-modify-write on an IMPL manifest's state field.
        Validates the transition is allowed by the protocol state machine.
        Optionally commits the change to git.
      definition: |-
        func SetImplState(manifestPath string, newState ProtocolState, opts SetImplStateOpts) (*SetImplStateResult, error)

        type SetImplStateOpts struct {
            Commit    bool
            CommitMsg string
        }

        type SetImplStateResult struct {
            PreviousState ProtocolState `json:"previous_state"`
            NewState      ProtocolState `json:"new_state"`
            Committed     bool          `json:"committed"`
            CommitSHA     string        `json:"commit_sha,omitempty"`
        }
      location: pkg/protocol/state_transition.go
    - name: IsSoloWave
      description: Returns true if none of the expected worktree directories exist for the wave
      definition: func IsSoloWave(manifest *IMPLManifest, waveNum int, repoDir string) bool
      location: pkg/protocol/merge_agents.go
    - name: AllBranchesAbsent
      description: Returns true when every agent branch for a wave is absent from git (both slug-scoped and legacy names)
      definition: func AllBranchesAbsent(manifest *IMPLManifest, waveNum int, repoDir string) bool
      location: pkg/protocol/merge_agents.go
    - name: classifySeverity_updated
      description: Updated package-private classifySeverity with json-tag awareness and threshold parameter
      definition: func classifySeverity(exportName string, category string, filePath string, threshold string) string
      location: pkg/protocol/integration.go
    - name: IntegrationGapSeverityThreshold
      description: New IMPLManifest field for configuring severity threshold in ValidateIntegration
      definition: IntegrationGapSeverityThreshold string `yaml:"integration_gap_severity_threshold,omitempty" json:"integration_gap_severity_threshold,omitempty"`
      location: pkg/protocol/types.go
