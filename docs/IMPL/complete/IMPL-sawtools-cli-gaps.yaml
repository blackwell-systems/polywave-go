            ## Feature: finalize_wave.go — solo wave bypass + idempotent re-run

            ### What to implement

            Three targeted changes to cmd/saw/finalize_wave.go, cmd/saw/validate_integration.go, and pkg/protocol/integration.go.

            **IMPORTANT: Interface contract change from Wave 1**
            Agent C renamed IsSoloWave to WorktreesAbsent because helpers.go already declares IsSoloWave(wave *Wave) bool with a different signature. Use protocol.WorktreesAbsent everywhere this brief previously said IsSoloWave.

            **Part 1: Solo wave bypass in finalize_wave.go**

            In finalize_wave.go, BEFORE Step 1 (VerifyCommits), add:

            ```go
            // Solo wave: if no worktrees were created, skip VerifyCommits and MergeAgents.
            isSolo := false
            for _, repoPath := range repos {
                if protocol.WorktreesAbsent(manifest, waveNum, repoPath) {
                    isSolo = true
                    break
                }
            }
            if isSolo {
                fmt.Fprintf(os.Stderr, "finalize-wave: solo wave detected (no worktrees), skipping VerifyCommits and MergeAgents\n")
                for repoKey := range repos {
                    result.MergeResult[repoKey] = &protocol.MergeAgentsResult{
                        Wave: waveNum, Success: true,
                    }
                }
                goto postMerge
            }
            ```

            (goto postMerge already exists for integration waves — this reuses it.)

            **Part 2: Idempotent re-run when all branches deleted**

            In finalize_wave.go, AFTER the solo wave check (still before Step 1), add:

            ```go
            // If all agent branches are absent (wave already merged and cleaned up),
            // skip VerifyCommits and MergeAgents entirely.
            allGone := false
            for _, repoPath := range repos {
                if protocol.AllBranchesAbsent(manifest, waveNum, repoPath) {
                    allGone = true
                    break
                }
            }
            if allGone {
                fmt.Fprintf(os.Stderr,
                    "finalize-wave: all agent branches absent (already merged+cleaned), skipping to verify-build\n")
