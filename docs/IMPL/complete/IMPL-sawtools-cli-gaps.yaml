          task: |-
            ## Feature: merge_agents.go — solo wave support + AllBranchesAbsent helper

            ### What to implement

            Two related changes to `pkg/protocol/merge_agents.go` that make
            `MergeAgents` behave correctly for solo-agent waves and fully-merged waves.

            **Part 1: IsSoloWave helper**

            A "solo wave" is one where no worktree directories exist on disk for any
            agent. This happens when the human ran the wave without creating worktrees
            (e.g., solo human developer working directly on main). Currently,
            `VerifyCommits` fails because it looks for branches that don't exist.

            Add an exported helper to `merge_agents.go`:

            ```go
            // IsSoloWave returns true if none of the expected worktree directories
            // for the given wave exist on disk. Uses WorktreeDir() to compute paths.
            // repoDir must be the absolute repo root.
            func IsSoloWave(manifest *IMPLManifest, waveNum int, repoDir string) bool {
                // Find the target wave
                var targetWave *Wave
                for i := range manifest.Waves {
                    if manifest.Waves[i].Number == waveNum {
                        targetWave = &manifest.Waves[i]
                        break
                    }
                }
                if targetWave == nil {
                    return false
                }
                for _, agent := range targetWave.Agents {
                    path := WorktreeDir(repoDir, manifest.FeatureSlug, waveNum, agent.ID)
                    if _, err := os.Stat(path); err == nil {
                        return false // at least one worktree exists
                    }
                }
                return true
            }
            ```

            **Part 2: AllBranchesAbsent helper**

            Add an exported helper for detecting the "already merged and cleaned up" path:

            ```go
            // AllBranchesAbsent returns true when every agent branch for the wave
            // is absent from the repository — both slug-scoped and legacy names.
            // Used by finalize-wave to detect the idempotent re-run path.
            func AllBranchesAbsent(manifest *IMPLManifest, waveNum int, repoDir string) bool {
                var targetWave *Wave
                for i := range manifest.Waves {
                    if manifest.Waves[i].Number == waveNum {
                        targetWave = &manifest.Waves[i]
                        break
                    }
                }
                if targetWave == nil {
                    return true // no wave = no branches
                }
                for _, agent := range targetWave.Agents {
                    slugBranch := BranchName(manifest.FeatureSlug, waveNum, agent.ID)
                    legacyBranch := LegacyBranchName(waveNum, agent.ID)
                    if git.BranchExists(repoDir, slugBranch) || git.BranchExists(repoDir, legacyBranch) {
                        return false
                    }
                }
                return true
            }
            ```

            Check whether `git.BranchExists` already exists in `internal/git/`; if not,
            implement it in a new file `internal/git/branch_exists.go` using
            `git branch --list <name>` and checking for non-empty output.

            **Part 3: Add idempotency comment to MergeAgents**

            Add a comment to `MergeAgents` documenting the branch-absent path:

            ```go
            // NOTE: MergeAgents handles idempotency for the merge step (E9).
            // For the case where all branches have been deleted post-cleanup,
            // the finalize_wave.go caller must skip VerifyCommits and MergeAgents
            // when it detects that all expected branches are absent from the repo
            // (see AllBranchesAbsent check in finalize_wave.go).
            ```

            ### Tests

            Create `pkg/protocol/solo_wave_test.go`:

