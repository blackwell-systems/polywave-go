            ## Feature: types.go — IMPLManifest new field + state machine helpers

            ### What to implement

            **1. Add `IntegrationGapSeverityThreshold` to `IMPLManifest`**

            In `pkg/protocol/types.go`, add a new field to `IMPLManifest`:

            ```go
            // IntegrationGapSeverityThreshold configures the minimum severity level that
            // ValidateIntegration treats as a gap requiring action.
            // Valid values: "error", "warning", "info". Defaults to "warning" when empty.
            IntegrationGapSeverityThreshold string `yaml:"integration_gap_severity_threshold,omitempty" json:"integration_gap_severity_threshold,omitempty"`
            ```

            Place it after the `KnownIssues` field and before `CriticReport`.

            **2. Create `pkg/protocol/state_transition.go` — new file**

            Implement the following in a new file:

            ```go
            package protocol

            // SetImplStateOpts contains options for the SetImplState operation.
            type SetImplStateOpts struct {
                Commit    bool   // if true, git commit after state write
                CommitMsg string // optional commit message; default generated if empty
            }

            // SetImplStateResult contains the outcome of a SetImplState call.
            type SetImplStateResult struct {
                PreviousState ProtocolState `json:"previous_state"`
                NewState      ProtocolState `json:"new_state"`
                Committed     bool          `json:"committed"`
                CommitSHA     string        `json:"commit_sha,omitempty"`
            }

            // allowedTransitions maps each state to the set of valid next states.
            var allowedTransitions = map[ProtocolState][]ProtocolState{
                StateScoutPending:    {StateReviewed, StateNotSuitable},
                StateScoutValidating: {StateReviewed, StateNotSuitable},
                StateReviewed:        {StateScaffoldPending, StateWavePending, StateWaveExecuting, StateBlocked},
                StateScaffoldPending: {StateWavePending, StateWaveExecuting, StateBlocked},
                StateWavePending:     {StateWaveExecuting, StateBlocked},
                StateWaveExecuting:   {StateWaveMerging, StateWaveVerified, StateBlocked, StateComplete},
                StateWaveMerging:     {StateWaveVerified, StateBlocked},
                StateWaveVerified:    {StateWaveExecuting, StateComplete, StateBlocked},
                StateBlocked:         {StateReviewed, StateWaveExecuting, StateWavePending},
                StateComplete:        {},
                StateNotSuitable:     {},
            }

            // SetImplState atomically reads the manifest, validates the state
            // transition, writes the new state, and optionally commits to git.
            func SetImplState(manifestPath string, newState ProtocolState, opts SetImplStateOpts) (*SetImplStateResult, error)
            ```

            Implement `SetImplState`:
            - Load the manifest via `Load(manifestPath)`
            - Read `manifest.State` as `previousState`
            - Look up `allowedTransitions[previousState]` — if `newState` not in the
              allowed list, return a descriptive error: "transition from X to Y is not
              allowed; valid targets: [...]"
            - Use `updateManifestState(manifestPath, newState)` (already in
              `merge_agents.go`) to write the new state atomically
            - If `opts.Commit` is true:
              - Build commit message: if `opts.CommitMsg` is not empty use it, else
                default to `"chore: set IMPL state to <newState>"`
              - Run `git -C <manifestDir> add <manifestPath>` then
                `git -C <manifestDir> commit -m <msg>`
              - Capture the resulting commit SHA via `git rev-parse HEAD`
              - Populate `result.CommitSHA`
            - Return `*SetImplStateResult` with all fields populated

            ### Tests

