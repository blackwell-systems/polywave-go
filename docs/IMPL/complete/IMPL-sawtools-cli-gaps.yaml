            Agent C owns both internal/git/branch_exists.go and AllBranchesAbsent.
            Agent E only calls the protocol-level AllBranchesAbsent — no direct dependency
            on the git-level helper. Signature mismatch is caught within Agent C's wave 1.
        - scenario: |-
            Agent A's allowedTransitions table is incomplete (missing some ProtocolState
            constants), causing valid transitions to fail at runtime.
          likelihood: medium
