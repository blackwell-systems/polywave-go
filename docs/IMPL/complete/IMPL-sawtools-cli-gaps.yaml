            ## Feature: integration.go — JSON struct field heuristic for severity

            ### What to implement

            Modify `pkg/protocol/integration.go` to downgrade exported struct
            fields that have `json:"..."` tags from "error"/"warning" to "info",
            eliminating ~25 false-positive integration gaps per finalize run.

            **Step 1: Extend `exportInfo` to carry tag information**

            ```go
            type exportInfo struct {
                Name    string // e.g. "ValidateIntegration"
                Kind    string // "func", "type", "method", "field"
                HasJSON bool   // true if this is a struct field with a json:"..." tag
            }
