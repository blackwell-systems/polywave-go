    - name: Orchestrator.logger
      description: |
        New private logger field on Orchestrator struct with SetLogger setter and
        o.log() helper. Mirrors SetDefaultModel pattern already established.
        executeMergeWave and RunStubScan both take *Orchestrator as first arg —
        they can use o.log() directly (no slog.Default() compromise needed).
      definition: |
        // In pkg/orchestrator/orchestrator.go — add field to struct:
        type Orchestrator struct {
            // ... existing fields unchanged ...
            logger *slog.Logger  // NEW: set via SetLogger; nil = slog.Default()
        }

        // Helper used internally — resolves nil to slog.Default():
        func (o *Orchestrator) log() *slog.Logger {
            if o.logger == nil {
                return slog.Default()
            }
            return o.logger
        }

        // In pkg/orchestrator/setters.go:
        func (o *Orchestrator) SetLogger(logger *slog.Logger) {
            o.logger = logger
        }
      location: pkg/orchestrator/orchestrator.go
    - name: loggerFrom
      description: |
        Package-internal nil-safe helper for the engine package. Returns slog.Default()
        when Logger field is nil. Defined ONCE in runner.go only — all other files in
        package engine (finalize.go, finalize_steps.go, integration_runner.go) use it
        directly without redeclaring. Re-declaring an unexported function in multiple
        files within the same Go package is a compile error.
      definition: |
        // Defined ONCE in pkg/engine/runner.go — do NOT redeclare in other engine files:
        func loggerFrom(l *slog.Logger) *slog.Logger {
            if l == nil {
                return slog.Default()
            }
            return l
        }
      location: pkg/engine/runner.go
    - name: newSawLogger
      description: |
        Constructor for the slog.Logger used in cmd/sawtools entry points.
        Reads SAW_LOG_LEVEL env var; defaults to WARN level to keep CLI output clean.
        Lives in cmd/sawtools/logger.go (new file created by Agent F).
      definition: |
        // In cmd/sawtools/logger.go (new file):
        func newSawLogger() *slog.Logger {
            level := slog.LevelWarn
            if v := os.Getenv("SAW_LOG_LEVEL"); v != "" {
                var l slog.Level
                if err := l.UnmarshalText([]byte(v)); err == nil {
                    level = l
                }
            }
            return slog.New(slog.NewTextHandler(os.Stderr, &slog.HandlerOptions{
                Level: level,
            }))
        }
      location: cmd/sawtools/logger.go
