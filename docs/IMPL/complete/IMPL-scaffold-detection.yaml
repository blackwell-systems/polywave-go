interface_contracts:
    - name: DetectScaffoldsPreAgent
      description: Analyzes interface contracts to find types referenced by ≥2 agents
      definition: |
        // PreAgentResult is the output of pre-agent scaffold detection.
        type PreAgentResult struct {
            ScaffoldsNeeded []ScaffoldCandidate `json:"scaffolds_needed"`
        }

        // ScaffoldCandidate represents a type that should be extracted to a scaffold file.
        type ScaffoldCandidate struct {
            TypeName       string   `json:"type_name"`
            ReferencedBy   []string `json:"referenced_by"`   // Agent IDs
            SuggestedFile  string   `json:"suggested_file"`  // pkg/types/<name>.go
            Definition     string   `json:"definition"`      // Full type definition
        }

        func DetectScaffoldsPreAgent(contracts []protocol.InterfaceContract) (*PreAgentResult, error)
      location: pkg/scaffold/pre_agent.go
    - name: DetectScaffoldsPostAgent
      description: Parses agent task fields to detect duplicate type definitions
      definition: |
        // PostAgentResult is the output of post-agent scaffold detection.
        type PostAgentResult struct {
            Conflicts []TypeConflict `json:"conflicts"`
        }

        // TypeConflict represents a type defined by multiple agents.
        type TypeConflict struct {
            TypeName   string   `json:"type_name"`
            Agents     []string `json:"agents"`      // Agent IDs that define it
            Files      []string `json:"files"`       // Files where it's defined
            Resolution string   `json:"resolution"`  // Suggested scaffold file
        }

        func DetectScaffoldsPostAgent(manifest *protocol.IMPLManifest) (*PostAgentResult, error)
      location: pkg/scaffold/post_agent.go
    - name: CLI Command
      description: sawtools detect-scaffolds with two modes
      definition: |
        sawtools detect-scaffolds <impl-doc-path> --stage {pre-agent|post-agent}

        Pre-agent mode:
          Reads interface_contracts section from IMPL doc
          Outputs ScaffoldCandidate JSON to stdout
          Exit code 0: scaffolds detected, 1: error

        Post-agent mode:
          Reads waves[].agents[].task fields from IMPL doc
          Outputs TypeConflict JSON to stdout
          Exit code 0: conflicts detected or none, 1: error
      location: cmd/saw/detect_scaffolds_cmd.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Implement pre-agent scaffold detection mode that analyzes interface contracts
            to find shared types. Create CLI command `sawtools detect-scaffolds` with
            `--stage pre-agent` flag.

            **Pre-agent mode logic:**
            1. Parse IMPL doc interface_contracts section
            2. Extract type names from each contract's Definition field (regex pattern: `type (\w+) (struct|interface)`)
            3. Build reference map: type name -> list of agents that reference it
            4. Filter to types with ≥2 references
            5. For each shared type:
               - Suggest file: `internal/types/<lowercase_typename>.go`
               - Extract full definition from contract
               - List referencing agents

            **CLI interface:**
            ```bash
            sawtools detect-scaffolds docs/IMPL/IMPL-X.yaml --stage pre-agent
            ```

            Output JSON:
            ```json
            {
              "scaffolds_needed": [
                {
                  "type_name": "MetricSnapshot",
                  "referenced_by": ["A", "B"],
                  "suggested_file": "internal/types/metricsnapshot.go",
                  "definition": "type MetricSnapshot struct { ... }"
                }
              ]
            }
            ```

            ## Interfaces to Implement

            ```go
            // pkg/scaffold/pre_agent.go

            type PreAgentResult struct {
                ScaffoldsNeeded []ScaffoldCandidate `json:"scaffolds_needed"`
            }

            type ScaffoldCandidate struct {
                TypeName       string   `json:"type_name"`
                ReferencedBy   []string `json:"referenced_by"`
                SuggestedFile  string   `json:"suggested_file"`
                Definition     string   `json:"definition"`
            }

            func DetectScaffoldsPreAgent(contracts []protocol.InterfaceContract) (*PreAgentResult, error)
            ```

            ```go
            // cmd/saw/detect_scaffolds_cmd.go

            func newDetectScaffoldsCmd() *cobra.Command {
                // Flags: --stage (required, values: pre-agent|post-agent)
                // Load manifest via protocol.Load()
                // Dispatch to pre_agent.go or post_agent.go based on --stage
                // Marshal result to JSON, write to stdout
            }
            ```

            ## Interfaces to Call

            - `protocol.Load(path string) (*IMPLManifest, error)` — load IMPL doc
            - `protocol.InterfaceContract` — struct with Name, Description, Definition, Location fields
            - Add `newDetectScaffoldsCmd()` to main.go's rootCmd.AddCommand() list

            ## Tests to Write

            1. `TestDetectScaffoldsPreAgent_SingleType` — one type, two references → detect
            2. `TestDetectScaffoldsPreAgent_NoSharedTypes` — all types used by single agent → empty
            3. `TestDetectScaffoldsPreAgent_MultipleTypes` — 3 types, 2 shared → detect 2
            4. `TestDetectScaffoldsPreAgent_TypeInDefinitionOnly` — type appears in contract definition but not referenced elsewhere → skip
            5. `TestExtractTypeNames` — regex extraction from Go/Rust/JS type definitions

            ## Verification Gate

            ```bash
            go build ./cmd/saw
            go vet ./pkg/scaffold ./cmd/saw
            go test ./pkg/scaffold -run TestDetectScaffoldsPreAgent
            ```

            ## Constraints

            - **Type name extraction:** Use regex `type\s+(\w+)\s+(struct|interface|enum|class)` to support Go/Rust/JS/Python
            - **Case sensitivity:** Type names are case-sensitive; "AuthToken" ≠ "authToken"
            - **Suggested file path:** Always use `internal/types/<lowercase>.go` pattern for Go projects
            - **Empty result:** Return empty `scaffolds_needed` array if no shared types, NOT an error
            - **Duplicate references:** If Agent A references MetricSnapshot in two contracts, count as ONE reference
          files:
            - pkg/scaffold/pre_agent.go
            - pkg/scaffold/pre_agent_test.go
            - cmd/saw/detect_scaffolds_cmd.go
        - id: B
          task: |
            ## What to Implement

            Implement post-agent scaffold detection mode that parses agent task fields
            to find duplicate type definitions. Extend CLI command with `--stage post-agent` flag.

            **Post-agent mode logic:**
            1. Parse IMPL doc waves[].agents[].task fields
            2. Extract type definitions from each task (regex: `type (\w+) (struct|interface|enum|class)`)
            3. Build definition map: type name -> list of (agent ID, task snippet)
            4. Find duplicates: types defined by ≥2 agents
            5. For each duplicate:
               - List agents that define it
               - Extract file paths from agents' Files list
               - Suggest resolution: scaffold file path

            **CLI interface:**
            ```bash
            sawtools detect-scaffolds docs/IMPL/IMPL-X.yaml --stage post-agent
            ```

            Output JSON:
            ```json
            {
              "conflicts": [
                {
                  "type_name": "AuthToken",
                  "agents": ["A", "B"],
                  "files": ["pkg/auth/token.go", "pkg/session/token.go"],
                  "resolution": "Extract to internal/types/authtoken.go"
                }
              ]
            }
            ```

            ## Interfaces to Implement

            ```go
            // pkg/scaffold/post_agent.go

            type PostAgentResult struct {
                Conflicts []TypeConflict `json:"conflicts"`
            }

            type TypeConflict struct {
                TypeName   string   `json:"type_name"`
                Agents     []string `json:"agents"`
                Files      []string `json:"files"`
                Resolution string   `json:"resolution"`
            }

            func DetectScaffoldsPostAgent(manifest *protocol.IMPLManifest) (*PostAgentResult, error)
            ```

            ## Interfaces to Call

            - `protocol.Load(path string) (*IMPLManifest, error)` — load IMPL doc
            - `protocol.IMPLManifest.Waves[].Agents[]` — access agent task fields
            - Extend `cmd/saw/detect_scaffolds_cmd.go` (Agent A's work) to dispatch to this function when `--stage post-agent`

            ## Tests to Write

            1. `TestDetectScaffoldsPostAgent_DuplicateType` — two agents define same type → conflict
            2. `TestDetectScaffoldsPostAgent_NoDuplicates` — all types unique → empty
            3. `TestDetectScaffoldsPostAgent_ThreeAgentConflict` — three agents define same type → conflict lists all three
            4. `TestDetectScaffoldsPostAgent_SameNameDifferentKind` — Agent A defines `AuthToken struct`, Agent B defines `AuthToken interface` → conflict (naming collision)
            5. `TestExtractTypeDefinitions` — regex extraction from agent task markdown

            ## Verification Gate

            ```bash
            go build ./cmd/saw
            go vet ./pkg/scaffold ./cmd/saw
            go test ./pkg/scaffold -run TestDetectScaffoldsPostAgent
            ```

            ## Constraints

            - **Task field format:** Agent tasks are multi-line strings with markdown headers; search full text, not just "Interfaces to Implement" section
            - **Type definition patterns:** Match `type Name struct`, `interface Name`, `enum Name`, `class Name` (cross-language)
            - **File extraction:** Use agent's Files list from manifest, NOT from task text (task may mention files that aren't in ownership list)
            - **Resolution format:** Always "Extract to internal/types/<lowercase>.go"
            - **Empty result:** Return empty `conflicts` array if no duplicates, NOT an error
            - **Same type, different semantics:** Detect naming collision even if semantic meaning differs (Scout will review)
          files:
            - pkg/scaffold/post_agent.go
            - pkg/scaffold/post_agent_test.go
        - id: C
          task: |
            ## What to Implement

            Write integration tests that exercise both pre-agent and post-agent modes
            end-to-end via CLI. Write package documentation for pkg/scaffold.

            ## Interfaces to Implement

            ```go
