            // 1. Create temp IMPL manifest YAML files
            // 2. Invoke sawtools detect-scaffolds via exec.Command
            // 3. Verify JSON output matches expectations
            ```

            ## Interfaces to Call

            - `os/exec.Command("sawtools", "detect-scaffolds", ...)` — invoke CLI
            - `protocol.IMPLManifest` — construct test manifests
            - `protocol.Save(manifest, path)` — write test IMPL docs to temp files
            - `json.Unmarshal()` — parse CLI output

            ## Tests to Write

            1. `TestCLI_PreAgentMode_DetectsSharedTypes` — end-to-end pre-agent detection
            2. `TestCLI_PostAgentMode_DetectsConflicts` — end-to-end post-agent detection
            3. `TestCLI_InvalidStage` — `--stage invalid` → exit code 1, error message
            4. `TestCLI_MissingStageFlag` — no `--stage` → exit code 1, usage message
            5. `TestCLI_ManifestNotFound` — path does not exist → exit code 1, error message
            6. `TestCLI_EmptyManifest` — minimal manifest with no contracts/agents → empty results, exit code 0

            ## Verification Gate

            ```bash
            go build ./cmd/saw
            go vet ./pkg/scaffold
            go test ./pkg/scaffold -run TestCLI
            ```

            ## Constraints

            - **Temp files:** Use `t.TempDir()` for all test IMPL manifests; clean up automatically
            - **Binary path:** Assume `sawtools` is in PATH or use `../../cmd/saw/saw` relative path
            - **JSON validation:** Parse output with `json.Unmarshal`; fail test if invalid JSON
            - **Exit codes:** Verify exit code 0 for success, 1 for errors
            - **Documentation:** Keep doc.go concise (<15 lines); reference determinism-roadmap.md for design rationale
          files:
            - pkg/scaffold/doc.go
            - pkg/scaffold/integration_test.go
