    - file_path: pkg/retry/types.go
      contents: |
        package retry

        // RetryConfig configures the E24 verification loop behavior.
        type RetryConfig struct {
          MaxRetries int    // Maximum retry attempts (default: 2, 3rd failure -> blocked)
          IMPLPath   string // Path to the parent IMPL manifest
          RepoPath   string // Repository root path
        }

        // RetryResult captures the outcome of a retry attempt.
        type RetryResult struct {
          Attempt     int      `json:"attempt"`
          AgentID     string   `json:"agent_id"`
          GatePassed  bool     `json:"gate_passed"`
          GateOutput  string   `json:"gate_output"`
          RetryIMPL   string   `json:"retry_impl,omitempty"`
          FinalState  string   `json:"final_state"` // "passed" | "retrying" | "blocked"
        }
      import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/retry
      status: committed (0b4d77b)
    - file_path: pkg/pipeline/types.go
      contents: |
        package pipeline

        import "context"

        // StepFunc is a single pipeline step. It receives the pipeline context
        // and returns an error. Steps are executed in sequence within a stage;
        // stages may run in parallel.
        type StepFunc func(ctx context.Context, state *State) error

        // ErrorStrategy defines how the pipeline handles a step failure.
        type ErrorStrategy string

        const (
          ErrorFail     ErrorStrategy = "fail"     // Abort pipeline immediately
          ErrorContinue ErrorStrategy = "continue" // Log error, continue to next step
          ErrorRetry    ErrorStrategy = "retry"    // Retry step up to MaxRetries times
        )

        // Step is a named, executable unit in a pipeline.
        type Step struct {
          Name          string        `yaml:"name"`
          Func          StepFunc      `yaml:"-"`
          ErrorStrategy ErrorStrategy `yaml:"on_error"`
          MaxRetries    int           `yaml:"max_retries,omitempty"`
          Condition     string        `yaml:"condition,omitempty"` // "always" | "on_success" | "on_failure"
        }

        // State carries mutable data through the pipeline.
        type State struct {
          RepoPath     string
          IMPLPath     string
          WaveNum      int
          Values       map[string]interface{}
          Errors       []error
        }
      import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/pipeline
      status: committed (56716a9)
