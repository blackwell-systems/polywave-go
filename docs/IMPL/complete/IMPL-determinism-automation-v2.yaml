            runScoutStructured in pkg/engine/runner.go and WithOutputConfig in
            pkg/agent/backend/api/client.go).

            Create two new files:
            1. pkg/engine/runner_wave_structured.go — runWaveAgentStructured() function
            2. pkg/orchestrator/structured_wave.go — launchAgentStructured() method

            ## Interfaces to Implement
            ```go
            // pkg/engine/runner_wave_structured.go
            func runWaveAgentStructured(ctx context.Context, opts RunWaveOpts, agentSpec types.AgentSpec, wtPath string, onChunk func(string)) (*protocol.CompletionReport, error)
            ```

            ```go
            // pkg/orchestrator/structured_wave.go
            func (o *Orchestrator) launchAgentStructured(ctx context.Context, runner *agent.Runner, wm *worktree.Manager, waveNum int, agentSpec types.AgentSpec) error
            ```

            ## Interfaces to Call
            - protocol.GenerateCompletionReportSchema() — already exists in pkg/protocol/schema.go
            - apiclient.WithOutputConfig(schema) — already exists in API backend
            - bedrockbackend.WithOutputConfig(schema) — already exists in Bedrock backend
            - protocol.SetCompletionReport(manifest, agentID, report) — for saving parsed reports
            - protocol.Load() / protocol.Save() — for manifest I/O

            ## Implementation Details
            1. runWaveAgentStructured: mirrors runScoutStructured pattern
               - Calls protocol.GenerateCompletionReportSchema() to get the schema
               - Creates API/Bedrock client with WithOutputConfig(schema)
               - Runs agent, collects JSON response
