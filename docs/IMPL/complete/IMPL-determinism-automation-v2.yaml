    - number: 2
      agents:
        - id: E
          task: |
            ## What to Implement
            Declarative workflow pipeline engine that models wave execution as a sequence
            of named steps with configurable error handling. This is a new pkg/pipeline/
            package that can eventually replace the imperative StartWave() orchestration.

            Create three files:
            1. pkg/pipeline/pipeline.go — Pipeline type with step execution
            2. pkg/pipeline/registry.go — Step function registry
            3. pkg/pipeline/saw_steps.go — Pre-built SAW protocol steps

            Use the scaffold types in pkg/pipeline/types.go (StepFunc, Step, State, ErrorStrategy).

            ## Interfaces to Implement
            ```go
            // pkg/pipeline/pipeline.go
            type Pipeline struct { name string; steps []Step }
            func New(name string) *Pipeline
            func (p *Pipeline) AddStep(step Step) *Pipeline
            func (p *Pipeline) Run(ctx context.Context, state *State) error

            // pkg/pipeline/registry.go
            type Registry struct { funcs map[string]StepFunc }
            func NewRegistry() *Registry
            func (r *Registry) Register(name string, fn StepFunc)
            func (r *Registry) Get(name string) (StepFunc, bool)
            func DefaultRegistry() *Registry

            // pkg/pipeline/saw_steps.go
            func StepValidateInvariants() Step
            func StepCreateWorktrees() Step
            func StepRunQualityGates() Step
            func StepMergeAgents() Step
            func StepVerifyBuild() Step
            func StepCleanup() Step
            func WavePipeline(waveNum int) *Pipeline  // builds full wave pipeline
            ```

            ## Interfaces to Call
            - Scaffold types from pkg/pipeline/types.go
            - context.Context for cancellation
            - fmt for error formatting

            ## Implementation Details
            1. Pipeline.Run():
               - Execute steps sequentially
               - For each step, check Condition ("always", "on_success", "on_failure")
               - On error, apply ErrorStrategy:
                 - "fail": return error immediately
                 - "continue": append to state.Errors, continue
                 - "retry": retry up to MaxRetries times, then fail or continue
               - Context cancellation stops execution immediately
            2. Registry: simple name->StepFunc map with Get/Register
            3. DefaultRegistry: pre-populate with SAW steps by name
            4. SAW steps: each returns a Step struct with appropriate ErrorStrategy
               - validate_invariants: fail on error
               - create_worktrees: fail on error
               - run_quality_gates: fail on error (required gates)
               - merge_agents: fail on error
               - verify_build: fail on error
               - cleanup: continue on error (cleanup is best-effort)
            5. WavePipeline: chains all steps in order for a standard wave execution

            ## Tests to Write
            1. TestPipeline_SequentialExecution — verify steps run in order
            2. TestPipeline_ErrorFail — verify pipeline stops on fail strategy
            3. TestPipeline_ErrorContinue — verify pipeline continues on continue strategy
            4. TestPipeline_ErrorRetry — verify retry behavior
            5. TestPipeline_ContextCancellation — verify context cancellation stops pipeline
            6. TestRegistry_RegisterAndGet — verify step registration and lookup
            7. TestDefaultRegistry_AllSteps — verify all SAW steps registered
            8. TestWavePipeline_Structure — verify correct step order
            9. TestState_ValuesMap — verify state carries values between steps
            10. TestPipeline_ConditionOnSuccess — verify condition filtering
            11. TestPipeline_ConditionOnFailure — verify condition filtering after error

            ## Verification Gate
            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/pipeline/...
            ```

            ## Constraints
            - Do NOT import pkg/engine or pkg/orchestrator — keep pkg/pipeline independent
            - SAW step functions in saw_steps.go should be stubs that check state.Values
              for required keys (e.g. "repo_path", "impl_path") and return errors if missing.
              They do NOT call real orchestrator functions — the engine layer will wire
              real implementations via the registry in a future integration step.
            - Pipeline must be safe for concurrent use (multiple pipelines can run simultaneously)
            - Use the scaffold types.go — do not redefine StepFunc, Step, State, ErrorStrategy
          files:
            - pkg/pipeline/pipeline.go
            - pkg/pipeline/pipeline_test.go
            - pkg/pipeline/registry.go
            - pkg/pipeline/registry_test.go
            - pkg/pipeline/saw_steps.go
            - pkg/pipeline/saw_steps_test.go
          dependencies:
            - B
        - id: F
          task: |
            ## What to Implement
            CLI command for the E24 retry loop: `sawtools retry <impl-doc> --wave N --gate-type <type>`.
            This command wraps pkg/retry.NewRetryLoop and provides a CLI interface for
            triggering quality gate retries.

            Create cmd/saw/retry_cmd.go.

            ## Interfaces to Implement
            ```go
            // cmd/saw/retry_cmd.go
            // Cobra command: sawtools retry <impl-doc> --wave <N> --gate-type <type> [--max-retries <N>]
            ```

            ## Interfaces to Call
            - pkg/retry.NewRetryLoop, RetryConfig, RetryResult
            - pkg/retry.GenerateRetryIMPL
            - pkg/protocol.Load, protocol.Save
            - github.com/spf13/cobra — for command definition

            ## Implementation Details
            1. Define retryCmd as a cobra.Command
            2. Args: exactly 1 positional arg (IMPL doc path)
            3. Flags:
               - --wave (required): wave number that failed
               - --gate-type (required): type of gate that failed ("build", "test", "lint")
               - --max-retries (optional, default 2): maximum retry attempts
            4. Run function:
               a. Load the IMPL manifest
               b. Create RetryConfig from flags
               c. Call retry.NewRetryLoop(cfg)
               d. Find the failed files from the manifest (files owned by agents in --wave)
