        - id: B
          task: |
            ## What to Implement
            E24 Verification Loop: automated quality gate retry mechanism. When a quality
            gate fails after wave merge, this system generates a single-agent retry IMPL
            doc targeting the failed files and re-runs the agent. Implements a 2-retry
            limit with 3rd failure transitioning to blocked state.

            Create a new pkg/retry/ package with:
            1. loop.go — RetryLoop struct with Run() and GenerateRetryIMPL() methods
            2. impl_generator.go — generates minimal single-wave, single-agent IMPL docs

            ## Interfaces to Implement
            ```go
            // pkg/retry/loop.go
            type RetryLoop struct { cfg RetryConfig }
            func NewRetryLoop(cfg RetryConfig) *RetryLoop
            func (rl *RetryLoop) Run(ctx context.Context, failedGate QualityGateFailure, onEvent func(Event)) (*RetryResult, error)
            ```

            ```go
            // pkg/retry/impl_generator.go
            func GenerateRetryIMPL(parentSlug string, attempt int, failedFiles []string, gateOutput string, gateCommand string) *protocol.IMPLManifest
            ```

            Use the scaffold types in pkg/retry/types.go (RetryConfig, RetryResult).

            ## Interfaces to Call
            - protocol.IMPLManifest, protocol.Save() — for creating retry IMPL docs
            - protocol.CompletionReport — for retry agent completion tracking
            - orchestrator.QualityGateResult — to understand what failed

            ## Implementation Details
            1. RetryLoop.Run():
               a. Generate a retry IMPL doc via GenerateRetryIMPL()
               b. Save it to docs/IMPL/IMPL-{parentSlug}-retry-{attempt}.yaml
               c. The retry IMPL has 1 wave, 1 agent, targeting the failed files
               d. Agent prompt includes: gate command, gate output, list of files to fix
               e. Track attempt count; if attempt >= MaxRetries (default 2), set state to blocked
               f. Return RetryResult with attempt number and final state
            2. GenerateRetryIMPL():
               a. Create minimal IMPLManifest with title "Retry: {parentSlug} attempt {N}"
               b. Single wave, single agent "R" (for retry)
               c. Agent task includes gate output and instructions to fix compilation/test errors
               d. File ownership: only the failed files
               e. Quality gates: same gate that failed (so retry is verified)

            ## Tests to Write
            1. TestGenerateRetryIMPL_Structure — verify generated IMPL has correct structure
            2. TestGenerateRetryIMPL_SingleAgent — verify exactly 1 wave, 1 agent
            3. TestGenerateRetryIMPL_GatePreserved — verify failed gate is in quality_gates
            4. TestRetryLoop_MaxRetries — verify blocked state after max retries
            5. TestRetryLoop_PassOnFirstRetry — verify success path
            6. TestRetryResult_States — verify state transitions

            ## Verification Gate
            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/retry/...
            ```

            ## Constraints
            - The retry IMPL doc must pass protocol.Validate() — it's a real IMPL doc
            - Agent ID for retry agents is always "R" (single-letter, valid per protocol)
            - Do not import pkg/engine — keep pkg/retry independent of the engine layer
            - RetryLoop.Run does NOT execute agents — it generates the IMPL doc and returns
              The caller (engine layer, Wave 2 integration) is responsible for execution
          files:
