suitability_assessment: |
    5 feature areas with disjoint file ownership across new packages. 4 of 5 features
    are fully independent (Wave 1 parallel). Feature 4 (pipeline engine) depends on
    understanding the current StartWave flow but does not share files with other features.
    Structured output for Scout already exists (v0.17.0) — extending to Wave agents
    follows the same pattern. JSON Schema validation replaces hand-coded validation
    but the new code lives in new files alongside existing code until migration is
    verified. High parallelization value due to 45s build cycle and independent packages.

    Post-wave integration wiring (orchestrator/integration agent responsibility):
    - pkg/engine/runner.go: wire runWaveAgentStructured into StartWave when UseStructuredOutput is set
    - pkg/orchestrator/orchestrator.go: add UseStructuredOutput option to RunWave dispatch
    - pkg/protocol/validation.go: optionally wire ValidateManifestJSON into Validate() chain
    - cmd/saw/root.go: register retry command
