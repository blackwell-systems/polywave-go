interface_contracts:
    - name: RunWaveStructured
      description: |
        Extends the orchestrator's launchAgent to use structured output for
        wave agent completion reports via the existing WithOutputConfig pattern.
        When the backend supports structured output (API/Bedrock), the completion
        report is parsed directly from the JSON response instead of being
        synthesized by the orchestrator.
      definition: |
        // In pkg/engine/runner_wave_structured.go:
        func runWaveAgentStructured(ctx context.Context, opts RunWaveOpts, agentSpec types.AgentSpec, wtPath string, onChunk func(string)) (*protocol.CompletionReport, error)

        // In pkg/orchestrator/structured_wave.go:
        func (o *Orchestrator) launchAgentStructured(ctx context.Context, runner *agent.Runner, wm *worktree.Manager, waveNum int, agentSpec types.AgentSpec) error
      location: pkg/engine/runner_wave_structured.go
    - name: RetryLoop
      description: |
        E24 verification loop: when a quality gate fails after wave merge,
        generates a single-agent retry IMPL doc targeting the failed files
        and re-runs up to MaxRetries times before transitioning to blocked state.
      definition: |
        // In pkg/retry/loop.go:
        func NewRetryLoop(cfg RetryConfig) *RetryLoop
        func (rl *RetryLoop) Run(ctx context.Context, failedGate orchestrator.QualityGateResult, failedFiles []string, onEvent func(engine.Event)) (*RetryResult, error)
        func (rl *RetryLoop) GenerateRetryIMPL(failedFiles []string, gateOutput string) (*protocol.IMPLManifest, error)
      location: pkg/retry/loop.go
    - name: ValidateManifestJSON
      description: |
        JSON Schema based validation that generates a schema from the
        IMPLManifest struct via invopop/jsonschema and validates YAML-decoded
        manifests against it. Replaces hand-coded field/enum/path checks
        currently in schema_validation.go, schema_enum_validation.go,
        schema_cross_field.go, and schema_unknown_keys.go.
      definition: |
        // In pkg/protocol/jsonschema_validator.go:
        func GenerateManifestSchema() (map[string]any, error)
        func ValidateManifestJSON(m *IMPLManifest) []ValidationError
      location: pkg/protocol/jsonschema_validator.go
    - name: Pipeline
      description: |
        Declarative workflow engine that replaces the imperative StartWave()
        orchestration. Defines waves as a sequence of named steps with
        configurable error handling. The engine package builds the pipeline
        from an IMPL manifest and executes it.
      definition: |
        // In pkg/pipeline/pipeline.go:
        func New(name string) *Pipeline
        func (p *Pipeline) AddStep(step Step) *Pipeline
        func (p *Pipeline) Run(ctx context.Context, state *State) error

        // In pkg/pipeline/registry.go:
        func NewRegistry() *Registry
        func (r *Registry) Register(name string, fn StepFunc)
        func (r *Registry) Get(name string) (StepFunc, bool)
        func DefaultRegistry() *Registry  // pre-loaded with standard SAW steps
      location: pkg/pipeline/pipeline.go
    - name: ErrorCode
      description: |
        Typed error codes replacing string-based ValidationError.Message.
        Each validation rule gets a unique code constant with structured
        metadata for programmatic handling and analytics.
      definition: |
        // In pkg/protocol/error_codes.go:
        type ErrorCode string
        const (
          ErrMissingTitle       ErrorCode = "E001_MISSING_TITLE"
          ErrMissingSlug        ErrorCode = "E002_MISSING_SLUG"
          ErrInvalidVerdict     ErrorCode = "E003_INVALID_VERDICT"
          ErrInvalidAgentID     ErrorCode = "E004_INVALID_AGENT_ID"
          ErrI1Violation        ErrorCode = "E005_I1_DISJOINT_OWNERSHIP"
          ErrI2WaveOrder        ErrorCode = "E006_I2_WAVE_ORDER"
          ErrI3WaveSequence     ErrorCode = "E007_I3_WAVE_SEQUENCE"
          ErrI5OrphanFile       ErrorCode = "E008_I5_ORPHAN_FILE"
          ErrI5Uncommitted      ErrorCode = "E009_I5_UNCOMMITTED"
          ErrI6Cycle            ErrorCode = "E010_I6_CYCLE"
          ErrInvalidGateType    ErrorCode = "E011_INVALID_GATE_TYPE"
          ErrInvalidMergeState  ErrorCode = "E012_INVALID_MERGE_STATE"
          ErrInvalidState       ErrorCode = "E013_INVALID_STATE"
          ErrMultiRepoMixed     ErrorCode = "E014_MULTI_REPO_MIXED"
          // Schema validation codes
          ErrSVRequiredField    ErrorCode = "E015_SV_REQUIRED_FIELD"
          ErrSVInvalidEnum      ErrorCode = "E016_SV_INVALID_ENUM"
          ErrSVInvalidPath      ErrorCode = "E017_SV_INVALID_PATH"
          ErrSVUnknownKey       ErrorCode = "E018_SV_UNKNOWN_KEY"
          ErrSVCrossField       ErrorCode = "E019_SV_CROSS_FIELD"
        )

        // ErrorCodeInfo provides metadata for each error code.
        type ErrorCodeInfo struct {
          Code        ErrorCode
          Category    string // "invariant" | "schema" | "state" | "field"
          Severity    string // "error" | "warning"
          Description string
        }

        func LookupErrorCode(code ErrorCode) ErrorCodeInfo
        func AllErrorCodes() []ErrorCodeInfo
      location: pkg/protocol/error_codes.go
