            - pkg/retry/loop_test.go
            - pkg/retry/impl_generator.go
            - pkg/retry/impl_generator_test.go
        - id: C
          task: |
            ## What to Implement
            JSON Schema based IMPL manifest validation. Generate a JSON Schema from the
            protocol.IMPLManifest struct using invopop/jsonschema (already in go.mod) and
            validate decoded manifests against it. This supplements the existing hand-coded
            validation with a schema-derived structural check.

            Create pkg/protocol/jsonschema_validator.go.

            ## Interfaces to Implement
            ```go
            // pkg/protocol/jsonschema_validator.go
            func GenerateManifestSchema() (map[string]any, error)
            func ValidateManifestJSON(m *IMPLManifest) []ValidationError
            ```

            ## Interfaces to Call
            - github.com/invopop/jsonschema — Reflector, same pattern as GenerateScoutSchema()
            - encoding/json — for marshaling manifest to JSON for validation
            - Existing ValidationError type — return errors in the same format

            ## Implementation Details
            1. GenerateManifestSchema():
               - Use jsonschema.Reflector with AllowAdditionalProperties: false
               - Reflect the full IMPLManifest struct (not the scout subset)
               - Return the schema as map[string]any
            2. ValidateManifestJSON():
               - Generate schema via GenerateManifestSchema() (cache after first call)
               - Marshal the manifest to JSON
               - Walk the schema to validate:
                 a. Required fields present (from json struct tags)
                 b. Enum values match allowed sets (from ValidationError codes)
                 c. Type correctness (string vs int vs array)
               - Return ValidationErrors with code "JS01_*" prefix
               - This is additive: existing ValidateSchema() in schema_validation.go
                 continues to work. ValidateManifestJSON is called separately.
            3. Do NOT modify validation.go or schema_validation.go — this is a new
               parallel validation path that can be tested independently before
               replacing the hand-coded checks.

            ## Tests to Write
            1. TestGenerateManifestSchema_Structure — verify schema has correct top-level keys
            2. TestGenerateManifestSchema_RequiredFields — verify title, feature_slug are required
            3. TestValidateManifestJSON_ValidManifest — verify no errors for valid manifest
            4. TestValidateManifestJSON_MissingTitle — verify error for missing required field
            5. TestValidateManifestJSON_InvalidVerdict — verify error for invalid enum value
            6. TestValidateManifestJSON_NestedValidation — verify wave/agent field validation
            7. TestValidateManifestJSON_ConsistentWithValidate — compare results with existing Validate()

            ## Verification Gate
            ```bash
            go build ./...
            go vet ./...
            go test ./pkg/protocol/ -run TestGenerateManifestSchema
            go test ./pkg/protocol/ -run TestValidateManifestJSON
            ```

            ## Constraints
            - Do NOT modify existing validation.go, schema_validation.go, or schema_errors.go
            - Use error code prefix "JS01_" to distinguish from existing "SV01_" codes
            - Cache the generated schema (sync.Once) to avoid regenerating on every call
            - The schema must handle omitempty fields correctly (nullable/optional)
          files:
            - pkg/protocol/jsonschema_validator.go
            - pkg/protocol/jsonschema_validator_test.go
