suitability_assessment: |
    1. File decomposition: 3 distinct work items map to 3 agents with disjoint file
       ownership. Item 1 (pre-wave-gate) creates new files. Items 2 and 3 modify
       separate existing files (cleanup-stale vs cleanup commands and their protocol
       functions). No file conflicts within a wave.

    2. No investigation needed — all items are well-specified with clear acceptance
       criteria and JSON output shapes.

    3. Interface contracts are discoverable: pre-wave-gate returns structured JSON,
       cleanup-stale gets new flags, cleanup gets new flags. All signatures can be
       defined upfront.

    4. Pre-implementation status:
       - pre-wave-gate: TODO (no existing command)
       - cleanup-stale --slug/--all: TODO (command exists but lacks these flags)
       - cleanup --slug/--all-stale: TODO (command exists but lacks these flags)
       - prepare_wave.go already has same-slug stale cleanup wired in (lines 149-164)

    5. Parallelization value: High. 3 independent agents in wave 1 (Go build/test
       cycle >30s), each touching 2-4 files. Single wave = maximum parallelism.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~10 min (3 agents x 8 min avg, parallel)
    - Merge & verification: ~3 min
    Total SAW time: ~21 min

    Sequential baseline: ~30 min (3 agents x 10 min avg sequential)
    Time savings: ~9 min (30% faster)

    Recommendation: Clear speedup. Proceed.

    NOTE: protocol-conformity-gaps IMPL owns prepare_wave.go. This IMPL does NOT
    modify prepare_wave.go. The stale cleanup is already wired into prepare_wave.go
    (lines 149-164). This IMPL improves the standalone commands only.
