interface_contracts:
    - name: PreWaveGateResult
      description: |
        Structured result from the pre-wave readiness gate. Returns whether the
        IMPL is ready for wave execution, with per-check status details.
      definition: |
        type PreWaveGateCheck struct {
            Name    string `json:"name"`    // "validation", "critic_review", "scaffolds", "state"
            Status  string `json:"status"`  // "pass", "fail", "warn"
            Message string `json:"message"`
        }

        type PreWaveGateResult struct {
            Ready  bool               `json:"ready"`
            Checks []PreWaveGateCheck `json:"checks"`
        }
      location: pkg/protocol/pre_wave_gate.go
    - name: PreWaveGate
      description: |
        Runs all pre-wave readiness checks on a loaded manifest. Returns structured
        result with per-check status. Does not modify the manifest.
      definition: |
        func PreWaveGate(m *IMPLManifest) *PreWaveGateResult
      location: pkg/protocol/pre_wave_gate.go
    - name: DetectStaleWorktreesForSlug
      description: |
        Filters stale worktree detection to a specific slug. Wraps DetectStaleWorktrees
        with post-filtering by slug name.
      definition: |
        func DetectStaleWorktreesForSlug(repoPath, slug string) ([]StaleWorktree, error)
      location: pkg/protocol/stale_worktree.go
    - name: CleanupBySlug
      description: |
        Cleanup worktrees for a specific IMPL slug (not limited to current wave).
        Used by the cleanup command's --slug flag.
      definition: |
        func CleanupBySlug(repoDir, slug string, force bool) (*StaleCleanupResult, error)
      location: pkg/protocol/cleanup.go
