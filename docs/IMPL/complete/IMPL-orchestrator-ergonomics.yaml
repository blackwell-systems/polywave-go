      agents:
        - id: A
          task: |
            ## What to implement

            Create a new `sawtools pre-wave-gate <impl-path>` command that runs all
            pre-wave readiness checks and returns structured JSON.

            ### Protocol function: `pkg/protocol/pre_wave_gate.go`

            Create new file with these types and function:

            ```go
            package protocol

            // PreWaveGateCheck is a single readiness check result.
            type PreWaveGateCheck struct {
                Name    string `json:"name"`
                Status  string `json:"status"`  // "pass", "fail", "warn"
                Message string `json:"message"`
            }

            // PreWaveGateResult is the aggregate readiness result.
            type PreWaveGateResult struct {
                Ready  bool               `json:"ready"`
                Checks []PreWaveGateCheck `json:"checks"`
            }

            // PreWaveGate runs all pre-wave readiness checks on a manifest.
            func PreWaveGate(m *IMPLManifest) *PreWaveGateResult
            ```

            The function performs these checks in order:

            1. **validation** — Call `Validate(m)`. If any errors, status=fail with
               error messages joined. If clean, status=pass.

            2. **critic_review** — Check `m.CriticReport`:
               - If nil: count total agents across all waves. If >= 3 OR
                 len(m.Repositories) > 0 (multi-repo), status=warn with message
                 "critic review recommended (E37 threshold met)". Otherwise status=pass
                 with "critic review not required".
               - If present and Verdict == "PASS", status=pass.
               - If present and Verdict != "PASS", status=fail with message including
                 issue count from CriticReport.IssueCount.

            3. **scaffolds** — If len(m.Scaffolds) > 0, call AllScaffoldsCommitted(m).
               If false, status=fail listing uncommitted scaffolds. If true or no
               scaffolds, status=pass.

            4. **state** — Check m.State:
               - If empty, SCOUT_PENDING, or REVIEWED: status=pass
               - If COMPLETE or BLOCKED or NOT_SUITABLE: status=fail with
                 "IMPL state is {state}, cannot proceed"
               - Otherwise: status=pass (WAVE_PENDING, etc. are acceptable)

            `Ready` is true only if no check has status=fail.

            ### CLI command: `cmd/saw/pre_wave_gate_cmd.go`

            ```go
            func newPreWaveGateCmd() *cobra.Command
            ```

            - Use: `pre-wave-gate <manifest-path>`
            - Args: ExactArgs(1)
            - Load manifest with `protocol.Load(args[0])`
            - Call `protocol.PreWaveGate(doc)`
            - Marshal result as indented JSON to stdout
            - Exit code 0 if Ready==true, exit code 1 if Ready==false
            - For exit code 1, use `cmd.SilenceErrors = true` and `os.Exit(1)`
              after printing JSON (don't return an error that cobra would print)

            ### Tests: `pkg/protocol/pre_wave_gate_test.go`

            Test cases:
            - Valid manifest with no scaffolds, no critic report, < 3 agents: all pass, ready=true
            - Manifest with 3+ agents and no critic report: critic_review=warn, ready=true (warn does not block)
            - Manifest with critic report verdict=PASS: critic_review=pass
            - Manifest with critic report verdict=ISSUES: critic_review=fail, ready=false
            - Manifest with uncommitted scaffolds: scaffolds=fail, ready=false
            - Manifest with state=COMPLETE: state=fail, ready=false
            - Manifest with state=BLOCKED: state=fail, ready=false
            - Manifest with validation errors (e.g., duplicate file ownership): validation=fail, ready=false

            ### Tests: `cmd/saw/pre_wave_gate_cmd_test.go`

            Test the CLI command integration:
            - Write a valid IMPL YAML to a temp file, run command, verify JSON output
              and exit code 0
            - Write an invalid IMPL YAML (e.g., state=COMPLETE), verify exit code 1

            ### Verification gate
