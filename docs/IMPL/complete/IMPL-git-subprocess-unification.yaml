    Add missing wrapper functions to internal/git/commands.go, then migrate all
    call sites in pkg/resume, pkg/orchestrator, pkg/tools, and cmd/sawtools to
    use those wrappers. After this change, internal/git/ is the sole location of
    exec.Command("git",...) in production code.
