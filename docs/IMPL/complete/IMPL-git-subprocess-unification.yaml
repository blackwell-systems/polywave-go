       internal/git/commands.go needs new wrappers and internal/git/commands_test.go
       needs new tests. Wave 1 adds wrappers + tests to internal/git (no other
       packages depend on this change during execution). Wave 2 migrates all 7
       call-site files in parallel — they are fully independent. Disjoint ownership
       is clean.

    2. Investigation-first: No root cause investigation required. All call sites
       are fully understood from direct code reading. The audit doc (Finding 2)
       identified 3 packages; an exhaustive grep confirmed 7 files total.

    3. Interface discoverability: All new internal/git function signatures are
       fully specified before implementation begins (see interface_contracts).

    4. Pre-implementation status check: 3 needed wrappers already exist in
       internal/git (StatusPorcelain, Add, RevParse, IsAncestor, CommitWithMessage).
       Agents are assigned only the missing wrappers and the migration tasks.
       Existing functions in internal/git that are already in scope:
         - StatusPorcelain — replaces git status --porcelain in worktree_status.go
         - Add — replaces git add in context.go and mark_program_complete_cmd.go
         - RevParse — replaces git rev-parse HEAD in mark_program_complete_cmd.go
         - IsAncestor — replaces git merge-base --is-ancestor in finalize_wave.go
         - CommitWithMessage — replaces git commit -m in context.go and mark_program_complete_cmd.go
       Missing wrappers to add: SymbolicRef, WorktreeListRaw, DiffNameOnlyHEAD,
       DiffNameOnlyStaged, AddUpdate, Version.

    5. Parallelization value: 3 independent agents in Wave 2 (resume, tools+orch,
       cmd). Build/test cycle ~15s. Clear coordination value as audit trail.

    Estimated times:
    - Scout phase: ~30 min
    - Agent execution: ~20 min (Wave 1: 2 agents x 10 min parallel; Wave 2: 3 agents x 8 min parallel)
    - Merge and verification: ~5 min per wave
    Total SAW time: ~55 min
    Sequential baseline: ~60 min (5 agents x 12 min avg sequential)
    Time savings: ~5 min (marginal speed gain; primary value is audit completeness)
    Recommendation: Proceed. Coordination value outweighs marginal speed gain.
