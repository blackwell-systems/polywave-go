            ## Issue 4: Make result.GetData() safe (no panic)

            ### What to implement

            In `pkg/result/result.go`, change `GetData()` from a panic on nil Data to
            returning the zero value of T. Update the doc comment to reflect the new contract.

            **Current behavior (line 108-115):**
            ```go
            func (r Result[T]) GetData() T {
                if r.Data == nil {
                    panic("GetData called on Result with nil Data")
                }
                return *r.Data
            }
            ```

            **New behavior:**
            ```go
            // GetData returns the data payload. Returns the zero value of T if Data is nil.
            // Prefer checking IsSuccess() before calling to ensure meaningful data.
            func (r Result[T]) GetData() T {
                if r.Data == nil {
                    var zero T
                    return zero
                }
                return *r.Data
            }
            ```

            ### Tests

            In `pkg/result/result_test.go` (create if it doesn't exist; check first):
            - Add `TestGetDataZeroOnNilData`: call GetData() on a FATAL result (nil Data),
              verify it does NOT panic and returns the zero value.
            - Add `TestGetDataSuccess`: call GetData() on a SUCCESS result, verify correct
              value is returned.
            - `pkg/orchestrator/quality_gates_test.go` (including `TestRunQualityGatesRequiredFail`)
              will be deleted by Wave 2 Agent D — you do not own that file.

            ### Verification gate

            Run `go test ./pkg/result/...` — all tests must pass.
            Run `go build ./...` — must compile.

            ### Constraints

            - Do NOT change IsSuccess(), IsFatal(), or any other Result method.
            - Do NOT change callers — they already guard with IsSuccess() checks.
            - Only modify `pkg/result/result.go` and `pkg/result/result_test.go`.
