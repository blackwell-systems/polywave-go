            runs `protocol.ValidateWiringDeclarations` directly because the engine didn't
            expose the result. Replace it with a read from `finalizeResult.WiringReport`:

            ```go
            // Wiring gap events (E35): engine now carries WiringReport in FinalizeWaveResult.
            if finalizeResult.WiringReport != nil && !finalizeResult.WiringReport.Valid {
                for _, gap := range finalizeResult.WiringReport.Gaps {
                    publish("wiring_gap", map[string]interface{}{
                        "wave":                waveNum,
                        "symbol":              gap.Declaration.Symbol,
                        "defined_in":          gap.Declaration.DefinedIn,
                        "must_be_called_from": gap.Declaration.MustBeCalledFrom,
                        "agent":               gap.Declaration.Agent,
                        "reason":              gap.Reason,
                        "severity":            gap.Severity,
                    })
                }
                publish("wiring_gaps_summary", map[string]interface{}{
                    "wave":      waveNum,
                    "gap_count": len(finalizeResult.WiringReport.Gaps),
                    "summary":   finalizeResult.WiringReport.Summary,
                })
            }
            ```

            Remove the now-unused `manifest` and `repoPath` variables if they are only
            used by the inline wiring block. If they are used elsewhere in the function,
            leave them.

            ### Verification

            Run `go build ./...` from the scout-and-wave-web root — must compile.
            Run `go vet ./...` — no errors.

            ### Constraints

            - Only modify `pkg/api/wave_runner.go`.
            - Do NOT change any SSE event names or shapes — downstream clients depend on them.
            - Do NOT change the wiring_gap or wiring_gaps_summary event field names.
            - If `finalizeResult.WiringReport` is nil (engine ran no wiring validation),
              emit no wiring events — that is the correct behavior.
