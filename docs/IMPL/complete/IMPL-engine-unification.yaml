suitability_assessment: |-
    All 5 issues are well-scoped with clear file ownership boundaries. The work involves
    deleting dead code, unifying duplicate types, hardening a panic path, and rewriting
    the CLI as a thin adapter. Breaking changes are intentional and desired. The main
    complexity is Issue 1 (CLI rewrite), which requires the canonical FinalizeWaveResult
    type from Issue 2 to be ready first. That ordering constraint drives the wave structure.

    The orchestrator.RunQualityGates function is called by engine/runner.go (StartWave
    legacy path) and registered in pipeline/registry.go. It is NOT purely dead — but
    it runs parallel to and duplicates protocol.RunGatesWithCache. Issue 3 requires
    migrating the runner.go call to use the engine step function before deleting
    orchestrator.RunQualityGates and its test file.

    The web app (scout-and-wave-web) calls engine.FinalizeWave and consumes
    engine.FinalizeWaveResult directly. The type change in Issue 2 is a breaking
    change addressed in-scope by Wave 3 Agent F, which updates wave_runner.go to
    iterate the new map[string][]protocol.GateResult type and replace the inline
    wiring validation workaround with the engine's new WiringReport field. This
    makes the IMPL cross-repo (scout-and-wave-go + scout-and-wave-web).
