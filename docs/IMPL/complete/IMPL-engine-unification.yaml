pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Wave 2 Agent C adds multi-repo support to FinalizeWave but the engine's step
            functions (StepVerifyCommits, StepMergeAgents, etc.) take a single RepoPath.
            The per-repo loop must call each step once per repo, but some steps are
            manifest-level (e.g., ScanStubs, ValidateIntegration). Agent C must carefully
            distinguish repo-scoped steps from manifest-scoped steps, or the loop will
            run manifest-level steps N times unnecessarily.
          likelihood: medium
          impact: medium
          mitigation: |-
            Specify in Agent C's task which steps are repo-scoped (VerifyCommits, RunGates,
            MergeAgents, VerifyBuild, Cleanup) vs manifest-scoped (ScanStubs, ValidateIntegration,
            CheckWiringDeclarations, PopulateIntegrationChecklist). The CLI already does this
            correctly — Agent C should use it as the reference implementation.
        - scenario: |-
            State transition calls (SetImplState WAVE_VERIFIED, UpdateStatus per agent)
            are currently in the CLI finalize_wave.go (lines 545-560). If Agent C in
            Wave 2 does not move them into engine.FinalizeWave, Agent E in Wave 3
            will produce a thin adapter that silently drops state transitions.
          likelihood: high
          impact: high
          mitigation: |-
            Agent C's task explicitly lists state transitions as required engine behavior.
            Agent E's task cross-checks that state transitions are present in the engine
            before finalizing the thin adapter. If missing, Agent E adds them to engine.
        - scenario: |-
            Wave 3 Agent F updates wave_runner.go for the GateResults map type change.
            However, if Agent C's WiringReport field is named differently than expected,
            Agent F's Fix 2 (replacing inline wiring with finalizeResult.WiringReport)
            will fail to compile.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent F's brief specifies the exact field name (WiringReport *protocol.WiringValidationData)
            from the interface contract. If Agent C deviates, Agent F should read the
            actual field name from pkg/engine/finalize.go before writing code.
        - scenario: |-
            pkg/pipeline/registry.go registers "run_quality_gates" via StepRunQualityGates()
            in saw_steps.go — a stub that does NOT call orchestrator.RunQualityGates.
            Deleting quality_gates.go will not panic the binary, but leaves a no-op step
            registered under a name that implies gate execution. If Agent D leaves it as-is,
            the registry silently does nothing when "run_quality_gates" is invoked.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent D's task directs them to remove or replace the run_quality_gates registry
            entry with a real implementation using protocol.RunPreMergeGates.
        - scenario: |-
            The allBranchesAbsent shortcut in the CLI performs ancestry verification
            (git.IsAncestor) before accepting "already merged" as valid. If Agent C
            omits this check when porting the logic to engine.FinalizeWave, the engine
            will silently accept branch-deleted-without-merge as a success.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent C's task specifies to copy the allBranchesAbsent logic from
            cmd/sawtools/finalize_wave.go lines 157-201, which includes the ancestry check.
            The test suite should include a test for this case.
