            ## Web app: update wave_runner.go for unified FinalizeWaveResult type

            ### Repo
            `/Users/dayna.blackwell/code/scout-and-wave-web`

            ### Context

            Wave 2 Agent C changes `engine.FinalizeWaveResult` in two ways that affect
