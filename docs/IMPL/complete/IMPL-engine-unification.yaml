interface_contracts:
    - name: FinalizeWaveResult (canonical, engine package)
      description: |-
        Unified result type for both single-repo and multi-repo wave finalization.
        Replaces the diverged CLI-local struct and the engine's single-value struct.
        All fields that were single-value in engine become map[string]*T keyed by
        repo name (using "." for single-repo IMPLs, consistent with extractReposFromManifest).
        BuildPassed (present in engine, absent in CLI) is preserved.
        CrossRepo bool field is added from CLI. WiringGaps and IntegrationActionRequired
        are added from CLI.
      definition: |
        type FinalizeWaveResult struct {
            Wave                    int                              `json:"wave"`
            CrossRepo               bool                             `json:"cross_repo"`
            VerifyCommits           map[string]*protocol.VerifyCommitsData  `json:"verify_commits"`
            CollisionReports        map[string]*collision.CollisionReport   `json:"collision_reports,omitempty"`
            StubReport              *protocol.ScanStubsData                 `json:"stub_report,omitempty"`
            GateResults             map[string][]protocol.GateResult        `json:"gate_results"`
            IntegrationReport       *protocol.IntegrationReport             `json:"integration_report,omitempty"`
            MergeResult             map[string]*protocol.MergeAgentsData    `json:"merge_result"`
            VerifyBuild             map[string]*protocol.VerifyBuildData    `json:"verify_build"`
            BuildDiagnosis          map[string]*builddiag.Diagnosis         `json:"build_diagnosis,omitempty"`
            CleanupResult           map[string]*protocol.CleanupData        `json:"cleanup_result"`
            WiringReport            *protocol.WiringValidationData          `json:"wiring_report,omitempty"`
            IntegrationActionRequired bool                                  `json:"integration_action_required"`
            WiringGaps              []string                                `json:"wiring_gaps,omitempty"`
            BuildPassed             bool                                    `json:"build_passed"`
            Success                 bool                                    `json:"success"`
        }
      location: pkg/engine/finalize.go
    - name: FinalizeWave (updated signature)
      description: |-
        Engine function for the full post-agent finalization pipeline.
        Updated to accept multi-repo via opts and return the canonical FinalizeWaveResult.
        Multi-repo is handled by iterating over repos extracted from file_ownership,
        consistent with the CLI's extractReposFromManifest helper (which moves to engine).
        ClosedLoopRetryEnabled flag in FinalizeWaveOpts activates C2 retry inside
        StepRunGates when a required gate fails. CollisionDetectionEnabled flag
        activates StepCheckTypeCollisions (already in FinalizeWaveOpts).
      definition: |
        func FinalizeWave(ctx context.Context, opts FinalizeWaveOpts) (*FinalizeWaveResult, error)
      location: pkg/engine/finalize.go
    - name: result.GetData() (safe version)
      description: |-
        GetData must not panic when called on a Result with nil Data.
        Instead it returns the zero value of T. The existing doc comment says
        "panicking if result is not successful" — that contract is changed to
        "returning zero value if Data is nil." The IsSuccess() guard pattern
        is still the recommended usage; this change makes defensive callers safe.
      definition: |
        // GetData returns the data payload. Returns the zero value of T if Data is nil.
        // Prefer checking IsSuccess() before calling to ensure meaningful data.
        func (r Result[T]) GetData() T {
            if r.Data == nil {
                var zero T
                return zero
            }
            return *r.Data
        }
      location: pkg/result/result.go
    - name: RunGates (unexported, renamed)
      description: |-
        RunGates is an internal implementation detail used only by RunPostMergeGates
        (intentionally no-cache). It should be unexported (renamed to runGates) so
        callers cannot accidentally use it instead of RunGatesWithCache.
        RunGatesWithCache is the correct public entry point for pre-merge execution.
        RunPreMergeGates and RunPostMergeGates remain the named public wrappers.
        This change is internal to pkg/protocol. Only RunPostMergeGates calls RunGates
        today; making it unexported locks that down.
      definition: |
        // runGates executes quality gates without caching. Internal use only.
        // Callers outside this package must use RunPreMergeGates or RunPostMergeGates.
        func runGates(manifest *IMPLManifest, waveNumber int, repoDir string) result.Result[GatesData]
      location: pkg/protocol/gates.go
