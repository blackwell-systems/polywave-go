            - `engine.FinalizeWave` supports multi-repo via ExtractReposFromManifest
            - `engine.FinalizeWave` supports C2 closed-loop retry via ClosedLoopRetryEnabled
            - `engine.FinalizeWaveResult` is the canonical unified type

            The CLI must become a thin adapter: parse flags, call `engine.FinalizeWave`,
            serialize result to JSON.

            ### What to implement

            **Rewrite `cmd/sawtools/finalize_wave.go`** to:

            1. Keep only `newFinalizeWaveCmd()` — delete `FinalizeWaveResult` (now in engine),
               delete `extractReposFromManifest` (now in engine as ExtractReposFromManifest),
               delete `inferLanguageFromCommand` (duplicate; engine has inferLanguageFromTestCommand).

            2. The command body becomes approximately:
            ```go
            func newFinalizeWaveCmd() *cobra.Command {
                var waveNum int
                var mergeTarget string
                var skipMerge bool

                cmd := &cobra.Command{
                    Use:   "finalize-wave <manifest-path>",
                    Short: "Finalize wave: verify, scan stubs, run gates, merge, verify build, and cleanup",
                    // ... (keep long description, update to note engine handles all steps)
                    Args: cobra.ExactArgs(1),
                    RunE: func(cmd *cobra.Command, args []string) error {
                        manifestPath := args[0]
                        defaultRepoPath := repoDir
                        if defaultRepoPath == "" {
                            defaultRepoPath, _ = os.Getwd()
                        }
                        onEvent := engine.EventCallback(func(step, status, detail string) {
                            if detail != "" {
                                fmt.Fprintf(os.Stderr, "finalize-wave: [%s] %s — %s\n", step, status, detail)
                            } else {
                                fmt.Fprintf(os.Stderr, "finalize-wave: [%s] %s\n", step, status)
                            }
                        })
                        result, err := engine.FinalizeWave(cmd.Context(), engine.FinalizeWaveOpts{
                            IMPLPath:                  manifestPath,
                            RepoPath:                  defaultRepoPath,
                            WaveNum:                   waveNum,
                            MergeTarget:               mergeTarget,
                            SkipMerge:                 skipMerge,
                            Logger:                    newSawLogger(),
                            CollisionDetectionEnabled: true,
                            ClosedLoopRetryEnabled:    true,
                            OnEvent:                   onEvent,
                        })
                        out, _ := json.MarshalIndent(result, "", "  ")
                        fmt.Println(string(out))
                        if err != nil {
                            return fmt.Errorf("finalize-wave: %w", err)
                        }
                        return nil
                    },
                }
                cmd.Flags().IntVar(&waveNum, "wave", 0, "Wave number (required)")
                _ = cmd.MarkFlagRequired("wave")
                cmd.Flags().StringVar(&mergeTarget, "merge-target", "", "Target branch for merge (default: current HEAD)")
                cmd.Flags().BoolVar(&skipMerge, "skip-merge", false, "Skip merge step (merge already done manually); start from verify-build")
                return cmd
            }
            ```

