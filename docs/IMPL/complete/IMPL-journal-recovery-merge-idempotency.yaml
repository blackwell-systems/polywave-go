pre_mortem:
    overall_risk: low
    rows:
        - scenario: E23A context prepending breaks agent prompt formatting
          likelihood: low
          impact: medium
          mitigation: journal.GenerateContext() already produces valid markdown (tested). Orchestrator prepends as-is with clear section header. Test with multi-agent IMPL doc before rollout.
        - scenario: Merge-log tracking misses edge case (e.g., orphaned merge commit)
          likelihood: low
          impact: medium
          mitigation: LoadMergeLog checks git history for merge commits matching 'Merge wave{N}-agent-{ID}' pattern. If log file is lost, operator can reconstruct by running check-merge-state (future enhancement). Document manual recovery in protocol/execution-rules.md.
        - scenario: Journal observer fails silently (e.g., Claude Code session log missing)
          likelihood: low
          impact: low
          mitigation: PrepareAgentContext returns error on journal read failure (differentiated from 'no journal'). Orchestrator logs error and proceeds with empty context (graceful degradation). Agent still functions, just without prior work context.
