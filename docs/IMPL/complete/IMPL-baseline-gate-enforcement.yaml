interface_contracts:
    - name: RunBaselineGates
      description: |
        Dedicated function for running baseline quality gates before worktree creation.
        Wraps RunPreMergeGates with gate-cache integration and structured result output.
        Returns a BaselineResult containing per-gate results and an overall pass/fail.
      definition: |
        // BaselineResult captures the outcome of baseline gate verification (E21A).
        type BaselineResult struct {
            Passed      bool           `json:"passed"`
            GateResults []GateResult   `json:"gate_results"`
            Reason      string         `json:"reason,omitempty"`      // "baseline_verification_failed" on failure
            CommitSHA   string         `json:"commit_sha,omitempty"`  // HEAD at time of check
            FromCache   bool           `json:"from_cache"`            // true if all results served from cache
        }

        // RunBaselineGates executes quality gates against the current codebase
        // (before worktree creation) to verify the baseline is healthy.
        // If cache is non-nil, results are cached keyed by HEAD commit.
        // The waveNumber is used for docs-only wave detection (skip source gates).
        func RunBaselineGates(manifest *IMPLManifest, waveNumber int, repoDir string, cache *gatecache.Cache) (*BaselineResult, error)
      location: pkg/protocol/baseline_gates.go
    - name: FormatBaselineOutput
      description: |
        Formats baseline gate results for human-readable CLI output matching the
        E21A spec format with per-gate PASS/FAIL/SKIP lines.
      definition: |
        // FormatBaselineOutput produces human-readable CLI output for baseline results.
        // Format:
        //   Baseline verification (E21A):
        //     build: PASS
        //     lint: FAIL - pkg/foo/bar.go:10: error message
        //     test: SKIP (lint failed)
        //
        //   Error: baseline verification failed. Fix the codebase before launching agents.
        func FormatBaselineOutput(result *protocol.BaselineResult) string
      location: cmd/saw/baseline_output.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Create `pkg/protocol/baseline_gates.go` with `RunBaselineGates` and
            the `BaselineResult` struct. This function wraps the existing
            `RunPreMergeGates` with gate-cache integration and structured result
            packaging.

            **BaselineResult struct:**
            ```go
            type BaselineResult struct {
                Passed      bool         `json:"passed"`
                GateResults []GateResult `json:"gate_results"`
                Reason      string       `json:"reason,omitempty"`
                CommitSHA   string       `json:"commit_sha,omitempty"`
                FromCache   bool         `json:"from_cache"`
            }
            ```

            **RunBaselineGates function:**
            1. If cache is non-nil, use cache.BuildKey(repoDir) to get HEAD SHA
               for the CommitSHA field. If BuildKey fails, leave CommitSHA empty
               and continue (cache is best-effort).
            2. Call RunPreMergeGates(manifest, waveNumber, repoDir, cache) — this
               already handles cache lookup/store internally via RunGatesWithCache.
            3. Check if any required gate failed. If so, set Passed=false and
               Reason="baseline_verification_failed".
            4. If all results have FromCache=true, set BaselineResult.FromCache=true.
            5. Return the structured BaselineResult.

            **Key constraint:** Do NOT duplicate gate execution logic. Delegate
            entirely to the existing RunPreMergeGates / RunGatesWithCache functions.
            This function is a thin wrapper that adds structured result packaging.

            ## Tests (baseline_gates_test.go)

            1. TestRunBaselineGates_AllPass — mock manifest with gates that pass,
               verify Passed=true, Reason="".
            2. TestRunBaselineGates_RequiredFails — mock manifest with a failing
               required gate, verify Passed=false, Reason="baseline_verification_failed".
            3. TestRunBaselineGates_OptionalFails — optional gate fails, verify
               Passed=true (optional failures don't block).
            4. TestRunBaselineGates_NoGates — manifest with no quality_gates,
               verify Passed=true, empty GateResults.
            5. TestRunBaselineGates_NilCache — verify works with nil cache (no panic).

            Use real exec commands like `echo hello` (pass) and `false` (fail)
            for gate commands in tests. Set repoDir to a temp git repo
            (git init + git commit) so cache key building works.

            ## Verification gate
            ```
            go build ./pkg/protocol/... && go test ./pkg/protocol/... -run TestRunBaselineGates -v
            ```

            ## Constraints
            - Do NOT modify any existing files. Only create new files.
            - Follow existing patterns in pkg/protocol/gates.go for error handling.
            - Import gatecache only for the Cache type parameter and BuildKey call.
          files:
            - pkg/protocol/baseline_gates.go
            - pkg/protocol/baseline_gates_test.go
        - id: B
          task: |
            ## What to implement

            Modify `cmd/saw/prepare_wave.go` to:

            1. **Add --no-cache flag** to the prepare-wave command, following the
               same pattern as run_gates_cmd.go (line 55):
               ```go
               var noCache bool
               cmd.Flags().BoolVar(&noCache, "no-cache", false, "Disable baseline gate result caching")
               ```

            2. **Replace the inline baseline gate logic** (lines 152-178) with a
               call to `protocol.RunBaselineGates`. The current code:
               - Calls RunPreMergeGates with nil cache
               - Manually checks for failures
               - Prints ad-hoc stderr messages

               Replace with:
               ```go
               // Build gate cache (unless --no-cache)
               var cache *gatecache.Cache
               if !noCache {
                   stateDir := filepath.Join(projectRoot, ".saw-state")
                   cache = gatecache.New(stateDir, gatecache.DefaultTTL)
               }

               baselineResult, err := protocol.RunBaselineGates(doc, waveNum, projectRoot, cache)
               if err != nil {
                   return fmt.Errorf("failed to run baseline quality gates: %w", err)
               }

               // Print human-readable output to stderr
               fmt.Fprint(os.Stderr, FormatBaselineOutput(baselineResult))

               if !baselineResult.Passed {
                   // Output structured JSON to stdout for programmatic consumers
                   out, _ := json.MarshalIndent(baselineResult, "", "  ")
                   fmt.Fprintln(cmd.OutOrStdout(), string(out))
                   return fmt.Errorf("baseline verification failed: %s", baselineResult.Reason)
               }
               ```

            3. **Add structured JSON output on failure.** When baseline fails,
               print the BaselineResult as JSON to stdout (for programmatic
               consumers like the web app) AND the human-readable format to
               stderr.

            4. **Add import** for `gatecache` package:
               ```go
               "github.com/blackwell-systems/scout-and-wave-go/pkg/gatecache"
               ```

            ## Tests (prepare_wave_test.go)

            Add these tests to the existing test file:

            1. TestPrepareWaveBaselineResult_JSONSerialization — verify that a
               protocol.BaselineResult round-trips through JSON correctly (similar
               to the existing TestPrepareWaveResult_JSONSerialization pattern).

            Note: Full integration tests for baseline gate behavior require
            git repos and are covered by Agent A's protocol-level tests.

            ## Verification gate
            ```
            go build ./cmd/saw/... && go test ./cmd/saw/... -run TestPrepareWave -v
            ```

            ## Constraints
            - The FormatBaselineOutput function is in baseline_output.go (Agent C's
              file). Import it as a package-local function call (same package main).
            - Keep the existing Step 0b (dependency checking) and Step 0c (wiring
              ownership) untouched. Only replace Step 0b2 (lines 152-178).
            - The --no-cache flag must be added to the cobra command flags, not as
              a package-level var (follow the waveNum pattern using closure scope).
          files:
            - cmd/saw/prepare_wave.go
            - cmd/saw/prepare_wave_test.go
        - id: C
          task: |
            ## What to implement

            Create `cmd/saw/baseline_output.go` with the `FormatBaselineOutput`
            function that formats BaselineResult for human-readable CLI output.

            **FormatBaselineOutput function:**

            ```go
            func FormatBaselineOutput(result *protocol.BaselineResult) string
            ```

            Output format (matching E21A spec):
            ```
            Baseline verification (E21A):
              build: PASS
              lint: FAIL - <first line of stderr or parsed error>
              test: SKIP (lint failed)

            Error: baseline verification failed. Fix the codebase before launching agents.
            ```

            Rules:
            1. Print each gate result as `  {type}: PASS`, `  {type}: FAIL - {detail}`,
               or `  {type}: SKIP ({reason})`.
            2. For FAIL, extract the first meaningful line from Stderr or Stdout.
               If ParsedErrors is non-empty, use the first parsed error's message.
            3. For SKIP (Skipped=true), show the SkipReason in parentheses.
            4. If FromCache is true on the BaselineResult, append
               " (cached at {commit_sha})" to the header line.
            5. If result.Passed, end with: "Baseline verification passed."
            6. If !result.Passed, end with:
               "Error: baseline verification failed. Fix the codebase before launching agents."
            7. Use a strings.Builder for efficient string construction.

            **Package:** This file is in `package main` (cmd/saw/).

            ## Tests (baseline_output_test.go)

            1. TestFormatBaselineOutput_AllPass — all gates pass, verify output
               contains "PASS" for each and ends with "passed".
            2. TestFormatBaselineOutput_OneFails — one gate fails with stderr,
               verify FAIL line includes error detail.
            3. TestFormatBaselineOutput_WithSkipped — skipped gate shows reason.
            4. TestFormatBaselineOutput_CachedResult — FromCache=true, verify
               "(cached at ...)" appears in header.
            5. TestFormatBaselineOutput_EmptyGates — no gate results, verify
               clean output with "passed".
            6. TestFormatBaselineOutput_ParsedErrors — gate with ParsedErrors,
               verify first error message shown in FAIL line.

            ## Verification gate
            ```
            go build ./cmd/saw/... && go test ./cmd/saw/... -run TestFormatBaselineOutput -v
            ```

            ## Constraints
            - Do NOT modify prepare_wave.go (Agent B owns that file).
            - Import protocol types: protocol.BaselineResult, protocol.GateResult.
            - Follow existing cmd/saw/ patterns for package-level helper functions.
          files:
            - cmd/saw/baseline_output.go
            - cmd/saw/baseline_output_test.go
