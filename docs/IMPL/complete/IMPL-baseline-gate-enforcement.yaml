    rows:
        - scenario: Agent A's BaselineResult type not available when B and C compile
          likelihood: low
          impact: medium
          mitigation: |
            All agents are in wave 1 (parallel). Agent B and C reference
            protocol.BaselineResult which Agent A creates. Each agent works in an
            isolated worktree. At merge time A's type definition lands first (or
            alongside), so B and C's references resolve. If build fails at merge,
            it is a straightforward import resolution.
        - scenario: Existing baseline gate code (lines 152-178) has been modified by another PR
          likelihood: low
          impact: low
          mitigation: |
            Agent B's task specifies the exact line range to replace. If lines have
            shifted, the agent should locate the Step 0b2 comment and replace the
            block between it and the Step 0c comment.
        - scenario: Gate cache directory (.saw-state) does not exist on first run
          likelihood: medium
          impact: low
          mitigation: |
            gatecache.New already handles missing directories (creates on first Put).
            No additional handling needed.
