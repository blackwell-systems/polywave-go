            ## Agent D: run_critic_cmd â€” thin adapter refactor

            ### Context
            `cmd/sawtools/run_critic_cmd.go` (~358 lines) contains two commands:
            `newRunCriticCmd()` and `newSetCriticReviewCmd()`. The run-critic logic
