            ## Agent C: run_scout_cmd â€” thin adapter refactor

            ### Context
            `cmd/sawtools/run_scout_cmd.go` (~378 lines) already calls
            `engine.ScoutCorrectionLoop` and `engine.RunScout`, but retains substantial
            cmd-level logic: state-check bypass, slug generation, IMPL dir creation,
