pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent H calls printHumanOutput(cmd, result.InstallResult) but Agent B
            changed the signature of printHumanOutput to accept engine.InstallResult.
            If H is merged before B, the build fails.
          likelihood: medium
          impact: high
          mitigation: |-
            Both agents define their interface_contracts against engine.InstallResult
            (exported). Since both cmd files are in package main and this is a same-wave
            parallel refactor, the merge order matters. finalize-wave merges sequentially
            â€” if B merges first, H will find printHumanOutput already updated. If H merges
            first, the build will fail. Mitigation: during finalize-wave, verify-build runs
            after all merges. If build fails, the closed-loop retry agent will fix the type
            mismatch. The agent should be aware: use engine.InstallResult type everywhere,
            matching Agent B's contract exactly.
        - scenario: |-
            Agent C (run_scout_cmd) calls engine.RunCritic (Agent D's new function) in
            scout_run.go. If C's engine file is compiled independently and D's critic.go
            doesn't exist yet, it will fail to compile.
          likelihood: low
          impact: medium
          mitigation: |-
            Both agents are in the same wave and their engine files are in the same
            package (pkg/engine). The build gate runs after all agents are merged.
            Agent C should define a build-tag-free call to engine.RunCritic â€” since
            both are in package engine, it's just a direct function call. If RunCritic
            doesn't exist when C's worktree is built independently, the worktree build
            may fail. Workaround: Agent C can add a TODO comment and a compile stub
            `// RunCritic defined in critic.go` rather than a full call, and rely on
            the merged build for final verification. Alternatively, define RunCritic
            as a simple stub in scout_run.go with a build constraint if needed.
            Simplest fix: Agent C's scout_run.go calls engine.RunCritic directly â€” since
            they're in the same package, the compiler resolves it at link time, not per-file.
        - scenario: |-
            The init_cmd.go refactor tries to call RunVerifyInstall before it exists
            (worktree builds are per-agent). Agent H's worktree build of pkg/engine/
            will fail because RunVerifyInstall is in Agent B's file.
          likelihood: medium
          impact: low
          mitigation: |-
            Worktree builds are not required to pass independently. The quality gate
            (go build ./...) runs post-merge when all files exist. Each agent only
            needs to produce a git commit on their worktree branch â€” the build gate
            fires after merge. Agent H should note this: their worktree build of
            pkg/engine/init_engine.go will call RunVerifyInstall, which won't be
            found until B's file is merged. This is expected. Agent H's completion
            report should note the cross-agent dependency on Agent B.
        - scenario: |-
            Type name collision: both Agent B and Agent G define structs in pkg/engine/
            with overlapping helper type names (e.g. both might define a local struct
            with a common name).
          likelihood: low
          impact: medium
          mitigation: |-
            Interface contracts explicitly name all exported types. Unexported helpers
            in each engine file use distinctive names scoped to their function. Agent
            authors must check pkg/engine/ for existing type names before defining new
            unexported types. The CheckTypeCollisions step in finalize-wave catches this.
        - scenario: |-
            debug_journal.go's engine file redefines types like FileModification,
            CommandRun, GitCommit that may conflict with types defined elsewhere in engine.
          likelihood: low
          impact: low
          mitigation: |-
            These types are currently in package main (unexported). The engine file
            should define them as exported types with clear names (e.g. JournalFileChange,
            JournalCommand, JournalCommit) to avoid collisions. Agent A should search
            pkg/engine/ for existing definitions of these names before writing.
