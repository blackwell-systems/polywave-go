interface_contracts:
    - name: DebugJournalOpts
      description: |-
        Options struct for engine.DebugJournal. Mirrors the DebugOpts struct
        currently in cmd/sawtools/debug_journal.go but lives in pkg/engine.
      definition: |-
        type DebugJournalOpts struct {
            RepoPath     string // absolute path to the repository root
            AgentPath    string // e.g. "wave1/agent-A" or "wave2-agent-B"
            Summary      bool
            FailuresOnly bool
            Last         int
            Export       string // output path for HTML timeline export
            Force        bool   // overwrite export file if it exists
        }
      location: pkg/engine/debug_journal.go
    - name: DebugJournalResult
      description: |-
        Result struct returned by engine.DebugJournal. Contains filtered entries
        for JSON output and summary stats for human display.
      definition: |-
        type DebugJournalResult struct {
            AgentPath   string              `json:"agent_path"`
            Entries     []journal.ToolEntry `json:"entries"`
            TotalCount  int                 `json:"total_count"`
            FilterCount int                 `json:"filter_count"`
            ExportPath  string              `json:"export_path,omitempty"`
            Summary     *JournalSummary     `json:"summary,omitempty"`
        }

        type JournalSummary struct {
            Duration      string              `json:"duration"`
            FilesModified []FileModification  `json:"files_modified"`
            CommandsRun   []CommandRun        `json:"commands_run"`
            GitCommits    []GitCommit         `json:"git_commits"`
            ReportWritten bool                `json:"report_written"`
        }
      location: pkg/engine/debug_journal.go
    - name: DebugJournal
      description: |-
        Engine function that implements all debug-journal business logic:
        journal loading, filtering, summary generation, and HTML timeline export.
        Returns (DebugJournalResult, error). The cmd file calls this and handles
        JSON output or human-readable printing.
      definition: func DebugJournal(opts DebugJournalOpts) (DebugJournalResult, error)
      location: pkg/engine/debug_journal.go
    - name: VerifyInstallOpts
      description: |-
        Options struct for engine.RunVerifyInstall. The RepoPath is used to find
        saw.config.json. All other check logic (git version, skill dir, binary)
        requires no additional inputs.
      definition: |-
        type VerifyInstallOpts struct {
            RepoPath string // absolute path (for saw.config.json lookup); empty = cwd
        }
      location: pkg/engine/verify_install.go
    - name: InstallCheck
      description: Single prerequisite check result. Matches existing installCheck struct.
      definition: |-
        type InstallCheck struct {
            Name   string `json:"name"`
            Status string `json:"status"` // "pass", "fail", "warn", "skip"
            Detail string `json:"detail"`
        }
      location: pkg/engine/verify_install.go
    - name: InstallResult
      description: |-
        Top-level result for verify-install. Exported from engine so both
        verify_install_cmd.go and init_cmd.go can share the type.
      definition: |-
        type InstallResult struct {
            Checks  []InstallCheck `json:"checks"`
            Verdict string         `json:"verdict"` // "PASS", "PARTIAL", "FAIL"
            Summary string         `json:"summary"`
        }
      location: pkg/engine/verify_install.go
    - name: RunVerifyInstall
      description: |-
        Engine function that runs all prerequisite checks and returns a structured
        result. Replaces runInstallChecks() in cmd. Called by both verify_install_cmd.go
        and init_cmd.go thin adapters.
      definition: func RunVerifyInstall(opts VerifyInstallOpts) InstallResult
      location: pkg/engine/verify_install.go
    - name: RunCriticOpts
      description: |-
        Options struct for engine.RunCritic. Consolidates all run-critic
        business logic: repo root discovery, prompt loading, agent launch,
        result reading.
      definition: |-
        type RunCriticOpts struct {
            IMPLPath    string       // absolute path to IMPL doc (required)
            CriticModel string       // optional model override
            SAWRepoPath string       // optional; falls back to $SAW_REPO then ~/code/scout-and-wave
            Timeout     int          // minutes; default 20
            Logger      *slog.Logger // optional
        }
      location: pkg/engine/critic.go
    - name: RunCriticResult
      description: Result returned by engine.RunCritic after critic agent completes.
      definition: |-
        type RunCriticResult struct {
            Verdict     string `json:"verdict"`      // "PASS" or "ISSUES"
            Summary     string `json:"summary"`
            IssueCount  int    `json:"issue_count"`
            ReviewedAt  string `json:"reviewed_at"`
        }
      location: pkg/engine/critic.go
    - name: RunCritic
      description: |-
        Engine function that runs the critic agent end-to-end: loads IMPL doc,
        discovers repo roots, loads critic-agent.md prompt, launches agent,
        reads critic_report from IMPL doc, and returns verdict. The cmd file
        handles --no-review/--skip shortcut before calling this.
      definition: func RunCritic(ctx context.Context, opts RunCriticOpts, onChunk func(string)) (RunCriticResult, error)
      location: pkg/engine/critic.go
    - name: MarkProgramCompleteOpts
      description: |-
        Options struct for engine.MarkProgramComplete. Consolidates state
        transition, context update, archive, and commit into a single engine call.
      definition: |-
        type MarkProgramCompleteOpts struct {
            ManifestPath string       // absolute path to PROGRAM manifest (required)
            RepoDir      string       // absolute path to repository root (required)
            Date         string       // YYYY-MM-DD; empty = today
            Logger       *slog.Logger // optional
        }
      location: pkg/engine/mark_program_complete.go
    - name: MarkProgramCompleteResult
      description: |-
        Structured result for mark-program-complete. Exported type replaces the
        cmd-local MarkProgramCompleteResult struct.
      definition: |-
        type MarkProgramCompleteResult struct {
            Completed      bool   `json:"completed"`
            ProgramSlug    string `json:"program_slug"`
            Date           string `json:"date"`
            ManifestPath   string `json:"manifest_path"`
            ContextUpdated bool   `json:"context_updated"`
            ContextPath    string `json:"context_path,omitempty"`
            ArchivedPath   string `json:"archived_path,omitempty"`
            CommitSHA      string `json:"commit_sha,omitempty"`
            TiersComplete  int    `json:"tiers_complete"`
            ImplsComplete  int    `json:"impls_complete"`
        }
      location: pkg/engine/mark_program_complete.go
    - name: MarkProgramComplete
      description: |-
        Engine function that verifies all tiers complete, writes the
        SAW:PROGRAM:COMPLETE marker, archives the manifest, updates CONTEXT.md,
        and commits. Returns a structured result.
      definition: func MarkProgramComplete(ctx context.Context, opts MarkProgramCompleteOpts) (MarkProgramCompleteResult, error)
      location: pkg/engine/mark_program_complete.go
    - name: ImportImplsOpts
      description: |-
        Options struct for engine.ImportImpls. Handles IMPL discovery,
        manifest parsing/creation, tier assignment, and PROGRAM manifest save.
      definition: |-
        type ImportImplsOpts struct {
            ProgramPath string   // absolute path to PROGRAM manifest (required)
            FromImpls   []string // explicit IMPL paths; mutually exclusive with Discover
            Discover    bool     // auto-discover IMPL docs in docs/IMPL/ and docs/IMPL/complete/
            RepoDir     string   // absolute repo root for discovery (required when Discover=true)
            Logger      *slog.Logger
        }
      location: pkg/engine/import_impls.go
    - name: ImportImplsResult
      description: |-
        The engine returns protocol.ImportIMPLsData directly.
        protocol.ImportIMPLsData already contains a Created field; no wrapper type is needed.
        The cmd file marshals the returned value to JSON.
      definition: |-
        // ImportImplsResult is an alias for protocol.ImportIMPLsData.
        // The engine returns protocol.ImportIMPLsData directly.
        // See pkg/protocol types for the full struct definition.
        func ImportImpls(ctx context.Context, opts ImportImplsOpts) (protocol.ImportIMPLsData, error)
      location: pkg/engine/import_impls.go
    - name: PrepareAgentOpts
      description: |-
        Options struct for engine.PrepareAgent. Consolidates brief generation,
        ownership manifest write, context_source detection, and journal init.
      definition: |-
        type PrepareAgentOpts struct {
            ManifestPath string       // absolute path to IMPL doc (required)
            ProjectRoot  string       // absolute path to repo root (required)
            WaveNum      int          // wave number (required)
            AgentID      string       // agent letter e.g. "A" (required)
            NoWorktree   bool         // solo agent mode
            Logger       *slog.Logger // optional
        }
      location: pkg/engine/prepare_agent.go
    - name: PrepareAgentResult
      description: |-
        Structured result returned by engine.PrepareAgent. Matches the map
        currently built inline in the cmd file.
      definition: |-
        type PrepareAgentResult struct {
            BriefPath     string `json:"brief_path"`
            BriefLength   int    `json:"brief_length"`
            JournalDir    string `json:"journal_dir"`
            CursorPath    string `json:"cursor_path"`
            IndexPath     string `json:"index_path"`
            ResultsDir    string `json:"results_dir"`
            AgentID       string `json:"agent_id"`
            Wave          int    `json:"wave"`
            FilesOwned    int    `json:"files_owned"`
            ContextSource string `json:"context_source"`
        }
      location: pkg/engine/prepare_agent.go
    - name: PrepareAgent
      description: |-
        Engine function that performs all prepare-agent work: parse IMPL doc,
        find agent task, build brief, write .saw-agent-brief.md and
        .saw-ownership.json, detect context_source, persist to IMPL doc,
        initialize journal observer. Returns PrepareAgentResult.
      definition: func PrepareAgent(opts PrepareAgentOpts) (PrepareAgentResult, error)
      location: pkg/engine/prepare_agent.go
    - name: InitOpts
      description: |-
        Options struct for engine.RunInit. Handles language detection, config
        generation, install checks, and user output messages (returned as strings).
      definition: |-
        type InitOpts struct {
            RepoDir string // absolute path to target directory (required)
            Force   bool   // overwrite existing saw.config.json
            Logger  *slog.Logger
        }
      location: pkg/engine/init_engine.go
    - name: InitResult
      description: |-
        Structured result for sawtools init. The cmd file uses this to print
        install check output and next-step messages.
      definition: |-
        type InitResult struct {
            ConfigPath     string      `json:"config_path"`
            Language       string      `json:"language"`
            ProjectName    string      `json:"project_name"`
            InstallResult  InstallResult `json:"install_result"`
            AlreadyExists  bool        `json:"already_exists,omitempty"`
        }
      location: pkg/engine/init_engine.go
    - name: RunInit
      description: |-
        Engine function that detects project language, generates saw.config.json,
        runs install checks, and returns a structured InitResult. The cmd file
        handles --force validation and printing next-step messages.
        Calls RunVerifyInstall internally (both defined in pkg/engine/).
      definition: func RunInit(opts InitOpts) (InitResult, error)
      location: pkg/engine/init_engine.go
