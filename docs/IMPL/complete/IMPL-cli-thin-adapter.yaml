title: CLI Thin Adapter Refactor
feature_slug: cli-thin-adapter
verdict: SUITABLE
suitability_assessment: |-
    All 8 commands have independent business logic with no shared state between
    refactors. Each command maps to a disjoint (cmd file, engine file) pair.
    File ownership is cleanly disjoint across all 8 agents â€” no two agents touch
    the same file. The finalize_wave.go refactor is the proven reference pattern:
    move all business logic to pkg/engine/, reduce cmd file to flag parsing +
    JSON output (~50-80 lines).

    One cross-agent interface dependency exists: init_cmd.go currently calls
    runInstallChecks() from verify_install_cmd.go (same package main). After
    refactoring, init_cmd.go will call engine.RunVerifyInstall() instead.
    Since init_cmd.go (Agent H) and verify_install_cmd.go (Agent B) own disjoint
    files, both can be in wave 1 â€” Agent H's cmd file will be written to call
    engine.RunVerifyInstall() matching the contract defined in this IMPL doc.
    No runtime dependency between worktrees; each agent writes its own files.
test_command: go test ./...
lint_command: go vet ./...
