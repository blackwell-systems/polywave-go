            7. Calls engine.FinalizeIMPLEngine for gate population
            8. If !NoCritic and criticThresholdMet: calls engine.RunCritic (Agent D's new function)
            9. Returns RunScoutFullResult

            Move helper functions from cmd to engine:
            - `generateSlug(feature string) string` â€” move to scout_run.go
            - `waitForFile(path string, maxWait time.Duration) bool` â€” move to scout_run.go
