            The existing `engine.RunScout` in `pkg/engine/runner.go` handles only the
            raw agent launch. The new file `pkg/engine/scout_run.go` adds the full
            orchestration wrapper above it.

            ### What to implement

            **File 1: `pkg/engine/scout_run.go`** (new file, ~200 lines)

            Add `RunScoutFullOpts` struct:
            ```go
            type RunScoutFullOpts struct {
                Feature             string
                RepoPath            string
                SAWRepoPath         string
                ScoutModel          string
                Timeout             int    // minutes; default 10
                ProgramManifestPath string
                NoCritic            bool
                CriticModel         string
                Logger              *slog.Logger
            }
            ```

            Add `RunScoutFullResult` struct:
            ```go
            type RunScoutFullResult struct {
                IMPLPath       string `json:"impl_path"`
                Slug           string `json:"impl_slug"`
                GatesPopulated int    `json:"gates_populated"`
                CriticVerdict  string `json:"critic_verdict,omitempty"`
            }
            ```

            Add `RunScoutFull(ctx context.Context, opts RunScoutFullOpts, onChunk func(string)) (RunScoutFullResult, error)` that:
            1. Resolves repoPath (absolute); generates slug via generateSlug (move from cmd)
            2. Computes implPath via protocol.IMPLPath; checks if IMPL doc already exists
               with advanced state (StateReviewed+) â€” returns early with result if so
            3. Creates docs/IMPL dir via os.MkdirAll
            4. Calls engine.ScoutCorrectionLoop with ScoutCorrectionOpts{MaxRetries: 3}
            5. Waits for IMPL file (10s poll, 500ms interval)
            6. Calls protocol.ValidateIMPLDoc; handles agent-ID errors with idgen.AssignAgentIDs
