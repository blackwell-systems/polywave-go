            6. Set timeout context (opts.Timeout minutes, default 20)
            7. Determine workDir from repoPaths[0] or filepath.Dir(implPath)
            8. Init backend via orchestrator.NewBackendFromModel(opts.CriticModel)
            9. Launch agent via agent.NewRunner(b, nil).ExecuteStreamingWithTools
            10. Reload manifest post-execution; call protocol.GetCriticReview
            11. Return RunCriticResult{Verdict, Summary, IssueCount, ReviewedAt}

            Move helpers from cmd to engine (unexported):
            - `collectRepoPaths(manifest *protocol.IMPLManifest) []string`
            - `inferRepoRoot(implPath string) string`

            Package: `package engine`
            Imports: `pkg/agent`, `pkg/orchestrator`, `pkg/protocol`, `os`, `path/filepath`, etc.

