            ## Agent A: debug_journal â€” thin adapter refactor

            ### Context
            `cmd/sawtools/debug_journal.go` (~744 lines) contains all debug-journal
            business logic: journal loading, filtering, HTML timeline generation, and
            summary printing. The reference pattern is `cmd/sawtools/finalize_wave.go`
            (79 lines): flag parsing + engine call + JSON output only.

            ### What to implement

            **File 1: `pkg/engine/debug_journal.go`** (new file, ~300 lines)
            Move ALL business logic from cmd/sawtools/debug_journal.go to this file:
            - `DebugJournalOpts` struct (see interface_contracts)
            - `DebugJournalResult` struct (see interface_contracts)
            - `JournalSummary` struct
            - `FileModification`, `CommandRun`, `GitCommit`, `GateStatus` types
            - `DebugJournal(opts DebugJournalOpts) (DebugJournalResult, error)` â€” main engine fn
            - `loadJournalEntries(journalPath string) ([]journal.ToolEntry, error)`
            - `filterFailedEntries(entries []journal.ToolEntry) []journal.ToolEntry`
            - `buildJournalSummary(agentPath string, all, display []journal.ToolEntry) *JournalSummary`
            - `exportHTMLTimeline(entries []journal.ToolEntry, agentPath, exportPath string, force bool) error`
            - `generateTimelineHTML(entries []journal.ToolEntry, agentPath string) string`
            - All helper extract* functions and formatDuration/formatFileChange

            The engine fn logic:
            1. Resolve absRepoRoot; construct journalPath from .saw-state/<agentPath>/index.jsonl
            2. Stat journalPath; return error if missing (same error message as today)
            3. Load entries; apply FailuresOnly filter; apply Last filter
            4. If Export != "": call exportHTMLTimeline; return result with ExportPath set
            5. Populate Summary if opts.Summary is true
            6. Always populate Entries (filtered) and TotalCount/FilterCount
            7. Return result, nil

            Package: `package engine`
            Imports: `pkg/journal`, `html`, `bufio`, `regexp`, `strings`, `time`, etc.

            **File 2: `cmd/sawtools/debug_journal.go`** (modify, reduce to ~60 lines)
            Reduce to thin adapter:
            - Keep `newDebugJournalCmd()` cobra.Command (flag parsing only)
            - Keep `DebugOpts` struct (local, used for flag binding; map to engine.DebugJournalOpts)
            - `RunE` calls `engine.DebugJournal(engine.DebugJournalOpts{...})`
            - On success: if Summary or Export, let engine handle display (engine prints to stdout
              for summary; cmd prints ExportPath confirmation). For raw JSONL output, iterate
              result.Entries and json.Marshal each.
            - DELETE all business logic functions (loadJournalEntries, filterFailedEntries,
              printSummary, exportHTMLTimeline, generateTimelineHTML, all helper types and extract* fns)

            ### Design note on output
            The engine DebugJournal function populates result.Entries for raw JSONL mode.
            For Summary mode, the engine populates result.Summary with the structured data.
            The cmd file is responsible for printing: raw JSONL iterates entries, summary
            prints the JournalSummary fields, export prints the path. This keeps formatting
            in the cmd layer (consistent with the reference pattern where the engine returns
            data and the cmd handles output).

            ### Tests
            No new test file required (the existing cmd has no unit tests). The engine
            package builds clean = sufficient verification gate.

            ### Verification gate
            Run: `go build ./cmd/sawtools/... && go build ./pkg/engine/...`
            Both must compile without errors. Run `go test ./pkg/engine/...` â€” must pass.
          files:
            - cmd/sawtools/debug_journal.go
            - pkg/engine/debug_journal.go
