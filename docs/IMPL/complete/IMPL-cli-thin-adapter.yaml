            ### What to implement

            **File 1: `pkg/engine/critic.go`** (new file, ~150 lines)

            Add structs and function per interface_contracts:
            - `RunCriticOpts` struct
            - `RunCriticResult` struct
            - `RunCritic(ctx context.Context, opts RunCriticOpts, onChunk func(string)) (RunCriticResult, error)`

            RunCritic logic:
            1. Stat implPath; load manifest via protocol.Load
            2. Collect repo roots via collectRepoPaths(manifest); fallback via inferRepoRoot
            3. Resolve sawRepo (opts.SAWRepoPath â†’ $SAW_REPO â†’ ~/code/scout-and-wave)
