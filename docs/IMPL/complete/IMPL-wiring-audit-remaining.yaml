pre_mortem:
    overall_risk: low
    rows:
        - scenario: modernc.org/sqlite adds significant binary size or build time
          likelihood: medium
          impact: low
          mitigation: |
            Pure Go SQLite adds ~10MB to binary and ~30s to first build.
            This is acceptable for a CLI tool. If unacceptable, switch to
            a simpler JSON-file-backed store as fallback.
        - scenario: activity.go types (Commit, Branch) are imported by web app indirectly
          likelihood: low
          impact: high
          mitigation: |
            Agent B must verify zero references across both repos before deleting.
            The grep check in the task is mandatory, not optional. If any reference
            is found, skip the deletion and document the finding.
        - scenario: Event JSON deserialization loses type information on QueryEvents
          likelihood: medium
          impact: medium
          mitigation: |
            Store the event type as a top-level column. On read, use the type column
            to determine which concrete struct to unmarshal into. Test round-trip for
            all three event types.
        - scenario: go.mod conflict if modernc.org/sqlite has transitive dependency issues
          likelihood: low
          impact: medium
          mitigation: |
            Run go mod tidy after implementation. If dependency conflicts arise,
            pin to a known-good version. The orchestrator handles go.mod as a
            shared file post-merge.
