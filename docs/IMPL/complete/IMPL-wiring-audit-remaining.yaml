interface_contracts:
    - name: sqlite.Open
      description: |
        Constructor for SQLite-backed observability Store. Creates or opens the
        database file at the given path, runs schema migrations, and returns a
        Store implementation.
      definition: |
        // Package sqlite provides a SQLite-backed implementation of observability.Store.
        package sqlite

        import "github.com/blackwell-systems/scout-and-wave-go/pkg/observability"

        // Open creates or opens a SQLite database at path and returns an
        // observability.Store. The database schema is created automatically
        // if it does not exist. Uses modernc.org/sqlite (pure Go, no CGo).
        func Open(path string) (observability.Store, error)
      location: pkg/observability/sqlite/sqlite.go
    - name: openStore (CLI wiring)
      description: |
        The existing openStore function in cmd/saw/observability_metrics.go must
        be updated to call sqlite.Open instead of returning an error.
      definition: |
        // openStore creates an observability.Store from the given DSN.
        // Updated to use sqlite.Open for file-path DSNs.
        func openStore(dsn string) (obs.Store, error)
      location: cmd/saw/observability_metrics.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## SQLite Observability Store Implementation

            ### What to implement
            Create a SQLite-backed implementation of the `observability.Store` interface
            defined in `pkg/observability/store.go`. This is the critical missing piece
            that blocks the entire observability subsystem.

            ### Files to create/modify

            **1. NEW: `pkg/observability/sqlite/sqlite.go`**
            - Implement `func Open(path string) (observability.Store, error)`
            - Use `modernc.org/sqlite` (pure Go, no CGo) as the driver via `database/sql`
            - Create schema on first open:
              ```sql
              CREATE TABLE IF NOT EXISTS events (
                id TEXT PRIMARY KEY,
                type TEXT NOT NULL,
                time TEXT NOT NULL,
                data TEXT NOT NULL
              );
              CREATE INDEX IF NOT EXISTS idx_events_type ON events(type);
              CREATE INDEX IF NOT EXISTS idx_events_time ON events(time);
              ```
            - Store events as JSON in the `data` column (simple, flexible schema)
            - Implement `RecordEvent`: INSERT event as JSON
            - Implement `QueryEvents`: SELECT with WHERE clauses built from QueryFilters
              (event types, impl slugs, program slugs, agent IDs, time range, limit, offset)
            - Implement `GetRollup`: Delegate to in-Go aggregation — query events matching
              the RollupRequest filters, then aggregate in Go code (reuse the same pattern
              as the existing rollup functions in pkg/observability/rollups.go)
            - Implement `Close`: close the *sql.DB

            **2. NEW: `pkg/observability/sqlite/sqlite_test.go`**
            - Test Open with temp file path
            - Test RecordEvent + QueryEvents round-trip for each event type
              (CostEvent, AgentPerformanceEvent, ActivityEvent)
            - Test QueryFilters: by event type, by impl slug, by time range, limit
            - Test GetRollup for cost type
            - Test Close is idempotent
            - Test Open with nonexistent parent directory (should error or create)

            **3. MODIFY: `cmd/saw/observability_metrics.go`**
            - Update `openStore()` function (line 113-135) to import and call
              `sqlite.Open(dsn)` instead of returning the "not yet available" error
            - Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/observability/sqlite"`
            - Keep the PostgreSQL "not yet implemented" error as-is
            - Keep the directory creation logic as-is

            ### Interface contract
            The Store interface is already defined — implement it exactly:
            ```go
            RecordEvent(ctx context.Context, event Event) error
            QueryEvents(ctx context.Context, filters QueryFilters) ([]Event, error)
            GetRollup(ctx context.Context, rollup RollupRequest) (*RollupResult, error)
            Close() error
            ```

            ### Verification gate
            ```
            go build ./pkg/observability/sqlite/... && go test ./pkg/observability/sqlite/... -v && go vet ./pkg/observability/...
            ```

            ### Constraints
            - Use `modernc.org/sqlite` (pure Go) — NOT `mattn/go-sqlite3` (requires CGo)
            - The go.mod dependency addition will be handled by `go mod tidy` after implementation
            - Event JSON serialization must handle all three concrete types (CostEvent,
              AgentPerformanceEvent, ActivityEvent) with proper type discrimination on read
            - Store the `type` field as a top-level column for efficient filtering
            - Use `time.RFC3339Nano` for timestamp storage
          files:
            - pkg/observability/sqlite/sqlite.go
            - pkg/observability/sqlite/sqlite_test.go
            - cmd/saw/observability_metrics.go
