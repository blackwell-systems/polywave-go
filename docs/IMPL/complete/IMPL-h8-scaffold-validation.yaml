            ## What to Implement

            Create the validation result types for scaffold validation. These types represent the structured output of the validation pipeline (syntax, imports, type references, build).

            ## Interfaces to Implement

            ```go
            // pkg/scaffoldval/types.go
            package scaffoldval

            // ValidationResult is the complete result of scaffold validation
            type ValidationResult struct {
              Syntax         ValidationStep `yaml:"syntax"`
              Imports        ValidationStep `yaml:"imports"`
              TypeReferences ValidationStep `yaml:"type_references"`
              Build          ValidationStep `yaml:"build"`
            }

            // ValidationStep represents a single validation check
            type ValidationStep struct {
              Status      string   `yaml:"status"` // PASS | FAIL | SKIP
              Errors      []string `yaml:"errors,omitempty"`
              Fixes       []string `yaml:"fixes,omitempty"`
              AutoFixable bool     `yaml:"auto_fixable,omitempty"`
            }

            // NewValidationResult creates a ValidationResult with all steps in SKIP state
            func NewValidationResult() *ValidationResult {
              return &ValidationResult{
                Syntax:         ValidationStep{Status: "SKIP"},
                Imports:        ValidationStep{Status: "SKIP"},
                TypeReferences: ValidationStep{Status: "SKIP"},
                Build:          ValidationStep{Status: "SKIP"},
              }
            }

            // OverallStatus returns PASS if all steps passed, FAIL if any failed
            func (r *ValidationResult) OverallStatus() string {
              if r.Syntax.Status == "FAIL" || r.Imports.Status == "FAIL" ||
                 r.TypeReferences.Status == "FAIL" || r.Build.Status == "FAIL" {
                return "FAIL"
              }
              return "PASS"
            }
            ```

            ## Interfaces to Call

            None - these are data types only.

            ## Tests to Write

            1. `TestNewValidationResult` - creates result with all SKIP status
            2. `TestValidationResult_OverallStatus_AllPass` - returns PASS when all pass
            3. `TestValidationResult_OverallStatus_OneFail` - returns FAIL when any step fails
            4. `TestValidationResult_OverallStatus_AllSkip` - returns PASS when all skipped
            5. `TestValidationStep_YAMLSerialization` - validates YAML output format

            ## Verification Gate

            ```bash
            go build ./pkg/scaffoldval/...
            go vet ./pkg/scaffoldval/...
            go test ./pkg/scaffoldval/... -v
            ```

            ## Constraints

            - Use YAML tags for all fields (output format is YAML)
            - Status values are uppercase: "PASS", "FAIL", "SKIP"
            - Omit empty slices in YAML output (use `omitempty`)
            - OverallStatus logic: any FAIL â†’ FAIL, else PASS
