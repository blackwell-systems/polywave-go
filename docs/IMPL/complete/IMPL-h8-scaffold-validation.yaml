            }' > /tmp/scaffold.go

            ./sawtools validate-scaffold /tmp/scaffold.go --impl-doc docs/IMPL/IMPL-h8-scaffold-validation.yaml
            ```

            ## Constraints

            - Exit code 0 if PASS, 1 if FAIL (for CI integration)
            - Require --impl-doc flag (needed for build command extraction)
            - Output YAML (not JSON)
            - Add command to main.go's rootCmd.AddCommand() list
