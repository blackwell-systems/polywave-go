            ## What to Implement

            Create the `sawtools validate-scaffold` CLI command that invokes the validator and outputs YAML results.

            ## Interfaces to Implement

            ```go
            // cmd/saw/validate_scaffold_cmd.go
            package main

            import (
              "fmt"
              "os"
              "github.com/spf13/cobra"
              "gopkg.in/yaml.v3"
              "github.com/blackwell-systems/scout-and-wave-go/pkg/scaffoldval"
            )

            func newValidateScaffoldCmd() *cobra.Command {
              var implDoc string

              cmd := &cobra.Command{
                Use:   "validate-scaffold <scaffold-file>",
                Short: "Validate scaffold file before committing",
                Long: `Runs validation pipeline on scaffold file:
            1. Syntax check (parses Go AST)
            2. Import resolution (checks if imports exist)
            3. Type references (checks for undeclared types)
            4. Partial build (compiles scaffold in isolation)

            Outputs structured YAML with pass/fail status per step.`,
                Args: cobra.ExactArgs(1),
                RunE: func(cmd *cobra.Command, args []string) error {
                  scaffoldPath := args[0]

                  if implDoc == "" {
                    return fmt.Errorf("--impl-doc is required")
                  }

                  // Run validation
                  result, err := scaffoldval.ValidateScaffold(scaffoldPath, implDoc)
                  if err != nil {
                    return fmt.Errorf("validation failed: %w", err)
                  }

                  // Output YAML
                  enc := yaml.NewEncoder(os.Stdout)
                  if err := enc.Encode(result); err != nil {
                    return fmt.Errorf("failed to encode result: %w", err)
                  }

                  // Exit code: 0 if PASS, 1 if FAIL
                  if result.OverallStatus() == "FAIL" {
                    os.Exit(1)
                  }

                  return nil
                },
              }

              cmd.Flags().StringVar(&implDoc, "impl-doc", "", "Path to IMPL doc (for build command extraction)")
              cmd.MarkFlagRequired("impl-doc")

              return cmd
            }
            ```

            ## Interfaces to Call

            - `scaffoldval.ValidateScaffold(scaffoldPath, implDoc)` â€” run validation
            - `yaml.NewEncoder(os.Stdout).Encode(result)` â€” output YAML
            - `result.OverallStatus()` â€” get overall PASS/FAIL

            ## Tests to Write

            1. `TestValidateScaffoldCmd_Valid` - exit 0 for valid scaffold
            2. `TestValidateScaffoldCmd_Invalid` - exit 1 for invalid scaffold
            3. `TestValidateScaffoldCmd_MissingImplDoc` - returns error when --impl-doc not provided
            4. `TestValidateScaffoldCmd_FileNotFound` - returns error for missing scaffold file
            5. `TestValidateScaffoldCmd_YAMLOutput` - validates YAML output format

            ## Verification Gate

            ```bash
            go build ./cmd/saw/...
            go vet ./cmd/saw/...
            go test ./cmd/saw/... -run TestValidateScaffold -v

