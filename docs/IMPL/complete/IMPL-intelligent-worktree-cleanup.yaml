title: Intelligent Worktree Lifecycle Management
feature_slug: intelligent-worktree-cleanup
verdict: SUITABLE
suitability_assessment: |
    1. File decomposition: 12+ files across two repos (scout-and-wave-go and
       scout-and-wave-web), cleanly decomposable into 6 agents across 3 waves.
       Core detection logic (Go engine) is independent of web integration (server
       startup, periodic cleanup, frontend). No single-file bottleneck.

    2. Investigation-first items: None. The problem is well-understood — stale
       worktrees accumulate after IMPL completion. Branch naming patterns are
       known (saw/{slug}/wave{N}-agent-{X}). No root cause analysis needed.

    3. Interface discoverability: Yes. The core interface is DetectStaleWorktrees
       which returns []StaleWorktree. All downstream consumers (CLI command,
       mark-complete integration, web server, resume-detect) depend on this
       single function signature which can be defined upfront.

    4. Pre-implementation status: prepare-wave already has partial stale cleanup
       (lines 128-150 of worktree.go clean merged branches before creating new
       ones). resume-detect already detects orphaned worktrees but does not
       filter by completed IMPL status. The worktree_handler.go in web has
       basic stale detection (24h threshold) but not IMPL-aware logic.
       All requirements are TODO or PARTIAL.

    5. Parallelization value: High. Go build+test cycle is >30s. 6 agents
       across 3 waves with 2-4 files each. Wave 1 (3 agents) provides
       significant parallelism for the core detection, CLI command, and
       resume-detect filtering.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (6 agents, ~8 min avg, 3 waves)
    - Merge & verification: ~5 min
    Total SAW time: ~28 min

    Sequential baseline: ~48 min (6 agents x 8 min avg)
    Time savings: ~20 min (42% faster)

    Recommendation: Clear speedup. Proceed.
