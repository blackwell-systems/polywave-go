pre_mortem:
    overall_risk: low
    rows:
        - scenario: DetectStaleWorktrees is slow on repos with many worktrees
          likelihood: low
          impact: low
          mitigation: |
            The function runs git worktree list (fast) and checks file existence
            (fast). Even with 50+ worktrees, this completes in <1s. The periodic
            background loop runs every 30 minutes so latency is not user-facing.
        - scenario: Auto-cleanup on mark-complete removes worktrees that another tool is using
          likelihood: low
          impact: medium
          mitigation: |
            mark-complete only cleans worktrees whose branch slug matches the
            completed IMPL. Cross-IMPL worktrees are never touched. The force
            flag is used because the IMPL was just archived — those worktrees
            are definitionally stale.
        - scenario: Race condition between periodic cleanup and manual wave operations
          likelihood: low
          impact: medium
          mitigation: |
            CleanStaleWorktrees only targets branches from completed IMPLs or
            merged branches. Active wave worktrees belong to active IMPLs and
            are never in the stale set. The worst case is a cleanup runs during
            prepare-wave for the same slug — but prepare-wave already handles
            stale worktree cleanup itself.
        - scenario: Legacy branches (no slug prefix) cannot be classified
          likelihood: medium
          impact: low
          mitigation: |
            DetectStaleWorktrees skips legacy format branches that have no slug.
            These require manual cleanup via the existing UI. This is acceptable
            because legacy branches are from pre-v0.39.0 and will eventually
            disappear as old IMPLs are cleaned up.
