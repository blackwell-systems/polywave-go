pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent D's ValidationError struct change causes compilation errors in untouched validator files
          likelihood: low
          impact: low
          mitigation: |
            New fields are additive with omitempty tags. Existing ValidationError{...}
            literal constructions remain valid because Go allows partial struct initialization.
        - scenario: L1 prompt error change breaks existing RunScout integration tests
          likelihood: medium
          impact: low
          mitigation: |
            Agent C should check runner_test.go and runner_automation_test.go for tests
            that rely on the fallback behavior and update them to provide a valid scout.md
            path or mock the file read.
        - scenario: L3 multi-repo consolidation changes break prepare-wave CLI behavior
          likelihood: low
          impact: medium
          mitigation: |
            Agent E has ownership of prepare_wave_test.go. Existing tests for
            resolveAgentRepoRoot cover the edge cases; they should be migrated to test
            protocol.ResolveAgentRepo with identical assertions.
        - scenario: M1 transaction wrapper snapshot/restore logic has edge cases with concurrent manifest writes
          likelihood: low
          impact: medium
          mitigation: |
            RunWaveTransaction operates on a single IMPL doc path. The snapshot is a
            deep copy of state fields. Concurrent writes from other processes are not
            in scope (same as existing FinalizeWave).
