interface_contracts:
    - name: RunWaveTransaction
      description: |
        Atomic wrapper around RunWaveFull that commits state only after all
        steps succeed. On failure, rolls back IMPL doc state to pre-execution.
      definition: |
        // RunWaveTransactionOpts configures the atomic wave execution wrapper.
        type RunWaveTransactionOpts struct {
            IMPLPath    string
            RepoPath    string
            WaveNum     int
            MergeTarget string
            ObsEmitter  *observability.Emitter
        }

        // RunWaveTransaction executes FinalizeWave atomically: on any step failure,
        // the IMPL doc state is rolled back to its value before execution began.
        // Returns (*FinalizeWaveResult, error).
        func RunWaveTransaction(ctx context.Context, opts RunWaveTransactionOpts) (*FinalizeWaveResult, error)
      location: pkg/engine/run_wave_atomic.go
    - name: FinalizeWaveOpts enforcement fields
      description: |
        Two new boolean fields on FinalizeWaveOpts that make stub detection (E20)
        and integration validation (E25) fatal when enabled.
      definition: |
        // Added to existing FinalizeWaveOpts struct:
        EnforceIntegrationValidation bool  // When true, unconnected exports block merge
        RequireNoStubs               bool  // When true, TODO/FIXME in changed files block merge
      location: pkg/engine/finalize.go
    - name: ResolveAgentRepo
      description: |
        Unified function consolidating determineAgentRepo (pkg/protocol/worktree.go)
        and resolveAgentRepoRoot (cmd/saw/prepare_wave.go) into a single entry point.
      definition: |
        // ResolveAgentRepo returns the absolute repo root path for an agent.
        // It looks up the agent's repo name from fileOwnership, then resolves
        // the path from the repos registry. Falls back to fallbackRoot if the
        // agent has no repo field or the repo is not found in the registry.
        func ResolveAgentRepo(
            fileOwnership []FileOwnership,
            agentID string,
            fallbackRoot string,
            repos []RepoEntry,
        ) string
      location: pkg/protocol/multi_repo.go
    - name: ValidationError enhanced struct
      description: |
        Extended ValidationError with Slug, Wave, AgentID context fields for
        consistent debugging output across all validators.
      definition: |
        type ValidationError struct {
            Code    string `json:"code"`
            Message string `json:"message"`
            Field   string `json:"field,omitempty"`
            Line    int    `json:"line,omitempty"`
            Slug    string `json:"slug,omitempty"`
            Wave    int    `json:"wave,omitempty"`
            AgentID string `json:"agent_id,omitempty"`
        }
      location: pkg/protocol/types.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## M1: Atomic RunWave Transaction Wrapper

            **What to implement:**
            Create `pkg/engine/run_wave_atomic.go` with a `RunWaveTransaction` function
            that wraps `FinalizeWave` with rollback semantics.

            **Design:**
            1. Define `RunWaveTransactionOpts` struct (same fields as `FinalizeWaveOpts`
               plus any transaction-specific config).
            2. Before calling `FinalizeWave`, snapshot the current IMPL doc state by
               loading the manifest and saving key fields (state, merge_state,
               completion_reports).
            3. Call `FinalizeWave` with the opts.
            4. If `FinalizeWave` returns an error, restore the IMPL doc to the
               snapshotted state by reloading, resetting fields, and saving.
            5. If `FinalizeWave` succeeds, no rollback needed.

            **Key details:**
            - The snapshot must capture: `manifest.State`, `manifest.MergeState`,
              and the wave's completion reports.
            - Rollback means: reload manifest from disk, reset state/merge_state to
              snapshot values, save manifest back. This handles partial state written
              by FinalizeWave substeps.
            - Import `pkg/protocol` for Load/Save and `pkg/observability` for emitter.
            - Follow existing patterns in `pkg/engine/finalize.go` and
              `pkg/engine/run_wave_full.go`.

            **Tests:** Create `pkg/engine/run_wave_atomic_test.go` with:
            - Test that successful execution returns result with Success=true
            - Test that failure mid-pipeline rolls back IMPL state
            - Use a temp IMPL YAML file for testing (see finalize_test.go patterns)

            **Verification gate:**
            ```
            go build ./pkg/engine/... && go test ./pkg/engine/ -run TestRunWaveTransaction -v
            ```

            **Constraints:**
            - Only create/modify files in your ownership list
            - Do not modify finalize.go (Agent B owns it)
            - Follow existing error message patterns: "engine.FunctionName: description"
          files:
            - pkg/engine/run_wave_atomic.go
            - pkg/engine/run_wave_atomic_test.go
        - id: B
          task: |
            ## M2 + M3: Integration Validation and Stub Detection Enforcement

            **What to implement:**
            Modify `pkg/engine/finalize.go` to add two new boolean fields to
            `FinalizeWaveOpts` and enforce them in the `FinalizeWave` pipeline.

            **M2 — Integration validation enforcement (E25):**
            1. Add `EnforceIntegrationValidation bool` to `FinalizeWaveOpts`.
            2. In Step 3.5 of `FinalizeWave`, after `ValidateIntegration()` returns,
               check: if `opts.EnforceIntegrationValidation` is true AND the
               integration report has unconnected exports (gaps), return a fatal error
               that blocks the pipeline before merge (Step 4).
            3. Keep existing non-fatal behavior as default when the bool is false.

            **M3 — Mandatory stub detection (E20):**
            1. Add `RequireNoStubs bool` to `FinalizeWaveOpts`.
            2. In Step 2 of `FinalizeWave`, after `ScanStubs()` returns, check:
               if `opts.RequireNoStubs` is true AND `len(stubResult.Hits) > 0`,
               return a fatal error that blocks
               the pipeline before gates (Step 3).
            3. Keep existing non-fatal behavior as default when the bool is false.

            **Key details:**
            - `FinalizeWaveResult` struct does NOT need changes — errors are returned
              via the error return value, same as existing fatal failures.
            - Check `protocol.IntegrationReport` for its fields to determine
              how to detect unconnected exports (look for `Gaps` or similar field).
            - `protocol.ScanStubsResult` has a `Hits` field (`[]StubHit`).
              Check `len(stubResult.Hits) > 0` to detect stubs.

            **Tests:** Add tests to `pkg/engine/finalize_test.go`:
            - Test M2: FinalizeWave with EnforceIntegrationValidation=true and
              unconnected exports returns error before merge
            - Test M3: FinalizeWave with RequireNoStubs=true and stubs present
              returns error before merge
            - Test default behavior (both false) is unchanged

            **Verification gate:**
            ```
            go build ./pkg/engine/... && go test ./pkg/engine/ -run TestFinalizeWave -v
            ```

            **Constraints:**
            - Only modify files in your ownership list
            - Do not change FinalizeWaveResult struct (result type stays the same)
            - Preserve backward compatibility: default (false) = existing behavior
          files:
