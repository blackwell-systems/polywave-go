          task: |
            ## L3: Consolidate Multi-Repo Resolution Logic

            **What to implement:**
            Extract a unified `ResolveAgentRepo()` function into
            `pkg/protocol/multi_repo.go` and update all callers to use it.

            **Step 1 — Create pkg/protocol/multi_repo.go:**
            ```go
            package protocol

            // ResolveAgentRepo returns the absolute repo root path for an agent.
            // It looks up the agent's repo name from fileOwnership, then resolves
            // the path from the repos registry. Falls back to fallbackRoot if the
            // agent has no repo field or the repo is not found in the registry.
            func ResolveAgentRepo(
                fileOwnership []FileOwnership,
                agentID string,
                fallbackRoot string,
                repos []RepoEntry,
            ) string {
                repoName := ""
                for _, fo := range fileOwnership {
                    if fo.Agent == agentID && fo.Repo != "" {
                        repoName = fo.Repo
                        break
                    }
                }
                if repoName == "" {
                    return fallbackRoot
                }
                for _, r := range repos {
                    if r.Name == repoName {
                        return r.Path
                    }
                }
                return fallbackRoot
            }
            ```
            This is the superset of `determineAgentRepo` (worktree.go) and
            `resolveAgentRepoRoot` (cmd/saw/prepare_wave.go).

            **Step 2 — Update callers in pkg/protocol/worktree.go:**
            Replace calls to `determineAgentRepo(doc.FileOwnership, agent.ID)` with
            `ResolveAgentRepo(doc.FileOwnership, agent.ID, repoRoot, nil)` where
            `repoRoot` is the existing fallback parameter. Note: the worktree.go
            callers currently only use the repo name (not path), so when repos is
            nil, the function falls back to fallbackRoot which matches current behavior.

            Actually, the existing callers in worktree.go use determineAgentRepo to
            get a repo NAME (not path). The new function returns a PATH. So:
            - Keep `determineAgentRepo` as a thin wrapper or inline its logic, but
              have it call `ResolveAgentRepo` internally, OR
            - Change the worktree.go callers to use the name differently.

            Review the actual usage in worktree.go lines 89, 107 to understand whether
            the caller needs a name or a path, and adapt accordingly.

            **Step 3 — Update cmd/saw/prepare_wave.go:**
            Replace the local `resolveAgentRepoRoot()` function with a call to
            `protocol.ResolveAgentRepo()`. Remove the local function definition.
            Update the call site at line 439.

            **Step 4 — Update pkg/protocol/cleanup.go:**
            Replace the call to `determineAgentRepo()` at line 98 similarly.

            **Tests:** Create `pkg/protocol/multi_repo_test.go`:
            - Test with agent that has repo field and matching registry entry
            - Test with agent that has repo field but no registry match (fallback)
            - Test with agent that has no repo field (fallback)
            - Test with nil repos slice (fallback)
            Update `cmd/saw/prepare_wave_test.go`:
            - Update existing `resolveAgentRepoRoot` tests to call
              `protocol.ResolveAgentRepo` instead

            **Verification gate:**
            ```
            go build ./... && go test ./pkg/protocol/ -run TestResolveAgentRepo -v && go test ./cmd/saw/ -run TestResolveAgent -v
            ```

            **Constraints:**
            - Only modify files in your ownership list
            - Do not modify types.go or validation.go (Agent D owns those)
            - RepoEntry type already exists in pkg/protocol/repo_resolve.go — reuse it
            - The existing determineAgentRepo in worktree.go can be removed or kept
              as a deprecated wrapper; prefer removal if all callers are updated
          files:
