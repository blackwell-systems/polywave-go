title: Determinism Roadmap Remaining Items
feature_slug: determinism-remaining
verdict: SUITABLE
suitability_assessment: |
    7 items across 4 packages (pkg/engine, pkg/orchestrator, pkg/protocol, cmd/saw).
    All items have well-defined scope with disjoint file ownership.

    File decomposition: 10+ distinct files across 4 packages. No two agents need
    conflicting modifications to the same file.

    Investigation-first: None. All items have known root causes documented in
    determinism-roadmap.md with specific file/line references.

    Interface discoverability: Yes. M1 introduces a new wrapper type. M2/M3 add
    boolean fields to an existing opts struct. L1-L4 are self-contained refactors
    with no new cross-agent interfaces.

    Pre-implementation status: All 7 items are TODO (verified against codebase).

    Parallelization value: High. 5 agents across 2 waves. Build/test cycle is
    non-trivial (Go compile + test suite). Agents are largely independent with
    only L3 depending on Wave 1 (its consolidated function must exist before
    callers can be updated).

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (5 agents, ~5 min avg, 2 waves)
    - Merge and verification: ~4 min
    Total SAW time: ~27 min
    Sequential baseline: ~35 min (5 agents x 7 min avg)
    Time savings: ~8 min (23% faster)
    Recommendation: Clear speedup with coordination value.
