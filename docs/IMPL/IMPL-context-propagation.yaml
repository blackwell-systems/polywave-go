interface_contracts:
    - name: Context parameter convention
      description: Standard context.Context parameter pattern for all public functions
      definition: |
        // For regular functions:
        func PublicFunction(ctx context.Context, existingParams...) (returnType, error)

        // For methods with receiver:
        func (r *Receiver) Method(ctx context.Context, existingParams...) (returnType, error)

        // For constructors (return context.Context where it makes sense for long-lived objects):
        func NewService(ctx context.Context, opts Options) (*Service, error)

        // Pure value functions (no I/O, no blocking) - context optional:
        func ParseBranch(branch string) (int, string, bool)  // OK to leave as-is
        func BranchName(slug string, waveNum int, agentID string) string  // OK to leave as-is

        // Context propagation rules:
        1. Add ctx to all functions that:
           - Perform I/O (file reads/writes, network calls)
           - Call other functions that accept context
           - May block or have long execution time
           - Need request tracing/cancellation

        2. Propagate through call chains:
           - When adding ctx to function F, update all callers of F
           - Pass context.Background() at entry points (main, HTTP handlers, CLI commands)
           - Pass context.TODO() temporarily where proper context not yet available

        3. Never store context in structs:
           - Pass explicitly through function calls
           - If struct method needs context, add it to method signature
      location: Go conventions
