suitability_assessment: |
    This work satisfies all suitability criteria:

    1. **File decomposition**: PASSES. 281 non-test Go files across 34 packages in pkg/. Each package can be assigned to a separate agent with disjoint file ownership. No conflicting modifications required.

    2. **Investigation-first items**: NONE. All work is straightforward signature refactoring following Go conventions. No unknown behavior, crashes, or race conditions to investigate. Pattern is well-established: context.Context as first parameter (after receiver).

    3. **Interface discoverability**: CLEAN. Interface contracts are mechanical: add `ctx context.Context` as first parameter to all exported functions. No ambiguity. Existing 259 functions with context already demonstrate the pattern.

    4. **Pre-implementation status check**: Current state confirmed via grep:
       - 259 functions already have context.Context (10%)
       - ~2,366 functions missing context.Context (90% gap)
       - No partial implementations detected; each function either has context or doesn't
       - All agents will add context to functions that lack it

    5. **Parallelization value check**: HIGH VALUE.
       - Build/test cycle: ~15-20 seconds per cycle (Go compilation + test suite)
       - Files per agent: 3-8 files per agent (sweet spot for parallelization)
       - Agent independence: HIGH. Packages have minimal cross-dependencies for this work
       - Task complexity: MODERATE. Not trivial find-replace; requires:
         * Understanding function call chains to propagate context through
         * Updating all call sites when adding context parameter
         * Verifying tests still pass after changes
         * Handling constructor functions vs regular functions

       **Estimated times:**
       - Scout phase: ~15 min (dependency mapping, interface contracts, IMPL doc)
       - Agent execution: ~50 min (32 agents × 5 min avg, 75% parallelization efficiency)
       - Merge & verification: ~10 min
       Total SAW time: ~75 min

       Sequential baseline: ~192 min (32 agents × 6 min avg sequential time)
       Time savings: ~117 min (61% faster)

       Recommendation: Clear speedup. Proceed with SAW.
