pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Massive cascading call site updates cause compilation failures across many files
          likelihood: high
          impact: medium
          mitigation: |
            Wave structure ensures dependencies are updated in order. Each wave only
            updates packages that don't depend on later waves. Protocol and result
            packages (Wave 1-2) are updated first, then consumers (Wave 3-6).

            Agents should pass context.TODO() temporarily at call sites where proper
            context isn't available yet, then clean up in later waves.
        - scenario: Test failures due to context.Background() vs context.TODO() confusion
          likelihood: medium
          impact: low
          mitigation: |
            Tests should consistently use context.Background(). Document this in
            interface contracts. context.TODO() is only for temporary production code
            where context will be properly propagated later.
        - scenario: Performance regression from context checking overhead
          likelihood: low
          impact: low
          mitigation: |
            Context overhead is negligible for functions that already do I/O. Pure
            functions (string manipulation, simple calculations) don't need context.
            Agents use judgment to skip context for pure functions.
        - scenario: Incomplete propagation - some call chains still missing context
          likelihood: medium
          impact: medium
          mitigation: |
            Post-merge verification will run full test suite. Any missing context
            parameters will cause compilation failures, which are easy to fix.
            grep for "context\.TODO()" after merge to find temporary placeholders.
        - scenario: Breaking changes to public API used by external consumers
          likelihood: low
          impact: high
          mitigation: |
            This is an internal SDK; no external consumers currently. All usage is
            within scout-and-wave-go, scout-and-wave-web, and sawtools CLI.
            If external consumers exist in future, provide deprecated wrapper functions
            that call new context-aware versions with context.Background().
