pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A assigns wrong N-codes (e.g. N094 already used) — codes.go
            already has N091-N093 and N096-N098 are currently free, but a concurrent
            wave touching codes.go could grab the same slots.
          likelihood: low
          impact: medium
          mitigation: |
            Agent A must read codes.go in full before writing. The current highest
            N code is N093. N096, N097, N098 are free. If the canonical source shows
            a conflict at launch time, Agent A must pick the next available slot and
            update saw_steps.go / pipeline.go to match.
        - scenario: |
            Agent C's TestRequiredKeyErr_ReturnsSAWError test fails because errors.As
            does not work with SAWError (value receiver, not pointer receiver).
          likelihood: low
          impact: low
          mitigation: |
            SAWError implements the error interface via value receiver (Error() string).
            errors.As works with value types when the target is the same type. The
            pattern `errors.As(err, &sawErr)` where sawErr is result.SAWError is
            correct for Go value types. If it fails, Agent C should use a direct type
            assertion: `sawErr, ok := err.(result.SAWError)`.
        - scenario: |
            Removing the fmt.Errorf double-wrap in requiredKeyErr changes observable
            error message format seen by any future caller, breaking any message
            string comparisons.
          likelihood: low
          impact: low
          mitigation: |
            No external callers exist today. SAWError.Error() format is
            "[severity] CODE: message" which is slightly different from
            "step_name: required state key X not set". If this is a concern for
            future callers, the step funcs in saw_steps.go can keep their
            fmt.Errorf("step_name: %w", err) wrapping — the key fix is that err
            is now a SAWError instead of a fmt string, so errors.As still works.
        - scenario: |
            Dead typed fields on State (RepoPath, IMPLPath, WaveNum) are actually
            used by engine-layer code not found in the canonical grep (e.g., via
            reflection or dynamic field access in a CLI adapter).
          likelihood: low
          impact: medium
          mitigation: |
            The caller scan confirmed zero external callers import pkg/pipeline.
            No code outside pkg/pipeline references these fields. The fix adds
            clarifying comments only — it does not remove the fields — so there
            is zero breakage risk.
known_issues:
    - title: pkg/pipeline has zero external callers
      description: |
        The entire pkg/pipeline package (WavePipeline, DefaultRegistry, Registry,
        all StepXxx constructors, Pipeline, State, GetValue, SetValue) is exported
        but not imported by any code outside the package itself. The package is
        aspirational infrastructure that has not yet been wired into pkg/engine or
        any CLI command. This IMPL doc does NOT remove the dead exports — that
        requires a separate scoping decision about whether to activate or delete
        the package. The fixes here clean up internal quality (error codes, docs)
        so the package is in good shape if/when it gets wired in.
    - title: State typed fields (RepoPath, IMPLPath, WaveNum) are a latent API trap
      description: |
        Steps use state.Values["repo_path"] but the struct also has state.RepoPath.
        A future caller who reads the API and sets state.RepoPath = "/path" will
        find it silently ignored. Agent B adds clarifying comments but does not
        migrate steps to use typed fields (that would be a larger refactor requiring
        callers to exist first).
