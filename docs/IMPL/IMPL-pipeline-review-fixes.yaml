title: pkg/pipeline Review Fixes
feature_slug: pipeline-review-fixes
verdict: SUITABLE
suitability_assessment: |
    The pkg/pipeline package contains 4 Go source files and 4 test files (~380 LOC
    combined). All 27 tests pass. The review identifies the following categories of
    issues following established review principles (same as pkg/orchestrator,
    pkg/retry, pkg/tools reviews):

    **Key finding — zero external callers:** pkg/pipeline has no callers outside
    itself in the canonical source tree. WavePipeline, DefaultRegistry, Registry,
    and all StepXxx constructors are exported but not imported anywhere. This is
    documented as dead/aspirational code. The fixes below do not remove the exports
    (removal requires broader engine coordination) but do document them correctly
    and eliminate internal sloppiness that would make the code harder to activate.

    **Decomposition:** 2 waves, 3 agents with fully disjoint ownership:
    - Wave 1 (parallel): Agent A (error codes + inline string fixes), Agent B
      (dead field cleanup + doc accuracy + requiredKeyErr simplification)
    - Wave 2 (depends on Wave 1): Agent C (test coverage for newly-cleaned paths)
    Agent C depends on Agent A and B completing because new tests must reference
    the error code constants added by A and the cleaned-up requiredKeyErr from B.

    **Investigation:** No root cause analysis needed. All findings are deterministic:
    hardcoded strings at known line numbers, dead struct fields clearly set nowhere,
    inaccurate doc comment at a fixed location.

    **Interfaces:** No cross-agent interfaces except the error code constants added
    by Agent A (consumed by Agent C in Wave 2).

    **Parallelization value:** Medium — 2 parallel agents in Wave 1 (error codes
    + dead field cleanup) then 1 agent in Wave 2 (tests). Build cycle is ~0.15s
    for go test ./pkg/pipeline. Coordination value exceeds speed savings.

    Estimated times:
    - Scout: ~20 min (deep review, caller scan, IMPL doc)
    - Wave 1: ~8 min (2 agents × 4 min each, parallel)
    - Wave 2: ~4 min (1 agent)
    - Merge & verification: ~3 min
    Total SAW time: ~35 min

    Sequential baseline: ~20 min (small package, simple fixes)
    Time savings: marginal; value is coordination and audit trail.

    Recommendation: SUITABLE WITH CAVEATS — the parallelization gain is modest
    (Wave 1 has 2 independent agents) but the IMPL provides an audit trail and
    ensures error codes, dead fields, and doc accuracy are handled atomically
    rather than piecemeal.
test_command: go test ./pkg/pipeline/...
lint_command: go vet ./pkg/pipeline/...
file_ownership:
