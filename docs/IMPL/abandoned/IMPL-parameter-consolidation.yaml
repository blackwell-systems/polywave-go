title: Parameter Consolidation - Remaining 5+ Parameter Functions
feature_slug: parameter-consolidation
verdict: SUITABLE_WITH_CAVEATS
suitability_assessment: |
    This is a small-scope cleanup pass to consolidate the remaining functions with
    5+ parameters into options structs, following the pattern already established
    by 37 existing Opts structs in the codebase.

    **Scope:** 4 functions identified:
    1. RunScaffold (pkg/engine/runner.go) - 8 call sites
    2. PrepareAgentContext (pkg/orchestrator/journal_integration.go) - 28 call sites
    3. MergeAgents (pkg/protocol/merge_agents.go) - 83 call sites (HIGH IMPACT)
    4. ComputeTrend (pkg/observability/rollups.go) - 8 call sites

    **Decomposition:** Work is cleanly decomposable - each function can be updated
    independently with no cross-file conflicts. Files are in different packages:
    - pkg/engine/runner.go
    - pkg/orchestrator/journal_integration.go
    - pkg/protocol/merge_agents.go
    - pkg/observability/rollups.go

    Each agent will create its opts struct in a new file in the same package, then
    refactor the function and update all call sites.

    **Parallelization value:** Moderate. While each function refactor is relatively
    straightforward (extract Opts struct, update signature, update all call sites),
    the high call-site counts (especially MergeAgents with 83 sites) make this
    tedious to do sequentially. Running 4 agents in parallel cuts the total time
    from ~25-30 min sequential to ~10-12 min parallel.

    **Caveats:**
    - MergeAgents has 83 call sites - this is the bulk of the work and represents
      moderate risk for introducing compilation errors if not done carefully
    - PrepareAgentContext has 28 call sites - second highest impact
    - All functions are internal API - no public backward compatibility concerns
    - Quality gates must verify all call sites compile correctly

    **Estimated times:**
    - Scout phase: ~5 min (simple dependency analysis, straightforward contracts)
    - Agent execution: ~8-12 min (4 agents × 3-4 min avg, accounting for parallelism)
    - Merge & verification: ~3 min
    Total SAW time: ~16-20 min

    Sequential baseline: ~25-30 min (4 functions × 6-7 min avg sequential time)
    Time savings: ~8-12 min (35-40% faster)

    Recommendation: Clear speedup. The parallelization value comes from distributing
    the tedious call-site updates across agents while maintaining type safety through
    isolated package boundaries.
