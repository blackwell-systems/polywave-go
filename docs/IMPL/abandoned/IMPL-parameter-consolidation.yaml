            package observability

            import "time"

            // ComputeTrendOpts configures trend computation.
            type ComputeTrendOpts struct {
                Store     Store         // observability event store
                Metric    string        // metric name: "cost", "success_rate", "retry_count"
                TimeRange time.Duration // time window to analyze
                Buckets   int           // number of buckets to divide timeRange into
