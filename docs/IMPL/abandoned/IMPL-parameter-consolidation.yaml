waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Objective
            Refactor `RunScaffold` to use `RunScaffoldOpts` struct instead of individual parameters.

            ## Implementation

            **1. Create pkg/engine/scaffold_opts.go:**
            ```go
            package engine

            // RunScaffoldOpts configures RunScaffold execution.
            type RunScaffoldOpts struct {
                IMPLPath     string      // absolute path to IMPL manifest
                RepoPath     string      // absolute path to target repository
                PolywaveRepoPath  string      // absolute path to polywave repo (for prompts)
                Model        string      // optional model override; empty = backend default
                OnEvent      func(Event) // event callback for progress updates
            }
            ```

            **2. Update the function signature in pkg/engine/runner.go:**

            Current signature (line ~515):
            ```go
            func RunScaffold(ctx context.Context, implPath, repoPath, polywaveRepoPath, model string, onEvent func(Event)) error
            ```

            New signature:
            ```go
            func RunScaffold(ctx context.Context, opts RunScaffoldOpts) error
            ```

            **3. Update function body:**
            Replace all parameter references with `opts.FieldName`:
            - `implPath` → `opts.IMPLPath`
            - `repoPath` → `opts.RepoPath`
            - `polywaveRepoPath` → `opts.PolywaveRepoPath`
            - `model` → `opts.Model`
            - `onEvent` → `opts.OnEvent`

            **4. Update all call sites:**

            Search for all `RunScaffold(` calls in the codebase (expected: ~8 call sites).
            For each call site, transform from:
            ```go
            RunScaffold(ctx, implPath, repoPath, polywaveRepoPath, model, onEvent)
            ```

            To:
            ```go
            RunScaffold(ctx, RunScaffoldOpts{
                IMPLPath:    implPath,
                RepoPath:    repoPath,
                PolywaveRepoPath: polywaveRepoPath,
                Model:       model,
                OnEvent:     onEvent,
            })
            ```

            **5. Handle test files:**
            Update test files that call `RunScaffold` following the same pattern.

            ## Verification

            Run quality gates:
            ```bash
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -timeout 30s
            ```

            Verify all call sites updated:
            ```bash
            grep -r 'RunScaffold(' --include="*.go" | grep -v "func RunScaffold\|type RunScaffold"
            ```

            ## Constraints

            - Do NOT modify files outside pkg/engine/ except for call sites in other packages
            - Do NOT touch pkg/orchestrator/, pkg/protocol/, or pkg/observability/ function definitions
            - Preserve all existing behavior - this is a signature refactor only
            - Ensure all 8 call sites are updated (verify with grep before committing)
          files:
            - pkg/engine/scaffold_opts.go
            - pkg/engine/runner.go
        - id: B
          task: |
            ## Objective
            Refactor `PrepareAgentContext` to use `PrepareAgentContextOpts` struct instead of
            individual parameters.

            ## Implementation

            **1. Create pkg/orchestrator/journal_opts.go:**
            ```go
            package orchestrator

            import "log/slog"

            // PrepareAgentContextOpts configures journal context preparation.
            type PrepareAgentContextOpts struct {
                ProjectRoot string       // absolute path to project root
                WaveNum     int          // wave number
                AgentID     string       // agent identifier (e.g. "A", "B2")
                MaxEntries  int          // max journal entries to include; 0 = 50 (default)
                Logger      *slog.Logger // optional logger; nil = slog.Default()
            }
            ```

            **2. Update the function signature in pkg/orchestrator/journal_integration.go:**

            Current signature (line ~26):
            ```go
            func PrepareAgentContext(projectRoot string, waveNum int, agentID string, maxEntries int, logger *slog.Logger) (string, error)
            ```

            New signature:
            ```go
            func PrepareAgentContext(opts PrepareAgentContextOpts) (string, error)
            ```

            **3. Update function body:**
            Replace all parameter references with `opts.FieldName`:
            - `projectRoot` → `opts.ProjectRoot`
            - `waveNum` → `opts.WaveNum`
            - `agentID` → `opts.AgentID`
            - `maxEntries` → `opts.MaxEntries`
            - `logger` → `opts.Logger`

            The function already has a `loggerFrom()` helper that handles nil loggers, so
            the existing `loggerFrom(logger)` calls become `loggerFrom(opts.Logger)`.

            **4. Update all call sites:**

            Search for all `PrepareAgentContext(` calls in the codebase (expected: ~28 call sites).
            For each call site, transform from:
            ```go
            contextMd, err := PrepareAgentContext(projectRoot, waveNum, agentID, maxEntries, logger)
            ```

            To:
            ```go
            contextMd, err := PrepareAgentContext(PrepareAgentContextOpts{
                ProjectRoot: projectRoot,
                WaveNum:     waveNum,
                AgentID:     agentID,
                MaxEntries:  maxEntries,
                Logger:      logger,
            })
            ```

            **5. Handle nil logger cases:**
            Some call sites may pass `nil` for logger - preserve this by passing `Logger: nil`
            in the opts struct (the function handles nil correctly).

            ## Verification

            Run quality gates:
            ```bash
            go build ./pkg/orchestrator/...
            go vet ./pkg/orchestrator/...
            go test ./pkg/orchestrator/... -timeout 30s
            ```

            Verify all call sites updated:
            ```bash
            grep -r 'PrepareAgentContext(' --include="*.go" | grep -v "func PrepareAgentContext"
            ```

            ## Constraints

            - Do NOT modify files outside pkg/orchestrator/ except for call sites in other packages
            - Do NOT touch pkg/engine/, pkg/protocol/, or pkg/observability/ function definitions
            - Preserve all existing behavior - this is a signature refactor only
            - Ensure all 28 call sites are updated (verify with grep before committing)
