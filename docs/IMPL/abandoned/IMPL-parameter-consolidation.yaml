pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent C (MergeAgents refactor) misses some of the 83 call sites, causing compilation failures
          likelihood: medium
          impact: high
          mitigation: |
            Agent C's task explicitly requires grep verification before committing. Quality
            gates will catch any missed call sites. The agent should update call sites
            systematically (one package at a time) and verify after each package.
        - scenario: Call site transformations introduce subtle behavioral changes (e.g., argument ordering bugs)
          likelihood: low
          impact: medium
          mitigation: |
            The refactor is purely mechanical - parameter names in opts struct match
            the original parameter names exactly. Quality gates include full test suite.
            All agents instructed to preserve existing behavior.
        - scenario: Test files use different calling patterns that agents miss
          likelihood: low
          impact: medium
          mitigation: |
            Agent tasks explicitly mention updating test files. Grep searches will
            find test file call sites. Quality gates run full test suite.
        - scenario: Nil logger handling breaks after refactor
          likelihood: low
          impact: low
          mitigation: |
            Agent B's task explicitly covers nil logger cases. PrepareAgentContext
            already has loggerFrom() helper that handles nil. MergeAgents likely
            has similar patterns.
        - scenario: Agents modify files outside their ownership scope
          likelihood: low
          impact: low
          mitigation: |
            Each agent task explicitly lists the constraint "Do NOT modify files outside
            pkg/X/ except for call sites". File ownership table enforces disjoint ownership
            (I1 invariant). Call sites in other packages are expected and necessary.
