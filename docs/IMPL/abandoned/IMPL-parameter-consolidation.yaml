        - id: C
          task: |
            ## Objective
            Refactor `MergeAgents` to use `MergeAgentsOpts` struct instead of individual parameters.
            This is the highest-impact function with 83 call sites across the codebase.

            ## Implementation

            **1. Create pkg/protocol/merge_opts.go:**
            ```go
            package protocol

            import "log/slog"

            // MergeAgentsOpts configures multi-repo agent merge.
            type MergeAgentsOpts struct {
                ManifestPath string       // absolute path to IMPL manifest
                WaveNum      int          // wave number to merge
                RepoDir      string       // absolute path to target repository
                MergeTarget  string       // target branch; empty = HEAD
                Logger       *slog.Logger // optional logger; nil = slog.Default()
            }
            ```

            **2. Update the function signature in pkg/protocol/merge_agents.go:**

            Current signature (line ~162):
            ```go
            func MergeAgents(manifestPath string, waveNum int, repoDir string, mergeTarget string, logger *slog.Logger) (result.Result[MergeAgentsData], error)
            ```

            New signature:
            ```go
            func MergeAgents(opts MergeAgentsOpts) (result.Result[MergeAgentsData], error)
            ```

            **3. Update function body:**
            Replace all parameter references with `opts.FieldName`:
            - `manifestPath` → `opts.ManifestPath`
            - `waveNum` → `opts.WaveNum`
            - `repoDir` → `opts.RepoDir`
            - `mergeTarget` → `opts.MergeTarget`
            - `logger` → `opts.Logger`

            **4. Update internal helper functions:**
            The file contains two internal helper functions that also take similar parameters:
            - `mergeAgentsSingleRepo` (line ~251)
            - `mergeAgentsMultiRepo` (line ~399)

            These should also be updated to accept `MergeAgentsOpts` instead of individual
            parameters for consistency. They are internal (unexported) so no external call
            sites to update.

            **5. Update all call sites:**

            Search for all `MergeAgents(` calls in the codebase (expected: ~83 call sites).
            For each call site, transform from:
            ```go
            res, err := MergeAgents(manifestPath, waveNum, repoDir, mergeTarget, logger)
            ```

            To:
            ```go
            res, err := MergeAgents(MergeAgentsOpts{
                ManifestPath: manifestPath,
                WaveNum:      waveNum,
                RepoDir:      repoDir,
                MergeTarget:  mergeTarget,
                Logger:       logger,
            })
            ```

            **6. Handle empty string defaults:**
            Some call sites may pass `""` for `mergeTarget` to indicate "use HEAD". Preserve
            this by passing `MergeTarget: ""` in the opts struct.

            **7. Verify systematically:**
            After updating all call sites, run:
            ```bash
            grep -r 'MergeAgents(' --include="*.go" | grep -v "func MergeAgents\|type MergeAgents"
            ```

            Verify that every match uses the new `MergeAgentsOpts` struct syntax.

            ## Verification

