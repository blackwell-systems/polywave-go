            ## Constraints

            - Do NOT modify files outside pkg/protocol/ except for call sites in other packages
            - Do NOT touch pkg/orchestrator/ or pkg/observability/ function definitions
            - Preserve all existing behavior - this is a signature refactor only
            - Ensure all 83 call sites are updated (verify with grep before committing)
            - This is the highest-risk refactor due to call-site count - be systematic
          files:
