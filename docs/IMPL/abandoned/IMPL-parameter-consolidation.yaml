            ```

            Note: `ctx` remains as the first parameter (standard Go convention for context).

            **3. Update function body:**
            Replace all parameter references with `opts.FieldName`:
            - `store` → `opts.Store`
            - `metric` → `opts.Metric`
            - `timeRange` → `opts.TimeRange`
            - `buckets` → `opts.Buckets`

            **4. Update all call sites:**

            Search for all `ComputeTrend(` calls in the codebase (expected: ~8 call sites).
            For each call site, transform from:
            ```go
            trend, err := ComputeTrend(ctx, store, metric, timeRange, buckets)
            ```

