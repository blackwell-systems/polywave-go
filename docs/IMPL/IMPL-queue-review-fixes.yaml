pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A changes completedSlugs() signature but forgets to update callers at lines 158, 221-226
          likelihood: medium
          impact: high
          mitigation: Verification gate will catch compilation failure. Agent A prompt explicitly lists both call sites with before/after code.
        - scenario: Agent B's chmod-based failure tests are not portable (fail on Windows)
          likelihood: low
          impact: medium
          mitigation: Go's os.Chmod works on Windows (read-only flag maps to +R attribute). If test fails on Windows, Agent B prompt says to use os-specific skip with runtime.GOOS check.
        - scenario: Wave 2 test additions reference Q005/Q006 codes before they exist (if Agent A fails validation)
          likelihood: low
          impact: high
          mitigation: Wave structure enforces ordering — Wave 2 cannot start until Wave 1 passes all gates. Compilation failure in Wave 1 blocks Wave 2.
        - scenario: Removing nil check at lines 140-142 causes panic if append logic changes in the future
          likelihood: low
          impact: low
          mitigation: Go slice semantics guarantee append() always returns non-nil. The check is defensive but unreachable. Removal is safe. If future refactor adds a code path where items is not assigned via append, linter or tests will catch it.
state: SCOUT_PENDING
injection_method: hook
