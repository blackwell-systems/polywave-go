# IMPL: failure-recovery-ux
title: "Failure Recovery and Developer UX Improvements"
feature_slug: failure-recovery-ux
verdict: SUITABLE
test_command: "go test ./..."
lint_command: "go vet ./..."
state: SCOUT_PENDING

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES — Three features map to three disjoint areas:
#    gate caching (pkg/gatecache/ + pkg/protocol/gates.go + cmd/saw/run_gates_cmd.go),
#    failure context injection (pkg/retryctx/ + cmd/saw/build_retry_context_cmd.go),
#    resume detection (pkg/resume/ + cmd/saw/resume_detect_cmd.go).
#    No two agents need conflicting modifications to the same file.
#
# 2. Investigation-first: NO — All three features have clear design references
#    from plan-cascade. No unknown bugs or race conditions to diagnose.
#
# 3. Interface discoverability: YES — Gate caching wraps existing RunGates with
#    a cache layer. Failure context reads existing CompletionReport types.
#    Resume detection reads existing manifest and .saw-state structures.
#    All inputs/outputs are well-defined.
#
# 4. Pre-implementation status check:
#    Total items: 3 features (gate caching, failure context, resume detection)
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 0 — retry package exists but has no
#      error classification or structured context injection
#    Not implemented (TO-DO): 3
#
# 5. Parallelization value: HIGH — Three independent features with no shared
#    types. Each agent touches 3-5 files. Go build+test cycle is >30s.
#    All three can run in Wave 1 simultaneously.
#
# Estimated times:
# - Scout phase: ~8 min (dependency mapping, interface contracts)
# - Agent execution: ~12 min (3 agents x 12 min avg, all parallel in 1 wave)
# - Merge & verification: ~4 min
# Total SAW time: ~24 min
#
# Sequential baseline: ~44 min (3 agents x 12 min + 8 min overhead)
# Time savings: ~20 min (~45% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  Three independent features with disjoint file ownership. Gate caching adds a
  new pkg/gatecache/ package and modifies pkg/protocol/gates.go to support
  caching. Failure context injection adds pkg/retryctx/ for error classification
  and a new CLI command. Resume detection adds pkg/resume/ and a new CLI command.
  No cross-agent type sharing needed — each feature is self-contained.

