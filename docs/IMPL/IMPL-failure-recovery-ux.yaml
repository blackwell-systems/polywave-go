waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement

          Gate result caching for the SAW quality gate runner. When gates are re-run
          (after a retry or fix-build), gates whose repo state hasn't changed should
          return cached results instantly.

          ### New package: pkg/gatecache/

          Create `pkg/gatecache/cache.go` with:

          1. **CacheKey** struct: `HeadCommit`, `StagedStat`, `UnstagedStat` (all strings).
             - `BuildKey(repoDir string) (CacheKey, error)` computes the key by running:
               - `git rev-parse HEAD` for HeadCommit
               - `git diff --cached --stat` for StagedStat
               - `git diff --stat` for UnstagedStat
             - Hash these three values with md5 into a single hex string for map lookup.

          2. **CachedResult** struct: mirrors `protocol.GateResult` fields plus `FromCache bool`
             and `CachedAt time.Time`. Include a `TTL` field (not serialized).

          3. **Cache** struct with:
             - `stateDir string` — path to `.saw-state/` directory
             - `ttl time.Duration` — cache entry lifetime (default 5 minutes)
             - `entries map[string]map[string]CachedResult` — outer key is hashed CacheKey,
               inner key is gate type
             - `New(stateDir string, ttl time.Duration) *Cache` — constructor, loads from disk
             - `Get(key CacheKey, gateType string) (*CachedResult, bool)` — returns cached
               result if exists and not expired
             - `Put(key CacheKey, gateType string, result CachedResult) error` — stores and
               persists to `.saw-state/gate-cache.json`
             - `Invalidate() error` — clears all entries and removes the JSON file
             - `load()` / `save()` internal methods for JSON file I/O

          ### Modify: pkg/protocol/gates.go

          Add a new exported function `RunGatesWithCache` that:
          1. Accepts the same params as `RunGates` plus a `*gatecache.Cache` parameter
             (can be nil for no-cache behavior)
          2. If cache is non-nil, builds a CacheKey for the repoDir
          3. For each gate, checks cache first; if hit, converts to GateResult with
             stdout/stderr from cache
          4. For cache misses, runs the gate normally and stores the result
          5. Returns `[]GateResult` with an additional `FromCache bool` field

          Add a `FromCache` field to the `GateResult` struct: `FromCache bool json:"from_cache"`

          ### Modify: cmd/saw/run_gates_cmd.go

          Add a `--no-cache` flag (default false). When caching is enabled:
          - Create a `gatecache.Cache` with stateDir from repoDir + "/.saw-state"
          - Call `RunGatesWithCache` instead of `RunGates`
          - The JSON output already includes the `from_cache` field

          ## Interfaces to Implement
          - `gatecache.Cache` (New, Get, Put, BuildKey, Invalidate)
          - `protocol.RunGatesWithCache`

          ## Interfaces to Call
          - `protocol.RunGates` (existing, called for cache misses)
          - `protocol.Load` (existing, for loading manifest)
          - `exec.Command` for git commands in BuildKey

          ## Tests to Write
          1. TestCache_PutGet - store and retrieve a cached result
          2. TestCache_TTLExpiry - verify expired entries return miss
          3. TestCache_Invalidate - verify all entries cleared
          4. TestCache_Persistence - verify save/load round-trip to JSON file
          5. TestBuildKey - verify key computation (mock git commands or use temp repo)
          6. TestRunGatesWithCache_CacheHit - verify cached gate skips execution
          7. TestRunGatesWithCache_NilCache - verify fallback to normal RunGates

          ## Verification Gate
          ```bash
          go build ./...
          go vet ./...
          go test ./pkg/gatecache/ ./pkg/protocol/ -run TestCache -run TestRunGatesWithCache -count=1
          ```

          ## Constraints
          - Cache file location MUST be `.saw-state/gate-cache.json` (not configurable)
          - Default TTL is 5 minutes
          - `RunGatesWithCache` with nil cache MUST behave identically to `RunGates`
          - Do NOT modify the existing `RunGates` function signature
          - The `FromCache` field on GateResult must be `omitempty` to avoid breaking
            existing JSON consumers
        files:
          - "pkg/gatecache/cache.go"
          - "pkg/gatecache/cache_test.go"
          - "pkg/protocol/gates.go"
          - "pkg/protocol/gates_test.go"
          - "cmd/saw/run_gates_cmd.go"

      - id: B
        task: |
          ## What to Implement

          Structured failure context injection for agent retries. When an agent is
          retried, classify the error from the prior attempt and build a structured
          retry prompt with specific fix suggestions.

          ### New package: pkg/retryctx/

          Create `pkg/retryctx/retryctx.go` with:

          1. **ErrorClass** type (string) with constants:
             - `ErrorClassImport` = "import_error"
             - `ErrorClassType` = "type_error"
             - `ErrorClassTest` = "test_failure"
             - `ErrorClassBuild` = "build_error"
             - `ErrorClassLint` = "lint_error"
             - `ErrorClassUnknown` = "unknown"

          2. **ClassifyError(output string) ErrorClass** — Pattern matching on error output:
             - Import errors: "could not import", "cannot find package", "no required module"
             - Type errors: "cannot use .* as type", "undefined:", "has no field or method",
               "not enough arguments", "too many arguments"
             - Test failures: "FAIL", "--- FAIL:", "panic: test"
             - Build errors: "cannot find module", "build constraints exclude", "syntax error"
             - Lint errors: "go vet", "should have comment", "exported .* should"
             - Default to ErrorClassUnknown

          3. **SuggestFixes(class ErrorClass) []string** — Returns fix suggestions per class:
             - import_error: ["Check import paths match go.mod module name",
               "Run go mod tidy to resolve missing dependencies",
               "Verify the package exists at the expected path"]
             - type_error: ["Check function signatures match interface contracts",
               "Verify struct field types match expected types",
               "Check for missing type conversions"]
             - test_failure: ["Review test expectations against actual behavior",
               "Check for changed function signatures in test assertions",
               "Look for race conditions with -race flag"]
             - build_error: ["Check for syntax errors in recent changes",
               "Verify all referenced packages exist",
               "Run go mod tidy"]
             - lint_error: ["Add missing documentation comments to exported symbols",
               "Fix formatting with gofmt -w",
               "Address go vet warnings"]

          4. **RetryContext** struct with fields:
             - AttemptNumber int
             - AgentID string
             - ErrorClass ErrorClass
             - ErrorExcerpt string (first 2000 chars of error output)
             - GateResults []string (gate type + pass/fail summary)
             - SuggestedFixes []string
             - PriorNotes string (from completion report Notes field)
             - PromptText string (the formatted retry prompt)

          5. **BuildRetryContext(manifestPath string, agentID string, attemptNum int) (*RetryContext, error)**:
             - Load manifest with protocol.Load
             - Read completion report for agentID
             - Extract error output from report Notes + Verification fields
             - Classify the error
             - Generate suggested fixes
             - Build a formatted prompt string with markdown sections:
               "## Retry Context (Attempt {N})", "### Error Classification: {class}",
               "### Error Output", "### Suggested Fixes", "### Prior Attempt Notes"

          ### New CLI command: cmd/saw/build_retry_context_cmd.go

          Create `sawtools build-retry-context <manifest-path> --agent <id> --attempt <n>`:
          - Calls `retryctx.BuildRetryContext`
          - Outputs JSON to stdout with all RetryContext fields
          - Exit 0 on success, exit 1 if agent has no completion report

          ## Interfaces to Implement
          - `retryctx.ClassifyError`
          - `retryctx.SuggestFixes`
          - `retryctx.BuildRetryContext`
          - `retryctx.RetryContext` struct

          ## Interfaces to Call
          - `protocol.Load` (existing)
          - `protocol.CompletionReport` type (existing, read-only)

          ## Tests to Write
          1. TestClassifyError_ImportError - verify import error patterns
          2. TestClassifyError_TypeError - verify type error patterns
          3. TestClassifyError_TestFailure - verify test failure patterns
          4. TestClassifyError_BuildError - verify build error patterns
          5. TestClassifyError_LintError - verify lint error patterns
          6. TestClassifyError_Unknown - verify fallback classification
          7. TestSuggestFixes_AllClasses - verify each class returns suggestions
          8. TestBuildRetryContext_Complete - end-to-end with temp manifest
          9. TestBuildRetryContext_MissingReport - verify error handling

          ## Verification Gate
          ```bash
          go build ./...
          go vet ./...
          go test ./pkg/retryctx/ -count=1
          ```

          ## Constraints
          - Error excerpt MUST be truncated to 2000 chars max
          - Pattern matching uses strings.Contains or regexp, NOT AST parsing
          - Do NOT modify pkg/retry/ — this is a NEW package pkg/retryctx/
          - The CLI command MUST follow the same pattern as other cmd/saw/ commands
            (newXxxCmd returns *cobra.Command, uses repoDir package variable)
          - JSON output should include all RetryContext fields
        files:
          - "pkg/retryctx/retryctx.go"
          - "pkg/retryctx/retryctx_test.go"
          - "cmd/saw/build_retry_context_cmd.go"

      - id: C
        task: |
          ## What to Implement

          Automatic detection of interrupted SAW sessions so the system can report
          what was in progress and recommend how to resume.

          ### New package: pkg/resume/

          Create `pkg/resume/detect.go` with:

          1. **SessionState** struct with fields:
             - IMPLSlug string
             - IMPLPath string
             - CurrentWave int (highest wave with any activity)
             - TotalWaves int
             - CompletedAgents []string (agents with status "complete")
             - FailedAgents []string (agents with status "partial" or "blocked")
             - PendingAgents []string (agents with no completion report)
             - OrphanedWorktrees []string (worktree paths that exist but wave not merged)
             - SuggestedAction string (human-readable: "resume wave 2", "rerun agent B", etc.)
             - ProgressPct float64 (completed agents / total agents * 100)
             - CanAutoResume bool (true if no failed agents and next wave is ready)
             - ResumeCommand string (exact sawtools command to resume)

          2. **Detect(repoPath string) ([]SessionState, error)**:
             - Scan `docs/IMPL/` for IMPL YAML files (not in `complete/` subdir)
             - For each non-complete IMPL doc:
               a. Load with protocol.Load
               b. Skip if state is "COMPLETE" or "NOT_SUITABLE"
               c. Check completion_reports to classify agents as completed/failed/pending
               d. Determine current wave: highest wave number with any completion report
               e. Scan for orphaned worktrees: run `git worktree list --porcelain`,
                  parse for worktrees matching `wave{N}-agent-{ID}` pattern, check if
                  the wave is already merged (completion report exists for all agents)
               f. Calculate progress: completedAgents / totalAgents * 100
               g. Determine suggested action:
                  - If failed agents exist: "Rerun failed agent(s): {ids}"
                  - If all current wave agents complete but next wave pending:
                    "Start wave {N+1}"
                  - If orphaned worktrees: "Clean up orphaned worktrees, then resume wave {N}"
                  - If no agents started: "Start wave 1"
               h. Set CanAutoResume = true only if no failed agents and current wave
                  is fully complete
               i. Build ResumeCommand: the exact `sawtools` command to execute next

          3. **detectOrphanedWorktrees(repoPath string, manifest *protocol.IMPLManifest) ([]string, error)**:
             - Helper that runs `git worktree list --porcelain` and parses output
             - Matches worktree paths against expected SAW patterns
             - Returns paths of worktrees whose waves are not fully merged

          ### New CLI command: cmd/saw/resume_detect_cmd.go

          Create `sawtools resume-detect`:
          - Uses the global `--repo-dir` flag for repo path
          - Calls `resume.Detect(repoDir)`
          - Outputs JSON array to stdout
          - If no interrupted sessions found, outputs empty array `[]`
          - Exit 0 always (empty result is not an error)

          ## Interfaces to Implement
          - `resume.SessionState` struct
          - `resume.Detect`
          - `resume.detectOrphanedWorktrees` (internal helper)

          ## Interfaces to Call
          - `protocol.Load` (existing)
          - `os.ReadDir` for scanning docs/IMPL/
          - `exec.Command("git", "worktree", "list", "--porcelain")` for worktree detection

          ## Tests to Write
          1. TestDetect_NoIMPLDocs - verify empty result when no IMPL docs exist
          2. TestDetect_CompleteIMPL - verify complete IMPL docs are skipped
          3. TestDetect_InProgressIMPL - verify partially complete IMPL detected
          4. TestDetect_FailedAgent - verify failed agents reported correctly
          5. TestDetect_ProgressCalculation - verify progress percentage math
          6. TestDetect_SuggestedAction - verify action text for various states
          7. TestDetect_ResumeCommand - verify correct command string generated
          8. TestDetectOrphanedWorktrees - verify git worktree parsing

          ## Verification Gate
          ```bash
          go build ./...
          go vet ./...
          go test ./pkg/resume/ -count=1
          ```

          ## Constraints
          - MUST skip IMPL docs in `docs/IMPL/complete/` subdirectory
          - MUST skip IMPL docs with state "COMPLETE" or "NOT_SUITABLE"
          - Git worktree detection MUST handle missing git gracefully (return empty list)
          - Output JSON MUST be an array even for single results
          - Do NOT modify any existing packages
          - CLI command pattern: `newResumeDetectCmd()` returns `*cobra.Command`
        files:
          - "pkg/resume/detect.go"
          - "pkg/resume/detect_test.go"
          - "cmd/saw/resume_detect_cmd.go"

  - number: 2
    type: integration
    agents:
      - id: D
        task: |
          ## What to Implement

          Integration wiring: connect the three new features (gate caching, failure
          context injection, resume detection) into existing engine and CLI entry points.

          ### Modify: cmd/saw/main.go

          Add the two new CLI commands to the root command's AddCommand call:
          - `newBuildRetryContextCmd()` (from Agent B)
          - `newResumeDetectCmd()` (from Agent C)

          These are new commands created by Agents B and C in Wave 1. Just add the
          AddCommand calls in main.go.

          ### Modify: pkg/engine/finalize.go

          In the `FinalizeWave` function, Step 3 (RunGates), replace the direct call
          to `protocol.RunGates` with `protocol.RunGatesWithCache`:
          - Create a `gatecache.Cache` with stateDir = filepath.Join(opts.RepoPath, ".saw-state")
            and TTL of 5 minutes
          - Call `protocol.RunGatesWithCache(manifest, opts.WaveNum, opts.RepoPath, cache)`
            instead of `protocol.RunGates(manifest, opts.WaveNum, opts.RepoPath)`
          - Add import for `"github.com/blackwell-systems/scout-and-wave-go/pkg/gatecache"`
          - Add import for `"time"` if not already present

          ### Modify: pkg/engine/runner.go

          In the `RunSingleAgent` function, when `promptPrefix` is empty but the agent
          has a completion report with non-"complete" status, auto-build retry context:
          - After the orchestrator is created, check if a completion report exists for
            the agent via `protocol.Load` + checking CompletionReports map
          - If report exists and status != "complete", call
            `retryctx.BuildRetryContext(opts.IMPLPath, agentLetter, 1)`
          - If retry context is successfully built, prepend its PromptText to the
            agent's prompt via the existing promptPrefix parameter
          - This is a best-effort enhancement: if BuildRetryContext fails, log to
            stderr and continue without retry context
          - Add import for `"github.com/blackwell-systems/scout-and-wave-go/pkg/retryctx"`

          ## Interfaces to Call
          - `gatecache.New` (from Agent A)
          - `protocol.RunGatesWithCache` (from Agent A)
          - `retryctx.BuildRetryContext` (from Agent B)
          - `protocol.Load` (existing)

          ## Tests to Write
          No new test files — existing tests in pkg/engine/ cover the integration
          paths. Verify the build compiles and existing tests pass.

          ## Verification Gate
          ```bash
          go build ./...
          go vet ./...
          go test ./pkg/engine/ -count=1
          go test ./cmd/saw/ -count=1
          ```

          ## Constraints
          - Do NOT change function signatures of FinalizeWave or RunSingleAgent
          - Gate cache creation failure is non-fatal: fall back to nil cache
            (which makes RunGatesWithCache behave like RunGates)
          - Retry context injection is best-effort: log errors to stderr, don't fail
          - Keep the existing behavior for RunSingleAgent when promptPrefix is
            explicitly provided (do not override user-supplied prefix)
        files:
          - "cmd/saw/main.go"
          - "pkg/engine/finalize.go"
          - "pkg/engine/runner.go"
        dependencies:
          - A
          - B
          - C

pre_mortem:
  overall_risk: low
  rows:
    - scenario: "Gate cache returns stale results after file changes between git operations"
      likelihood: low
      impact: medium
      mitigation: "Cache key includes HEAD commit + diff stats, so any file change invalidates. TTL of 5 min provides additional safety."
    - scenario: "Error classification regex matches too broadly or too narrowly"
      likelihood: medium
      impact: low
      mitigation: "Classification is advisory only (helps agents, does not block). Unknown class falls back to generic suggestions."
    - scenario: "git worktree list output format varies across git versions"
      likelihood: low
      impact: medium
      mitigation: "Use --porcelain flag which has stable machine-readable output. Fallback to empty worktree list on parse failure."

completion_reports: {}
