go vet ./pkg/commands
go test ./pkg/commands -run TestResolveCommands -run TestApplyDefaults -run TestMergeCommandSets
```

## Constraints

- Priority levels: CI=100, Makefile=50, package manifest=30, defaults=10
- Merge logic: per-command granularity (can take test from CI, lint from Makefile)
- Defaults are last resort; always prefer detected commands
- DetectionSources should list all files consulted, even if not used
- Toolchain must be detected before calling applyDefaults
```

