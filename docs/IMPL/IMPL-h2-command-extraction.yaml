## Wave 2

### Agent E - CLI Integration

```
## What to Implement

Implement `sawtools extract-commands <repo-root>` CLI command that orchestrates
all parsers (CI, build system, resolver, output) and prints YAML to stdout.

**Command behavior:**
1. Detect toolchain (scan for go.mod, Cargo.toml, package.json, pyproject.toml)
2. Parse CI configs (call Agent A's ParseCI)
3. Parse build systems (call Agent B's ParseBuildSystem)
4. Resolve commands with priority ordering (call Agent C's ResolveCommands)
5. Build module map (call Agent D's buildModuleMap)
6. Format output as YAML (call Agent D's FormatYAML)
7. Print to stdout

**CLI flags:**
- `--format <yaml|json>` - Output format (default: yaml)
- `--repo-root <path>` - Repository root (default: current directory)

**Example usage:**
```bash
sawtools extract-commands /Users/user/repo
sawtools extract-commands . --format json
```

## Interfaces to Implement

```go
// cmd/saw/extract_commands_cmd.go

func newExtractCommandsCmd() *cobra.Command
```

## Interfaces to Call

