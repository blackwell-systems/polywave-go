commands.FormatYAML(cs *commands.CommandSet) ([]byte, error)
commands.FormatJSON(cs *commands.CommandSet) ([]byte, error)
```

**Toolchain detection:**
- If `go.mod` exists → "go"
- Else if `Cargo.toml` exists → "rust"
- Else if `package.json` exists → "node"
- Else if `pyproject.toml` exists → "python"
- Else return error "unknown toolchain"

