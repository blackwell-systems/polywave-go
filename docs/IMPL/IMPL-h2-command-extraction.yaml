# Waves

## Wave 1

### Agent A - CI Config Parser

```
## What to Implement

Implement CI config file parser for GitHub Actions, GitLab CI, and CircleCI.
Extract build/test/lint/format commands from workflow definitions.

**Supported CI systems:**
- GitHub Actions: `.github/workflows/*.yml`
- GitLab CI: `.gitlab-ci.yml`
- CircleCI: `.circleci/config.yml`

**Detection logic:**
- Scan for job/step commands containing: `build`, `test`, `lint`, `clippy`, `vet`, `eslint`, `ruff`, etc.
- Distinguish check-mode lint (`--check`, `--no-fix`) from auto-fix mode
- Extract focused test patterns (e.g., `go test ./pkg/foo` vs `go test ./...`)
- Record detection source files

## Interfaces to Implement

```go
// pkg/commands/ci.go

