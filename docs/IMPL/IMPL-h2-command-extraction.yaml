pre_mortem:
  overall_risk: "medium"
  rows:
    - scenario: "CI config YAML parsing fails on complex workflow files with matrix builds, anchors, or includes"
      likelihood: "medium"
      impact: "high"
      mitigation: "Start with simple CI files in tests. Add complex fixtures incrementally. Fallback to build system parsers if CI parsing fails (graceful degradation)."

    - scenario: "Makefile parsing misinterprets chained targets (test: build lint test-unit) as single command"
      likelihood: "medium"
      impact: "medium"
      mitigation: "Parse Makefile dependency tree. Identify leaf targets (targets with no dependencies). Document limitation: complex Make conditionals not supported."

    - scenario: "Test counting via `go test -list` or `cargo test --list` times out on large repos (>10k tests)"
      likelihood: "low"
      impact: "low"
      mitigation: "Apply 10-second timeout per package. If timeout occurs, omit module_map from output (graceful degradation). Log warning to stderr."

    - scenario: "Different OS/architecture matrix builds in CI have different commands (Linux vs Windows)"
      likelihood: "medium"
      impact: "low"
      mitigation: "Select Linux/amd64 jobs by default. Document assumption in CI parser. Add --platform flag in future iteration if needed."

    - scenario: "Third-party TOML parser dependency not in go.mod (for pyproject.toml parsing)"
      likelihood: "low"
      impact: "low"
      mitigation: "Use basic regex-based TOML parser for [tool.*] sections (avoid full TOML parser dependency). Only extract tool.pytest, tool.ruff, tool.mypy sections."

