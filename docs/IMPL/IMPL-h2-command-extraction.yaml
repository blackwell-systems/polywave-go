### Agent C - Priority Resolver

```
## What to Implement

Implement priority resolution logic to select commands when multiple sources exist.
Apply priority ordering: CI configs (100) > Makefile (50) > package manifests (30) > defaults (10).

**Priority rules:**
1. If CI config exists and has commands, use those (priority 100)
2. Else if Makefile/package.json exists and has commands, use those (priority 50)
3. Else if language defaults apply, use those (priority 10)
4. Merge partial results: CI may have test command but not lint command

**Fallback defaults by toolchain:**
- Go: `go build ./...`, `go test ./...`, `go vet ./...`, `gofmt -w .`
- Rust: `cargo build`, `cargo test`, `cargo clippy -- -D warnings`, `cargo fmt`
- Node: `npm run build`, `npm test`, `npx eslint .`, `npx prettier --write .`
- Python: `python -m build`, `pytest`, `ruff check .`, `black .`

## Interfaces to Implement

```go
// pkg/commands/resolver.go

// ResolveCommands applies priority ordering to select final command set
func ResolveCommands(ciResult *CommandSet, buildSystemResult *CommandSet, toolchain string) (*CommandSet, error)

// mergeCommandSets combines two CommandSets, preferring higher priority source
func mergeCommandSets(high *CommandSet, low *CommandSet) *CommandSet

// applyDefaults fills in missing commands with language-specific defaults
func applyDefaults(cs *CommandSet, toolchain string) *CommandSet

// getDefaultCommands returns fallback commands for a toolchain
func getDefaultCommands(toolchain string) Commands
```

## Interfaces to Call

```go
// From scaffold (pkg/commands/types.go)
type CommandSet struct {
  Toolchain        string
  Commands         Commands
  DetectionSources []string
  ModuleMap        []Module
}
```

## Tests to Write

1. **TestResolveCommands_CIOnly** - CI config present, build system absent → use CI
2. **TestResolveCommands_BuildSystemOnly** - CI absent, build system present → use build system
3. **TestResolveCommands_BothPresent** - CI and build system present → prefer CI
4. **TestResolveCommands_PartialCI** - CI has test but not lint → merge with build system
5. **TestResolveCommands_NeitherPresent** - No CI, no build system → use defaults
6. **TestApplyDefaults_Go** - Fill missing commands with Go defaults
7. **TestApplyDefaults_Rust** - Fill missing commands with Rust defaults
8. **TestApplyDefaults_Node** - Fill missing commands with Node defaults
9. **TestApplyDefaults_Python** - Fill missing commands with Python defaults
10. **TestMergeCommandSets_PreferHighPriority** - High priority source overrides low priority

## Verification Gate

```bash
