### Agent D - Output Formatter

```
## What to Implement

Implement YAML output formatter matching the schema from determinism-roadmap.md.
Serialize CommandSet to YAML with proper structure and field ordering.

**Output schema (from roadmap lines 259-285):**
```yaml
toolchain: "go"
commands:
  build: "go build ./..."
  test:
    full: "go test ./..."
    focused_pattern: "go test ./{package} -run {test_name}"
  lint:
    check: "go vet ./..."
    fix: null
  format:
    check: null
    fix: "gofmt -w ."

detection_sources:
  - ".github/workflows/ci.yml"
  - "Makefile"

module_map:
  - package: "./pkg/engine"
    test_count: 67
    focused_recommended: true
  - package: "./internal/api"
    test_count: 12
    focused_recommended: false
```

**Module map generation:**
- Go: scan `go test -list` output per package, count tests
- Rust: scan `cargo test --list` output per crate, count tests
- Node: scan test files in `__tests__/` or `*.test.js`, count describe/it blocks
- Python: scan test files `test_*.py`, count test functions

**Focused test recommendation:**
- If test_count > 50, recommend focused pattern
- Else recommend full suite

