// parseGitLabCI parses .gitlab-ci.yml
func parseGitLabCI(repoRoot string) (*CommandSet, error)

// parseCircleCI parses .circleci/config.yml
func parseCircleCI(repoRoot string) (*CommandSet, error)

// detectToolchain infers toolchain from commands (go test → "go", cargo build → "rust")
func detectToolchain(commands []string) string
```

