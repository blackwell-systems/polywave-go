interface_contracts:
    - name: result.Result[T] canonical pattern
      description: |
        All fallible public engine functions must return result.Result[T] not (T, error).
        Use result.NewSuccess(data) for success, result.NewFailure([]result.SAWError{...}) for
        fatal errors, result.NewPartial(data, errs) for partial success. Use result.NewFatal(code, msg)
        and result.NewError(code, msg) builders. Import pkg/result.
      definition: |
        // Success:
        return result.NewSuccess(data)
        // Fatal failure:
        return result.NewFailure[T]([]result.SAWError{result.NewFatal(result.CodeXxx, msg)})
        // Partial:
        return result.NewPartial(data, []result.SAWError{result.NewError(result.CodeXxx, msg)})
      location: pkg/result/result.go
    - name: BuildWaveConstraints (new signature)
      description: Add ctx parameter; return result.Result.
      definition: |
        func BuildWaveConstraints(ctx context.Context, implPath string, agentID string) result.Result[*tools.Constraints]
      location: pkg/engine/constraints.go
    - name: BuildIntegratorConstraints (new signature)
      description: Add ctx parameter; return result.Result.
      definition: |
        func BuildIntegratorConstraints(ctx context.Context, implPath string) result.Result[*tools.Constraints]
      location: pkg/engine/constraints.go
    - name: FinalizeWave (new signature)
      description: |
        Migrate to result.Result. Wire CodeFinalizeWaveFailed ("N002_FINALIZE_WAVE_FAILED")
        which already exists in codes.go and has never been used.
      definition: |
        func FinalizeWave(ctx context.Context, opts FinalizeWaveOpts) result.Result[FinalizeWaveResult]
      location: pkg/engine/finalize.go
    - name: PrepareWave (new signature)
      description: Migrate to result.Result.
      definition: |
        func PrepareWave(ctx context.Context, opts PrepareWaveOpts) result.Result[PrepareWaveResult]
      location: pkg/engine/prepare.go
    - name: PrepareAgent (new signature)
      description: Migrate to result.Result.
      definition: |
        func PrepareAgent(ctx context.Context, opts PrepareAgentOpts) result.Result[PrepareAgentResult]
      location: pkg/engine/prepare_agent.go
    - name: RunScoutFull (new signature)
      description: Migrate to result.Result.
      definition: |
        func RunScoutFull(ctx context.Context, opts RunScoutFullOpts, onChunk func(string)) result.Result[RunScoutFullResult]
      location: pkg/engine/scout_run.go
    - name: RunTierLoop (new signature)
      description: Migrate to result.Result.
      definition: |
        func RunTierLoop(ctx context.Context, opts TierLoopOpts) result.Result[TierLoopResult]
      location: pkg/engine/program_tier_loop.go
    - name: New error code constants (Wave 4)
      description: |
        New constants added to pkg/result/codes.go. IMPORTANT: CodeDisjointOwnership
        (V002) and CodeWaveSequencingFailed (N026) ALREADY EXIST — do NOT redefine.
        I-range (I001-I099) is Agent ID generation — do NOT use for engine init.
        N003 = CodeScoutFailed, P001 = CodeStateTransitionInvalid, K005 = CodeCachePutCancelled
        — all taken. Use the new slots below.
      definition: |
        // Append after N090 in the N-range block:
        // N091: engine init failed (RunInit general failure)
        CodeEngineInitFailed         = "N091_ENGINE_INIT_FAILED"
        // N092: engine already initialized (AlreadyExists half-success path)
        CodeEngineAlreadyInitialized = "N092_ENGINE_ALREADY_INITIALIZED"
        // N093: finalize step failed (Step* function errors in finalize_steps.go)
        CodeFinalizeStepFailed       = "N093_FINALIZE_STEP_FAILED"

        // Append after B008 in the B-range block:
        // B009: gate validation failed (closed-loop gate retry input validation)
        CodeGateValidationFailed = "B009_GATE_VALIDATION_FAILED"

        // Append after P007 in the P-range block:
        // P008: type collision fatal (E41 gate bypass — fatal DetectCollisions failure)
        CodeTypeCollisionFatal   = "P008_TYPE_COLLISION_FATAL"
        // P009: E37 critic gate failed — verdict ISSUES, workflow must not advance to REVIEWED
        CodeCriticGateFailed     = "P009_CRITIC_GATE_FAILED"
        // P010: P1+ tier conflict — overlapping file ownership detected across IMPLs in same tier
        CodeTierConflictDetected = "P010_TIER_CONFLICT_DETECTED"

        // ALREADY EXIST — use directly, do NOT redefine:
        // result.CodeDisjointOwnership    ("V002_DISJOINT_OWNERSHIP")
        // result.CodeWaveSequencingFailed ("N026_WAVE_SEQUENCING_FAILED")
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Fix P0-1: process-wide SAW_ALLOW_MAIN_COMMIT environment variable race in prepare.go.

            ## Problem
            prepare.go:398,438,603 calls os.Setenv("SAW_ALLOW_MAIN_COMMIT","1") and
            defer os.Unsetenv(...) in multiple code paths. This is process-wide state. When
            two waves prepare concurrently (program-tier parallelism), one wave's defer can
            clear the variable while another wave's git commit is in flight — a data race.

            ## Fix
            1. Find all os.Setenv("SAW_ALLOW_MAIN_COMMIT", ...) calls and all matching
               os.Unsetenv("SAW_ALLOW_MAIN_COMMIT") defers in prepare.go.
            2. Remove them.
            3. Identify where the git commit commands that require SAW_ALLOW_MAIN_COMMIT are
               invoked (look for igit.Run or git.Run calls on the lines just below each Setenv).
            4. Pass the env var per-subprocess instead: add an env override to each git.Run
               call using the appropriate env-passing mechanism (check how igit.Run accepts
               extra env — look for an EnvVars []string parameter or similar). If no per-command
               env override exists, use exec.Command with Env set to append(os.Environ(),
               "SAW_ALLOW_MAIN_COMMIT=1") for just that command.
            5. Verify no other code in prepare.go sets/unsets this env var.

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestPrepare

            ## Constraints
            Own ONLY pkg/engine/prepare.go. Do not touch other files.
          files:
            - pkg/engine/prepare.go
        - id: B
          task: |
            ## Role
            Fix P0-2 (nil deref panic in StepRunGates) and P0-3 (wrong repoKey on failure
            paths in FinalizeWave) and P0-allGone (OR logic bug in finalize.go).

            ## Fix 1: finalize_steps.go:146,148 — nil guard
            StepRunGates calls opts.ObsEmitter.Emit(...) twice without nil guard.
            ObsEmitter is documented optional (finalize.go:30). Add:
              if opts.ObsEmitter != nil { opts.ObsEmitter.Emit(...) }
            at BOTH call sites at lines ~146 and ~148. Pattern is already used at line ~245.

            ## Fix 2: finalize.go:582,608 — multi-repo cleanup key
            Two failure-path early returns store result.CleanupResult["."] = cleanupData
            using hardcoded ".". The success path at lines ~616-623 correctly uses repoKey.
            Replace both hardcoded "." with repoKey in the failure paths.

            ## Fix 3: finalize.go:277-282 — allGone OR logic
            The loop: for _, repoPath := range repos { if AllBranchesAbsent(...) { allGone = true; break } }
            Uses OR logic — sets allGone=true if ANY repo has absent branches. This should be
            AND logic: allGone is only true if ALL repos have absent branches.
            Fix: initialize allGone = true before the loop. Inside the loop, set allGone = false
            if AllBranchesAbsent returns false. Remove the break. Apply same pattern to isSolo.

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestFinalize

            ## Constraints
            Own ONLY finalize_steps.go and finalize.go. Make only the described changes.
          files:
            - pkg/engine/finalize_steps.go
            - pkg/engine/finalize.go
        - id: C
          task: |
            ## Role
            Fix P0-4: E37 violated — critic ISSUES verdict not checked, scout proceeds
            to REVIEWED state regardless of critic outcome.

            ## Problem
            scout_run.go:260-266: After RunCritic returns, res.CriticVerdict is set but
            the verdict is NEVER inspected. Execution falls through to REVIEWED state even
            when verdict == "ISSUES". This violates E37 which states: "If overall verdict
            is ISSUES, orchestrator does NOT enter REVIEWED state."

            ## Fix
            After the RunCritic call (around line 260-264), add a check:
            ```go
            if criticRes.Verdict == "ISSUES" {
                // E37: critic gate failed — do not advance to REVIEWED
                return RunScoutFullResult{
                    CriticVerdict: criticRes.Verdict,
                    IMPLPath:      res.IMPLPath,
                }, fmt.Errorf("E37 critic gate: verdict ISSUES — resolve critic findings before proceeding")
            }
            ```
            NOTE: This uses the current (T, error) signature since the result.Result migration
            happens in Wave 3 Agent K. For now, use fmt.Errorf. Wave 3 will replace it with
            result.NewFailure using CodeCriticGateFailed.

            Also add a comment above the RunCritic call referencing E37.

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestScout

            ## Constraints
            Own ONLY scout_run.go. Make only the E37 enforcement change.
          files:
            - pkg/engine/scout_run.go
        - id: D
          task: |
            ## Role
            Fix P0-5: E26 violated — integration agent AllowedPathPrefixes constraint
            computed then immediately discarded.

            ## Problem
            integration_runner.go:136-137:
              constraints := buildConstraints(manifest, "integrator", "integrator")
              _ = constraints  // comment says "future use"
            The AllowedPathPrefixes from the integrator constraint role is never wired into
            the integration agent's execution. The agent can modify any file in the repo,
            violating E26's I1 enforcement requirement.

            ## Fix
            1. Read the current integration_runner.go to understand how the agent is launched
               (look for the ExecuteStreamingWithTools or similar call after line 137).
            2. Find where the integration agent's tool configuration or system prompt is
               built. Wire constraints.AllowedPathPrefixes into that configuration.
            3. If the runner API does not support AllowedPathPrefixes directly, add it to
               the system prompt as a restriction: build a string listing the allowed paths
               and prepend it to the integration agent's instructions.
            4. Remove the `_ = constraints` line and replace with actual wiring.
            5. Also delete the dead function integrationPromptPath() at lines ~289-301
               (it is declared but never called anywhere).

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...

            ## Constraints
            Own ONLY integration_runner.go.
          files:
            - pkg/engine/integration_runner.go
        - id: E
          task: |
            ## Role
            Fix P0-6, P0-7, P0-8 in program_tier_loop.go: findIMPLDocPath dead loop,
            double gate execution, and missing P1+ conflict check.

            ## Fix 1: findIMPLDocPath (lines ~497-510)
            The function iterates a locations slice but returns on the first iteration —
            the loop is dead code; only the first candidate is ever tried; no os.Stat check.
            Rewrite:
            NOTE: The actual signature is findIMPLDocPath(repoPath, slug string) — it takes
            TWO arguments. The repoPath is needed to construct absolute paths for os.Stat.
            Read the actual function signature before rewriting.

            ```go
            func findIMPLDocPath(repoPath, slug string) string {
                locations := []string{
                    filepath.Join(repoPath, "docs/IMPL", fmt.Sprintf("IMPL-%s.yaml", slug)),
                    filepath.Join(repoPath, "docs/IMPL/complete", fmt.Sprintf("IMPL-%s.yaml", slug)),
                    filepath.Join(repoPath, "docs/IMPL", fmt.Sprintf("IMPL-%s.yml", slug)),
                }
                for _, loc := range locations {
                    if _, err := os.Stat(loc); err == nil {
                        return loc
                    }
                }
                return ""
            }
            ```
            Update the caller to treat "" as a fatal error, not a silent skip.

            ## Fix 2: double gate execution (lines ~229-234 and ~299)
            In auto mode, protocol.RunTierGate is called at ~line 229, then again inside
            AdvanceTierAutomatically at ~line 299. Remove the first call (lines ~229-234)
            entirely. AdvanceTierAutomatically owns the canonical gate invocation.

            ## Fix 3: missing P1+ conflict check (~line 100)
            After PartitionIMPLsByStatus and before any scout/wave is launched, add:
            ```go
            if err := protocol.CheckIMPLConflicts(ctx, tierSlugs, opts.RepoPath); err != nil {
                return nil, fmt.Errorf("P1+ tier conflict check failed: %w", err)
            }
            ```
            (Use the actual function name — verify it exists in pkg/protocol; if the function
            is named differently, use the correct name. If it does not exist, check if
            ValidateProgramImportMode covers this; if not, add a TODO comment and skip.)
            NOTE: Wave 3 Agent I will migrate to result.Result; use fmt.Errorf for now.

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestTierLoop

            ## Constraints
            Own ONLY program_tier_loop.go.
          files:
            - pkg/engine/program_tier_loop.go
    - number: 2
      agents:
        - id: F
          task: |
            ## Role
            Migrate prepare_agent.go to result.Result[T]. Also fix FilesOwned count and
            YAML quoting in saw_name frontmatter. Wave 1 Agent A already fixed prepare.go's
            P0 issue; you only own prepare_agent.go in this wave.

            ## What to implement

            ### prepare_agent.go
            1. Migrate PrepareAgent to result.Result[PrepareAgentResult]:
               - Change signature to: func PrepareAgent(ctx context.Context, opts PrepareAgentOpts) result.Result[PrepareAgentResult]
               - Replace all fmt.Errorf returns with result.NewFailure using appropriate codes
               - Replace final return with result.NewSuccess(result)
            2. Fix FilesOwned (line ~266): change len(agentFiles) to len(ownedSet) to count
               the merged set from agent.Files + file_ownership entries.
            3. Fix saw_name YAML quoting (line ~111): currently uses bare %s which produces
               invalid YAML for values with brackets. Change to single-quoted YAML string:
               fmt.Sprintf("'%s'", sawName) or equivalent safe YAML quoting.
               NOTE: prepare.go has the same issue at line ~893 but is owned by Wave 1
               Agent A — do NOT touch prepare.go.

            ## Interfaces to implement
            See interface_contracts: PrepareAgent (new signature).

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestPrepare

            ## Constraints
            Own ONLY prepare_agent.go. Do not touch prepare.go.
          files:
            - pkg/engine/prepare_agent.go
          dependencies:
            - A
        - id: G
          task: |
            ## Role
            Migrate finalize_tier.go and finalize_impl.go to result.Result[T].
            Wave 1 Agent B already fixed finalize.go and finalize_steps.go P0 issues.

            ## finalize_tier.go
            1. Migrate FinalizeTierEngine to result.Result[FinalizeTierResult]:
               - Change signature to return result.Result[FinalizeTierResult]
               - FinalizeTierResult.Errors []string → []result.SAWError
               - Replace fmt.Errorf returns with result.NewFailure
               - Append errors as result.SAWError via result.NewError(code, msg)
            2. Investigate the double manifest parse (line ~54 and ~142). Read the code
               between the two parses; if no disk write occurs between them that would
               require a re-read, remove the second parse and use the in-memory manifest.

            ## finalize_impl.go
            1. FinalizeIMPLEngine currently returns BOTH result.Result[T] AND error — dual
               channel signaling. Remove the error return. Migrate cancellation path to
               result.NewFailure with CodeContextCancelled (check if this constant exists
               in codes.go; if not use the closest equivalent).
            2. Change signature to: func FinalizeIMPLEngine(ctx context.Context, opts FinalizeIMPLEngineOpts) result.Result[protocol.FinalizeIMPLData]

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestFinalize

            ## Constraints
            Own ONLY finalize_tier.go and finalize_impl.go.
          files:
            - pkg/engine/finalize_tier.go
            - pkg/engine/finalize_impl.go
          dependencies:
            - B
        - id: H
          task: |
            ## Role
            Migrate run_wave_atomic.go, run_wave_full.go, and runner_wave_structured.go
            to result.Result[T]. Fix context.TODO() in captureSnapshot. Fix silent error
            swallow in runner_wave_structured.go.

            ## run_wave_atomic.go
            1. Migrate RunWaveTransaction (and any other public functions) to result.Result[T].
            2. captureSnapshot (line ~37): uses context.TODO() to call protocol.Load.
               Add ctx context.Context parameter to captureSnapshot and thread caller's ctx.
            3. restoreSnapshot (line ~59): uses context.Background() — this is INTENTIONAL
               (rollback must complete even if caller context is cancelled). Do NOT change
               the value; add a comment: "// context.Background() intentional: rollback must
               complete regardless of caller cancellation."

            ## run_wave_full.go
            1. Migrate primary export to result.Result[T].
            2. Use LSP find-references to check if RunWaveFull has any production callers.
               If no callers exist outside test files, add // Deprecated: no production callers.
               If callers exist, migrate them in the same wave (you own this file).

            ## runner_wave_structured.go
            1. Migrate RunWaveAgentStructured to result.Result[CompletionReport].
            2. Fix line ~131: protocol.WithCompletionReportLock(context.TODO(), ...) →
               use caller's ctx parameter.
            3. Fix line ~151: finalManifest, _ := protocol.Load(context.TODO(), opts.IMPLPath)
               The error is silently discarded. Fix:
               finalManifest, loadErr := protocol.Load(ctx, opts.IMPLPath)
               if loadErr != nil {
                   // log warn but don't fail — return the completion report we have
                   slog.WarnContext(ctx, "failed to reload manifest after save", "err", loadErr)
               }

            ## Verification gate
            go build ./pkg/engine/...
            go vet ./pkg/engine/...

            ## Constraints
            Own ONLY run_wave_atomic.go, run_wave_full.go, runner_wave_structured.go.
          files:
            - pkg/engine/run_wave_atomic.go
            - pkg/engine/run_wave_full.go
            - pkg/engine/runner_wave_structured.go
    - number: 3
      agents:
        - id: I
          task: |
