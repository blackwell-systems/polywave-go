title: pkg/engine Canonicalization and Protocol Conformance Fixes
feature_slug: engine-review-fixes
verdict: SUITABLE
suitability_assessment: |
    pkg/engine is the core orchestration engine at 21,744 lines across 65 files. Deep review
    identified 8 P0 correctness bugs (including two protocol violations: E37 critic gate bypass,
    E26 integration constraint discarded), an incomplete result.Result[T] migration across ~20
    exported functions, broken context propagation at ~12 call sites, dead code, and protocol
    documentation drift.

    File decomposition: 5-wave structure with fully disjoint per-wave ownership. P0 fixes in
    Wave 1 (5 parallel agents, no shared files). result.Result migration split across Waves 2-3
    by functional cluster. Dead code + docs in Wave 4. Struct fixes + callers in Wave 5.

    Out of scope: runner.go decomposition (1485 lines → 6 logical units) is a separate future
    IMPL. That refactor requires its own planning pass and is too large to bundle here.

    Estimated time savings vs sequential: ~3 hours saved across 22 parallel agents.
test_command: go test ./pkg/engine/... ./pkg/result/... ./pkg/gatecache/... ./cmd/sawtools/...
lint_command: go vet ./...
