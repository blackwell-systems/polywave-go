# IMPL: impl-schema-validation
title: "IMPL Manifest Schema Validation"
feature_slug: "impl-schema-validation"
verdict: "SUITABLE"
test_command: "go test ./..."
lint_command: "go vet ./..."
state: "SCOUT_PENDING"

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES - Work decomposes cleanly across 2 repos and 6+ files.
#    The JSON Schema file (protocol repo), Go schema validator, unknown-key detector,
#    cross-field validator, nested-field validator, and CLI integration are all in
#    separate files with disjoint ownership.
#
# 2. Investigation-first: NO - All requirements are well-defined. The problem is
#    structural (missing validation), not behavioral (no root-cause analysis needed).
#
# 3. Interface discoverability: YES - The interface is simple: each validator function
#    takes *IMPLManifest and returns []ValidationError. This pattern is already
#    established across 10+ existing validators (I1-I6, E9, SM01, DC04, DC07, MR01).
#
# 4. Pre-implementation status check:
#    Total items: 6 deliverables
#    Already implemented (DONE): 1 - GenerateScoutSchema() in schema.go already generates
#      a JSON Schema via reflection (schema_test.go has 3 tests). However, it generates
#      from Go types rather than being a hand-written schema, and it only covers Scout
#      output fields. This is PARTIAL at best.
#    Partially implemented (PARTIAL): 1 - Enum validation exists for some fields
#      (enumvalidation.go covers completion statuses, failure types, pre-mortem risk)
#      but misses FileOwnership.Action, QualityGates.Level, ScaffoldFile.Status.
#    Not implemented (TO-DO): 4 - Nested required field validation, unknown key
#      detection, cross-field consistency, and hand-written JSON Schema file.
#
#    Agent adjustments:
#    - Agent A (JSON Schema) proceeds as planned (new file in protocol repo)
#    - Agent B (nested required fields) proceeds as planned (new file)
#    - Agent C (enum completion) changed to "extend existing enum validation"
#    - Agent D (unknown key detection) proceeds as planned (new capability)
#    - Agent E (cross-field validation) proceeds as planned (new file)
#    - Agent F (CLI integration) proceeds as planned (modify existing)
#
# 5. Parallelization value: HIGH - 5 independent agents in Wave 1, each touching
#    2-3 files. Build/test cycle is ~15s for `go test ./pkg/protocol/...` but
#    agents work in isolated worktrees. All Wave 1 agents are fully independent.
#
# Estimated times:
# - Scout phase: ~8 min (dependency mapping, interface contracts)
# - Agent execution: ~12 min (5 agents x 10 min avg, parallel in Wave 1, then 1 agent in Wave 2)
# - Merge & verification: ~4 min
# Total SAW time: ~24 min
#
# Sequential baseline: ~60 min (6 agents x 10 min avg)
# Time savings: ~36 min (~60% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  SUITABLE. Work decomposes into 5 independent validators (Wave 1) plus
  CLI integration (Wave 2). All follow the established validator pattern:
  func validate*(m *IMPLManifest) []ValidationError. No investigation needed.
  Existing schema.go generates schema via reflection but does not perform
  structural validation - the new work adds actual validation functions.
  Cross-repo: JSON Schema file goes to scout-and-wave (protocol repo),
  all Go code goes to scout-and-wave-go (SDK repo).

# Quality Gates
quality_gates:
  level: "standard"
  gates:
    - type: "build"
      command: "go build ./..."
      required: true
    - type: "lint"
      command: "go vet ./..."
      required: true
    - type: "test"
      command: "go test ./pkg/protocol/... -count=1"
      required: true

# Scaffolds
scaffolds:
  - file_path: "pkg/protocol/schema_errors.go"
    contents: |
      package protocol

      // Schema validation error code constants (SV01 prefix).
      const (
        SV01RequiredField    = "SV01_REQUIRED_FIELD"
        SV01InvalidEnum      = "SV01_INVALID_ENUM"
        SV01InvalidPath      = "SV01_INVALID_PATH"
        SV01UnknownKey       = "SV01_UNKNOWN_KEY"
        SV01CrossFieldError  = "SV01_CROSS_FIELD"
      )
    import_path: "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
    status: "pending"

# Interface Contracts
interface_contracts:
  - name: "ValidateSchema"
    description: |
      Top-level schema validation entry point. Runs all structural checks
      (nested required fields, enum enforcement, path format, unknown keys,
      cross-field consistency). Called by Validate() in validation.go alongside
      existing semantic checks. Returns warnings by default (SV01 prefix).
    definition: |
      func ValidateSchema(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/schema_validation.go"

  - name: "validateNestedRequiredFields"
    description: |
      Checks required fields on nested types: FileOwnership.File,
      FileOwnership.Agent, FileOwnership.Wave > 0, Agent.ID, Agent.Task,
      Wave.Number > 0, InterfaceContract.Name, InterfaceContract.Definition,
      InterfaceContract.Location, QualityGate.Type, QualityGate.Command,
      ScaffoldFile.FilePath.
    definition: |
      func validateNestedRequiredFields(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/schema_validation.go"

  - name: "validateAllEnums"
    description: |
      Validates ALL enum fields in the manifest, complementing existing
      enum validators. Covers: FileOwnership.Action (new|modify|delete),
      QualityGates.Level (quick|standard|full), ScaffoldFile.Status
      (pending|committed), PreMortemRow.Likelihood (low|medium|high),
      PreMortemRow.Impact (low|medium|high). Empty values are allowed
      for backward compatibility.
    definition: |
      func validateAllEnums(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/schema_enum_validation.go"

  - name: "validateFilePaths"
    description: |
      Validates file path format in FileOwnership and Agent.Files:
      no leading slash, no ".." traversal, no null bytes, no backslashes.
      Also validates ScaffoldFile.FilePath.
    definition: |
      func validateFilePaths(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/schema_validation.go"

  - name: "DetectUnknownKeys"
    description: |
      Detects unknown/typo YAML keys by unmarshaling raw YAML into
      map[string]interface{} and comparing top-level and nested keys
      against the known schema. Returns SV01_UNKNOWN_KEY warnings.
      Operates on raw YAML bytes, not the parsed struct.
    definition: |
      func DetectUnknownKeys(yamlData []byte) []ValidationError
    location: "pkg/protocol/schema_unknown_keys.go"

  - name: "validateCrossFieldConsistency"
    description: |
      Cross-field validation rules:
      1. FileOwnership agent IDs must all appear in some Wave.Agents
      2. FileOwnership wave numbers must match existing Wave.Number values
      3. Agent.Files entries must all appear in FileOwnership
      4. Completion report agent IDs must match Wave agent IDs
      5. If verdict is NOT_SUITABLE, waves/file_ownership/interface_contracts should be empty
    definition: |
      func validateCrossFieldConsistency(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/schema_cross_field.go"

