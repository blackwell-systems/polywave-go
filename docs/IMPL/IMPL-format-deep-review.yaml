title: 'pkg/format Deep Review and Modernization'
feature_slug: format-deep-review
verdict: NOT_SUITABLE
suitability_assessment: |
  The pkg/format package is a minimal utility (71 lines of implementation code,
  139 lines of tests) with a single exported function. Review findings:

  1. **Result[T] conformance**: DetectFormatter returns FormatConfig directly,
     not result.Result[FormatConfig]. However, this is appropriate because the
     function is infallible — it returns a zero value when no formatter is
     detected, which the caller treats as "no formatter available" (not an error).
     The current signature is correct for its use case.

  2. **Error handling**: No errors are returned or created. The function uses
     os.Stat to check for marker files; stat failures are silently treated as
     "file not present". This is correct for the detection use case — missing
     files are expected, not exceptional.

  3. **Dead code**: None detected. Both DetectFormatter and FormatConfig are
     actively used by pkg/protocol/gates.go (lines 285-298).

  4. **Duplication**: None. The package is a single-purpose utility with no
     internal duplication.

  5. **Simplification opportunities**: None. The implementation is already minimal:
     a simple if-chain checking marker files in priority order.

  6. **Test coverage**: Comprehensive. All detection paths covered, precedence
     rules verified, edge cases handled (nonexistent dir, empty dir).

  7. **Integration consistency**: Integrates cleanly with pkg/protocol/gates.go.
     The caller handles the zero-value case correctly (treats as skip, not error).
     Context parameter added in commit 18972c6 for future cancellation support.

  **Verdict rationale**: This package is already well-structured, fully tested,
  and correctly integrated. It does not return Result[T] because it has no error
  cases — this is the right choice for an infallible detection function. No
  changes needed.

  **Alternative approach**: Manual inspection and documentation update only. Add
  a note to docs/reference/package-review-checklist.md that format.DetectFormatter
  is an exception to the Result[T] conformance rule because it is infallible.

  **Context parameter note**: The ctx parameter is currently unused but was added
  in commit 18972c6 for future cancellation support. This is intentional — the
  function does not yet support cancellation, but the parameter is in place for
  when file I/O operations need context-aware timeouts in the future.

state: NOT_SUITABLE

test_command: go test ./pkg/format/...
lint_command: go vet ./pkg/format/...

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./pkg/format/...
      required: true
    - type: test
      command: go test ./pkg/format/...
      required: true
    - type: lint
      command: go vet ./pkg/format/...
      required: true

file_ownership: []

interface_contracts: []

waves: []

scaffolds: []

pre_mortem:
  overall_risk: low
  rows:
    - scenario: Result[T] conformance enforcement breaks infallible functions
      likelihood: low
      impact: medium
      mitigation: Document the infallible-function exception in the conformance guide. Functions with no error cases should not return Result[T].

known_issues:
  - title: pkg/format correctly omits Result[T] (infallible function)
    description: |
      DetectFormatter does not return result.Result[FormatConfig] because it has
      no error cases. Missing marker files return a zero FormatConfig, which is
      a valid success state, not an error. This is the correct design.

      Documentation impact: clarify that infallible functions are exempt from
      Result[T] conformance.
    status: by_design
  - title: Context parameter currently unused
    description: |
      The ctx context.Context parameter was added in commit 18972c6 but is not
      yet used. This is intentional — the parameter is in place for future
      cancellation support when file I/O operations need context-aware timeouts.

      No action required. The unused parameter does not affect functionality.
    status: by_design
