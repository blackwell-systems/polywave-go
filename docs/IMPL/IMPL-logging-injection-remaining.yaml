            **Objective:** Replace all 8 slog.Default() calls in CreateWorktrees with injected logger parameter.

            **Implementation:**
            1. Add `logger *slog.Logger` parameter to CreateWorktrees function signature (after repoDir parameter)
            2. At the top of CreateWorktrees function body, add: `log := loggerFrom(logger)` (define loggerFrom helper if not present in this file)
            3. Replace all 8 slog.Default() calls with `log` variable:
               - Line 174: `slog.Default().Debug("protocol: cleaned up stale merged branch", ...)`
               - Line 206: `slog.Default().Warn("protocol: failed to get worktree base commit, treating as stale", ...)`
               - Line 209: `slog.Default().Debug("protocol: removed stale worktree", ...)`
               - Line 214: `slog.Default().Debug("protocol: removed stale worktree", ...)`
               - Line 220: `slog.Default().Warn("protocol: failed to verify hook", ...)`
               - Line 225: `slog.Default().Debug("protocol: removed worktree with invalid hooks", ...)`
               - Line 228: `slog.Default().Debug("protocol: reusing valid worktree", ...)`
               - Line 254: `slog.Default().Warn("protocol: failed to install hooks", ...)`

            **Verification gate:**
            ```bash
            go build ./pkg/protocol && go test ./pkg/protocol -run TestCreateWorktrees -timeout 30s && go vet ./pkg/protocol
            ```

            **Constraints:**
            - Do not modify function signatures of helper functions (WorktreeDir, BranchName, etc.)
            - Do not change any logic — only inject logger parameter and replace slog.Default() calls
            - Preserve all existing log messages and fields exactly as written
            - If loggerFrom helper is not present in this file, define it at package level:
              ```go
              func loggerFrom(l *slog.Logger) *slog.Logger {
                  if l == nil {
                      return slog.Default()
                  }
