pre_mortem:
    overall_risk: low
    rows:
        - scenario: Wave 1 agents define loggerFrom helper redundantly in multiple protocol files
          likelihood: medium
          impact: low
          mitigation: Each agent defines loggerFrom at package level if not present. Post-merge, consolidate into a single definition in protocol/helpers.go (optional cleanup, not blocking).
        - scenario: Wave 2 agents miss some call sites in pkg/engine that need logger threading
          likelihood: medium
          impact: medium
          mitigation: Each Wave 2 agent's task includes explicit grep instruction to find all call sites. Verification gates will catch compilation errors if signatures mismatch.
        - scenario: Test failures due to nil logger handling in protocol functions
          likelihood: low
          impact: medium
          mitigation: loggerFrom helper handles nil logger gracefully (falls back to slog.Default()). Existing tests may not pass logger, which is safe — backward compatible.
        - scenario: Merge conflicts on same-package files if agents independently define loggerFrom
          likelihood: low
          impact: low
          mitigation: loggerFrom definitions are identical (same helper pattern). Git auto-merge will handle duplicate definitions. Post-merge cleanup can consolidate.
