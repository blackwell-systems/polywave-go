pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent B writes wm, wmErr := worktree.New(...) but the compiler sees
            the old single-return signature in its isolated worktree (Agent A's
            branch not yet merged). Build fails in Agent B's worktree.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent B should write code for the new two-return signature regardless.
            The build failure in isolation is expected and resolves at merge time
            when Agent A's changes are merged first. Agent B must document the
            compilation state in its completion report if worktrees are merged
            sequentially. Alternatively, orchestrate Agent A's merge before
            launching Agent B, treating this as a two-step wave.
        - scenario: |-
            Agent A changes CleanupAll error collection logic and accidentally
            breaks the partial vs. total-failure distinction.
          likelihood: low
          impact: medium
          mitigation: |-
            The existing TestCleanupAllPartial test covers this distinction.
            Agent A must run the full pkg/worktree/... test suite and verify it
            passes. The new TestCleanupAllErrorPropagation test explicitly checks
            the error code is G008 (not G007).
        - scenario: |-
            Agent B calls wm.CleanupAll() in RunWave but the Manager active map
            is empty because merge.go already removed the worktrees. CleanupAll
            logs no-op result with RemovedCount=0.
          likelihood: high
          impact: low
          mitigation: |-
            This is acceptable. CleanupAll on an empty active map returns Success
            with RemovedCount=0 (covered by TestCleanupAllEmpty). The CleanupAll
            call is a safety net for early-exit cases, not the primary removal path.
            No additional handling needed.
