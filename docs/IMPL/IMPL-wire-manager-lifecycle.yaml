title: Wire Manager Lifecycle
feature_slug: wire-manager-lifecycle
verdict: SUITABLE
suitability_assessment: |
    All six fixes decompose cleanly into two disjoint agents:
    - Agent A owns pkg/worktree/ (manager internals: validation, TOCTOU, error propagation, doc fix, tests)
    - Agent B owns pkg/orchestrator/orchestrator.go (wiring CleanupAll and Remove into RunWave/RunAgent)

    No interface changes cross agent boundaries — Manager method signatures are unchanged;
    Agent B calls the existing wm.CleanupAll() that Agent A hardens internally. Single wave,
    fully parallel execution.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: 2 agents x ~10 min avg = ~10 min with parallelism
    - Merge and verification: ~3 min
    Total SAW time: ~28 min

    Sequential baseline: ~25 min (2 agents x ~12 min sequential)
    Time savings: Marginal on time; primary value is coordination clarity and parallel execution.

    Recommendation: SUITABLE. Proceed — 2 independent agents, disjoint files, clear interface.
test_command: go test ./pkg/worktree/... ./pkg/orchestrator/...
lint_command: go vet ./...
