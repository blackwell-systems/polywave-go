    - name: WithContext (fixed)
      description: Value-receiver method that clones the map before mutating to prevent shared-map corruption on fork
      definition: |
        func (e SAWError) WithContext(key, value string) SAWError {
            newCtx := make(map[string]string, len(e.Context)+1)
            for k, v := range e.Context {
                newCtx[k] = v
            }
            newCtx[key] = value
            e.Context = newCtx
            return e
        }
