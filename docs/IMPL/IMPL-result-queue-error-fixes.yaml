            ## Agent A — Fix WithContext shared-map bug and add NewInfo constructor

            ### What to implement

            **Error 1: WithContext shared-map mutation bug** in `pkg/result/result.go`.

            The current `WithContext` method (value receiver) does not clone the map before
            mutating. Since Go maps are reference types, forking two copies from the same
            base corrupts both. Replace the implementation at lines 58-64.

            Find this exact code in `pkg/result/result.go`:
            ```go
            func (e SAWError) WithContext(key, value string) SAWError {
            	if e.Context == nil {
            		e.Context = make(map[string]string)
            	}
            	e.Context[key] = value
            	return e
            }
            ```

            Replace with:
            ```go
            func (e SAWError) WithContext(key, value string) SAWError {
            	newCtx := make(map[string]string, len(e.Context)+1)
            	for k, v := range e.Context {
            		newCtx[k] = v
            	}
            	newCtx[key] = value
            	e.Context = newCtx
            	return e
            }
            ```

            **Error 2: Missing NewInfo constructor** in `pkg/result/result.go`.

            Add `NewInfo` after the existing `NewWarning` function (line 85). Follow the
            exact same pattern as `NewError`, `NewFatal`, and `NewWarning`:

            Insert after this exact text:
            ```go
            // NewWarning creates a SAWError with severity "warning".
            func NewWarning(code, message string) SAWError {
            	return SAWError{Code: code, Message: message, Severity: "warning"}
            }
            ```

            Add:
            ```go

            // NewInfo creates a SAWError with severity "info".
            func NewInfo(code, message string) SAWError {
            	return SAWError{Code: code, Message: message, Severity: "info"}
            }
            ```

            ### Tests to add in `pkg/result/result_test.go`

            1. **TestWithContextForkSafety** — The critical fork test:
               ```go
               func TestWithContextForkSafety(t *testing.T) {
                   base := NewError("E001", "base").WithContext("shared", "original")
                   a := base.WithContext("k1", "v1")
                   b := base.WithContext("k2", "v2")

                   // a should have shared+k1, b should have shared+k2
                   if a.Context["k2"] != "" {
                       t.Errorf("fork a leaked k2: got %q", a.Context["k2"])
                   }
                   if b.Context["k1"] != "" {
                       t.Errorf("fork b leaked k1: got %q", b.Context["k1"])
                   }
                   if a.Context["shared"] != "original" {
                       t.Errorf("a lost shared: got %q", a.Context["shared"])
                   }
                   if b.Context["shared"] != "original" {
                       t.Errorf("b lost shared: got %q", b.Context["shared"])
                   }
                   // base should be unchanged
                   if len(base.Context) != 1 {
                       t.Errorf("base context mutated: len=%d, want 1", len(base.Context))
                   }
               }
               ```

            2. **TestNewInfo** — Constructor test:
               ```go
               func TestNewInfo(t *testing.T) {
                   e := NewInfo("I001", "informational message")
                   if e.Code != "I001" {
                       t.Errorf("Code = %q, want %q", e.Code, "I001")
                   }
                   if e.Message != "informational message" {
                       t.Errorf("Message = %q, want %q", e.Message, "informational message")
                   }
                   if e.Severity != "info" {
                       t.Errorf("Severity = %q, want %q", e.Severity, "info")
                   }
               }
               ```

            3. Add `NewInfo` to the existing `TestNewErrorConstructors` test. Find:
               ```go
               	w := NewWarning("W001", "warning msg")
               	if w.Code != "W001" || w.Message != "warning msg" || w.Severity != "warning" {
               		t.Errorf("NewWarning = %+v", w)
               	}
               ```
               Insert after it:
               ```go

               	i := NewInfo("I001", "info msg")
               	if i.Code != "I001" || i.Message != "info msg" || i.Severity != "info" {
               		t.Errorf("NewInfo = %+v", i)
               	}
               ```

            4. Add `NewInfo` to the SAWError interface test. In `TestSAWErrorInterface`, find:
               ```go
               		{
               			name: "warning severity",
               			err:  NewWarning("W001", "heads up"),
               			want: "[warning] W001: heads up",
               		},
               ```
               Insert after it:
               ```go
               		{
               			name: "info severity",
               			err:  NewInfo("I001", "fyi"),
               			want: "[info] I001: fyi",
               		},
               ```

            5. Update `TestSAWErrorIsFatal` to include NewInfo. Find:
               ```go
               	if NewWarning("W001", "warning").IsFatal() {
               		t.Error("NewWarning should not be fatal")
               	}
               ```
               Insert after it:
               ```go
               	if NewInfo("I001", "info").IsFatal() {
               		t.Error("NewInfo should not be fatal")
               	}
               ```

