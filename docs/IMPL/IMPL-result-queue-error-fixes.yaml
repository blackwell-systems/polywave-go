            ## Agent C — Fix completedSlugs silent failure, add UpdateStatus validation, wire Q006

            ### What to implement

            Three related fixes in `pkg/queue/manager.go`:

            **Error 4 + Error 6: completedSlugs silent failure + wire CodeQueueCorruptedFile**

            In `completedSlugs()`, the `os.ReadFile` error at line 191-192 is silently swallowed
            with `continue`. Wire the existing `result.CodeQueueCorruptedFile` (Q006) to surface
            these failures as warnings in a partial result.

            Find this exact code in `pkg/queue/manager.go`:
            ```go
            	for _, e := range entries {
            		if e.IsDir() {
            			continue
            		}
            		name := e.Name()
            		if !strings.HasSuffix(name, ".yaml") {
            			continue
            		}

            		// Try to extract feature_slug from file contents
            		path := filepath.Join(completeDir, name)
            		data, err := os.ReadFile(path)
            		if err != nil {
            			continue
            		}
            ```

            Replace the `data, err := os.ReadFile(path)` block. Instead of silently continuing,
            collect warnings and return a partial result when files are unreadable:

            1. Before the loop, add: `var warnings []result.SAWError`
            2. Replace the `if err != nil { continue }` with:
               ```go
               if err != nil {
                   warnings = append(warnings, result.NewWarning(result.CodeQueueCorruptedFile,
                       fmt.Sprintf("cannot read IMPL file %s: %s", name, err.Error())).WithCause(err))
                   continue
               }
               ```
            3. At the end of the function, replace `return result.NewSuccess(completed)` with:
               ```go
               if len(warnings) > 0 {
                   return result.NewPartial(completed, warnings)
               }
               return result.NewSuccess(completed)
               ```

            The final `return result.NewSuccess(completed)` to replace is this one (the last line
            of the function, after the for loop):
            ```go
            	return result.NewSuccess(completed)
            }
            ```

            **Error 5: UpdateStatus accepts arbitrary status strings**

            Add validation at the top of `UpdateStatus`. Find this exact code:
            ```go
            func (m *Manager) UpdateStatus(slug string, status string) result.Result[UpdateStatusData] {
            	dir := m.queueDir()
            ```

            Insert between the function signature and `dir := m.queueDir()`:
            ```go
            	validStatuses := map[string]bool{
            		"queued":      true,
            		"in_progress": true,
            		"complete":    true,
            		"blocked":     true,
            	}
            	if !validStatuses[status] {
            		return result.NewFailure[UpdateStatusData]([]result.SAWError{
            			result.NewError(result.CodeQueueStatusUpdateFailed,
            				fmt.Sprintf("invalid status %q: must be one of queued, in_progress, complete, blocked", status)),
            		})
            	}

            ```

            ### Tests to add in `pkg/queue/manager_test.go`

            1. **TestCompletedSlugs_UnreadableFile_ReturnsWarning** — Verify Q006 is emitted:
               ```go
               func TestCompletedSlugs_UnreadableFile_ReturnsWarning(t *testing.T) {
                   dir := t.TempDir()
                   mgr := NewManager(dir)

                   // Create complete directory with an unreadable file
                   completeDir := filepath.Join(dir, "docs", "IMPL", "complete")
                   if err := os.MkdirAll(completeDir, 0o755); err != nil {
                       t.Fatal(err)
                   }
                   unreadablePath := filepath.Join(completeDir, "IMPL-broken.yaml")
                   if err := os.WriteFile(unreadablePath, []byte("feature_slug: broken"), 0o644); err != nil {
                       t.Fatal(err)
                   }
                   if err := os.Chmod(unreadablePath, 0o000); err != nil {
                       t.Fatal(err)
                   }
                   defer os.Chmod(unreadablePath, 0o644)

                   // Also add a readable file to verify it still gets processed
                   readablePath := filepath.Join(completeDir, "IMPL-readable.yaml")
                   if err := os.WriteFile(readablePath, []byte("feature_slug: readable\n"), 0o644); err != nil {
                       t.Fatal(err)
                   }

                   // completedSlugs is unexported, so test via Next() behavior
                   // Add an item that depends on "readable"
                   item := Item{Title: "Dep", Priority: 1, Slug: "dep", DependsOn: []string{"readable"}}
                   addRes := mgr.Add(item)
                   if addRes.IsFatal() {
                       t.Fatalf("Add: %v", addRes.Errors[0].Message)
                   }

                   nextRes := mgr.Next()
                   // Should still find "dep" since "readable" is resolved
                   if nextRes.IsFatal() {
                       t.Fatalf("Next should succeed: %v", nextRes.Errors[0].Message)
                   }
                   if nextRes.GetData().Slug != "dep" {
                       t.Errorf("slug = %q, want %q", nextRes.GetData().Slug, "dep")
                   }
               }
               ```

            2. **TestUpdateStatus_InvalidStatus** — Verify validation rejects bad values:
               ```go
               func TestUpdateStatus_InvalidStatus(t *testing.T) {
                   dir := t.TempDir()
                   mgr := NewManager(dir)

                   item := Item{Title: "Test", Priority: 1, Slug: "test"}
                   if addRes := mgr.Add(item); addRes.IsFatal() {
                       t.Fatalf("Add: %v", addRes.Errors[0].Message)
                   }

                   updateRes := mgr.UpdateStatus("test", "banana")
                   if !updateRes.IsFatal() {
                       t.Fatal("expected Fatal result for invalid status")
                   }
                   if len(updateRes.Errors) == 0 {
                       t.Fatal("expected errors")
                   }
                   if updateRes.Errors[0].Code != result.CodeQueueStatusUpdateFailed {
                       t.Errorf("error code = %q, want %q", updateRes.Errors[0].Code, result.CodeQueueStatusUpdateFailed)
                   }
                   if !strings.Contains(updateRes.Errors[0].Message, "banana") {
                       t.Errorf("error message should mention invalid status, got: %s", updateRes.Errors[0].Message)
                   }
               }
               ```
               Note: This test requires adding `"strings"` to the import block if not already present.

            3. **TestUpdateStatus_AllValidStatuses** — Verify all 4 valid statuses are accepted:
               ```go
               func TestUpdateStatus_AllValidStatuses(t *testing.T) {
                   for _, status := range []string{"queued", "in_progress", "complete", "blocked"} {
                       t.Run(status, func(t *testing.T) {
                           dir := t.TempDir()
                           mgr := NewManager(dir)

                           item := Item{Title: "Test", Priority: 1, Slug: "test"}
                           if addRes := mgr.Add(item); addRes.IsFatal() {
