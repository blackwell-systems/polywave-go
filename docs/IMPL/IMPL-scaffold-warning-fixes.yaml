title: "Fix pkg/scaffold warnings: context propagation, dead alias, doc drift, regex perf, missing test, error wrapping"
feature_slug: scaffold-warning-fixes
verdict: SUITABLE_WITH_CAVEATS
state: REVIEWED

suitability_assessment: |
  Seven inspector warnings in pkg/scaffold/ — all are small, well-specified fixes.
  All changes are confined to a single package (pkg/scaffold/) touching 5 files.
  Single agent is appropriate; no parallelization benefit (1 wave, 1 agent).
  Value is coordination/audit trail, not speed.

  All 7 items are confirmed TODO by reading the source files:
  - wrapper.go:11 uses context.TODO() instead of accepting ctx
  - post_agent.go:94 extractTypeDefinitions is a trivial alias for extractTypeNames
  - doc.go:8 references CLI flags that differ between binaries
  - pre_agent.go:102-104 regexp.MustCompile called in loop
  - pre_agent.go:83-111 nested brace limitation documented but untested
  - wrapper.go has no unit test
  - wrapper.go:13-14 bare error return without wrapping

  Cross-repo note: Warning 1 changes the exported signature of DetectScaffolds.
  The web repo caller at scout-and-wave-web/cmd/saw/detect_scaffolds.go:38 will
  need a corresponding update. This IMPL scopes to the Go repo only.

  Estimated times:
  - Scout phase: ~5 min
  - Agent execution: ~8 min (1 agent, 7 fixes across 5 files)
  - Merge & verification: ~2 min
  Total SAW time: ~15 min
  Sequential baseline: ~10 min (single developer, no coordination overhead)
  Time savings: -5 min (overhead dominates for single agent)
  Recommendation: Coordination value — IMPL doc serves as audit trail for the
  inspector report fixes and documents the cross-repo breaking change.

