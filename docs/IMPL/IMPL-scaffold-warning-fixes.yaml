          - pkg/scaffold/wrapper_test.go
          - pkg/scaffold/post_agent.go
          - pkg/scaffold/post_agent_test.go
          - pkg/scaffold/pre_agent.go
          - pkg/scaffold/pre_agent_test.go
          - pkg/scaffold/doc.go
