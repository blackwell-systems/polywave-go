interface_contracts: []
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Fix two bugs in `pkg/journal/observer.go`. Do NOT change any exported
            function signatures. Do NOT add new exported types.

            ## Bug 1 -- Swallowed json.Unmarshal error (~line 463)

            In `updateRecent`, the inner block reads:
            ```go
            if data, err := os.ReadFile(o.RecentPath); err == nil {
                _ = json.Unmarshal(data, &existing)
            }
            ```
            The `_ = json.Unmarshal(...)` silently discards parse errors. Replace it
            with a logged debug warning using the observer's `log()` helper. The file
            may legitimately contain stale/corrupt JSON (non-fatal), so log at Debug
            level and continue -- do not return an error:
            ```go
            if data, err := os.ReadFile(o.RecentPath); err == nil {
                if err := json.Unmarshal(data, &existing); err != nil {
                    o.log().Debug("failed to parse recent.json, starting fresh", "err", err)
                }
            }
            ```

            ## Bug 3 -- Tool result write failure not logged (~line 312)

            In `extractToolResult`, the block reads:
            ```go
            if err := os.WriteFile(contentFile, []byte(fullContent), 0644); err == nil {
                contentFile = filepath.Join("tool-results", fmt.Sprintf("%s.txt", toolUseID))
            } else {
                contentFile = ""
            }
            ```
            When `os.WriteFile` fails, `contentFile` is silently set to `""`. Add a
            `Warn` log on the failure path:
            ```go
            if err := os.WriteFile(contentFile, []byte(fullContent), 0644); err == nil {
                contentFile = filepath.Join("tool-results", fmt.Sprintf("%s.txt", toolUseID))
            } else {
                o.log().Warn("failed to write tool result content file", "tool_use_id", toolUseID, "err", err)
                contentFile = ""
            }
            ```
            Note that `extractToolResult` is an unexported method defined as
            `func (o *JournalObserver) extractToolResult(...)` -- pointer receiver,
            so the `log()` helper is available on `o`.

            ## Tests

            No new test cases are required for these two bugs (the fixes add logging
            only; existing tests must continue to pass). Run:
            ```
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/...
            ```
          files:
            - pkg/journal/observer.go
            - pkg/journal/observer_test.go
        - id: B
          task: |
            Fix two bugs in `pkg/journal/checkpoint.go`. Do NOT change any exported
            function signatures. Do NOT add new exported types.

            ## Bug 2 -- Swallowed checkpoint copy errors (~lines 107-115)

            In the `Checkpoint` method, three copy calls silently discard errors:
            ```go
            _ = copyFileIfExists(string(o.IndexPath), indexSnapshot)
            _ = copyFileIfExists(string(o.CursorPath), cursorSnapshot)
            _ = copyFileIfExists(string(o.RecentPath), recentSnapshot)
            ```
            These files may legitimately not exist (fresh journal); errors are
            non-fatal. Replace each `_ =` with a debug log when the copy fails.
            The `JournalObserver.log()` helper is available on `o`:
            ```go
            if r := copyFileIfExists(o.IndexPath, indexSnapshot); r.IsFatal() {
                o.log().Debug("checkpoint: index.jsonl not copied (may not exist)", "err", r.Errors[0].Message)
            }
            if r := copyFileIfExists(o.CursorPath, cursorSnapshot); r.IsFatal() {
                o.log().Debug("checkpoint: cursor.json not copied (may not exist)", "err", r.Errors[0].Message)
            }
            if r := copyFileIfExists(o.RecentPath, recentSnapshot); r.IsFatal() {
                o.log().Debug("checkpoint: recent.json not copied (may not exist)", "err", r.Errors[0].Message)
            }
            ```
            Note: after removing `string()` casts (Bug 4 below), the arguments
            become plain `o.IndexPath`, `o.CursorPath`, `o.RecentPath`.

            ## Bug 4 -- Unnecessary string() casts in checkpoint.go

            All fields `o.JournalDir`, `o.IndexPath`, `o.CursorPath`, `o.RecentPath`
            are already `string` type in `JournalObserver`. Remove all `string(...)`
            wrappings throughout checkpoint.go. Affected lines (search for
            `string(o.`):
            - `filepath.Join(string(o.JournalDir), ...)` becomes `filepath.Join(o.JournalDir, ...)`
            - `countJSONLLines(string(o.IndexPath))` becomes `countJSONLLines(o.IndexPath)`
            - The three `copyFileIfExists(string(o.IndexPath), ...)` calls
              (also addressed in Bug 2 above)
            - In `ListCheckpoints`, `RestoreCheckpoint`, `DeleteCheckpoint`:
              all remaining `string(o.JournalDir)`, `string(o.IndexPath)`,
              `string(o.CursorPath)`, `string(o.RecentPath)` occurrences.

            After the changes, run `grep "string(o\." pkg/journal/checkpoint.go` and
            confirm zero occurrences remain.

            ## Tests

            No new test cases required (the fixes are logging additions and cast
            removals; existing tests must continue to pass). Run:
            ```
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/...
            ```
          files:
            - pkg/journal/checkpoint.go
            - pkg/journal/checkpoint_test.go
        - id: C
          task: |
            Fix two bugs in `pkg/journal/archive.go`. Do NOT change any exported
            function signatures. Do NOT add new exported types.

            ## Bug 6 -- Wave/agent path parsing fallback logic (~lines 74-86)

            In `Archive()`, the path parsing loop reads:
            ```go
            for i, part := range parts {
                if strings.HasPrefix(part, "wave") {
                    fmt.Sscanf(part, "wave%d", &wave)
                }
                if strings.HasPrefix(part, "agent-") {
                    agent = strings.TrimPrefix(part, "agent-")
                }
                // Also check if part matches just the agent ID
                if i > 0 && strings.HasPrefix(parts[i-1], "wave") {
                    if !strings.HasPrefix(part, "agent-") {
                        agent = part
                    }
                }
            }
            ```
            The fallback block (last 4 lines of the loop) sets `agent = part` for
            any directory that follows a `wave*` segment but does not start with
            `agent-`. This incorrectly matches arbitrary directory names. Remove the
            fallback block entirely so only the `agent-X` prefix format is accepted:
            ```go
            for _, part := range parts {
                if strings.HasPrefix(part, "wave") {
                    fmt.Sscanf(part, "wave%d", &wave)
                }
                if strings.HasPrefix(part, "agent-") {
                    agent = strings.TrimPrefix(part, "agent-")
                }
            }
            ```
            The loop variable `i` is no longer needed; change `for i, part` to
            `for _, part` to avoid an unused-variable compile error.

            ## Bug 4 -- Unnecessary string() casts in archive.go

            Confirm that `o.JournalDir`, `o.IndexPath`, `o.CursorPath`,
            `o.RecentPath` are already `string` in `JournalObserver`. Run
            `grep "string(o\." pkg/journal/archive.go` and remove any occurrences
            found. (Based on code inspection there are currently none in archive.go,
            but confirm and remove any that exist.)

            ## New Tests for Bug 6

            Add the following test cases to `archive_test.go` to cover the
            simplified parsing logic. Use the same temp-dir pattern as existing
            tests (`t.TempDir()`, `os.MkdirAll`, `JournalObserver{ProjectRoot: tmpDir,
            JournalDir: journalDir, AgentID: "..."}`).

            **TestArchive_PathParsingExact**: set up a journal dir at
            `<tmpDir>/.saw-state/wave3/agent-C2`, create a non-empty index.jsonl,
            create the observer with ProjectRoot=tmpDir and JournalDir=journalDir,
            call Archive(), and verify IsSuccess() with wave=3 and agent="C2".

            **TestArchive_PathParsingNoFallback**: set up a journal dir at
            `<tmpDir>/.saw-state/wave1/somedir` (a directory following "wave1" that
            does NOT start with "agent-"), create the observer with that journalDir,
            call Archive(), and verify the result is a failure (cannot parse
            wave/agent), NOT a success with agent="somedir".

            Run:
            ```
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/...
            ```
          files:
            - pkg/journal/archive.go
            - pkg/journal/archive_test.go
        - id: D
          task: |
            Fix one bug in `pkg/journal/context.go`. Do NOT change any exported
            function signatures. Do NOT add new exported types.

            ## Bug 5 -- Hardcoded ExitCode: 0 (~line 340)

            In `extractTestRuns`, the TestRun is created with a hardcoded zero:
            ```go
            results = append(results, TestRun{
                Command:   command,
                Passed:    passed,
                Failed:    failed,
                Timestamp: result.Timestamp,
                ExitCode:  0, // TODO: parse from result if available
            })
            ```
            Replace the hardcoded `0` with a parsed exit code. Look for the
            pattern `exit status N` in `result.Preview` using a regexp and extract
            N, defaulting to 0 if the pattern is not found.

            The `context.go` file already imports both `"regexp"` and `"fmt"`.
            All regexp vars in this file are compiled as local variables inside
            functions (not package-level). Follow that same style: declare
            `exitCodePattern` as a local `var` inside `extractTestRuns`, near the
            other local regexp declarations at the top of that function:
            ```go
            exitCodePattern := regexp.MustCompile(`exit status (\d+)`)
            ```

            Then replace the hardcoded ExitCode block:
            ```go
            exitCode := 0
            if m := exitCodePattern.FindStringSubmatch(result.Preview); len(m) > 1 {
                fmt.Sscanf(m[1], "%d", &exitCode)
            }
            results = append(results, TestRun{
                Command:   command,
                Passed:    passed,
                Failed:    failed,
                Timestamp: result.Timestamp,
                ExitCode:  exitCode,
            })
            ```

            ## New Tests for Bug 5

            Add the following test cases to `context_test.go`. Use the same
            package-internal test style as the existing tests (package journal, no
            testify, plain t.Errorf). The `extractTestRuns` function is unexported
            and accessible from the test file since it is in the same package.

            **TestExtractTestRuns_ExitCodeParsed**: create a pair of ToolEntry
            values:
            - A tool_use entry with Kind="tool_use", ToolName="Bash",
              ToolUseID="bash1", Input=map[string]interface{}{"command":"go test ./..."}
            - A tool_result entry with Kind="tool_result", ToolUseID="bash1",
              Preview="--- FAIL\nexit status 1"
            Call `extractTestRuns(entries)`. Assert len(results)==1 and
            results[0].ExitCode==1.

            **TestExtractTestRuns_ExitCodeDefaultsToZero**: create a pair of
            ToolEntry values where the tool_result Preview contains "--- PASS\nok"
            but no "exit status" string. Call `extractTestRuns(entries)`. Assert
            results[0].ExitCode==0.

            Run:
            ```
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/...
            ```
          files:
            - pkg/journal/context.go
            - pkg/journal/context_test.go
