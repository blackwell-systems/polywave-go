          task: |
            ## Context
            You are implementing the `sawtools set-critic-verdict` command in the
            scout-and-wave-go repository at `/Users/dayna.blackwell/code/scout-and-wave-go`.

            ## What to implement

            ### 1. New file: `cmd/sawtools/set_critic_verdict_cmd.go`

            Create a new file `cmd/sawtools/set_critic_verdict_cmd.go` (package main)
            implementing `newSetCriticVerdictCmd()`. Follow the exact patterns from
            `cmd/sawtools/set_injection_method_cmd.go` and `cmd/sawtools/set_impl_state_cmd.go`.

            Command spec:
            ```
            sawtools set-critic-verdict <impl-path> --verdict <pass|issues>
            ```

            Behavior:
            - Accepts one positional argument: the absolute path to the IMPL YAML file
            - Requires `--verdict` flag with values: `pass`, `issues`
              (case-insensitive; normalize to uppercase for storage: PASS, ISSUES)
            - Use `context.TODO()` for the context parameter
            - Load the manifest using `protocol.Load(ctx, implPath)`
            - If `manifest.CriticReport == nil`, return error:
              `"set-critic-verdict: critic_report does not exist in IMPL doc"`
            - Otherwise: record old verdict, set `manifest.CriticReport.Verdict` to
              the uppercase normalized new verdict, save with `protocol.Save(ctx, manifest, implPath)`
            - On save failure, return the error
            - On success, print JSON to stdout:
              `{"impl_path": "...", "old_verdict": "ISSUES", "new_verdict": "PASS"}`
            - Exit 0 on success, exit 1 on error (cobra handles this via RunE returning error)

            Valid verdict values (case-insensitive input, uppercase stored):
            - `pass` -> `"PASS"`
            - `issues` -> `"ISSUES"`
            - 

            Validation logic:
            ```go
            normalized := strings.ToUpper(verdict)
            switch normalized {
            case "PASS", "ISSUES":
                // valid
            default:
                return fmt.Errorf("set-critic-verdict: invalid --verdict %q: must be one of pass, issues", verdict)
            }
            ```

            JSON output uses `fmt.Println(string(out))` with `json.Marshal` (not
            `json.MarshalIndent`), matching the pattern in `set_injection_method_cmd.go`.

            Complete implementation sketch:
            ```go
            package main

            import (
                "context"
                "encoding/json"
                "fmt"
                "strings"

                "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
                "github.com/spf13/cobra"
            )

            func newSetCriticVerdictCmd() *cobra.Command {
                var verdict string

                cmd := &cobra.Command{
                    Use:   "set-critic-verdict <impl-path>",
                    Short: "Update critic_report.verdict in an IMPL doc",
                    Long: `Atomically updates critic_report.verdict in an existing IMPL doc.
            Use after the Orchestrator corrects IMPL issues flagged by the critic, to
            transition the verdict from ISSUES to PASS without manually editing YAML.

            Exits 1 if critic_report does not exist in the IMPL doc.

            Example:
              sawtools set-critic-verdict /path/to/IMPL-feature.yaml --verdict pass`,
                    Args: cobra.ExactArgs(1),
                    RunE: func(cmd *cobra.Command, args []string) error {
                        implPath := args[0]

                        normalized := strings.ToUpper(verdict)
                        switch normalized {
                        case "PASS", "ISSUES":
                            // valid
                        default:
                            return fmt.Errorf("set-critic-verdict: invalid --verdict %q: must be one of pass, issues", verdict)
                        }

                        doc, err := protocol.Load(context.TODO(), implPath)
                        if err != nil {
                            return fmt.Errorf("set-critic-verdict: failed to load IMPL doc: %w", err)
                        }

                        if doc.CriticReport == nil {
                            return fmt.Errorf("set-critic-verdict: critic_report does not exist in IMPL doc")
                        }

                        oldVerdict := doc.CriticReport.Verdict
                        doc.CriticReport.Verdict = normalized

                        if saveRes := protocol.Save(context.TODO(), doc, implPath); saveRes.IsFatal() {
                            saveErrMsg := "save failed"
                            if len(saveRes.Errors) > 0 {
                                saveErrMsg = saveRes.Errors[0].Message
                            }
                            return fmt.Errorf("set-critic-verdict: failed to save IMPL doc: %s", saveErrMsg)
                        }

                        out, _ := json.Marshal(map[string]interface{}{
                            "impl_path":   implPath,
                            "old_verdict": oldVerdict,
                            "new_verdict": normalized,
                        })
                        fmt.Println(string(out))
                        return nil
                    },
                }

                cmd.Flags().StringVar(&verdict, "verdict", "", "New verdict: pass or issues (required)")
                _ = cmd.MarkFlagRequired("verdict")

                return cmd
            }
            ```

            ### 2. Register in `cmd/sawtools/main.go`

            In `main.go`, add `newSetCriticVerdictCmd()` to the `rootCmd.AddCommand(...)` call.
            Place it immediately after the existing `newSetCriticReviewCmd()` line (currently
