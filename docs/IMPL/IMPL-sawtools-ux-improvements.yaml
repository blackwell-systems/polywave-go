            - cmd/sawtools/main.go
        - id: B
          task: |
            ## Context
            You are implementing the V048 per-file exemption in the scout-and-wave-go
            repository at `/Users/dayna.blackwell/code/scout-and-wave-go`.

            ## What to implement

            ### 1. Add `V048Exempt` field to `FileOwnership` struct in `pkg/protocol/types.go`

            Open `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/types.go`.
            Find the `FileOwnership` struct (around line 67-78):

            ```go
            type FileOwnership struct {
                File      string   `yaml:"file" json:"file"`
                Agent     string   `yaml:"agent" json:"agent"`
                Wave      int      `yaml:"wave" json:"wave"`
                Action    string   `yaml:"action,omitempty" json:"action,omitempty"`
                DependsOn []string `yaml:"depends_on,omitempty" json:"depends_on,omitempty"`
                Repo      string   `yaml:"repo,omitempty" json:"repo,omitempty"`
            }
            ```

            Add `V048Exempt` as the last field:

            ```go
            type FileOwnership struct {
                File       string   `yaml:"file" json:"file"`
                Agent      string   `yaml:"agent" json:"agent"`
                Wave       int      `yaml:"wave" json:"wave"`
                Action     string   `yaml:"action,omitempty" json:"action,omitempty"`
                DependsOn  []string `yaml:"depends_on,omitempty" json:"depends_on,omitempty"`
                Repo       string   `yaml:"repo,omitempty" json:"repo,omitempty"`
                V048Exempt bool     `yaml:"v048_exempt,omitempty" json:"v048_exempt,omitempty"`
            }
            ```

            The `omitempty` tag ensures the field is absent in serialized YAML/JSON
            when false (zero value), maintaining full backward compatibility.

            ### 2. Thread exemption through `CheckAgentLOCBudget` in `pkg/protocol/complexity.go`

            Open `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/complexity.go`.
            Find `CheckAgentLOCBudget` (line ~92). The function contains this loop:

            ```go
            for _, fo := range m.FileOwnership {
                if fo.Action != "modify" {
                    continue
                }
                absPath := filepath.Join(repoPath, fo.File)
                // ...
            ```

            Add the V048Exempt check immediately after the `Action != "modify"` check:

            ```go
            for _, fo := range m.FileOwnership {
                if fo.Action != "modify" {
                    continue
                }
                if fo.V048Exempt {
                    continue
                }
                absPath := filepath.Join(repoPath, fo.File)
                // ... rest unchanged
            ```

            The skip must happen BEFORE the file is opened. This ensures exempt files
            are completely excluded from the per-agent LOC total.

            ### 3. Add test cases to `pkg/protocol/complexity_test.go`

            Open `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/complexity_test.go`.
            Find `TestCheckAgentLOCBudget` (line ~194). Add two new sub-tests at the
            END of the test function body, inside `TestCheckAgentLOCBudget`:

            ```go
            t.Run("v048_exempt=true skips file even if over 2000 lines", func(t *testing.T) {
                dir := t.TempDir()
                writeLines(t, filepath.Join(dir, "big.go"), 5000)
                m := &IMPLManifest{
                    FileOwnership: []FileOwnership{
                        {File: "big.go", Agent: "A", Wave: 1, Action: "modify", V048Exempt: true},
                    },
                }
                got := CheckAgentLOCBudget(context.Background(), m, dir, 2000)
                if len(got) != 0 {
                    t.Errorf("expected 0 errors for v048_exempt file, got %v", got)
                }
            })

            t.Run("v048_exempt=false behaves normally (over budget still errors)", func(t *testing.T) {
                dir := t.TempDir()
                writeLines(t, filepath.Join(dir, "big2.go"), 3000)
                m := &IMPLManifest{
                    FileOwnership: []FileOwnership{
                        {File: "big2.go", Agent: "A", Wave: 1, Action: "modify", V048Exempt: false},
                    },
                }
                got := CheckAgentLOCBudget(context.Background(), m, dir, 2000)
                if len(got) != 1 {
                    t.Fatalf("expected 1 error for non-exempt file over budget, got %d: %v", len(got), got)
                }
                if got[0].Code != "V048_AGENT_LOC_BUDGET" {
                    t.Errorf("code = %q, want V048_AGENT_LOC_BUDGET", got[0].Code)
                }
            })
            ```

            ## Verification gate
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestCheckAgentLOCBudget -v
            ```

            All tests in TestCheckAgentLOCBudget must pass, including the two new ones.

            ## Constraints
            - Modify ONLY `pkg/protocol/types.go`, `pkg/protocol/complexity.go`,
              and `pkg/protocol/complexity_test.go`
            - Do NOT change the function signature of `CheckAgentLOCBudget`
            - The new field must use `yaml:"v048_exempt,omitempty"` — omitempty is required
            - Do NOT add the field to any other struct
            - Do NOT modify cmd/ or docs/ files
          files:
            - pkg/protocol/types.go
            - pkg/protocol/complexity.go
            - pkg/protocol/complexity_test.go
