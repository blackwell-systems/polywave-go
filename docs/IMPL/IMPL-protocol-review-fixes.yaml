          impact: low
          mitigation: |-
            Agent C's brief instructs using the string literal as placeholder if the
            constant doesn't exist yet. The pre-merge gate runs after all Wave 1 agents
            commit, ensuring both are present before merge.
        - scenario: |-
            Agent D (MergeAgents) fixes the return type but the callers in finalize.go
            expect the old dual return. Wave 4 Agent I hasn't run yet, causing post-merge
            build failure for Wave 2.
          likelihood: high
          impact: medium
          mitigation: |-
            Wave 2 and Wave 3 quality gates are scoped to ./pkg/protocol/... only —
            not ./... — so the broken callers in pkg/engine don't block wave merges.
            Full ./... gate only runs at Wave 4 (Agent J's brief).
        - scenario: |-
            Agent H's program_tier_prepare.go changes break because SkipCriticForIMPL
            (also owned by H) isn't committed first. If both are in the same commit, no
            issue. If split across commits, partial build failure.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent H owns both critic_gate.go and program_tier_prepare.go. The agent must
            commit all changes in a single commit or commit critic_gate.go first. The
            brief explicitly instructs both files are owned by the same agent.
        - scenario: |-
            Wave 4 Agent I misses a call site in finalize.go — the file is 700+ lines
            with two MergeAgents calls at different locations.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent I brief lists exact line numbers for all 9 call sites. Agent is
            instructed to use LSP find-references or grep to confirm all sites before
            committing. Wave 4 full ./... build gate catches any missed site.
