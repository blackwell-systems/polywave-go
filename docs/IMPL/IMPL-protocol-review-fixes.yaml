title: Protocol Code Review Fixes
feature_slug: protocol-review-fixes
verdict: SUITABLE
suitability_assessment: |-
    pkg/protocol is the foundational package (97 production files, ~26k LOC) imported by
    every other package. 26 findings across 3 priority levels — all decompose into disjoint
    file sets with clear wave dependencies:
    Wave 1 (foundation): new error codes + StateInterviewing + doc/parser fixes + inline
    code replacements. All independent.
    Wave 2 (dual-return fixes): MergeAgents, Cleanup/CleanupAllStale, ArchiveIMPL/
    ArchiveProgram/LoadProjectMemory. Depends on Wave 1 codes landing.
    Wave 3 (protocol-internal callers + tier/critic fixes): FinalizeTier, PrepareTier,
    RunTierGate, SkipCriticForIMPL, FullValidateProgram. Depends on Wave 2 signatures.
    Wave 4 (cross-package callers): pkg/engine and cmd/sawtools callers of all changed
    functions. Depends on Wave 3 for complete picture.

    Caveats:
    - P0-1: ValidateInvariants return type change (error → []result.SAWError) has callers
      in pkg/engine/runner.go and pkg/protocol/doc.go. orchestrator.go uses its own
      inline adapter and does NOT call protocol.ValidateInvariants directly.
    - P1-5: MergeAgents dual-return fix — callers in finalize.go and finalize_steps.go.
    - P1-4: Cleanup dual-return fix — callers in finalize_steps.go and merge_cleanup.go.
    - protocol.FinalizeTier has zero production callers (CLI delegates to engine.FinalizeTierEngine);
      Wave 3 Agent G still fixes the signature for API correctness.
    - protocol.FullValidateProgram has no external callers currently; Wave 3 Agent H
      still adds ctx for API correctness. No Wave 4 update needed.
    - Wave 4 is two parallel agents: I (pkg/engine callers) and J (cmd/sawtools callers).
test_command: go test ./pkg/protocol/... ./pkg/engine/... ./pkg/orchestrator/... ./cmd/sawtools/...
lint_command: go vet ./...
