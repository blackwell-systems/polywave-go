interface_contracts:
    - name: ValidateInvariants
      description: |-
        Return type changed from bare error to []result.SAWError (P0-1/P1-1).
        The function checks I1 (disjoint ownership) only; doc comment updated to
        reflect this. Callers in pkg/engine/runner.go updated by Wave 4 Agent I.
      definition: |
        func ValidateInvariants(manifest *IMPLManifest) []result.SAWError
      location: pkg/protocol/parser.go
    - name: StateInterviewing
      description: |-
        New ProtocolState constant added to types.go (P0-2). Added to allowedTransitions
        with target [StateScoutPending], to validateSM01StateValid, and to IMPLStateToStatus
        as "pending". Matches state-machine.md spec.
      definition: |
        const StateInterviewing ProtocolState = "INTERVIEWING"
      location: pkg/protocol/types.go
    - name: MergeAgents
      description: |-
        Dual-return (result.Result[MergeAgentsData], error) → result.Result[MergeAgentsData].
        All error conditions encoded as fatal SAWErrors. Callers updated by Wave 4 Agent I
        (pkg/engine/finalize.go:533, pkg/engine/finalize_steps.go:222) and Agent J
        (cmd/sawtools/merge_agents.go:21).
      definition: |
        func MergeAgents(opts MergeAgentsOpts) result.Result[MergeAgentsData]
      location: pkg/protocol/merge_agents.go
    - name: Cleanup
      description: |-
        Dual-return (result.Result[CleanupData], error) → result.Result[CleanupData].
        Callers updated by Wave 4 Agent I (pkg/engine/finalize_steps.go:388,
        pkg/engine/merge_cleanup.go:56) and Agent J (cmd/sawtools/cleanup.go:57).
      definition: |
        func Cleanup(ctx context.Context, manifestPath string, waveNum int, repoDir string, logger *slog.Logger) result.Result[CleanupData]
      location: pkg/protocol/cleanup.go
    - name: CleanupAllStale
      description: |-
        Changed from (*StaleCleanupData, error) to result.Result[*StaleCleanupData].
        Uses result.NewPartial for partial-success cases. Caller updated by Agent J
        (cmd/sawtools/cleanup.go:42).
      definition: |
        func CleanupAllStale(ctx context.Context, repoDir string, force bool) result.Result[*StaleCleanupData]
      location: pkg/protocol/cleanup.go
    - name: ArchiveIMPL
      description: |-
        Changed from (string, error) to result.Result[ArchiveData] where ArchiveData
        contains NewPath string. New type defined in discovery.go. Callers updated by
        Wave 4 Agent I (pkg/engine/finalize.go:682) and Agent J
        (cmd/sawtools/close_impl_cmd.go:63, cmd/sawtools/mark_complete_cmd.go:41).
      definition: |
        type ArchiveData struct { NewPath string }
        func ArchiveIMPL(ctx context.Context, manifestPath string) result.Result[ArchiveData]
      location: pkg/protocol/discovery.go
    - name: ArchiveProgram
      description: |-
        Same change as ArchiveIMPL. Caller updated by Wave 4 Agent I
        (pkg/engine/mark_program_complete.go:121).
      definition: |
        func ArchiveProgram(ctx context.Context, manifestPath string) result.Result[ArchiveData]
      location: pkg/protocol/discovery.go
    - name: LoadProjectMemory
      description: |-
        Changed from (*ProjectMemory, error) to result.Result[*ProjectMemory].
        Adds ctx as first parameter. No external callers identified; internal to
        memory.go usage only.
      definition: |
        func LoadProjectMemory(ctx context.Context, path string) result.Result[*ProjectMemory]
      location: pkg/protocol/memory.go
    - name: FinalizeTier
      description: |-
        Dual-return (result.Result[FinalizeTierData], error) → result.Result[FinalizeTierData].
