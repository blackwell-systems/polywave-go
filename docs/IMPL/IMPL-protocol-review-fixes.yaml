            ### Verification gate
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/...
            ```

            ### Constraints
            - Use LSP or grep to find ALL occurrences of each inline string before replacing.
            - Do NOT change any logic beyond the string literal substitutions and the
              ctx.Err() addition.
            - The ctx.Err() check in manifest.go must be at function entry, before any I/O.
            - `result.CodeManifestSaveFailed` and `result.CodeAmendBlocked` are added by
              Agent A in the same wave. If Agent A hasn't landed yet, use the string literal
              as a placeholder and note it in your completion report; the pre-merge build
              gate will verify both constants exist.
          files:
            - pkg/protocol/manifest.go
            - pkg/protocol/updater.go
            - pkg/protocol/freeze.go
            - pkg/protocol/gates.go
            - pkg/protocol/amend.go
    - number: 2
      agents:
        - id: D
          task: |-
            ## Agent D — MergeAgents dual-return fix and inline code replacement

            ### Context
            `pkg/protocol/merge_agents.go` has two issues:
            1. (P1-5) `MergeAgents` returns `(result.Result[MergeAgentsData], error)` —
               dual return antipattern. Callers must handle two error channels.
            2. (P0-3/P2-2) Inline string codes not registered in codes.go.

            Wave 1 Agent A adds the missing codes this agent needs.

            ### Changes required

            **1. Fix `MergeAgents` return type** (P1-5)

            Read merge_agents.go fully. Current signature:
            ```go
            func MergeAgents(opts MergeAgentsOpts) (result.Result[MergeAgentsData], error)
            ```
            New signature:
            ```go
            func MergeAgents(opts MergeAgentsOpts) result.Result[MergeAgentsData]
            ```

            All current `error` return paths (manifest load failure, wave-not-found) must
            become `result.NewFailure[MergeAgentsData](...)`. Check the current code to
            see how the dual return is used and merge both channels into the result.

            **2. Replace inline error codes** (P0-3, P2-2)

            - `"WAVE_NOT_FOUND"` → `result.CodeWaveNotFound` ("P011_WAVE_NOT_FOUND")
            - `"UNKNOWN_AGENT_IN_OWNERSHIP"` → `result.CodeUnknownAgentInOwnership` ("P012_UNKNOWN_AGENT_IN_OWNERSHIP")
            - `"DUPLICATE_FILE_OWNERSHIP"` → `result.CodeDisjointOwnership`
              (already exists: "V002_DISJOINT_OWNERSHIP")

            **3. Check merge_log.go TOCTOU concern** (P2-11 investigation)

            Read `merge_log.go` to find `updateManifestState` (called by `SetImplState`
            in state_transition.go). Check whether it uses `WithCompletionReportLock`.
