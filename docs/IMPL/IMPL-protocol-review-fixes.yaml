waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Agent A — New error codes, StateInterviewing, validation update

            ### Context
            Four files need coordinated changes to add `StateInterviewing` to the protocol
            state machine and register new canonical error codes. All changes are additive.

            ### Files
            - `pkg/result/codes.go` — add 5 new constants
            - `pkg/protocol/types.go` — add StateInterviewing constant
            - `pkg/protocol/state_transition.go` — add INTERVIEWING to allowedTransitions
            - `pkg/protocol/state_status.go` — add INTERVIEWING mapping
            - `pkg/protocol/validation.go` — add INTERVIEWING to validateSM01StateValid

            ### Changes required

            **1. `pkg/result/codes.go` — add new constants** (P0-3, P0-2)

            Find the P-series block (currently ends at P010_TIER_CONFLICT_DETECTED) and add:
            ```go
            // P011: wave not found during merge
            CodeWaveNotFound = "P011_WAVE_NOT_FOUND"
            // P012: unknown agent referenced in file ownership
            CodeUnknownAgentInOwnership = "P012_UNKNOWN_AGENT_IN_OWNERSHIP"
            // P013: amend blocked due to state
            CodeAmendBlocked = "P013_AMEND_BLOCKED"
            ```

            Find the N-series block (currently ends at N093_FINALIZE_STEP_FAILED) and add:
            ```go
            // N094: manifest save failed
            CodeManifestSaveFailed = "N094_MANIFEST_SAVE_FAILED"
            // N095: completion report set failed
            CodeReportSetFailed = "N095_REPORT_SET_FAILED"
            ```

            Also update the comment block at the top of the N-series section to note
            N094-N095 additions.

            **2. `pkg/protocol/types.go` — add StateInterviewing** (P0-2)

            In the ProtocolState constants block, add after the last existing state:
            ```go
            StateInterviewing ProtocolState = "INTERVIEWING"
            ```

            **3. `pkg/protocol/state_transition.go` — wire INTERVIEWING** (P0-2)

            Read the file to find `allowedTransitions`. Add an entry:
            ```go
            StateInterviewing: {StateScoutPending},
            ```

            Per state-machine.md: INTERVIEWING → SCOUT_PENDING is the only valid
            transition out. Also add INTERVIEWING as a reachable state from
            StateScoutPending if not already present (check spec: this is the entry point).
            Read state-machine.md at `/Users/dayna.blackwell/code/scout-and-wave/protocol/state-machine.md`
            to confirm the exact allowed transitions.

            **4. `pkg/protocol/state_status.go` — map INTERVIEWING** (P0-2)

            In `IMPLStateToStatus`, add a case mapping `StateInterviewing` to `"pending"`.

            **5. `pkg/protocol/validation.go` — add INTERVIEWING to valid set** (P0-2)

            Find `validateSM01StateValid` (or equivalent function that validates state
            string values). Add `StateInterviewing` to the set of valid states so that a
            manifest with `state: INTERVIEWING` passes validation.

            ### Verification gate
            ```
            go build ./pkg/result/... ./pkg/protocol/...
            go vet ./pkg/result/... ./pkg/protocol/...
            go test ./pkg/result/... ./pkg/protocol/...
            ```

            ### Constraints
            - Do NOT modify any other constants or logic in codes.go.
            - Do NOT change the allowedTransitions for existing states.
            - State machine changes must be exactly per spec (state-machine.md).
          files:
            - pkg/result/codes.go
            - pkg/protocol/types.go
            - pkg/protocol/state_transition.go
            - pkg/protocol/state_status.go
            - pkg/protocol/validation.go
        - id: B
          task: |-
            ## Agent B — ValidateInvariants signature fix and doc.go accuracy

            ### Context
            Two files need fixes:
            1. `parser.go:ValidateInvariants` returns `error` instead of `[]result.SAWError` (P1-1)
               and its doc claims I1-I6 coverage but only checks I1 (P0-1).
            2. `doc.go` references `agent.letter` (stale field name; actual field is `id`) (P2-10)
               and claims ValidateInvariants checks I1-I6 (P2-1).

            ### Changes required

            **1. `pkg/protocol/parser.go` — fix ValidateInvariants** (P0-1, P1-1)

            Read parser.go first to understand the full function.

            Current signature: `func ValidateInvariants(manifest *IMPLManifest) error`
            New signature: `func ValidateInvariants(manifest *IMPLManifest) []result.SAWError`

            The function body currently checks I1 (disjoint ownership). Keep the I1 check
            logic intact. Change the return mechanism:
            - On violation: return `[]result.SAWError{result.NewFatal(result.CodeDisjointOwnership, msg)}`
              (use result.CodeDisjointOwnership = "V002_DISJOINT_OWNERSHIP" for I1 violations)
            - On pass: return `nil`

            Update the doc comment to accurately state:
            `// ValidateInvariants checks protocol Invariant I1 (disjoint file ownership).`
            `// For full I1–I6 validation use Validate.`

            Add `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"` to imports
            if not already present.

            **2. `pkg/protocol/doc.go` — fix stale content** (P2-1, P2-10)

            Read doc.go. Find and fix:
            a) Any YAML example showing `letter: A` → change to `id: A`
            b) Any comment claiming `ValidateInvariants checks protocol invariants (I1–I6)` →
               change to `ValidateInvariants checks I1 only; use Validate for I1–I6`

            ### Verification gate
            ```
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/...
            ```

            Note: pkg/engine/runner.go and pkg/protocol/doc.go will still reference the
            old error return (wave 4 Agent I and this agent fix those). Run only
            `./pkg/protocol/...` gates.

            ### Constraints
            - Do NOT change the name `ValidateInvariants` — callers in Wave 4 will be updated.
            - Do NOT add I2-I6 checks to ValidateInvariants — it stays I1-only, just with
              the correct return type and accurate doc.
            - Do NOT modify parser.go beyond the ValidateInvariants function.
          files:
            - pkg/protocol/parser.go
            - pkg/protocol/doc.go
        - id: C
          task: |-
            ## Agent C — Inline error codes → canonical constants + ctx.Err() check

            ### Context
            Five files use inline string error codes instead of canonical constants from
            pkg/result. Replace all with the correct constants. Also add ctx.Err() check
            to manifest.go's Load/Save functions (P1-2).

            ### Files and changes

            **1. `pkg/protocol/manifest.go`** (P0-3, P1-2)

            Read the file to find:
            - `"MANIFEST_SAVE_FAILED"` → replace with `result.CodeManifestSaveFailed`
              (new constant added by Wave 1 Agent A, value "N094_MANIFEST_SAVE_FAILED")
            - `"REPORT_SET_FAILED"` → replace with `result.CodeReportSetFailed`
              (new constant "N095_REPORT_SET_FAILED")
            - Add ctx.Err() check at the start of Load and Save:
              ```go
              if err := ctx.Err(); err != nil {
                  return nil, err
              }
              ```

            **2. `pkg/protocol/updater.go`** (P2-5)

            Replace `"STATUS_UPDATE_FAILED"` with `result.CodeStatusUpdateFailed`
            (already exists: "N015_STATUS_UPDATE_FAILED"). Search the file for this
            string — it appears at lines ~47 and ~56.

            **3. `pkg/protocol/freeze.go`** (P0-3)

            Replace:
            - `"FREEZE_CANCELLED"` → `result.CodeContextCancelled` ("N018_CONTEXT_CANCELLED")
            - `"FREEZE_FAILED"` → `result.CodeFreezeError` ("N012_FREEZE_ERROR")

            **4. `pkg/protocol/gates.go`** (P0-3)

            Replace:
            - `"GATE_VALIDATION_FAILED"` → `result.CodeGateValidationFailed`
              (already exists: "B009_GATE_VALIDATION_FAILED"). Note: the inline string
