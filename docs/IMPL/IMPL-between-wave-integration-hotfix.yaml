title: Between-Wave Integration Agent for Caller Cascade Hotfixes
feature_slug: between-wave-integration-hotfix
verdict: SUITABLE
suitability_assessment: |
    The feature decomposes cleanly into 3 independent file domains:
    (1) error codes (result/codes.go - new constants, leaf node),
    (2) classification logic (pkg/builddiag or pkg/engine/finalize_steps.go - new
        StepClassifyCallerCascade step and CallerCascadeError type),
    (3) engine wiring (finalize.go - call the classifier, populate new
        FinalizeWaveResult.CallerCascadeErrors field, expose trigger signal),
    (4) CLI wiring (sawtools/finalize_wave.go - apply-cascade-hotfix step and
        --dry-run flag; no standalone hotfix-agent command).
    Skill/protocol updates land in the cross-repo scout-and-wave repo and are
    noted separately (no agent needed; Orchestrator handles those as a manual step
    after wave completion).

    File ownership is disjoint across all four domains, satisfying I1.
    Interface contracts (CallerCascadeError type, StepClassifyCallerCascade
    signature) are fully specifiable before agents start.
    No investigation-first work is required: the problem is understood and
    concrete compiler error patterns are enumerated in the feature description.

    Estimated times:
    - Scout phase: ~15 min (dependency mapping, IMPL doc)
    - Agent execution: ~4 agents x 15 min avg = 60 min, accounting for
      parallelism in Wave 1 (3 parallel agents) + Wave 2 (1 agent) = ~30 min
    - Merge and verification: ~5 min
    Total SAW time: ~50 min
    Sequential baseline: ~4 agents x 20 min = 80 min
    Time savings: ~30 min (38% faster)
    Recommendation: Clear speedup. Proceed.
