            a unique-string check and a format-validation check. Add an entry for
            `CodeCallerCascadeHotfixFailed` in the codes_test.go list so the
            uniqueness test covers it. Find the test table (it lists all codes
            as `{name, value}` pairs) and add:
            ```go
            {"CodeCallerCascadeHotfixFailed", CodeCallerCascadeHotfixFailed},
            ```
            This file is in `pkg/result/codes_test.go` — read it before editing
