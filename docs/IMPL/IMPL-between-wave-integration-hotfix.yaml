            - The new constant must follow the existing naming and comment convention.
          files:
            - pkg/result/codes.go
            - pkg/result/codes_test.go
        - id: B
          task: |
            ## Agent B: Implement CallerCascadeError Classification Logic

            ### What to implement

            Create `pkg/engine/caller_cascade.go` as a new file. This file contains
            the data types and core classification logic for the between-wave
            integration hotfix feature (E47).

            #### Types to define

            1. `CallerCascadeError` struct (see interface contract for exact fields)
            2. `CallerCascadeClassification` struct (see interface contract)
            3. `RunHotfixAgentOpts` struct (see interface contract)
            4. `HotfixAgentData` struct (see interface contract — note the `FilesFixed`
               and `Commit` fields added vs earlier drafts)

            #### Function: ClassifyCallerCascadeErrors

            ```go
            func ClassifyCallerCascadeErrors(
                verifyData *protocol.VerifyBuildData,
                manifest *protocol.IMPLManifest,
                waveNum int,
            ) CallerCascadeClassification
            ```

            The function must:

            1. Extract combined error text from `verifyData.TestOutput + "\n" + verifyData.LintOutput`.
            2. Use `regexp.MustCompile` to match lines matching cascade patterns:
               - `^([^:]+):(\d+):\d+: (undefined: .+)$`
               - `^([^:]+):(\d+):\d+: (assignment mismatch: .+)$`
               - `^([^:]+):(\d+):\d+: (not enough arguments.+)$`
               (Accept both `file.go:line:col: message` and `file.go:line: message` formats)
            3. Build a set of files owned by the CURRENT wave from `manifest.FileOwnership`
               where `ownership.Wave == waveNum`.
            4. For each matched error: if the erroring file IS in the current-wave set,
               it's a genuine failure (MixedErrors = true). If it's NOT in the current-wave
               set, it's a cascade error → append to Errors list.
            5. If len(Errors) > 0 AND MixedErrors == false → AllAreCascades = true.
            6. Return the populated CallerCascadeClassification.

            #### Function: RunHotfixAgent

            ```go
            func RunHotfixAgent(
                ctx context.Context,
                opts RunHotfixAgentOpts,
                onEvent func(Event),
            ) result.Result[HotfixAgentData]
            ```

            The function must:

            1. Validate opts (IMPLPath non-empty, RepoPath non-empty, WaveNum > 0,
               len(Errors) > 0). Return `result.NewFailure` with
               `CodeCallerCascadeHotfixFailed` on validation failure.
            2. Load manifest via `protocol.Load(ctx, opts.IMPLPath)`.
            3. Build a prompt for the hotfix agent. The prompt must:
               - Enumerate each error as a structured block (file, line, message)
               - List the exact files the agent is allowed to modify (the unique set
                 of files from opts.Errors)
               - Include the commit message requirement:
                 `[SAW:wave{N}:integration-hotfix] fix caller cascade after wave N signature changes`
                 where N = opts.WaveNum
               - Include a verification gate: `go build ./... && go vet ./...`
               - Instruct the agent NOT to modify files where functions are defined,
                 only fix caller sites
            4. Create backend via `orchestrator.NewBackendFromModel(opts.Model)`.
               Return failure on error.
            5. Build `tools.Constraints` with `AllowedPathPrefixes` set to the
               unique file paths from opts.Errors. Use `injectAllowedPathsRestriction`
               pattern from integration_runner.go to prepend the file restriction.
            6. Create `agent.NewRunner(b)` and execute with
               `runner.ExecuteStreamingWithTools(ctx, spec, opts.RepoPath, onChunk, nil)`.
               spec.ID = "hotfix-agent", spec.Task = the constructed prompt.
            7. Auto-commit via a helper `autoCommitHotfix(repoPath, waveNum)` that
               runs git status → git add -A → git commit with the exact message:
               `[SAW:wave{N}:integration-hotfix] fix caller cascade after wave N signature changes`
               Capture the commit SHA from `git rev-parse HEAD` after committing.
            8. Verify the build: run `go build ./... && go vet ./...` in opts.RepoPath
               using `exec.CommandContext`. Set `buildPassed` accordingly.
            9. Collect the list of files modified by the agent using `git diff HEAD~1 --name-only`.
            10. Return `result.NewSuccess(HotfixAgentData{...})` with FilesFixed, Commit,
                and BuildPassed populated.

            #### Imports required

            ```go
            import (
                "context"
                "fmt"
                "log/slog"
                "os/exec"
                "regexp"
                "strings"

                "github.com/blackwell-systems/scout-and-wave-go/internal/git"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/agent"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/orchestrator"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/result"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/tools"
            )
            ```

            ### Tests (pkg/engine/caller_cascade_test.go)

            Create `pkg/engine/caller_cascade_test.go`. Test cases:

            **TestClassifyCallerCascadeErrors_AllCascades:**
            - Build a VerifyBuildData with TestOutput containing errors only in
              files NOT owned by wave 1 (e.g., `cmd/sawtools/some_cmd.go:36:...`).
            - Build a manifest with wave 1 owning only `pkg/engine/foo.go`.
            - Call ClassifyCallerCascadeErrors. Assert AllAreCascades=true, MixedErrors=false,
              len(Errors) > 0.

            **TestClassifyCallerCascadeErrors_MixedErrors:**
            - Build a VerifyBuildData with errors in both owned and unowned files.
            - Assert AllAreCascades=false, MixedErrors=true.

            **TestClassifyCallerCascadeErrors_NoErrors:**
            - Build a VerifyBuildData with TestPassed=true, LintPassed=true,
              empty output.
            - Assert AllAreCascades=false, len(Errors)==0.

            **TestClassifyCallerCascadeErrors_PatternMatching:**
            - Test each of the three error patterns
              ("undefined:", "assignment mismatch:", "not enough arguments").

            ### Verification gate

            ```bash
            go build ./pkg/engine/...
            go test ./pkg/engine/... -run TestClassifyCallerCascade
            ```

            ### Constraints

            - Only create `pkg/engine/caller_cascade.go` and
              `pkg/engine/caller_cascade_test.go`.
            - Do NOT modify `finalize.go`, `finalize_steps.go`, or `integration_runner.go`.
            - The `injectAllowedPathsRestriction` function already exists in
              `pkg/engine/integration_runner.go` — call it, do not redefine it.
            - The `autoCommitHotfix` helper should be a private function in caller_cascade.go.
          files:
            - pkg/engine/caller_cascade.go
            - pkg/engine/caller_cascade_test.go
        - id: C
          task: |
            ## Agent C: Add StepClassifyCallerCascade to finalize_steps.go

            ### What to implement

            Add a new exported step function `StepClassifyCallerCascade` to
            `pkg/engine/finalize_steps.go`. This function wraps the
            `ClassifyCallerCascadeErrors` logic (from `caller_cascade.go`, same
            package) and conforms to the Step* function convention.

            #### Function signature

            ```go
            // StepClassifyCallerCascade runs caller cascade classification after a
            // verify-build failure. Non-fatal: always returns success so FinalizeWave
            // can inspect the result and decide whether to trigger a hotfix agent.
            //
            // When verifyData is nil or the build passed, returns success with nil
            // classification.
            func StepClassifyCallerCascade(
                ctx context.Context,
                opts FinalizeWaveOpts,
                verifyData *protocol.VerifyBuildData,
                manifest *protocol.IMPLManifest,
                onEvent EventCallback,
            ) (*StepResult, *CallerCascadeClassification)
            ```

            Implementation:

            1. Emit `emitStepEvent(onEvent, "classify-caller-cascade", "running", "")`.
            2. If verifyData is nil or (verifyData.TestPassed && verifyData.LintPassed):
               - Emit "complete", "no build failures to classify".
               - Return success StepResult with Status="skipped", nil classification.
            3. Call `ClassifyCallerCascadeErrors(verifyData, manifest, opts.WaveNum)`.
            4. If result.AllAreCascades:
               - detail = fmt.Sprintf("%d cascade error(s) in future-wave files; hotfix eligible", len(result.Errors))
               - Emit "complete", detail.
               - Return success StepResult with Data=&result, return &result.
            5. Else if result.MixedErrors:
               - detail = "mixed errors: some in current-wave files; genuine build failure"
               - Emit "complete", detail.
               - Return success StepResult with Data=&result, Detail=detail, return &result.
            6. Else (no cascade errors detected):
               - Emit "complete", "no cascade patterns detected".
               - Return success StepResult with Data=nil, return nil.

            Note: StepClassifyCallerCascade always returns success (never returns an
            error). The step is informational — callers use the returned classification
            pointer to decide whether to trigger a hotfix.

            ### Tests

            Create `pkg/engine/finalize_steps_step_test.go` (a new file dedicated
            to StepClassifyCallerCascade tests — the existing finalize_steps_test.go
            is already very large so add tests in a separate file).
            Read `pkg/engine/finalize_steps_test.go` first to understand the test
            patterns and package declaration.

            **TestStepClassifyCallerCascade_SkipsWhenBuildPassed:**
            Call with verifyData.TestPassed=true, verifyData.LintPassed=true.
            Assert returned classification is nil and step status is "skipped".

            **TestStepClassifyCallerCascade_DetectsAllCascades:**
            Call with verifyData containing cascade errors in non-current-wave files.
            Assert returned classification.AllAreCascades == true and step status == "success".

            ### Verification gate

            ```bash
            go build ./pkg/engine/...
            go test ./pkg/engine/... -run TestStepClassifyCallerCascade
            ```

            ### Constraints

            - Only modify `pkg/engine/finalize_steps.go`.
            - Create `pkg/engine/finalize_steps_step_test.go` for new tests.
            - Do NOT modify `pkg/engine/finalize_steps_test.go` (too large, not owned).
            - Do NOT import any new external packages.
            - `CallerCascadeClassification` is defined in `pkg/engine/caller_cascade.go`
              (same package) — no import needed.
            - Follow the existing Step* function style exactly: emitStepEvent at
              start/end, StepResult return value.
          files:
            - pkg/engine/finalize_steps.go
            - pkg/engine/finalize_steps_step_test.go
    - number: 2
      agents:
        - id: D
          task: |
            ## Agent D: Wire Hotfix into FinalizeWave + apply-cascade-hotfix Step + --dry-run Flag

            ### Context

            Agents A, B, C (wave 1) have implemented:
            - `pkg/result/codes.go`: new `CodeCallerCascadeHotfixFailed = "N099_CALLER_CASCADE_HOTFIX_FAILED"`
            - `pkg/engine/caller_cascade.go`: `CallerCascadeError`, `CallerCascadeClassification`,
              `ClassifyCallerCascadeErrors`, `RunHotfixAgent`, `HotfixAgentData`, `RunHotfixAgentOpts`
            - `pkg/engine/finalize_steps.go`: new `StepClassifyCallerCascade` function

            There is NO standalone `hotfix-agent` CLI command. The cascade hotfix is
            a named step within `finalize-wave`. This keeps the CLI surface minimal and
            avoids two entry points to maintain.

            ### What to implement

            #### Part 1: pkg/engine/finalize.go

            **Add two new fields to FinalizeWaveResult** (around line 80, after `WiringGaps`):

            ```go
            // CallerCascadeErrors is non-empty when verify-build fails exclusively due to
            // cascade errors in future-wave or unowned files.
            CallerCascadeErrors []CallerCascadeError `json:"caller_cascade_errors,omitempty"`

            // CallerCascadeOnly is true when ALL verify-build errors are caller cascades
            // (no errors in current-wave-owned files). Hotfix step runs automatically.
            CallerCascadeOnly bool `json:"caller_cascade_only,omitempty"`
            ```

            **Add caller cascade classification after verify-build fails.** In the
            Step 5 verify-build loop (around lines 570-600 in the file), after
            `allBuildPassed = false` is set and `verifyData` is populated,
            call StepClassifyCallerCascade before calling fatalf:

            ```go
            // Step 5.1: Classify caller cascade errors when verify-build fails.
            // Non-fatal: populates CallerCascadeErrors / CallerCascadeOnly if
            // the failure is exclusively future-wave caller cascades.
            if verifyData != nil && (!verifyData.TestPassed || !verifyData.LintPassed) {
                _, cascadeClassification := StepClassifyCallerCascade(ctx, repoOpts, verifyData, manifest, onEvent)
                if cascadeClassification != nil && cascadeClassification.AllAreCascades {
                    res.CallerCascadeErrors = append(res.CallerCascadeErrors, cascadeClassification.Errors...)
                    res.CallerCascadeOnly = true
                }
            }
            ```

            The existing fatalf call that follows should remain unchanged — FinalizeWave
            still returns a fatal error when verify-build fails. CallerCascadeOnly=true
            signals to the CLI that the apply-cascade-hotfix step should run.

            #### Part 2: cmd/sawtools/finalize_wave.go

            This is the only CLI file for this feature. There is no separate
            `hotfix_agent_cmd.go` to create — everything lives here.

            **2a. Add --dry-run flag** to the finalize-wave command:

            ```go
            var dryRun bool
            cmd.Flags().BoolVar(&dryRun, "dry-run", false,
                "Show what cascade errors would be hotfixed without running the agent")
            ```

            **2b. Add apply-cascade-hotfix step.** After the `r := engine.FinalizeWave(...)`
            call and `out, _ := json.MarshalIndent(...)`, add logic to detect
            CallerCascadeOnly and either describe (dry-run) or execute the hotfix:

            ```go
            // apply-cascade-hotfix step: runs when verify-build fails exclusively
            // due to caller cascade errors in future-wave files.
            if r.Data.CallerCascadeOnly && len(r.Data.CallerCascadeErrors) > 0 {
                if dryRun {
                    // --dry-run: describe what would be fixed, exit 0.
                    dryRunResult := map[string]interface{}{
                        "step":         "apply-cascade-hotfix",
                        "dry_run":      true,
                        "error_count":  len(r.Data.CallerCascadeErrors),
                        "files":        uniqueFiles(r.Data.CallerCascadeErrors),
                        "errors":       r.Data.CallerCascadeErrors,
                    }
                    dryOut, _ := json.MarshalIndent(dryRunResult, "", "  ")
                    fmt.Fprintln(cmd.OutOrStdout(), string(dryOut))
                    return nil
                }

                fmt.Fprintf(os.Stderr, "finalize-wave: apply-cascade-hotfix: %d error(s) in future-wave files — launching hotfix agent\n",
                    len(r.Data.CallerCascadeErrors))
                hotfixRes := engine.RunHotfixAgent(cmd.Context(), engine.RunHotfixAgentOpts{
                    IMPLPath: manifestPath,
                    RepoPath: defaultRepoPath,
                    WaveNum:  waveNum,
                    Errors:   r.Data.CallerCascadeErrors,
                    Logger:   newSawLogger(),
                }, func(ev engine.Event) {
                    if ev.Event == "hotfix_agent_output" {
                        if data, ok := ev.Data.(map[string]string); ok {
                            fmt.Fprint(os.Stderr, data["chunk"])
                        }
                    }
                })
                if hotfixRes.IsFatal() {
                    errMsg := "hotfix agent failed"
                    if len(hotfixRes.Errors) > 0 {
                        errMsg = hotfixRes.Errors[0].Message
                    }
                    return fmt.Errorf("finalize-wave: apply-cascade-hotfix failed: %s", errMsg)
                }
                hotfixData := hotfixRes.GetData()
                if !hotfixData.BuildPassed {
                    return fmt.Errorf("finalize-wave: apply-cascade-hotfix: build still fails after hotfix")
                }
                hotfixStepResult := map[string]interface{}{
                    "step":         "apply-cascade-hotfix",
                    "status":       "success",
                    "files_fixed":  hotfixData.FilesFixed,
                    "commit":       hotfixData.Commit,
                    "build_passed": hotfixData.BuildPassed,
                }
                hotfixOut, _ := json.MarshalIndent(hotfixStepResult, "", "  ")
                fmt.Fprintln(cmd.OutOrStdout(), string(hotfixOut))
                fmt.Fprintf(os.Stderr, "finalize-wave: apply-cascade-hotfix complete — build passes\n")
                return nil
            }
            ```

            Also add a private helper `uniqueFiles` in finalize_wave.go:

            ```go
            func uniqueFiles(errors []engine.CallerCascadeError) []string {
                seen := make(map[string]bool)
                var files []string
                for _, e := range errors {
                    if !seen[e.File] {
                        seen[e.File] = true
                        files = append(files, e.File)
                    }
                }
                return files
            }
            ```

