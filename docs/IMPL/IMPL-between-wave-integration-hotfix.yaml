            ### Constraints

            - Modify only: `pkg/engine/finalize.go`, `cmd/sawtools/finalize_wave.go`,
              `cmd/sawtools/main.go`. Create: `cmd/sawtools/hotfix_agent_cmd.go`.
            - Do NOT modify `pkg/engine/caller_cascade.go` (owned by Agent B),
              `pkg/engine/finalize_steps.go` (owned by Agent C),
              `pkg/result/codes.go` (owned by Agent A).
            - The `CallerCascadeErrors` field must be added to `FinalizeWaveResult`
              in `finalize.go` — this is where the struct is defined (around line 63).
            - The `FinalizeWaveResult` struct has many fields. Add CallerCascadeErrors
              and CallerCascadeOnly after the existing `WiringGaps []string` field
              (around line 80). Do not reorder existing fields.
            - `ClassifyCallerCascadeErrors` is exported from `pkg/engine` — call it
              as `engine.ClassifyCallerCascadeErrors` in the CLI cmd file.
          files:
            - pkg/engine/finalize.go
            - cmd/sawtools/finalize_wave.go
            - cmd/sawtools/hotfix_agent_cmd.go
            - cmd/sawtools/main.go
          dependencies:
            - A
            - B
            - C
