interface_contracts:
    - name: CallerCascadeError
      description: |-
        A single compiler error classified as a caller cascade — an error in a file
        that is NOT owned by the current wave but IS owned by a future wave (or is
        an unowned caller). These are the errors produced when wave agents change
        function signatures and future-wave files still compile against old signatures.
      definition: |
        // CallerCascadeError represents a single compiler error classified as a
        // caller cascade: the error file is not owned by the current wave.
        type CallerCascadeError struct {
            File    string `json:"file"`    // relative file path reporting the error
            Line    int    `json:"line"`    // line number (0 if unknown)
            Message string `json:"message"` // raw compiler error text
        }
      location: pkg/engine/caller_cascade.go
    - name: CallerCascadeClassification
      description: |-
        The result of classifying verify-build errors. Contains the list of caller
        cascade errors (errors in future-wave-owned or unowned files) and a flag
        indicating whether ALL errors are caller cascades. When AllAreCascades is
        true and Errors is non-empty, the engine can safely trigger an integration
        hotfix agent rather than failing the wave.
      definition: |
        // CallerCascadeClassification is the result of ClassifyCallerCascadeErrors.
        type CallerCascadeClassification struct {
            Errors        []CallerCascadeError `json:"errors"`
            AllAreCascades bool                `json:"all_are_cascades"`
            // MixedErrors is true when some errors are in current-wave files
            // (real failures) and some are in future-wave/unowned files (cascades).
            // When true, the wave has a genuine build failure and hotfix is NOT triggered.
            MixedErrors bool `json:"mixed_errors"`
        }
      location: pkg/engine/caller_cascade.go
    - name: ClassifyCallerCascadeErrors
      description: |-
        Parses the raw test/lint output from VerifyBuildData, extracts compiler
        errors of class "undefined:", "assignment mismatch:", or "not enough
        arguments", and classifies each one: is the erroring file owned by the
        current wave or by a future wave (or unowned)?

        Files owned by the current wave indicate a genuine build failure.
        Files owned by future waves (or unowned) are caller cascade errors.

        If ALL classified errors are cascades, AllAreCascades=true and the caller
        may launch a hotfix agent. If any errors are in current-wave-owned files,
        AllAreCascades=false (MixedErrors=true), and the wave has a genuine failure.
      definition: |
        // ClassifyCallerCascadeErrors classifies verify-build errors to distinguish
        // genuine wave failures from caller cascade side-effects.
        //
        // cascadePatterns matches: "undefined: Foo", "assignment mismatch: 2 variables
        // but Foo returns 1", "not enough arguments in call to Foo"
        //
        // manifest is used to determine which files are current-wave-owned vs future-wave.
        // waveNum is the wave that just finished.
        func ClassifyCallerCascadeErrors(
            verifyData *protocol.VerifyBuildData,
            manifest *protocol.IMPLManifest,
            waveNum int,
        ) CallerCascadeClassification
      location: pkg/engine/caller_cascade.go
    - name: StepClassifyCallerCascade
      description: |-
        A finalize_steps.go Step* function that wraps ClassifyCallerCascadeErrors.
        Called from FinalizeWave after StepVerifyBuild returns failure, to determine
        whether the failure is exclusively caller cascades in future-wave files.
        Returns the classification. The step itself is non-fatal (callers decide
        what to do with the result). Returns ("success", nil classification) when
        verifyData shows no failures or no cascade patterns are detected.
      definition: |
        // StepClassifyCallerCascade runs caller cascade classification after a
        // verify-build failure. Non-fatal: always returns success so FinalizeWave
        // can inspect the result and decide whether to trigger a hotfix agent.
        //
        // When verifyData is nil or both TestPassed and LintPassed are true,
        // returns success with nil classification (no cascade check needed).
        func StepClassifyCallerCascade(
            ctx context.Context,
            opts FinalizeWaveOpts,
            verifyData *protocol.VerifyBuildData,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, *CallerCascadeClassification)
      location: pkg/engine/finalize_steps.go
    - name: FinalizeWaveResult.CallerCascadeErrors
      description: |-
        New field on FinalizeWaveResult. Populated when verify-build fails but the
        failure is exclusively caller cascade errors in future-wave-owned or unowned
        files. When non-empty, the orchestrator (or sawtools finalize-wave) should
        trigger the hotfix agent before calling prepare-wave for the next wave.
        When CallerCascadeErrors is non-empty, Success is still false (the build did
        not pass), but BuildPassed is also false with a distinct CallerCascadeOnly=true
        flag to allow callers to distinguish "real failure" from "cascade hotfix needed".
      definition: |
        // CallerCascadeErrors is non-empty when verify-build fails exclusively due to
        // cascade errors in future-wave or unowned files. When non-empty and
        // CallerCascadeOnly is true, the Orchestrator should launch a hotfix agent
        // rather than treating the wave as failed.
        CallerCascadeErrors []CallerCascadeError `json:"caller_cascade_errors,omitempty"`

        // CallerCascadeOnly is true when verify-build failed and ALL errors are
        // caller cascades (no errors in current-wave-owned files).
        CallerCascadeOnly bool `json:"caller_cascade_only,omitempty"`
      location: pkg/engine/finalize.go
    - name: RunHotfixAgentOpts
      description: |-
        Options for RunHotfixAgent, which launches a hotfix integration agent to
        fix caller cascade compiler errors. Mirrors RunIntegrationAgentOpts in
        structure but carries CallerCascadeErrors instead of IntegrationGaps.
      definition: |
        // RunHotfixAgentOpts configures a caller cascade hotfix agent run.
        type RunHotfixAgentOpts struct {
            IMPLPath string                // absolute path to IMPL manifest
            RepoPath string                // absolute path to the target repository
            WaveNum  int                  // wave number that just completed
            Errors   []CallerCascadeError  // errors to fix
            Model    string               // optional model override
            Logger   *slog.Logger         // optional: nil falls back to slog.Default()
        }
      location: pkg/engine/caller_cascade.go
    - name: RunHotfixAgent
      description: |-
        Launches an LLM agent to fix caller cascade compiler errors. The agent
        receives the structured error list, applies minimal caller fixes only to
        files with compile errors, commits with the standard hotfix commit message,
        and re-runs go build && go vet to confirm clean. This function lives in
        caller_cascade.go (new file) to avoid bloating integration_runner.go.

        The hotfix agent is constrained to files explicitly listed in CallerCascadeErrors
        (the files with compile errors) — it cannot touch other files.
      definition: |
        // RunHotfixAgent launches a caller cascade hotfix agent (E26a).
        // It fixes minimal caller errors in future-wave-owned files after a wave
        // changes function signatures. The agent commits as:
        //   [SAW:wave{N}:integration-hotfix] fix caller cascade after wave N signature changes
        //
        // Returns success when the agent fixes all errors and the build passes.
        // Returns failure when the agent cannot fix errors or the build still fails.
        func RunHotfixAgent(
            ctx context.Context,
            opts RunHotfixAgentOpts,
            onEvent func(Event),
        ) result.Result[HotfixAgentData]
      location: pkg/engine/caller_cascade.go
    - name: HotfixAgentData
      description: Return data from a successful RunHotfixAgent call.
      definition: |
        // HotfixAgentData contains metadata from a successful RunHotfixAgent operation.
        type HotfixAgentData struct {
            IMPLPath   string `json:"impl_path"`
            WaveNum    int    `json:"wave_num"`
            ErrorCount int    `json:"error_count"` // number of errors passed to agent
            BuildPassed bool  `json:"build_passed"` // true when go build && go vet clean after fix
        }
      location: pkg/engine/caller_cascade.go
    - name: CodeCallerCascadeHotfixFailed
      description: New error code for hotfix agent failures.
      definition: |
        CodeCallerCascadeHotfixFailed = "N099_CALLER_CASCADE_HOTFIX_FAILED"
      location: pkg/result/codes.go
