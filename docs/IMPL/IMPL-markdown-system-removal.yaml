title: "Remove deprecated markdown IMPL system"
feature_slug: "markdown-system-removal"
verdict: "SUITABLE"
test_command: "go test ./..."
lint_command: "go vet ./..."
state: "SCOUT_PENDING"

suitability_assessment: |
  ## Suitability Gate Results

  **Verdict: SUITABLE**

  1. **File decomposition:** ✓ Clean separation across 3 agents with disjoint file ownership:
     - Agent A: parser.go + marker.go + extract.go (markdown parsing)
     - Agent B: 6 web repo files (dual-format handlers)
     - Agent C: tests + documentation cleanup

  2. **Investigation-first items:** ✓ None. All markdown code paths are known and mapped.

  3. **Interface discoverability:** ✓ All interfaces are already defined. The YAML-only
     paths (protocol.Load, protocol.Save) are the canonical API post-removal.

  4. **Pre-implementation status check:** All markdown code is TO-DO (active removal work).
     No items are already done or partial.

  5. **Parallelization value check:** ✓ High value.
     - Engine repo (A) and web repo (B) are independent — full parallelization.
     - Test cleanup (C) depends on A+B but is small.
     - Build/test cycles >30s (Go compilation + test suite).

  **Time estimate:**
  - Scout: ~5 min
  - Agent execution: ~15 min (A: 8 min, B: 8 min, C: 3 min; A+B parallel)
  - Merge: ~3 min
  - Total SAW time: ~23 min
  - Sequential baseline: ~35 min (10 min + 10 min + 8 min + 7 min)
  - Time savings: ~12 min (35% faster)

  **Recommendation:** Clear speedup. Proceed with SAW.

# Interface Contracts
interface_contracts:
  - name: "protocol.Load"
    description: "YAML-only IMPL manifest loader (replaces ParseIMPLDoc)"
    definition: |
      func Load(path string) (*IMPLManifest, error)
      // Loads .yaml/.yml IMPL manifest from disk.
      // Returns error if file not found or YAML parse fails.
    location: "pkg/protocol/manifest.go"

  - name: "protocol.Save"
    description: "YAML-only IMPL manifest writer"
    definition: |
      func Save(m *IMPLManifest, path string) error
      // Writes IMPLManifest to disk as YAML.
      // Creates parent directories if needed.
    location: "pkg/protocol/manifest.go"

  - name: "protocol.WriteCompletionMarkerYAML"
    description: "YAML completion marker (replaces writeCompletionMarkerMarkdown)"
    definition: |
      func writeCompletionMarkerYAML(implDocPath string, date string) error
      // Internal helper. Sets completion_date field in YAML manifest.
      // Called by WriteCompletionMarker after file type detection.
    location: "pkg/protocol/marker.go"

