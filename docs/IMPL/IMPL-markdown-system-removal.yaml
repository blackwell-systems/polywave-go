# Waves
waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement
          Remove all markdown IMPL parsing functions from the protocol package in scout-and-wave-go.
          The protocol has migrated to YAML-only manifests (.yaml files). Markdown IMPL docs
          (.md format) are deprecated. Remove markdown-specific parsers while preserving YAML paths.

          **Files to modify:**
          - `pkg/protocol/parser.go`: Remove `ParseIMPLDoc()` function and all markdown parsing helpers
          - `pkg/protocol/marker.go`: Remove `writeCompletionMarkerMarkdown()` and markdown branch in `WriteCompletionMarker()`
          - `pkg/protocol/extract.go`: Remove `ExtractAgentContext()` and `FormatAgentContextPayload()` (markdown-only helpers)

          **What to keep:**
          - `pkg/protocol/manifest.go`: `Load()` and `Save()` (YAML-only API) — do not touch
          - `pkg/protocol/extract.go`: `ExtractAgentContextFromManifest()` and `AgentContextJSONPayload` (YAML path) — keep
          - `pkg/protocol/marker.go`: `writeCompletionMarkerYAML()` (internal helper) — keep
          - `pkg/protocol/marker.go`: `WriteCompletionMarker()` — simplify to YAML-only (remove .md branch)

          **Markdown parsing functions to remove (grep confirmed):**
          1. `ParseIMPLDoc(path string) (*types.IMPLDoc, error)` — full markdown parser (1184 lines)
          2. Helper functions in parser.go:
             - `isAgentHeader(line string) bool`
             - `isCompletionReportHeader(line string) bool`
             - `extractAgentLetter(line string) string`
             - `parseFileOwnershipRow(...)` — if only used by ParseIMPLDoc
             - `readUntilClosingFence(scanner *bufio.Scanner) []string`
             - `extractTypedBlock(scanner *bufio.Scanner) ([]string, bool)`
             - `parsePreMortemSection(scanner *bufio.Scanner) *types.PreMortem`
             - `parseKnownIssuesSection(scanner *bufio.Scanner) []types.KnownIssue`
             - `parseScaffoldsDetailSection(scanner *bufio.Scanner) []types.ScaffoldFile`
             - `parseInterfaceContractsSection(scanner *bufio.Scanner) string`
             - `parseDependencyGraphSection(scanner *bufio.Scanner) string`
             - `parsePostMergeChecklistSection(scanner *bufio.Scanner) *PostMergeChecklist`
             - `parseWaveStructureBlock(blockLines []string, doc *types.IMPLDoc)`
             - `classifyAction(s string) string`
          3. `ParseCompletionReport(path string, agentLetter string) (*types.CompletionReport, error)` — markdown completion report parser
          4. `writeCompletionMarkerMarkdown(implDocPath string, date string) error` in marker.go
          5. `ExtractAgentContext(implDocPath string, agentLetter string) (*AgentContextPayload, error)` in extract.go
          6. `FormatAgentContextPayload(payload *AgentContextPayload) string` in extract.go
          7. `AgentContextPayload` struct (markdown-specific, replaced by `AgentContextJSONPayload`)

          **WriteCompletionMarker simplification:**
          Current logic:
          ```go
          if !isMarkdown && !isYAML {
              return error
          }
          if isYAML {
              return writeCompletionMarkerYAML(...)
          }
          return writeCompletionMarkerMarkdown(...)
          ```

          New logic (YAML-only):
          ```go
          if !strings.HasSuffix(implDocPath, ".yaml") && !strings.HasSuffix(implDocPath, ".yml") {
              return fmt.Errorf("unsupported file type: %s (expected .yaml)", implDocPath)
          }
          return writeCompletionMarkerYAML(implDocPath, date)
          ```

          ## Interfaces to Implement
          None — this is removal work. Existing YAML interfaces remain unchanged.

          ## Interfaces to Call
          None — isolated removal within protocol package.

          ## Tests to Write
          No new tests. Existing tests will be cleaned up by Agent C in Wave 2.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./...
          go vet ./...
          # Test suite will fail until Agent C updates tests in Wave 2 — expected
          ```

          ## Constraints
          - Do NOT remove `protocol.Load()` or `protocol.Save()` — these are the YAML API
          - Do NOT remove `ExtractAgentContextFromManifest()` — YAML extraction path
          - Do NOT touch `pkg/types/types.go` (IMPLDoc type may still be used by tests)
          - Remove imports that become unused (bufio, strings helpers, etc.)
          - If `ValidateInvariants(doc *types.IMPLDoc)` is only called from ParseIMPLDoc, leave it (tests may use it)
        files:
          - "pkg/protocol/parser.go"
          - "pkg/protocol/marker.go"
          - "pkg/protocol/extract.go"
        model: "claude-sonnet-4"

      - id: "B"
        task: |
          ## What to Implement
          Remove markdown IMPL handling from scout-and-wave-web. The web app now uses
          YAML-only manifests via `protocol.Load()`. Remove dual-format branching logic
          that falls back to markdown parsing.

          **Files to modify:**
          1. `pkg/api/impl.go`:
             - `handleListImpls()`: Remove `.md` extension check in file scan (lines 81-87)
             - `handleGetImpl()`: Remove `.md` path check and `engine.ParseIMPLDoc()` fallback (lines 210-290)
             - `handleDeleteImpl()`: Remove `.md` extension check (lines 766-774)
             - `handleArchiveImpl()`: Remove `.md` extension check (lines 804-809)
             - Remove helper functions used only for markdown: `inferComplete()`, `injectScaffoldWave()`, `mapFileOwnership()`, `mapWaves()`, `mapKnownIssues()`, `mapScaffoldsDetail()`, `extractAgentPrompts()`, `mapPreMortem()`

          2. `pkg/api/wave_runner.go`:
             - Remove `engine.ParseIMPLDoc()` fallback if present
             - Use `protocol.Load()` only

          3. `pkg/api/agent_context_handler.go`:
             - Remove markdown extraction path if present
             - Use `protocol.ExtractAgentContextFromManifest()` only

          4. `pkg/api/merge_test_handlers.go`:
             - Remove markdown test fixtures if present

          5. `cmd/saw/migrate.go`:
             - Delete entire file (migration tool no longer needed)

          6. `cmd/saw/commands.go`:
             - Remove `migrate` command registration in `Run()` function
             - Remove `runMigrate` function reference

          7. `cmd/saw/main.go`:
             - Remove `migrate` case from command switch (lines 78-82)
             - Remove migrate help text (line 141)

          **Pattern to remove (example from impl.go handleGetImpl):**
          ```go
          // Before (dual-mode):
          if strings.HasSuffix(implPath, ".yaml") || strings.HasSuffix(implPath, ".yml") {
              manifest, err := protocol.Load(implPath)
              // ... YAML path
          } else {
              doc, err := engine.ParseIMPLDoc(implPath)
              // ... markdown path with mappers
          }

          // After (YAML-only):
          manifest, err := protocol.Load(implPath)
          if err != nil {
              // ... error handling
          }
          resp = implDocResponseFromManifest(slug, manifest)
          ```

          ## Interfaces to Implement
          None — removal work only.

          ## Interfaces to Call
          - `protocol.Load(path string) (*IMPLManifest, error)` — already in use, keep all calls
          - `protocol.ExtractAgentContextFromManifest(m *IMPLManifest, agentID string)` — already in use

          ## Tests to Write
          No new tests. Existing test cleanup (if needed) happens in Wave 2 Agent C.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web
          go build ./...
          go vet ./...
          go test ./pkg/api/...
          ```

          ## Constraints
          - Do NOT touch frontend code (web/src/*) — no changes needed there
          - Keep all `protocol.Load()` and `implDocResponseFromManifest()` calls
          - Remove imports that become unused: `engine` import if only used for ParseIMPLDoc
          - File scans should only look for `.yaml` extension (not `.md`)
        files:
          - "pkg/api/impl.go"
          - "pkg/api/wave_runner.go"
          - "pkg/api/agent_context_handler.go"
          - "pkg/api/merge_test_handlers.go"
          - "cmd/saw/migrate.go"
          - "cmd/saw/commands.go"
          - "cmd/saw/main.go"
        model: "claude-sonnet-4"

  - number: 2
    agents:
      - id: "C"
        task: |
          ## What to Implement
          Clean up test files and documentation after markdown parser removal in Wave 1.
          Remove or update tests that depended on removed markdown parsing functions.

          **Files to modify:**
          1. `pkg/protocol/parser_test.go`:
             - Remove tests for `ParseIMPLDoc()` (e.g., `TestParseIMPLDoc`, `TestParseCompletionReport`)
             - Keep tests for YAML manifest functions if present

          2. `pkg/protocol/extract_test.go`:
             - Remove tests for `ExtractAgentContext()` and `FormatAgentContextPayload()`
             - Keep tests for `ExtractAgentContextFromManifest()` (YAML path)

          3. `pkg/protocol/marker_test.go`:
             - Remove tests for `writeCompletionMarkerMarkdown()`
             - Update `TestWriteCompletionMarker` to only test YAML path

          4. `pkg/protocol/doc.go`:
             - Update package documentation to remove references to markdown IMPL docs
             - Update godoc to reflect YAML-only protocol

          **Test cleanup strategy:**
          - If a test fixture is a markdown IMPL doc (testdata/*.md), delete it or convert to YAML
          - If a test calls removed functions, delete the entire test
          - If a test uses `types.IMPLDoc` struct but doesn't call removed functions, leave it

          ## Interfaces to Implement
          None — cleanup work only.

          ## Interfaces to Call
          None — test-only changes.

          ## Tests to Write
          No new tests. This agent removes obsolete tests.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./...
          go vet ./...
          go test ./pkg/protocol/...
          ```

          ## Constraints
          - Do NOT remove tests for YAML functions (`Load`, `Save`, `ExtractAgentContextFromManifest`)
          - Do NOT remove `types.IMPLDoc` type definition (may be used by other packages)
          - Update doc.go to say "YAML-only IMPL manifest protocol" instead of "parses markdown or YAML"
        files:
          - "pkg/protocol/parser_test.go"
          - "pkg/protocol/extract_test.go"
          - "pkg/protocol/marker_test.go"
          - "pkg/protocol/doc.go"
        dependencies:
          - "A"
        model: "claude-sonnet-4"

# Pre-Mortem
pre_mortem:
  overall_risk: "low"
  rows:
    - scenario: "Removing ParseIMPLDoc breaks external tools that still use markdown IMPL docs"
      likelihood: "low"
      impact: "medium"
      mitigation: "scout-and-wave-go is internal SDK. scout-and-wave-web is the only consumer, and Agent B handles it. If external tools exist, they can pin to an older version or migrate."

    - scenario: "Test suite breaks in Wave 1 because Agent C hasn't updated tests yet"
      likelihood: "high"
      impact: "low"
      mitigation: "Expected and acceptable. Agent A/B verification gates skip test suite; Agent C fixes tests in Wave 2. Post-merge full test suite runs after Wave 2."

    - scenario: "Web app regresses because a markdown IMPL doc exists in production and is now unreadable"
      likelihood: "low"
      impact: "medium"
      mitigation: "Pre-deployment check: scan docs/IMPL/ for .md files and migrate them with the `saw migrate` command before deploying this change. The migrate command itself is removed, so must be run beforehand."

