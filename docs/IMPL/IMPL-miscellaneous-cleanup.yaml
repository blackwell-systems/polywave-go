            func requiredKey(state *State, key string) result.Result[KeyData] {
              v, ok := GetValue[any](state, key)
              if !ok || v == nil {
                return result.NewFailure[KeyData]([]result.SAWError{
                  result.NewFatal("REQUIRED_KEY_MISSING",
