title: "Constraint-Solving Validator — CSP Wave Assignment from Dependency Declarations"
feature_slug: constraint-solver
verdict: SUITABLE
suitability_assessment: |
  The feature decomposes cleanly into a new package (pkg/solver/) with well-defined
  input/output types. The existing validator in pkg/protocol/validation.go has clear
  seams — validateI2AgentDependencies and validateI3WaveOrdering are the two functions
  whose checks are superseded by solver-computed assignments. The existing IMPLManifest
  types provide all needed input data. Risk is low because the solver is additive:
  existing validation rules (I1, I4, I5, I6, enum checks, etc.) are untouched.
  Backward compatibility is maintained by keeping the existing Validate() function
  signature and adding an optional ValidateWithSolver mode.

  IMPORT GRAPH NOTE: pkg/solver/ must NOT import pkg/protocol/ to avoid circular
  imports. The solver operates on its own DepNode type. Conversion between
  protocol.IMPLManifest and solver.DepNode lives in pkg/protocol/solver_integration.go,
  which imports pkg/solver (one-directional dependency: protocol -> solver).
test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./...
      required: true

scaffolds:
  - file_path: pkg/solver/types.go
    contents: |
      package solver

      // DepNode represents one agent in the dependency graph.
      // AgentID is the protocol agent ID (e.g. "A", "B2").
      // DependsOn lists agent IDs this agent depends on.
      type DepNode struct {
          AgentID   string
          DependsOn []string
          Files     []string
      }

      // Assignment is the solver output: an agent ID mapped to its computed wave number.
      type Assignment struct {
          AgentID string
          Wave    int
      }

      // SolveResult holds the full solver output.
      type SolveResult struct {
          Assignments []Assignment
          WaveCount   int
          Valid       bool
          Errors      []string
      }
    import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/solver
    status: committed (2361202)

interface_contracts:
  - name: "DepNode / Assignment / SolveResult"
    description: |
      Shared types used by solver and integration code. Defined in the scaffold
      file pkg/solver/types.go. DepNode is the solver input, Assignment + SolveResult
      are the solver output. The solver package does NOT import pkg/protocol —
      all protocol-to-solver conversion lives in pkg/protocol/solver_integration.go.
    definition: |
      // pkg/solver/types.go
      type DepNode struct {
          AgentID   string
          DependsOn []string
          Files     []string
      }
      type Assignment struct {
          AgentID string
          Wave    int
      }
      type SolveResult struct {
          Assignments []Assignment
          WaveCount   int
          Valid       bool
          Errors      []string
      }
    location: pkg/solver/types.go

  - name: "Solve"
    description: |
      The core solver function. Takes a slice of DepNode (one per agent) and returns
      a SolveResult with computed wave assignments. Returns Valid=false with Errors
      if the graph has cycles or missing dependencies. Wave numbers are 1-based and
      sequential. Agents with no dependencies get wave 1. Agents depending only on
      wave-1 agents get wave 2, etc. This is a topological sort with level assignment.
    definition: |
      // pkg/solver/solver.go
      func Solve(nodes []DepNode) SolveResult
    location: pkg/solver/solver.go

  - name: "Graph analysis utilities"
    description: |
      Diagnostic graph functions in pkg/solver/graph.go. DetectCycles finds all
      cycles (not just the first). TransitiveDeps computes full transitive closure.
      CriticalPath finds the longest dependency chain. ValidateRefs checks that
      all DependsOn entries reference existing agents. All functions are pure —
      no protocol imports.
    definition: |
      // pkg/solver/graph.go
      func DetectCycles(nodes []DepNode) [][]string
      func TransitiveDeps(nodes []DepNode, agentID string) []string
      func CriticalPath(nodes []DepNode) []string
      func ValidateRefs(nodes []DepNode) []string
    location: pkg/solver/graph.go

  - name: "ValidateWithSolver + SolveManifest"
    description: |
      Exported functions in pkg/protocol/solver_integration.go.
      ValidateWithSolver: converts manifest to solver nodes, runs solver,
      compares assignments, runs existing Validate() checks.
      SolveManifest: full pipeline that computes optimal wave assignments and
      returns a rewritten manifest with corrected wave numbers. This is the
      "computed, not guessed" entry point — used by `sawtools solve`.
      Helper functions (manifestToNodes, applyResult, compareAssignments) are
      unexported. This file is the ONLY bridge between pkg/protocol and
      pkg/solver (one-directional import: protocol -> solver).
    definition: |
      // pkg/protocol/solver_integration.go
      func ValidateWithSolver(m *IMPLManifest) []ValidationError
      func SolveManifest(m *IMPLManifest) (*IMPLManifest, []string, error)
      // SolveManifest returns: (rewritten manifest, list of wave changes, error)
      // Changes are human-readable strings like "agent C: wave 1 → wave 2"
      // Error if graph has cycles or missing deps.
      func manifestToNodes(m *IMPLManifest) []solver.DepNode
      func applyResult(result solver.SolveResult, m *IMPLManifest) (*IMPLManifest, error)
      func compareAssignments(m *IMPLManifest, result solver.SolveResult) []waveMismatch
    location: pkg/protocol/solver_integration.go

  - name: "validate --solver flag + solve command"
    description: |
      Two CLI additions: (1) --solver boolean flag on validate command that runs
      ValidateWithSolver instead of Validate. (2) New `sawtools solve <manifest>`
      command that runs SolveManifest and writes the corrected manifest back to disk.
      Prints a summary of wave reassignments. Exit 0 if no changes needed, exit 0
      with summary if changes applied, exit 1 if graph is invalid (cycles/missing deps).
    definition: |
      // cmd/saw/validate_cmd.go
      // Flag: --solver (bool, default false)
      // When true: calls protocol.ValidateWithSolver(m) instead of protocol.Validate(m)

      // cmd/saw/solve_cmd.go (new file)
      // func newSolveCmd() *cobra.Command
      // Loads manifest, calls protocol.SolveManifest, saves result, prints changes.
      // --dry-run flag: print changes without writing.
    location: cmd/saw/validate_cmd.go, cmd/saw/solve_cmd.go

