pre_mortem:
  overall_risk: low
  rows:
    - scenario: |
        Solver's topological sort produces different wave groupings than a human would
        choose (e.g. solver puts agent D in wave 2 when a human put it in wave 3 for
        readability). SOLVER_WAVE_MISMATCH floods output with false warnings.
      likelihood: medium
      impact: low
      mitigation: |
        SOLVER_WAVE_MISMATCH is a distinct error code. The CLI could filter these out
        or suppress them by default in a future PR. The solver's assignment is
        mathematically optimal (minimum waves) but the human's is valid too — both
        satisfy dependency ordering. The code treats mismatches as informational, not
        as validation failures (exit code 0 if only mismatches).
    - scenario: |
        The YAML deep-copy in applyResult (marshal/unmarshal) drops fields that have
        custom serialization behavior or zero values that differ from Go defaults.
      likelihood: low
      impact: medium
      mitigation: |
        IMPLManifest uses only standard yaml tags with exported fields and omitempty.
        Agent C's TestRoundTrip_SolveAndApply test verifies that no fields are lost.
        If a field is dropped, switch to a field-by-field copy approach.
    - scenario: |
        Agent A's Solve and Agent B's DetectCycles have overlapping cycle detection
        logic, leading to inconsistent error messages between the two code paths.
      likelihood: medium
      impact: low
      mitigation: |
        Solve uses Kahn's algorithm (BFS) which detects cycles by checking if all
        nodes were assigned. DetectCycles uses DFS with recursion stack which finds
        actual cycle paths. The two approaches are complementary: Solve reports
        "cycle exists among agents X,Y,Z" while DetectCycles reports the exact
        cycle path. ValidateWithSolver uses only Solve for its error reporting.
        DetectCycles is available for richer diagnostics in future CLI commands.

