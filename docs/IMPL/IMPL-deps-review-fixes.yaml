            ## What to Implement

            Fix critical bugs and migrate error handling in checker.go:

            **Critical bugs (must fix):**
            1. **F5 — Repo root calculation hardcodes 3-level depth** (line 32): Keep the
               `filepath.Dir(filepath.Dir(filepath.Dir(implPath)))` approach but add validation.
               After calculating repoRoot, verify it looks valid by checking for .git directory:
               ```go
               if _, err := os.Stat(filepath.Join(repoRoot, ".git")); err != nil {
                   return result.NewFailure[ConflictReport]([]result.SAWError{
                       result.NewFatal(result.CodeDepRepoRootInvalid,
                           fmt.Sprintf("inferred repo root %s does not contain .git directory", repoRoot))
                   })
               }
               ```
               This catches non-standard layouts where 3-level depth assumption fails.

            2. **F4 — getModulePath returns empty string on error** (lines 266-269): Silent
               failures prevent distinguishing "no go.mod" from "failed to read". Migrate
               getModulePath to return `result.Result[string]` and propagate error with
               `CodeDepGoModRead` or `CodeDepGoModParse`. Update caller at line 265 to check
               result and handle failure explicitly.

            3. **F6 — Parser errors silently ignored in loop** (lines 64-67): `continue`
               statement suppresses all lock file parse errors. Log the error with structured
               SAWError before continuing so orchestrator can surface parse failures. Use
               `CodeDepLockFileParse` and include file path in error context.

