interface_contracts:
    - name: CheckDeps
      description: |-
        Main entry point for dependency conflict detection — MUST migrate from
        (*ConflictReport, error) to result.Result[ConflictReport]
      definition: func CheckDeps(implPath string, wave int) result.Result[ConflictReport]
      location: pkg/deps/checker.go:24
    - name: LockFileParser.Parse
      description: |-
        Parser interface method — MUST migrate from ([]PackageInfo, error) to
        result.Result[[]PackageInfo]. All 5 parser implementations must update.
      definition: |-
        type LockFileParser interface {
          Parse(filePath string) result.Result[[]PackageInfo]
          Detect(filePath string) bool
        }
      location: pkg/deps/types.go:6
    - name: Dependency Check Error Codes
      description: |-
        New error codes for dependency validation in D001-D099 range. All parsers
        and CheckDeps must use these instead of hardcoded strings.
      definition: |-
        const (
          CodeDepLockFileOpen       = "D001_LOCK_FILE_OPEN"
          CodeDepLockFileParse      = "D002_LOCK_FILE_PARSE"
          CodeDepMissingDeps        = "D003_MISSING_DEPS"
          CodeDepVersionConflict    = "D004_VERSION_CONFLICT"
          CodeDepInvalidToml        = "D005_INVALID_TOML"
          CodeDepMalformedPackage   = "D006_MALFORMED_PACKAGE"
          CodeDepUnsupportedVersion = "D007_UNSUPPORTED_VERSION"
          CodeDepEmptyPackage       = "D008_EMPTY_PACKAGE"
          CodeDepGoModRead          = "D009_GOMOD_READ"
          CodeDepGoModParse         = "D010_GOMOD_PARSE"
          CodeDepRepoRootInvalid    = "D011_REPO_ROOT_INVALID"
        )
      location: pkg/result/codes.go
    - name: getModulePath
      description: |-
        Helper must signal errors instead of returning empty string. Callers cannot
        currently distinguish "no go.mod" from "failed to read go.mod". Return
        result.Result[string] with CodeDepGoModRead/CodeDepGoModParse.
      definition: func getModulePath(repoRoot string) result.Result[string]
      location: pkg/deps/checker.go:334
    - name: unquoteTOML
      description: |-
        Shared TOML quote removal helper — extract to package-level to eliminate
        duplication between cargolock.go and poetrylock.go
      definition: |-
        func unquoteTOML(s string) string {
          s = strings.TrimSpace(s)
          if len(s) >= 2 {
            if (s[0] == '"' && s[len(s)-1] == '"') || (s[0] == '\'' && s[len(s)-1] == '\'') {
              return s[1 : len(s)-1]
            }
          }
          return s
        }
      location: pkg/deps/helpers.go
