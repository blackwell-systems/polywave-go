      description: |
        Result payload for a successful Remove operation.
        Bug 1 fix: remove the WasTracked field entirely — it was always
        hardcoded true in the success path and could never be false.
        Callers that checked WasTracked were reading a constant.
      definition: |
        type RemoveData struct {
            RemovedPath string
        }
      location: pkg/worktree/manager.go
    - name: Manager (concurrency comment)
      description: |
        Bug 5 fix: add doc comment noting the Manager is not safe for
        concurrent use, since m.active is an unsynchronized map.
      definition: |
        // Manager tracks and manages git worktrees for SAW wave agents.
        // Manager is not safe for concurrent use.
        type Manager struct { ... }
      location: pkg/worktree/manager.go
    - name: Manager.Create
      description: |
        Bug 4 fix: add os.Stat pre-check before calling git.WorktreeAdd.
        If the computed worktree path already exists on disk, return a
        clear diagnostic error instead of letting git.WorktreeAdd surface
        a raw git error.
      definition: |
        func (m *Manager) Create(wave int, agent string) (string, error)
        // Pre-check: if wtPath already exists, return:
        // fmt.Errorf("manager: worktree path %q already exists; remove it
        //   or use a different wave/agent combination before retrying: %w", wtPath, err)
      location: pkg/worktree/manager.go
    - name: Manager.List
      description: |
        Bug 3 fix: sort output slice before returning so callers receive a
        deterministic ordering.
      definition: |
        func (m *Manager) List() []string
        // Returns paths sorted with sort.Strings before return.
      location: pkg/worktree/manager.go
    - name: Manager.CleanupAll
      description: |
        Bug 2 fix: replace the Fatal->Warning->Fatal double conversion with
        a simple []string of failed paths. Build the final error slice once
        at the end using result.NewFatal directly (no intermediate Warning).
        Bug 3 fix: sort RemovedPaths before returning inside CleanupData.
      definition: |
        func (m *Manager) CleanupAll() result.Result[CleanupData]
        // Internal change: replace []result.SAWError warnings accumulator
        // with []string failedPaths. At the end, if len(failedPaths) > 0,
        // build []result.SAWError from failedPaths in one pass.
        // Sort removedPaths with sort.Strings before populating CleanupData.
      location: pkg/worktree/manager.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            Fix 5 known bugs in `pkg/worktree/manager.go` and update the
            corresponding test file `pkg/worktree/manager_test.go`.

            Repo root: `/Users/dayna.blackwell/workspace/code/scout-and-wave-go`

            ## Files to modify

            - `pkg/worktree/manager.go`
            - `pkg/worktree/manager_test.go`

            ## Bug fixes (implement all 5)

            ### Bug 1 — Remove WasTracked from RemoveData (Medium)

            In `RemoveData`, the `WasTracked bool` field is hardcoded to `true`
            in every code path that reaches `result.NewSuccess(RemoveData{...})`.
            The field can never be `false` so it is semantically meaningless.

            **Fix in manager.go:**
            - Remove `WasTracked bool` from the `RemoveData` struct.
            - Update the `result.NewSuccess(RemoveData{...})` call in `Remove()`
              to only populate `RemovedPath`.

            **Fix in manager_test.go:**
            - Remove the assertion block at lines 83-85:
              ```go
              if !data.WasTracked {
                  t.Error("RemoveData.WasTracked should be true")
              }
              ```
              This assertion was testing a constant and is no longer meaningful.

            ### Bug 2 — Eliminate double error conversion in CleanupAll (Medium)

            In `CleanupAll()`, failed removals go Fatal → Warning → Fatal:
            1. `m.Remove(path)` returns a Fatal result with `result.NewFatal(...)` errors.
            2. The loop converts each Fatal error to `result.NewWarning(...)` to collect it.
            3. Later, when all removals fail, the code converts those Warnings back to
               `result.NewFatal(...)` errors.

            **Fix:** Replace the `var warnings []result.SAWError` accumulator with a
            `var failedPaths []string`. On each failed removal, append the path to
            `failedPaths` and log the warning (as already done). At the end of the
            function, if `len(failedPaths) > 0`, build the `[]result.SAWError` from
            `failedPaths` in a single pass using `result.NewFatal(...)` directly —
            no intermediate Warning conversion.

            The three return branches (Success / Partial / Fatal) remain; only the
            accumulation mechanism changes. For the Partial case, pass the Fatal errors
            directly to `result.NewPartial(data, errs)`.

            Preserve the existing `m.log().Warn(...)` call for each failed path.

            ### Bug 3 — Sort List() and CleanupAll RemovedPaths (Low)

            Both `List()` and the `removedPaths` slice in `CleanupAll()` iterate over
            `m.active` (a `map[string]string`), producing non-deterministic order.

            **Fix in List():** Add `sort.Strings(paths)` immediately before `return paths`.

            **Fix in CleanupAll():** Add `sort.Strings(removedPaths)` immediately before
            populating `CleanupData.RemovedPaths`.

            Add `"sort"` to the import block if not already present.

            ### Bug 4 — Clear diagnostic on duplicate worktree path (Low)

            In `Create()`, if the computed worktree path already exists on disk,
            `git.WorktreeAdd` returns a raw git error message that gives no guidance
            to the caller.

            **Fix:** After computing `wtPath` (line 71 in current source), add:

            ```go
            if _, err := os.Stat(wtPath); err == nil {
                return "", fmt.Errorf("manager: worktree path %q already exists; "+
                    "remove it or use a different wave/agent combination before retrying", wtPath)
            }
            ```

            Place this check after `os.MkdirAll(wtDir, ...)` succeeds and before
            `git.WorktreeAdd(...)` is called.

            No test change required for Bug 4 (the existing integration test exercises
            a clean path; a dedicated duplicate-path test is not required by this task).

            ### Bug 5 — Document concurrency safety on Manager struct (Low)

            The `m.active` map has no mutex and the Manager doc comment does not warn
            callers.

            **Fix:** Change the `Manager` struct doc comment from:
            ```go
            // Manager tracks and manages git worktrees for SAW wave agents.
            ```
            to:
            ```go
            // Manager tracks and manages git worktrees for SAW wave agents.
            // Manager is not safe for concurrent use.
            ```

            ## Verification gate

            Run from the repo root:

            ```
            go build ./pkg/worktree/...
            go vet ./pkg/worktree/...
            go test ./pkg/worktree/...
            ```

            All three commands must pass with no errors before marking complete.

            ## Constraints

            - Do NOT change any exported function signatures (other than `RemoveData`
              struct field removal, which is a breaking change intentionally called out
              in Bug 1).
            - Do NOT introduce new dependencies beyond `"sort"` (already in stdlib).
            - Do NOT add new test functions; only remove/update the WasTracked assertion
              per Bug 1 and ensure existing tests continue to pass.
          files:
            - pkg/worktree/manager.go
            - pkg/worktree/manager_test.go
          context_source: prepared-brief
