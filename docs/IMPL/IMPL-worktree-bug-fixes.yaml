            RemoveData.WasTracked removal is a breaking API change. If any caller
            outside pkg/worktree references data.WasTracked, the build will fail.
          likelihood: low
          impact: high
          mitigation: |
            Run `grep -r "WasTracked" /Users/dayna.blackwell/workspace/code/scout-and-wave-go`
            before finalizing. If external callers exist, the agent must also update
            those call sites. A quick grep at time of writing shows only manager.go
            and manager_test.go reference WasTracked.
        - scenario: |
            sort import already present (unlikely for this package) causing a
            duplicate import compile error.
          likelihood: low
          impact: low
          mitigation: |
            The agent checks the existing import block before adding "sort".
            The current import block (fmt, log/slog, os, path/filepath, three
            external imports) does not include sort, so no conflict expected.
        - scenario: |
            TestCleanupAllPartial at manager_test.go:197 asserts
            `data.RemovedPaths[0] == wt1` by index. After Bug 3's sort fix,
            the single-element slice still has index 0, so no test breakage.
            If the test had 2+ elements indexed by position, the sort would
            break the assertion — but the partial test only checks one removed
            path by name in a set, not by position.
          likelihood: low
          impact: low
          mitigation: |
            Line 197 asserts `data.RemovedPaths[0] != wt1` only when
            len == 1, which is safe. No mitigation needed beyond awareness.
