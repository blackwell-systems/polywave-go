interface_contracts:
  - name: RunScoutOpts.Logger
    description: |
      Logger field added to RunScoutOpts. Callers in cmd/sawtools set this;
      pkg/engine/runner.go reads it and passes down.
    definition: |
      // In pkg/engine/engine.go
      type RunScoutOpts struct {
          // ... existing fields unchanged ...
          ObsEmitter *observability.Emitter  // already present
          Logger     *slog.Logger            // NEW: nil falls back to slog.Default()
      }
    location: pkg/engine/engine.go

  - name: FinalizeWaveOpts.Logger
    description: Logger field added to FinalizeWaveOpts.
    definition: |
      // In pkg/engine/finalize.go
      type FinalizeWaveOpts struct {
          // ... existing fields unchanged ...
          ObsEmitter *observability.Emitter  // already present
          Logger     *slog.Logger            // NEW
      }
    location: pkg/engine/finalize.go

  - name: RunWaveTransactionOpts.Logger
    description: Logger field added to RunWaveTransactionOpts.
    definition: |
      // In pkg/engine/run_wave_atomic.go
      type RunWaveTransactionOpts struct {
          // ... existing fields unchanged ...
          ObsEmitter *observability.Emitter  // already present
          Logger     *slog.Logger            // NEW
      }
    location: pkg/engine/run_wave_atomic.go

  - name: RunIntegrationAgentOpts.Logger
    description: Logger field added to RunIntegrationAgentOpts.
    definition: |
      // In pkg/engine/integration_runner.go
      type RunIntegrationAgentOpts struct {
          // ... existing fields unchanged ...
          Logger *slog.Logger  // NEW
      }
    location: pkg/engine/integration_runner.go

  - name: Orchestrator.SetLogger
    description: |
      New setter method on Orchestrator that stores a *slog.Logger for use by
      all orchestrator methods. Mirrors SetDefaultModel and SetWorktreePaths patterns.
    definition: |
      // In pkg/orchestrator/orchestrator.go — add field to struct:
      type Orchestrator struct {
          // ... existing fields unchanged ...
          logger *slog.Logger  // NEW: set via SetLogger; nil = slog.Default()
      }

      // In pkg/orchestrator/setters.go (or orchestrator.go):
      func (o *Orchestrator) SetLogger(logger *slog.Logger) {
          o.logger = logger
      }

      // Helper used internally — resolves nil to slog.Default():
      func (o *Orchestrator) log() *slog.Logger {
          if o.logger == nil {
              return slog.Default()
          }
          return o.logger
      }
    location: pkg/orchestrator/orchestrator.go

  - name: loggerFromOpts
    description: |
      Package-internal helper for engine packages that receive Logger via opts struct.
      Returns slog.Default() when Logger field is nil. Used by runner.go, finalize.go, etc.
    definition: |
      // In each pkg/engine/*.go file that needs it (not a shared helper — inline pattern):
      func loggerFrom(l *slog.Logger) *slog.Logger {
          if l == nil {
              return slog.Default()
          }
          return l
      }
    location: pkg/engine/runner.go

  - name: newSawLogger
    description: |
      Constructor for the slog.Logger used in cmd/sawtools entry points.
      Reads SAW_LOG_LEVEL env var; defaults to WARN level to keep CLI output clean.
    definition: |
      // In cmd/sawtools/ (e.g. root command setup or shared logger.go helper):
      func newSawLogger() *slog.Logger {
          level := slog.LevelWarn
          if v := os.Getenv("SAW_LOG_LEVEL"); v != "" {
              var l slog.Level
              if err := l.UnmarshalText([]byte(v)); err == nil {
                  level = l
              }
          }
          return slog.New(slog.NewTextHandler(os.Stderr, &slog.HandlerOptions{
              Level: level,
          }))
      }
    location: cmd/sawtools/

