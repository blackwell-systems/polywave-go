      - id: F
        task: |
          ## Agent F — Wire slog.Logger in cmd/sawtools entry points

          ### Context
          Read `/Users/dayna.blackwell/code/scout-and-wave-go/docs/planning/logging-architecture.md`
          in full before starting.

          The architecture doc states: "Call sites in cmd/sawtools construct the logger once
          at startup and pass it down." This agent wires the logger into the 4 highest-traffic
          cmd/sawtools commands. Do not add logger wiring to every cmd file — focus on the
          commands that call FinalizeWave, RunWaveTransaction, and Orchestrator.

          ### What to implement

          **Step 1 — Create logger constructor.**
          In `cmd/sawtools/` create a small helper (inline in an existing root/shared file, or
          add to `cmd/sawtools/logger.go` as a new file):
          ```go
          // newSawLogger constructs the slog.Logger for CLI commands.
          // Level is controlled by SAW_LOG_LEVEL env var (default: WARN).
          func newSawLogger() *slog.Logger {
              level := slog.LevelWarn
              if v := os.Getenv("SAW_LOG_LEVEL"); v != "" {
                  var l slog.Level
                  if err := l.UnmarshalText([]byte(v)); err == nil {
                      level = l
                  }
              }
              return slog.New(slog.NewTextHandler(os.Stderr, &slog.HandlerOptions{
                  Level: level,
              }))
          }
          ```

          **Step 2 — Wire into prepare_wave.go.**
          Find where `FinalizeWaveOpts` or `RunWaveTransactionOpts` are constructed.
          Add `Logger: newSawLogger()` to the opts struct literal.

          **Step 3 — Wire into finalize_wave.go.**
          Same pattern — find opts struct construction, add `Logger: newSawLogger()`.

          **Step 4 — Wire into close_impl_cmd.go.**
