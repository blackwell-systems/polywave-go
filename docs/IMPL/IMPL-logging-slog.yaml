          ## Agent C — Migrate fmt.Fprintf calls in pkg/orchestrator merge/stubs/journal files

          ### Context
          Read `/Users/dayna.blackwell/code/scout-and-wave-go/docs/planning/logging-architecture.md`
          in full before starting.

          Wave 1 Agent B added `o.logger` field and `o.log()` helper to the `Orchestrator`
