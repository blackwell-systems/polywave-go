          ### Context
          Read `/Users/dayna.blackwell/code/scout-and-wave-go/docs/planning/logging-architecture.md`
          in full before starting. This is the authoritative design document.

          ### What to implement
          Add `Logger *slog.Logger` to the following opts structs in `pkg/engine/`:

          **pkg/engine/engine.go** — add to these structs:
          - `RunScoutOpts` (already has `ObsEmitter *observability.Emitter` — add Logger after it)
          - `RunWaveOpts`
          - `RunMergeOpts`
          - `FinalizeWaveOpts` (in finalize.go — see below)
          - `MarkIMPLCompleteOpts` (in finalize.go)
          - `ResolveConflictsOpts`
          - `FixBuildOpts`

          **pkg/engine/finalize.go** — add to:
          - `FinalizeWaveOpts`
          - `MarkIMPLCompleteOpts`

          **pkg/engine/run_wave_atomic.go** — add to:
          - `RunWaveTransactionOpts` (already has `ObsEmitter`)

          **pkg/engine/runner.go** — in the runner functions that use `RunScoutOpts`,
          `RunWaveOpts`, etc., add a local `logger := loggerFrom(opts.Logger)` pattern
          and replace the Category 3/4 `fmt.Fprintf(os.Stderr, ...)` calls (8 calls)
          with `logger.Warn(...)` or `logger.Debug(...)` as appropriate:
          - scaffold build non-fatal errors → `logger.Warn(...)`
          - `scaffold build verification: unrecognized project type` → `logger.Debug(...)`
          - `engine.RunSingleAgent: retry context (best-effort)` → `logger.Debug(...)`
          - `engine: E18 UpdateContextMD failed` → `logger.Warn(...)`
          - `engine: failed to archive journal for agent` → `logger.Warn(...)`
          - `engine.RunScout: failed to parse PROGRAM manifest` → `logger.Warn(...)`

          **pkg/engine/integration_runner.go** — add `Logger *slog.Logger` to
          `RunIntegrationAgentOpts` and replace the 1 Fprintf call.

          ### Logger nil-safety pattern
          Add this inline helper to each file that needs it (NOT a shared file —
          avoids cross-agent conflict):
          ```go
          func loggerFrom(l *slog.Logger) *slog.Logger {
              if l == nil {
                  return slog.Default()
              }
              return l
          }
          ```

          ### Import to add
          ```go
          "log/slog"
          ```
          No third-party packages. stdlib only.

          ### Do NOT touch
          - `pkg/observability/emitter.go` — leave its one Fprintf call alone
          - `cmd/sawtools/` files — Agent F handles those
          - Any `_test.go` file unless tests directly reference the opts struct fields

          ### Verification gate
