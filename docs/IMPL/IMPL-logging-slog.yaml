title: 'Structured Logging via slog.Logger Injection'
feature_slug: logging-slog
verdict: SUITABLE
suitability_assessment: |
  The feature is well-scoped for parallel execution. The architecture doc is authoritative
  and complete, specifying exact migration priorities and which ~150 calls to convert.
  File decomposition is clean: engine opts structs, orchestrator struct, protocol package,
  and secondary packages (worktree, journal, resume, bedrock) are all disjoint. The
  Orchestrator struct adds a Logger field via its constructor/setter — no opts overlap
  with engine files. cmd/sawtools wiring is a separate layer. Migration is incremental
  by design (architecture doc explicitly says all 282 calls need not be converted at once).

  Wave structure: 3 waves.
  - Wave 1: Add Logger field to engine opts structs (engine.go, finalize.go,
    run_wave_atomic.go, runner.go, finalize.go, integration_runner.go) and add
    Logger field + setter to Orchestrator struct (orchestrator.go). These are
    parallel because engine opts and orchestrator struct are in different files/packages.
  - Wave 2: Migrate fmt.Fprintf calls to slog in pkg/orchestrator/ (merge.go,
    stubs.go, journal_integration.go, orchestrator.go) and pkg/protocol/
    (worktree.go, merge_agents.go, program_worktree.go, gates.go) — these packages
    receive Logger via the fields added in Wave 1.
  - Wave 3: Migrate secondary packages (pkg/engine/runner.go category-3/4 calls,
    pkg/worktree/manager.go, pkg/journal/observer.go, pkg/resume/worktree_status.go,
    pkg/agent/backend/bedrock/client.go) and wire the logger construction in
    cmd/sawtools/ entry points.

  Parallelization value: High. Build+test cycle is `go test ./...` which takes 30s+
  on a full suite. Wave 1 has 2 parallel agents with 3-5 files each. Wave 2 has 2
  parallel agents covering ~38 calls. Wave 3 has 2 parallel agents.

  Estimated times:
  - Scout phase: ~15 min
  - Agent execution: ~6 agents x ~10 min avg with Wave 1+2 parallel = ~30 min total
  - Merge and verification: ~5 min
  Total SAW time: ~50 min
  Sequential baseline: ~60 min
  Recommendation: Clear speedup with clean parallelism boundaries.
test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

