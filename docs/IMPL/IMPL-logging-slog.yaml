        task: |
          ## Agent D — Migrate fmt.Fprintf calls in pkg/protocol (Priority 3)

          ### Context
          Read `/Users/dayna.blackwell/code/scout-and-wave-go/docs/planning/logging-architecture.md`
          in full before starting.

          The architecture doc identifies `pkg/protocol` as the clearest layering violations
          — protocol is a pure library that should never write to stderr. These 13 calls are
          the highest-harm category.

          ### Files and call counts
          - `pkg/protocol/worktree.go` — 8 calls
          - `pkg/protocol/merge_agents.go` — 2 calls
          - `pkg/protocol/program_worktree.go` — 2 calls
          - `pkg/protocol/gates.go` — 1 call

          ### How to inject the logger
          **IMPORTANT: Prefer slog.Default() over signature changes.** Protocol functions
          are called from many places including files not assigned to any agent in this
          IMPL (e.g., pkg/engine/daemon.go, cmd/sawtools/create_worktrees.go). Adding a
          logger parameter to a function signature will break all unassigned callers.

          For each function with Fprintf calls:
          - **First choice:** Call `slog.Default()` directly inside the function body.
            No signature change, no caller updates needed. Example:
            `slog.Default().Warn("protocol: failed to install hooks", "agent", agentID)`
          - **Second choice (only if the function already has an opts struct):** Add
            `Logger *slog.Logger` to that opts struct. Callers passing nil get the
            fallback via: `if logger == nil { logger = slog.Default() }`
          - **Do NOT** add logger parameters to plain function signatures.

          Also check `pkg/protocol/cleanup.go` line 183 for `log.Printf(...)` — the
          architecture doc says to convert this to `slog.Warn(...)` in the Priority 3 pass.

          ### Classification
          - `Warning: failed to install hooks for agent %s` → `logger.Warn("protocol: failed to install hooks", "agent", agentID, "err", err)`
          - `warning: failed to save merge-log` → `logger.Warn(...)`
          - Gate skipped/cached messages → `logger.Debug(...)`
          - All "Warning:" prefixed lines → Warn level

          ### Do NOT touch
          - `pkg/protocol/cleanup.go` `log.Printf` if it is not the one mentioned — only
            convert the one at line 183
          - Any engine or orchestrator files

          ### Verification gate
          ```
          go build ./pkg/protocol/...
          go vet ./pkg/protocol/...
          go test ./pkg/protocol/...
