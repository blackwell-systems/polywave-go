          through the Orchestrator). Prefer adding a logger parameter to any function that
          has more than 1 Fprintf call.

          ### Files and call counts
          - `pkg/orchestrator/merge.go` — 10 calls, all warnings about merge state
          - `pkg/orchestrator/stubs.go` — 4 calls
          - `pkg/orchestrator/journal_integration.go` — 1 call

          ### Migration rules (from architecture doc)
          - Category 3 internal warnings → `logger.Warn("msg", "key", val, ...)`
          - Category 4 debug traces → `logger.Debug("msg", "key", val, ...)`
          - Category 1 (already covered by Emitter) → simply remove the Fprintf
          - Category 2 CLI progress → leave as `fmt.Fprintf(os.Stderr, ...)` — DO NOT migrate

          ### Key calls to classify:
          - `executeMergeWave: agent %s already merged (skipping verification)` → Debug
          - `executeMergeWave: all agents already merged for wave %d` → Debug
          - `executeMergeWave: agent %s already merged (skipping)` → Debug
          - `executeMergeWave: agent %s produced no changes (skipping merge)` → Debug
          - `executeMergeWave: warning: failed to save merge-log` → Warn
          - `executeMergeWave: warning: could not remove worktree` → Warn
          - `executeMergeWave: warning: could not delete branch` → Warn

          ### slog call style
          Use structured key-value pairs, not format strings:
          ```go
          // Before:
          fmt.Fprintf(os.Stderr, "executeMergeWave: warning: failed to save merge-log: %v\n", saveErr)
          // After:
          logger.Warn("executeMergeWave: failed to save merge-log", "err", saveErr)
          ```

          ### Import changes
          Remove `"os"` if it is no longer used after migration (check — os may still be
          used for other things). Add `"log/slog"` if not already present.

          ### Do NOT touch
          - `pkg/orchestrator/orchestrator.go` — owned by Agent B (Wave 1)
          - Any engine or protocol files

          ### Verification gate
          ```
          go build ./pkg/orchestrator/...
          go vet ./pkg/orchestrator/...
          go test ./pkg/orchestrator/...
          ```

        files:
          - pkg/orchestrator/merge.go
          - pkg/orchestrator/stubs.go
          - pkg/orchestrator/journal_integration.go
        dependencies: [B]

