pre_mortem:
  overall_risk: medium
  rows:
    - scenario: >
        Protocol package functions (pkg/protocol/) have complex signatures without opts structs.
        Agent D may need to add logger parameters to many function signatures, which cascades
        to all callers in pkg/engine/ (already merged by Wave 1). This could cause compile
        errors in Wave 2.
      likelihood: medium
      impact: high
      mitigation: >
        Agent D should prefer adding a logger to existing opts structs where they exist, and
        use slog.Default() directly (without injection) for standalone functions with many
        callers. The architecture doc explicitly allows incremental migration — Agent D does
        not need to plumb the logger all the way through on first pass.

    - scenario: >
        pkg/orchestrator/merge.go, stubs.go functions are package-level (not Orchestrator
        methods) so Agent C cannot use o.log(). Agent C may use slog.Default() directly,
        which partially defeats injection.
      likelihood: high
      impact: low
      mitigation: >
        This is acceptable per the architecture doc. The primary goal is leveled/filterable
        logging. slog.Default() is controllable at the binary level via slog.SetDefault().
        Full injection into these functions is a follow-up task.

    - scenario: >
        Wave 3 agents E and F modify different files but both touch pkg/engine/ (E touches
        run_wave_full.go, F does not touch engine). No ownership conflict — but if Agent E's
        changes to run_wave_full.go break the build, Agent F's cmd/sawtools changes that
        import engine will also fail.
      likelihood: low
      impact: medium
      mitigation: >
        Agent E's task in run_wave_full.go is minimal (add one Logger field to opts struct).
        This cannot break callers since new fields default to nil and the nil-safe pattern
        falls back to slog.Default().

    - scenario: >
        cmd/sawtools has many more commands than the 4 assigned to Agent F. The other
        commands will still pass nil Logger to engine opts structs, which is safe (nil
        fallback to slog.Default()) but means those commands don't benefit from
        SAW_LOG_LEVEL filtering.
      likelihood: high
      impact: low
      mitigation: >
        This is intentional incremental migration. The architecture doc does not require
        all 282 calls converted in one wave. Remaining cmd/sawtools wiring is a follow-up.

    - scenario: >
        scout-and-wave-web constructs engine opts structs in 8+ locations
        (cmd/saw/commands.go, pkg/api/wave_runner.go, pkg/service/scout_service.go,
        pkg/service/wave_service.go, etc.). These will pass nil Logger after Wave 1.
      likelihood: high
      impact: low
      mitigation: >
        Out of scope for this IMPL. Nil Logger falls back to slog.Default() safely.
        Web app logger wiring is a follow-up task after this IMPL merges.

    - scenario: >
        go vet may flag unused import of "os" in pkg files after Fprintf calls are removed
