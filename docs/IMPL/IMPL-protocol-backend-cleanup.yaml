              `wrapped` `result.SAWError` that is already constructed:
              ```go
              // Before:
              state.Errors = append(state.Errors, fmt.Errorf("step %q: %s", step.Name, e.Message))
              warnings = append(warnings, wrapped)

              // After:
              warnings = append(warnings, wrapped)
              state.Errors = append(state.Errors, wrapped)
              ```

            In `pkg/pipeline/saw_steps.go`, check the `shouldRun` helper (called from `pipeline.go`
            via `shouldRun(step.Condition, state)`): it uses `len(state.Errors)` as a boolean. This
