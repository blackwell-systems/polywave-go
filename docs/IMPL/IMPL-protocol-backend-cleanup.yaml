title: Protocol + Backend Cleanup (IMPL 5)
feature_slug: protocol-backend-cleanup
verdict: SUITABLE
suitability_assessment: |-
    Five-issue cleanup batch. All issues are independent of the ctx decision (IMPL 4).

    File decomposition: Agent A owns backend subpackages (api/, bedrock/, openai/, cli/);
    Agent B owns protocol and pipeline files (branchname.go, types.go, pipeline/). Ownership
    is fully disjoint — no file appears in both lists.

    Interface discoverability: Both interface contracts (shared executeTool signature,
    resolveAgentBranch signature) can be determined by reading the three existing
    implementations before wave launch. The signatures are identical for executeTool
    across api/ and bedrock/ (same parameters, same return type), and the OpenAI execTool
    differs only by collapsing the isError bool into an error return — the shared version
    adopts the (string, bool) form used by the two Anthropic backends. resolveAgentBranch
    is derivable from the five duplicate call sites.

    Issue 16 is Critical: the ScaffoldFile YAML/JSON tag mismatch (`yaml:"file"` vs
    `json:"file_path"`) causes silent data loss on any YAML<->JSON roundtrip. This must
    be fixed before any further tool work that reads ScaffoldFile via JSON.

    Issue 22 is Low severity but mechanically simple: changing State.Errors from []error
    to []result.SAWError. The pipeline.go file already imports result and uses SAWError
    internally — this is a straightforward field type change.

    Parallelization value: High. Both agents have non-trivial logic (especially Agent A's
    CLI post-hoc enforcement pass) and independent file sets. Build/test cycle is
    `go test ./...` which takes 20-30s on this repo.

    Estimated times:
    - Scout phase: ~15 min (reading 10+ source files, deriving signatures)
    - Agent execution: ~25 min (A: ~20 min for shared executeTool + enforcement pass;
      B: ~15 min for tag fix + roundtrip test + resolveAgentBranch + pipeline type)
    - Merge and verification: ~5 min
    Total SAW time: ~45 min

    Sequential baseline: ~50 min (both agents sequentially)
    Time savings: ~5 min (10% faster — value is primarily coordination and audit trail)

    Recommendation: Proceed. Parallelization benefit is marginal for speed but the IMPL
    doc provides useful coordination and documents the interface contracts.
