interface_contracts:
    - name: ExecuteTool
      description: |-
        Shared backend helper that looks up a tool by name in the Workshop and executes it.
        Replaces the three near-identical private functions in api/client.go, bedrock/tools.go,
        and openai/client.go. The (string, bool) return form is used by the two Anthropic
        backends; the OpenAI execTool's single-string return is replaced by this signature.
      definition: |-
        // ExecuteTool looks up and executes a tool from the Workshop.
        // Returns (resultString, isError). isError is true when tool lookup fails or
        // execution returns an error; in that case resultString contains the error message.
        func ExecuteTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, bool)
      location: pkg/agent/backend/execute_tool.go
    - name: resolveAgentBranch
      description: |-
        Shared protocol helper that encapsulates the dual-lookup pattern: try the
        slug-scoped branch name first, then fall back to the legacy branch name for
        backward compatibility. Used by merge_agents.go, commit_verify.go, worktree.go,
        cleanup.go, and completion_validator.go.
      definition: |-
        // resolveAgentBranch returns the active branch name for the given agent by checking
        // whether the slug-scoped branch exists in repoDir; if not, falls back to the
        // legacy branch name. isLegacy is true when the legacy fallback was used.
        // If neither branch exists, branchName is the slug-scoped form and isLegacy is false.
        func resolveAgentBranch(featureSlug, agentID string, waveNum int, repoDir string) (branchName string, isLegacy bool)
      location: pkg/protocol/branchname.go
