            ## Wave 1 Agent A: Backend cleanup — shared executeTool + CLI constraint enforcement

            You are Wave 1 Agent A. Your task has two parts:
            (1) Extract the duplicated `executeTool` function into a shared backend package.
            (2) Implement post-hoc constraint enforcement in the CLI backend (Issue 8, Choice A).

            ## 0. CRITICAL: Isolation Verification (RUN FIRST)

            Run the standard isolation check for wave1-agent-A before any file modifications.
            Verify you are in the correct worktree and on branch `saw/protocol-backend-cleanup/wave1-agent-A`.

            ## 1. File Ownership

            You own these files. Do not touch any other files.
            - `pkg/agent/backend/execute_tool.go` — create (shared executeTool function)
            - `pkg/agent/backend/api/client.go` — modify (remove local executeTool, import shared)
            - `pkg/agent/backend/bedrock/tools.go` — modify (remove local executeTool, import shared)
            - `pkg/agent/backend/openai/client.go` — modify (rename execTool callsites, import shared)
            - `pkg/agent/backend/cli/client.go` — modify (plumb Constraints; add enforcement call)
            - `pkg/agent/backend/cli/constraint_enforcer.go` — create (post-hoc enforcement pass)
            - `pkg/agent/backend/cli/constraint_enforcer_test.go` — create (tests for enforcement pass)

            ## 2. Interfaces You Must Implement

            ```go
            // In pkg/agent/backend/execute_tool.go (package backend):
            //
            // ExecuteTool looks up and executes a tool from the Workshop.
            // Returns (resultString, isError). isError is true when tool lookup fails
            // or execution returns an error; in that case resultString contains the error message.
            func ExecuteTool(ctx context.Context, workshop tools.Workshop, name string, input map[string]interface{}, workDir string) (string, bool)
            ```

            ```go
            // In pkg/agent/backend/cli/constraint_enforcer.go (package cli):
            //
            // CheckConstraints inspects the accumulated tool-use events recorded during
            // a CLI backend run and reports any violations of I1/I2/I6 constraints.
            // Returns a slice of violation descriptions; empty slice means no violations.
            // This is a post-hoc pass: it cannot prevent writes, only detect them.
            func CheckConstraints(events []ToolUseEvent, constraints *tools.Constraints) []ConstraintViolation

            type ToolUseEvent struct {
                ToolName string
                FilePath string // extracted from Write/Edit input; empty for Bash/Read/Glob/Grep
            }

            type ConstraintViolation struct {
                ToolName  string
                FilePath  string
                Invariant string // "I1", "I2", or "I6"
                Message   string
            }
            ```

            ## 3. Interfaces You May Call

            ```go
            // Existing constraint field on tools.Constraints:
            tools.Constraints{
                OwnedFiles         map[string]bool
                FrozenPaths        map[string]bool
                FreezeTime         *time.Time
                AllowedPathPrefixes []string
                AgentID            string
                AgentRole          string
            }

            // Existing backend.Config already carries Constraints:
            type Config struct {
                // ...
                Constraints *tools.Constraints
            }

            // Existing extractToolInput in cli/client.go (already in your owned file):
            func extractToolInput(name string, inputRaw json.RawMessage) string
            ```

            ## 4. What to Implement

            ### Part 1: Shared executeTool (Issue 7)

            Read the three existing implementations:
            - `pkg/agent/backend/api/client.go:173` — `executeTool(ctx, workshop, name, input, workDir) (string, bool)`
            - `pkg/agent/backend/bedrock/tools.go:27` — identical to api version
            - `pkg/agent/backend/openai/client.go:120` — `execTool(ctx, workshop, name, inputMap, workDir) string`

            Create `pkg/agent/backend/execute_tool.go` in `package backend` with the exported
            `ExecuteTool(ctx, workshop, name, input, workDir) (string, bool)` function. The body
            is identical to the api/bedrock versions.

            In `api/client.go`: delete the private `executeTool` function and replace the two
            call sites with `backend.ExecuteTool(...)`.

            In `bedrock/tools.go`: delete the private `executeTool` function and replace call
            sites with `backend.ExecuteTool(...)`.

            In `openai/client.go`: delete the private `execTool` function. Replace its call
            sites with `backend.ExecuteTool(...)`. Note that `execTool` returned only `string`
            (no isError bool); callers must be updated to handle the `(string, bool)` return.
            Check `openai/client.go` for how `execTool`'s return was used and adapt accordingly:
            if the OpenAI loop used the string result as the tool content and treated any non-empty
            result as success, use `result, _ := backend.ExecuteTool(...)` or restructure to use
            the isError bool for content-mode error reporting.

            ### Part 2: CLI backend post-hoc constraint enforcement (Issue 8, Choice A)

            Background: The CLI backend (`cli/client.go`) uses `--output-format stream-json` and
            already parses `tool_use` content blocks via `extractToolInput`. It does NOT currently
            apply `pkg/tools` constraint enforcement (I1/I2/I6) that the API and Bedrock backends
            apply via `tools.WithConstraints`. The chosen fix (Decision 2 — Choice A) is post-hoc
            enforcement: after the subprocess completes, inspect recorded Write/Edit invocations
            against the constraint rules. Post-hoc means the write already happened; enforcement
            detects and reports violations so the wave result is marked as blocked.

            Implementation steps:

            1. **Add event recording to `RunStreamingWithTools`** in `cli/client.go`. When parsing
               `tool_use` content blocks, if the tool is `Write` or `Edit`, record a `ToolUseEvent`
               with `ToolName` and `FilePath` (use the existing `extractToolInput` call which already
               extracts `file_path` for Write/Edit). Store events in a local slice.

            2. **After `cmd.Wait()` succeeds**, if `c.cfg.Constraints != nil`, call
               `CheckConstraints(events, c.cfg.Constraints)`. If any violations are returned,
               return an error wrapping all violation messages so the engine marks the run as failed.

            3. **Create `pkg/agent/backend/cli/constraint_enforcer.go`** with the `CheckConstraints`
               function, `ToolUseEvent` struct, and `ConstraintViolation` struct.
               Enforcement logic:
               - **I1 (ownership)**: if `constraints.OwnedFiles` is non-empty and
                 `!constraints.OwnedFiles[event.FilePath]`, emit an I1 violation.
               - **I2 (freeze)**: if `constraints.FrozenPaths[event.FilePath] && constraints.FreezeTime != nil`,
                 emit an I2 violation.
               - **I6 (role path)**: if `constraints.AllowedPathPrefixes` is non-empty and no prefix
                 matches `event.FilePath`, emit an I6 violation.
               Only check Write and Edit events (ToolName == "Write" or "Edit").
               Skip events with empty FilePath.

            4. **Update `RunStreaming`** (non-tools variant) in `cli/client.go`: it does not parse
               tool_use events, so it cannot do post-hoc enforcement. Add a comment noting this
               limitation; no behavior change needed.

            5. The `Run` method delegates to `RunStreaming`, so it also has this limitation. Add
               the same comment there.

            ## 5. Tests to Write

            In `pkg/agent/backend/cli/constraint_enforcer_test.go`:

            1. `TestCheckConstraints_I1_OwnedFiles` — violation when Write targets a path not in OwnedFiles
            2. `TestCheckConstraints_I1_AllowedPath` — no violation when Write targets an owned path
            3. `TestCheckConstraints_I2_FrozenPath` — violation when Write targets a frozen path with non-nil FreezeTime
            4. `TestCheckConstraints_I2_NoFreezeTime` — no violation when FrozenPaths set but FreezeTime is nil
            5. `TestCheckConstraints_I6_RolePath` — violation when Write path doesn't match AllowedPathPrefixes
            6. `TestCheckConstraints_I6_Allowed` — no violation when Write path matches a prefix
            7. `TestCheckConstraints_SkipNonWriteTools` — Bash events with empty FilePath are skipped
            8. `TestCheckConstraints_NilConstraints` — CheckConstraints returns nil when constraints is nil

            ## 6. Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go/.claude/worktrees/saw/protocol-backend-cleanup/wave1-agent-A
            go build ./pkg/agent/backend/...
            go vet ./pkg/agent/backend/...
            go test ./pkg/agent/backend/...
            ```

            ## 7. Constraints

            - Do NOT modify `pkg/tools/constraint_enforcer.go` or `pkg/tools/workshop_constrained.go`.
              The post-hoc enforcement in the CLI package is independent of the middleware approach
              used by the API/Bedrock backends.
            - Do NOT modify any files outside `pkg/agent/backend/`. If you discover cascade changes
              needed (e.g., in engine callers of the CLI backend), report them in your completion
              report under `out_of_scope_deps`.
            - The `ExecuteTool` function in `execute_tool.go` must be in `package backend` (not a
              sub-package) so all three backends can import it without circular dependencies.
            - For the OpenAI `execTool` replacement: the OpenAI client uses tool calls via a
              different content structure, but the core lookup-and-execute logic is the same.
              If adapting the return type requires non-trivial changes to OpenAI-specific parsing,
              document those in the completion report.
            - Post-hoc enforcement cannot prevent writes from occurring. The error returned after
              constraint violations must be clearly labeled as post-hoc detection so callers know
              the writes already occurred.

            ## 8. Report

            Commit your changes and write a structured completion report appended to the IMPL doc
