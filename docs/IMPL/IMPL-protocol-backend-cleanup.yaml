            ## 4. What to Implement

            ### Part 1: Fix ScaffoldFile tag mismatch — CRITICAL (Issue 16)

            This is a data loss bug. In `pkg/protocol/types.go` around line 197:

            ```go
            type ScaffoldFile struct {
                FilePath   string `yaml:"file" json:"file_path"`
            ```

            The YAML tag is `"file"` but the JSON tag is `"file_path"`. Any YAML<->JSON
            roundtrip silently drops `FilePath` — YAML writes `file:` but JSON expects
            `file_path:`. Fix: align the YAML tag to `yaml:"file_path"` to match JSON and
            to match how `FilePath` is used in `scaffold_validation.go` and
            `integration_types.go` (both use `file_path`).

            After the fix, search for any test fixtures or YAML files that use the old
            `file:` field name for ScaffoldFile entries. Run:
            ```bash
            grep -r 'file:' /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/ --include="*.go" --include="*.yaml"
            grep -r 'file:' /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/ --include="*_test.go"
            ```
            If any test files construct `ScaffoldFile` with `file:` in YAML literals,
            update them to `file_path:`. (The field struct tag change does not affect
            Go struct literal construction — only marshaling/unmarshaling.)

            Create `pkg/protocol/types_test.go` with `TestScaffoldFileRoundtrip`:
            - Marshal a `ScaffoldFile{FilePath: "docs/IMPL/test.yaml", Contents: "body"}` to JSON.
            - Unmarshal the JSON as YAML. Assert `FilePath == "docs/IMPL/test.yaml"`.
            - Marshal the same struct to YAML. Unmarshal the YAML back to a ScaffoldFile. Assert FilePath is preserved.
            - Test the zero-value case: `ScaffoldFile{}` marshals and unmarshals without error.

            Use `encoding/json` and `gopkg.in/yaml.v3` (already a dependency in the module).

            ### Part 2: Extract resolveAgentBranch (Issue 17)

            The dual-lookup pattern (try slug-scoped branch, fall back to legacy) is duplicated in
            five files. Create `pkg/protocol/branchname.go` with the unexported `resolveAgentBranch`
            helper.

            Read the five existing duplicate implementations to confirm the pattern:
            - `pkg/protocol/merge_agents.go:290–332` (mergeAgentsSingleRepo uses BranchName + LegacyBranchName)
            - `pkg/protocol/commit_verify.go:185–205`
            - `pkg/protocol/worktree.go:148–172`
            - `pkg/protocol/cleanup.go:175–210`
            - `pkg/protocol/completion_validator.go:65–87`

            The shared helper:
            ```go
            func resolveAgentBranch(featureSlug, agentID string, waveNum int, repoDir string) (branchName string, isLegacy bool) {
                slug := BranchName(featureSlug, waveNum, agentID)
                if git.BranchExists(repoDir, slug) {
                    return slug, false
                }
                legacy := LegacyBranchName(waveNum, agentID)
                if git.BranchExists(repoDir, legacy) {
                    return legacy, true
                }
                return slug, false // neither exists; return slug-scoped form
            }
            ```

            Important: this helper is UNEXPORTED (`resolveAgentBranch`, lowercase r). The five
            files that use it are all in `package protocol`.

            After creating `branchname.go`, update the five files that duplicate the pattern to call
            `resolveAgentBranch` instead. However, those five files are NOT in your owned files list.
            This creates a tension: you define the helper, but refactoring the callers touches files
            you don't own.

            Resolution: Create `branchname.go` with `resolveAgentBranch` (your owned file). The
            caller refactoring (updating the five files) is out of scope for this wave. Document in
            your completion report under `out_of_scope_deps` that the five files should be updated
            in a follow-up pass to call `resolveAgentBranch`. This is the safe approach: the helper
            is additive (no existing behavior changes), and the five files continue to work as-is.

            ### Part 3: Change State.Errors to []result.SAWError (Issue 22)

