title: "Wire all dead code gaps from wiring audit"
feature_slug: wiring-gaps
verdict: SUITABLE
state: SCOUT_PENDING

suitability_assessment: |
  Suitability gate analysis:

  1. File decomposition: 8 gaps (C1/C8 skipped) touching 7+ distinct files across
     cmd/saw/ and pkg/engine/. Clear disjoint ownership possible — each gap maps to
     a different set of files. C7 (main.go) is the only shared file, handled in its
     own agent.

  2. Investigation-first items: None. Every gap has a known root cause (documented
     in wiring-audit.md) with specific function names, file paths, and fix strategies.
     No reproduction or debugging needed.

  3. Interface discoverability: Yes. All functions to wire already exist with stable
     signatures. No new interfaces needed — this is purely about calling existing code.

  4. Pre-implementation status: All 8 gaps confirmed as TODO per the audit. No partial
     implementations. C5 (AutoTriggerReplan) is already called from RunTierLoop when
     gate fails in auto mode — so C5 is DONE within the tier loop. However, standalone
     CLI triggering is still unwired. C3 and C10 are web-app integration points — we
     document the wiring need but actual web app changes are out of scope for this IMPL.

  5. Parallelization value: High. 8 independent wiring tasks across disjoint files.
     Go build+test cycle is 30+ seconds. Each agent touches 1-3 files. Most work is
     Wave 1 (independent). Clear speedup over sequential.

  Revised gap analysis after code review:
  - C2 (ClosedLoopGateRetry): Wire into finalize-wave per-agent gate failure path.
  - C3 (FinalizeIMPLEngine): Web-app only — note for follow-up, no code change here.
  - C4 (AdvanceTierAutomatically): Wire into finalize-tier CLI command.
  - C5 (AutoTriggerReplan): Already wired in RunTierLoop (line 216). Standalone CLI
    not needed — program-replan exists. Mark as DONE.
  - C6 (SyncProgramStatusFromDisk): Wire into program-status CLI command.
  - C7 (4 missing CLI commands): Add to main.go AddCommand list. Also wire
    pre-wave-gate into prepare-wave as a pre-flight check.
  - C9 (ScoutCorrectionLoop): Wire into run-scout command replacing direct RunScout call.
  - C10 (RunSingleWave/RunSingleAgent): Web-app integration — note for follow-up.
  - NewPoller: 0 callers, 0 tests. Candidate for deletion but out of scope (not a
    wiring gap, it's dead code cleanup). Note in known_issues.

  Estimated times:
  - Scout phase: ~8 min (dependency mapping, contract review)
  - Agent execution: ~12 min (5 agents x 5 min avg, 2 waves, good parallelism)
  - Merge and verification: ~4 min
  Total SAW time: ~24 min

  Sequential baseline: ~35 min (5 agents x 7 min avg)
  Time savings: ~11 min (31% faster)

  Recommendation: Clear speedup. Proceed.

