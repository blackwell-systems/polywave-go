interface_contracts:
    - name: result.Result[T]
      description: Generic Result wrapper for all operations
      definition: |
        type Result[T any] struct {
          Data   *T         `json:"data,omitempty"`
          Errors []SAWError `json:"errors,omitempty"`
          Code   string     `json:"code"` // "SUCCESS" | "PARTIAL" | "FATAL"
        }
      location: pkg/result/result.go
    - name: result.NewSuccess[T]
      description: Constructor for successful results
      definition: |
        func NewSuccess[T any](data T) Result[T] {
          return Result[T]{Data: &data, Code: "SUCCESS"}
        }
      location: pkg/result/result.go
    - name: result.NewPartial[T]
      description: Constructor for partial success with warnings
      definition: |
        func NewPartial[T any](data T, warnings []SAWError) Result[T] {
          return Result[T]{Data: &data, Errors: warnings, Code: "PARTIAL"}
        }
      location: pkg/result/result.go
    - name: result.NewFailure[T]
      description: Constructor for total failure
      definition: |
        func NewFailure[T any](errors []SAWError) Result[T] {
          return Result[T]{Errors: errors, Code: "FATAL"}
        }
      location: pkg/result/result.go
    - name: result.SAWError
      description: Structured error type with code, severity, context
      definition: |
        type SAWError struct {
          Code       string            `json:"code"`
          Message    string            `json:"message"`
          Severity   string            `json:"severity"` // "fatal"|"error"|"warning"|"info"
          File       string            `json:"file,omitempty"`
          Line       int               `json:"line,omitempty"`
          Field      string            `json:"field,omitempty"`
          Tool       string            `json:"tool,omitempty"`
          Suggestion string            `json:"suggestion,omitempty"`
          Context    map[string]string `json:"context,omitempty"`
          Cause      error             `json:"-"`
        }
      location: pkg/result/result.go
