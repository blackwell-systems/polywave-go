            **Role:** Migrate pkg/journal error-only returns to result.Result[T]

            **Files to modify:**
            - pkg/journal/checkpoint.go
            - pkg/journal/observer.go
            - pkg/journal/archive.go

            **What to implement:**

            Migrate 12 error-only functions to result.Result[T]:

            1. **checkpoint.go (4 functions):**
               - `Checkpoint(name string) error` → `Checkpoint(name string) result.Result[CheckpointData]`
               - `RestoreCheckpoint(name string) error` → `RestoreCheckpoint(name string) result.Result[RestoreData]`
               - `DeleteCheckpoint(name string) error` → `DeleteCheckpoint(name string) result.Result[DeleteData]`
               - `copyFileIfExists(src, dst string) error` → `copyFileIfExists(src, dst string) result.Result[CopyData]`

            2. **observer.go (3 functions):**
               - `saveCursor(*SessionCursor) error` → `saveCursor(*SessionCursor) result.Result[SaveCursorData]`
               - `appendToIndex([]ToolEntry) error` → `appendToIndex([]ToolEntry) result.Result[AppendData]`
               - `updateRecent([]ToolEntry) error` → `updateRecent([]ToolEntry) result.Result[UpdateData]`

            3. **archive.go (5 functions):**
               - `Archive() error` → `Archive() result.Result[ArchiveData]`
               - `CleanupExpired(string, int) error` → `CleanupExpired(string, int) result.Result[CleanupData]`
               - `Extract(string, string) error` → `Extract(string, string) result.Result[ExtractData]`
               - `createTarGz(string, string) error` → `createTarGz(string, string) result.Result[CreateTarData]`
               - `writeMetadataAtomic(string, ArchiveMetadata) error` → `writeMetadataAtomic(string, ArchiveMetadata) result.Result[WriteMetaData]`

            **Migration rules:**

            - Define data types for each Result[T]: `CheckpointData`, `RestoreData`, etc. with relevant fields
            - Convert `return nil` → `return result.NewSuccess(DataType{...})`
            - Convert `return err` → `return result.NewFailure[DataType]([]result.SAWError{{Code: "JOURNAL_ERROR", Message: err.Error(), Severity: "fatal"}})`
            - Wrap errors with context: `result.SAWError{Code: "CHECKPOINT_FAILED", Message: fmt.Sprintf("checkpoint %q: %v", name, err), Severity: "fatal"}`
            - Add imports: `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"`

            **Tests:**

            Update pkg/journal/*_test.go to check Result[T] instead of error:
            - Replace `if err != nil` checks with `if !result.IsSuccess()`
            - Verify `.GetData()` returns expected values
            - Test error cases verify `.IsFatal()` and `.Errors[0].Code`

            **Verification gate:**

            ```bash
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/... -v
            ```
          files:
            - pkg/journal/checkpoint.go
            - pkg/journal/observer.go
            - pkg/journal/archive.go
