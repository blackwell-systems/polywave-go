            **What to implement:**

            Migrate 4 error-only functions to result.Result[T]:

            1. **dispatcher.go:**
               - `Dispatch(context.Context, Event, Formatter) error` → `Dispatch(context.Context, Event, Formatter) result.Result[DispatchData]`
               - DispatchData includes `{SentCount int, FailedCount int, Errors []result.SAWError}`

            2. **discord.go:**
               - `Send(context.Context, Message) error` → `Send(context.Context, Message) result.Result[SendData]`

            3. **telegram.go:**
               - `Send(context.Context, Message) error` → `Send(context.Context, Message) result.Result[SendData]`

            4. **slack.go:**
               - `Send(context.Context, Message) error` → `Send(context.Context, Message) result.Result[SendData]`

            **Adapter interface update:**

            The `Adapter` interface in pkg/notify/types.go currently defines:
            ```go
            type Adapter interface {
                Name() string
                Send(ctx context.Context, msg Message) error
            }
            ```

            Update to:
            ```go
            type Adapter interface {
                Name() string
                Send(ctx context.Context, msg Message) result.Result[SendData]
            }
            ```

            **Migration rules:**

            - Define `SendData struct {MessageID string, Timestamp time.Time, Provider string}`
            - Define `DispatchData struct {SentCount int, FailedCount int, Errors []result.SAWError}`
            - In dispatcher.go `Dispatch()`: collect errors from each adapter Send(), return Partial if some succeed
            - HTTP adapters: parse response status → Success (2xx), Partial (429 with retry-after), Fatal (4xx/5xx)
            - Context cancellation: return Fatal with Code: "CONTEXT_CANCELLED"

            **Tests:**

            Update pkg/notify/*_test.go:
            - Mock adapters return Result[SendData] instead of error
            - Verify Dispatch returns Partial when some adapters fail
            - Test context cancellation returns Fatal

            **Verification gate:**

            ```bash
            go build ./pkg/notify/...
            go vet ./pkg/notify/...
            go test ./pkg/notify/... -v
            ```
