title: Migrate error-only returns to result.Result[T]
feature_slug: result-type-migration
verdict: SUITABLE
suitability_assessment: |
    The work satisfies all five suitability gate questions:

    1. **File decomposition:** 113 error-only functions across 16 packages can be
       assigned to agents with disjoint file ownership. Each package has distinct files
       that can be migrated independently.

    2. **Investigation-first items:** None. The result.Result[T] pattern is already
       established and proven in protocol/engine packages. Migration is mechanical.

    3. **Interface discoverability:** All cross-agent interfaces are known. The
       result.Result[T] type and constructors (NewSuccess, NewPartial, NewFailure) are
       already defined in pkg/result/result.go. No new interfaces need definition.

    4. **Pre-implementation status check:** Survey found:
       - 81 functions already use result.Result[T] (protocol: 71, engine: 6, config: 4)
       - 113 functions still use error-only returns (27% remaining)
       - Packages with highest error-only count: engine (39), protocol (23), orchestrator (16)
       - No partial migrations that would block progress

    5. **Parallelization value check:** High value. Agents are independent AND:
       - Build/test cycle: go test ./... takes ~60s (benefits from parallelization)
       - Avg files per agent: 2-3 files (substantial implementation per agent)
       - Tasks involve logic changes (signature changes, test updates, caller updates)
       - 16 agents across 3 waves: Wave 1 (leaf packages, 8 agents), Wave 2 (mid-layer,
         6 agents), Wave 3 (orchestration layer, 2 agents)

    Estimated times:
    - Scout phase: ~10 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~40 min (16 agents × 5 min avg, 3 waves with parallelism)
    - Merge & verification: ~10 min (3 wave merges + full test suite)
    Total SAW time: ~60 min

    Sequential baseline: ~120 min (16 agents × 7.5 min avg sequential time)
    Time savings: ~60 min (50% faster)

    Recommendation: Clear speedup. Proceed with SAW.
test_command: go test ./... -timeout 120s
lint_command: go vet ./...
