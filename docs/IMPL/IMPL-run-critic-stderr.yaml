title: CLI Backend Stderr Capture and Claude Code Context Detection
feature_slug: run-critic-stderr
verdict: SUITABLE
suitability_assessment: |
    Suitability gate results:

    1. File decomposition: 6 distinct files will change across 2 agents with
       disjoint ownership. Agent A owns the CLI backend (client.go + test). Agent B
       owns the run-critic command and engine critic/scout_run files.

    2. Investigation-first items: None. The root cause is already identified: pty.Start()
       merges stderr into the PTY, so error messages from early crashes are discarded by
       the JSON parsing loop. The Claude Code nesting issue is understood (CLAUDECODE env
       var stripping is insufficient).

    3. Interface discoverability: Yes. The changes are internal to the CLI backend package
       and the run-critic command. No cross-agent interface contracts are needed beyond a
       simple helper function signature.

    4. Pre-implementation status: All three fixes are TODO. No prior implementation exists.

    5. Parallelization value: 2 agents in wave 1 working on independent files. The Go
       build+test cycle is ~30s. Each agent touches 2-4 files. Clear speedup over
       sequential since both agents can run build+test independently.

    Estimated times:
    - Scout phase: ~5 min
    - Agent execution: ~8 min (2 agents x 8 min avg, single wave)
    - Merge and verification: ~3 min
    Total SAW time: ~16 min

    Sequential baseline: ~20 min (2 agents x 10 min avg sequential)
    Time savings: ~4 min (20% faster)

    Recommendation: Clear speedup. The agents are fully independent (single wave)
    and each involves non-trivial logic with tests.
