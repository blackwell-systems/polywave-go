pre_mortem:
    overall_risk: low
    rows:
        - scenario: pty.Start() merges stderr into PTY — non-JSON lines may include PTY control sequences
          likelihood: medium
          impact: low
          mitigation: The existing ansiRE regex already strips ANSI escape sequences. Non-JSON capture happens after ANSI stripping, so control sequences are already removed.
        - scenario: Claude Code sets additional env vars beyond CLAUDECODE that cause nesting failures
          likelihood: medium
          impact: low
          mitigation: IsClaudeCodeSession checks CLAUDECODE which is the primary indicator. If other vars are discovered, the function can be extended later.
        - scenario: BuildCriticPrompt extraction changes RunCritic behavior subtly
          likelihood: low
          impact: medium
          mitigation: Existing critic_test.go tests for RunCritic continue to pass. Agent B must ensure the extracted function preserves identical prompt assembly.
        - scenario: Non-JSON capture accumulates large amounts of text from verbose subprocess output
          likelihood: low
          impact: low
          mitigation: Cap nonJSON builder at 4KB. Most error messages are short. Truncate with '... (truncated)' suffix if exceeded.
