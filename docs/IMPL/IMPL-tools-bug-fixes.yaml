interface_contracts:
    - name: extractFilePath
      description: |-
        Already exists in constraint_enforcer.go. Checks "file_path" key first,
        then "path" key fallback. Used by all three constraint middleware functions.
        After Bug 1's fix, RolePathMiddleware in role_middleware.go must delegate to
        this same function rather than using only the "file_path" key.
      definition: |
        func extractFilePath(input map[string]interface{}) string
      location: pkg/tools/constraint_enforcer.go
    - name: extractStringInput
      description: |-
        New unexported helper to be added in executors.go for Bug 4. Returns
        (value, true) when key exists and contains a non-empty string. Returns
        ("", false) when key is absent, wrong type, or empty string.
      definition: |
        func extractStringInput(input map[string]interface{}, key string) (string, bool)
      location: pkg/tools/executors.go
    - name: RolePathMiddleware
      description: |-
        Exported function in role_middleware.go. External behavior must not change —
        callers in pkg/agent/backend still depend on it. After Bug 1's fix, path
        extraction delegates to extractFilePath(). After Bug 2's fix, violations
        return ("", error) instead of ("BLOCKED: ...", nil). Existing tests that
        check strings.Contains(result, "BLOCKED") must be updated to check err.
      definition: |
        func RolePathMiddleware(toolName string, c Constraints) Middleware
      location: pkg/tools/role_middleware.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Fix Bugs 1, 2, 3, 5 (both sides), and the workshop_constrained.go half of
            Bug 8. All changes are in pkg/tools/ — read every file in the package before
            making changes.

            ## Files to Read First
            Read all of these before writing anything:
            - pkg/tools/role_middleware.go
            - pkg/tools/constraint_enforcer.go
            - pkg/tools/workshop_constrained.go
            - pkg/tools/role_middleware_test.go
            - pkg/tools/constraint_enforcer_test.go
            - pkg/tools/workshop_constrained_test.go

            ---

            ## Bug 1+2: Consolidate RolePathMiddleware (CRITICAL)

            **File: pkg/tools/role_middleware.go**

            Problem 1: Path extraction at line 32 uses only `input["file_path"].(string)`,
            missing the "path" key that edit_file uses. extractFilePath() in
            constraint_enforcer.go already handles both keys correctly.

            Problem 2: Violation return at lines 54-57 uses `fmt.Sprintf(...), nil`
            (string message + nil error). All other constraint middleware return `"", err`.

            Fix both in RolePathMiddleware:

            1. Replace the inline path extraction:
               OLD: `filePath, _ := input["file_path"].(string)`
               NEW: `filePath := extractFilePath(input)`
               (extractFilePath is in the same package — no import needed)

            2. Remove the early-return for empty filePath if filePath comes from
               extractFilePath (it already returns "" only when both keys are absent or empty).
               The passthrough for empty path is still correct — keep it.

            3. Change the violation return from:
               ```go
               return fmt.Sprintf(
                   "BLOCKED: %s agent cannot write to %s. Allowed paths: %v",
                   role, filePath, c.AllowedPathPrefixes,
               ), nil
               ```
               To:
               ```go
               return "", fmt.Errorf(
                   "BLOCKED: %s agent cannot write to %s. Allowed paths: %v",
                   role, filePath, c.AllowedPathPrefixes,
               )
               ```

            The Scout .yaml suffix check (lines 40-45) remains exactly as-is — do NOT
            remove or move it.

            Also add the Scout .yaml suffix check to `newRolePathMiddleware` in
            constraint_enforcer.go (lines 95-98 only check HasPrefix, not .yaml for scout).
            After the `if strings.HasPrefix(filePath, prefix)` match (line 96), add:
            ```go
            if c.AgentRole == "scout" && !strings.HasSuffix(filePath, ".yaml") {
                continue
            }
            ```
            This keeps internal (newRolePathMiddleware) and exported (RolePathMiddleware)
            behaviors in sync for the scout role.

            ---

            ## Bug 3: Remove bashConstraintMiddlewareFn stub (MEDIUM)

            **File: pkg/tools/workshop_constrained.go**

            bashConstraintMiddlewareFn is a permanent passthrough — I5 is silently
            unenforced. Remove the stub infrastructure:

            1. Remove the `bashConstraintMiddlewareFn` var declaration (line 13).

            2. Remove the `defaultBashConstraintMiddleware` function (lines 47-49).

            3. Remove the nil-guard for bashConstraintMiddlewareFn from init() (lines 29-31).

            4. In WithConstraints, the `case t.Name == "bash":` block calls
               `bashConstraintMiddlewareFn(c, tracker)`. Replace the entire case with:
               ```go
               case t.Name == "bash":
                   // TODO(I5): Bash constraint enforcement (commit tracking) is deferred.
                   // The bashConstraintMiddlewareFn stub was a permanent passthrough and
                   // has been removed. Re-introduce real I5 enforcement here when needed.
               ```
               Since no middleware is applied, this case effectively falls through to
               "no constraints applied" — same as the default case for read-only tools.
               You may also remove the case entirely and rely on default; include the TODO
               comment in a block comment above the switch if you do.

            5. CommitTracker struct and the `if c.TrackCommits { tracker = &CommitTracker{} }`
               logic in WithConstraints remain unchanged. The tracker is still returned from
               WithConstraints even though bash no longer calls it — callers can still observe
               commit counts if they wire bash tracking manually.

            ---

            ## Bug 5: Fix init() order dependency (CRITICAL)

            The current design relies on alphabetical file init() order:
            constraint_enforcer.go (c) runs after workshop_constrained.go (w), so
            constraint_enforcer's init() can override the stubs set by workshop_constrained's
            init(). This is fragile.

            **File: pkg/tools/constraint_enforcer.go**

            Remove the entire init() function (lines 14-22):
            ```go
            // REMOVE THIS:
            func init() {
                ownershipMiddlewareFn = newOwnershipMiddleware
                freezeMiddlewareFn = newFreezeMiddleware
                rolePathMiddlewareFn = newRolePathMiddleware
            }
            ```

            Add a new exported constructor function that workshop_constrained.go will call:
            ```go
            // RegisterConstraintMiddleware sets the package-level middleware constructor
            // variables to the real constraint enforcement implementations. Called explicitly
            // from workshop_constrained.go's init(), eliminating the fragile dependency on
            // Go's alphabetical file init() ordering.
            func RegisterConstraintMiddleware() {
                ownershipMiddlewareFn = newOwnershipMiddleware
                freezeMiddlewareFn = newFreezeMiddleware
                rolePathMiddlewareFn = newRolePathMiddleware
            }
            ```

            **File: pkg/tools/workshop_constrained.go**

            Replace the existing init() function with a version that calls
            RegisterConstraintMiddleware() directly, removing the nil-guard pattern:

            ```go
            func init() {
                // Set passthrough stubs, then immediately replace with real implementations.
                // The explicit RegisterConstraintMiddleware() call replaces reliance on
                // Go's alphabetical file init() ordering.
                ownershipMiddlewareFn = defaultOwnershipMiddleware
                freezeMiddlewareFn = defaultFreezeMiddleware
                rolePathMiddlewareFn = defaultRolePathMiddleware
                RegisterConstraintMiddleware()
            }
            ```

            Remove the bashConstraintMiddlewareFn nil-guard from init() as part of Bug 3.
            The final init() will only set the three non-bash stubs and then call
            RegisterConstraintMiddleware().

            ---

            ## Bug 8 (workshop_constrained.go half): Replace nolint (LOW)

            **File: pkg/tools/workshop_constrained.go**

            In WithConstraints, the `wrapped.Register(t)` call (near line 115) uses:
            ```go
            wrapped.Register(t) // nolint: result ignored, duplicates cannot occur here
            ```
            Replace with explicit panic-on-failure:
            ```go
            if res := wrapped.Register(t); res.IsFatal() {
                panic("WithConstraints: duplicate tool name: " + t.Name)
            }
            ```

            ---

            ## Test Updates

            **File: pkg/tools/role_middleware_test.go**

            After Bug 2's fix, violations return errors, not string messages. Update every
