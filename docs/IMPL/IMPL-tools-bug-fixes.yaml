            Either outcome (fix incorrect comment or add clarifying example sentence) is
            acceptable. No test coverage for comments; no breakage risk.
        - scenario: |-
            Agent C creates executors_test.go in package tools (internal). If another test
            file in the package already defines a function with the same name as a helper
