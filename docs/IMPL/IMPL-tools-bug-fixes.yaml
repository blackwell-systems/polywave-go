            ## Bug 7: Fix/clarify middleware order comment (LOW)

            **File: pkg/tools/middleware.go**

            Read the Apply function comment carefully (lines 24-26 and the loop body).
            The loop iterates from `len(middlewares)-1` down to 0 — meaning the LAST
            middleware in the slice becomes the innermost wrapper, and the FIRST middleware
            becomes the outermost wrapper (executes first).

            The current comment reads:
            ```
            // Apply wraps an executor with a stack of middleware functions.
            // Middleware are applied right-to-left: the first middleware in the list
            // is the outermost (executes first in the call chain).
            ```

            This description is correct. Replace it with a version that is unambiguous
            and includes an example to prevent future confusion:
            ```go
            // Apply wraps an executor with a stack of middleware functions.
            // Middleware are applied right-to-left: the last element in the slice is
            // applied first (becomes innermost), so the first element is the outermost
            // and executes first in the call chain.
            // Example: Apply(exec, A, B, C) produces A(B(C(exec))).
            ```

            ---

