            ## Bug 6: grepFallback ignores scanner.Err() (LOW)

            **File: pkg/tools/executors.go**

            In `grepFallback` (~lines 244-267):

            1. Check scanner.Err() after the scan loop. After:
               ```go
               for scanner.Scan() {
                   lineNum++
                   ...
               }
               ```
               Add:
               ```go
               if err := scanner.Err(); err != nil {
                   results.WriteString(fmt.Sprintf("[warning: read error in %s: %v]\n", path, err))
               }
               ```

            2. Capture the Walk error instead of discarding it. Change:
               ```go
               _ = filepath.Walk(root, func(...) error {
                   ...
               })
               ```
               To:
               ```go
               if walkErr := filepath.Walk(root, func(...) error {
                   ...
               }); walkErr != nil {
                   results.WriteString(fmt.Sprintf("[warning: walk error: %v]\n", walkErr))
               }
               ```

