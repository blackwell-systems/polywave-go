            ## What to Implement

            Implement critical path-aware agent prioritization logic in a new file
            `pkg/engine/scheduler.go`. This scheduler analyzes the dependency graph
            from an IMPL manifest and reorders agents to launch agents on the critical
            path first, reducing overall wave completion time.

            ## Interfaces to Implement

            **Function signature (exact):**
            ```go
            func PrioritizeAgents(manifest *protocol.IMPLManifest, waveNum int) []string
            ```

            **Algorithm:**
            1. Extract the wave by waveNum from manifest.Waves
            2. If wave has 1 agent, return []string{agent.ID} immediately (no-op)
            3. Build dependency graph from manifest.FileOwnership (agent → dependents)
            4. Calculate critical path depth for each agent using recursive algorithm:
               - CriticalPathDepth(agent) = 1 if agent has no dependents
               - CriticalPathDepth(agent) = 1 + max(CriticalPathDepth(dependent)) otherwise
            5. Sort agents by:
               - Primary: critical path depth (descending) - deeper paths launch first
               - Tie-breaker: file count (ascending) - fewer files = lower risk = launch first
            6. Return sorted agent IDs as []string

            **Edge cases:**
            - Solo waves (1 agent): return agent ID unchanged, skip sorting
            - All agents independent (no dependencies): sort by file count only
            - Cycle in dep graph: should not happen (E16 validator catches this), but
              defensively fall back to declaration order if detected

            ## Interfaces to Call

            - `protocol.IMPLManifest` (existing): read from manifest parameter
            - `manifest.Waves` (existing): access wave by waveNum
            - `manifest.FileOwnership` (existing): build dependency graph
            - `agent.Files` (existing): count files per agent for tie-breaker

            ## Tests to Write

            File: `pkg/engine/scheduler_test.go`

            1. `TestPrioritizeAgents_LinearDependencies` - A → B → C should return [A, B, C]
            2. `TestPrioritizeAgents_ParallelAgents` - all independent should sort by file count
            3. `TestPrioritizeAgents_DiamondGraph` - A → B,C → D should prioritize A, then B/C by file count, then D
            4. `TestPrioritizeAgents_SingleAgent` - 1-agent wave returns agent ID unchanged
            5. `TestPrioritizeAgents_FileCountTieBreaker` - equal depth agents sorted by file count ascending
            6. `TestPrioritizeAgents_NoReorderNeeded` - agents already in optimal order return unchanged order

            Use table-driven tests. Mock IMPLManifest structs with FileOwnership entries
            that encode the dependency relationships.

            ## Verification Gate

            ```bash
            go build ./pkg/engine
            go vet ./pkg/engine
            go test ./pkg/engine -run TestPrioritizeAgents -v
            ```

            ## Constraints

            - Do NOT modify any files outside pkg/engine (scheduler.go, scheduler_test.go only)
            - Do NOT call any SSE/event emission code (Agent C owns that integration)
            - Do NOT modify Wave struct (Agent B owns that)
            - Package imports: use only `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`
            - Critical path depth calculation must be recursive (matches seed doc algorithm)
            - Sort must be stable (preserve declaration order when all factors are equal)
            - Return empty slice for waves with 0 agents (defensive)
          files:
            - pkg/engine/scheduler.go
            - pkg/engine/scheduler_test.go
