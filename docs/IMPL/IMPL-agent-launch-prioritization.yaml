interface_contracts:
    - name: PrioritizeAgents
      description: Reorders agents in a wave based on critical path depth and file count tie-breaker
      definition: |
        // PrioritizeAgents analyzes the dependency graph and agent file counts
        // to determine optimal launch order. Agents with deeper critical path
        // depths launch first to unblock downstream work earlier.
        //
        // Returns a slice of agent IDs in launch order. For single-agent waves,
        // returns the agent ID unchanged (no reordering needed).
        //
        // Tie-breaker: when two agents have equal critical path depth, the agent
        // with fewer files launches first (lower implementation risk).
        func PrioritizeAgents(manifest *protocol.IMPLManifest, waveNum int) []string
      location: pkg/engine/scheduler.go
    - name: AgentLaunchOrder
      description: Field added to Wave struct to store prioritized launch order (audit trail)
      definition: |
        type Wave struct {
            Number           int      `yaml:"number" json:"number"`
            Agents           []Agent  `yaml:"agents" json:"agents"`
            AgentLaunchOrder []string `yaml:"agent_launch_order,omitempty" json:"agent_launch_order,omitempty"`
        }
      location: pkg/protocol/types.go
    - name: AgentPrioritizedPayload
      description: SSE event payload emitted when agents are reordered for optimal scheduling
      definition: |
        type AgentPrioritizedPayload struct {
            Wave             int      `json:"wave"`
            OriginalOrder    []string `json:"original_order"`
            PrioritizedOrder []string `json:"prioritized_order"`
            Reordered        bool     `json:"reordered"`
            Reason           string   `json:"reason"`
        }
      location: pkg/orchestrator/events.go
