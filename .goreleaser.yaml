version: 2

builds:
  - id: polywave-tools
    main: ./cmd/polywave-tools
    binary: polywave-tools
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: polywave-tools
    builds: [polywave-tools]
    format: tar.gz
    name_template: "polywave-tools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew formula is maintained manually in blackwell-systems/homebrew-tap
# Do not enable brews: section — it conflicts with manual formula updates
