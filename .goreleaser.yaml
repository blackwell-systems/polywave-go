version: 2

builds:
  - id: sawtools
    main: ./cmd/sawtools
    binary: sawtools
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: sawtools
    builds: [sawtools]
    format: tar.gz
    name_template: "sawtools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: sawtools
    ids: [sawtools]
    repository:
      owner: blackwell-systems
      name: homebrew-tap
    homepage: https://github.com/blackwell-systems/scout-and-wave
    description: "CLI tools for the Scout-and-Wave parallel agent coordination protocol"
    license: "MIT"
    install: |
      bin.install "sawtools"
    test: |
      system "#{bin}/sawtools", "version"
