version: 2

builds:
  - id: sawtools
    main: ./cmd/sawtools
    binary: sawtools
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: sawtools
    builds: [sawtools]
    format: tar.gz
    name_template: "sawtools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew formula is maintained manually in blackwell-systems/homebrew-tap
# Do not enable brews: section — it conflicts with manual formula updates
